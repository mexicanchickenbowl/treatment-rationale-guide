rimary endodontic lesion, the isolated deep pocket should improve if the periodontal component is truly secondary. Persistent or worsening probing depths after endodontic treatment suggest a true combined lesion or an unresolved primary periodontal component requiring periodontal therapy."}]}, {"id": "s1-diagnosis-and-case-assessment-16-when-to-refer-vs-treat", "number": "1.6", "title": "When to Refer vs. Treat", "level": 2, "blocks": [{"type": "ul", "items": ["What case complexity factors warrant referral to an endodontist?"], "raw": "- What case complexity factors warrant referral to an endodontist?"}, {"type": "p", "text": "The fundamental principle is that when a case exceeds the clinician's skill, experience, or equipment, referral to an endodontist is appropriate. Attempting cases beyond one's training increases the risk of procedural accidents, irreversible damage, and suboptimal outcomes.", "raw": "The fundamental principle is that when a case exceeds the clinician's skill, experience, or equipment, referral to an endodontist is appropriate. Attempting cases beyond one's training increases the risk of procedural accidents, irreversible damage, and suboptimal outcomes."}, {"type": "ul", "items": ["How does the AAE case difficulty assessment form guide referral decisions?"], "raw": "- How does the AAE case difficulty assessment form guide referral decisions?"}, {"type": "p", "text": "The AAE Case Difficulty Assessment Form categorizes cases as Minimal, Moderate, or High difficulty. Minimal difficulty cases are straightforward single-rooted anterior teeth with no complicating factors. Moderate difficulty includes cases with moderate curvature (10–30°), posterior molars, or patients with limited opening. High difficulty cases include: calcified canals, severe canal curvature (>30°) or S-curve anatomy, retreatment of previously treated teeth, previous procedural accidents (instrument separation, perforation), anatomic anomalies (dens invaginatus, dilaceration), internal or external resorption, significantly limited opening (trismus), and proximity to vital anatomical structures (IAN, maxillary sinus, mental foramen).", "raw": "The AAE Case Difficulty Assessment Form categorizes cases as Minimal, Moderate, or High difficulty. Minimal difficulty cases are straightforward single-rooted anterior teeth with no complicating factors. Moderate difficulty includes cases with moderate curvature (10–30°), posterior molars, or patients with limited opening. High difficulty cases include: calcified canals, severe canal curvature (>30°) or S-curve anatomy, retreatment of previously treated teeth, previous procedural accidents (instrument separation, perforation), anatomic anomalies (dens invaginatus, dilaceration), internal or external resorption, significantly limited opening (trismus), and proximity to vital anatomical structures (IAN, maxillary sinus, mental foramen)."}, {"type": "ul", "items": ["What anatomical considerations increase case difficulty?"], "raw": "- What anatomical considerations increase case difficulty?"}, {"type": "p", "text": "High-difficulty anatomical factors include severely curved or calcified canals, S-curve morphology, dens invaginatus, dilaceration, C-shaped canals, fused roots, internal or external resorption defects, and teeth with previous procedural complications. Proximity to the inferior alveolar nerve, mental foramen, or maxillary sinus also elevates case complexity. Retreatment cases with posts, separated instruments, or prior transportation are inherently more complex.", "raw": "High-difficulty anatomical factors include severely curved or calcified canals, S-curve morphology, dens invaginatus, dilaceration, C-shaped canals, fused roots, internal or external resorption defects, and teeth with previous procedural complications. Proximity to the inferior alveolar nerve, mental foramen, or maxillary sinus also elevates case complexity. Retreatment cases with posts, separated instruments, or prior transportation are inherently more complex."}]}]}, {"id": "s2-treatment-planning", "number": "2", "title": "Treatment Planning", "level": 1, "blocks": [], "subsections": [{"id": "s2-treatment-planning-21-extraction-vs-endodontic-treatment", "number": "2.1", "title": "Extraction vs. Endodontic Treatment", "level": 2, "blocks": [{"type": "ul", "items": ["What factors favor endodontic treatment over extraction and implant?"], "raw": "- What factors favor endodontic treatment over extraction and implant?"}, {"type": "p", "text": "Factors that favor endodontic treatment include: adequate bone support around the tooth, restorability of the crown, strategic value of the tooth (abutment for bridge, terminal molar), patient preference for retaining natural dentition, and medical conditions that complicate implant surgery (bisphosphonate use, radiation, bleeding disorders). Conversely, factors favoring extraction/implant include: inability to restore the tooth, severe periodontal disease, vertical root fracture, and unfavorable crown-to-root ratio. Teeth with a history of trauma may have reduced long-term prognosis due to increased fracture susceptibility {{cite: Nattress and Martin 1994 — traumatized teeth have higher fracture susceptibility than non-traumatized teeth}}.", "raw": "Factors that favor endodontic treatment include: adequate bone support around the tooth, restorability of the crown, strategic value of the tooth (abutment for bridge, terminal molar), patient preference for retaining natural dentition, and medical conditions that complicate implant surgery (bisphosphonate use, radiation, bleeding disorders). Conversely, factors favoring extraction/implant include: inability to restore the tooth, severe periodontal disease, vertical root fracture, and unfavorable crown-to-root ratio. Teeth with a history of trauma may have reduced long-term prognosis due to increased fracture susceptibility {{cite: Nattress and Martin 1994 — traumatized teeth have higher fracture susceptibility than non-traumatized teeth}}."}, {"type": "ul", "items": ["How do survival rates of endodontically treated teeth compare to implants?"], "raw": "- How do survival rates of endodontically treated teeth compare to implants?"}, {"type": "p", "text": "Implants and root canals both have an absolute failure rate of 6.1% {{cite: Doyle 2006 — implants and root canals both have an absolute failure rate of 6.1%}}. The survival rate of endodontically treated teeth is 97% {{cite: Salehrabi and Rotstein — 97% survival of endodontically treated teeth in large insurance database study}}. However, some factors decrease success, including necrotic pulp, furcation involvement, and poor restorability.", "raw": "Implants and root canals both have an absolute failure rate of 6.1% {{cite: Doyle 2006 — implants and root canals both have an absolute failure rate of 6.1%}}. The survival rate of endodontically treated teeth is 97% {{cite: Salehrabi and Rotstein — 97% survival of endodontically treated teeth in large insurance database study}}. However, some factors decrease success, including necrotic pulp, furcation involvement, and poor restorability."}, {"type": "ul", "items": ["What are the cost-effectiveness considerations?"], "raw": "- What are the cost-effectiveness considerations?"}, {"type": "p", "text": "Endodontic treatment followed by a crown is generally less costly in the short term than extraction and implant placement. {{cite: Torabinejad 2007 — endodontic treatment is more cost-effective than extraction and implant in most clinical scenarios}}. Over a 5-year horizon, maintaining the natural tooth via root canal therapy typically represents significant cost savings compared to extraction, implant placement, and crown restoration, particularly when accounting for bone grafting requirements.", "raw": "Endodontic treatment followed by a crown is generally less costly in the short term than extraction and implant placement. {{cite: Torabinejad 2007 — endodontic treatment is more cost-effective than extraction and implant in most clinical scenarios}}. Over a 5-year horizon, maintaining the natural tooth via root canal therapy typically represents significant cost savings compared to extraction, implant placement, and crown restoration, particularly when accounting for bone grafting requirements."}, {"type": "ul", "items": ["How does strategic value of the tooth influence the decision?"], "raw": "- How does strategic value of the tooth influence the decision?"}, {"type": "p", "text": "Strategic value must be weighed heavily: a terminal abutment for a fixed partial denture, a lone-standing molar, or a canine used as a distal stop for a removable partial denture all warrant aggressive effort to preserve. Loss of such a tooth often triggers a cascade of restorative consequences disproportionate to the cost of endodontic treatment. Conversely, a tooth with poor periodontal support that is not strategically important may be better managed by extraction.", "raw": "Strategic value must be weighed heavily: a terminal abutment for a fixed partial denture, a lone-standing molar, or a canine used as a distal stop for a removable partial denture all warrant aggressive effort to preserve. Loss of such a tooth often triggers a cascade of restorative consequences disproportionate to the cost of endodontic treatment. Conversely, a tooth with poor periodontal support that is not strategically important may be better managed by extraction."}]}, {"id": "s2-treatment-planning-22-non-surgical-vs-surgical-approach", "number": "2.2", "title": "Non-Surgical vs. Surgical Approach", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for primary surgical endodontics?"], "raw": "- What are the indications for primary surgical endodontics?"}, {"type": "p", "text": "According to Kim and Kratchman:", "raw": "According to Kim and Kratchman:"}, {"type": "p", "text": "1) Post dilemma: Surgery can be more conservative than removing posts if the post and crown are intact.", "raw": "1) Post dilemma: Surgery can be more conservative than removing posts if the post and crown are intact."}, {"type": "p", "text": "2) True Cysts", "raw": "2) True Cysts"}, {"type": "p", "text": "3) Anatomic complexities (isthmuses that cannot be cleaned via orthograde approach)", "raw": "3) Anatomic complexities (isthmuses that cannot be cleaned via orthograde approach)"}, {"type": "ul", "items": ["When should non-surgical retreatment be attempted before surgery?"], "raw": "- When should non-surgical retreatment be attempted before surgery?"}, {"type": "p", "text": "Generally, retreatment should always be attempted first before surgery. Retreatment should pre performed first if there are missed canals, insufficient obturation, insufficient length and taper of canal preparations.", "raw": "Generally, retreatment should always be attempted first before surgery. Retreatment should pre performed first if there are missed canals, insufficient obturation, insufficient length and taper of canal preparations."}, {"type": "ul", "items": ["How do success rates compare between non-surgical and surgical approaches?"], "raw": "- How do success rates compare between non-surgical and surgical approaches?"}, {"type": "p", "text": "Torabinejad et al (2009) found that surgery had a success rate of 77.8% and non-surgical retreatment had a success rate of 70.9% in the short term 2 to 4 years.", "raw": "Torabinejad et al (2009) found that surgery had a success rate of 77.8% and non-surgical retreatment had a success rate of 70.9% in the short term 2 to 4 years."}, {"type": "ul", "items": ["What anatomical factors favor one approach over another?"], "raw": "- What anatomical factors favor one approach over another?"}, {"type": "p", "text": "Severe curvatures, isthmuses, obstructed canals, perforations favor surgical approach", "raw": "Severe curvatures, isthmuses, obstructed canals, perforations favor surgical approach"}]}, {"id": "s2-treatment-planning-23-single-visit-vs-multiple-visit-treatment", "number": "2.3", "title": "Single Visit vs. Multiple Visit Treatment", "level": 2, "blocks": [{"type": "ul", "items": ["What does the evidence show regarding outcomes of single vs. multiple visit RCT?"], "raw": "- What does the evidence show regarding outcomes of single vs. multiple visit RCT?"}, {"type": "p", "text": "The evidence is mixed across all three relevant outcomes. Calcium hydroxide's contribution to clinically meaningful bacterial reduction between visits is not clearly established {{cite: Sathorn 2007 — systematic review found insufficient evidence that Ca(OH)2 between visits significantly reduces intracanal bacteria compared to no medicament in clinical studies}}. Studies comparing single- versus multiple-visit protocols have not demonstrated a consistent difference in post-operative pain. Su et al.'s meta-analysis found no difference in overall survival or periapical healing between single- and multiple-visit treatment.", "raw": "The evidence is mixed across all three relevant outcomes. Calcium hydroxide's contribution to clinically meaningful bacterial reduction between visits is not clearly established {{cite: Sathorn 2007 — systematic review found insufficient evidence that Ca(OH)2 between visits significantly reduces intracanal bacteria compared to no medicament in clinical studies}}. Studies comparing single- versus multiple-visit protocols have not demonstrated a consistent difference in post-operative pain. Su et al.'s meta-analysis found no difference in overall survival or periapical healing between single- and multiple-visit treatment."}, {"type": "ul", "items": ["What clinical scenarios favor multiple visit treatment?"], "raw": "- What clinical scenarios favor multiple visit treatment?"}, {"type": "p", "text": "Multiple visits are favored when:", "raw": "Multiple visits are favored when:"}, {"type": "ul", "items": ["The canal cannot be dried adequately before obturation", "A persistent sinus tract has not resolved", "Active, purulent drainage is present through the canal", "The case cannot be completed safely in the time available"], "raw": "- The canal cannot be dried adequately before obturation\n- A persistent sinus tract has not resolved\n- Active, purulent drainage is present through the canal\n- The case cannot be completed safely in the time available"}, {"type": "ul", "items": ["How does diagnosis (vital vs. necrotic) influence visit number?"], "raw": "- How does diagnosis (vital vs. necrotic) influence visit number?"}, {"type": "p", "text": "Several studies show no statistically significant difference in outcomes between single- and multiple-visit treatment regardless of pulpal diagnosis.", "raw": "Several studies show no statistically significant difference in outcomes between single- and multiple-visit treatment regardless of pulpal diagnosis."}, {"type": "ul", "items": ["What is the role of inter-appointment medicaments?"], "raw": "- What is the role of inter-appointment medicaments?"}, {"type": "p", "text": "Calcium hydroxide is the most commonly used inter-appointment medicament. Its properties include:", "raw": "Calcium hydroxide is the most commonly used inter-appointment medicament. Its properties include:"}, {"type": "ul", "items": ["High alkalinity (pH 11–12), which provides broad-spectrum antibacterial activity — though *E. faecalis* can tolerate this environment via its proton pump {{cite: Evans 2002 — E. faecalis survives high-pH Ca(OH)2 environments via a membrane-bound H⁺-ATPase that actively extrudes hydroxyl ions, maintaining near-neutral intracellular pH}}", "Neutralization of bacterial LPS, dampening the host inflammatory response", "Dissolution of residual pulp tissue and organic debris", "Relatively low cytotoxicity to apical papilla cells, making it well-suited for regenerative endodontic protocols"], "raw": "- High alkalinity (pH 11–12), which provides broad-spectrum antibacterial activity — though *E. faecalis* can tolerate this environment via its proton pump {{cite: Evans 2002 — E. faecalis survives high-pH Ca(OH)2 environments via a membrane-bound H⁺-ATPase that actively extrudes hydroxyl ions, maintaining near-neutral intracellular pH}}\n- Neutralization of bacterial LPS, dampening the host inflammatory response\n- Dissolution of residual pulp tissue and organic debris\n- Relatively low cytotoxicity to apical papilla cells, making it well-suited for regenerative endodontic protocols"}]}, {"id": "s2-treatment-planning-24-vital-pulp-therapy-candidacy", "number": "2.4", "title": "Vital Pulp Therapy Candidacy", "level": 2, "blocks": [{"type": "p", "text": "**Clinical threshold note:** VPT is appropriate only when all candidacy criteria are met with high diagnostic confidence. In adult patients presenting with deep carious lesions — the most common real-world scenario — two factors shift the balance toward RCT: (1) exposure type is the strongest predictor of VPT success, and carious exposures perform substantially worse than mechanical/iatrogenic ones because bacteria precede the exposure and contaminate the pulp before the clinician arrives {{cite: Mente 2010 — MTA DPC showed 89.9% success vs 63.3% for calcium hydroxide; success rates are weighted toward mechanical exposures and lower for carious exposures}}; (2) clinical pulpal diagnosis correlates imperfectly with histology — approximately 15% of pulp diagnoses may be incorrect {{cite: Ricucci 2014 — 84–97% clinical-histologic correlation for pulp diagnosis; up to 15% of diagnoses may not match the true histologic pulpal status}}, meaning a tooth diagnosed as reversibly inflamed may already have irreversible radicular involvement. A failed VPT does not merely return the tooth to baseline — it produces a calcifying canal system that is harder to instrument and obturate. In ambiguous adult carious cases where irreversible pulpitis cannot be confidently excluded, RCT eliminates diagnostic uncertainty and avoids the compounding consequence of treatment escalation.", "raw": "**Clinical threshold note:** VPT is appropriate only when all candidacy criteria are met with high diagnostic confidence. In adult patients presenting with deep carious lesions — the most common real-world scenario — two factors shift the balance toward RCT: (1) exposure type is the strongest predictor of VPT success, and carious exposures perform substantially worse than mechanical/iatrogenic ones because bacteria precede the exposure and contaminate the pulp before the clinician arrives {{cite: Mente 2010 — MTA DPC showed 89.9% success vs 63.3% for calcium hydroxide; success rates are weighted toward mechanical exposures and lower for carious exposures}}; (2) clinical pulpal diagnosis correlates imperfectly with histology — approximately 15% of pulp diagnoses may be incorrect {{cite: Ricucci 2014 — 84–97% clinical-histologic correlation for pulp diagnosis; up to 15% of diagnoses may not match the true histologic pulpal status}}, meaning a tooth diagnosed as reversibly inflamed may already have irreversible radicular involvement. A failed VPT does not merely return the tooth to baseline — it produces a calcifying canal system that is harder to instrument and obturate. In ambiguous adult carious cases where irreversible pulpitis cannot be confidently excluded, RCT eliminates diagnostic uncertainty and avoids the compounding consequence of treatment escalation."}, {"type": "ul", "items": ["What are the indications for indirect pulp capping?"], "raw": "- What are the indications for indirect pulp capping?"}, {"type": "p", "text": "Indirect pulp capping (IPC) is indicated when a deep carious lesion approaches the pulp but there is no radiographic or clinical evidence of pulp pathology (no spontaneous pain, sinus tract, pathologic mobility, or periapical changes). The tooth must be symptom-free or have symptoms consistent only with reversible pulpitis. The rationale is to leave a thin layer of carious dentin over the pulp to avoid exposure while placing a biocompatible liner (e.g., calcium hydroxide or MTA) to stimulate reparative dentin formation. {{cite: Maltz 2012 — stepwise excavation and indirect pulp capping showed 91% success at 3 years in randomized controlled trial}}.", "raw": "Indirect pulp capping (IPC) is indicated when a deep carious lesion approaches the pulp but there is no radiographic or clinical evidence of pulp pathology (no spontaneous pain, sinus tract, pathologic mobility, or periapical changes). The tooth must be symptom-free or have symptoms consistent only with reversible pulpitis. The rationale is to leave a thin layer of carious dentin over the pulp to avoid exposure while placing a biocompatible liner (e.g., calcium hydroxide or MTA) to stimulate reparative dentin formation. {{cite: Maltz 2012 — stepwise excavation and indirect pulp capping showed 91% success at 3 years in randomized controlled trial}}."}, {"type": "ul", "items": ["What clinical criteria determine direct pulp cap candidacy?"], "raw": "- What clinical criteria determine direct pulp cap candidacy?"}, {"type": "p", "text": "Direct pulp capping (DPC) is most likely to succeed when: the pulp exposure is small (<1 mm), mechanical rather than carious (e.g., from instrumentation), bleeding is controlled and not profuse or dark (indicating normal vital pulp), the patient is relatively young (better healing capacity), and there are no signs of irreversible pulpitis. Carious exposures carry a higher risk of failure because bacteria already contaminate the pulp prior to exposure. {{cite: Mente 2010 — MTA direct pulp cap showed 89.9% success vs 63.3% for calcium hydroxide at 5 years}}. {{cite: Dammaschke 2010 — long-term success of direct pulp capping with calcium hydroxide drops to 37% at 10 years}}.", "raw": "Direct pulp capping (DPC) is most likely to succeed when: the pulp exposure is small (<1 mm), mechanical rather than carious (e.g., from instrumentation), bleeding is controlled and not profuse or dark (indicating normal vital pulp), the patient is relatively young (better healing capacity), and there are no signs of irreversible pulpitis. Carious exposures carry a higher risk of failure because bacteria already contaminate the pulp prior to exposure. {{cite: Mente 2010 — MTA direct pulp cap showed 89.9% success vs 63.3% for calcium hydroxide at 5 years}}. {{cite: Dammaschke 2010 — long-term success of direct pulp capping with calcium hydroxide drops to 37% at 10 years}}."}, {"type": "ul", "items": ["How long should you wait for hemostasis after pulp exposure, and what does the bleeding response tell you?"], "raw": "- How long should you wait for hemostasis after pulp exposure, and what does the bleeding response tell you?"}, {"type": "p", "text": "Achieving hemostasis within **5 minutes** of gentle pressure with a sterile cotton pellet moistened with saline or 6% NaOCl is the clinical go/no-go threshold for proceeding with VPT. If bleeding does not stop within 5 minutes, the inflammation extends beyond the exposure site into the radicular pulp — the clinical diagnosis should be revised to irreversible pulpitis and the procedure abandoned in favor of pulpectomy {{cite: ESE de Souza 2021 — ESE vital pulp therapy position statement: hemostasis within 5 minutes is the clinical threshold for proceeding with VPT; failure to achieve hemostasis indicates irreversible radicular inflammation}}.", "raw": "Achieving hemostasis within **5 minutes** of gentle pressure with a sterile cotton pellet moistened with saline or 6% NaOCl is the clinical go/no-go threshold for proceeding with VPT. If bleeding does not stop within 5 minutes, the inflammation extends beyond the exposure site into the radicular pulp — the clinical diagnosis should be revised to irreversible pulpitis and the procedure abandoned in favor of pulpectomy {{cite: ESE de Souza 2021 — ESE vital pulp therapy position statement: hemostasis within 5 minutes is the clinical threshold for proceeding with VPT; failure to achieve hemostasis indicates irreversible radicular inflammation}}."}, {"type": "p", "text": "The quality of bleeding is equally informative:", "raw": "The quality of bleeding is equally informative:"}, {"type": "table", "headers": ["Bleeding Character", "Interpretation", "Action"], "rows": [["Bright red, stops within 5 min", "Healthy superficial pulp, reversible zone", "Proceed with VPT"], ["Dark, sluggish, or does not stop within 5 min", "Irreversible inflammatory infiltration", "Abandon VPT → pulpectomy/RCT"], ["Profuse, uncontrolled", "Deep necrosis, suppuration, or abscess", "Contraindicated"]], "raw": "| Bleeding Character | Interpretation | Action |\n| --- | --- | --- |\n| Bright red, stops within 5 min | Healthy superficial pulp, reversible zone | Proceed with VPT |\n| Dark, sluggish, or does not stop within 5 min | Irreversible inflammatory infiltration | Abandon VPT → pulpectomy/RCT |\n| Profuse, uncontrolled | Deep necrosis, suppuration, or abscess | Contraindicated |"}, {"type": "p", "text": "**Why NaOCl rather than saline?** A cotton pellet wetted with 6% NaOCl simultaneously lyses surface organic debris at the wound edge and achieves hemostasis, producing a cleaner preparation surface before bioceramic placement. Some protocols use 3% NaOCl to reduce cytotoxicity while retaining this dual effect. Ferric sulfate is not recommended as a hemostatic agent for VPT because it leaves a residue that impairs the biocompatibility of the capping interface.", "raw": "**Why NaOCl rather than saline?** A cotton pellet wetted with 6% NaOCl simultaneously lyses surface organic debris at the wound edge and achieves hemostasis, producing a cleaner preparation surface before bioceramic placement. Some protocols use 3% NaOCl to reduce cytotoxicity while retaining this dual effect. Ferric sulfate is not recommended as a hemostatic agent for VPT because it leaves a residue that impairs the biocompatibility of the capping interface."}, {"type": "p", "text": "**For full pulpotomy** (entire coronal pulp removed), the 5-minute threshold applies to each successive amputation level. If hemostasis is not achieved at the coronal pulp level, remove additional pulp tissue (deepen the pulpotomy) and reassess before abandoning — up to the canal orifices. Persistent bleeding at the level of the canal orifices is the definitive indication to proceed to full pulpectomy {{cite: Bjørndal 2019 — stepwise pulpotomy approach: achieve hemostasis at each level before placing capping material; persistent bleeding at orifice level = pulpectomy indicated}}.", "raw": "**For full pulpotomy** (entire coronal pulp removed), the 5-minute threshold applies to each successive amputation level. If hemostasis is not achieved at the coronal pulp level, remove additional pulp tissue (deepen the pulpotomy) and reassess before abandoning — up to the canal orifices. Persistent bleeding at the level of the canal orifices is the definitive indication to proceed to full pulpectomy {{cite: Bjørndal 2019 — stepwise pulpotomy approach: achieve hemostasis at each level before placing capping material; persistent bleeding at orifice level = pulpectomy indicated}}."}, {"type": "ul", "items": ["When is full pulpotomy indicated in permanent teeth?"], "raw": "- When is full pulpotomy indicated in permanent teeth?"}, {"type": "p", "text": "Full pulpotomy is indicated when there is clinical evidence of irreversible pulpitis (spontaneous or lingering pain) in a tooth with a closed apex, but where preserving vitality is desirable. The entire coronal pulp is removed and a bioceramic material placed to maintain radicular pulp vitality. Cvek pulpotomy (partial/cervical pulpotomy) is the technique of choice for traumatized teeth with open apices and partial pulp exposure, achieving 96% success {{cite: Bimstein and Rotstein 2016 — Cvek pulpotomy in traumatized teeth with immature apices achieves approximately 96% success}}. Full pulpotomy in mature permanent teeth with MTA has shown success rates of 79–98% in recent literature, making it a viable alternative to root canal treatment in appropriate cases.", "raw": "Full pulpotomy is indicated when there is clinical evidence of irreversible pulpitis (spontaneous or lingering pain) in a tooth with a closed apex, but where preserving vitality is desirable. The entire coronal pulp is removed and a bioceramic material placed to maintain radicular pulp vitality. Cvek pulpotomy (partial/cervical pulpotomy) is the technique of choice for traumatized teeth with open apices and partial pulp exposure, achieving 96% success {{cite: Bimstein and Rotstein 2016 — Cvek pulpotomy in traumatized teeth with immature apices achieves approximately 96% success}}. Full pulpotomy in mature permanent teeth with MTA has shown success rates of 79–98% in recent literature, making it a viable alternative to root canal treatment in appropriate cases."}, {"type": "ul", "items": ["How does patient age affect vital pulp therapy decisions?"], "raw": "- How does patient age affect vital pulp therapy decisions?"}, {"type": "p", "text": "Younger patients (open apices, higher cellularity of pulp tissue) are better candidates for vital pulp therapy due to enhanced healing capacity and the critical goal of apexogenesis — continued root development and apical closure. In immature permanent teeth, vital pulp therapy is strongly preferred over RCT because root canal treated teeth with open apices lack structural integrity and are prone to cervical fracture. As patients age, pulp tissue becomes more fibrotic and less vascular, decreasing the likelihood of successful direct pulp cap or pulpotomy. However, age alone should not be the sole deciding factor; clinical presentation is paramount.", "raw": "Younger patients (open apices, higher cellularity of pulp tissue) are better candidates for vital pulp therapy due to enhanced healing capacity and the critical goal of apexogenesis — continued root development and apical closure. In immature permanent teeth, vital pulp therapy is strongly preferred over RCT because root canal treated teeth with open apices lack structural integrity and are prone to cervical fracture. As patients age, pulp tissue becomes more fibrotic and less vascular, decreasing the likelihood of successful direct pulp cap or pulpotomy. However, age alone should not be the sole deciding factor; clinical presentation is paramount."}, {"type": "ul", "items": ["What materials are indicated for vital pulp therapy (MTA, Biodentine, calcium hydroxide)?"], "raw": "- What materials are indicated for vital pulp therapy (MTA, Biodentine, calcium hydroxide)?"}, {"type": "p", "text": "MTA (Mineral Trioxide Aggregate) is the gold standard for vital pulp therapy due to its biocompatibility, antimicrobial activity, ability to set in the presence of moisture, and superior dentinal bridge formation compared to calcium hydroxide {{cite: Mente 2014 — MTA outperforms calcium hydroxide for direct pulp capping in long-term outcomes}}. Biodentine (tricalcium silicate) is an acceptable MTA substitute with shorter setting time (~12 minutes vs. 2–4 hours for MTA) and equivalent biocompatibility. Calcium hydroxide (Ca(OH)₂) has historically been the standard but long-term studies show tunnel defects in the dentinal bridge and higher failure rates over time {{cite: Farsi 2005 — calcium hydroxide direct pulp cap success rate declines significantly at 5+ years}}. Bioceramic materials (MTA, Biodentine) are now preferred over Ca(OH)₂ for DPC and pulpotomy.", "raw": "MTA (Mineral Trioxide Aggregate) is the gold standard for vital pulp therapy due to its biocompatibility, antimicrobial activity, ability to set in the presence of moisture, and superior dentinal bridge formation compared to calcium hydroxide {{cite: Mente 2014 — MTA outperforms calcium hydroxide for direct pulp capping in long-term outcomes}}. Biodentine (tricalcium silicate) is an acceptable MTA substitute with shorter setting time (~12 minutes vs. 2–4 hours for MTA) and equivalent biocompatibility. Calcium hydroxide (Ca(OH)₂) has historically been the standard but long-term studies show tunnel defects in the dentinal bridge and higher failure rates over time {{cite: Farsi 2005 — calcium hydroxide direct pulp cap success rate declines significantly at 5+ years}}. Bioceramic materials (MTA, Biodentine) are now preferred over Ca(OH)₂ for DPC and pulpotomy."}]}, {"id": "s2-treatment-planning-25-intentional-replantation-considerations", "number": "2.5", "title": "Intentional Replantation Considerations", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for intentional replantation?"], "raw": "- What are the indications for intentional replantation?"}, {"type": "p", "text": "Intentional replantation is indicated when conventional non-surgical retreatment and periapical surgery are not feasible due to anatomical limitations (proximity to vital structures, inadequate surgical access, severe root dilacerations, or long-standing post that cannot be safely removed). It may also be considered when: prior surgery has failed, there is persistent apical pathology with no clear non-surgical or surgical solution, or the tooth has a strategic value that justifies the risk {{cite: Cotter and Panzarino — intentional replantation is a viable alternative when other options are exhausted}}. It is NOT indicated for teeth with vertical root fractures, significant bone loss beyond the apex, or very curved/dilacerated roots that cannot survive extraction.", "raw": "Intentional replantation is indicated when conventional non-surgical retreatment and periapical surgery are not feasible due to anatomical limitations (proximity to vital structures, inadequate surgical access, severe root dilacerations, or long-standing post that cannot be safely removed). It may also be considered when: prior surgery has failed, there is persistent apical pathology with no clear non-surgical or surgical solution, or the tooth has a strategic value that justifies the risk {{cite: Cotter and Panzarino — intentional replantation is a viable alternative when other options are exhausted}}. It is NOT indicated for teeth with vertical root fractures, significant bone loss beyond the apex, or very curved/dilacerated roots that cannot survive extraction."}, {"type": "ul", "items": ["What is the expected success rate and what factors influence it?"], "raw": "- What is the expected success rate and what factors influence it?"}, {"type": "p", "text": "Success rates for intentional replantation range from 77–95% with careful case selection. {{cite: Bender and Rossman — intentional replantation showed 81% success rate at follow-up}}. Factors that improve prognosis include: minimal extra-oral time, no root damage during extraction, good periodontal support preoperatively, adequate remaining tooth structure for restoration, and performance of a root-end resection and retrofit during the extra-oral phase. Factors that worsen prognosis include: PDL desiccation, root fracture during extraction, pre-existing severe bone loss, and prolonged extra-oral time.", "raw": "Success rates for intentional replantation range from 77–95% with careful case selection. {{cite: Bender and Rossman — intentional replantation showed 81% success rate at follow-up}}. Factors that improve prognosis include: minimal extra-oral time, no root damage during extraction, good periodontal support preoperatively, adequate remaining tooth structure for restoration, and performance of a root-end resection and retrofit during the extra-oral phase. Factors that worsen prognosis include: PDL desiccation, root fracture during extraction, pre-existing severe bone loss, and prolonged extra-oral time."}, {"type": "ul", "items": ["What is the optimal extra-oral time and storage medium?"], "raw": "- What is the optimal extra-oral time and storage medium?"}, {"type": "p", "text": "Extra-oral time should be minimized to less than 10 minutes to preserve PDL cell viability. The tooth should be kept moist throughout — either stored in the patient's saliva, saline, Hank's Balanced Salt Solution (HBSS), or milk during the root-end preparation. Desiccation of the PDL leads to ankylosis and replacement resorption, which are catastrophic long-term outcomes. {{cite: Kratchman — minimize extra-oral time and keep tooth moist to maximize PDL cell survival during intentional replantation}}. Root-end resection and retrofill with MTA or Biodentine should be performed during the extra-oral phase. Enamel matrix derivative (EMD) proteins applied to the root surface before replantation may promote PDL regeneration and improve outcomes {{cite: Wang — EMD application to root surface before replantation promotes periodontal regeneration}}.", "raw": "Extra-oral time should be minimized to less than 10 minutes to preserve PDL cell viability. The tooth should be kept moist throughout — either stored in the patient's saliva, saline, Hank's Balanced Salt Solution (HBSS), or milk during the root-end preparation. Desiccation of the PDL leads to ankylosis and replacement resorption, which are catastrophic long-term outcomes. {{cite: Kratchman — minimize extra-oral time and keep tooth moist to maximize PDL cell survival during intentional replantation}}. Root-end resection and retrofill with MTA or Biodentine should be performed during the extra-oral phase. Enamel matrix derivative (EMD) proteins applied to the root surface before replantation may promote PDL regeneration and improve outcomes {{cite: Wang — EMD application to root surface before replantation promotes periodontal regeneration}}."}, {"type": "ul", "items": ["What is the technique for intentional replantation?"], "raw": "- What is the technique for intentional replantation?"}, {"type": "p", "text": "Extract the tooth as atraumatically as possible using periotomes and gentle rotational forces, minimizing forcep contact with the root surface. Keep the tooth moist, perform root-end resection (2–3 mm), prepare a 3 mm deep root-end cavity, place MTA or Biodentine retrofill, replant, and verify position radiographically. Splinting is generally not necessary unless there is bone loss or the socket is compromised. Follow-up at 1 week, 1 month, 6 months, and 1 year with periapical radiographs.", "raw": "Extract the tooth as atraumatically as possible using periotomes and gentle rotational forces, minimizing forcep contact with the root surface. Keep the tooth moist, perform root-end resection (2–3 mm), prepare a 3 mm deep root-end cavity, place MTA or Biodentine retrofill, replant, and verify position radiographically. Splinting is generally not necessary unless there is bone loss or the socket is compromised. Follow-up at 1 week, 1 month, 6 months, and 1 year with periapical radiographs."}]}, {"id": "s2-treatment-planning-26-retreatment-vs-surgery-for-previously-treated-teeth", "number": "2.6", "title": "Retreatment vs. Surgery for Previously Treated Teeth", "level": 2, "blocks": [{"type": "ul", "items": ["What factors favor non-surgical retreatment over apical surgery?"], "raw": "- What factors favor non-surgical retreatment over apical surgery?"}, {"type": "p", "text": "Non-surgical retreatment is generally preferred as the first-line approach for previously treated teeth because it addresses the coronal cause of failure and allows re-disinfection of the entire root canal system. Factors favoring retreatment include: missed canals, inadequate length or taper of canal preparation, coronal leakage or re-contamination, insufficient obturation (voids, short fill), and a removable post or crown that needs replacement anyway. Retreatment is also preferable when the apical anatomy is accessible orthograde and no surgical contraindications exist. It is the less invasive option and maintains future surgical options if retreatment fails.", "raw": "Non-surgical retreatment is generally preferred as the first-line approach for previously treated teeth because it addresses the coronal cause of failure and allows re-disinfection of the entire root canal system. Factors favoring retreatment include: missed canals, inadequate length or taper of canal preparation, coronal leakage or re-contamination, insufficient obturation (voids, short fill), and a removable post or crown that needs replacement anyway. Retreatment is also preferable when the apical anatomy is accessible orthograde and no surgical contraindications exist. It is the less invasive option and maintains future surgical options if retreatment fails."}, {"type": "ul", "items": ["How does the presence of a post or crown influence the decision?"], "raw": "- How does the presence of a post or crown influence the decision?"}, {"type": "p", "text": "A serviceable post and intact crown that do not need replacement may favor surgical rather than retreatment, since removing the post risks root fracture, perforation, excessive dentin removal, and loss of restorative elements. As stated by Kim and Kratchman, surgery can be more conservative than post removal when the crown is adequate and the post is well-seated. Conversely, if the coronal restoration is inadequate or the post is easily retrievable, retreatment is preferred. The overall restorability of the tooth must also be reassessed before committing to retreatment or surgery.", "raw": "A serviceable post and intact crown that do not need replacement may favor surgical rather than retreatment, since removing the post risks root fracture, perforation, excessive dentin removal, and loss of restorative elements. As stated by Kim and Kratchman, surgery can be more conservative than post removal when the crown is adequate and the post is well-seated. Conversely, if the coronal restoration is inadequate or the post is easily retrievable, retreatment is preferred. The overall restorability of the tooth must also be reassessed before committing to retreatment or surgery."}, {"type": "ul", "items": ["What is the success rate differential between retreatment and surgery?"], "raw": "- What is the success rate differential between retreatment and surgery?"}, {"type": "p", "text": "{{cite: Torabinejad 2009 — surgery had a short-term success rate of 77.8% versus 70.9% for non-surgical retreatment at 2–4 years, but long-term outcomes converge}}. In the short term (2–4 years), surgical outcomes slightly exceed retreatment success rates; however, long-term studies (4–6 years) show convergence of success rates around 83% for both approaches. The higher short-term surgical success is attributed to the immediate removal of periapical pathology and placement of a root-end filling, while retreatment relies on biological healing over time.", "raw": "{{cite: Torabinejad 2009 — surgery had a short-term success rate of 77.8% versus 70.9% for non-surgical retreatment at 2–4 years, but long-term outcomes converge}}. In the short term (2–4 years), surgical outcomes slightly exceed retreatment success rates; however, long-term studies (4–6 years) show convergence of success rates around 83% for both approaches. The higher short-term surgical success is attributed to the immediate removal of periapical pathology and placement of a root-end filling, while retreatment relies on biological healing over time."}, {"type": "ul", "items": ["When is combined retreatment plus surgery indicated?"], "raw": "- When is combined retreatment plus surgery indicated?"}, {"type": "p", "text": "Combined retreatment followed by surgery is indicated when: (1) the coronal cause of failure (missed canal, inadequate obturation) can be addressed via retreatment AND there is additional apical pathology requiring surgical management (persistent periapical cyst, extensive root-end resorption, foreign body), (2) retreatment alone is unlikely to succeed due to apical anatomy (isthmuses, fins, lateral canals not accessible orthograde), or (3) a post must be removed AND the apex requires surgical exploration. The combined approach theoretically addresses both coronal and apical dimensions of failure simultaneously.", "raw": "Combined retreatment followed by surgery is indicated when: (1) the coronal cause of failure (missed canal, inadequate obturation) can be addressed via retreatment AND there is additional apical pathology requiring surgical management (persistent periapical cyst, extensive root-end resorption, foreign body), (2) retreatment alone is unlikely to succeed due to apical anatomy (isthmuses, fins, lateral canals not accessible orthograde), or (3) a post must be removed AND the apex requires surgical exploration. The combined approach theoretically addresses both coronal and apical dimensions of failure simultaneously."}]}, {"id": "s2-treatment-planning-27-timing-of-retreatment-after-initial-failure", "number": "2.7", "title": "Timing of Retreatment After Initial Failure", "level": 2, "blocks": [{"type": "ul", "items": ["How long should you wait to assess healing before considering retreatment?"], "raw": "- How long should you wait to assess healing before considering retreatment?"}, {"type": "p", "text": "The standard minimum follow-up period to assess healing is 1 year post-treatment, though lesions greater than 1 cm may require up to 4 years to demonstrate complete radiographic resolution. {{cite: Murphy — lesions greater than 1 cm require more than 1 year for complete radiographic healing}}. Orstavik's Periapical Index (PAI) is a useful standardized tool for tracking lesion size and density changes over serial follow-up visits. For small lesions (<5 mm) in asymptomatic teeth, re-evaluation at 1 year is typically sufficient to determine if retreatment is needed.", "raw": "The standard minimum follow-up period to assess healing is 1 year post-treatment, though lesions greater than 1 cm may require up to 4 years to demonstrate complete radiographic resolution. {{cite: Murphy — lesions greater than 1 cm require more than 1 year for complete radiographic healing}}. Orstavik's Periapical Index (PAI) is a useful standardized tool for tracking lesion size and density changes over serial follow-up visits. For small lesions (<5 mm) in asymptomatic teeth, re-evaluation at 1 year is typically sufficient to determine if retreatment is needed."}, {"type": "ul", "items": ["What distinguishes a healing lesion from persistent disease?"], "raw": "- What distinguishes a healing lesion from persistent disease?"}, {"type": "p", "text": "A healing lesion shows progressive reduction in periapical radiolucency size and increasing bone density at the periphery on serial radiographs. The PAI score should decrease over successive visits. Clinical signs also matter: absence of sinus tract, no swelling, no percussion sensitivity, and no increased mobility all support healing. A persistent or enlarging lesion on follow-up radiographs, especially with return of symptoms, indicates treatment failure. CBCT can be valuable for equivocal cases, as it detects cortical plate disruption and more accurately measures lesion volume than 2D radiographs. A lesion that has not decreased in size after 1–2 years of follow-up is considered non-healing.", "raw": "A healing lesion shows progressive reduction in periapical radiolucency size and increasing bone density at the periphery on serial radiographs. The PAI score should decrease over successive visits. Clinical signs also matter: absence of sinus tract, no swelling, no percussion sensitivity, and no increased mobility all support healing. A persistent or enlarging lesion on follow-up radiographs, especially with return of symptoms, indicates treatment failure. CBCT can be valuable for equivocal cases, as it detects cortical plate disruption and more accurately measures lesion volume than 2D radiographs. A lesion that has not decreased in size after 1–2 years of follow-up is considered non-healing."}, {"type": "ul", "items": ["When is intervention indicated for asymptomatic apical periodontitis?"], "raw": "- When is intervention indicated for asymptomatic apical periodontitis?"}, {"type": "p", "text": "Asymptomatic apical periodontitis (AAP) in a previously treated tooth does not always require immediate retreatment, particularly if the lesion is small and the tooth has been recently treated. However, intervention is indicated when: (1) the lesion fails to decrease in size after 1–2 years of observation, (2) the lesion is enlarging, (3) the patient develops symptoms, (4) the tooth will serve as an abutment and a periapical lesion presents a risk, or (5) the patient is about to undergo immunosuppressive therapy or head/neck radiation. Watchful waiting is appropriate only when the lesion is stable or slowly decreasing and the patient is asymptomatic and otherwise healthy.", "raw": "Asymptomatic apical periodontitis (AAP) in a previously treated tooth does not always require immediate retreatment, particularly if the lesion is small and the tooth has been recently treated. However, intervention is indicated when: (1) the lesion fails to decrease in size after 1–2 years of observation, (2) the lesion is enlarging, (3) the patient develops symptoms, (4) the tooth will serve as an abutment and a periapical lesion presents a risk, or (5) the patient is about to undergo immunosuppressive therapy or head/neck radiation. Watchful waiting is appropriate only when the lesion is stable or slowly decreasing and the patient is asymptomatic and otherwise healthy."}]}]}, {"id": "s3-anesthesia-and-pain-control", "number": "3", "title": "Anesthesia and Pain Control", "level": 1, "blocks": [], "subsections": [{"id": "s3-anesthesia-and-pain-control-31-anesthetic-selection-and-technique-by-toothdiagnosis", "number": "3.1", "title": "Anesthetic Selection and Technique by Tooth/Diagnosis", "level": 2, "blocks": [{"type": "ul", "items": ["What anesthetic techniques are indicated for maxillary vs. mandibular teeth?"], "raw": "- What anesthetic techniques are indicated for maxillary vs. mandibular teeth?"}, {"type": "p", "text": "For mandibular teeth, two cartridges (3.6 mL) are indicated for the IAN block, as Fowler and Reader showed this volume is more effective than 1.8 mL. For maxillary first molars, buccal infiltrations and PSA blocks show equivalent effectiveness {{cite: Aggarwal 2011}}. Aggarwal also showed that adding palatal anesthesia does not increase the success rate but does prolong the duration of anesthesia.", "raw": "For mandibular teeth, two cartridges (3.6 mL) are indicated for the IAN block, as Fowler and Reader showed this volume is more effective than 1.8 mL. For maxillary first molars, buccal infiltrations and PSA blocks show equivalent effectiveness {{cite: Aggarwal 2011}}. Aggarwal also showed that adding palatal anesthesia does not increase the success rate but does prolong the duration of anesthesia."}, {"type": "ul", "items": ["When is articaine preferred over lidocaine?"], "raw": "- When is articaine preferred over lidocaine?"}, {"type": "p", "text": "Dressman found that 4% articaine infiltration provided successful pulpal anesthesia in the premolar region 80-87% of the time and 92-94% successful with additional anesthesia.", "raw": "Dressman found that 4% articaine infiltration provided successful pulpal anesthesia in the premolar region 80-87% of the time and 92-94% successful with additional anesthesia."}, {"type": "p", "text": "Kung showed no difference between articaine and lidocaine with maxillary SIP cases. Articaine is preferred for supplemental buccal infiltration. ==Garisto et al., 2010 (and Gaffen separately) found that 4% articaine was associated with 3.6x more paresthesia reports than expected based on its market share — a retrospective FDA adverse event analysis, not a head-to-head comparison to lidocaine. Prilocaine showed an even higher signal (7.3x). Clinicians should note that this represents a pharmacovigilance signal, not a controlled clinical trial result.==", "raw": "Kung showed no difference between articaine and lidocaine with maxillary SIP cases. Articaine is preferred for supplemental buccal infiltration. ==Garisto et al., 2010 (and Gaffen separately) found that 4% articaine was associated with 3.6x more paresthesia reports than expected based on its market share — a retrospective FDA adverse event analysis, not a head-to-head comparison to lidocaine. Prilocaine showed an even higher signal (7.3x). Clinicians should note that this represents a pharmacovigilance signal, not a controlled clinical trial result.=="}, {"type": "ul", "items": ["What is the evidence for buccal infiltration of articaine in mandibular molars?"], "raw": "- What is the evidence for buccal infiltration of articaine in mandibular molars?"}, {"type": "p", "text": "{{cite: Kanaa 2012}} compared supplemental techniques and found additional buccal articaine infiltrations provided 84% success, IO 68%, PDL 48%, and repeated IAN 32%. This supports routine use of buccal articaine infiltration at the apices of mandibular molars. According to Rogers, articaine is more effective than lidocaine when used as a supplemental buccal infiltration.", "raw": "{{cite: Kanaa 2012}} compared supplemental techniques and found additional buccal articaine infiltrations provided 84% success, IO 68%, PDL 48%, and repeated IAN 32%. This supports routine use of buccal articaine infiltration at the apices of mandibular molars. According to Rogers, articaine is more effective than lidocaine when used as a supplemental buccal infiltration."}, {"type": "ul", "items": ["What is the maximum epinephrine dose for cardiac patients?"], "raw": "- What is the maximum epinephrine dose for cardiac patients?"}, {"type": "p", "text": "The maximum epinephrine dose is 0.04 mg for cardiac patients and 0.2 mg for non-cardiac patients.", "raw": "The maximum epinephrine dose is 0.04 mg for cardiac patients and 0.2 mg for non-cardiac patients."}, {"type": "ul", "items": ["Does injection speed matter for success?"], "raw": "- Does injection speed matter for success?"}, {"type": "p", "text": "No (Kanaa, 2006 and Aggarwal 2012)", "raw": "No (Kanaa, 2006 and Aggarwal 2012)"}, {"type": "ul", "items": ["Does buffering anesthetic solution improve outcomes?"], "raw": "- Does buffering anesthetic solution improve outcomes?"}, {"type": "p", "text": "No — multiple studies show no reduction in injection pain, onset time, or anesthetic success with buffered solutions.", "raw": "No — multiple studies show no reduction in injection pain, onset time, or anesthetic success with buffered solutions."}, {"type": "ul", "items": ["What can we do post-op to decrease pain?"], "raw": "- What can we do post-op to decrease pain?"}, {"type": "p", "text": "A long-acting bupivacaine injection at the end of the procedure reduces post-operative pain — this has been shown for third molar extraction (Gordon). Liposomal bupivacaine formulations have not demonstrated superiority over standard bupivacaine (Glenn et al.).", "raw": "A long-acting bupivacaine injection at the end of the procedure reduces post-operative pain — this has been shown for third molar extraction (Gordon). Liposomal bupivacaine formulations have not demonstrated superiority over standard bupivacaine (Glenn et al.)."}]}, {"id": "s3-anesthesia-and-pain-control-32-supplemental-anesthesia-decision-tree", "number": "3.2", "title": "Supplemental Anesthesia Decision Tree", "level": 2, "blocks": [{"type": "ul", "items": ["When is intraosseous anesthesia indicated and what are the contraindications?"], "raw": "- When is intraosseous anesthesia indicated and what are the contraindications?"}, {"type": "p", "text": "Intraosseous anesthesia is indicated as a supplemental technique when conventional infiltration and block anesthesia fail to achieve profound pulpal anesthesia. Walton reported a 92% success rate. It is contraindicated in immunocompromised patients due to increased infection risk and in patients with bleeding disorders.", "raw": "Intraosseous anesthesia is indicated as a supplemental technique when conventional infiltration and block anesthesia fail to achieve profound pulpal anesthesia. Walton reported a 92% success rate. It is contraindicated in immunocompromised patients due to increased infection risk and in patients with bleeding disorders."}, {"type": "ul", "items": ["What are the indications and limitations of intrapulpal anesthesia?"], "raw": "- What are the indications and limitations of intrapulpal anesthesia?"}, {"type": "p", "text": "Intrapulpal anesthesia is useful as a last resort when other methods have failed. It has a 93% success rate and effectiveness is due to pressure - effective regardless of whether saline or anesthetic is used (VanGheluwe and Walton).", "raw": "Intrapulpal anesthesia is useful as a last resort when other methods have failed. It has a 93% success rate and effectiveness is due to pressure - effective regardless of whether saline or anesthetic is used (VanGheluwe and Walton)."}]}, {"id": "s3-anesthesia-and-pain-control-33-managing-the-hot-tooth", "number": "3.3", "title": "Managing the \"Hot\" Tooth", "level": 2, "blocks": [{"type": "ul", "items": ["Why do teeth with irreversible pulpitis have higher anesthetic failure rates?"], "raw": "- Why do teeth with irreversible pulpitis have higher anesthetic failure rates?"}, {"type": "p", "text": "Hargreaves identified several mechanisms: the inflamed pulp's acidic local pH impairs local anesthetic uptake, upregulation of tetrodotoxin-resistant Na⁺ channels reduces anesthetic effectiveness, the resting membrane potential is altered, the nociceptor excitability threshold is lowered, and patient anxiety amplifies pain perception.", "raw": "Hargreaves identified several mechanisms: the inflamed pulp's acidic local pH impairs local anesthetic uptake, upregulation of tetrodotoxin-resistant Na⁺ channels reduces anesthetic effectiveness, the resting membrane potential is altered, the nociceptor excitability threshold is lowered, and patient anxiety amplifies pain perception."}, {"type": "ul", "items": ["What preoperative medications improve anesthetic success?"], "raw": "- What preoperative medications improve anesthetic success?"}, {"type": "p", "text": "NSAIDs improve IANB success in symptomatic irreversible pulpitis: 400–800 mg ibuprofen taken 45–60 min before the block nearly doubles the success rate (Nagendrababu; Parirokh). However, the single most effective premedication is oral dexamethasone. {{cite: Pulikkotil 2018 — network meta-analysis of 19 RCTs (n=1654) ranked dexamethasone as the most effective oral premedication for IANB success in irreversible pulpitis (RR 2.92 vs placebo, SUCRA 0.96), beating NSAIDs and tramadol; 0.5 mg dose was studied for this outcome}}. {{cite: Hegde 2023 — in a double-blind RCT of 184 patients with SIP, IANB success rates were 60.9% with dexamethasone, 65.2% with ketorolac, 56.5% with prednisolone, vs just 21.7% with placebo}}. {{cite: Kumar 2021 — combination of 0.5 mg dexamethasone + 800 mg ibuprofen was significantly superior to either drug alone for IANB success in SIP mandibular molars}}. Mechanism: corticosteroids reduce PGE2 and inflammatory mediators at the pulp, decreasing nociceptor sensitization and TTX-resistant Na⁺ channel upregulation.", "raw": "NSAIDs improve IANB success in symptomatic irreversible pulpitis: 400–800 mg ibuprofen taken 45–60 min before the block nearly doubles the success rate (Nagendrababu; Parirokh). However, the single most effective premedication is oral dexamethasone. {{cite: Pulikkotil 2018 — network meta-analysis of 19 RCTs (n=1654) ranked dexamethasone as the most effective oral premedication for IANB success in irreversible pulpitis (RR 2.92 vs placebo, SUCRA 0.96), beating NSAIDs and tramadol; 0.5 mg dose was studied for this outcome}}. {{cite: Hegde 2023 — in a double-blind RCT of 184 patients with SIP, IANB success rates were 60.9% with dexamethasone, 65.2% with ketorolac, 56.5% with prednisolone, vs just 21.7% with placebo}}. {{cite: Kumar 2021 — combination of 0.5 mg dexamethasone + 800 mg ibuprofen was significantly superior to either drug alone for IANB success in SIP mandibular molars}}. Mechanism: corticosteroids reduce PGE2 and inflammatory mediators at the pulp, decreasing nociceptor sensitization and TTX-resistant Na⁺ channel upregulation."}, {"type": "ul", "items": ["What dose of dexamethasone should be used, and what outcome does each dose target?"], "raw": "- What dose of dexamethasone should be used, and what outcome does each dose target?"}, {"type": "p", "text": "Two dose ranges appear in the endodontic literature, studied for two related but distinct outcomes:", "raw": "Two dose ranges appear in the endodontic literature, studied for two related but distinct outcomes:"}, {"type": "ol", "items": ["**0.5 mg PO** — studied specifically for improving IANB *anesthetic success* in symptomatic irreversible pulpitis. This is the dose ranked in the Pulikkotil 2018 network meta-analysis."], "raw": "1. **0.5 mg PO** — studied specifically for improving IANB *anesthetic success* in symptomatic irreversible pulpitis. This is the dose ranked in the Pulikkotil 2018 network meta-analysis."}, {"type": "ol", "items": ["**4–8 mg PO, IM, or submucosal** — studied for reducing *postoperative endodontic pain*. {{cite: Suresh 2020 — 4 mg oral dexamethasone 60 min before single-visit RCT reduced postop pain incidence and severity at 6, 12, 24 h; odds of postop pain at 24 h were 5.3× lower vs placebo — the largest effect of any drug in the trial}}. {{cite: Pochapski 2009 — 4 mg oral dexamethasone significantly reduced postendodontic pain at 4 and 12 h and decreased rescue medication use}}. {{cite: Konagala 2019 — 4 mg dexamethasone equivalent to piroxicam 20 mg and deflazacort 30 mg for postendo pain control at 6, 12, 24 h}}. {{cite: Jorge-Araújo 2018 — 8 mg oral dexamethasone reduced post-endodontic pain intensity and rescue medication use vs placebo; equivalent to 400 mg ibuprofen}}. {{cite: Aksoy 2019 — 8 mg submucosal dexamethasone injected adjacent to SIP mandibular molars significantly reduced postop pain at 6, 12, 48 h and beat submucosal tramadol in the first 12 h}}. {{cite: Mehrvarzfar 2008 — 8 mg supraperiosteal dexamethasone injection around tooth with irreversible pulpitis effectively controlled postop pain for first 24 h}}."], "raw": "2. **4–8 mg PO, IM, or submucosal** — studied for reducing *postoperative endodontic pain*. {{cite: Suresh 2020 — 4 mg oral dexamethasone 60 min before single-visit RCT reduced postop pain incidence and severity at 6, 12, 24 h; odds of postop pain at 24 h were 5.3× lower vs placebo — the largest effect of any drug in the trial}}. {{cite: Pochapski 2009 — 4 mg oral dexamethasone significantly reduced postendodontic pain at 4 and 12 h and decreased rescue medication use}}. {{cite: Konagala 2019 — 4 mg dexamethasone equivalent to piroxicam 20 mg and deflazacort 30 mg for postendo pain control at 6, 12, 24 h}}. {{cite: Jorge-Araújo 2018 — 8 mg oral dexamethasone reduced post-endodontic pain intensity and rescue medication use vs placebo; equivalent to 400 mg ibuprofen}}. {{cite: Aksoy 2019 — 8 mg submucosal dexamethasone injected adjacent to SIP mandibular molars significantly reduced postop pain at 6, 12, 48 h and beat submucosal tramadol in the first 12 h}}. {{cite: Mehrvarzfar 2008 — 8 mg supraperiosteal dexamethasone injection around tooth with irreversible pulpitis effectively controlled postop pain for first 24 h}}."}, {"type": "p", "text": "Clinically, 4–8 mg is a reasonable dose when the primary goal is to prevent postoperative flare-up or pain — especially in hot teeth where pre-op pain is severe. Because both anesthetic success and postop pain reduction share the same anti-inflammatory mechanism (blocking PGE2 and inflammatory-mediator sensitization of nociceptors), a 4 mg dose likely improves IANB success at least as well as 0.5 mg, though head-to-head dose comparisons for the anesthetic-success endpoint are lacking. Practical protocol: 4 mg oral dexamethasone + 600–800 mg ibuprofen, 45–60 min preoperatively, for hot teeth with anticipated difficult anesthesia and high postop flare-up risk.", "raw": "Clinically, 4–8 mg is a reasonable dose when the primary goal is to prevent postoperative flare-up or pain — especially in hot teeth where pre-op pain is severe. Because both anesthetic success and postop pain reduction share the same anti-inflammatory mechanism (blocking PGE2 and inflammatory-mediator sensitization of nociceptors), a 4 mg dose likely improves IANB success at least as well as 0.5 mg, though head-to-head dose comparisons for the anesthetic-success endpoint are lacking. Practical protocol: 4 mg oral dexamethasone + 600–800 mg ibuprofen, 45–60 min preoperatively, for hot teeth with anticipated difficult anesthesia and high postop flare-up risk."}, {"type": "ul", "items": ["What combination techniques provide highest success rates for hot mandibular molars?"], "raw": "- What combination techniques provide highest success rates for hot mandibular molars?"}, {"type": "p", "text": "According to Walton, 92% success with IAN + IO.", "raw": "According to Walton, 92% success with IAN + IO."}]}, {"id": "s3-anesthesia-and-pain-control-34-sedation-and-anxiolysis", "number": "3.4", "title": "Sedation and Anxiolysis", "level": 2, "blocks": [{"type": "ul", "items": ["What anxiolytic agents are appropriate for dental treatment?"], "raw": "- What anxiolytic agents are appropriate for dental treatment?"}, {"type": "p", "text": "Triazolam is considered the safest and most effective oral anxiolytic for dental treatment (Kaufman).", "raw": "Triazolam is considered the safest and most effective oral anxiolytic for dental treatment (Kaufman)."}, {"type": "ul", "items": ["What are the indications and contraindications for oral sedation in endodontics?"], "raw": "- What are the indications and contraindications for oral sedation in endodontics?"}, {"type": "p", "text": "**Indications:** dental anxiety, severe gag reflex, history of dental trauma, mild-to-moderate psychiatric conditions (with medical clearance), and extended procedures.", "raw": "**Indications:** dental anxiety, severe gag reflex, history of dental trauma, mild-to-moderate psychiatric conditions (with medical clearance), and extended procedures."}, {"type": "p", "text": "**Contraindications:** pregnancy, benzodiazepine allergy, acute narrow-angle glaucoma, severe respiratory disease, CNS depression, myasthenia gravis, and patients unable to provide informed consent.", "raw": "**Contraindications:** pregnancy, benzodiazepine allergy, acute narrow-angle glaucoma, severe respiratory disease, CNS depression, myasthenia gravis, and patients unable to provide informed consent."}]}]}, {"id": "s4-access-and-coronal-disassembly", "number": "4", "title": "Access and Coronal Disassembly", "level": 1, "blocks": [], "subsections": [{"id": "s4-access-and-coronal-disassembly-41-access-design-philosophy", "number": "4.1", "title": "Access Design Philosophy", "level": 2, "blocks": [{"type": "ul", "items": ["How should one access a tooth?"], "raw": "- How should one access a tooth?"}, {"type": "p", "text": "Access design should follow the seven Laws of Krasner and Rankow, which describe the predictable spatial relationships between canal orifices, the pulp chamber, and the external tooth surface. Applying these laws prevents over-access (floor perforation) and under-access (missed canals) {{cite: Krasner and Rankow 2004 — seven laws describe the predictable spatial relationship of canal orifices to the CEJ, external tooth surface, and pulp chamber floor}}:", "raw": "Access design should follow the seven Laws of Krasner and Rankow, which describe the predictable spatial relationships between canal orifices, the pulp chamber, and the external tooth surface. Applying these laws prevents over-access (floor perforation) and under-access (missed canals) {{cite: Krasner and Rankow 2004 — seven laws describe the predictable spatial relationship of canal orifices to the CEJ, external tooth surface, and pulp chamber floor}}:"}, {"type": "ol", "items": ["**Law of Centrality:** The floor of the pulp chamber is always located in the center of the tooth at the level of the CEJ.", "**Law of Concentricity:** The walls of the pulp chamber are always concentric with the external surface of the tooth at the level of the CEJ — the external surface of the tooth guides the expected position of the pulp chamber.", "**Law of the CEJ:** The CEJ is the most consistent, repeatable landmark for locating the position and size of the pulp chamber; it guides initial bur depth and direction.", "**Law of Symmetry 1 (Orifice Position):** Except for the maxillary molars, canal orifices are equidistant from a line drawn mesiodistally through the floor of the pulp chamber.", "**Law of Symmetry 2 (Orifice Location):** Except for the maxillary molars, canal orifices lie on a line drawn buccolingually through the floor of the pulp chamber.", "**Law of Color Change:** The floor of the pulp chamber is always darker than the walls — this color differential, visible under magnification, helps identify the true floor and distinguish it from walls when visibility is limited.", "**Law of Orifice Location:** Canal orifices are always located at the junction of the floor and the walls, appearing as dark spots or depressions at the base of each developmental groove."], "raw": "1. **Law of Centrality:** The floor of the pulp chamber is always located in the center of the tooth at the level of the CEJ.\n2. **Law of Concentricity:** The walls of the pulp chamber are always concentric with the external surface of the tooth at the level of the CEJ — the external surface of the tooth guides the expected position of the pulp chamber.\n3. **Law of the CEJ:** The CEJ is the most consistent, repeatable landmark for locating the position and size of the pulp chamber; it guides initial bur depth and direction.\n4. **Law of Symmetry 1 (Orifice Position):** Except for the maxillary molars, canal orifices are equidistant from a line drawn mesiodistally through the floor of the pulp chamber.\n5. **Law of Symmetry 2 (Orifice Location):** Except for the maxillary molars, canal orifices lie on a line drawn buccolingually through the floor of the pulp chamber.\n6. **Law of Color Change:** The floor of the pulp chamber is always darker than the walls — this color differential, visible under magnification, helps identify the true floor and distinguish it from walls when visibility is limited.\n7. **Law of Orifice Location:** Canal orifices are always located at the junction of the floor and the walls, appearing as dark spots or depressions at the base of each developmental groove."}, {"type": "p", "text": "Under magnification, staining the pulp floor with methylene blue accentuates the color differential in Law 6 and reveals the grooves in Law 7. Troughing along developmental grooves with a DG-16 explorer or ultrasonic tip confirms orifice locations. A \"champagne bubble\" sign — effervescence when NaOCl floods a troughed groove — suggests organic tissue in a patent but calcified canal.", "raw": "Under magnification, staining the pulp floor with methylene blue accentuates the color differential in Law 6 and reveals the grooves in Law 7. Troughing along developmental grooves with a DG-16 explorer or ultrasonic tip confirms orifice locations. A \"champagne bubble\" sign — effervescence when NaOCl floods a troughed groove — suggests organic tissue in a patent but calcified canal."}, {"type": "ul", "items": ["How does access design affect fracture resistance?"], "raw": "- How does access design affect fracture resistance?"}, {"type": "p", "text": "Minimally. Most in vitro studies show no significant difference in fracture resistance between traditional and ultraconservative access designs {{cite: Silva 2020}}. Moreover, the access cavity itself reduces overall tooth stiffness by only about 5% — most of the structural loss comes from the original caries or existing restoration, not the endodontic access (Reeh et al.).", "raw": "Minimally. Most in vitro studies show no significant difference in fracture resistance between traditional and ultraconservative access designs {{cite: Silva 2020}}. Moreover, the access cavity itself reduces overall tooth stiffness by only about 5% — most of the structural loss comes from the original caries or existing restoration, not the endodontic access (Reeh et al.)."}]}, {"id": "s4-access-and-coronal-disassembly-42-magnification-and-rubber-dam-utilization", "number": "4.2", "title": "Magnification and Rubber Dam Utilization", "level": 2, "blocks": [{"type": "ul", "items": ["What is the justification for using microscopes in treatment?"], "raw": "- What is the justification for using microscopes in treatment?"}, {"type": "p", "text": "The dental operating microscope is a standard component of modern endodontic practice, improving visualization, precision, and outcomes across nearly every step of treatment (AAE 2012 Position Statement).", "raw": "The dental operating microscope is a standard component of modern endodontic practice, improving visualization, precision, and outcomes across nearly every step of treatment (AAE 2012 Position Statement)."}, {"type": "ul", "items": ["How does isolation affect treatment outcomes and safety?"], "raw": "- How does isolation affect treatment outcomes and safety?"}, {"type": "p", "text": "The rubber dam is the standard of care for endodontic treatment {{cite: AAE 2017}}. Lin's research suggests that rubber dam use is associated with increased tooth survival. The rubber dam also protects patient safety by preventing aspiration or ingestion of instruments, irrigants, and debris.", "raw": "The rubber dam is the standard of care for endodontic treatment {{cite: AAE 2017}}. Lin's research suggests that rubber dam use is associated with increased tooth survival. The rubber dam also protects patient safety by preventing aspiration or ingestion of instruments, irrigants, and debris."}]}, {"id": "s4-access-and-coronal-disassembly-43-post-and-core-removal", "number": "4.3", "title": "Post and Core Removal", "level": 2, "blocks": [{"type": "ul", "items": ["What techniques are available for post removal and when is each indicated?"], "raw": "- What techniques are available for post removal and when is each indicated?"}, {"type": "p", "text": "Available techniques include traction (Gonon, Ruddle post pullers), ultrasonic vibration to fatigue the cement interface, trephine burs to core around the post, and direct post drilling. Ultrasonics are typically the first-line approach for cast and cemented metal posts; trephines are reserved for posts that cannot be loosened by ultrasonics.", "raw": "Available techniques include traction (Gonon, Ruddle post pullers), ultrasonic vibration to fatigue the cement interface, trephine burs to core around the post, and direct post drilling. Ultrasonics are typically the first-line approach for cast and cemented metal posts; trephines are reserved for posts that cannot be loosened by ultrasonics."}, {"type": "ul", "items": ["What are the risks of post removal and how can they be minimized?"], "raw": "- What are the risks of post removal and how can they be minimized?"}, {"type": "p", "text": "The principal risks are root fracture, perforation, excessive dentin removal, and heat injury to the PDL and surrounding bone. These are minimized with pre-operative CBCT planning, magnification, conservative troughing, copious water coolant, and working in short bursts to prevent heat buildup.", "raw": "The principal risks are root fracture, perforation, excessive dentin removal, and heat injury to the PDL and surrounding bone. These are minimized with pre-operative CBCT planning, magnification, conservative troughing, copious water coolant, and working in short bursts to prevent heat buildup."}, {"type": "ul", "items": ["When should you consider bypassing a post vs. removing it?"], "raw": "- When should you consider bypassing a post vs. removing it?"}, {"type": "p", "text": "Ideally the post is removed in all cases. If removing the post would risk excessive dentin removal or sacrifice critical restorative elements like abutments for long span bridges, then surgery should be considered instead {{cite: Ruddle 2004}}", "raw": "Ideally the post is removed in all cases. If removing the post would risk excessive dentin removal or sacrifice critical restorative elements like abutments for long span bridges, then surgery should be considered instead {{cite: Ruddle 2004}}"}, {"type": "ul", "items": ["What is the maximum safe temperature increase for root surfaces during post removal?"], "raw": "- What is the maximum safe temperature increase for root surfaces during post removal?"}, {"type": "p", "text": "The maximum safe temperature increase for root surfaces is 10°C (Eriksson and Albrektsson).", "raw": "The maximum safe temperature increase for root surfaces is 10°C (Eriksson and Albrektsson)."}]}, {"id": "s4-access-and-coronal-disassembly-44-managing-calcified-canals", "number": "4.4", "title": "Managing Calcified Canals", "level": 2, "blocks": [{"type": "ul", "items": ["What techniques improve success in locating calcified canals?"], "raw": "- What techniques improve success in locating calcified canals?"}, {"type": "p", "text": "Useful techniques include troughing with a long-shank round bur or ultrasonic tip under magnification, observing for \"champagne bubbles\" after flooding the chamber with NaOCl, and staining the pulp floor with methylene blue or other dye to highlight developmental grooves.", "raw": "Useful techniques include troughing with a long-shank round bur or ultrasonic tip under magnification, observing for \"champagne bubbles\" after flooding the chamber with NaOCl, and staining the pulp floor with methylene blue or other dye to highlight developmental grooves."}, {"type": "ul", "items": ["What is the role of CBCT in calcified canal management?"], "raw": "- What is the role of CBCT in calcified canal management?"}, {"type": "p", "text": "CBCT provides information about the location, path, and remaining patency of the calcified canal, and helps the operator stay oriented relative to the original canal anatomy during troughing.", "raw": "CBCT provides information about the location, path, and remaining patency of the calcified canal, and helps the operator stay oriented relative to the original canal anatomy during troughing."}, {"type": "ul", "items": ["When should you stop searching for a calcified canal?"], "raw": "- When should you stop searching for a calcified canal?"}, {"type": "p", "text": "Searching should stop when further dentin removal would risk perforation or compromise the structural integrity of the root.", "raw": "Searching should stop when further dentin removal would risk perforation or compromise the structural integrity of the root."}, {"type": "ul", "items": ["What is the prognosis for teeth with calcified canals?"], "raw": "- What is the prognosis for teeth with calcified canals?"}, {"type": "p", "text": "Once successfully negotiated, the prognosis for teeth with calcified canals is comparable to that of non-calcified canals.", "raw": "Once successfully negotiated, the prognosis for teeth with calcified canals is comparable to that of non-calcified canals."}]}]}, {"id": "s5-instrumentation", "number": "5", "title": "Instrumentation", "level": 1, "blocks": [], "subsections": [{"id": "s5-instrumentation-51-working-length-determination-method", "number": "5.1", "title": "Working Length Determination Method", "level": 2, "blocks": [{"type": "ul", "items": ["What is the accuracy of electronic apex locators vs. radiographic methods?"], "raw": "- What is the accuracy of electronic apex locators vs. radiographic methods?"}, {"type": "p", "text": "EALs are more reliable than radiographs because 92.4% of major foramina exit short of the anatomical apex {{cite: Burch and Hulen 1972 — 9
