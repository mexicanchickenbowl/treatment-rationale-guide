              <h2 className="flex items-center gap-3 text-xl font-bold text-slate-900 mb-6 not-prose tracking-tight">
                {sec.number && <span className="text-xs font-bold text-indigo-600 bg-indigo-50 border border-indigo-100 px-2 py-0.5 rounded tabular-nums shrink-0">{sec.number}</span>}
                <span>{highlight(sec.title, query)}</span>
              </h2>
              <BlocksWithNotes blocks={sec.blocks || []} sectionId={sec.id} subsectionId={null} query={query} />
              {(sec.subsections || []).map(sub => (
                <section key={sub.id} data-anchor={sub.id} id={sub.id} className="mt-10 pt-6 border-t border-slate-100">
                  <h3 className="flex items-baseline gap-2 mb-4 not-prose">
                    {sub.number && <span className="text-xs text-indigo-400 tabular-nums font-semibold shrink-0 w-8">{sub.number}</span>}
                    <span className="text-[15px] font-semibold text-slate-800 tracking-tight leading-snug">{highlight(sub.title, query)}</span>
                  </h3>
                  <BlocksWithNotes blocks={sub.blocks || []} sectionId={sec.id} subsectionId={sub.id} query={query} />
                </section>
              ))}
            </section>
          ))}
          <div className="h-32" />
        </div>
        <AnnotationToolbar mainRef={mainRef} />
      </main>
    </div>
    </QuizCtx.Provider>
  );
}

// --- study pane helpers -----------------------------------------------------
function levenshtein(a, b) {
  const dp = Array.from({ length: b.length + 1 }, (_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    let prev = i;
    for (let j = 1; j <= b.length; j++) {
      const val = a[i-1] === b[j-1] ? dp[j-1] : Math.min(dp[j-1], dp[j], prev) + 1;
      dp[j-1] = prev; prev = val;
    }
    dp[b.length] = prev;
  }
  return dp[b.length];
}
function authorMatch(typed, correct) {
  const norm = s => s.toLowerCase().replace(/[^a-z]/g, " ").trim().replace(/\s+/g, " ");
  const t = norm(typed), c = norm(correct);
  if (!t) return false;
  if (c.includes(t) || t.includes(c)) return true;         // substring match
  const first = c.split(" ")[0];                           // first surname only
  if (t === first) return true;
  return levenshtein(t, first) <= 2;                       // typo tolerance ≤2
}

// --- abstract panel (PubMed) ------------------------------------------------
function normalizeAuthorForSearch(author) {
  return author
    .replace(/\s+et\s+al\.?/gi, "")
    .replace(/\s+(and|&)\s+.*/i, "")
    .trim();
}

const ABSTRACT_CACHE_KEY = "endo-guide.abstracts.v1";
function loadAbstractCache() { try { return JSON.parse(localStorage.getItem(ABSTRACT_CACHE_KEY) || "{}"); } catch { return {}; } }
function saveAbstractCache(c) { try { localStorage.setItem(ABSTRACT_CACHE_KEY, JSON.stringify(c)); } catch {} }

function useAbstract(author, year) {
  const [state, setState] = useState(() => {
    // 1. Check pre-built abstracts embedded at build time
    const key = `${author}|${year}`;
    const prebuilt = DATA?.abstracts?.[key];
    if (prebuilt?.status === "ok" && prebuilt.abstract) {
      return { status: "done", pmid: prebuilt.pmid, title: prebuilt.title, abstract: prebuilt.abstract };
    }
    if (prebuilt?.status === "not_found") {
      return { status: "notfound" };
    }
    // 2. Fall back to localStorage cache from previous runtime fetches
    if (author && year) {
      const cacheKey = `${normalizeAuthorForSearch(author).toLowerCase()}|${year}`;
      const cached = loadAbstractCache()[cacheKey];
      if (cached) return { status: "done", ...cached };
    }
    return { status: "idle" };
  });
  return state;
}

const ABSTRACT_STOP = new Set(["that","with","from","this","than","have","been","more","also","when","after","before","which","their","there","these","those","using","used","were","could","should","would","about","both","into","each","they","some","then","them","will","such","only","very","most","much","many","over","under","during","following","within","without","between","among","significantly","significant","patients","results","study","studies","treatment","clinical","associated","compared","showed","found","reported","observed"]);

function highlightInAbstract(abstract, finding) {
  if (!abstract) return abstract;
  const words = [...new Set((finding || "").toLowerCase().match(/\b[a-z]{5,}\b/g)?.filter(w => !ABSTRACT_STOP.has(w)) || [])];
  if (!words.length) return abstract;
  const re = new RegExp(`\\b(${words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|")})`, "gi");
  const out = [];
  let last = 0, m;
  re.lastIndex = 0;
  while ((m = re.exec(abstract))) {
    if (m.index > last) out.push(abstract.slice(last, m.index));
    out.push(<mark key={m.index} style={{ background: "#bfdbfe", borderRadius: "2px", padding: "0 1px" }}>{m[0]}</mark>);
    last = m.index + m[0].length;
  }
  out.push(abstract.slice(last));
  return out;
}

function AbstractPanel({ author, year, finding }) {
  const { status, title, abstract, pmid } = useAbstract(author, year);
  if (status === "idle") return null;
  return (
    <div className="mt-3 rounded-xl border overflow-hidden text-sm">
      {status === "loading" && (
        <div className="px-4 py-3 bg-slate-50 text-slate-400 italic animate-pulse">Fetching abstract from PubMed…</div>
      )}
      {(status === "notfound" || status === "error") && (
        <div className="px-4 py-3 bg-slate-50 text-slate-500 text-[13px] flex items-center gap-2">
          <span className="italic">Abstract not indexed in PubMed.</span>
          <a href={`https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(author + " " + year)}`}
             target="_blank" rel="noopener noreferrer"
             className="text-indigo-600 hover:underline whitespace-nowrap not-italic">Search PubMed ↗</a>
        </div>
      )}
      {status === "done" && (
        <div className="bg-blue-50 border-blue-200">
          <div className="px-4 pt-3 pb-1 flex items-start justify-between gap-3">
            <span className="font-semibold text-slate-800 leading-snug text-[13px]">{title}</span>
            <a href={`https://pubmed.ncbi.nlm.nih.gov/${pmid}`} target="_blank" rel="noopener noreferrer"
               className="shrink-0 text-xs text-indigo-600 hover:underline mt-0.5 whitespace-nowrap">PubMed ↗</a>
          </div>
          <p className="px-4 pb-4 pt-2 text-slate-700 leading-relaxed text-[13px]">
            {abstract ? highlightInAbstract(abstract, finding) : <span className="italic text-slate-400">No abstract available.</span>}
          </p>
        </div>
      )}
    </div>
  );
}

function MatchPane() {
  const initialize = () => {
    const shuffled = [...BOARD_PAIRS].sort(() => Math.random() - 0.5);
    const seen = new Set();
    const unique = [];
    for (const p of shuffled) {
      if (!seen.has(p.author)) { seen.add(p.author); unique.push(p); }
      if (unique.length >= 10) break;
    }
    const findings = [...unique].sort(() => Math.random() - 0.5).map(p => p.finding);
    const authors = [...unique].sort(() => Math.random() - 0.5).map(p => p.author);
    return { pairs: unique, findingsOrder: findings, authorsOrder: authors, matches: {}, locked: [], dragging: null, wrongFlash: {}, done: false };
  };

  const [state, setState] = useState(initialize);
  const { pairs, findingsOrder, authorsOrder, matches, locked, dragging, wrongFlash, done } = state;
  const lockedSet = new Set(locked);

  // Ref to track drag state without triggering re-renders on every move
  const dragRef = useRef({ active: false, startX: 0, startY: 0, moved: false });
  // Tap-to-select state: tap a finding to select it, then tap an author to place it
  const [selected, setSelected] = useState(null);
  // True on phones/tablets — disables drag entirely to avoid scroll conflicts
  const isTouch = useMemo(() => typeof window !== 'undefined' && window.matchMedia('(pointer: coarse)').matches, []);

  const reset = () => { setState(initialize()); setSelected(null); };

  const truncate = (s, n) => s.length > n ? s.slice(0, n - 1) + "…" : s;

  const placedFindings = new Set(Object.values(matches));

  // Clear wrong-flash slots after 900 ms, returning findings to the pool
  const wrongFlashKeys = Object.keys(wrongFlash).join(',');
  useEffect(() => {
    if (!wrongFlashKeys) return;
    const timer = setTimeout(() => {
      setState(s => {
        const nextMatches = { ...s.matches };
        for (const a of Object.keys(s.wrongFlash)) delete nextMatches[a];
        return { ...s, matches: nextMatches, wrongFlash: {} };
      });
    }, 900);
    return () => clearTimeout(timer);
  }, [wrongFlashKeys]);

  // Parse "Kakehashi (1965)" → {author:"Kakehashi", year:"1965"} so MatchPane
  // drops can feed the same SRS deck as StudyPane.
  const splitAuthorYear = (s) => {
    const m = /^(.*?)\s*\((\d{4})\)\s*$/.exec(s || "");
    return m ? { author: m[1].trim(), year: m[2] } : { author: s || "", year: "" };
  };

  // Evaluate the drop immediately: lock if correct, flash red if wrong
  const dropFinding = (finding, author) => {
    setState(s => {
      if (s.locked.includes(author)) return { ...s, dragging: null };
      const next = { ...s.matches };
      // Remove from any non-locked slot first
      for (const a of Object.keys(next)) {
        if (s.locked.includes(a)) continue;
        if (next[a] === finding) delete next[a];
      }
      next[author] = finding;
      const pair = s.pairs.find(p => p.author === author);
      const ok = pair && finding === pair.finding;
      // Feed the shared SRS deck: correct drop -> "good", wrong -> "again".
      if (window.SRS && pair) {
        const { author: a, year: y } = splitAuthorYear(pair.author);
        const key = window.SRS.cardKey(a, y, pair.finding, "fwd");
        const deck = window.SRS.loadDeck();
        window.SRS.rate(deck, key, ok ? "good" : "again");
      }
      if (ok) {
        const nextLocked = [...s.locked, author];
        return { ...s, matches: next, locked: nextLocked, dragging: null, done: nextLocked.length === s.pairs.length };
      }
      return { ...s, matches: next, dragging: null, wrongFlash: { ...s.wrongFlash, [author]: true } };
    });
  };

  // ── Desktop-only drag (Pointer Events) ──────────────────────────────────────
  // On touch devices drag is completely disabled: use the tap-to-select flow below.
  // pointercancel cleans up any orphaned ghost (e.g. if the OS steals the touch).
  const cleanupDrag = () => {
    const dr = dragRef.current;
    if (dr.active) { dr.ghostEl?.remove(); dragRef.current = { active: false }; }
    setState(s => ({ ...s, dragging: null }));
  };

  const onPointerDown = (finding, isUsed) => (e) => {
    if (isUsed) return;
    if (e.pointerType === 'mouse' && e.button !== 0) return;
    e.preventDefault();
    const el = e.currentTarget;
    el.setPointerCapture(e.pointerId);
    const rect = el.getBoundingClientRect();
    const ghost = el.cloneNode(true);
    Object.assign(ghost.style, {
      position: 'fixed',
      width: rect.width + 'px',
      left: (e.clientX - rect.width / 2) + 'px',
      top: (e.clientY - rect.height / 2) + 'px',
      opacity: '0.85',
      pointerEvents: 'none',
      zIndex: '9999',
      transform: 'rotate(2deg)',
      boxShadow: '0 8px 25px rgba(0,0,0,0.15)',
      transition: 'none',
    });
    document.body.appendChild(ghost);
    dragRef.current = { active: true, finding, ghostEl: ghost, startX: e.clientX, startY: e.clientY, moved: false };
    setState(s => ({ ...s, dragging: finding }));
  };

  const onPointerMove = (finding) => (e) => {
    const dr = dragRef.current;
    if (!dr.active || dr.finding !== finding) return;
    if (!dr.moved) {
      const dx = e.clientX - dr.startX, dy = e.clientY - dr.startY;
      if (Math.abs(dx) > 6 || Math.abs(dy) > 6) dr.moved = true;
    }
    dr.ghostEl.style.left = (e.clientX - dr.ghostEl.offsetWidth / 2) + 'px';
    dr.ghostEl.style.top = (e.clientY - dr.ghostEl.offsetHeight / 2) + 'px';
  };

  const onPointerUp = (finding) => (e) => {
    const dr = dragRef.current;
    if (!dr.active || dr.finding !== finding) return;
    dr.ghostEl.remove();
    dragRef.current = { active: false };
    if (!dr.moved) {
      setState(s => ({ ...s, dragging: null }));
      setSelected(sel => sel === finding ? null : finding);
      return;
    }
    const target = document.elementFromPoint(e.clientX, e.clientY);
    const dropZone = target && target.closest('[data-author]');
    if (dropZone && !dropZone.dataset.locked) {
      dropFinding(finding, dropZone.dataset.author);
    } else {
      setState(s => ({ ...s, dragging: null }));
    }
  };

  return (
    <div className="flex-1 overflow-auto bg-slate-50">
      <div className="max-w-6xl mx-auto p-4 md:p-6">
        <div className="flex items-center justify-between mb-4 gap-3 flex-wrap">
          <div>
            <h2 className="text-xl font-bold text-slate-800">Author ↔ Finding Match</h2>
            <p className="text-xs text-slate-500 mt-0.5">
              {isTouch
                ? "Tap a finding to select it (turns blue), then tap the matching author to place it."
                : "Drag a finding to the matching author — or click a finding then click an author."}
            </p>
          </div>
          <div className="flex items-center gap-3">
            <div className={`text-sm font-semibold px-3 py-1.5 rounded-lg ${done ? "bg-emerald-100 text-emerald-800" : "bg-slate-200 text-slate-800"}`}>
              {done ? "Complete!" : `${lockedSet.size} / ${pairs.length} correct`}
            </div>
            <button onClick={reset} className="text-sm px-3 py-1.5 rounded-lg border border-slate-300 bg-white hover:bg-slate-100 font-semibold text-slate-700">New Set</button>
          </div>
        </div>

        <div className="grid md:grid-cols-2 gap-4">
          {/* Findings — tap-only on touch, draggable on desktop */}
          <div>
            <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold mb-2">
              {isTouch ? "Findings (tap to select)" : "Findings (drag or click)"}
            </div>
            {/* px-1 on mobile leaves scroll-safe margins on both sides */}
            <div className={`space-y-2 ${isTouch ? "px-1" : ""}`}>
              {findingsOrder.map((finding, i) => {
                const inLockedSlot = pairs.some(p => lockedSet.has(p.author) && matches[p.author] === finding);
                const inUnlockedSlot = placedFindings.has(finding) && !inLockedSlot;
                const isUsed = inLockedSlot;
                const isDragging = dragging === finding;
                const isSelected = selected === finding;
                // Touch: onClick only, no drag, no touch-none so scrolling works
                // Desktop: pointer drag handlers
                const touchProps = isTouch ? {
                  onClick: () => { if (!isUsed && !inUnlockedSlot) setSelected(sel => sel === finding ? null : finding); },
                } : {
                  onPointerDown: onPointerDown(finding, isUsed),
                  onPointerMove: onPointerMove(finding),
                  onPointerUp: onPointerUp(finding),
                  onPointerCancel: cleanupDrag,
                };
                return (
                  <div
                    key={i}
                    {...touchProps}
                    title={finding}
                    className={`text-sm p-3 rounded-lg border select-none ${isTouch ? "" : "touch-none"} ${
                      isUsed
                        ? "bg-emerald-50 text-emerald-700 border-emerald-200 line-through opacity-60 cursor-default"
                        : inUnlockedSlot
                        ? "bg-slate-100 text-slate-400 border-slate-200 cursor-default"
                        : isDragging
                        ? "bg-indigo-50 border-indigo-300 text-slate-600 opacity-60"
                        : isSelected
                        ? "bg-indigo-100 border-indigo-500 text-indigo-900 ring-2 ring-indigo-300 cursor-pointer shadow-sm"
                        : isTouch
                        ? "bg-white border-slate-300 text-slate-800 active:bg-indigo-50 cursor-pointer shadow-sm"
                        : "bg-white border-slate-300 text-slate-800 hover:border-indigo-400 cursor-grab shadow-sm"
                    }`}
                  >
                    {truncate(finding, 180)}
                  </div>
                );
              })}
            </div>
          </div>

          {/* Authors — tap-to-place on touch, drop targets on desktop */}
          <div>
            <div className="text-xs uppercase tracking-wide text-slate-500 font-semibold mb-2">
              {isTouch ? "Authors (tap to place selected)" : "Authors (drop here)"}
            </div>
            <div className="space-y-2">
              {authorsOrder.map((author, i) => {
                const placed = matches[author];
                const isLocked = lockedSet.has(author);
                const isWrong = !!wrongFlash[author];
                const canReceive = selected && !isLocked;
                let slotCls = "border-dashed border-slate-300 bg-white";
                if (isLocked)        slotCls = "border-solid border-emerald-400 bg-emerald-50";
                else if (isWrong)    slotCls = "border-solid border-rose-400 bg-rose-50";
                else if (canReceive) slotCls = "border-dashed border-indigo-400 bg-indigo-50";
                else if (placed)     slotCls = "border-solid border-indigo-300 bg-indigo-50";
                return (
                  <div
                    key={i}
                    data-author={author}
                    data-locked={isLocked ? "1" : undefined}
                    onClick={() => {
                      if (isLocked || !selected) return;
                      const finding = selected;
                      setSelected(null);
                      dropFinding(finding, author);
                    }}
                    className={`flex items-start gap-2 p-3 rounded-lg border-2 min-h-[60px] transition-colors duration-150 ${slotCls}${canReceive ? " cursor-pointer active:bg-indigo-100" : ""}`}
                  >
                    <div className={`text-sm font-semibold w-40 shrink-0 ${isLocked ? "text-emerald-800" : isWrong ? "text-rose-700" : "text-slate-800"}`}>{author}</div>
                    <div className="flex-1 text-xs text-slate-700" title={placed || ""}>
                      {placed ? truncate(placed, 180) : <span className={`italic ${canReceive ? "text-indigo-400" : "text-slate-400"}`}>{canReceive ? "tap to place here" : "tap a finding first"}</span>}
                    </div>
                    {isWrong  && <span className="text-rose-500 text-sm shrink-0 font-bold">✗</span>}
                    {isLocked && <span className="text-emerald-600 text-sm shrink-0 font-bold">✓</span>}
                  </div>
                );
              })}
            </div>
          </div>
        </div>

        {done && (
          <div className="mt-4 bg-emerald-50 border border-emerald-200 text-emerald-800 text-sm rounded-lg p-3">
            All {pairs.length} matched correctly! Click <span className="font-semibold">New Set</span> for another round.
          </div>
        )}
      </div>
    </div>
  );
}

function StudyPane({ cards, onJump }) {
  const { flagged } = React.useContext(FlagCtx);
  const [flaggedOnly, setFlaggedOnly] = useState(false);
  const [format, setFormat] = useState("mc"); // "mc" | "type" | "cloze" | "year"
  const validCards = useMemo(() => {
    const base = cards.filter(c => c.author && c.finding && c.finding.length > 20);
    if (!flaggedOnly || flagged.size === 0) return base;
    return base.filter(c => flagged.has(c.author));
  }, [cards, flaggedOnly, flagged]);
  const [reverse, setReverse] = useState(false); // false: show finding, pick author
  const [typed, setTyped] = useState("");           // current text-input value
  const [current, setCurrent] = useState(null);
  const [choices, setChoices] = useState([]);
  const [pick, setPick] = useState(null);           // "correct"|"wrong" in type/cloze/year, card obj in mc mode
  const [rated, setRated] = useState(false);        // has the user rated this card yet?
  const [deck, setDeck] = useState(() => window.SRS ? window.SRS.loadDeck() : { cards: {}, meta: { streak: 0 } });
  const [hud, setHud] = useState(() => window.SRS ? window.SRS.stats(window.SRS.loadDeck()) : { due: 0, newCount: 0, mastered: 0, streak: 0 });
  const typeInputRef = useRef(null);
  const deckRef = useRef(deck);
  useEffect(() => { deckRef.current = deck; }, [deck]);

  // Build a candidate pool with per-card SRS keys so pickDue can match.
  const candidatePool = useMemo(() => {
    const dir = reverse ? "rev" : "fwd";
    return validCards.map(c => ({
      key: window.SRS ? window.SRS.cardKey(c.author, c.year, c.finding, dir) : "",
      card: c,
    }));
  }, [validCards, reverse]);

  const pickNext = useCallback(() => {
    if (!validCards.length || !window.SRS) return;
    const dir = reverse ? "rev" : "fwd";
    const keys = window.SRS.pickDue(deckRef.current, candidatePool, { limit: 1 });
    let card;
    if (keys.length) {
      const entry = candidatePool.find(p => p.key === keys[0]);
      card = entry?.card || candidatePool[0].card;
    } else {
      card = candidatePool[Math.floor(Math.random() * candidatePool.length)].card;
    }
    // build 4 choices (only used in mc/cloze/reverse-finding modes)
    const pool = validCards.filter(c => c !== card);
    const sameSection = pool.filter(c => c.section_id === card.section_id);
    const distractors = [];
    const distractorField = format === "cloze" ? "author"
                           : reverse ? "finding" : "author";
    const used = new Set([(card[distractorField] || "").toLowerCase()]);
    const draw = (arr) => {
      while (arr.length && distractors.length < 3) {
        const i = Math.floor(Math.random() * arr.length);
        const p = arr.splice(i, 1)[0];
        const key = (p[distractorField] || "").toLowerCase();
        if (!used.has(key)) { used.add(key); distractors.push(p); }
      }
    };
    draw([...sameSection]);
    if (distractors.length < 3) draw([...pool]);
    const all = [card, ...distractors].sort(() => Math.random() - 0.5);
    setCurrent(card);
    setChoices(all);
    setPick(null);
    setRated(false);
    setTyped("");
    setTimeout(() => typeInputRef.current?.focus(), 50);
  }, [validCards, reverse, format, candidatePool]);

  useEffect(() => { pickNext(); }, [pickNext]);

  // When another tab or the debates page changes the deck, refresh HUD stats.
  useEffect(() => {
    const refresh = () => {
      if (!window.SRS) return;
      const d = window.SRS.loadDeck();
      setDeck(d);
      setHud(window.SRS.stats(d));
    };
    document.addEventListener("srs:change", refresh);
    return () => document.removeEventListener("srs:change", refresh);
  }, []);

  // ---- current card key (direction-aware) ------------------------------
  const curKey = useCallback(() => {
    if (!current || !window.SRS) return "";
    const dir = reverse ? "rev" : "fwd";
    return window.SRS.cardKey(current.author, current.year, current.finding, dir);
  }, [current, reverse]);

  // ---- answer handlers (MC / cloze / year / type) -----------------------
  const answer = (choice) => {
    if (pick) return;
    setPick(choice);
  };

  const submitTyped = () => {
    if (pick || !typed.trim() || !current) return;
    const correct = authorMatch(typed, current.author);
    setPick(correct ? "correct" : "wrong");
  };

  const answerYear = (decade) => {
    if (pick || !current) return;
    const y = parseInt(current.year, 10);
    const correct = !isNaN(y) && decade === Math.floor(y / 10) * 10;
    setPick(correct ? "correct" : "wrong");
  };

  // Was the user's current pick correct? (used to auto-suggest Again/Good.)
  const wasCorrect = (() => {
    if (!pick) return false;
    if (pick === "correct") return true;
    if (pick === "wrong")   return false;
    return pick === current;
  })();

  // ---- SRS rating -------------------------------------------------------
  const rate = useCallback((rating) => {
    if (!current || !window.SRS) return;
    const k = curKey();
    window.SRS.rate(deckRef.current, k, rating);
    const next = window.SRS.loadDeck();
    setDeck(next);
    setHud(window.SRS.stats(next));
    setRated(true);
  }, [current, curKey]);

  // Auto-rate "good" / "again" when pick is set, so the user doesn't *have*
  // to tap a rating button — but give them the chance to override it before
  // Next. We apply an automatic rating ONCE per pick.
  useEffect(() => {
    if (pick && !rated) {
      rate(wasCorrect ? "good" : "again");
    }
    // eslint-disable-next-line react-hooks/exhaustive-deps
  }, [pick]);

  // ---- toggle shaky flag ------------------------------------------------
  const isShaky = current && deck.cards[curKey()]?.shaky;
  const toggleShaky = () => {
    if (!current || !window.SRS) return;
    window.SRS.markShaky(deckRef.current, curKey(), !isShaky);
    setDeck(window.SRS.loadDeck());
  };

  // Keyboard shortcuts: 1-4 to pick answer, Enter/Space to advance
  useEffect(() => {
    const handler = (e) => {
      // After answering: Enter or Space → next question
      if (pick && (e.key === "Enter" || e.key === " ")) {
        e.preventDefault();
        pickNext();
        return;
      }
      // Before answering, in choice-based formats: 1-4 to select
      if (!pick && (format === "mc" || format === "cloze")) {
        const tag = document.activeElement?.tagName;
        if (tag === "INPUT" || tag === "TEXTAREA") return;
        if (e.key >= "1" && e.key <= "4") {
          const idx = parseInt(e.key) - 1;
          if (idx < choices.length) {
            e.preventDefault();
            answer(choices[idx]);
          }
        }
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, [pick, format, choices, pickNext, answer]);

  if (!validCards.length) {
    return <div className="p-8 text-slate-600">No study cards extracted yet. Add <code>{`{{cite: Author Year — Finding}}`}</code> markers to <code>endo-guide.md</code> and rebuild.</div>;
  }

  // Cloze: blank out the author surname inside the finding sentence.
  const clozePrompt = () => {
    if (!current) return "";
    const surname = (current.author || "").split(/\s+/)[0];
    if (!surname) return current.finding;
    const re = new RegExp("\\b" + surname.replace(/[.*+?^${}()|[\\]\\\\]/g, "\\$&") + "\\b", "gi");
    return (current.finding || "").replace(re, "_____");
  };

  const promptText = format === "cloze" ? clozePrompt()
                   : format === "year"  ? current?.finding
                   : reverse ? current?.author : current?.finding;
  const promptLabel = format === "cloze" ? "Fill in the blank — who reported this?"
                    : format === "year"  ? "Roughly which decade was this published?"
                    : reverse ? "Which finding matches this author?"
                    : "Which author reported this finding?";

  return (
    <div className="flex-1 overflow-y-auto">
      <div className="max-w-2xl mx-auto p-8">
        <div className="flex flex-wrap items-start justify-between gap-3 mb-6 text-sm text-slate-600">
          <div className="srs-hud">
            <span><strong>{validCards.length}</strong> cards</span>
            <span>Due: <strong>{hud.due}</strong></span>
            <span>New: <strong>{hud.newCount}</strong></span>
            <span>Mastered: <strong>{hud.mastered}</strong></span>
            <span>Streak: <strong>{hud.streak || 0}</strong></span>
            {hud.shaky > 0 && <span>Shaky: <strong>{hud.shaky}</strong></span>}
          </div>
          <div className="flex flex-wrap items-center gap-3">
            <label className="flex items-center gap-1.5 text-xs">
              Format:
              <select
                className="border rounded px-2 py-1 text-xs bg-white"
                value={format}
                onChange={e => setFormat(e.target.value)}
                disabled={!!pick}
              >
                <option value="mc">Multiple choice</option>
                <option value="type">Type author</option>
                <option value="cloze">Cloze (fill blank)</option>
                <option value="year">Year / decade</option>
              </select>
            </label>
            <label className="flex items-center gap-2 cursor-pointer select-none">
              <input type="checkbox" checked={reverse}
                onChange={e => setReverse(e.target.checked)}
                disabled={format !== "mc"} />
              Reverse
            </label>
            {flagged.size > 0 && (
              <label className="flex items-center gap-2 cursor-pointer select-none font-medium text-rose-700">
                <input type="checkbox" checked={flaggedOnly}
                  onChange={e => setFlaggedOnly(e.target.checked)} />
                Flagged only ({flagged.size})
              </label>
            )}
          </div>
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-7 shadow-sm border-t-4 border-t-indigo-500">
          <div className="text-xs uppercase tracking-widest text-slate-400 mb-3 font-medium">{promptLabel}</div>
          <div className="text-xl text-slate-900 font-serif mb-6 leading-relaxed">{promptText}</div>
          {format === "type" ? (
            /* ---- TYPE-IT MODE ---- */
            <div>
              <div className="flex gap-2 mb-3">
                <input
                  ref={typeInputRef}
                  className="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-300"
                  placeholder="Type the author's name…"
                  value={typed}
                  onChange={e => setTyped(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !pick && typed.trim()) submitTyped(); }}
                  disabled={!!pick}
                  autoFocus
                />
                {!pick && (
                  <button
                    className="px-4 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:bg-slate-300 transition"
                    onClick={submitTyped}
                    disabled={!typed.trim()}
                  >Submit</button>
                )}
              </div>
              {pick && (
                <div className={`px-4 py-3 rounded-lg text-sm font-medium mb-1 ${pick === "correct" ? "bg-emerald-50 border border-emerald-300 text-emerald-900" : "bg-rose-50 border border-rose-300 text-rose-900"}`}>
                  {pick === "correct"
                    ? `✓ Correct! ${current.author}${current.year ? " (" + current.year + ")" : ""}`
                    : `✗ Answer: ${current.author}${current.year ? " (" + current.year + ")" : ""}`
                  }
                </div>
              )}
            </div>
          ) : format === "year" ? (
            /* ---- YEAR-GUESS MODE ---- */
            (() => {
              const y = parseInt(current?.year || "", 10);
              const targetDecade = Math.floor(y / 10) * 10;
              const candidates = new Set([targetDecade]);
              while (candidates.size < 4) {
                const delta = (Math.floor(Math.random() * 7) - 3) * 10;
                const d = targetDecade + delta;
                if (d >= 1950 && d <= 2020) candidates.add(d);
              }
              const decades = Array.from(candidates).sort();
              return (
                <div className="grid grid-cols-2 gap-2">
                  {decades.map(d => {
                    let cls = "text-left px-4 py-3 rounded border bg-white hover:bg-slate-50 font-mono";
                    if (pick) {
                      if (d === targetDecade) cls = "text-left px-4 py-3 rounded border bg-emerald-50 border-emerald-400 text-emerald-900 font-mono font-semibold";
                      else cls = "text-left px-4 py-3 rounded border bg-slate-50 text-slate-500 font-mono";
                    }
                    return (
                      <button key={d} className={cls} onClick={() => answerYear(d)} disabled={!!pick}>
                        {d}s
                      </button>
                    );
                  })}
                </div>
              );
            })()
          ) : (
            /* ---- MULTIPLE CHOICE (mc / cloze) ---- */
            <div className="grid gap-2">
              {choices.map((c, i) => {
                const label = format === "cloze" ? `${c.author}${c.year ? " (" + c.year + ")" : ""}`
                             : reverse ? c.finding
                             : `${c.author}${c.year ? " (" + c.year + ")" : ""}`;
                let cls = "text-left px-4 py-3 rounded border bg-white hover:bg-slate-50";
                if (pick) {
                  if (c === current) cls = "text-left px-4 py-3 rounded border bg-emerald-50 border-emerald-400 text-emerald-900";
                  else if (c === pick) cls = "text-left px-4 py-3 rounded border bg-rose-50 border-rose-300 text-rose-900";
                  else cls = "text-left px-4 py-3 rounded border bg-slate-50 text-slate-500";
                }
                return (
                  <button key={i} className={cls} onClick={() => answer(c)} disabled={!!pick}>
                    <span className="inline-block w-6 text-slate-400 font-mono text-sm font-bold">{i + 1}.</span>{label}
                  </button>
                );
              })}
            </div>
          )}
          {pick && (
            <>
              {/* SRS rating row */}
              <div className="srs-rating">
                <button className="srs-rating-btn srs-rating-btn--again" onClick={() => { rate("again"); pickNext(); }}>
                  Again <small>10 min</small>
                </button>
                <button className="srs-rating-btn srs-rating-btn--hard" onClick={() => { rate("hard"); pickNext(); }}>
                  Hard
                </button>
                <button className="srs-rating-btn srs-rating-btn--good" onClick={() => { rate("good"); pickNext(); }}>
                  Good <small>auto</small>
                </button>
                <button className="srs-rating-btn srs-rating-btn--easy" onClick={() => { rate("easy"); pickNext(); }}>
                  Easy
                </button>
              </div>
              <div className="mt-4 flex items-center justify-between flex-wrap gap-3">
                <div className="text-sm text-slate-600">
                  <span className="font-semibold">{current.author}</span>{current.year ? ` (${current.year})` : ""}
                  {(format === "cloze" || reverse) && <span className="italic"> — {current.finding}</span>}
                  {current.section_title && (
                    <button className="text-indigo-600 hover:underline ml-3" onClick={() => onJump?.(current.section_id)}>
                      Jump to §{current.section_title}
                    </button>
                  )}
                </div>
                <button
                  className={`srs-shaky-btn${isShaky ? " is-shaky" : ""}`}
                  onClick={toggleShaky}
                  title="Mark this card as shaky — the hourly audit will re-verify its abstract."
                >
                  {isShaky ? "★ Flagged shaky" : "☆ Flag as shaky"}
                </button>
              </div>
            </>
          )}
        </div>

        {pick && current && (
          <AbstractPanel author={current.author} year={current.year} finding={current.finding} />
        )}
        <div className="mt-4 text-xs text-slate-500">
          Spaced repetition: cards are scheduled by a five-box Leitner with real
          time gates (10 min → 1 h → 1 day → 3 days → 7 days → 21 days). New
          and due cards come up first; rate cards Again / Hard / Good / Easy to
          fine-tune the interval. Progress is stored only in your browser.
          <br/>Shortcuts: <kbd className="px-1 py-0.5 bg-slate-100 border border-slate-300 rounded text-[10px] font-mono">1</kbd>–<kbd className="px-1 py-0.5 bg-slate-100 border border-slate-300 rounded text-[10px] font-mono">4</kbd> pick answer · <kbd className="px-1 py-0.5 bg-slate-100 border border-slate-300 rounded text-[10px] font-mono">Enter</kbd> / <kbd className="px-1 py-0.5 bg-slate-100 border border-slate-300 rounded text-[10px] font-mono">Space</kbd> next
        </div>
      </div>
    </div>
  );
}

// --- audit pane -------------------------------------------------------------
function AbstractHealthWidget({ health, totalCards }) {
  if (!health) return null;
  const total = health.total || 0;
  const missing = Math.max(0, (totalCards || total) - total);
  return (
    <div className="abs-health">
      <div className="abs-health__title">Abstract health</div>
      <div className="abs-health__row">
        <span><strong>{total}/{totalCards || total}</strong> cards have abstracts</span>
        <span className="abs-health__pill abs-health__pill--high">{health.high || 0} high</span>
        <span className="abs-health__pill abs-health__pill--medium">{health.medium || 0} medium</span>
        <span className="abs-health__pill abs-health__pill--low">{health.low || 0} low</span>
        <span className="abs-health__pill abs-health__pill--missing">{missing} missing</span>
      </div>
      {(health.low || 0) > 0 && (
        <div className="text-xs text-slate-500">
          Run <code>/audit</code> to re-verify low-confidence matches, or report individual
          mismatches from the abstract modal.
        </div>
      )}
    </div>
  );
}

function AuditPane({ suggestions, abstractHealth, totalCards }) {
  const [decisions, setDecisions] = useState({}); // id -> "approve"|"reject"|"edit"
  const [edits, setEdits] = useState({});          // id -> edited "after" text

  const exportDecisions = () => {
    const out = Object.entries(decisions).map(([id, status]) => ({
      id, status, edited_after: edits[id] ?? null, decided_at: new Date().toISOString(),
    }));
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "decisions.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  if (!suggestions.length) {
    return (
      <div className="flex-1 overflow-y-auto p-8">
        <div className="max-w-2xl mx-auto text-slate-600">
          <AbstractHealthWidget health={abstractHealth} totalCards={totalCards} />
          <h2 className="text-xl font-semibold text-slate-900 mb-2">No pending suggestions</h2>
          <p>The weekly audit writes proposals to <code>suggestions.json</code>. Run the scheduled task or rebuild after it runs.</p>
        </div>
      </div>
    );
  }

  const byStatus = suggestions.reduce((acc, s) => {
    const k = decisions[s.id] || "pending";
    (acc[k] ||= []).push(s);
    return acc;
  }, {});

  return (
    <div className="flex-1 overflow-y-auto">
      <div className="max-w-3xl mx-auto p-8">
        <AbstractHealthWidget health={abstractHealth} totalCards={totalCards} />
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-xl font-semibold text-slate-900">Weekly audit proposals</h2>
            <div className="text-sm text-slate-600">
              {suggestions.length} pending · {Object.keys(decisions).length} decided
            </div>
          </div>
          <button
            onClick={exportDecisions}
            disabled={!Object.keys(decisions).length}
            className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 disabled:bg-slate-300">
            Export decisions.json
          </button>
        </div>
        <div className="space-y-4">
          {suggestions.map(s => {
            const status = decisions[s.id] || "pending";
            const kindColors = { add: "bg-emerald-100 text-emerald-800", update: "bg-amber-100 text-amber-800", remove: "bg-rose-100 text-rose-800", fix: "bg-blue-100 text-blue-800" };
            return (
              <div key={s.id} className={`bg-white border rounded-lg p-5 shadow-sm ${status === "approve" ? "border-emerald-400" : status === "reject" ? "border-rose-300 opacity-60" : ""}`}>
                <div className="flex items-center gap-2 mb-2">
                  <span className={`text-xs font-semibold px-2 py-0.5 rounded ${kindColors[s.kind] || "bg-slate-100"}`}>{(s.kind || "edit").toUpperCase()}</span>
                  <span className="text-sm text-slate-500">§ {s.section_id || "—"}</span>
                </div>
                <p className="text-sm text-slate-700 mb-3">{s.rationale}</p>
                {s.before && (
                  <div className="mb-2">
                    <div className="text-xs uppercase text-slate-500">Before</div>
                    <div className="text-sm bg-rose-50 border border-rose-100 p-2 rounded whitespace-pre-wrap">{s.before}</div>
                  </div>
                )}
                <div className="mb-2">
                  <div className="text-xs uppercase text-slate-500">After</div>
                  <textarea
                    className="w-full text-sm bg-emerald-50 border border-emerald-100 p-2 rounded font-serif"
                    rows={Math.max(2, Math.min(8, (edits[s.id] ?? s.after ?? "").split("\n").length + 1))}
                    value={edits[s.id] ?? s.after ?? ""}
                    onChange={e => setEdits(prev => ({ ...prev, [s.id]: e.target.value }))}
                  />
                </div>
                {s.citations?.length ? (
                  <div className="text-xs text-slate-500 mb-3">
                    Citations: {s.citations.map((c, i) => (
                      <span key={i} className="mr-2">
                        {c.pmid
                          ? <a className="text-indigo-600 hover:underline" href={`https://pubmed.ncbi.nlm.nih.gov/${c.pmid}`} target="_blank" rel="noopener noreferrer">{c.author} {c.year}</a>
                          : <span>{c.author} {c.year}</span>}
                      </span>
                    ))}
                  </div>
                ) : null}
                <div className="flex gap-2">
                  <button className="px-3 py-1 text-sm bg-emerald-600 text-white rounded hover:bg-emerald-700" onClick={() => setDecisions(d => ({ ...d, [s.id]: "approve" }))}>Approve</button>
                  <button className="px-3 py-1 text-sm bg-rose-600 text-white rounded hover:bg-rose-700" onClick={() => setDecisions(d => ({ ...d, [s.id]: "reject" }))}>Reject</button>
                  <button className="px-3 py-1 text-sm bg-slate-200 text-slate-700 rounded hover:bg-slate-300" onClick={() => setDecisions(d => { const n = { ...d }; delete n[s.id]; return n; })}>Reset</button>
                  <div className="ml-auto text-xs text-slate-500 self-center">
                    {status !== "pending" ? status : ""}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// --- author index -----------------------------------------------------------
function AuthorPane({ cards, onJump }) {
  const [filter, setFilter] = useState("");

  const authors = useMemo(() => {
    const map = {};
    for (const c of cards) {
      if (!c.author || !c.finding || c.finding.length < 10) continue;
      const key = c.author.toLowerCase();
      if (!map[key]) map[key] = { author: c.author, entries: [] };
      map[key].entries.push(c);
    }
    return Object.values(map).sort((a, b) => a.author.localeCompare(b.author));
  }, [cards]);

  const filtered = useMemo(() => {
    if (!filter) return authors;
    const q = filter.toLowerCase();
    return authors.filter(a => a.author.toLowerCase().includes(q));
  }, [authors, filter]);

  const validCount = useMemo(() => cards.filter(c => c.author && c.finding?.length >= 10).length, [cards]);

  return (
    <div className="flex-1 overflow-y-auto">
      <div className="max-w-2xl mx-auto p-8">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-xl font-semibold text-slate-900">Author Index</h2>
            <div className="text-sm text-slate-500 mt-0.5">{authors.length} authors · {validCount} findings</div>
          </div>
          <input
            className="px-3 py-1.5 text-sm border border-slate-200 rounded-lg bg-slate-50 w-48 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white"
            placeholder="Filter by name…"
            value={filter}
            onChange={e => setFilter(e.target.value)}
          />
        </div>
        <div className="space-y-3">
          {filtered.map(({ author, entries }) => (
            <div key={author} className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
              <div className="flex items-baseline gap-3 mb-3">
                <span className="font-semibold text-amber-700 text-base">{author}</span>
                <span className="text-xs text-slate-400 font-normal">{entries.length} {entries.length === 1 ? "finding" : "findings"}</span>
              </div>
              <ul className="space-y-2.5">
                {entries.map((e, i) => (
                  <li key={i} className="flex gap-3 items-start text-sm">
                    <span className="text-slate-400 shrink-0 tabular-nums mt-0.5 text-xs w-10">{e.year || "—"}</span>
                    <span className="text-slate-700 flex-1 leading-snug">{e.finding}</span>
                    {e.section_id && (
                      <button
                        className="text-indigo-500 hover:text-indigo-700 hover:underline shrink-0 text-xs mt-0.5 whitespace-nowrap"
                        onClick={() => onJump?.(e.section_id)}
                      >§ {e.section_title || e.section_id}</button>
                    )}
                  </li>
                ))}
              </ul>
            </div>
          ))}
          {filtered.length === 0 && filter && (
            <div className="text-slate-500 text-center py-16">No authors matching "{filter}"</div>
          )}
        </div>
        <div className="h-16" />
      </div>
    </div>
  );
}

// --- app --------------------------------------------------------------------
function App() {
  const [data, setData] = useState(() => DATA || { sections: [], cards: [], suggestions: [] });
  const [tab, setTab] = useState("reference");
  const [query, setQuery] = useState("");
  const [debounced, setDebounced] = useState("");
  const searchRef = useRef(null);

  // Annotation / edit-mode state
  const [annotateMode, setAnnotateMode] = useState(false);
  const [showPwModal, setShowPwModal] = useState(false);
  const [annData, setAnnData] = useState(loadAnnotations);
  const addMark    = useCallback(m   => setAnnData(d => { const n={...d,marks:[...d.marks,m]};              saveAnnotations(n); return n; }), []);
  const removeMark = useCallback(id  => setAnnData(d => { const n={...d,marks:d.marks.filter(m=>m.id!==id)};saveAnnotations(n); return n; }), []);
  const addNote    = useCallback(note=> setAnnData(d => { const n={...d,notes:[...d.notes,note]};            saveAnnotations(n); return n; }), []);
  const updateNote = useCallback((id,text)=> setAnnData(d => { const n={...d,notes:d.notes.map(x=>x.id===id?{...x,text}:x)};saveAnnotations(n); return n; }), []);
  const removeNote = useCallback(id  => setAnnData(d => { const n={...d,notes:d.notes.filter(x=>x.id!==id)};saveAnnotations(n); return n; }), []);

  // Cloud (Pages + Access) auth state. On localhost this stays empty.
  const [cloudUser, setCloudUser] = useState("");
  useEffect(() => {
    if (!CLOUD_MODE) return;
    checkCloudIdentity().then(email => { if (email) setCloudUser(email); });
  }, []);

  // Live source editing. Two backends:
  //   • Cloud (deployed site): POST /api/save-block (Cloudflare Pages Function
  //     gated by Cloudflare Access). Access injects the authenticated email
  //     into the request; the function commits endo-guide.md via the GitHub API.
  //   • Local (serve.py): POST /api/save-block with the session password;
  //     the local server rewrites endo-guide.md and reruns build.py.
  // Either way, we patch the in-memory sections tree on success so the edit is
  // visible immediately without reloading.
  const saveBlock = useCallback(async ({ sectionId, subsectionId, blockIndex, type, oldRaw, newText }) => {
    const headers = { "Content-Type": "application/json" };
    let payload;
    if (CLOUD_MODE) {
      payload = JSON.stringify({ type, oldRaw, newText });
    } else {
      const pw = sessionStorage.getItem(ANNO_PW_PLAIN) || "";
      if (!pw) return { ok: false, error: "unlock edit mode first" };
      payload = JSON.stringify({ password: pw, type, oldRaw, newText });
    }
    let body;
    try {
      const r = await fetch("/api/save-block", {
        method: "POST",
        headers,
        body: payload,
        credentials: "same-origin",
      });
      if ((r.status === 401 || r.status === 403) && CLOUD_MODE) {
        setCloudUser("");
        goToCloudLogin();
        return { ok: false, error: "session expired — redirecting to sign in" };
      }
      body = await r.json().catch(() => ({ ok: false, error: "bad_response" }));
    } catch {
      return { ok: false, error: CLOUD_MODE ? "network error talking to server" : "offline — server needed for source edits" };
    }
    if (!body.ok) return { ok: false, error: body.error || "save failed" };
    setData(d => ({
      ...d,
      sections: d.sections.map(sec => {
        if (sec.id !== sectionId) return sec;
        const patchBlocks = (blocks) => blocks.map((b, i) =>
          i === blockIndex ? { ...b, text: newText, raw: body.newRaw } : b
        );
        if (subsectionId) {
          return {
            ...sec,
            subsections: (sec.subsections || []).map(sub =>
              sub.id === subsectionId ? { ...sub, blocks: patchBlocks(sub.blocks || []) } : sub
            ),
          };
        }
        return { ...sec, blocks: patchBlocks(sec.blocks || []) };
      }),
    }));
    return { ok: true };
  }, []);

  const logout = () => {
    setAnnotateMode(false);
    setCloudUser("");
    goToCloudLogout();
  };

  const toggleAnnotate = async () => {
    if (annotateMode) { setAnnotateMode(false); return; }
    if (CLOUD_MODE) {
      const email = cloudUser || await checkCloudIdentity();
      if (email) {
        if (!cloudUser) setCloudUser(email);
        setAnnotateMode(true);
        return;
      }
      goToCloudLogin();
      return;
    }
    // Local dev: existing password modal flow
    if (sessionStorage.getItem(ANNO_SES_KEY) === "1" && sessionStorage.getItem(ANNO_PW_PLAIN)) {
      setAnnotateMode(true); return;
    }
    setShowPwModal(true);
  };

  // Pools for inline quiz mode
  const authorPool = useMemo(() =>
    [...new Set((data.cards || []).filter(c => c.author).map(c => c.author))],
    [data.cards]);

  const pctPool = useMemo(() => {
    const set = new Set();
    const re = new RegExp(PCT_RE.source, "g");
    for (const sec of data.sections || []) {
      const text = sectionText(sec);
      re.lastIndex = 0;
      let m;
      while ((m = re.exec(text))) set.add(m[0]);
    }
    return [...set];
  }, [data.sections]);

  // Abstract popup
  const [abstractInfo, setAbstractInfo] = useState(null);
  const openAbstract = useCallback((citeText) => {
    const yearMatch = citeText.match(/\b(\d{4})\b/);
    const year   = yearMatch ? yearMatch[1] : "";
    const author = citeText.replace(/\s*\b\d{4}\b/, "").trim();
    const abs    = DATA?.abstracts || {};
    const abstract = abs[`${author}|${year}`] || abs[`${author}|`] || null;
    const authorLower = author.toLowerCase();
    const card = (data.cards || []).find(c => {
      const ca = (c.author || "").toLowerCase().trim();
      return ca === authorLower || ca.includes(authorLower) || authorLower.includes(ca);
    }) || null;
    setAbstractInfo({ citeText, author, year, abstract, card });
  }, [data.cards]);

  // Long-press flagging — persisted in localStorage
  const [flagged, setFlagged] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("endo-guide.flagged.v1") || "[]")); }
    catch { return new Set(); }
  });
  const toggleFlag = useCallback((text) => {
    setFlagged(prev => {
      const next = new Set(prev);
      if (next.has(text)) next.delete(text); else next.add(text);
      localStorage.setItem("endo-guide.flagged.v1", JSON.stringify([...next]));
      return next;
    });
  }, []);

  useEffect(() => {
    const t = setTimeout(() => setDebounced(query), 150);
    return () => clearTimeout(t);
  }, [query]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === "/" && document.activeElement?.tagName !== "INPUT" && document.activeElement?.tagName !== "TEXTAREA") {
        e.preventDefault();
        searchRef.current?.focus();
      } else if (e.key === "Escape") {
        setQuery("");
        searchRef.current?.blur();
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const jumpToSection = (id) => {
    setTab("reference");
    // let the reference pane mount, then scroll
    setTimeout(() => {
      const el = document.querySelector(`[data-anchor="${id}"]`);
      el?.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 50);
  };

  const totalMatches = useMemo(() => {
    if (!debounced) return 0;
    return data.sections.reduce((n, s) => n + countMatches(sectionText(s), debounced), 0);
  }, [data.sections, debounced]);

  return (
    <AnnotateCtx.Provider value={{ annotateMode, marks: annData.marks, notes: annData.notes, addMark, removeMark, addNote, updateNote, removeNote, saveBlock }}>
    <FlagCtx.Provider value={{ flagged, toggleFlag }}>
    <AbstractCtx.Provider value={{ openAbstract }}>
    <div className="flex-1 min-h-0 flex flex-col">
      <header className="bg-white border-b shadow-sm shrink-0">
        <div className="flex items-center gap-2 md:gap-5 px-3 md:px-5 h-14">
          <div className="text-indigo-700 font-bold tracking-tight text-sm shrink-0">Endo Guide</div>
          <div className="flex items-center gap-1 overflow-x-auto shrink min-w-0">
            <button className={`tab-btn shrink-0 ${tab === "reference" ? "tab-active" : "tab-inactive"}`} onClick={() => setTab("reference")}>Reference</button>
            <button className={`tab-btn shrink-0 ${tab === "study" ? "tab-active" : "tab-inactive"}`} onClick={() => setTab("study")}>
              Study <span className={`text-xs ml-0.5 ${tab === "study" ? "opacity-70" : "text-slate-400"}`}>({data.cards?.length || 0})</span>
            </button>
            <button className={`tab-btn shrink-0 ${tab === "authors" ? "tab-active" : "tab-inactive"}`} onClick={() => setTab("authors")}>Authors</button>
            <button className={`tab-btn shrink-0 ${tab === "match" ? "tab-active" : "tab-inactive"}`} onClick={() => setTab("match")}>Match</button>
            <button className={`tab-btn shrink-0 ${tab === "audit" ? "tab-active" : "tab-inactive"}`} onClick={() => setTab("audit")}>
              Audit {data.suggestions?.length ? <span className="ml-1 inline-block bg-amber-500 text-white text-xs px-1.5 rounded-full">{data.suggestions.length}</span> : null}
            </button>
            <button
              className={`tab-btn shrink-0 ${annotateMode ? "bg-amber-500 text-white" : "tab-inactive"}`}
              onClick={toggleAnnotate}
              title={annotateMode ? "Click to exit edit mode" : (CLOUD_MODE ? "Sign in to edit" : "Enter edit mode")}>
              {annotateMode ? "Editing" : "Edit"}{!annotateMode && (annData.marks.length + annData.notes.length) > 0 && <span className="ml-1 text-xs text-slate-400">({annData.marks.length + annData.notes.length})</span>}
            </button>
            {CLOUD_MODE && cloudUser && (
              <span className="shrink-0 inline-flex items-center gap-1.5 text-xs text-slate-500 ml-1">
                <span className="hidden md:inline truncate max-w-[12rem]" title={cloudUser}>{cloudUser}</span>
                <button
                  onClick={logout}
                  className="text-[10px] uppercase tracking-wide text-slate-400 hover:text-rose-600 border border-slate-200 rounded px-1.5 py-0.5"
                  title="Sign out">out</button>
              </span>
            )}
            <a href="endo-debates.html" className="tab-btn shrink-0 tab-inactive" title="Evidence timelines for major endo debates">Debates</a>
          </div>
          <div className="flex-1 hidden md:block" />
          {tab === "reference" && (
            <div className="flex items-center gap-2 shrink-0">
              <input
                ref={searchRef}
                className="px-3 py-1.5 text-sm border border-slate-200 rounded-lg bg-slate-50 w-32 md:w-64 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white focus:border-indigo-300 transition"
                placeholder="Search…"
                value={query}
                onChange={e => setQuery(e.target.value)}
              />
              {debounced && <div className="hidden md:block text-xs text-slate-400">{totalMatches} match{totalMatches !== 1 ? "es" : ""}</div>}
              {query && <button onClick={() => setQuery("")} className="text-slate-400 hover:text-slate-700 text-sm leading-none">✕</button>}
            </div>
          )}
        </div>
      </header>
      {tab === "reference" && <ReferencePane sections={data.sections} query={debounced} authorPool={authorPool} pctPool={pctPool} />}
      {tab === "study" && <StudyPane cards={data.cards || []} onJump={jumpToSection} />}
      {tab === "authors" && <AuthorPane cards={data.cards || []} onJump={jumpToSection} />}
      {tab === "audit" && <AuditPane
        suggestions={data.suggestions || []}
        abstractHealth={data.abstract_health || null}
        totalCards={(data.cards || []).length}
      />}
      {tab === "match" && <MatchPane />}
    </div>
    {showPwModal && (
      <PasswordModal
        onSuccess={() => { setShowPwModal(false); setAnnotateMode(true); }}
        onCancel={() => setShowPwModal(false)}
      />
    )}
    {abstractInfo && <AbstractModal info={abstractInfo} onClose={() => setAbstractInfo(null)} />}
    </AbstractCtx.Provider>
    </FlagCtx.Provider>
    </AnnotateCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
