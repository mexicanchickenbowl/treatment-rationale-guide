 posts (glass or quartz fiber in resin matrix) have a modulus of elasticity similar to dentin, which distributes stress more favorably and results in restorable failure modes (debonding, core fracture) rather than catastrophic root fractures. Metal posts (cast or prefabricated stainless steel/titanium) have higher modulus of elasticity than dentin and are associated with unrestorable vertical root fractures when failure occurs. Systematic reviews and meta-analyses consistently favor fiber posts over metal posts for their more favorable failure mode {{cite: Fernandes 2003}}.", "raw": "Fiber posts (glass or quartz fiber in resin matrix) have a modulus of elasticity similar to dentin, which distributes stress more favorably and results in restorable failure modes (debonding, core fracture) rather than catastrophic root fractures. Metal posts (cast or prefabricated stainless steel/titanium) have higher modulus of elasticity than dentin and are associated with unrestorable vertical root fractures when failure occurs. Systematic reviews and meta-analyses consistently favor fiber posts over metal posts for their more favorable failure mode {{cite: Fernandes 2003}}."}, {"type": "ul", "items": ["How does post placement affect fracture resistance and failure mode?"], "raw": "- How does post placement affect fracture resistance and failure mode?"}, {"type": "p", "text": "Post placement per se does not increase fracture resistance compared to no post when adequate coronal structure exists. The crown provides the cuspal protection that significantly improves fracture resistance. Ferrule effect (2 mm of sound tooth structure circumferentially) is more important than post type for fracture resistance. Fiber posts promote restorable failures (debonding/decementation) while metal posts promote non-restorable failures (vertical root fracture) {{cite: Fernandes 2003}}.", "raw": "Post placement per se does not increase fracture resistance compared to no post when adequate coronal structure exists. The crown provides the cuspal protection that significantly improves fracture resistance. Ferrule effect (2 mm of sound tooth structure circumferentially) is more important than post type for fracture resistance. Fiber posts promote restorable failures (debonding/decementation) while metal posts promote non-restorable failures (vertical root fracture) {{cite: Fernandes 2003}}."}, {"type": "ul", "items": ["What is the optimal post length and diameter?"], "raw": "- What is the optimal post length and diameter?"}, {"type": "p", "text": "Post length should equal the crown-root ratio length (ideally 2/3 of the root length within bone), and a minimum of 1:1 post-to-crown length ratio is recommended. Post diameter should be 1/3 or less of root diameter to minimize root weakening. At least 5-7 mm of gutta percha should remain in the canal after post preparation (Mattison et al).", "raw": "Post length should equal the crown-root ratio length (ideally 2/3 of the root length within bone), and a minimum of 1:1 post-to-crown length ratio is recommended. Post diameter should be 1/3 or less of root diameter to minimize root weakening. At least 5-7 mm of gutta percha should remain in the canal after post preparation (Mattison et al)."}]}, {"id": "s8-restoration-83-core-material-selection", "number": "8.3", "title": "Core Material Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the properties of ideal core materials?"], "raw": "- What are the properties of ideal core materials?"}, {"type": "p", "text": "An ideal core material is: dimensionally stable (minimal shrinkage), biocompatible, adhesive to dentin or chemically retentive, sufficient compressive and tensile strength to support the overlying crown, moisture-tolerant (especially if placed immediately after obturation), and radiopaque for detectability.", "raw": "An ideal core material is: dimensionally stable (minimal shrinkage), biocompatible, adhesive to dentin or chemically retentive, sufficient compressive and tensile strength to support the overlying crown, moisture-tolerant (especially if placed immediately after obturation), and radiopaque for detectability."}, {"type": "ul", "items": ["How do different core materials (composite, amalgam, resin-modified GI) compare?"], "raw": "- How do different core materials (composite, amalgam, resin-modified GI) compare?"}, {"type": "p", "text": "Composite resin is the most commonly used core material: high compressive strength, bonds to dentin with adhesive systems, and is radiopaque. Amalgam provides excellent compressive strength and marginal adaptation over time but requires mechanical retention (undercuts or pins) and is not adhesive. Resin-modified glass ionomer (RMGI) is moisture-tolerant and fluoride-releasing but has lower strength and is best reserved for limited core buildups. In terms of clinical performance, composite and amalgam cores under crowns have similar survival rates. IRM (intermediate restorative material) is not suitable as a core material due to insufficient strength.", "raw": "Composite resin is the most commonly used core material: high compressive strength, bonds to dentin with adhesive systems, and is radiopaque. Amalgam provides excellent compressive strength and marginal adaptation over time but requires mechanical retention (undercuts or pins) and is not adhesive. Resin-modified glass ionomer (RMGI) is moisture-tolerant and fluoride-releasing but has lower strength and is best reserved for limited core buildups. In terms of clinical performance, composite and amalgam cores under crowns have similar survival rates. IRM (intermediate restorative material) is not suitable as a core material due to insufficient strength."}, {"type": "ul", "items": ["What bonding considerations are relevant for endodontically treated teeth?"], "raw": "- What bonding considerations are relevant for endodontically treated teeth?"}, {"type": "p", "text": "Eugenol-containing sealers (ZOE) can inhibit polymerization of resin composites and adhesives if residual sealer contaminates the pulp chamber. The use of self-etch or 10-MDP-based adhesives (e.g., Clearfil SE Bond, Panavia) is preferred in these situations as they are less inhibited by eugenol. Dentin in endodontically treated teeth may have reduced moisture, which can affect bond strength with total-etch systems; self-etch adhesives are generally more forgiving. NaOCl residue can inhibit polymerization; rinsing with sterile water or sodium thiosulfate before bonding is recommended.", "raw": "Eugenol-containing sealers (ZOE) can inhibit polymerization of resin composites and adhesives if residual sealer contaminates the pulp chamber. The use of self-etch or 10-MDP-based adhesives (e.g., Clearfil SE Bond, Panavia) is preferred in these situations as they are less inhibited by eugenol. Dentin in endodontically treated teeth may have reduced moisture, which can affect bond strength with total-etch systems; self-etch adhesives are generally more forgiving. NaOCl residue can inhibit polymerization; rinsing with sterile water or sodium thiosulfate before bonding is recommended."}]}, {"id": "s8-restoration-84-cuspal-coverage-decisions", "number": "8.4", "title": "Cuspal Coverage Decisions", "level": 2, "blocks": [{"type": "ul", "items": ["When is cuspal coverage indicated for endodontically treated teeth?"], "raw": "- When is cuspal coverage indicated for endodontically treated teeth?"}, {"type": "p", "text": "Cuspal coverage is indicated for posterior teeth (premolars and molars) after root canal treatment, as these teeth are subject to high occlusal forces and are at significantly higher risk of cuspal fracture. Anterior teeth with adequate remaining structure generally do not require full coverage if the access preparation can be adequately sealed with composite. Any tooth with 2 or more missing walls, heavy occlusal contacts, or parafunctional habits warrants cuspal coverage.", "raw": "Cuspal coverage is indicated for posterior teeth (premolars and molars) after root canal treatment, as these teeth are subject to high occlusal forces and are at significantly higher risk of cuspal fracture. Anterior teeth with adequate remaining structure generally do not require full coverage if the access preparation can be adequately sealed with composite. Any tooth with 2 or more missing walls, heavy occlusal contacts, or parafunctional habits warrants cuspal coverage."}, {"type": "ul", "items": ["How does cuspal coverage affect tooth survival?"], "raw": "- How does cuspal coverage affect tooth survival?"}, {"type": "p", "text": "Cuspal coverage dramatically improves survival of endodontically treated posterior teeth. ==Endodontically treated teeth without crowns are 6x more likely to be lost than those with crowns== {{cite: Aquilino and Caplan 2002}}. ==The study measured overall tooth loss/survival, not fracture specifically.== The survival benefit is greatest for posterior teeth under heavy occlusal loading.", "raw": "Cuspal coverage dramatically improves survival of endodontically treated posterior teeth. ==Endodontically treated teeth without crowns are 6x more likely to be lost than those with crowns== {{cite: Aquilino and Caplan 2002}}. ==The study measured overall tooth loss/survival, not fracture specifically.== The survival benefit is greatest for posterior teeth under heavy occlusal loading."}, {"type": "p", "text": "==Ray and Trope (1995) reported that the quality of coronal restoration had a greater impact on periapical health than the quality of the root canal filling in their retrospective cross-sectional study of 1,010 teeth. However, the subsequent Gillen et al. (2011) systematic review and meta-analysis found no statistically significant difference in healing odds between the two factors — both adequate restoration and adequate root canal treatment are independently critical for success.==", "raw": "==Ray and Trope (1995) reported that the quality of coronal restoration had a greater impact on periapical health than the quality of the root canal filling in their retrospective cross-sectional study of 1,010 teeth. However, the subsequent Gillen et al. (2011) systematic review and meta-analysis found no statistically significant difference in healing odds between the two factors — both adequate restoration and adequate root canal treatment are independently critical for success.=="}, {"type": "ul", "items": ["What factors influence the decision (tooth type, remaining structure, occlusal forces)?"], "raw": "- What factors influence the decision (tooth type, remaining structure, occlusal forces)?"}, {"type": "p", "text": "Key factors include: (1) tooth type — posterior teeth almost universally benefit from cuspal coverage; (2) remaining tooth structure — number of remaining walls, ferrule height, and cusp integrity; (3) occlusal forces — bruxers and those with high masticatory forces have greater need; (4) strategic importance of the tooth — abutment teeth for fixed or removable prostheses generally warrant the most durable restoration; (5) patient age and long-term treatment plan.", "raw": "Key factors include: (1) tooth type — posterior teeth almost universally benefit from cuspal coverage; (2) remaining tooth structure — number of remaining walls, ferrule height, and cusp integrity; (3) occlusal forces — bruxers and those with high masticatory forces have greater need; (4) strategic importance of the tooth — abutment teeth for fixed or removable prostheses generally warrant the most durable restoration; (5) patient age and long-term treatment plan."}, {"type": "ul", "items": ["What is the evidence for different types of cuspal coverage (crown, onlay, overlay)?"], "raw": "- What is the evidence for different types of cuspal coverage (crown, onlay, overlay)?"}, {"type": "p", "text": "Direct composite overlays provide an adhesive, minimally invasive option for teeth with adequate remaining structure. Ceramic or indirect onlays/overlays offer superior strength and wear resistance compared to direct composites. Full coverage crowns remain the traditional choice for heavily broken-down teeth but sacrifice additional tooth structure. Studies show similar outcomes between indirect onlays and crowns when ferrule is adequate and bonding principles are followed.", "raw": "Direct composite overlays provide an adhesive, minimally invasive option for teeth with adequate remaining structure. Ceramic or indirect onlays/overlays offer superior strength and wear resistance compared to direct composites. Full coverage crowns remain the traditional choice for heavily broken-down teeth but sacrifice additional tooth structure. Studies show similar outcomes between indirect onlays and crowns when ferrule is adequate and bonding principles are followed."}, {"type": "ul", "items": ["What percentage of crowned vital teeth will eventually need RCT?"], "raw": "- What percentage of crowned vital teeth will eventually need RCT?"}, {"type": "p", "text": "==17% of crowned teeth (vital and root-filled combined) developed pulpal complications requiring endodontic treatment over 25 years (Valderhaug et al). The Cheung 2005 study reported 33.8% pulp necrosis in bridge retainer teeth at 10 years — note this applies to fixed bridge retainers, not removable partial denture abutments.==", "raw": "==17% of crowned teeth (vital and root-filled combined) developed pulpal complications requiring endodontic treatment over 25 years (Valderhaug et al). The Cheung 2005 study reported 33.8% pulp necrosis in bridge retainer teeth at 10 years — note this applies to fixed bridge retainers, not removable partial denture abutments.=="}]}, {"id": "s8-restoration-85-post-operative-pain-and-occlusal-adjustment", "number": "8.5", "title": "Post-Operative Pain and Occlusal Adjustment", "level": 2, "blocks": [{"type": "ul", "items": ["Does occlusal adjustment decrease post-operative pain?"], "raw": "- Does occlusal adjustment decrease post-operative pain?"}, {"type": "p", "text": "According to Rosenberg, occlusal adjustment decreases post-op pain when there is: 1) preoperative pain, 2) percussion sensitivity, 3) pulp vitality, and 4) absence of a periapical radiolucency.", "raw": "According to Rosenberg, occlusal adjustment decreases post-op pain when there is: 1) preoperative pain, 2) percussion sensitivity, 3) pulp vitality, and 4) absence of a periapical radiolucency."}]}]}, {"id": "s9-complications-and-management", "number": "9", "title": "Complications and Management", "level": 1, "blocks": [], "subsections": [{"id": "s9-complications-and-management-91-instrument-separation-management", "number": "9.1", "title": "Instrument Separation Management", "level": 2, "blocks": [{"type": "ul", "items": ["What factors determine prognosis after instrument separation?"], "raw": "- What factors determine prognosis after instrument separation?"}, {"type": "p", "text": "The presence of a pre-operative periapical lesion has the greatest impact on outcome (Spili and Messer). When the canal can be cleaned and obturated to the level of the fragment in a tooth without pre-operative pathosis, long-term success rates are comparable to treatment without separation.", "raw": "The presence of a pre-operative periapical lesion has the greatest impact on outcome (Spili and Messer). When the canal can be cleaned and obturated to the level of the fragment in a tooth without pre-operative pathosis, long-term success rates are comparable to treatment without separation."}, {"type": "ul", "items": ["What techniques are available for separated instrument retrieval?"], "raw": "- What techniques are available for separated instrument retrieval?"}, {"type": "p", "text": "The principal retrieval techniques are bypassing the fragment with fine hand files and removing or loosening it with ultrasonic vibration under magnification. Specialized kits (e.g., Instrument Removal System, loop techniques) may be used when ultrasonics alone are insufficient.", "raw": "The principal retrieval techniques are bypassing the fragment with fine hand files and removing or loosening it with ultrasonic vibration under magnification. Specialized kits (e.g., Instrument Removal System, loop techniques) may be used when ultrasonics alone are insufficient."}, {"type": "ul", "items": ["When should you attempt bypass vs. retrieval vs. leave in place?"], "raw": "- When should you attempt bypass vs. retrieval vs. leave in place?"}, {"type": "p", "text": "Leave the instrument in place and obturate to that level when attempting removal would cause more structural compromise or perforation risk than the fragment itself {{cite: Madarati 2018}}. Bypassing is preferred over aggressive retrieval whenever feasible.", "raw": "Leave the instrument in place and obturate to that level when attempting removal would cause more structural compromise or perforation risk than the fragment itself {{cite: Madarati 2018}}. Bypassing is preferred over aggressive retrieval whenever feasible."}, {"type": "ul", "items": ["How does separated instrument affect treatment outcomes?"], "raw": "- How does separated instrument affect treatment outcomes?"}, {"type": "p", "text": "No significant effect of instrument separation on treatment outcomes if there was no pre-op PA and the fracture occurred in the apical 1/3 {{cite: Spili 2005}}.", "raw": "No significant effect of instrument separation on treatment outcomes if there was no pre-op PA and the fracture occurred in the apical 1/3 {{cite: Spili 2005}}."}]}, {"id": "s9-complications-and-management-92-perforation-repair-timing-and-materials", "number": "9.2", "title": "Perforation Repair Timing and Materials", "level": 2, "blocks": [{"type": "ul", "items": ["How does perforation location affect prognosis?"], "raw": "- How does perforation location affect prognosis?"}, {"type": "p", "text": "The 1-year and beyond perforation repair success rate is 86% (Mente). Overall pooled success is 72.5% but MTA use increases that to 80.9% (Mente).", "raw": "The 1-year and beyond perforation repair success rate is 86% (Mente). Overall pooled success is 72.5% but MTA use increases that to 80.9% (Mente)."}, {"type": "ul", "items": ["What is the evidence for immediate vs. delayed perforation repair?"], "raw": "- What is the evidence for immediate vs. delayed perforation repair?"}, {"type": "p", "text": "Mente 2014 and Pontious 2013 showed that immediate repair with MTA had similar success rates to traditional NSRCT.", "raw": "Mente 2014 and Pontious 2013 showed that immediate repair with MTA had similar success rates to traditional NSRCT."}, {"type": "ul", "items": ["What factors predict success of perforation repair?"], "raw": "- What factors predict success of perforation repair?"}, {"type": "p", "text": "Time, size and location (crestal is the worst) {{cite: Fuss and Trope 1996}}.", "raw": "Time, size and location (crestal is the worst) {{cite: Fuss and Trope 1996}}."}]}, {"id": "s9-complications-and-management-93-ledgetransportation-management", "number": "9.3", "title": "Ledge/Transportation Management", "level": 2, "blocks": [{"type": "ul", "items": ["What techniques are used to negotiate ledges?"], "raw": "- What techniques are used to negotiate ledges?"}, {"type": "p", "text": "A ledge is an artificially created irregularity on the canal wall that prevents instruments from progressing to the apex. Techniques for negotiation include: (1) pre-curving a small stainless steel hand file (size 10 or 15) in the direction of the ledge to deflect past the obstruction; (2) recapitulation with short, watch-winding, patency-maintaining strokes; (3) use of chelating agents (e.g., EDTA) to soften dentin and aid progression; (4) magnification (microscope or loupes) to visualize the original canal path; and (5) in severe cases, CBCT imaging to confirm canal anatomy before attempting negotiation. Once bypassed, the ledge area should be smoothed with small rotary files using light pressure.", "raw": "A ledge is an artificially created irregularity on the canal wall that prevents instruments from progressing to the apex. Techniques for negotiation include: (1) pre-curving a small stainless steel hand file (size 10 or 15) in the direction of the ledge to deflect past the obstruction; (2) recapitulation with short, watch-winding, patency-maintaining strokes; (3) use of chelating agents (e.g., EDTA) to soften dentin and aid progression; (4) magnification (microscope or loupes) to visualize the original canal path; and (5) in severe cases, CBCT imaging to confirm canal anatomy before attempting negotiation. Once bypassed, the ledge area should be smoothed with small rotary files using light pressure."}, {"type": "ul", "items": ["How does canal transportation affect treatment outcomes?"], "raw": "- How does canal transportation affect treatment outcomes?"}, {"type": "p", "text": "Canal transportation (deviation of the prepared canal from the original canal path) is associated with reduced treatment success, particularly when apical transportation occurs. Apical transportation can result in loss of the apical stop (causing obturation difficulties), perforation, and reduced seal quality. A systematic review by Peters (2004) noted that transportation was most severe in the apical 5 mm and was related to instrument stiffness and technique. Outcomes are inferior when significant transportation is accompanied by a pre-existing periapical lesion {{cite: Peters 2004}}.", "raw": "Canal transportation (deviation of the prepared canal from the original canal path) is associated with reduced treatment success, particularly when apical transportation occurs. Apical transportation can result in loss of the apical stop (causing obturation difficulties), perforation, and reduced seal quality. A systematic review by Peters (2004) noted that transportation was most severe in the apical 5 mm and was related to instrument stiffness and technique. Outcomes are inferior when significant transportation is accompanied by a pre-existing periapical lesion {{cite: Peters 2004}}."}, {"type": "ul", "items": ["What is the acceptable degree of transportation?"], "raw": "- What is the acceptable degree of transportation?"}, {"type": "p", "text": "Minor transportation (<0.3 mm) in the coronal and middle thirds generally does not compromise outcomes. Apical transportation >0.3 mm has a clinically significant negative impact on canal seal and outcomes. Transportation that results in perforation is a serious complication requiring immediate repair. Use of NiTi rotary systems significantly reduces transportation compared to stainless steel files due to the shape memory and flexibility of NiTi alloy.", "raw": "Minor transportation (<0.3 mm) in the coronal and middle thirds generally does not compromise outcomes. Apical transportation >0.3 mm has a clinically significant negative impact on canal seal and outcomes. Transportation that results in perforation is a serious complication requiring immediate repair. Use of NiTi rotary systems significantly reduces transportation compared to stainless steel files due to the shape memory and flexibility of NiTi alloy."}]}, {"id": "s9-complications-and-management-94-sodium-hypochlorite-accident-response", "number": "9.4", "title": "Sodium Hypochlorite Accident Response", "level": 2, "blocks": [{"type": "ul", "items": ["What is the mechanism of injury in NaOCl accidents?"], "raw": "- What is the mechanism of injury in NaOCl accidents?"}, {"type": "p", "text": "NaOCl accidents occur when irrigant is extruded beyond the apex into periapical tissues. The mechanism of injury is a combination of: (1) direct cytotoxic and hemolytic effect of NaOCl on soft tissue proteins (rapid dissolution of organic tissue); (2) osmotic effect causing tissue edema; and (3) in severe cases, penetration into blood vessels causing systemic effects including subcutaneous emphysema, ecchymosis, and even airway compromise. The severity is directly related to concentration, volume extruded, and pressure of delivery.", "raw": "NaOCl accidents occur when irrigant is extruded beyond the apex into periapical tissues. The mechanism of injury is a combination of: (1) direct cytotoxic and hemolytic effect of NaOCl on soft tissue proteins (rapid dissolution of organic tissue); (2) osmotic effect causing tissue edema; and (3) in severe cases, penetration into blood vessels causing systemic effects including subcutaneous emphysema, ecchymosis, and even airway compromise. The severity is directly related to concentration, volume extruded, and pressure of delivery."}, {"type": "ul", "items": ["What is the immediate management protocol?"], "raw": "- What is the immediate management protocol?"}, {"type": "p", "text": "Immediate steps: (1) stop irrigation immediately; (2) place patient supine if near syncope; (3) apply cold compresses to the affected region to reduce swelling; (4) prescribe analgesics (NSAIDs +/- opioids) for pain management; (5) prescribe corticosteroids (dexamethasone 4 mg) to reduce inflammatory edema; (6) prescribe antibiotics (amoxicillin 500 mg TID x 7 days) as prophylaxis against secondary infection; (7) instruct patient on signs of airway compromise and when to go to the emergency room; (8) document the event thoroughly; (9) follow up within 24-48 hours {{cite: Hulsmann 2000}}.", "raw": "Immediate steps: (1) stop irrigation immediately; (2) place patient supine if near syncope; (3) apply cold compresses to the affected region to reduce swelling; (4) prescribe analgesics (NSAIDs +/- opioids) for pain management; (5) prescribe corticosteroids (dexamethasone 4 mg) to reduce inflammatory edema; (6) prescribe antibiotics (amoxicillin 500 mg TID x 7 days) as prophylaxis against secondary infection; (7) instruct patient on signs of airway compromise and when to go to the emergency room; (8) document the event thoroughly; (9) follow up within 24-48 hours {{cite: Hulsmann 2000}}."}, {"type": "ul", "items": ["What is the expected clinical course and long-term sequelae?"], "raw": "- What is the expected clinical course and long-term sequelae?"}, {"type": "p", "text": "The initial triad of signs are sudden pain, profuse bleeding, and immediate swelling.", "raw": "The initial triad of signs are sudden pain, profuse bleeding, and immediate swelling."}, {"type": "p", "text": "Swelling typically peaks at 24-48 hours and gradually resolves over 1-2 weeks. Ecchymosis and bruising tracking along fascial planes may appear and spread over several days. Most patients recover fully within 2-4 weeks without permanent sequelae. In severe cases: nerve damage (paresthesia), tissue necrosis requiring surgical debridement, and infection are possible complications. Scarring is rare but possible. Prognosis of the tooth itself depends on how well the root canal can ultimately be completed.", "raw": "Swelling typically peaks at 24-48 hours and gradually resolves over 1-2 weeks. Ecchymosis and bruising tracking along fascial planes may appear and spread over several days. Most patients recover fully within 2-4 weeks without permanent sequelae. In severe cases: nerve damage (paresthesia), tissue necrosis requiring surgical debridement, and infection are possible complications. Scarring is rare but possible. Prognosis of the tooth itself depends on how well the root canal can ultimately be completed."}, {"type": "ul", "items": ["What preventive measures reduce risk?"], "raw": "- What preventive measures reduce risk?"}, {"type": "p", "text": "Use passive, low-pressure irrigation delivery (no luer-lock syringe forced to depth). Maintain a safety zone: needle 2-3 mm short of working length, with side-venting needles (not end-venting). Use lower concentrations (1-2.5%) especially in immature teeth or teeth with open apices. Avoid forcing irrigant under pressure. Confirm working length before initiating NaOCl irrigation.", "raw": "Use passive, low-pressure irrigation delivery (no luer-lock syringe forced to depth). Maintain a safety zone: needle 2-3 mm short of working length, with side-venting needles (not end-venting). Use lower concentrations (1-2.5%) especially in immature teeth or teeth with open apices. Avoid forcing irrigant under pressure. Confirm working length before initiating NaOCl irrigation."}]}, {"id": "s9-complications-and-management-95-flare-up-management", "number": "9.5", "title": "Flare-Up Management", "level": 2, "blocks": [{"type": "ul", "items": ["What is the incidence and etiology of endodontic flare-ups?"], "raw": "- What is the incidence and etiology of endodontic flare-ups?"}, {"type": "p", "text": "The incidence of flare-ups is 8.4% (Tsesis). The incidence is around 5.8% in teeth with periapical lesions (Yu et al).", "raw": "The incidence of flare-ups is 8.4% (Tsesis). The incidence is around 5.8% in teeth with periapical lesions (Yu et al)."}, {"type": "ul", "items": ["What factors increase flare-up risk?"], "raw": "- What factors increase flare-up risk?"}, {"type": "p", "text": "Diabetes increases the rate of flare-ups and reduces overall success (Fouad and Burleson). Walton's review identified several factors that increase flare-up risk: female sex, pulpal necrosis, acute apical abscess, acute apical periodontitis, large periradicular radiolucency, and pre-operative pain or swelling. Conversely, vital pulps, the presence of a sinus tract, and completion of obturation at the same visit are associated with decreased flare-up incidence.", "raw": "Diabetes increases the rate of flare-ups and reduces overall success (Fouad and Burleson). Walton's review identified several factors that increase flare-up risk: female sex, pulpal necrosis, acute apical abscess, acute apical periodontitis, large periradicular radiolucency, and pre-operative pain or swelling. Conversely, vital pulps, the presence of a sinus tract, and completion of obturation at the same visit are associated with decreased flare-up incidence."}, {"type": "ul", "items": ["What is the management protocol for flare-ups?"], "raw": "- What is the management protocol for flare-ups?"}, {"type": "p", "text": "Management depends on severity: (1) Mild flare-up (pain without swelling): analgesics (NSAIDs first-line), reassurance, follow-up in 24-48 hours; (2) Moderate flare-up (pain + localized swelling without fluctuance): analgesics + corticosteroids (dexamethasone) to reduce inflammation, possible re-entry for additional irrigation and debridement; (3) Severe flare-up (fluctuant swelling, fever, systemic involvement): incision and drainage if fluctuant, antibiotics, referral if airway/systemic compromise is present. Trephination (penetrating through bone to allow drainage) is an option in non-fluctuant symptomatic cases. Re-entry and additional instrumentation and irrigation may be beneficial.", "raw": "Management depends on severity: (1) Mild flare-up (pain without swelling): analgesics (NSAIDs first-line), reassurance, follow-up in 24-48 hours; (2) Moderate flare-up (pain + localized swelling without fluctuance): analgesics + corticosteroids (dexamethasone) to reduce inflammation, possible re-entry for additional irrigation and debridement; (3) Severe flare-up (fluctuant swelling, fever, systemic involvement): incision and drainage if fluctuant, antibiotics, referral if airway/systemic compromise is present. Trephination (penetrating through bone to allow drainage) is an option in non-fluctuant symptomatic cases. Re-entry and additional instrumentation and irrigation may be beneficial."}, {"type": "ul", "items": ["When are antibiotics indicated?"], "raw": "- When are antibiotics indicated?"}, {"type": "p", "text": "Antibiotics are indicated when there are signs of systemic involvement (fever >101°F, malaise, cellulitis with diffuse swelling that crosses fascial planes, lymphadenopathy, or trismus). Antibiotics are NOT indicated for localized, fluctuant abscesses that can be adequately drained. Over-prescription of antibiotics for dental pain without evidence of spreading infection contributes significantly to antibiotic resistance. Amoxicillin 500 mg TID for 7 days is the first-line agent; clindamycin or azithromycin for penicillin-allergic patients {{cite: Fouad and Burleson 2003}}.", "raw": "Antibiotics are indicated when there are signs of systemic involvement (fever >101°F, malaise, cellulitis with diffuse swelling that crosses fascial planes, lymphadenopathy, or trismus). Antibiotics are NOT indicated for localized, fluctuant abscesses that can be adequately drained. Over-prescription of antibiotics for dental pain without evidence of spreading infection contributes significantly to antibiotic resistance. Amoxicillin 500 mg TID for 7 days is the first-line agent; clindamycin or azithromycin for penicillin-allergic patients {{cite: Fouad and Burleson 2003}}."}]}, {"id": "s9-complications-and-management-96-persistent-infection-workup", "number": "9.6", "title": "Persistent Infection Workup", "level": 2, "blocks": [{"type": "ul", "items": ["What are the causes of persistent periapical pathosis?"], "raw": "- What are the causes of persistent periapical pathosis?"}, {"type": "p", "text": "Causes include periapical actinomycosis (Nair). The prevalence of apical periodontitis in endodontically treated teeth is 41.3% (Jakovljevic et al).", "raw": "Causes include periapical actinomycosis (Nair). The prevalence of apical periodontitis in endodontically treated teeth is 41.3% (Jakovljevic et al)."}, {"type": "ul", "items": ["What diagnostic workup is indicated for persistent disease?"], "raw": "- What diagnostic workup is indicated for persistent disease?"}, {"type": "p", "text": "Workup for persistent periapical pathosis should include: (1) updated periapical radiographs and CBCT to assess for missed canals, untreated anatomy, or extent of lesion; (2) review of original treatment quality (obturation length, density, coronal seal); (3) clinical examination for sinus tracts (trace with gutta-percha point to confirm origin); (4) percussion and palpation testing; (5) assessment for non-endodontic causes (vertical root fracture, periodontal disease, non-odontogenic pathology). CBCT is particularly valuable for detecting missed canals (e.g., MB2 in maxillary molars, middle mesial in mandibular molars) and assessing the relationship of the lesion to adjacent structures {{cite: Lofthag-Hansen 2007}}.", "raw": "Workup for persistent periapical pathosis should include: (1) updated periapical radiographs and CBCT to assess for missed canals, untreated anatomy, or extent of lesion; (2) review of original treatment quality (obturation length, density, coronal seal); (3) clinical examination for sinus tracts (trace with gutta-percha point to confirm origin); (4) percussion and palpation testing; (5) assessment for non-endodontic causes (vertical root fracture, periodontal disease, non-odontogenic pathology). CBCT is particularly valuable for detecting missed canals (e.g., MB2 in maxillary molars, middle mesial in mandibular molars) and assessing the relationship of the lesion to adjacent structures {{cite: Lofthag-Hansen 2007}}."}, {"type": "ul", "items": ["What is the role of microbial sampling/culture?"], "raw": "- What is the role of microbial sampling/culture?"}, {"type": "p", "text": "Microbial sampling and culture are not routinely performed in standard endodontic practice. They may be considered in immunocompromised patients, cases of persistent infection despite adequate treatment, or in cases of systemic spread. Paper point sampling of the root canal followed by anaerobic culture can guide antibiotic selection in refractory cases. The most common persistent organism in previously treated canals is Enterococcus faecalis, which is resistant to CaOH and many standard intracanal medicaments due to its ability to survive in nutrient-poor, alkaline environments {{cite: Sundqvist 1998}}.", "raw": "Microbial sampling and culture are not routinely performed in standard endodontic practice. They may be considered in immunocompromised patients, cases of persistent infection despite adequate treatment, or in cases of systemic spread. Paper point sampling of the root canal followed by anaerobic culture can guide antibiotic selection in refractory cases. The most common persistent organism in previously treated canals is Enterococcus faecalis, which is resistant to CaOH and many standard intracanal medicaments due to its ability to survive in nutrient-poor, alkaline environments {{cite: Sundqvist 1998}}."}, {"type": "ul", "items": ["When should extraradicular infection be suspected?"], "raw": "- When should extraradicular infection be suspected?"}, {"type": "p", "text": "Extraradicular infection should be suspected when: (1) periapical pathosis persists despite technically adequate retreatment; (2) a sinus tract persists post-treatment; (3) there is a large, longstanding lesion (>1 cm); (4) the lesion does not decrease in size after 12 months of well-executed treatment. Periapical actinomycosis (Nair) is the classic extraradicular infection; biofilm adherent to the outer root surface can maintain pathosis despite canal disinfection. True periapical cysts (bay cysts with epithelial lining independent of the root) may also require surgical management for resolution.", "raw": "Extraradicular infection should be suspected when: (1) periapical pathosis persists despite technically adequate retreatment; (2) a sinus tract persists post-treatment; (3) there is a large, longstanding lesion (>1 cm); (4) the lesion does not decrease in size after 12 months of well-executed treatment. Periapical actinomycosis (Nair) is the classic extraradicular infection; biofilm adherent to the outer root surface can maintain pathosis despite canal disinfection. True periapical cysts (bay cysts with epithelial lining independent of the root) may also require surgical management for resolution."}]}, {"id": "s9-complications-and-management-97-cemental-tears", "number": "9.7", "title": "Cemental Tears", "level": 2, "blocks": [{"type": "ul", "items": ["What is the etiology of cemental tears?"], "raw": "- What is the etiology of cemental tears?"}, {"type": "p", "text": "Cemental tears are most often caused by traumatic occlusion (Haney).", "raw": "Cemental tears are most often caused by traumatic occlusion (Haney)."}, {"type": "ul", "items": ["What is the most effective treatment approach for cemental tears?"], "raw": "- What is the most effective treatment approach for cemental tears?"}, {"type": "p", "text": "Lin's systematic review found surgical approach to be most effective for treatment. Mid and apical root cemental tears had the best treatment success.", "raw": "Lin's systematic review found surgical approach to be most effective for treatment. Mid and apical root cemental tears had the best treatment success."}]}]}, {"id": "s10-surgical-endodontics", "number": "10", "title": "Surgical Endodontics", "level": 1, "blocks": [], "subsections": [{"id": "s10-surgical-endodontics-101-case-selection-criteria", "number": "10.1", "title": "Case Selection Criteria", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for apical surgery?"], "raw": "- What are the indications for apical surgery?"}, {"type": "p", "text": "Apical surgery is indicated for post-treatment disease that persists after non-surgical retreatment, for cases where non-surgical retreatment is not feasible (e.g., intact crown with well-seated post), and for obtaining biopsy when non-odontogenic pathology is suspected.", "raw": "Apical surgery is indicated for post-treatment disease that persists after non-surgical retreatment, for cases where non-surgical retreatment is not feasible (e.g., intact crown with well-seated post), and for obtaining biopsy when non-odontogenic pathology is suspected."}, {"type": "ul", "items": ["What are the contraindications (local and systemic)?"], "raw": "- What are the contraindications (local and systemic)?"}, {"type": "p", "text": "Local contraindications include inadequate surgical access, proximity to vital anatomical structures that cannot be safely navigated, and hopeless restorability. Systemic contraindications include uncontrolled bleeding disorders, recent myocardial infarction, active chemotherapy or radiation to the surgical field, and bisphosphonate-associated risk of osteonecrosis.", "raw": "Local contraindications include inadequate surgical access, proximity to vital anatomical structures that cannot be safely navigated, and hopeless restorability. Systemic contraindications include uncontrolled bleeding disorders, recent myocardial infarction, active chemotherapy or radiation to the surgical field, and bisphosphonate-associated risk of osteonecrosis."}, {"type": "ul", "items": ["How do you assess surgical access and anatomical considerations?"], "raw": "- How do you assess surgical access and anatomical considerations?"}, {"type": "p", "text": "CBCT is the imaging modality of choice for pre-surgical planning. It identifies critical anatomy including root position, cortical plate thickness, and proximity to neurovascular structures and the maxillary sinus. Pagin et al. found that 14% of maxillary molar roots perforate the maxillary sinus floor.", "raw": "CBCT is the imaging modality of choice for pre-surgical planning. It identifies critical anatomy including root position, cortical plate thickness, and proximity to neurovascular structures and the maxillary sinus. Pagin et al. found that 14% of maxillary molar roots perforate the maxillary sinus floor."}, {"type": "ul", "items": ["Do oroantral communications affect the outcome of apical surgery?"], "raw": "- Do oroantral communications affect the outcome of apical surgery?"}, {"type": "p", "text": "No — Ericson found that oroantral communications during apical surgery do not adversely affect surgical outcomes provided the site is managed appropriately.", "raw": "No — Ericson found that oroantral communications during apical surgery do not adversely affect surgical outcomes provided the site is managed appropriately."}, {"type": "ul", "items": ["What anatomical features should be considered for mandibular surgery?"], "raw": "- What anatomical features should be considered for mandibular surgery?"}, {"type": "p", "text": "1) Proximity to IAN", "raw": "1) Proximity to IAN"}, {"type": "p", "text": "2) Proximity to mental foramen (56% between premolars, 25.7% inferior to the second premolar)", "raw": "2) Proximity to mental foramen (56% between premolars, 25.7% inferior to the second premolar)"}, {"type": "p", "text": "3) Anterior loop of mental foramen", "raw": "3) Anterior loop of mental foramen"}, {"type": "p", "text": "4) Accessory mental foramina (7% of patients, Naitoh)", "raw": "4) Accessory mental foramina (7% of patients, Naitoh)"}, {"type": "p", "text": "5) Position of roots relative to cortical plates", "raw": "5) Position of roots relative to cortical plates"}, {"type": "ul", "items": ["How do you avoid the mental foramen?"], "raw": "- How do you avoid the mental foramen?"}, {"type": "p", "text": "Triangle flap with distal vertical incision, grove for retractor (Moiseiwitsch)", "raw": "Triangle flap with distal vertical incision, grove for retractor (Moiseiwitsch)"}, {"type": "ul", "items": ["What is the success rate of modern EMS compared to traditional techniques?"], "raw": "- What is the success rate of modern EMS compared to traditional techniques?"}, {"type": "p", "text": "Modern techniques: 94%, Traditional techniques: 59% (Setzer).", "raw": "Modern techniques: 94%, Traditional techniques: 59% (Setzer)."}, {"type": "ul", "items": ["What percentage of periapical lesions are scars?"], "raw": "- What percentage of periapical lesions are scars?"}, {"type": "p", "text": "25.7% of periapical lesions are scars - this should be considered when evaluating a patient for surgery (Carrillo).", "raw": "25.7% of periapical lesions are scars - this should be considered when evaluating a patient for surgery (Carrillo)."}, {"type": "ul", "items": ["How long should one wait before removing sutures?"], "raw": "- How long should one wait before removing sutures?"}, {"type": "p", "text": "Hiatt reported that wound stability is 10× greater at 2 weeks compared to earlier removal. Velvart and Peters recommended suture removal at 48–96 hours in modern microsurgical technique, when monofilament sutures are used and early healing is already advanced.", "raw": "Hiatt reported that wound stability is 10× greater at 2 weeks compared to earlier removal. Velvart and Peters recommended suture removal at 48–96 hours in modern microsurgical technique, when monofilament sutures are used and early healing is already advanced."}, {"type": "ul", "items": ["Should aspirin be stopped prior to surgery?"], "raw": "- Should aspirin be stopped prior to surgery?"}, {"type": "p", "text": "No. A meta-analysis of 10 studies by Zhao found no clinically significant increase in bleeding with continued aspirin use during dental and periapical surgery, and stopping aspirin exposes patients to unnecessary thromboembolic risk.", "raw": "No. A meta-analysis of 10 studies by Zhao found no clinically significant increase in bleeding with continued aspirin use during dental and periapical surgery, and stopping aspirin exposes patients to unnecessary thromboembolic risk."}]}, {"id": "s10-surgical-endodontics-102-flap-design-selection", "number": "10.2", "title": "Flap Design Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the principles of surgical flap design in endodontic surgery?"], "raw": "- What are the principles of surgical flap design in endodontic surgery?"}, {"type": "p", "text": "A well-designed flap provides adequate access to the surgical site while preserving blood supply, protecting esthetics, and enabling tension-free closure. Key principles include incisions over sound bone, wide-based flaps for adequate vascularization, preservation of marginal and papillary gingiva when possible, and vertical releasing incisions placed at line angles rather than over root eminences.", "raw": "A well-designed flap provides adequate access to the surgical site while preserving blood supply, protecting esthetics, and enabling tension-free closure. Key principles include incisions over sound bone, wide-based flaps for adequate vascularization, preservation of marginal and papillary gingiva when possible, and vertical releasing incisions placed at line angles rather than over root eminences."}, {"type": "ul", "items": ["How do different flap designs (submarginal, sulcular, papilla-based) compare?"], "raw": "- How do different flap designs (submarginal, sulcular, papilla-based) compare?"}, {"type": "p", "text": "The **sulcular (full-thickness)** flap provides maximum access and visibility but carries a higher risk of papillary recession and gingival scarring. The **submarginal (Luebke-Ochsenbein)** flap preserves the marginal gingiva and is preferred in esthetic zones with adequate attached gingiva, but it can leave a visible scar. The **papilla-based incision** (Velvart) preserves the interdental papilla and minimizes papillary recession, making it the preferred choice in anterior esthetic cases.", "raw": "The **sulcular (full-thickness)** flap provides maximum access and visibility but carries a higher risk of papillary recession and gingival scarring. The **submarginal (Luebke-Ochsenbein)** flap preserves the marginal gingiva and is preferred in esthetic zones with adequate attached gingiva, but it can leave a visible scar. The **papilla-based incision** (Velvart) preserves the interdental papilla and minimizes papillary recession, making it the preferred choice in anterior esthetic cases."}, {"type": "ul", "items": ["What factors determine flap selection (esthetics, recession risk, access)?"], "raw": "- What factors determine flap selection (esthetics, recession risk, access)?"}, {"type": "p", "text": "Flap selection is driven by esthetic demands, the height of attached gingiva, crown margins and restorations in the surgical field, and the extent of access required for the osteotomy and root-end procedures.", "raw": "Flap selection is driven by esthetic demands, the height of attached gingiva, crown margins and restorations in the surgical field, and the extent of access required for the osteotomy and root-end procedures."}, {"type": "ul", "items": ["Why would you use 1:50,000 epinephrine anesthetic during surgery?"], "raw": "- Why would you use 1:50,000 epinephrine anesthetic during surgery?"}, {"type": "p", "text": "A 1:50,000 epinephrine concentration roughly halves intra-operative blood loss compared with 1:100,000, improving visibility in the surgical field (Buckley et al.).", "raw": "A 1:50,000 epinephrine concentration roughly halves intra-operative blood loss compared with 1:100,000, improving visibility in the surgical field (Buckley et al.)."}, {"type": "ul", "items": ["What sutures should be used?"], "raw": "- What sutures should be used?"}, {"type": "p", "text": "Thin, monofilament, synthetic sutures (e.g., 6-0 polypropylene) are preferred because they minimize bacterial wicking and inflammatory tissue reaction (Velvart and Peters).", "raw": "Thin, monofilament, synthetic sutures (e.g., 6-0 polypropylene) are preferred because they minimize bacterial wicking and inflammatory tissue reaction (Velvart and Peters)."}]}, {"id": "s10-surgical-endodontics-103-osteotomy-technique", "number": "10.3", "title": "Osteotomy Technique", "level": 2, "blocks": [{"type": "ul", "items": ["What size osteotomy provides adequate access while preserving bone?"], "raw": "- What size osteotomy provides adequate access while preserving bone?"}, {"type": "p", "text": "The osteotomy should be just large enough to allow comfortable ultrasonic root-end preparation and retrofill placement — typically 4–5 mm — while preserving as much cortical and cancellous bone as possible (Toronto Study).", "raw": "The osteotomy should be just large enough to allow comfortable ultrasonic root-end preparation and retrofill placement — typically 4–5 mm — while preserving as much cortical and cancellous bone as possible (Toronto Study)."}, {"type": "ul", "items": ["What instruments and techniques are used for osteotomy?"], "raw": "- What instruments and techniques are used for osteotomy?"}, {"type": "p", "text": "Either a surgical bur (e.g., Lindemann, round carbide) with copious irrigation or a piezoelectric device (piezotome) can be used. Piezosurgery offers selective cutting of hard tissue while sparing adjacent soft tissues such as nerves and the sinus membrane. A radiopaque marker (e.g., lead foil) or CBCT-guided template (TEMS) can aid in localizing the root apex. For the smoothest, flattest resected root surface, a multipurpose fissure bur is recommended (Morgan).", "raw": "Either a surgical bur (e.g., Lindemann, round carbide) with copious irrigation or a piezoelectric device (piezotome) can be used. Piezosurgery offers selective cutting of hard tissue while sparing adjacent soft tissues such as nerves and the sinus membrane. A radiopaque marker (e.g., lead foil) or CBCT-guided template (TEMS) can aid in localizing the root apex. For the smoothest, flattest resected root surface, a multipurpose fissure bur is recommended (Morgan)."}, {"type": "ul", "items": ["How do you manage proximity to anatomical structures?"], "raw": "- How do you manage proximity to anatomical structures?"}, {"type": "p", "text": "Pre-operative CBCT planning is essential. Intra-operatively, maintain direct visualization with the microscope, use appropriate retraction to protect adjacent structures, and employ piezoelectric instruments in sensitive areas (near the IAN, mental foramen, or maxillary sinus).", "raw": "Pre-operative CBCT planning is essential. Intra-operatively, maintain direct visualization with the microscope, use appropriate retraction to protect adjacent structures, and employ piezoelectric instruments in sensitive areas (near the IAN, mental foramen, or maxillary sinus)."}]}, {"id": "s10-surgical-endodontics-104-root-end-resection-depth-and-angle", "number": "10.4", "title": "Root-End Resection Depth and Angle", "level": 2, "blocks": [{"type": "ul", "items": ["What is the recommended root-end resection amount and rationale?"], "raw": "- What is the recommended root-end resection amount and rationale?"}, {"type": "p", "text": "A 3 mm resection removes the majority of apical ramifications and lateral canals within the apical delta (Kim and Kratchman; Block). Weller recommends 4 mm as necessary to reliably expose the isthmus between mesial canals in most cases.", "raw": "A 3 mm resection removes the majority of apical ramifications and lateral canals within the apical delta (Kim and Kratchman; Block). Weller recommends 4 mm as necessary to reliably expose the isthmus between mesial canals in most cases."}, {"type": "ul", "items": ["What angle of resection is optimal and why?"], "raw": "- What angle of resection is optimal and why?"}, {"type": "p", "text": "A 0° (perpendicular) bevel is optimal (Gilheany and Figdor) because it minimizes the number of dentinal tubules exposed on the cut surface and thereby reduces apical microleakage.", "raw": "A 0° (perpendicular) bevel is optimal (Gilheany and Figdor) because it minimizes the number of dentinal tubules exposed on the cut surface and thereby reduces apical microleakage."}, {"type": "ul", "items": ["How does resection level affect exposure of anatomical complexities?"], "raw": "- How does resection level affect exposure of anatomical complexities?"}, {"type": "p", "text": "Deeper resection exposes additional canal morphology — isthmuses, fins, and lateral canals — but at the cost of reduced crown-to-root ratio and increased removal of sound root structure. The goal is to resect enough to address the anatomical source of failure without over-shortening the root.", "raw": "Deeper resection exposes additional canal morphology — isthmuses, fins, and lateral canals — but at the cost of reduced crown-to-root ratio and increased removal of sound root structure. The goal is to resect enough to address the anatomical source of failure without over-shortening the root."}, {"type": "ul", "items": ["What is the best way to achieve intra-operative hemostasis?"], "raw": "- What is the best way to achieve intra-operative hemostasis?"}, {"type": "p", "text": "Epinephrine-soaked cotton pellets packed into the bony crypt for 2–4 minutes provide reliable local hemostasis with minimal systemic effect (Vickers). Other hemostatic agents (bone wax, collagen, ferric sulfate) can be harder to remove and may induce inflammation or alter healing (Ibarrola and Bjorndal).", "raw": "Epinephrine-soaked cotton pellets packed into the bony crypt for 2–4 minutes provide reliable local hemostasis with minimal systemic effect (Vickers). Other hemostatic agents (bone wax, collagen, ferric sulfate) can be harder to remove and may induce inflammation or alter healing (Ibarrola and Bjorndal)."}, {"type": "ul", "items": ["What is the typical blood loss with apical surgery?"], "raw": "- What is the typical blood loss with apical surgery?"}, {"type": "p", "text": "Mean blood loss is approximately 9.5 mL. The largest determinants are surgical time (longer procedures bleed more) and anatomical location — palatal surgery causes roughly 4× the blood loss of buccal surgery.", "raw": "Mean blood loss is approximately 9.5 mL. The largest determinants are surgical time (longer procedures bleed more) and anatomical location — palatal surgery causes roughly 4× the blood loss of buccal surgery."}, {"type": "ul", "items": ["Does every portion of the lesion need to be removed for healing?"], "raw": "- Does every portion of the lesion need to be removed for healing?"}, {"type": "p", "text": "No. Lin and Langeland showed that complete curettage of the periapical lesion is not required for healing; however, all foreign debris (extruded sealer, gutta-percha, amalgam fragments) must be removed.", "raw": "No. Lin and Langeland showed that complete curettage of the periapical lesion is not required for healing; however, all foreign debris (extruded sealer, gutta-percha, amalgam fragments) must be removed."}, {"type": "p", "text": "**Pre-operative management:**", "raw": "**Pre-operative management:**"}, {"type": "ul", "items": ["800 mg ibuprofen at the start of the appointment reduces post-operative pain (Dionne)", "A pre-operative chlorhexidine rinse decreases oral bacterial load and surgical-site contamination (Martin)"], "raw": "- 800 mg ibuprofen at the start of the appointment reduces post-operative pain (Dionne)\n- A pre-operative chlorhexidine rinse decreases oral bacterial load and surgical-site contamination (Martin)"}]}, {"id": "s10-surgical-endodontics-105-root-end-preparation-depth", "number": "10.5", "title": "Root-End Preparation Depth", "level": 2, "blocks": [{"type": "ul", "items": ["What is the recommended root-end preparation depth?"], "raw": "- What is the recommended root-end preparation depth?"}, {"type": "p", "text": "3 mm, which provides adequate retention and seal for modern retrofill materials (Mattison et al.).", "raw": "3 mm, which provides adequate retention and seal for modern retrofill materials (Mattison et al.)."}, {"type": "ul", "items": ["What instruments are used for root-end preparation?"], "raw": "- What instruments are used for root-end preparation?"}, {"type": "p", "text": "Ultrasonic retro-tips are the instruments of choice. They allow the operator to prepare a clean, centered, conservative root-end cavity within the confines of a small osteotomy, without over-enlarging the bony crypt (Mehlhaff).", "raw": "Ultrasonic retro-tips are the instruments of choice. They allow the operator to prepare a clean, centered, conservative root-end cavity within the confines of a small osteotomy, without over-enlarging the bony crypt (Mehlhaff)."}, {"type": "ul", "items": ["Do ultrasonic tips cause cracks?"], "raw": "- Do ultrasonic tips cause cracks?"}, {"type": "p", "text": "Ultrasonic tips do not create new cracks in sound root dentin, but pre-existing microcracks can propagate under ultrasonic vibration (Tawil, clinical study).", "raw": "Ultrasonic tips do not create new cracks in sound root dentin, but pre-existing microcracks can propagate under ultrasonic vibration (Tawil, clinical study)."}, {"type": "ul", "items": ["How does preparation depth affect seal and prognosis?"], "raw": "- How does preparation depth affect seal and prognosis?"}, {"type": "p", "text": "A root-end cavity depth of 3 mm provides a reliable seal and positions the retrofill well within the walls of the resected root. Shallower preparations leave inadequate retention for the retrofill material; excessive depth is unnecessary and weakens the remaining root.", "raw": "A root-end cavity depth of 3 mm provides a reliable seal and positions the retrofill well within the walls of the resected root. Shallower preparations leave inadequate retention for the retrofill material; excessive depth is unnecessary and weakens the remaining root."}]}, {"id": "s10-surgical-endodontics-106-retrofill-material-selection", "number": "10.6", "title": "Retrofill Material Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the properties of an ideal retrofill material?"], "raw": "- What are the properties of an ideal retrofill material?"}, {"type": "p", "text": "An ideal retrofill is biocompatible, bacteriostatic, dimensionally stable, moisture-tolerant during setting, adherent to dentinal walls, easy to handle within the surgical crypt, non-resorbable, radiopaque, and capable of supporting cementum and bone regeneration over its surface.", "raw": "An ideal retrofill is biocompatible, bacteriostatic, dimensionally stable, moisture-tolerant during setting, adherent to dentinal walls, easy to handle within the surgical crypt, non-resorbable, radiopaque, and capable of supporting cementum and bone regeneration over its surface."}, {"type": "ul", "items": ["How do MTA, Biodentine, and other bioceramics compare as retrofill materials?"], "raw": "- How do MTA, Biodentine, and other bioceramics compare as retrofill materials?"}, {"type": "p", "text": "MTA, Biodentine, and other tricalcium silicate bioceramics (Endosequence Root Repair Material, BioAggregate) share the core advantages of biocompatibility, moisture tolerance, and bioactive hydroxyapatite formation at the dentin interface. Biodentine has a shorter setting time (~12 minutes vs. 2–4 hours for ProRoot MTA) and superior compressive strength. Bioceramic putties offer improved handling within the surgical crypt compared with traditional MTA.", "raw": "MTA, Biodentine, and other tricalcium silicate bioceramics (Endosequence Root Repair Material, BioAggregate) share the core advantages of biocompatibility, moisture tolerance, and bioactive hydroxyapatite formation at the dentin interface. Biodentine has a shorter setting time (~12 minutes vs. 2–4 hours for ProRoot MTA) and superior compressive strength. Bioceramic putties offer improved handling within the surgical crypt compared with traditional MTA."}, {"type": "ul", "items": ["What is the evidence for success rates with different materials?"], "raw": "- What is the evidence for success rates with different materials?"}, {"type": "ul", "items": ["**Christiansen:** 85% healing at 1 year with MTA retrofill vs. 28% with gutta-percha alone", "**Chen:** Endosequence Root Repair Material outperformed MTA in a canine healing model", "**Torabinejad:** MTA superior to amalgam in monkey and dog models", "**Baek and Kim:** MTA produced better healing than Super EBA and amalgam"], "raw": "- **Christiansen:** 85% healing at 1 year with MTA retrofill vs. 28% with gutta-percha alone\n- **Chen:** Endosequence Root Repair Material outperformed MTA in a canine healing model\n- **Torabinejad:** MTA superior to amalgam in monkey and dog models\n- **Baek and Kim:** MTA produced better healing than Super EBA and amalgam"}, {"type": "ul", "items": ["What are the indications for guided tissue regeneration in apical surgery?"], "raw": "- What are the indications for guided tissue regeneration in apical surgery?"}, {"type": "p", "text": "GTR is indicated for:", "raw": "GTR is indicated for:"}, {"type": "ul", "items": ["Large periapical lesions greater than 10 mm (Tsesis)", "Through-and-through lesions (Tsesis)", "Apical-marginal (endo-perio) communication defects (Douthitt; Dietrich)"], "raw": "- Large periapical lesions greater than 10 mm (Tsesis)\n- Through-and-through lesions (Tsesis)\n- Apical-marginal (endo-perio) communication defects (Douthitt; Dietrich)"}]}, {"id": "s10-surgical-endodontics-107-hemisectionroot-amputation-decisions", "number": "10.7", "title": "Hemisection/Root Amputation Decisions", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for hemisection vs. root amputation?"], "raw": "- What are the indications for hemisection vs. root amputation?"}, {"type": "p", "text": "**Root amputation** removes one or more roots of a multi-rooted tooth while retaining the crown and remaining root(s). It is used most commonly for maxillary molars when a single root has isolated, severe pathology — typically a fractured root (VRF confined to one root), a furcation defect limited to one root with inadequate bone support, a non-negotiable or untreatable root canal system, or a perforation that cannot be repaired. Endodontic treatment of the retained roots is completed before or concurrent with root resection.", "raw": "**Root amputation** removes one or more roots of a multi-rooted tooth while retaining the crown and remaining root(s). It is used most commonly for maxillary molars when a single root has isolated, severe pathology — typically a fractured root (VRF confined to one root), a furcation defect limited to one root with inadequate bone support, a non-negotiable or untreatable root canal system, or a perforation that cannot be repaired. Endodontic treatment of the retained roots is completed before or concurrent with root resection."}, {"type": "p", "text": "**Hemisection** divides a mandibular molar through the furcation into two separate premolar-shaped units, one of which may be extracted and one retained (or both retained as individual crown abutments). Hemisection is indicated when one root of a mandibular molar is unresectable — for example, an isolated VRF, an unresectable furcation defect on one side, or severe bone loss surrounding only one root — while the other root retains adequate bone support and is treatable endodontically.", "raw": "**Hemisection** divides a mandibular molar through the furcation into two separate premolar-shaped units, one of which may be extracted and one retained (or both retained as individual crown abutments). Hemisection is indicated when one root of a mandibular molar is unresectable — for example, an isolated VRF, an unresectable furcation defect on one side, or severe bone loss surrounding only one root — while the other root retains adequate bone support and is treatable endodontically."}, {"type": "p", "text": "Prerequisites for both: (1) complete endodontic treatment of all retained roots; (2) adequate bone support for the retained root(s); (3) favorable tooth and root anatomy — fused roots, a very short root trunk, or roots in close proximity are relative contraindications. Patient oral hygiene and commitment to periodontal maintenance must be assessed before committing to a complex restorative pathway.", "raw": "Prerequisites for both: (1) complete endodontic treatment of all retained roots; (2) adequate bone support for the retained root(s); (3) favorable tooth and root anatomy — fused roots, a very short root trunk, or roots in close proximity are relative contraindications. Patient oral hygiene and commitment to periodontal maintenance must be assessed before committing to a complex restorative pathway."}, {"type": "ul", "items": ["What factors affect prognosis of these procedures?"], "raw": "- What factors affect prognosis of these procedures?"}, {"type": "p", "text": "Favorable prognostic factors include: localized disease (not generalized periodontitis), adequate bone support around the retained root(s), absence of furcation involvement in retained roots, favorable root anatomy for separation, good patient oral hygiene, and reliable periodontal maintenance compliance. The periodontal status of the retained root is the single most important determinant of long-term prognosis {{cite: Blomlöf 1997 — periodontal status of the retained root is the dominant prognostic factor for hemisection and root amputation outcomes}}.", "raw": "Favorable prognostic factors include: localized disease (not generalized periodontitis), adequate bone support around the retained root(s), absence of furcation involvement in retained roots, favorable root anatomy for separation, good patient oral hygiene, and reliable periodontal maintenance compliance. The periodontal status of the retained root is the single most important determinant of long-term prognosis {{cite: Blomlöf 1997 — periodontal status of the retained root is the dominant prognostic factor for hemisection and root amputation outcomes}}."}, {"type": "p", "text": "Unfavorable factors include: generalized advanced periodontitis, Class II–III furcation in retained roots, root proximity making clean surgical separation difficult, thin or short roots with limited bone anchor, and poor patient compliance. Short root trunk anatomy increases the technical challenge and may compromise the restorative result.", "raw": "Unfavorable factors include: generalized advanced periodontitis, Class II–III furcation in retained roots, root proximity making clean surgical separation difficult, thin or short roots with limited bone anchor, and poor patient compliance. Short root trunk anatomy increases the technical challenge and may compromise the restorative result."}, {"type": "ul", "items": ["How do survival rates compare to extraction and implant?"], "raw": "- How do survival rates compare to extraction and implant?"}, {"type": "p", "text": "Survival rates for root-resected and hemisected molars are approximately 68–90% at 5–10 years with appropriate case selection and periodontal maintenance {{cite: Carnevale 1998 — root-resected molars retained in over 90% of cases at more than 10 years in a periodontal practice with regular maintenance; favorable case selection is critical}}. Extraction followed by implant placement provides a predictable alternative, with implant survival rates exceeding 95% at 10 years in most populations. When deciding between the two approaches, consider: (1) strategic value of the retained tooth structure; (2) quality of the patient's periodontal maintenance; (3) cost — root resection is typically less costly than extraction plus implant and bone graft; (4) patient preference for retaining natural tooth structure. For patients with reliable periodontal maintenance who have strategically important teeth with localized pathology, root amputation or hemisection is a valid evidence-based alternative to extraction and implant.", "raw": "Survival rates for root-resected and hemisected molars are approximately 68–90% at 5–10 years with appropriate case selection and periodontal maintenance {{cite: Carnevale 1998 — root-resected molars retained in over 90% of cases at more than 10 years in a periodontal practice with regular maintenance; favorable case selection is critical}}. Extraction followed by implant placement provides a predictable alternative, with implant survival rates exceeding 95% at 10 years in most populations. When deciding between the two approaches, consider: (1) strategic value of the retained tooth structure; (2) quality of the patient's periodontal maintenance; (3) cost — root resection is typically less costly than extraction plus implant and bone graft; (4) patient preference for retaining natural tooth structure. For patients with reliable periodontal maintenance who have strategically important teeth with localized pathology, root amputation or hemisection is a valid evidence-based alternative to extraction and implant."}]}]}, {"id": "s11-recall-and-outcomes", "number": "11", "title": "Recall and Outcomes", "level": 1, "blocks": [], "subsections": [{"id": "s11-recall-and-outcomes-111-recall-interval-determination", "number": "11.1", "title": "Recall Interval Determination", "level": 2, "blocks": [{"type": "ul", "items": ["What recall intervals are recommended after endodontic treatment?"], "raw": "- What recall intervals are recommended after endodontic treatment?"}, {"type": "p", "text": "Standard recall intervals are 6 months, 1 year, and then annually as needed. Larger lesions and retreatment cases warrant longer follow-up because healing may take several years. Teeth treated for asymptomatic apical periodontitis should be reviewed at 1, 2, and 4 years if the lesion is not yet fully resolved.", "raw": "Standard recall intervals are 6 months, 1 year, and then annually as needed. Larger lesions and retreatment cases warrant longer follow-up because healing may take several years. Teeth treated for asymptomatic apical periodontitis should be reviewed at 1, 2, and 4 years if the lesion is not yet fully resolved."}, {"type": "ul", "items": ["How does preoperative diagnosis affect follow-up schedule?"], "raw": "- How does preoperative diagnosis affect follow-up schedule?"}, {"type": "p", "text": "Teeth treated for vital pulp pathology can generally be assessed at a single 1-year recall, since healing is typically straightforward and there is no pre-existing lesion to monitor. Necrotic cases with periapical lesions require longer follow-up to confirm radiographic resolution.", "raw": "Teeth treated for vital pulp pathology can generally be assessed at a single 1-year recall, since healing is typically straightforward and there is no pre-existing lesion to monitor. Necrotic cases with periapical lesions require longer follow-up to confirm radiographic resolution."}, {"type": "ul", "items": ["What is the minimum follow-up period to assess healing?"], "raw": "- What is the minimum follow-up period to assess healing?"}, {"type": "p", "text": "One year is the minimum meaningful follow-up interval. Lesions larger than 1 cm may require up to 4 years for complete radiographic resolution.", "raw": "One year is the minimum meaningful follow-up interval. Lesions larger than 1 cm may require up to 4 years for complete radiographic resolution."}]}, {"id": "s11-recall-and-outcomes-112-healing-assessment-criteria-and-timing", "number": "11.2", "title": "Healing Assessment Criteria and Timing", "level": 2, "blocks": [{"type": "ul", "items": ["What are the clinical and radiographic criteria for healed vs. healing vs. disease?"], "raw": "- What are the clinical and radiographic criteria for healed vs. healing vs. disease?"}, {"type": "p", "text": "**Healed:** absence of symptoms, normal PDL space, intact lamina dura, no radiolucency. **Healing:** asymptomatic tooth with progressive reduction in periapical radiolucency on serial radiographs. **Persistent disease:** symptoms, unresolved or enlarging radiolucency, sinus tract, or percussion sensitivity.", "raw": "**Healed:** absence of symptoms, normal PDL space, intact lamina dura, no radiolucency. **Healing:** asymptomatic tooth with progressive reduction in periapical radiolucency on serial radiographs. **Persistent disease:** symptoms, unresolved or enlarging radiolucency, sinus tract, or percussion sensitivity."}, {"type": "ul", "items": ["What is the expected timeline for periapical healing?"], "raw": "- What is the expected timeline for periapical healing?"}, {"type": "p", "text": "70% of periapical lesions require more than 1 year to heal completely (Murphy et al.). Most lesions show progressive improvement over 1–4 years.", "raw": "70% of periapical lesions require more than 1 year to heal completely (Murphy et al.). Most lesions show progressive improvement over 1–4 years."}, {"type": "ul", "items": ["What role does CBCT play in healing assessment?"], "raw": "- What role does CBCT play in healing assessment?"}, {"type": "p", "text": "CBCT enables 3-dimensional assessment of healing but tends to overestimate persistent disease compared with conventional radiographs {{cite: Torabinejad 2009 — 20% of endodontically treated teeth showed apical hypodensities greater than 1 mm on CBCT that would be classified as healed by 2D periapical radiograph criteria; CBCT over-detects persistent disease}}. The clinical implication is that CBCT should not be used routinely for healing assessment — conventional periapical radiographs are adequate and appropriate for the vast majority of follow-up evaluations. CBCT at recall is justified only when clinical or 2D radiographic findings are equivocal and the result would change management.", "raw": "CBCT enables 3-dimensional assessment of healing but tends to overestimate persistent disease compared with conventional radiographs {{cite: Torabinejad 2009 — 20% of endodontically treated teeth showed apical hypodensities greater than 1 mm on CBCT that would be classified as healed by 2D periapical radiograph criteria; CBCT over-detects persistent disease}}. The clinical implication is that CBCT should not be used routinely for healing assessment — conventional periapical radiographs are adequate and appropriate for the vast majority of follow-up evaluations. CBCT at recall is justified only when clinical or 2D radiographic findings are equivocal and the result would change management."}, {"type": "ul", "items": ["How do you define success vs. survival in endodontics?"], "raw": "- How do you define success vs. survival in endodontics?"}, {"type": "p", "text": "**Success** is a strict radiographic and clinical definition — absence of pathology on follow-up imaging and resolution of all symptoms. **Survival** simply means the tooth remains functional in the mouth, regardless of the presence or absence of periapical radiolucency. Survival rates are consistently higher than strict success rates.", "raw": "**Success** is a strict radiographic and clinical definition — absence of pathology on follow-up imaging and resolution of all symptoms. **Survival** simply means the tooth remains functional in the mouth, regardless of the presence or absence of periapical radiolucency. Survival rates are consistently higher than strict success rates."}]}, {"id": "s11-recall-and-outcomes-113-when-to-intervene-on-asymptomatic-apical-periodontitis", "number": "11.3", "title": "When to Intervene on Asymptomatic Apical Periodontitis", "level": 2, "blocks": [{"type": "ul", "items": ["What is the natural history of asymptomatic apical periodontitis?"], "raw": "- What is the natural history of asymptomatic apical periodontitis?"}, {"type": "p", "text": "Asymptomatic apical periodontitis (AAP) in a previously treated tooth can remain stable for years without causing symptoms, but it represents persistent infection or an unresolved inflammatory process. Some lesions heal slowly over time; others enlarge.", "raw": "Asymptomatic apical periodontitis (AAP) in a previously treated tooth can remain stable for years without causing symptoms, but it represents persistent infection or an unresolved inflammatory process. Some lesions heal slowly over time; others enlarge."}, {"type": "ul", "items": ["When is intervention indicated for asymptomatic lesions?"], "raw": "- When is intervention indicated for asymptomatic lesions?"}, {"type": "p", "text": "Intervention is indicated when the lesion fails to decrease over 1–2 years of observation, is enlarging, becomes symptomatic, is adjacent to a proposed abutment, or when the patient is about to undergo immunosuppression or head/neck radiation.", "raw": "Intervention is indicated when the lesion fails to decrease over 1–2 years of observation, is enlarging, becomes symptomatic, is adjacent to a proposed abutment, or when the patient is about to undergo immunosuppression or head/neck radiation."}, {"type": "ul", "items": ["What factors determine observation vs. treatment?"], "raw": "- What factors determine observation vs. treatment?"}, {"type": "p", "text": "Factors include lesion size and trajectory, patient age and medical status, strategic value of the tooth, presence of a coronal restoration issue, and patient preference.", "raw": "Factors include lesion size and trajectory, patient age and medical status, strategic value of the tooth, presence of a coronal restoration issue, and patient preference."}, {"type": "ul", "items": ["How does lesion size affect the decision?"], "raw": "- How does lesion size affect the decision?"}, {"type": "p", "text": "Larger lesions are more likely to warrant intervention because they are less likely to heal spontaneously and carry greater risk of progression. Small stable lesions in asymptomatic teeth can often be monitored.", "raw": "Larger lesions are more likely to warrant intervention because they are less likely to heal spontaneously and carry greater risk of progression. Small stable lesions in asymptomatic teeth can often be monitored."}]}]}, {"id": "s12-pharmacology-and-pain-management", "number": "12", "title": "Pharmacology and Pain Management", "level": 1, "blocks": [], "subsections": [{"id": "s12-pharmacology-and-pain-management-121-analgesic-selection-and-dosing", "number": "12.1", "title": "Analgesic Selection and Dosing", "level": 2, "blocks": [{"type": "ul", "items": ["What is the NNT for common analgesics in dental pain?"], "raw": "- What is the NNT for common analgesics in dental pain?"}, {"type": "p", "text": "The NNT for 800 mg ibuprofen to achieve 50% pain relief is 1.6 (Oxford League Table).", "raw": "The NNT for 800 mg ibuprofen to achieve 50% pain relief is 1.6 (Oxford League Table)."}, {"type": "ul", "items": ["Wh
