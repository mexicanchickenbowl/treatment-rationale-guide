at is the maximum recommended dose of ibuprofen over 24 hours?"], "raw": "- What is the maximum recommended dose of ibuprofen over 24 hours?"}, {"type": "p", "text": "Maximum is 3.2 grams (Jeske). Even in short durations (8-30 days), dosages above 1.2 grams per day increase cardiovascular risk. Use the lowest effective dose for the least amount of time.", "raw": "Maximum is 3.2 grams (Jeske). Even in short durations (8-30 days), dosages above 1.2 grams per day increase cardiovascular risk. Use the lowest effective dose for the least amount of time."}, {"type": "ul", "items": ["What combination analgesic regimens are most effective for endodontic pain?"], "raw": "- What combination analgesic regimens are most effective for endodontic pain?"}, {"type": "p", "text": "The combination of 600 mg ibuprofen with 1000 mg acetaminophen is considered the most effective oral analgesic combination for acute dental pain. This combination produces lower NNT values than either drug alone and is superior to most opioid-containing formulations.", "raw": "The combination of 600 mg ibuprofen with 1000 mg acetaminophen is considered the most effective oral analgesic combination for acute dental pain. This combination produces lower NNT values than either drug alone and is superior to most opioid-containing formulations."}, {"type": "ul", "items": ["When are opioids indicated in endodontic pain management?"], "raw": "- When are opioids indicated in endodontic pain management?"}, {"type": "p", "text": "Opioids are reserved for patients with severe pain who have a contraindication to or inadequate response from maximum-dose NSAIDs plus acetaminophen. When opioids are required, short courses of the lowest effective dose should be used, ideally in combination with a non-opioid to reduce the total opioid exposure.", "raw": "Opioids are reserved for patients with severe pain who have a contraindication to or inadequate response from maximum-dose NSAIDs plus acetaminophen. When opioids are required, short courses of the lowest effective dose should be used, ideally in combination with a non-opioid to reduce the total opioid exposure."}]}, {"id": "s12-pharmacology-and-pain-management-122-antibiotic-selection-and-indications", "number": "12.2", "title": "Antibiotic Selection and Indications", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for antibiotics in endodontic infections?"], "raw": "- What are the indications for antibiotics in endodontic infections?"}, {"type": "p", "text": "Antibiotics are indicated only when there is evidence of systemic involvement or spreading infection — fever, malaise, diffuse cellulitis crossing fascial planes, trismus, lymphadenopathy, or an immunocompromised host. Antibiotics are **not** indicated for localized, fluctuant abscesses that can be adequately managed with local treatment (incision and drainage, pulpectomy).", "raw": "Antibiotics are indicated only when there is evidence of systemic involvement or spreading infection — fever, malaise, diffuse cellulitis crossing fascial planes, trismus, lymphadenopathy, or an immunocompromised host. Antibiotics are **not** indicated for localized, fluctuant abscesses that can be adequately managed with local treatment (incision and drainage, pulpectomy)."}, {"type": "ul", "items": ["What is the first-line antibiotic for endodontic infections?"], "raw": "- What is the first-line antibiotic for endodontic infections?"}, {"type": "p", "text": "Penicillin VK or amoxicillin are the first-line drugs recommended by the AAE Position Statement on Antibiotic Use in Endodontics.", "raw": "Penicillin VK or amoxicillin are the first-line drugs recommended by the AAE Position Statement on Antibiotic Use in Endodontics."}, {"type": "ul", "items": ["When is Augmentin (amoxicillin/clavulanate) indicated?"], "raw": "- When is Augmentin (amoxicillin/clavulanate) indicated?"}, {"type": "p", "text": "Endodontic abscess bacteria are 100% susceptible to Augmentin vs. only 85% susceptible to penicillin VK (Baumgartner and Xia).", "raw": "Endodontic abscess bacteria are 100% susceptible to Augmentin vs. only 85% susceptible to penicillin VK (Baumgartner and Xia)."}, {"type": "ul", "items": ["What is the recommended antibiotic for penicillin-allergic patients?"], "raw": "- What is the recommended antibiotic for penicillin-allergic patients?"}, {"type": "p", "text": "Azithromycin is the recommended first-line drug for penicillin-allergic patients (2019 AAE Colleagues for Excellence).", "raw": "Azithromycin is the recommended first-line drug for penicillin-allergic patients (2019 AAE Colleagues for Excellence)."}, {"type": "ul", "items": ["What is the recommended antibiotic course duration?"], "raw": "- What is the recommended antibiotic course duration?"}, {"type": "p", "text": "The European Society of Endodontology recommends a 3–7 day course. The 2019 AAE Colleagues for Excellence guidance and emerging antibiotic stewardship evidence support using the shortest effective course — preferably 3–5 days when the patient is responding clinically {{cite: AAE 2019 — AAE antibiotic guidance: use the shortest effective course (3–5 days preferred when the patient is improving clinically); antibiotics are an adjunct to local treatment, never a substitute}}. Key stewardship principles: (1) if swelling, trismus, and systemic signs are resolving, completing only the minimum necessary course is appropriate — extending beyond 5 days without clinical indication adds resistance pressure without demonstrated benefit; (2) the most common prescribing error in endodontics is antibiotic use for conditions where local treatment alone is sufficient (localized fluctuant abscess, irreversible pulpitis without systemic signs); (3) dose matters — under-dosing increases resistance risk without reducing toxicity.", "raw": "The European Society of Endodontology recommends a 3–7 day course. The 2019 AAE Colleagues for Excellence guidance and emerging antibiotic stewardship evidence support using the shortest effective course — preferably 3–5 days when the patient is responding clinically {{cite: AAE 2019 — AAE antibiotic guidance: use the shortest effective course (3–5 days preferred when the patient is improving clinically); antibiotics are an adjunct to local treatment, never a substitute}}. Key stewardship principles: (1) if swelling, trismus, and systemic signs are resolving, completing only the minimum necessary course is appropriate — extending beyond 5 days without clinical indication adds resistance pressure without demonstrated benefit; (2) the most common prescribing error in endodontics is antibiotic use for conditions where local treatment alone is sufficient (localized fluctuant abscess, irreversible pulpitis without systemic signs); (3) dose matters — under-dosing increases resistance risk without reducing toxicity."}, {"type": "ul", "items": ["Do antibiotics decrease pain when added to NSAIDs and endodontic treatment?"], "raw": "- Do antibiotics decrease pain when added to NSAIDs and endodontic treatment?"}, {"type": "p", "text": "No. Fouad, Rivera, and Walton (1996) conducted a prospective, double-blind, randomized controlled trial of 32 patients with a localized acute apical abscess. After standard local treatment (root canal debridement and/or incision and drainage), patients were randomized to penicillin VK, placebo, or no supplemental medication — all patients received ibuprofen. There was no statistically significant difference in symptom reduction or recovery among the three groups. The clinical takeaway: for a localized dental abscess without signs of systemic spread, adding an antibiotic to proper local treatment and NSAID therapy provides no demonstrable benefit.", "raw": "No. Fouad, Rivera, and Walton (1996) conducted a prospective, double-blind, randomized controlled trial of 32 patients with a localized acute apical abscess. After standard local treatment (root canal debridement and/or incision and drainage), patients were randomized to penicillin VK, placebo, or no supplemental medication — all patients received ibuprofen. There was no statistically significant difference in symptom reduction or recovery among the three groups. The clinical takeaway: for a localized dental abscess without signs of systemic spread, adding an antibiotic to proper local treatment and NSAID therapy provides no demonstrable benefit."}]}, {"id": "s12-pharmacology-and-pain-management-123-antibiotic-prophylaxis-guidelines", "number": "12.3", "title": "Antibiotic Prophylaxis Guidelines", "level": 2, "blocks": [{"type": "ul", "items": ["What are the current AHA guidelines for antibiotic prophylaxis?"], "raw": "- What are the current AHA guidelines for antibiotic prophylaxis?"}, {"type": "p", "text": "Per 2007 American Heart Association guidelines, prophylaxis is indicated for: 1) Prosthetic heart valves, 2) History of infective endocarditis, 3) Unrepaired cyanotic congenital heart defects.", "raw": "Per 2007 American Heart Association guidelines, prophylaxis is indicated for: 1) Prosthetic heart valves, 2) History of infective endocarditis, 3) Unrepaired cyanotic congenital heart defects."}, {"type": "p", "text": "The 2012 joint ADA and AAOS systematic review found that antibiotic prophylaxis reduces bacteria, but not infections. Antibiotics are not recommended prophylactically for patient with prosthetic joints.", "raw": "The 2012 joint ADA and AAOS systematic review found that antibiotic prophylaxis reduces bacteria, but not infections. Antibiotics are not recommended prophylactically for patient with prosthetic joints."}, {"type": "ul", "items": ["What dental procedures require prophylaxis in at-risk patients?"], "raw": "- What dental procedures require prophylaxis in at-risk patients?"}, {"type": "p", "text": "Procedures that involve manipulation of gingival tissue, the periapical region, or perforation of the oral mucosa require prophylaxis in patients meeting AHA criteria. This includes most endodontic procedures that extend beyond the orifice.", "raw": "Procedures that involve manipulation of gingival tissue, the periapical region, or perforation of the oral mucosa require prophylaxis in patients meeting AHA criteria. This includes most endodontic procedures that extend beyond the orifice."}, {"type": "ul", "items": ["What is the recommended prophylactic regimen?"], "raw": "- What is the recommended prophylactic regimen?"}, {"type": "p", "text": "Amoxicillin 2 g orally, 30–60 minutes before the procedure. For penicillin-allergic patients: clindamycin is no longer recommended; azithromycin 500 mg, cephalexin 2 g (if no history of anaphylaxis), or doxycycline 100 mg are acceptable alternatives per current AHA guidance.", "raw": "Amoxicillin 2 g orally, 30–60 minutes before the procedure. For penicillin-allergic patients: clindamycin is no longer recommended; azithromycin 500 mg, cephalexin 2 g (if no history of anaphylaxis), or doxycycline 100 mg are acceptable alternatives per current AHA guidance."}]}]}, {"id": "s13-systemic-conditions-and-endodontics", "number": "13", "title": "Systemic Conditions and Endodontics", "level": 1, "blocks": [], "subsections": [{"id": "s13-systemic-conditions-and-endodontics-131-diabetes-and-endodontic-outcomes", "number": "13.1", "title": "Diabetes and Endodontic Outcomes", "level": 2, "blocks": [{"type": "ul", "items": ["How does diabetes affect endodontic treatment outcomes?"], "raw": "- How does diabetes affect endodontic treatment outcomes?"}, {"type": "p", "text": "Diabetes impairs endodontic outcomes through several interconnected mechanisms: (1) impaired neutrophil chemotaxis and phagocytosis reduce the host's ability to clear periapical infection; (2) advanced glycation end-products (AGEs) impair collagen cross-linking and tissue healing, delaying periapical bone repair; (3) microvascular disease reduces perfusion to the healing periapex; (4) peripheral neuropathy can blunt pain perception, allowing disease to progress undetected. {{cite: Fouad and Burleson 2003 — diabetic patients had approximately 3× the flare-up rate and significantly reduced periapical healing rates compared to non-diabetic controls; effect disproportionately greater with poor glycemic control (HbA1c > 8%)}}. Patients with well-controlled diabetes (normal HbA1c) have outcomes approaching those of non-diabetic patients, confirming that glycemic control — not diabetes per se — is the primary determinant of prognosis.", "raw": "Diabetes impairs endodontic outcomes through several interconnected mechanisms: (1) impaired neutrophil chemotaxis and phagocytosis reduce the host's ability to clear periapical infection; (2) advanced glycation end-products (AGEs) impair collagen cross-linking and tissue healing, delaying periapical bone repair; (3) microvascular disease reduces perfusion to the healing periapex; (4) peripheral neuropathy can blunt pain perception, allowing disease to progress undetected. {{cite: Fouad and Burleson 2003 — diabetic patients had approximately 3× the flare-up rate and significantly reduced periapical healing rates compared to non-diabetic controls; effect disproportionately greater with poor glycemic control (HbA1c > 8%)}}. Patients with well-controlled diabetes (normal HbA1c) have outcomes approaching those of non-diabetic patients, confirming that glycemic control — not diabetes per se — is the primary determinant of prognosis."}, {"type": "ul", "items": ["What modifications should be considered for diabetic patients?"], "raw": "- What modifications should be considered for diabetic patients?"}, {"type": "p", "text": "Diabetic patients should be treated in short morning appointments after eating and taking their usual medications. Profound anesthesia with stress reduction is important. Glycemic status should be confirmed before treatment, and elective procedures postponed if the patient is poorly controlled (HbA1c > 8). Antibiotic prophylaxis is not routinely indicated based on diabetes alone.", "raw": "Diabetic patients should be treated in short morning appointments after eating and taking their usual medications. Profound anesthesia with stress reduction is important. Glycemic status should be confirmed before treatment, and elective procedures postponed if the patient is poorly controlled (HbA1c > 8). Antibiotic prophylaxis is not routinely indicated based on diabetes alone."}, {"type": "ul", "items": ["How does glycemic control influence prognosis?"], "raw": "- How does glycemic control influence prognosis?"}, {"type": "p", "text": "Poorly controlled diabetes (elevated HbA1c) is associated with higher rates of post-treatment flare-up, persistent periapical pathosis, and treatment failure. Patients with well-controlled diabetes have outcomes approaching those of non-diabetic patients.", "raw": "Poorly controlled diabetes (elevated HbA1c) is associated with higher rates of post-treatment flare-up, persistent periapical pathosis, and treatment failure. Patients with well-controlled diabetes have outcomes approaching those of non-diabetic patients."}]}, {"id": "s13-systemic-conditions-and-endodontics-132-cardiovascular-considerations", "number": "13.2", "title": "Cardiovascular Considerations", "level": 2, "blocks": [{"type": "ul", "items": ["What is the relationship between apical periodontitis and cardiovascular disease?"], "raw": "- What is the relationship between apical periodontitis and cardiovascular disease?"}, {"type": "p", "text": "Patients with chronic apical periodontitis have 2.8x greater risk of developing coronary heart disease (Costa et al., 2014, 2024).", "raw": "Patients with chronic apical periodontitis have 2.8x greater risk of developing coronary heart disease (Costa et al., 2014, 2024)."}, {"type": "ul", "items": ["What precautions are needed for patients on anticoagulants?"], "raw": "- What precautions are needed for patients on anticoagulants?"}, {"type": "p", "text": "Routine non-surgical endodontic treatment can generally be performed without modifying anticoagulation. For patients on warfarin, an INR within the therapeutic range (typically ≤3.5) is acceptable for most endodontic procedures. For patients on direct oral anticoagulants (DOACs), dose interruption is not required for non-surgical work. Apical surgery may require coordination with the prescribing physician but rarely requires discontinuation of therapy.", "raw": "Routine non-surgical endodontic treatment can generally be performed without modifying anticoagulation. For patients on warfarin, an INR within the therapeutic range (typically ≤3.5) is acceptable for most endodontic procedures. For patients on direct oral anticoagulants (DOACs), dose interruption is not required for non-surgical work. Apical surgery may require coordination with the prescribing physician but rarely requires discontinuation of therapy."}, {"type": "ul", "items": ["How should epinephrine use be modified in cardiac patients?"], "raw": "- How should epinephrine use be modified in cardiac patients?"}, {"type": "p", "text": "The maximum recommended epinephrine dose for cardiac patients is 0.04 mg (approximately two cartridges of 1:100,000 lidocaine with epinephrine). Use aspirating technique, avoid intravascular injection, and minimize epinephrine-containing retraction cord.", "raw": "The maximum recommended epinephrine dose for cardiac patients is 0.04 mg (approximately two cartridges of 1:100,000 lidocaine with epinephrine). Use aspirating technique, avoid intravascular injection, and minimize epinephrine-containing retraction cord."}]}, {"id": "s13-systemic-conditions-and-endodontics-133-sickle-cell-disease", "number": "13.3", "title": "Sickle Cell Disease", "level": 2, "blocks": [{"type": "ul", "items": ["How does sickle cell disease affect pulp vitality?"], "raw": "- How does sickle cell disease affect pulp vitality?"}, {"type": "p", "text": "Sickle cell anemia is associated with an 8.3× higher risk of spontaneous pulp necrosis {{cite: Costa 2013 — sickle cell anemia is associated with an 8.3× higher risk of spontaneous pulp necrosis compared to matched controls; microvascular occlusion is the proposed mechanism}}. Two mechanisms contribute: (1) **microvascular occlusion** — deformed sickled erythrocytes obstruct the small-caliber end-arterioles that supply the pulp (the pulp has an end-arterial circulation with no collateral flow), resulting in ischemic pulp necrosis without bacterial involvement; (2) **osseous infarction** — the alveolar bone's marrow space is susceptible to sickling during crises, producing bone infarcts adjacent to the tooth that can radiographically mimic periapical pathology. Clinicians must therefore use pulp vitality testing to distinguish true endodontic disease from a bone infarct before attributing a radiolucency to an endodontic etiology in sickle cell patients.", "raw": "Sickle cell anemia is associated with an 8.3× higher risk of spontaneous pulp necrosis {{cite: Costa 2013 — sickle cell anemia is associated with an 8.3× higher risk of spontaneous pulp necrosis compared to matched controls; microvascular occlusion is the proposed mechanism}}. Two mechanisms contribute: (1) **microvascular occlusion** — deformed sickled erythrocytes obstruct the small-caliber end-arterioles that supply the pulp (the pulp has an end-arterial circulation with no collateral flow), resulting in ischemic pulp necrosis without bacterial involvement; (2) **osseous infarction** — the alveolar bone's marrow space is susceptible to sickling during crises, producing bone infarcts adjacent to the tooth that can radiographically mimic periapical pathology. Clinicians must therefore use pulp vitality testing to distinguish true endodontic disease from a bone infarct before attributing a radiolucency to an endodontic etiology in sickle cell patients."}, {"type": "ul", "items": ["What special considerations apply to endodontic treatment in sickle cell patients?"], "raw": "- What special considerations apply to endodontic treatment in sickle cell patients?"}, {"type": "p", "text": "Appointments should be scheduled for times of good hydration and oxygenation. Stress and anxiety should be minimized because they can precipitate a sickle crisis. Profound local anesthesia is essential, and long procedures should be avoided when possible. Antibiotic prophylaxis may be considered in consultation with the hematologist for patients with functional asplenia.", "raw": "Appointments should be scheduled for times of good hydration and oxygenation. Stress and anxiety should be minimized because they can precipitate a sickle crisis. Profound local anesthesia is essential, and long procedures should be avoided when possible. Antibiotic prophylaxis may be considered in consultation with the hematologist for patients with functional asplenia."}]}, {"id": "s13-systemic-conditions-and-endodontics-134-head-and-neck-radiation", "number": "13.4", "title": "Head and Neck Radiation", "level": 2, "blocks": [{"type": "ul", "items": ["How does radiation therapy affect pulp testing?"], "raw": "- How does radiation therapy affect pulp testing?"}, {"type": "p", "text": "Head and neck radiation reduces the tooth's response to cold sensibility testing without altering the underlying pulp histology. Clinicians should be aware that thermal testing may underestimate vitality in irradiated patients.", "raw": "Head and neck radiation reduces the tooth's response to cold sensibility testing without altering the underlying pulp histology. Clinicians should be aware that thermal testing may underestimate vitality in irradiated patients."}, {"type": "ul", "items": ["What considerations apply to endodontic treatment in irradiated patients?"], "raw": "- What considerations apply to endodontic treatment in irradiated patients?"}, {"type": "p", "text": "Endodontic treatment is generally preferred over extraction in previously irradiated jaws because extraction carries a risk of osteoradionecrosis. Root canal therapy should be performed atraumatically, with gentle instrumentation and avoidance of over-instrumentation past the apex.", "raw": "Endodontic treatment is generally preferred over extraction in previously irradiated jaws because extraction carries a risk of osteoradionecrosis. Root canal therapy should be performed atraumatically, with gentle instrumentation and avoidance of over-instrumentation past the apex."}, {"type": "ul", "items": ["What is the risk of osteoradionecrosis with endodontic procedures?"], "raw": "- What is the risk of osteoradionecrosis with endodontic procedures?"}, {"type": "p", "text": "The risk of osteoradionecrosis from routine non-surgical endodontic treatment is low, and RCT is considered safer than extraction in irradiated patients. Apical surgery in the radiation field should generally be avoided.", "raw": "The risk of osteoradionecrosis from routine non-surgical endodontic treatment is low, and RCT is considered safer than extraction in irradiated patients. Apical surgery in the radiation field should generally be avoided."}]}]}, {"id": "s14-pulp-biology-and-dental-anatomy", "number": "14", "title": "Pulp Biology and Dental Anatomy", "level": 1, "blocks": [], "subsections": [{"id": "s14-pulp-biology-and-dental-anatomy-141-pulp-histology-and-biology", "number": "14.1", "title": "Pulp Histology and Biology", "level": 2, "blocks": [{"type": "ul", "items": ["What is the mineral content of mature dentin?"], "raw": "- What is the mineral content of mature dentin?"}, {"type": "p", "text": "The mineral content of mature dentin is 50%.", "raw": "The mineral content of mature dentin is 50%."}, {"type": "ul", "items": ["What is the minimum remaining dentin thickness to prevent pulpal injury?"], "raw": "- What is the minimum remaining dentin thickness to prevent pulpal injury?"}, {"type": "p", "text": "0.5 mm of remaining dentin thickness is required to cause pulpal injury (Murray, 2002; same finding by Reeves and Stanley, 1966). Stanley found that the damage from bacteria getting within 0.5 mm of the pulp is significant and irreversible.", "raw": "0.5 mm of remaining dentin thickness is required to cause pulpal injury (Murray, 2002; same finding by Reeves and Stanley, 1966). Stanley found that the damage from bacteria getting within 0.5 mm of the pulp is significant and irreversible."}, {"type": "ul", "items": ["What are the zones of the pulp and their functions?"], "raw": "- What are the zones of the pulp and their functions?"}, {"type": "p", "text": "Moving from the dentin inward, the four histologic zones of the pulp are: (1) the **odontoblastic layer**, which produces primary, secondary, and reparative dentin; (2) the **cell-free zone of Weil**, sparsely populated with cells and containing the nerve plexus of Raschkow and capillary networks; (3) the **cell-rich zone**, containing fibroblasts and undifferentiated mesenchymal cells that can differentiate into odontoblast-like cells following injury; and (4) the **pulp core**, containing the main vasculature, nerves, connective tissue, and cellular elements.", "raw": "Moving from the dentin inward, the four histologic zones of the pulp are: (1) the **odontoblastic layer**, which produces primary, secondary, and reparative dentin; (2) the **cell-free zone of Weil**, sparsely populated with cells and containing the nerve plexus of Raschkow and capillary networks; (3) the **cell-rich zone**, containing fibroblasts and undifferentiated mesenchymal cells that can differentiate into odontoblast-like cells following injury; and (4) the **pulp core**, containing the main vasculature, nerves, connective tissue, and cellular elements."}, {"type": "ul", "items": ["How does pulp respond to injury at the cellular level?"], "raw": "- How does pulp respond to injury at the cellular level?"}, {"type": "p", "text": "Mild injury elicits reactionary dentin formation by existing odontoblasts. Severe injury that kills odontoblasts triggers recruitment of mesenchymal stem cells from the cell-rich zone, which differentiate into odontoblast-like cells and deposit reparative (tertiary) dentin. The pulp also mounts an inflammatory response — initially innate immunity (dendritic cells, macrophages, neutrophils) followed by acquired immunity with B and T cells {{cite: Hahn and Liewehr 2007}}. Unresolved microbial challenge drives RANKL expression, activating osteoclasts and leading to periapical bone resorption.", "raw": "Mild injury elicits reactionary dentin formation by existing odontoblasts. Severe injury that kills odontoblasts triggers recruitment of mesenchymal stem cells from the cell-rich zone, which differentiate into odontoblast-like cells and deposit reparative (tertiary) dentin. The pulp also mounts an inflammatory response — initially innate immunity (dendritic cells, macrophages, neutrophils) followed by acquired immunity with B and T cells {{cite: Hahn and Liewehr 2007}}. Unresolved microbial challenge drives RANKL expression, activating osteoclasts and leading to periapical bone resorption."}]}, {"id": "s14-pulp-biology-and-dental-anatomy-142-anatomical-variations-and-anomalies", "number": "14.2", "title": "Anatomical Variations and Anomalies", "level": 2, "blocks": [{"type": "ul", "items": ["What is the Oehlers classification of dens invaginatus?"], "raw": "- What is the Oehlers classification of dens invaginatus?"}, {"type": "p", "text": "Oehlers classified dens invaginatus into three types based on the extent of the invagination:", "raw": "Oehlers classified dens invaginatus into three types based on the extent of the invagination:"}, {"type": "ul", "items": ["**Type I:** invagination confined to the crown, not extending beyond the CEJ", "**Type II:** invagination extending apical to the CEJ into the root, ending as a blind sac but not communicating with the PDL", "**Type III:** invagination extending through the root and communicating with the PDL laterally (IIIa) or apically (IIIb)"], "raw": "- **Type I:** invagination confined to the crown, not extending beyond the CEJ\n- **Type II:** invagination extending apical to the CEJ into the root, ending as a blind sac but not communicating with the PDL\n- **Type III:** invagination extending through the root and communicating with the PDL laterally (IIIa) or apically (IIIb)"}, {"type": "ul", "items": ["What are the common anatomical variations by tooth type?"], "raw": "- What are the common anatomical variations by tooth type?"}, {"type": "p", "text": "Common variations include: MB2 canals in maxillary first molars (present in 60–95%), middle mesial canals in mandibular molars (1–15%), second canals in mandibular incisors (15–40%), C-shaped canals in mandibular second molars (up to 30% in Asian populations), dens invaginatus in maxillary lateral incisors, and taurodontism.", "raw": "Common variations include: MB2 canals in maxillary first molars (present in 60–95%), middle mesial canals in mandibular molars (1–15%), second canals in mandibular incisors (15–40%), C-shaped canals in mandibular second molars (up to 30% in Asian populations), dens invaginatus in maxillary lateral incisors, and taurodontism."}, {"type": "ul", "items": ["How do you identify and manage C-shaped canals?"], "raw": "- How do you identify and manage C-shaped canals?"}, {"type": "p", "text": "C-shaped canals are identified pre-operatively by fused roots on radiograph, a catenary line between the mesial and distal canals on the pulp floor, and CBCT imaging. Management requires meticulous irrigation and activation because the isthmus connecting the canal components cannot be mechanically instrumented. Warm vertical or carrier-based obturation is preferred because cold lateral condensation cannot reliably fill the isthmus anatomy.", "raw": "C-shaped canals are identified pre-operatively by fused roots on radiograph, a catenary line between the mesial and distal canals on the pulp floor, and CBCT imaging. Management requires meticulous irrigation and activation because the isthmus connecting the canal components cannot be mechanically instrumented. Warm vertical or carrier-based obturation is preferred because cold lateral condensation cannot reliably fill the isthmus anatomy."}]}, {"id": "s14-pulp-biology-and-dental-anatomy-143-periapical-pathology", "number": "14.3", "title": "Periapical Pathology", "level": 2, "blocks": [{"type": "ul", "items": ["What is the immunologic theory of periapical cyst formation?"], "raw": "- What is the immunologic theory of periapical cyst formation?"}, {"type": "p", "text": "The immunologic theory (Torabinejad) suggests cysts increase due to inflammatory mediators stimulating epithelial cells to proliferate. This differs from the abscess theory which states cysts arise from proliferating epithelial cells around an existing abscess cavity (Nair). Ten Cate proposed the nutritional deficiency theory which states the center of a cyst necroses due to loss of nutritional supply.", "raw": "The immunologic theory (Torabinejad) suggests cysts increase due to inflammatory mediators stimulating epithelial cells to proliferate. This differs from the abscess theory which states cysts arise from proliferating epithelial cells around an existing abscess cavity (Nair). Ten Cate proposed the nutritional deficiency theory which states the center of a cyst necroses due to loss of nutritional supply."}, {"type": "ul", "items": ["What are the histologic differences between periapical granuloma and cyst?"], "raw": "- What are the histologic differences between periapical granuloma and cyst?"}, {"type": "p", "text": "A **periapical granuloma** is composed of granulation tissue infiltrated with lymphocytes, plasma cells, macrophages, and fibroblasts, without an epithelial lining. A **periapical cyst** contains a fluid- or semi-solid–filled cavity lined by stratified squamous epithelium derived from the epithelial rests of Malassez. Nair further distinguished **pocket cysts**, which open into the root canal and can heal with orthograde RCT, from **true cysts**, which are fully enclosed and typically require surgical management.", "raw": "A **periapical granuloma** is composed of granulation tissue infiltrated with lymphocytes, plasma cells, macrophages, and fibroblasts, without an epithelial lining. A **periapical cyst** contains a fluid- or semi-solid–filled cavity lined by stratified squamous epithelium derived from the epithelial rests of Malassez. Nair further distinguished **pocket cysts**, which open into the root canal and can heal with orthograde RCT, from **true cysts**, which are fully enclosed and typically require surgical management."}, {"type": "ul", "items": ["How does the immune response contribute to periapical pathosis?"], "raw": "- How does the immune response contribute to periapical pathosis?"}, {"type": "p", "text": "The response begins with innate immunity (dendritic cells, macrophages, and neutrophils) and transitions to acquired immunity dominated by B and T lymphocytes {{cite: Hahn and Liewehr 2007}}. Unresolved microbial challenge drives RANKL (receptor activator of NF-κB ligand) expression, which activates osteoclasts and produces periapical bone resorption.", "raw": "The response begins with innate immunity (dendritic cells, macrophages, and neutrophils) and transitions to acquired immunity dominated by B and T lymphocytes {{cite: Hahn and Liewehr 2007}}. Unresolved microbial challenge drives RANKL (receptor activator of NF-κB ligand) expression, which activates osteoclasts and produces periapical bone resorption."}]}]}, {"id": "s15-dental-trauma", "number": "15", "title": "Dental Trauma", "level": 1, "blocks": [], "subsections": [{"id": "s15-dental-trauma-150-managing-trauma-patients", "number": "15.0", "title": "Managing Trauma Patients", "level": 2, "blocks": [{"type": "p", "text": "Croll et al. emphasized that the initial assessment of a dental trauma patient must include a brief neurological evaluation to rule out intracranial or cranial nerve injury before any dental treatment is initiated. Begin with an ABCD survey (Airway, Breathing, Circulation, Disability), assess alertness and orientation to person, place, and time, and perform a focused cranial nerve examination. Dental care is addressed only after the patient is medically stable.", "raw": "Croll et al. emphasized that the initial assessment of a dental trauma patient must include a brief neurological evaluation to rule out intracranial or cranial nerve injury before any dental treatment is initiated. Begin with an ABCD survey (Airway, Breathing, Circulation, Disability), assess alertness and orientation to person, place, and time, and perform a focused cranial nerve examination. Dental care is addressed only after the patient is medically stable."}]}, {"id": "s15-dental-trauma-151-concussion-subluxation-and-intrusion", "number": "15.1", "title": "Concussion, Subluxation, and Intrusion", "level": 2, "blocks": [{"type": "p", "text": "Andreasen emphasized that stage of root development is the most significant prognostic factor in intrusion injuries — immature (open-apex) teeth have the best prognosis because they retain the capacity for continued root development and spontaneous re-eruption. A delay of 1 day in treating intrusion does not adversely affect outcome.", "raw": "Andreasen emphasized that stage of root development is the most significant prognostic factor in intrusion injuries — immature (open-apex) teeth have the best prognosis because they retain the capacity for continued root development and spontaneous re-eruption. A delay of 1 day in treating intrusion does not adversely affect outcome."}]}, {"id": "s15-dental-trauma-152-avulsion-management", "number": "15.2", "title": "Avulsion Management", "level": 2, "blocks": [{"type": "ul", "items": ["What is the incidence of replacement resorption after replantation?"], "raw": "- What is the incidence of replacement resorption after replantation?"}, {"type": "p", "text": "Replacement resorption (ankylosis) is a common long-term complication after replantation of avulsed teeth, particularly when extra-alveolar dry time exceeds 60 minutes (Souza).", "raw": "Replacement resorption (ankylosis) is a common long-term complication after replantation of avulsed teeth, particularly when extra-alveolar dry time exceeds 60 minutes (Souza)."}, {"type": "ul", "items": ["What are the optimal storage media and extra-alveolar times?"], "raw": "- What are the optimal storage media and extra-alveolar times?"}, {"type": "p", "text": "In decreasing order of preference, suitable storage media are: Hank's Balanced Salt Solution (HBSS, ideal), cold milk, saliva, and saline. Water is the least favorable because its hypotonicity causes PDL cell lysis. Extra-alveolar time should be minimized — ideally under 15 minutes — to preserve PDL cell viability.", "raw": "In decreasing order of preference, suitable storage media are: Hank's Balanced Salt Solution (HBSS, ideal), cold milk, saliva, and saline. Water is the least favorable because its hypotonicity causes PDL cell lysis. Extra-alveolar time should be minimized — ideally under 15 minutes — to preserve PDL cell viability."}, {"type": "ul", "items": ["What factors influence prognosis after replantation?"], "raw": "- What factors influence prognosis after replantation?"}, {"type": "p", "text": "An intact, viable periodontal ligament is the single most important determinant of healing after replantation (Van Hassel). Other key factors include extra-oral dry time, storage medium, patient age, stage of root development, and promptness of replantation.", "raw": "An intact, viable periodontal ligament is the single most important determinant of healing after replantation (Van Hassel). Other key factors include extra-oral dry time, storage medium, patient age, stage of root development, and promptness of replantation."}]}, {"id": "s15-dental-trauma-153-splinting-guidelines", "number": "15.3", "title": "Splinting Guidelines", "level": 2, "blocks": [{"type": "ul", "items": ["What are the IADT guidelines for splinting?"], "raw": "- What are the IADT guidelines for splinting?"}, {"type": "p", "text": "IADT guidelines recommend a flexible, physiologic splint using a wire no thicker than 0.4 mm. Cervical (coronal third) root fractures are an exception and require rigid splinting for up to 4 months.", "raw": "IADT guidelines recommend a flexible, physiologic splint using a wire no thicker than 0.4 mm. Cervical (coronal third) root fractures are an exception and require rigid splinting for up to 4 months."}, {"type": "ul", "items": ["What is the recommended splinting duration for different injuries?"], "raw": "- What is the recommended splinting duration for different injuries?"}, {"type": "ul", "items": ["**Concussion / subluxation:** no splint required", "**Extrusive luxation:** 2 weeks, flexible", "**Lateral luxation:** 4 weeks, flexible", "**Avulsion (closed apex, <60 min dry time):** 2 weeks, flexible", "**Avulsion (extended dry time):** 4 weeks, flexible", "**Root fracture — apical or middle third:** 4 weeks, flexible", "**Root fracture — cervical third:** up to 4 months, rigid", "**Alveolar fracture:** 4 weeks, rigid"], "raw": "- **Concussion / subluxation:** no splint required\n- **Extrusive luxation:** 2 weeks, flexible\n- **Lateral luxation:** 4 weeks, flexible\n- **Avulsion (closed apex, <60 min dry time):** 2 weeks, flexible\n- **Avulsion (extended dry time):** 4 weeks, flexible\n- **Root fracture — apical or middle third:** 4 weeks, flexible\n- **Root fracture — cervical third:** up to 4 months, rigid\n- **Alveolar fracture:** 4 weeks, rigid"}]}, {"id": "s15-dental-trauma-154-replacement-resorption-and-decoronation", "number": "15.4", "title": "Replacement Resorption and Decoronation", "level": 2, "blocks": [{"type": "ul", "items": ["When is decoronation indicated?"], "raw": "- When is decoronation indicated?"}, {"type": "p", "text": "Decoronation is indicated when a replanted tooth is undergoing replacement resorption and becomes infrapositioned (typically ≥1 mm) in a growing patient before the pubertal growth spurt (Malmgren). Decoronation preserves the alveolar ridge as the root resorbs, enabling eventual implant placement at skeletal maturity.", "raw": "Decoronation is indicated when a replanted tooth is undergoing replacement resorption and becomes infrapositioned (typically ≥1 mm) in a growing patient before the pubertal growth spurt (Malmgren). Decoronation preserves the alveolar ridge as the root resorbs, enabling eventual implant placement at skeletal maturity."}, {"type": "ul", "items": ["What is the technique for decoronation?"], "raw": "- What is the technique for decoronation?"}, {"type": "p", "text": "The crown is removed and the root structure is reduced to approximately 2 mm below the osseous crest. The remaining root is left in place and covered with a mucoperiosteal flap. The resorbing root is gradually replaced by bone.", "raw": "The crown is removed and the root structure is reduced to approximately 2 mm below the osseous crest. The remaining root is left in place and covered with a mucoperiosteal flap. The resorbing root is gradually replaced by bone."}, {"type": "ul", "items": ["Is decoronation successful?"], "raw": "- Is decoronation successful?"}, {"type": "p", "text": "Yes. A systematic review by Mohadeb found decoronation to be a reliable technique for preserving alveolar ridge volume, particularly when performed before the pubertal growth spurt.", "raw": "Yes. A systematic review by Mohadeb found decoronation to be a reliable technique for preserving alveolar ridge volume, particularly when performed before the pubertal growth spurt."}]}]}, {"id": "s16-differential-diagnosis-and-disease-mimickers", "number": "16", "title": "Differential Diagnosis and Disease Mimickers", "level": 1, "blocks": [], "subsections": [{"id": "s16-differential-diagnosis-and-disease-mimickers-161-non-odontogenic-pain", "number": "16.1", "title": "Non-Odontogenic Pain", "level": 2, "blocks": [{"type": "ul", "items": ["How do you differentiate cardiac pain from dental pain?"], "raw": "- How do you differentiate cardiac pain from dental pain?"}, {"type": "p", "text": "Cardiac pain is often more pressure and burning compared to dental pain which is throbbing and aching (Kreiner).", "raw": "Cardiac pain is often more pressure and burning compared to dental pain which is throbbing and aching (Kreiner)."}, {"type": "ul", "items": ["What percentage of persistent pain after RCT is non-odontogenic?"], "raw": "- What percentage of persistent pain after RCT is non-odontogenic?"}, {"type": "p", "text": "Persistent pain after root canal treatment is caused by non-odontogenic causes about half the time (Nixdorf). This is important when evaluating patients with persistent pain and to avoid performing RCT on patients without an odontogenic cause.", "raw": "Persistent pain after root canal treatment is caused by non-odontogenic causes about half the time (Nixdorf). This is important when evaluating patients with persistent pain and to avoid performing RCT on patients without an odontogenic cause."}]}, {"id": "s16-differential-diagnosis-and-disease-mimickers-162-lesions-mimicking-endodontic-pathology", "number": "16.2", "title": "Lesions Mimicking Endodontic Pathology", "level": 2, "blocks": [{"type": "ul", "items": ["What lesions can mimic periapical pathology?"], "raw": "- What lesions can mimic periapical pathology?"}, {"type": "p", "text": "Ameloblastomas can appear like endodontic radiolucencies - most often in the posterior mandible. Brown tumors of hyperparathyroidism can cause multiple PARLs and a ground-glass appearance around vital teeth. Nasopalatine duct cysts could mimic endodontic pathology - they appear as heart-shaped radiolucencies at the midline.", "raw": "Ameloblastomas can appear like endodontic radiolucencies - most often in the posterior mandible. Brown tumors of hyperparathyroidism can cause multiple PARLs and a ground-glass appearance around vital teeth. Nasopalatine duct cysts could mimic endodontic pathology - they appear as heart-shaped radiolucencies at the midline."}, {"type": "ul", "items": ["How do you differentiate true endodontic pathology from mimickers?"], "raw": "- How do you differentiate true endodontic pathology from mimickers?"}, {"type": "p", "text": "The decisive test is pulp vitality. A vital pulp response in a tooth associated with a radiolucency strongly argues against an endodontic origin and should prompt evaluation for a non-endodontic lesion. Other helpful features include: lesion location (midline nasopalatine duct cyst, multiple radiolucencies in brown tumors, posterior mandible for ameloblastoma), the relationship of the lesion to the root apex (endodontic lesions are centered on the apex), and the presence or absence of symptoms. Biopsy is indicated whenever the diagnosis is uncertain or the lesion has atypical features.", "raw": "The decisive test is pulp vitality. A vital pulp response in a tooth associated with a radiolucency strongly argues against an endodontic origin and should prompt evaluation for a non-endodontic lesion. Other helpful features include: lesion location (midline nasopalatine duct cyst, multiple radiolucencies in brown tumors, posterior mandible for ameloblastoma), the relationship of the lesion to the root apex (endodontic lesions are centered on the apex), and the presence or absence of symptoms. Biopsy is indicated whenever the diagnosis is uncertain or the lesion has atypical features."}]}]}, {"id": "s17-high-yield-board-review-topics", "number": "17", "title": "High-Yield Board Review Topics", "level": 1, "blocks": [], "subsections": [{"id": "s17-high-yield-board-review-topics-171-trauma-quick-reference", "number": "17.1", "title": "Trauma Quick Reference", "level": 2, "blocks": [{"type": "ul", "items": ["What should you do first in a case of dental trauma?"], "raw": "- What should you do first in a case of dental trauma?"}, {"type": "p", "text": "Perform a cranial nerve examination and neurological assessment before any dental treatment (Croll).", "raw": "Perform a cranial nerve examination and neurological assessment before any dental treatment (Croll)."}, {"type": "ul", "items": ["How likely is a tooth to become necrotic after an uncomplicated crown fracture?"], "raw": "- How likely is a tooth to become necrotic after an uncomplicated crown fracture?"}, {"type": "p", "text": "Approximately 6% of uncomplicated crown fractures progress to pulp necrosis.", "raw": "Approximately 6% of uncomplicated crown fractures progress to pulp necrosis."}, {"type": "ul", "items": ["How successful are Cvek pulpotomies?"], "raw": "- How successful are Cvek pulpotomies?"}, {"type": "p", "text": "96% success rate (Cvek).", "raw": "96% success rate (Cvek)."}, {"type": "ul", "items": ["How successful is treating only the coronal portion of a horizontal root fracture?"], "raw": "- How successful is treating only the coronal portion of a horizontal root fracture?"}, {"type": "p", "text": "86% success rate when the coronal segment is treated and the apical segment is left undisturbed (Cvek).", "raw": "86% success rate when the coronal segment is treated and the apical segment is left undisturbed (Cvek)."}, {"type": "ul", "items": ["If there is a horizontal root fracture, what is the chance the coronal segment becomes necrotic?"], "raw": "- If there is a horizontal root fracture, what is the chance the coronal segment becomes necrotic?"}, {"type": "p", "text": "22% (Andreasen).", "raw": "22% (Andreasen)."}, {"type": "ul", "items": ["According to Andreasen, what is the incidence of pulp necrosis for different luxation injuries?"], "raw": "- According to Andreasen, what is the incidence of pulp necrosis for different luxation injuries?"}, {"type": "ul", "items": ["Intrusion: 85%", "Lateral luxation: 58%", "Extrusive luxation: 26%", "Subluxation: 6%", "Concussion: 3%"], "raw": "- Intrusion: 85%\n- Lateral luxation: 58%\n- Extrusive luxation: 26%\n- Subluxation: 6%\n- Concussion: 3%"}, {"type": "ul", "items": ["Do you have to perform a root canal on an avulsed open-apex tooth replanted within 1 hour of dry time?"], "raw": "- Do you have to perform a root canal on an avulsed open-apex tooth replanted within 1 hour of dry time?"}, {"type": "p", "text": "No — open-apex teeth replanted promptly may revascularize and remain vital.", "raw": "No — open-apex teeth replanted promptly may revascularize and remain vital."}, {"type": "ul", "items": ["What can you do to the root of an avulsed tooth with a closed apex and extended (>1 hour) dry time before replanting?"], "raw": "- What can you do to the root of an avulsed tooth with a closed apex and extended (>1 hour) dry time before replanting?"}, {"type": "p", "text": "Soak the root in 2% stannous fluoride prior to replantation to slow replacement resorption.", "raw": "Soak the root in 2% stannous fluoride prior to replantation to slow replacement resorption."}, {"type": "ul", "items": ["According to Andreasen, what is the risk of resorption after replantation if the tooth is replanted in under 30 minutes vs. over 90 minutes?"], "raw": "- According to Andreasen, what is the risk of resorption after replantation if the tooth is replanted in under 30 minutes vs. over 90 minutes?"}, {"type": "p", "text": "Approximately 10% risk of resorption if replanted under 30 minutes; resorption is nearly certain if dry time exceeds 90 minutes.", "raw": "Approximately 10% risk of resorption if replanted under 30 minutes; resorption is nearly certain if dry time exceeds 90 minutes."}, {"type": "ul", "items": ["Is the tooth socket itself important when replanting?"], "raw": "- Is the tooth socket itself important when replanting?"}, {"type": "p", "text": "No. Oswald replanted monkey teeth into surgically created sockets and demonstrated that healing does not depend on the original socket being preserved.", "raw": "No. Oswald replanted monkey teeth into surgically created sockets and demonstrated that healing does not depend on the original socket being preserved."}, {"type": "ul", "items": ["What does the AAE recommend for follow-up intervals after trauma?"], "raw": "- What does the AAE recommend for follow-up intervals after trauma?"}, {"type": "p", "text": "2 weeks, 4 weeks, 6–8 weeks, 6 months, 1 year, and 5 years.", "raw": "2 weeks, 4 weeks, 6–8 weeks, 6 months, 1 year, and 5 years."}, {"type": "ul", "items": ["For luxated teeth, how likely is pulp canal obliteration (PCO), and what fraction of PCO teeth become necrotic?"], "raw": "- For luxated teeth, how likely is pulp canal obliteration (PCO), and what fraction of PCO teeth become necrotic?"}, {"type": "p", "text": "Approximately 40% of luxated teeth develop PCO; 7% of teeth that develop PCO subsequently become necrotic.", "raw": "Approximately 40% of luxated teeth develop PCO; 7% of teeth that develop PCO subsequently become necrotic."}, {"type": "ul", "items": ["What injury factors are most associated with pulp necrosis?"], "raw": "- What injury factors are most associated with pulp necrosis?"}, {"type": "p", "text": "Extent of injury, patient age and stage of tooth development, and late-onset necrosis (Andreasen). Transient apical breakdown is a normal finding and does not necessarily indicate necrosis.", "raw": "Extent of injury, patient age and stage of tooth development, and late-onset necrosis (Andreasen). Transient apical breakdown is a normal finding and does not necessarily indicate necrosis."}, {"type": "ul", "items": ["How do you confirm that a tooth is ankylosed?"], "raw": "- How do you confirm that a tooth is ankylosed?"}, {"type": "p", "text": "Andersson found that a high-pitched metallic percussion sound and lack of physiologic mobility are the most reliable clinical indicators of ankylosis.", "raw": "Andersson found that a high-pitched metallic percussion sound and lack of physiologic mobility are the most reliable clinical indicators of ankylosis."}, {"type": "ul", "items": ["How does systemic tetracycline compare to amoxicillin for avulsion management, and what are the absolute contraindications to tetracycline?"], "raw": "- How does systemic tetracycline compare to amoxicillin for avulsion management, and what are the absolute contraindications to tetracycline?"}, {"type": "p", "text": "Systemic tetracycline is superior to amoxicillin and placebo for preventing replacement resorption after avulsion (Sae-Lim). Tetracycline is absolutely contraindicated in children and pregnant patients.", "raw": "Systemic tetracycline is superior to amoxicillin and placebo for preventing replacement resorption after avulsion (Sae-Lim). Tetracycline is absolutely contraindicated in children and pregnant patients."}]}, {"id": "s17-high-yield-board-review-topics-172-resorption", "number": "17.2", "title": "Resorption", "level": 2, "blocks": [{"type": "ul", "items": ["What causes internal resorption, and what are the success rates for treatment of perforated and non-perforated lesions?"], "raw": "- What causes internal resorption, and what are the success rates for treatment of perforated and non-perforated lesions?"}, {"type": "p", "text": "Internal resorption involves loss of the protective predentin layer, allowing clastic cells to access and resorb root dentin. Treatment is with long-term calcium hydroxide followed by obturation with MTA or a bioceramic. Caliskan reported 100% success for non-perforating lesions vs. 25% for perforated lesions (small sample size, long-term CaOH).", "raw": "Internal resorption involves loss of the protective predentin layer, allowing clastic cells to access and resorb root dentin. Treatment is with long-term calcium hydroxide followed by obturation with MTA or a bioceramic. Caliskan reported 100% success for non-perforating lesions vs. 25% for perforated lesions (small sample size, long-term CaOH)."}, {"type": "ul", "items": ["What is TCA and how does it work?"], "raw": "- What is TCA and how does it work?"}, {"type": "p", "text": "Trichloroacetic acid (TCA) deactivates clastic cells on the resorptive front via coagulative necrosis of soft tissue.", "raw": "Trichloroacetic acid (TCA) deactivates clastic cells on the resorptive front via coagulative necrosis of soft tissue."}, {"type": "ul", "items": ["What is the classification system for invasive cervical resorption?"], "raw": "- What is the classification system for invasive cervical resorption?"}, {"type": "p", "text": "Heithersay's classification is the most widely used system:", "raw": "Heithersay's classification is the most widely used system:"}, {"type": "ul", "items": ["**Class I and II:** small, localized lesions", "**Class III:** moderate lesions extending into the coronal third of the root", "**Class IV:** extensive lesions extending past the coronal third"], "raw": "- **Class I and II:** small, localized lesions\n- **Class III:** moderate lesions extending into the coronal third of the root\n- **Class IV:** extensive lesions extending past the coronal third"}, {"type": "ul", "items": ["What is the treatment for invasive cervical resorption and how successful is it?"], "raw": "- What is the treatment for invasive cervical resorption and how successful is it?"}, {"type": "p", "text": "Treatment protocol: isolate with glycerin to protect the gingiva, mechanically debride with bur and curette, apply 90% TCA to inactivate resorptive cells, and restore with a bioactive material such as Geristore. Non-surgical root canal treatment may or may not be needed since the predentin often remains intact and the pulp is protected. Heithersay's reported success rates:", "raw": "Treatment protocol: isolate with glycerin to protect the gingiva, mechanically debride with bur and curette, apply 90% TCA to inactivate resorptive cells, and restore with a bioactive material such as Geristore. Non-surgical root canal treatment may or may not be needed since the predentin often remains intact and the pulp is protected. Heithersay's reported success rates:"}, {"type": "ul", "items": ["**Class I and II:** 100%", "**Class III:** 78%", "**Class IV:** 12%"], "raw": "- **Class I and II:** 100%\n- **Class III:** 78%\n- **Class IV:** 12%"}, {"type": "ul", "items": ["What causes invasive cervical resorption (also called ECRR)?"], "raw": "- What causes invasive cervical resorption (also called ECRR)?"}, {"type": "p", "text": "The most commonly identified etiologic factors are orthodontic treatment, dental trauma, and internal bleaching.", "raw": "The most commonly identified etiologic factors are orthodontic treatment, dental trauma, and internal bleaching."}]}, {"id": "s17-high-yield-board-review-topics-173-pulpal-pathology-and-immunology", "number": "17.3", "title": "Pulpal Pathology and Immunology", "level": 2, "blocks": [{"type": "ul", "items": ["IgG and helper T cells predominate during the early active phase of periapical lesion development.", "**Anachoresis** is the theory that circulating bacteria are attracted to and localize in areas of chronic inflammation such as an untreated canal. This was refuted by Delivanis, who induced bacteremia in animals and found that bacteria did not seed into empty canal spaces.", "Nair's landmark histologic study of periapical biopsies found that 50% were granulomas, 35% were abscesses, and 15% were cysts. This contradicted the earlier belief that roughly half of periapical lesions were cysts. Nair further distinguished \"pocket cysts\" (which communicate with the canal and can heal after orthograde RCT) from \"true cysts\" (which are self-contained and typically require surgical management to resolve)."], "raw": "- IgG and helper T cells predominate during the early active phase of periapical lesion development.\n- **Anachoresis** is the theory that circulating bacteria are attracted to and localize in areas of chronic inflammation such as an untreated canal. This was refuted by Delivanis, who induced bacteremia in animals and found that bacteria did not seed into empty canal spaces.\n- Nair's landmark histologic study of periapical biopsies found that 50% were granulomas, 35% were abscesses, and 15% were cysts. This contradicted the earlier belief that roughly half of periapical lesions were cysts. Nair further distinguished \"pocket cysts\" (which communicate with the canal and can heal after orthograde RCT) from \"true cysts\" (which are self-contained and typically require surgical management to resolve)."}]}, {"id": "s17-high-yield-board-review-topics-174-coronal-seal-and-restoration-timing", "number": "17.4", "title": "Coronal Seal and Restoration Timing", "level": 2, "blocks": [{"type": "p", "text": "Oral fluids can reach the apex within 3 days of exposure to the oral environment if no coronal seal is present (Swanson and Madison). This finding supports the routine use of an orifice barrier and same-day core placement.", "raw": "Oral fluids can reach the apex within 3 days of exposure to the oral environment if no coronal seal is present (Swanson and Madison). This finding supports the routine use of an orifice barrier and same-day core placement."}]}]}, {"id": "sreferences", "number": "", "title": "References", "level": 1, "blocks": [], "subsections": [{"id": "sreferences-pulp-testing-and-diagnosis", "number": "", "title": "Pulp Testing and Diagnosis", "level": 2, "blocks": [{"type": "p", "text": "Mainkar A, Kim SG. Diagnostic Accuracy of 5 Dental Pulp Tests: A Systematic Review and Meta-analysis. J Endod 2018;44(5):694-702.", "raw": "Mainkar A, Kim SG. Diagnostic Accuracy of 5 Dental Pulp Tests: A Systematic Review and Meta-analysis. J Endod 2018;44(5):694-702."}, {"type": "p", "text": "Ricucci D, Loghin S, Siqueira JF Jr. Correlation between clinical and histologic pulp diagnoses. J Endod 2014;40(12):1932-9.", "raw": "Ricucci D, Loghin S, Siqueira JF Jr. Correlation between clinical and histologic pulp diagnoses. J Endod 2014;40(12):1932-9."}, {"type": "p", "text": "Ketterl W. educed postendodontic pain at 4 and 12 h and decreased rescue medication use", "section_id": "s3-anesthesia-and-pain-control-33-managing-the-hot-tooth", "section_title": "Managing the \"Hot\" Tooth", "source": "marker"}, {"author": "Konagala", "year": "2019", "finding": "4 mg dexamethasone equivalent to piroxicam 20 mg and deflazacort 30 mg for postendo pain control at 6, 12, 24 h", "section_id": "s3-anesthesia-and-pain-control-33-managing-the-hot-tooth", "section_title": "Managing the \"Hot\" Tooth", "source": "marker"}, {"author": "Jorge-Araújo", "year": "2018", "finding": "8 mg oral dexamethasone reduced post-endodontic pain intensity and rescue medication use vs placebo; equivalent to 400 mg ibuprofen", "section_id": "s3-anesthesia-and-pain-control-33-managing-the-hot-tooth", "section_title": "Managing the \"Hot\" Tooth", "source": "marker"}, {"author": "Aksoy", "year": "2019", "finding": "8 mg submucosal dexamethasone injected adjacent to SIP mandibular molars significantly reduced postop pain at 6, 12, 48 h and beat submucosal tramadol in the first 12 h", "section_id": "s3-anesthesia-and-pain-control-33-managing-the-hot-tooth", "section_title": "Managing the \"Hot\" Tooth", "source": "marker"}, {"author": "Mehrvarzfar", "year": "2008", "finding": "8 mg supraperiosteal dexamethasone injection around tooth with irreversible pulpitis effectively controlled postop pain for first 24 h", "section_id": "s3-anesthesia-and-pain-control-33-managing-the-hot-tooth", "section_title": "Managing the \"Hot\" Tooth", "source": "marker"}, {"author": "Krasner and Rankow", "year": "2004", "finding": "seven laws describe the predictable spatial relationship of canal orifices to the CEJ, external tooth surface, and pulp chamber floor", "section_id": "s4-access-and-coronal-disassembly-41-access-design-philosophy", "section_title": "Access Design Philosophy", "source": "marker"}, {"author": "Silva", "year": "2020", "finding": "Most in vitro studies show no significant difference in f rker"}, {"author": "Kenee", "year": "2006", "finding": "For CaOH removal, rotary instrumentation is most effective, followed by PUI, with hand filing using an H-file being least effective .", "section_id": "s6-irrigation-and-disinfection-64-intracanal-medicament-use-and-selection", "section_title": "Intracanal Medicament Use and Selection", "source": "marker"}, {"author": "Violich and Chandler", "year": "2010", "finding": "Arguments for removal: the smear layer harbors bacteria, reduces sealer penetration into dentinal tubules, and can dissolve over time, leaving pathways for microleakage .", "section_id": "s6-irrigation-and-disinfection-65-smear-layer-removal-protocol", "section_title": "Smear Layer Removal Protocol", "source": "marker"}, {"author": "Torabinejad", "year": "2009", "finding": "The counter-argument: systematic reviews have not shown a difference in clinical outcomes with or without smear layer removal , and some authors argue that retaining the smear layer actually reduces dentinal permeability and therefore bacterial ingress (Pas…", "section_id": "s6-irrigation-and-disinfection-65-smear-layer-removal-protocol", "section_title": "Smear Layer Removal Protocol", "source": "marker"}, {"author": "Sweatman and Baumgartner", "year": "2001", "finding": "System B carrier heat carriers are safe for surrounding tissues: less than a 10°C temperature rise at the external root surface even at a 200°C setting .", "section_id": "s7-obturation-71-obturation-technique-selection", "section_title": "Obturation Technique Selection", "source": "marker"}, {"author": "Fan", "year": "2004", "finding": "Oval or C-shaped canals Curved canals Canals with multiple portals of exit, where vertical compaction pressure improves filling of lateral canals (Peng: 28% vs 9% for cold lateral) Isthmuses and fins Resorptive defects with mid-canal ballooning Retreatment …", "section_id": "s7-obturation-71-obturation-technique-selection", "section_title": "Obturation Technique Selection", "s year": "2004", "finding": "A systematic review by Peters (2004) noted that transportation was most severe in the apical 5 mm and was related to instrument stiffness and technique.", "section_id": "s9-complications-and-management-93-ledgetransportation-management", "section_title": "Ledge/Transportation Management", "source": "prose"}, {"author": "Hulsmann", "year": "2000", "finding": "Immediate steps: (1) stop irrigation immediately; (2) place patient supine if near syncope; (3) apply cold compresses to the affected region to reduce swelling; (4) prescribe analgesics (NSAIDs +/- opioids) for pain management; (5) prescribe corticosteroids…", "section_id": "s9-complications-and-management-94-sodium-hypochlorite-accident-response", "section_title": "Sodium Hypochlorite Accident Response", "source": "marker"}, {"author": "Fouad and Burleson", "year": "2003", "finding": "Amoxicillin 500 mg TID for 7 days is the first-line agent; clindamycin or azithromycin for penicillin-allergic patients .", "section_id": "s9-complications-and-management-95-flare-up-management", "section_title": "Flare-Up Management", "source": "marker"}, {"author": "Lofthag-Hansen", "year": "2007", "finding": "CBCT is particularly valuable for detecting missed canals (e.g., MB2 in maxillary molars, middle mesial in mandibular molars) and assessing the relationship of the lesion to adjacent structures .", "section_id": "s9-complications-and-management-96-persistent-infection-workup", "section_title": "Persistent Infection Workup", "source": "marker"}, {"author": "Sundqvist", "year": "1998", "finding": "The most common persistent organism in previously treated canals is Enterococcus faecalis, which is resistant to CaOH and many standard intracanal medicaments due to its ability to survive in nutrient-poor, alkaline environments .", "section_id": "s9-complications-and-management-96-persistent-infection-workup", "section_title": "Persistent Infection Workup", "source": "marker"}, {"author": "Blomlöf", "year": "1997", "finding": "periodontal status of the retained root is the dominant prognostic factor for hemisection and root amputation outcomes", "section_id": "s10-surgical-endodontics-107-hemisectionroot-amputation-decisions", "section_title": "Hemisection/Root Amputation Decisions", "source": "marker"}, {"author": "Carnevale", "year": "1998", "finding": "root-resected molars retained in over 90% of cases at more than 10 years in a periodontal practice with regular maintenance; favorable case selection is critical", "section_id": "s10-surgical-endodontics-107-hemisectionroot-amputation-decisions", "section_title": "Hemisection/Root Amputation Decisions", "source": "marker"}, {"author": "Torabinejad", "year": "2009", "finding": "20% of endodontically treated teeth showed apical hypodensities greater than 1 mm on CBCT that would be classified as healed by 2D periapical radiograph criteria; CBCT over-detects persistent disease", "section_id": "s11-recall-and-outcomes-112-healing-assessment-criteria-and-timing", "section_title": "Healing Assessment Criteria and Timing", "source": "marker"}, {"author": "AAE", "year": "2019", "finding": "AAE antibiotic guidance: use the shortest effective course (3–5 days preferred when the patient is improving clinically); antibiotics are an adjunct to local treatment, never a substitute", "section_id": "s12-pharmacology-and-pain-management-122-antibiotic-selection-and-indications", "section_title": "Antibiotic Selection and Indications", "source": "marker"}, {"author": "Walton", "year": "1996", "finding": "Fouad, Rivera, and Walton (1996) conducted a prospective, double-blind, randomized controlled trial of 32 patients with a localized acute apical abscess.", "section_id": "s12-pharmacology-and-pain-management-122-antibiotic-selection-and-indications", "section_title": "Antibiotic Selection and Indications", "source": "prose"}, {"author": "Fouad and Burleson", "year": "2003", "finding": "diabetic patients had approximately 3× the flare-up rate and significantly reduced periapical healing rates compared to non-diabetic controls; effect disproportionately greater with poor glycemic control (HbA1c > 8%)", "section_id": "s13-systemic-conditions-and-endodontics-131-diabetes-and-endodontic-outcomes", "section_title": "Diabetes and Endodontic Outcomes", "source": "marker"}, {"author": "Costa", "year": "2013", "finding": "sickle cell anemia is associated with an 8.3× higher risk of spontaneous pulp necrosis compared to matched controls; microvascular occlusion is the proposed mechanism", "section_id": "s13-systemic-conditions-and-endodontics-133-sickle-cell-disease", "section_title": "Sickle Cell Disease", "source": "marker"}, {"author": "Hahn and Liewehr", "year": "2007", "finding": "The pulp also mounts an inflammatory response — initially innate immunity (dendritic cells, macrophages, neutrophils) followed by acquired immunity with B and T cells .", "section_id": "s14-pulp-biology-and-dental-anatomy-141-pulp-histology-and-biology", "section_title": "Pulp Histology and Biology", "source": "marker"}, {"author": "Hahn and Liewehr", "year": "2007", "finding": "The response begins with innate immunity (dendritic cells, macrophages, and neutrophils) and transitions to acquired immunity dominated by B and T lymphocytes .", "section_id": "s14-pulp-biology-and-dental-anatomy-143-periapical-pathology", "section_title": "Periapical Pathology", "source": "marker"}], "suggestions": [], "abstracts": {"AAE|2017": {"pmid": "41078154", "title": "Ethical considerations and legal allegations in endodontic practice.", "abstract": "Endodontics is often cited as one of the leading dental disciplines involved in malpractice claims. This focus article aims to explore the ethical and legal aspects of endodontic treatment, with particular focus on identifying the underlying reasons for malpractice allegations, while highlighting the standard of care (SOC). A literature search was conducted to identify patterns in malpractice claims and adverse events related to endodontic treatment. Findings are organized into a clinically relevant classification of adverse events, as local, regional, or systemic, based on the location and response to injury. Not all adverse events result in negative outcomes, nor do they necessarily lead to litigation. Common dental malpractice claims often arise from diagnostic failures, lack of informed consent, deviation from SOC, and delays in referring patients when necessary. Allegations related to root perforation, lack of rubber dam usage, wrong tooth therapy, and infections have generally favored the plaintiffs. Ethical principles form a foundation for professional responsibility. Good communication, risk assessment, and record keeping are prerequisites to enforce patient safety and reduce the risk of malpractice. Targeted improvements in organizations, competence, resources, research, and education can ultimately benefit both patients and practitioners, ensuring higher SOCs and safety.", "journal": "European journal of oral sciences", "pub_year": "2026", "status": "ok", "score": 0.5, "confidence": "medium", "needs_review": true}, "Aggarwal|2011": {"pmid": "22000449", "title": "A prospective, randomized, single-blind comparative evaluation of anesthetic efficacy of posterior superior alveolar nerve blocks, buccal infiltrations, and buccal plus palatal infiltrations in patients with irreversible pulpitis.", "abstract": "INTRODUCTION: The purpose of this study was to evaluate and compare the anesthetic efficacy of posterior superior alveolar (PSA) nerve blocks, buccal infiltrations, and buccal plus palatal infiltrations with 2% lidocaine with 1:200,000 epinephrine in maxillary first molars with irreversible pulpitis. METHODS: Ninety-four adult patients participated in this prospective, randomized, single-blinded study. The patients were divided into 3 treatment groups on a random basis. Twenty-eight patients received a PSA nerve block, 33 patients received buccal infiltrations, and 33 patients received buccal plus palatal infiltrations with 2% lidocaine with 1:200,000 epinephrine. Endodontic access preparation was initiated 15 minutes after injection. Pain during treatment was recorded using a Heft-Parker visual analog scale. Success was recorded as \"none\" or \"mild\" pain. RESULTS: Statistical analysis using nonparametric chi-square tests revealed that there was no statistical difference between the anesthetic success of PSA nerve blocks (64%), buccal infiltrations (54%), and buccal plus palatal infiltrations (70%). CONCLUSIONS: None of the tested methods gave 100% anesthetic success rates in maxillary first molars with irreversible pulpitis.", "journal": "Journal of endodontics", "pub_year": "2011", "status": "ok", "score": 0.75, "query": "Aggarwal[Author] AND 2011[PDAT] AND (endodont*[TiAb] OR root canal[TiAb] OR pulp[TiAb] OR periapical[TiAb] OR dental[TiAb] OR dentin[TiAb])", "confidence": "high", "needs_review": false}, "Aksoy|2019": {"pmid": "31702056", "title": "The effect of pretreatment submucosal injections of tramadol and dexamethasone on post-endodontic pain in mandibular molar teeth with symptomatic irreversible pulpitis: a randomized controlled clinical trial.", "abstract": "AIM: To establish the effects of submucosal single doses of two medicines on postoperative pain after root canal treatment in mandibular molar teeth with symptomatic irreversible pulpitis. METHODOLOGY: In this randomized controlled, double-blind clinical trial, 90 patients with the diagnosis of symptomatic irreversible pulpitis in their mandibular first or second molars were included and randomly divided into three groups (n = 30): a control group that received normal saline and two experimental groups that received a single dose of either tramadol (100 mg 2 mL-1 ) or dexamethasone (8 mg 2 mL-1 ). After local anaesthesia and before treatment, submucosal injections were administered into the mucobuccal fold adjacent to the mandibular molars, and a routine single-visit root canal treatment procedure was performed in all groups. After the root canal treatments, the patients were asked to score their pain level using the Heft-Parker visual analogue scale (0-170 mm) at 6, 12, 24, 48 and 72 h. The experimental groups were compared using one-way anova or Kruskal-Wallis H-test. The groups that were significantly different were compared pairwise using Student's t-test or the Mann-Whitney U-test. The findings were expressed as the mean ± standard deviation or median (min-max). The categorical variables were tested using the chi-square test or Fisher's exact chi-square test, and the results were expressed as counts and percentages. RESULTS: At the 6-h and 48-h time intervals, the intensity of pain was significantly less in both the dexamethasone and tramadol groups than in the control group (P < 0.0167). At the end of 12 h, the pain level in the dexamethasone group was significantly less compared to the other groups (P < 0.0167). CONCLUSIONS: Pretreatment submucosal dexamethasone and tramadol injections significantly diminished post-treatment endodontic pain of patients with symptomatic irreversible pulpitis following single-visit root canal treatment. However, dexamethasone was more effective than tramadol in pain reduction in the first 12 h.", "journal": "International endodontic journal", "pub_year": "2020", "status": "ok", "score": 0.75, "query": "Aksoy[Author] AND 2019[PDAT] AND (endodont*[TiAb] OR root canal[TiAb] OR pulp[TiAb] OR periapical[TiAb] OR dental[TiAb] OR dentin[TiAb])", "confidence": "high", "needs_review": false}, "Alomari|": {"pmid": "21366625", "title": "Responses of pulp sensibility tests during orthodontic treatment and retention.", "abstract": "AIM: To investigate the effect of orthodontic tooth movement involving the six maxillary anterior teeth on the pulp response to both thermal and electric stimuli during active orthodontic treatment and retention. METHODOLOGY: Forty-seven subjects who required fixed orthodontic appliances were used as a study group with 23 non-orthodontic subjects recruited as a control group. Cold and electrical stimuli were applied to the maxillary incisors and canines immediately before and after the placement of fixed appliances and at regular intervals for both groups during active treatment and 12 months into retention. The numbers of negative responses for each tooth at each time interval were recorded for both groups. The data were collected and tabulated, and chi-square tests were used to determine significant difference between the numbers of negative responses for the two types of tests used on the same tooth and between different teeth. The mean values of the electric pulp testing (EPT) thresholds were also obtained and used to assist in analysing the results. RESULTS: In the control group, all teeth tested positively to the EPT and thermal pulp tests at all time intervals. In the orthodontic group, two teeth failed to respond to EPT and only one tooth to thermal testing at baseline (Time 0). After that, the number of negative responses to both tests increased gradually at each time interval reaching a peak after 2 months of active treatment (Time 3) and then declined gradually towards the end of observation period (Time 14). At baseline, response thresholds to electric testing were typically higher for orthodontic subjects, particularly for the maxillary lateral incisor tooth. For the control group, the response threshold over the study period was relatively constant. For the orthodontic group, application of force immediately increased the response threshold to EPT (Time 1), which peaked after 2 months (Time 3) and then gradually reduced. At the end of the active treatment, response thresholds remained elevated, but they returned to pre-treatment values towards the end of the retention phase. CONCLUSION: Dental practitioners should interpret responses to electrical pulp testing cautiously in orthodontic patients; thermal testing may be more reliable.", "journal": "International endodontic journal", "pub_year": "2011", "status": "ok", "score": 1.0, "confidence": "high", "needs_review": false}, "Aquilino and Caplan|2002": {"pmid": "11941351", "title": "Relationship between crown placement and the survival of endodontically treated teeth.", "abstract": "STATEMENT OF PROBLEM: Crowns have been considered the restoration of choice for endodontically treated teeth, but their selection has been based primarily on anecdotal evidence. PURPOSE: This study tested the hypothesis that crown placement (coronal coverage) is associated with improved survival of endodontically treated teeth when preaccess, endodontic, and restorative factors are controlled. MATERIAL AND METHODS: A University of Iowa College of Dentistry treatment database was used to identify permanent teeth that had undergone initial obturation between July 1, 1985, and December 31, 1987. Study patients were restricted to persons with at least 1 dental visit in each 2-year interval from 1985 to 1996; a simple random sample of 280 patients (n = 400 teeth) was selected. Dental charts, radiographs, and computerized databases were examined to ascertain variables of interest and to verify study inclusion criteria. Kaplan-Meier survival estimates were generated for the 203 teeth that satisfied study inclusion criteria. Multivariate Cox proportional hazards regression models were developed, with standard errors adjusted to account for clustering of teeth within patients. RESULTS: When tooth type and radiographic evidence of caries at access were controlled, the final Cox model showed that endodontically treated teeth not crowned after obturation were lost at a 6.0 times greater rate than teeth crowned after obturation (95% confidence interval: 3.2 to 11.3). CONCLUSION: Within the limitations of this study, a strong association between crown placement and the survival of endodontically treated teeth was observed. These results
