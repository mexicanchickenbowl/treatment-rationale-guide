<script type="text/babel" data-presets="react">
const DATA = {"built_at": "2026-04-09T00:53:49.605685+00:00", "sections": [{"id": "preamble", "number": "", "title": "Preamble", "level": 1, "blocks": [{"type": "p", "text": "Endodontic Treatment Rationale Guide"}, {"type": "p", "text": "Evidence-Based Decision Points for Clinical Practice"}, {"type": "p", "text": "Format: Questions are numbered in black. Answers appear indented in blue italics. Author citations are in orange."}, {"type": "p", "text": "Instructions: Research the literature for unanswered questions and add your evidence-based responses."}], "subsections": []}, {"id": "sroot-canal-treatment-procedural-timeline", "number": "", "title": "Root Canal Treatment: Procedural Timeline", "level": 1, "blocks": [{"type": "p", "text": "Quick Reference: Evidence-based rationale for each clinical decision point"}, {"type": "table", "headers": ["PHASE", "STEP", "RATIONALE", "EVIDENCE"], "rows": [["PRE-OPERATIVE", "Medical History Review", "Screen for systemic conditions affecting treatment", "Fouad & Burleson - diabetes affects outcomes; AHA 2007 - prophylaxis guidelines"], ["", "Chief Complaint & History", "Determine etiology and guide diagnosis", "Nixdorf - 50% persistent post-RCT pain is non-odontogenic"], ["", "Clinical Examination", "Percussion, palpation, probing, swelling assessment", "Kayaoglu - SIP shows mechanical allodynia vs. necrosis"], ["", "Pulp Vitality Testing", "Cold first (84% accuracy), then EPT (82% accuracy)", "Mainkar & Kim 2018; Ricucci 2014 - 84-97% clinical-histologic correlation"], ["", "Radiographic Examination", "PA radiographs; CBCT if indicated", "Low - CBCT detects 34% more lesions in posterior maxilla; Aminoshariae - CBCT 2x detection rate"], ["", "Diagnosis & Treatment Plan", "AAE pulpal and periapical classification", "de Chevigny - radiolucency decreases success 93%→82%"], ["", "Informed Consent", "Discuss prognosis, alternatives, risks", "Salehrabi & Rotstein - 97% survival rate"], ["ANESTHESIA", "Local Anesthetic Selection", "Lidocaine or articaine based on case", "Garisto 2010 - articaine 3.6x paresthesia risk with IAN blocks"], ["", "Primary Block/Infiltration", "IAN block (3.6 mL) or maxillary infiltration", "Fowler & Reader - 2 cartridges more effective; Aggarwal - palatal doesn't increase success"], ["", "Supplemental Anesthesia PRN", "Buccal articaine, IO, PDL, intrapulpal if needed", "Kanaa 2012 - buccal articaine 84%, IO 68%, PDL 48%, repeat IAN 32%"], ["ACCESS", "Rubber Dam Isolation", "Standard of care - prevents aspiration, improves asepsis", "AAE 2017 Position Statement"], ["", "Isolation adjunctions", "Use opal dam as needed", ""], ["", "Access Cavity Preparation", "Follow Laws of Krasner and Rankow", "Reeh et al - access reduces stiffness only 5%"], ["", "Canal Location", "Use microscope, ultrasonics, dentin map", ""], ["INSTRUMENTATION", "Working Length Determination", "EAL is 96% accurate; 0.5-1mm from radiographic apex", "Burch & Hulen - 92.4% foramina short of apex; Kuttler - CDJ 0.5-0.66mm from apex"], ["", "Glide Path Establishment", "Manual or mechanical to #15-20", "Reduces instrument separation risk"], ["", "Canal Shaping", "Minimum #30 apical size for disinfection", "Sulzberger & Brilliant - #30 minimum;"], ["", "Maintain Patency", "Prevents blockage, improves irrigant flow", "Vera 2012 - patency increases irrigant penetration"], ["IRRIGATION", "NaOCl Irrigation", "5.25% most effective; continuous replenishment", "Hand - concentration matters; Peters - 35% untouched walls need chemical disinfection"], ["", "EDTA Application", "1 minute penultimate rinse for smear layer removal", "Calt & Serper - 1 min optimal; 10 min causes erosion"], ["", "Final NaOCl Rinse", "Removes organic debris after EDTA", "Baumgartner & Mader - don't alternate throughout"], ["", "Activation (PUI/Sonic)", "Improves debridement in isthmuses, fins", "Enhances irrigant penetration"], ["", "Dry Canals", "Paper points to confirm dryness before obturation", "Persistent exudate may require medicament"], ["OBTURATION", "Master Cone Fit", "Tug-back at working length", "Radiographic confirmation"], ["", "Sealer Application", "Thin layer; bioceramic or resin-based", "Sealer fills discrepancies"], ["", "Obturation Technique", "Warm vertical, lateral condensation, or single cone", "Technique less important than coronal seal - Ray & Trope"], ["", "Radiographic Confirmation", "Verify fill to WL, density, no voids", "Sjögren - Dense fill 0-2mm from apex optimal"], ["RESTORATION", "Orifice Barrier", "Prevents coronal leakage", "Swanson & Madison - oral fluids reach apex in 3 days"], ["", "Core Placement", "Same-day if possible; minimum 3.5mm Cavit if temp", "Webber - 3.5mm Cavit for adequate seal"], ["", "Cuspal Coverage Planning", "Crown for posteriors; assess remaining structure", "Ray & Trope - coronal restoration more important than fill quality"], ["POST-OP", "Occlusal Adjustment", "Reduce if pre-op pain, percussion sensitivity, vital", "Rosenberg - decreases pain with specific indications"], ["", "Post-operative Instructions", "Pain expectations, medications, when to call", "Tsesis - 8.4% flare-up rate"], ["", "Analgesic Prescription", "Ibuprofen 400-600mg q6h; combo with acetaminophen", "Oxford League Table - 800mg ibuprofen NNT 1.6"], ["", "Follow-up Scheduling", "6-12 months; longer for large lesions", "Murphy - 70% lesions >1 year to heal"]]}, {"type": "p", "text": "*** Add a section on resorption and it’s treatment ***"}, {"type": "ol", "items": ["Diagnosis and Case Assessment"]}], "subsections": [{"id": "sroot-canal-treatment-procedural-timeline-11-pulp-testing-methodology-and-interpretation", "number": "1.1", "title": "Pulp Testing Methodology and Interpretation", "level": 2, "blocks": [{"type": "ul", "items": ["What is the sensitivity and specificity of cold testing vs. EPT for determining pulp vitality?"]}, {"type": "p", "text": "Cold testing is the most useful tool for determining pulp vitality. Ricucci et al., 2014 found 84-97% agreement between clinical and histological diagnoses. Cold testing has sensitivity of 0.87 and specificity of 0.84. PPV is 0.81, NPV is 0.87, giving overall accuracy of 84%. This exceeds heat testing accuracy of 72%. EPT has sensitivity of 0.72 and specificity of 0.93, with PPV of 0.89 and NPV of 0.80, giving overall accuracy of 82% {{cite: Mainkar and Kim 2018}}."}, {"type": "ul", "items": ["How does pulp canal obliteration affect test reliability?"]}, {"type": "p", "text": "EPT is more useful in calcified teeth (Ketterl) due to less fluid for movement with thermal testing. EPT is less accurate in immature teeth due to later development of A-delta fibers (Fulling and Andreasen). Only 7% of teeth with pulp canal obliteration develop necrosis (Andreasen et al., 1987)."}, {"type": "ul", "items": ["What is the recommended sequence of pulp tests and why?"]}, {"type": "p", "text": "Perform cold testing first due to high accuracy and ease of test, then EPT to confirm necrosis if there are doubts about vitality."}, {"type": "ul", "items": ["How do you interpret discordant test results?"]}, {"type": "p", "text": "If test results are discordant one should correlate with clinical and symptom history, look for radiographic signs (especially progressive radiographic pathology), realize that in multi-rooted teeth one canal may be necrotic while another is vital which could affect testing, consider monitoring and re-evaluating at a follow-up appointment."}, {"type": "ul", "items": ["Does the EPT interfere with pacemaker function?"]}, {"type": "p", "text": "Wilson found that EPT does not interfere with pacemaker function."}, {"type": "ul", "items": ["What is the mechanism of cold testing and is it safe?"]}, {"type": "p", "text": "Cold testing works via outward hydrodynamic fluid flow in the dentinal tubules, which stimulates Aδ fibers {{cite: Trowbridge — Cold testing mechanism: outward hydrodynamic fluid flow stimulates Aδ fibers}}. Rickoff et al found no pathologic changes resulting from cold testing. The best method for cold testing is refrigerant sprays (tetrafluoroethane): White and Cooley demonstrated superiority over cold-water bath or ice stick, and Miller et al found refrigerant sprays are superior for crowned teeth (PFM) {{cite: Miller — Refrigerant sprays superior to other cold methods for crowned PFM teeth}}."}, {"type": "ul", "items": ["What is the mechanism of heat testing and what are its accuracy statistics?"]}, {"type": "p", "text": "Heat testing is reserved as a second-line test or when heat is the chief complaint. It works via inward hydrodynamic fluid flow. Bierma et al found that heated gutta-percha via a warm vertical compaction tip is the safest heat testing method — a heated ball burnisher or hot water can cause pulpal damage {{cite: Bierma — Heated GP tip is safest heat testing method; avoid ball burnisher or hot water}}. Rickoff et al found no pathologic changes. Heat testing accuracy: sensitivity 0.78, specificity 0.67, PPV 0.62, NPV 0.79, overall accuracy 72% {{cite: Mainkar and Kim 2018}}."}, {"type": "ul", "items": ["What is the complete comparison of pulp testing modalities?"]}, {"type": "p", "text": "From Mainkar and Kim (Table 6-1), comparing Sensitivity / Specificity / PPV / NPV / Overall accuracy: Cold 87/84/81/87/84%; Heat 78/67/62/79/72%; EPT 72/93/89/80/82%; LDF 98/95/94/100/97%; Pulse oximetry 97/95/94/99/97%. Laser Doppler flowmetry (LDF) and pulse oximetry are true vitality tests (measuring blood flow/oxygen saturation) rather than sensitivity tests, with 97% accuracy vs. 84% for cold — but neither is currently available for routine clinical use {{cite: Mainkar and Kim 2018 — LDF and pulse oximetry achieve 97% accuracy vs 84% for cold; not yet clinically available}}."}, {"type": "ul", "items": ["Where should the EPT electrode be placed and does orthodontic treatment affect EPT reliability?"]}, {"type": "p", "text": "The EPT electrode should be placed at the incisal edge or cusp tip for optimal results {{cite: Bender — EPT electrode should be placed at incisal edge or cusp tip}}. During orthodontic treatment, Alomari found that thermal tests may be more accurate than EPT since orthodontic tooth movement alters EPT thresholds {{cite: Alomari — Thermal tests more reliable than EPT during orthodontic treatment}}."}, {"type": "ul", "items": ["Do common analgesics affect pulp test results?"]}, {"type": "p", "text": "Read et al found that ibuprofen taken prior to testing significantly affects percussion, palpation, and cold testing results {{cite: Read — Ibuprofen taken before testing significantly affects percussion, palpation, and cold test results}}. However, Fowler et al found that an acetaminophen/hydrocodone combination had NO effect on cold testing in patients with symptomatic irreversible pulpitis {{cite: Fowler — Acetaminophen/hydrocodone combination had no effect on cold testing in SIP patients}}."}, {"type": "ul", "items": ["How does dental trauma affect pulp test reliability?"]}, {"type": "p", "text": "Bhaskar and Rappaport found that vital tissue can be present in traumatized teeth that are nonresponsive to sensitivity tests. They advise delaying a diagnosis of necrosis in trauma cases because of transient sensory deficiencies following injury {{cite: Bhaskar and Rappaport — Vital tissue found in traumatized teeth nonresponsive to sensitivity tests; delay necrosis diagnosis post-trauma}}."}, {"type": "ul", "items": ["What is the clinical significance of percussion and palpation testing?"]}, {"type": "p", "text": "Owatz et al established that percussion tenderness represents mechanical allodynia — a painful response to a normally nonnoxious stimulus. This may result from endodontic disease extending beyond the apex, periodontal disease, occlusal disease, or physical trauma {{cite: Owatz — Percussion tenderness is mechanical allodynia; may reflect endo, perio, occlusal, or traumatic etiology}}. Seltzer (1965) also described percussion sensitivity in the context of periodontal and occlusal causes. Palpation evaluates soft tissue swelling and bony expansion. For biting pain, a Tooth Slooth or bite stick should be used to isolate discomfort to a specific cusp."}]}, {"id": "sroot-canal-treatment-procedural-timeline-12-periapical-diagnosis-classification", "number": "1.2", "title": "Periapical Diagnosis Classification", "level": 2, "blocks": [{"type": "ul", "items": ["What are the AAE diagnostic categories and their defining criteria?"]}]}]}, {"id": "sendodontic-diagnostic-categories", "number": "", "title": "Endodontic Diagnostic Categories", "level": 1, "blocks": [], "subsections": [{"id": "sendodontic-diagnostic-categories-pulpal-diagnostic-categories", "number": "", "title": "Pulpal Diagnostic Categories", "level": 2, "blocks": [{"type": "table", "headers": ["Category", "Key Findings"], "rows": [["Normal Pulp", "Healthy pulp tissue with no pathological findings"], ["Reversible Pulpitis", "Inflammation capable of healing after removal of irritant"], ["Symptomatic Irreversible Pulpitis (SIP)", "Lingering thermal pain, spontaneous pain, or referred pain; vital inflamed pulp incapable of healing. Kayaoglu found adjacent and contralateral teeth have mechanical allodynia present compared to pulp necrosis"], ["Asymptomatic Irreversible Pulpitis (AIP)", "No symptoms but inflammation attributed to caries, caries excavation, or trauma; vital pulp incapable of healing"], ["Pulp Necrosis (PN)", "Death of dental pulp; usually nonresponsive to pulp sensitivity testing"], ["Previously Treated", "Root canal treatment has been performed; canals filled with obturating material"], ["Previously Initiated Therapy", "Partial endodontic treatment has been started (e.g., pulpotomy, pulpectomy)"]]}]}, {"id": "sendodontic-diagnostic-categories-periapical-diagnostic-categories", "number": "", "title": "Periapical Diagnostic Categories", "level": 2, "blocks": [{"type": "table", "headers": ["Category", "Clinical Findings", "Radiographic Findings"], "rows": [["Normal Apical Tissues", "No pain to biting, palpation, or percussion", "Normal PDL and lamina dura"], ["Symptomatic Apical Periodontitis", "Pain with biting, palpation, or percussion", "May have radiographic signs of inflammation"], ["Asymptomatic Apical Periodontitis", "No pain", "Periapical radiolucency present"], ["Acute Apical Abscess", "Rapid onset, spontaneous pain, tenderness to pressure, pus formation, swelling; potential systemic signs", "May or may not show periapical changes"], ["Chronic Apical Abscess", "Gradual onset, little or no discomfort, intermittent discharge of pus through a sinus tract", "Periapical radiolucency"], ["Condensing Osteitis", "Low grade inflammation", "Radiopaque area around apex"]]}, {"type": "p", "text": "."}, {"type": "ul", "items": ["How do radiographic findings correlate with histologic disease?"]}, {"type": "h4", "text": "Histological disease can often only be observed radiographically if there's perforation through the cortical plate according to Bender and Seltzer’s 1961 paper. Multiple PAs from different angles can help with this; Brynolf found increased diagnostic accuracy when three radiographs were taken versus one (90 versus 74%)."}, {"type": "ul", "items": ["What is the clinical significance of a widened PDL space vs. frank radiolucency?"]}, {"type": "p", "text": "A radiolucency decreases the chance of root canal success from 93% to 82% (De Chevigne)."}, {"type": "ul", "items": ["When is CBCT indicated for periapical diagnosis?"]}, {"type": "table", "headers": ["Study/Author", "Finding", "Clinical Significance"], "rows": [["Low", "34% of lesions in posterior maxilla missed by traditional radiography compared to CBCT", "Significant diagnostic advantage of CBCT in posterior maxilla"], ["Goldman", "Periapical radiographs interpreted inconsistently: 70% intraobserver reliability, 47% interrater agreement", "Poor reliability of traditional radiographs supports CBCT use"], ["{{cite: Tewary 2011}}", "Only moderate agreement between observers of digital periapical radiographs", "Confirms inconsistency in PA interpretation"], ["Tsai", "Minimum 1.4 mm lesion diameter required for CBCT detection", "Establishes detection threshold for CBCT imaging"], ["Ee", "62% of clinicians changed diagnosis and treatment plan when evaluating cases with CBCT after initially using periapical radiographs", "CBCT significantly impacts clinical decision-making"], ["Aminosharie", "CBCT is 2× as likely to detect periapical radiolucencies compared to periapical radiographs", "Doubled detection rate for periapical pathology"], ["Dutra", "Accuracy for detecting PARLS: Conventional 73%.  Digital 72% CBCT 96%", ""], ["", "", ""]]}, {"type": "ul", "items": ["What is the clinical significance of maxillary molar root proximity to the maxillary sinus?"]}, {"type": "p", "text": "Pagin et al found that 14% of maxillary molar roots perforate the maxillary sinus — an important consideration in pre-operative assessment and when evaluating CBCT imaging {{cite: Pagin — 14% of maxillary molar roots perforate the maxillary sinus}}. Shanbhag found that maxillary sinus mucositis is 9x more likely adjacent to molars with apical periodontitis, underscoring the importance of treating apical disease in this region {{cite: Shanbhag — Maxillary sinus mucositis 9x more likely adjacent to molars with apical periodontitis}}."}, {"type": "p", "text": "What is stressed pulp syndrome?"}, {"type": "p", "text": "Stressed pulp pulp syndrome is something that was described by Abou-Rass states that overall life of injury or restorative treatment teeth, can become less resilient and more prone to pulpal necrosis. These teeth can have decreased response to cold compared to healthy teeth."}]}, {"id": "sendodontic-diagnostic-categories-13-crackfracture-identification-and-prognosis", "number": "1.3", "title": "Crack/Fracture Identification and Prognosis", "level": 2, "blocks": [{"type": "ul", "items": ["What clinical and radiographic signs suggest a cracked tooth?"]}, {"type": "p", "text": "Pain on bite release, J-shaped radiolucency, narrow isolated probing depth, hypersensitivity to cold."}, {"type": "ul", "items": ["How do you differentiate craze lines from true cracks?"]}, {"type": "p", "text": "A craze line is superficial enamel defect while a true crack extends deeper into the enamel and dentin."}, {"type": "ul", "items": ["What is the prognosis for different crack patterns (cracked tooth, split tooth, VRF)?"]}, {"type": "p", "text": "Cracked teeth: 95% without pulpal chamber involvement at 5 years. 81% with chamber involvement at five years. (Kang et al., 2016)"}, {"type": "ul", "items": ["Fracture extending to the pulpal floor decreases five-year survival by 11x (Sim)."]}, {"type": "p", "text": "Split tooth: May be saved with root resection, but generally hopeless"}, {"type": "p", "text": "VRF: Hopeless unless it is a multirooted tooth in which the resected root can be removed, then >90% survival over 10 years) {{cite: Carnevale 1998}}"}, {"type": "ul", "items": ["What role does transillumination play and what are its limitations?"]}, {"type": "p", "text": "Transillumination can help distinguish superficial cracks from deeper cracks but it is only really useful for coronal cracks and it doesn’t really tell you the extend of the crack."}, {"type": "ul", "items": ["What is the outcome of crowned cracked teeth?"]}, {"type": "p", "text": "21% of symptomatic vital cracked teeth that received crowns go on to develop irreversible pulpitis or necrosis (Krell and Rivera). 89% of patients with cracked teeth experience complete resolution of symptoms with full coverage temporary placement (Guthrie and DiFiore)."}]}, {"id": "sendodontic-diagnostic-categories-14-restorability-assessment", "number": "1.4", "title": "Restorability Assessment", "level": 2, "blocks": [{"type": "ul", "items": ["What are the criteria for determining a tooth is non-restorable?"]}, {"type": "p", "text": "Restorative: Insufficient ferrule, deep/sub osseous caries, unfavorable crown to root ratio."}, {"type": "p", "text": "Perio: Severe bone loss, grade III mobility, advanced non-cleansable furcation involvement"}, {"type": "p", "text": "VRFs, extensive/non-reparable root perforations, extensive resorption"}, {"type": "ul", "items": ["How does ferrule effect influence endodontic treatment decisions?"]}, {"type": "p", "text": "The recommended ferrule is 1.5 mm to 2 mm vertical wall circumferentially (need source)."}, {"type": "ul", "items": ["When should crown lengthening be considered vs. extraction?"]}, {"type": "p", "text": "When 3 mm of biologic width can be established without compromising esthetics or causing a <1:1 crown: root ratio."}]}, {"id": "sendodontic-diagnostic-categories-15-periodontal-endodontic-lesion-differentiation", "number": "1.5", "title": "Periodontal-Endodontic Lesion Differentiation", "level": 2, "blocks": [{"type": "ul", "items": ["What are the distinguishing features of primary endodontic vs. primary periodontal lesions?"]}, {"type": "p", "text": "The key diagnostic feature is pulp vitality testing: a vital pulp rules out a primary endodontic etiology. Clinically, a narrow, deep isolated probing depth suggests an endodontic source (sinus tract draining through the PDL), while broad, widespread bone loss is characteristic of a primary periodontal origin. In a primary endodontic lesion with secondary periodontal involvement (Simon classification), the endodontic lesion drains through the PDL pocket, producing a narrow, deep, isolated probing depth. Harrington described this as a sinus tract through the PDL space originating from a periapical or lateral lesion — treatment with endodontic therapy alone is appropriate {{cite: Harrington — Primary endo lesion draining via PDL produces narrow isolated probing; endodontic tx alone is appropriate}}."}, {"type": "p", "text": "Theoretically, extensive periodontal involvement could cause endodontic disease (primary perio, secondary endo — Simon classification). However, Langeland found that periodontal pathology is unlikely to cause endodontic involvement UNLESS the lesion reaches the apex {{cite: Langeland — Perio pathology unlikely to cause endo involvement unless lesion reaches the apex}}. Supporting this, Neves (2017) found that once periodontal bone loss nears the apex, pulp sensitivity responses are affected, suggesting degenerative pulpal changes {{cite: Neves 2017 — Once perio bone loss nears the apex, pulp sensitivity is affected, suggesting pulpal degeneration}}."}, {"type": "ul", "items": ["How does treatment sequence differ for combined lesions?"]}, {"type": "p", "text": "Gupta found faster healing when periodontal therapy is performed concurrently with endodontic therapy in noncommunicating endo-perio pathosis {{cite: Gupta — Concurrent perio and endo therapy yields faster healing in noncommunicating endo-perio lesions}}. Harrington established there is no reason to expect reduced success of periodontal procedures in endodontically treated teeth. Expedient treatment of both diseases simultaneously improves outcomes."}, {"type": "ul", "items": ["What is the prognosis for true combined lesions?"]}, {"type": "p", "text": "True combined lesions — where independent endodontic and periodontal infections extend enough to coalesce — do exist but are rare (Harrington). Vertical root fractures (VRFs) and perforations can clinically mimic combined endo-perio lesions but are NOT true combined lesions and carry a substantially worse prognosis. True combined lesions have a guarded prognosis depending on the extent of periodontal destruction and the patient's response to periodontal therapy after endodontic treatment."}, {"type": "ul", "items": ["How do you evaluate healing in endo-perio cases?"]}, {"type": "p", "text": "Healing is evaluated by resolution of symptoms, probing depth reduction, and radiographic bone fill over time. After endodontic treatment of a primary endodontic lesion, the isolated deep pocket should improve if the periodontal component is truly secondary. Persistent or worsening probing depths after endodontic treatment suggest a true combined lesion or an unresolved primary periodontal component requiring periodontal therapy."}]}, {"id": "sendodontic-diagnostic-categories-16-when-to-refer-vs-treat", "number": "1.6", "title": "When to Refer vs. Treat", "level": 2, "blocks": [{"type": "ul", "items": ["What case complexity factors warrant referral to an endodontist?"]}, {"type": "p", "text": "The fundamental principle is that when a case exceeds the clinician's skill, experience, or equipment, referral to an endodontist is appropriate. Attempting cases beyond one's training increases the risk of procedural accidents, irreversible damage, and suboptimal outcomes."}, {"type": "ul", "items": ["How does the AAE case difficulty assessment form guide referral decisions?"]}, {"type": "p", "text": "The AAE Case Difficulty Assessment Form categorizes cases as Minimal, Moderate, or High difficulty. Minimal difficulty cases are straightforward single-rooted anterior teeth with no complicating factors. Moderate difficulty includes cases with moderate curvature (10–30°), posterior molars, or patients with limited opening. High difficulty cases include: calcified canals, severe canal curvature (>30°) or S-curve anatomy, retreatment of previously treated teeth, previous procedural accidents (instrument separation, perforation), anatomic anomalies (dens invaginatus, dilaceration), internal or external resorption, significantly limited opening (trismus), and proximity to vital anatomical structures (IAN, maxillary sinus, mental foramen)."}, {"type": "ul", "items": ["What anatomical considerations increase case difficulty?"]}, {"type": "p", "text": "High-difficulty anatomical factors include severely curved or calcified canals, S-curve morphology, dens invaginatus, dilaceration, C-shaped canals, fused roots, internal or external resorption defects, and teeth with previous procedural complications. Proximity to the inferior alveolar nerve, mental foramen, or maxillary sinus also elevates case complexity. Retreatment cases with posts, separated instruments, or prior transportation are inherently more complex."}]}]}, {"id": "s2-treatment-planning", "number": "2", "title": "Treatment Planning", "level": 1, "blocks": [], "subsections": [{"id": "s2-treatment-planning-21-extraction-vs-endodontic-treatment", "number": "2.1", "title": "Extraction vs. Endodontic Treatment", "level": 2, "blocks": [{"type": "ul", "items": ["What factors favor endodontic treatment over extraction and implant?"]}, {"type": "p", "text": "Factors that favor endodontic treatment include: adequate bone support around the tooth, restorability of the crown, strategic value of the tooth (abutment for bridge, terminal molar), patient preference for retaining natural dentition, and medical conditions that complicate implant surgery (bisphosphonate use, radiation, bleeding disorders). Conversely, factors favoring extraction/implant include: inability to restore the tooth, severe periodontal disease, vertical root fracture, and unfavorable crown-to-root ratio. Teeth with a history of trauma may have reduced long-term prognosis due to increased fracture susceptibility {{cite: Nattress and Martin 1994 — traumatized teeth have higher fracture susceptibility than non-traumatized teeth}}."}, {"type": "ul", "items": ["How do survival rates of endodontically treated teeth compare to implants?"]}, {"type": "p", "text": "Implants and root canals both have an absolute failure rate of 6.1% {{cite: Doyle 2006 — implants and root canals both have an absolute failure rate of 6.1%}}. The survival rate of endodontically treated teeth is 97% {{cite: Salehrabi and Rotstein — 97% survival of endodontically treated teeth in large insurance database study}}. However, some factors decrease success, including necrotic pulp, furcation involvement, and poor restorability."}, {"type": "ul", "items": ["What are the cost-effectiveness considerations?"]}, {"type": "p", "text": "Endodontic treatment followed by a crown is generally less costly in the short term than extraction and implant placement. {{cite: Torabinejad 2007 — endodontic treatment is more cost-effective than extraction and implant in most clinical scenarios}}. Over a 5-year horizon, maintaining the natural tooth via root canal therapy typically represents significant cost savings compared to extraction, implant placement, and crown restoration, particularly when accounting for bone grafting requirements."}, {"type": "ul", "items": ["How does strategic value of the tooth influence the decision?"]}, {"type": "p", "text": "Strategic value must be weighed heavily: a terminal abutment for a fixed partial denture, a lone-standing molar, or a canine used as a distal stop for a removable partial denture all warrant aggressive effort to preserve. Loss of such a tooth often triggers a cascade of restorative consequences disproportionate to the cost of endodontic treatment. Conversely, a tooth with poor periodontal support that is not strategically important may be better managed by extraction."}]}, {"id": "s2-treatment-planning-22-non-surgical-vs-surgical-approach", "number": "2.2", "title": "Non-Surgical vs. Surgical Approach", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for primary surgical endodontics?"]}, {"type": "p", "text": "According to Kim and Kratchman:"}, {"type": "p", "text": "1) Post dilemma: Surgery can be more conservative than removing posts if the post and crown are intact."}, {"type": "p", "text": "2) True Cysts"}, {"type": "p", "text": "3) Anatomic complexities (isthmuses that cannot be cleaned via orthograde approach)"}, {"type": "ul", "items": ["When should non-surgical retreatment be attempted before surgery?"]}, {"type": "p", "text": "Generally, retreatment should always be attempted first before surgery. Retreatment should pre performed first if there are missed canals, insufficient obturation, insufficient length and taper of canal preparations."}, {"type": "ul", "items": ["How do success rates compare between non-surgical and surgical approaches?"]}, {"type": "p", "text": "Torabinejad et al (2009) found that surgery had a success rate of 77.8% and non-surgical retreatment had a success rate of 70.9% in the short term 2 to 4 years."}, {"type": "ul", "items": ["What anatomical factors favor one approach over another?"]}, {"type": "p", "text": "Severe curvatures, isthmuses, obstructed canals, perforations favor surgical approach"}]}, {"id": "s2-treatment-planning-23-single-visit-vs-multiple-visit-treatment", "number": "2.3", "title": "Single Visit vs. Multiple Visit Treatment", "level": 2, "blocks": [{"type": "ul", "items": ["What does the evidence show regarding outcomes of single vs. multiple visit RCT?"]}, {"type": "ul", "items": ["The research on calcium hydroxide’s usefulness for clinically relevant bacterial reduction is mixed."]}, {"type": "ul", "items": ["There is mixed research on one versus multiple visits for pain reduction."]}, {"type": "ul", "items": ["There is mixed research on prognosis effects. Su et al’s meta-analysis found no difference in overall survival."]}, {"type": "ul", "items": ["What clinical scenarios favor multiple visit treatment?"]}, {"type": "ul", "items": ["If you cannot get the canal dry before obturating."]}, {"type": "ul", "items": ["If there isn’t enough time to finish."]}, {"type": "ul", "items": ["How does diagnosis (vital vs. necrotic) influence visit number?"]}, {"type": "p", "text": "Several studies show there is no statistically significant difference regardless of diagnosis."}, {"type": "ul", "items": ["What is the role of inter-appointment medicaments?"]}, {"type": "ul", "items": ["Calcium hydroxide has a pH of 11 to 12."]}, {"type": "ul", "items": ["It is antibacterial (though E faecalis may be resistant to it due to the proton pump."]}, {"type": "ul", "items": ["It neutralizes LPS (decreasing host response to it)"]}, {"type": "ul", "items": ["It potentially dissolves remaining tissue"]}, {"type": "ul", "items": ["Useful for regenerative endodontics because it is less cytotoxic to apical papillae."]}]}, {"id": "s2-treatment-planning-24-vital-pulp-therapy-candidacy", "number": "2.4", "title": "Vital Pulp Therapy Candidacy", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for indirect pulp capping?"]}, {"type": "p", "text": "Indirect pulp capping (IPC) is indicated when a deep carious lesion approaches the pulp but there is no radiographic or clinical evidence of pulp pathology (no spontaneous pain, sinus tract, pathologic mobility, or periapical changes). The tooth must be symptom-free or have symptoms consistent only with reversible pulpitis. The rationale is to leave a thin layer of carious dentin over the pulp to avoid exposure while placing a biocompatible liner (e.g., calcium hydroxide or MTA) to stimulate reparative dentin formation. {{cite: Maltz 2012 — stepwise excavation and indirect pulp capping showed 91% success at 3 years in randomized controlled trial}}."}, {"type": "ul", "items": ["What clinical criteria determine direct pulp cap candidacy?"]}, {"type": "p", "text": "Direct pulp capping (DPC) is most likely to succeed when: the pulp exposure is small (<1 mm), mechanical rather than carious (e.g., from instrumentation), bleeding is controlled and not profuse or dark (indicating normal vital pulp), the patient is relatively young (better healing capacity), and there are no signs of irreversible pulpitis. Carious exposures carry a higher risk of failure because bacteria already contaminate the pulp prior to exposure. {{cite: Mente 2010 — MTA direct pulp cap showed 89.9% success vs 63.3% for calcium hydroxide at 5 years}}. {{cite: Dammaschke 2010 — long-term success of direct pulp capping with calcium hydroxide drops to 37% at 10 years}}."}, {"type": "ul", "items": ["When is full pulpotomy indicated in permanent teeth?"]}, {"type": "p", "text": "Full pulpotomy is indicated when there is clinical evidence of irreversible pulpitis (spontaneous or lingering pain) in a tooth with a closed apex, but where preserving vitality is desirable. The entire coronal pulp is removed and a bioceramic material placed to maintain radicular pulp vitality. Cvek pulpotomy (partial/cervical pulpotomy) is the technique of choice for traumatized teeth with open apices and partial pulp exposure, achieving 96% success {{cite: Bimstein and Rotstein 2016 — Cvek pulpotomy in traumatized teeth with immature apices achieves approximately 96% success}}. Full pulpotomy in mature permanent teeth with MTA has shown success rates of 79–98% in recent literature, making it a viable alternative to root canal treatment in appropriate cases."}, {"type": "ul", "items": ["How does patient age affect vital pulp therapy decisions?"]}, {"type": "p", "text": "Younger patients (open apices, higher cellularity of pulp tissue) are better candidates for vital pulp therapy due to enhanced healing capacity and the critical goal of apexogenesis — continued root development and apical closure. In immature permanent teeth, vital pulp therapy is strongly preferred over RCT because root canal treated teeth with open apices lack structural integrity and are prone to cervical fracture. As patients age, pulp tissue becomes more fibrotic and less vascular, decreasing the likelihood of successful direct pulp cap or pulpotomy. However, age alone should not be the sole deciding factor; clinical presentation is paramount."}, {"type": "ul", "items": ["What materials are indicated for vital pulp therapy (MTA, Biodentine, calcium hydroxide)?"]}, {"type": "p", "text": "MTA (Mineral Trioxide Aggregate) is the gold standard for vital pulp therapy due to its biocompatibility, antimicrobial activity, ability to set in the presence of moisture, and superior dentinal bridge formation compared to calcium hydroxide {{cite: Mente 2014 — MTA outperforms calcium hydroxide for direct pulp capping in long-term outcomes}}. Biodentine (tricalcium silicate) is an acceptable MTA substitute with shorter setting time (~12 minutes vs. 2–4 hours for MTA) and equivalent biocompatibility. Calcium hydroxide (Ca(OH)₂) has historically been the standard but long-term studies show tunnel defects in the dentinal bridge and higher failure rates over time {{cite: Farsi 2005 — calcium hydroxide direct pulp cap success rate declines significantly at 5+ years}}. Bioceramic materials (MTA, Biodentine) are now preferred over Ca(OH)₂ for DPC and pulpotomy."}]}, {"id": "s2-treatment-planning-25-intentional-replantation-considerations", "number": "2.5", "title": "Intentional Replantation Considerations", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for intentional replantation?"]}, {"type": "p", "text": "Intentional replantation is indicated when conventional non-surgical retreatment and periapical surgery are not feasible due to anatomical limitations (proximity to vital structures, inadequate surgical access, severe root dilacerations, or long-standing post that cannot be safely removed). It may also be considered when: prior surgery has failed, there is persistent apical pathology with no clear non-surgical or surgical solution, or the tooth has a strategic value that justifies the risk {{cite: Cotter and Panzarino — intentional replantation is a viable alternative when other options are exhausted}}. It is NOT indicated for teeth with vertical root fractures, significant bone loss beyond the apex, or very curved/dilacerated roots that cannot survive extraction."}, {"type": "ul", "items": ["What is the expected success rate and what factors influence it?"]}, {"type": "p", "text": "Success rates for intentional replantation range from 77–95% with careful case selection. {{cite: Bender and Rossman — intentional replantation showed 81% success rate at follow-up}}. Factors that improve prognosis include: minimal extra-oral time, no root damage during extraction, good periodontal support preoperatively, adequate remaining tooth structure for restoration, and performance of a root-end resection and retrofit during the extra-oral phase. Factors that worsen prognosis include: PDL desiccation, root fracture during extraction, pre-existing severe bone loss, and prolonged extra-oral time."}, {"type": "ul", "items": ["What is the optimal extra-oral time and storage medium?"]}, {"type": "p", "text": "Extra-oral time should be minimized to less than 10 minutes to preserve PDL cell viability. The tooth should be kept moist throughout — either stored in the patient's saliva, saline, Hank's Balanced Salt Solution (HBSS), or milk during the root-end preparation. Desiccation of the PDL leads to ankylosis and replacement resorption, which are catastrophic long-term outcomes. {{cite: Kratchman — minimize extra-oral time and keep tooth moist to maximize PDL cell survival during intentional replantation}}. Root-end resection and retrofill with MTA or Biodentine should be performed during the extra-oral phase. Enamel matrix derivative (EMD) proteins applied to the root surface before replantation may promote PDL regeneration and improve outcomes {{cite: Wang — EMD application to root surface before replantation promotes periodontal regeneration}}."}, {"type": "ul", "items": ["What is the technique for intentional replantation?"]}, {"type": "p", "text": "Extract the tooth as atraumatically as possible using periotomes and gentle rotational forces, minimizing forcep contact with the root surface. Keep the tooth moist, perform root-end resection (2–3 mm), prepare a 3 mm deep root-end cavity, place MTA or Biodentine retrofill, replant, and verify position radiographically. Splinting is generally not necessary unless there is bone loss or the socket is compromised. Follow-up at 1 week, 1 month, 6 months, and 1 year with periapical radiographs."}]}, {"id": "s2-treatment-planning-26-retreatment-vs-surgery-for-previously-treated-teeth", "number": "2.6", "title": "Retreatment vs. Surgery for Previously Treated Teeth", "level": 2, "blocks": [{"type": "ul", "items": ["What factors favor non-surgical retreatment over apical surgery?"]}, {"type": "p", "text": "Non-surgical retreatment is generally preferred as the first-line approach for previously treated teeth because it addresses the coronal cause of failure and allows re-disinfection of the entire root canal system. Factors favoring retreatment include: missed canals, inadequate length or taper of canal preparation, coronal leakage or re-contamination, insufficient obturation (voids, short fill), and a removable post or crown that needs replacement anyway. Retreatment is also preferable when the apical anatomy is accessible orthograde and no surgical contraindications exist. It is the less invasive option and maintains future surgical options if retreatment fails."}, {"type": "ul", "items": ["How does the presence of a post or crown influence the decision?"]}, {"type": "p", "text": "A serviceable post and intact crown that do not need replacement may favor surgical rather than retreatment, since removing the post risks root fracture, perforation, excessive dentin removal, and loss of restorative elements. As stated by Kim and Kratchman, surgery can be more conservative than post removal when the crown is adequate and the post is well-seated. Conversely, if the coronal restoration is inadequate or the post is easily retrievable, retreatment is preferred. The overall restorability of the tooth must also be reassessed before committing to retreatment or surgery."}, {"type": "ul", "items": ["What is the success rate differential between retreatment and surgery?"]}, {"type": "p", "text": "{{cite: Torabinejad 2009 — surgery had a short-term success rate of 77.8% versus 70.9% for non-surgical retreatment at 2–4 years, but long-term outcomes converge}}. In the short term (2–4 years), surgical outcomes slightly exceed retreatment success rates; however, long-term studies (4–6 years) show convergence of success rates around 83% for both approaches. The higher short-term surgical success is attributed to the immediate removal of periapical pathology and placement of a root-end filling, while retreatment relies on biological healing over time."}, {"type": "ul", "items": ["When is combined retreatment plus surgery indicated?"]}, {"type": "p", "text": "Combined retreatment followed by surgery is indicated when: (1) the coronal cause of failure (missed canal, inadequate obturation) can be addressed via retreatment AND there is additional apical pathology requiring surgical management (persistent periapical cyst, extensive root-end resorption, foreign body), (2) retreatment alone is unlikely to succeed due to apical anatomy (isthmuses, fins, lateral canals not accessible orthograde), or (3) a post must be removed AND the apex requires surgical exploration. The combined approach theoretically addresses both coronal and apical dimensions of failure simultaneously."}]}, {"id": "s2-treatment-planning-27-timing-of-retreatment-after-initial-failure", "number": "2.7", "title": "Timing of Retreatment After Initial Failure", "level": 2, "blocks": [{"type": "ul", "items": ["How long should you wait to assess healing before considering retreatment?"]}, {"type": "p", "text": "The standard minimum follow-up period to assess healing is 1 year post-treatment, though lesions greater than 1 cm may require up to 4 years to demonstrate complete radiographic resolution. {{cite: Murphy — lesions greater than 1 cm require more than 1 year for complete radiographic healing}}. Orstavik's Periapical Index (PAI) is a useful standardized tool for tracking lesion size and density changes over serial follow-up visits. For small lesions (<5 mm) in asymptomatic teeth, re-evaluation at 1 year is typically sufficient to determine if retreatment is needed."}, {"type": "ul", "items": ["What distinguishes a healing lesion from persistent disease?"]}, {"type": "p", "text": "A healing lesion shows progressive reduction in periapical radiolucency size and increasing bone density at the periphery on serial radiographs. The PAI score should decrease over successive visits. Clinical signs also matter: absence of sinus tract, no swelling, no percussion sensitivity, and no increased mobility all support healing. A persistent or enlarging lesion on follow-up radiographs, especially with return of symptoms, indicates treatment failure. CBCT can be valuable for equivocal cases, as it detects cortical plate disruption and more accurately measures lesion volume than 2D radiographs. A lesion that has not decreased in size after 1–2 years of follow-up is considered non-healing."}, {"type": "ul", "items": ["When is intervention indicated for asymptomatic apical periodontitis?"]}, {"type": "p", "text": "Asymptomatic apical periodontitis (AAP) in a previously treated tooth does not always require immediate retreatment, particularly if the lesion is small and the tooth has been recently treated. However, intervention is indicated when: (1) the lesion fails to decrease in size after 1–2 years of observation, (2) the lesion is enlarging, (3) the patient develops symptoms, (4) the tooth will serve as an abutment and a periapical lesion presents a risk, or (5) the patient is about to undergo immunosuppressive therapy or head/neck radiation. Watchful waiting is appropriate only when the lesion is stable or slowly decreasing and the patient is asymptomatic and otherwise healthy."}]}]}, {"id": "s3-anesthesia-and-pain-control", "number": "3", "title": "Anesthesia and Pain Control", "level": 1, "blocks": [], "subsections": [{"id": "s3-anesthesia-and-pain-control-31-anesthetic-selection-and-technique-by-toothdiagnosis", "number": "3.1", "title": "Anesthetic Selection and Technique by Tooth/Diagnosis", "level": 2, "blocks": [{"type": "ul", "items": ["What anesthetic techniques are indicated for maxillary vs. mandibular teeth?"]}, {"type": "p", "text": "For mandibular teeth, two cartridges (3.6 mL) is indicated for IAN block because it is more effective than 1.8 mL (Fowler and Reader). For maxillary first molars, infiltrations and PSA blocks show equivalent effectiveness {{cite: Aggarwal 2011}}. Aggarwal also showed that palatal anesthesia doesn’t increase success but does increase duration of anesthesia."}, {"type": "ul", "items": ["When is articaine preferred over lidocaine?"]}, {"type": "p", "text": "Dressman found that 4% articaine infiltration provided successful pulpal anesthesia in the premolar region 80-87% of the time and 92-94% successful with additional anesthesia."}, {"type": "p", "text": "Kung showed no difference between articaine and lidocaine with maxillary SIP cases. Articaine is preferred for supplemental buccal infiltration. Garisto et al., 2010 (and Gaffeen separately) found increased paresthesias with articaine IAN blocks compared to lidocaine IAN blocks (3.6x increased risk)."}, {"type": "ul", "items": ["What is the evidence for buccal infiltration of articaine in mandibular molars?"]}, {"type": "p", "text": "{{cite: Kanaa 2012}} compared supplemental techniques and found additional buccal articaine infiltrations provided 84% success, IO 68%, PDL 48%, and repeated IAN 32%. This supports routine use of buccal articaine infiltration at the apices of mandibular molars. According to Rogers, articaine is more effective than lidocaine when used as a supplemental buccal infiltration."}, {"type": "ul", "items": ["What is the maximum epinephrine dose for cardiac patients?"]}, {"type": "p", "text": "0.04 mg is the maximum epinephrine dose for cardiac patients"}, {"type": "p", "text": "0.2 mg is the max dose for non-cardiac patients"}, {"type": "ul", "items": ["Does injection speed matter for success?"]}, {"type": "p", "text": "No (Kanaa, 2006 and Aggarwal 2012)"}, {"type": "ul", "items": ["Does buffering anesthetic solution improve outcomes?"]}, {"type": "p", "text": "No—multiple researchers show no decrease in injection pain, onset time or anesthetic success."}, {"type": "ul", "items": ["What can we do post op to decrease pain?"]}, {"type": "p", "text": "Give bupivacaine injection; decreases post op pain for 3rd molar extraction (Gordon). Liposomal formulations have not been shown to be better (Glenn et al)."}]}, {"id": "s3-anesthesia-and-pain-control-32-supplemental-anesthesia-decision-tree", "number": "3.2", "title": "Supplemental Anesthesia Decision Tree", "level": 2, "blocks": [{"type": "ul", "items": ["When is intraosseous anesthesia indicated and what are the contraindications?"]}, {"type": "p", "text": "It is indicated for patients who are not responding to normal anesthesia. It has a 92% success rate according to Walton. It is contraindicated for patients who are immunocompromised due to increased infection risk and patients with bleeding disorders."}, {"type": "ul", "items": ["What are the indications and limitations of intrapulpal anesthesia?"]}, {"type": "p", "text": "Intrapulpal anesthesia is useful as a last resort when other methods have failed. It has a 93% success rate and effectiveness is due to pressure - effective regardless of whether saline or anesthetic is used (VanGheluwe and Walton)."}]}, {"id": "s3-anesthesia-and-pain-control-33-managing-the-hot-tooth", "number": "3.3", "title": "Managing the \"Hot\" Tooth", "level": 2, "blocks": [{"type": "ul", "items": ["Why do teeth with irreversible pulpitis have higher anesthetic failure rates?"]}, {"type": "p", "text": "According to Hargreaves, these teeth have higher failure due to the environment’s acidic pH, tetrodotoxin-sensitive Na+ channels, and altered resting membrane potential, lowered excitability threshold and anxiety."}, {"type": "ul", "items": ["What preoperative medications improve anesthetic success?"]}, {"type": "p", "text": "NSAIDs improve IANB success in symptomatic irreversible pulpitis: 400–800 mg ibuprofen taken 45–60 min before the block nearly doubles the success rate (Nagendrababu; Parirokh). However, the single most effective premedication is oral dexamethasone. {{cite: Pulikkotil 2018 — network meta-analysis of 19 RCTs (n=1654) ranked dexamethasone as the most effective oral premedication for IANB success in irreversible pulpitis (RR 2.92 vs placebo, SUCRA 0.96), beating NSAIDs and tramadol; 0.5 mg dose was studied for this outcome}}. {{cite: Hegde 2023 — in a double-blind RCT of 184 patients with SIP, IANB success rates were 60.9% with dexamethasone, 65.2% with ketorolac, 56.5% with prednisolone, vs just 21.7% with placebo}}. {{cite: Kumar 2021 — combination of 0.5 mg dexamethasone + 800 mg ibuprofen was significantly superior to either drug alone for IANB success in SIP mandibular molars}}. Mechanism: corticosteroids reduce PGE2 and inflammatory mediators at the pulp, decreasing nociceptor sensitization and TTX-resistant Na⁺ channel upregulation."}, {"type": "ul", "items": ["What dose of dexamethasone should be used, and what outcome does each dose target?"]}, {"type": "p", "text": "Two dose ranges appear in the endodontic literature, studied for two related but distinct outcomes:"}, {"type": "ol", "items": ["**0.5 mg PO** — studied specifically for improving IANB *anesthetic success* in symptomatic irreversible pulpitis. This is the dose ranked in the Pulikkotil 2018 network meta-analysis."]}, {"type": "ol", "items": ["**4–8 mg PO, IM, or submucosal** — studied for reducing *postoperative endodontic pain*. {{cite: Suresh 2020 — 4 mg oral dexamethasone 60 min before single-visit RCT reduced postop pain incidence and severity at 6, 12, 24 h; odds of postop pain at 24 h were 5.3× lower vs placebo — the largest effect of any drug in the trial}}. {{cite: Pochapski 2009 — 4 mg oral dexamethasone significantly reduced postendodontic pain at 4 and 12 h and decreased rescue medication use}}. {{cite: Konagala 2019 — 4 mg dexamethasone equivalent to piroxicam 20 mg and deflazacort 30 mg for postendo pain control at 6, 12, 24 h}}. {{cite: Jorge-Araújo 2018 — 8 mg oral dexamethasone reduced post-endodontic pain intensity and rescue medication use vs placebo; equivalent to 400 mg ibuprofen}}. {{cite: Aksoy 2019 — 8 mg submucosal dexamethasone injected adjacent to SIP mandibular molars significantly reduced postop pain at 6, 12, 48 h and beat submucosal tramadol in the first 12 h}}. {{cite: Mehrvarzfar 2008 — 8 mg supraperiosteal dexamethasone injection around tooth with irreversible pulpitis effectively controlled postop pain for first 24 h}}."]}, {"type": "p", "text": "Clinically, 4–8 mg is a reasonable dose when the primary goal is to prevent postoperative flare-up or pain — especially in hot teeth where pre-op pain is severe. Because both anesthetic success and postop pain reduction share the same anti-inflammatory mechanism (blocking PGE2 and inflammatory-mediator sensitization of nociceptors), a 4 mg dose likely improves IANB success at least as well as 0.5 mg, though head-to-head dose comparisons for the anesthetic-success endpoint are lacking. Practical protocol: 4 mg oral dexamethasone + 600–800 mg ibuprofen, 45–60 min preoperatively, for hot teeth with anticipated difficult anesthesia and high postop flare-up risk."}, {"type": "ul", "items": ["What combination techniques provide highest success rates for hot mandibular molars?"]}, {"type": "p", "text": "According to Walton, 92% success with IAN + IO."}]}, {"id": "s3-anesthesia-and-pain-control-34-sedation-and-anxiolysis", "number": "3.4", "title": "Sedation and Anxiolysis", "level": 2, "blocks": [{"type": "ul", "items": ["What anxiolytic agents are appropriate for dental treatment?"]}, {"type": "p", "text": "Triazolam is the safest and most effective anxiolytic for dental treatment (Kaufman)."}, {"type": "ul", "items": ["What are the indications and contraindications for oral sedation in endodontics?"]}, {"type": "p", "text": "Indications: anxiety, Gag, hx of dental trauma, mild-moderate psychiatric conditions (with med clearance), extended procedures"}, {"type": "p", "text": "Contraindications: Pregnancy, benzodiazepine allergy, acute narrow angle glaucoma, severe respiratory diease, CNS depression, myasthenia gravis, patients who cannot consent"}]}]}, {"id": "s4-access-and-coronal-disassembly", "number": "4", "title": "Access and Coronal Disassembly", "level": 1, "blocks": [], "subsections": [{"id": "s4-access-and-coronal-disassembly-41-access-design-philosophy", "number": "4.1", "title": "Access Design Philosophy", "level": 2, "blocks": [{"type": "ul", "items": ["How should one access a tooth?"]}, {"type": "p", "text": "Access design should follow the laws of Krasner and Rankow. This helps avoid missing canals or perforating the tooth."}, {"type": "ul", "items": ["How does access design affect fracture resistance?"]}, {"type": "p", "text": "It doesn’t really. Most lab studies don’t show a decrease in fracture resistance for ultraconservative accesses {{cite: Silva 2020}}. Moreover accesses in general only reduce tooth stiffness by 5% (Reeh et al)."}]}, {"id": "s4-access-and-coronal-disassembly-42-magnification-and-rubber-dam-utilization", "number": "4.2", "title": "Magnification and Rubber Dam Utilization", "level": 2, "blocks": [{"type": "ul", "items": ["What is the justification for using microscopes in treatment?"]}, {"type": "p", "text": "It is a part of modern endodontic treatment by making just about everything easier and more precise (AAE 2012 position statement)."}, {"type": "ul", "items": ["How does isolation affect treatment outcomes and safety?"]}, {"type": "p", "text": "The dental dam is the standard of care for endodontic treatment {{cite: AAE 2017}}. Lin’s research suggests its use increases survival."}, {"type": "p", "text": "Rubber dam’s also increase safety by preventing irrigant, sharps, and debris injection or aspiration."}]}, {"id": "s4-access-and-coronal-disassembly-post-and-core-removal-technique-selection", "number": "", "title": "Post and Core Removal Technique Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What techniques are available for post removal and when is each indicated?"]}, {"type": "p", "text": "Traction, ultrasonic vibration, trephine, and post drilling"}, {"type": "ul", "items": ["What are the risks of post removal and how can they be minimized?"]}, {"type": "p", "text": "Root fracture, perforation, excess dentin removal, heat injury to PDL/bone"}, {"type": "p", "text": "These can be minimized with preoperative planning using a CBCT, magnification, conservative troughing, using copious water and working in short bursts"}, {"type": "ul", "items": ["When should you consider bypassing a post vs. removing it?"]}, {"type": "p", "text": "Ideally the post is removed in all cases. If removing the post would risk excessive dentin removal or sacrifice critical restorative elements like abutments for long span bridges, then surgery should be considered instead {{cite: Ruddle 2004}}"}, {"type": "ul", "items": ["What is the maximum safe temperature increase for root surfaces during post removal?"]}, {"type": "p", "text": "The maximum safe temperature increase for root surfaces is 10°C (Eriksson and Albrektsson)."}]}, {"id": "s4-access-and-coronal-disassembly-45-managing-calcified-canals", "number": "4.5", "title": "Managing Calcified Canals", "level": 2, "blocks": [{"type": "ul", "items": ["What techniques improve success in locating calcified canals?"]}, {"type": "p", "text": "When looking for calcified canals some techniques that can be used include troughing with a bur or ultrasonic, looking for champagne-like bubbles and staining with methylene blue."}, {"type": "ul", "items": ["What is the role of CBCT in calcified canal management?"]}, {"type": "p", "text": "CBCT can give you knowledge about the location and path of the canal."}, {"type": "ul", "items": ["When should you stop searching for a calcified canal?"]}, {"type": "p", "text": "When you are in danger of perforating the tooth."}, {"type": "ul", "items": ["What is the prognosis for teeth with calcified canals?"]}, {"type": "p", "text": "Like non-calcified canals if they can be negotiated."}]}]}, {"id": "s5-instrumentation", "number": "5", "title": "Instrumentation", "level": 1, "blocks": [], "subsections": [{"id": "s5-instrumentation-51-working-length-determination-method", "number": "5.1", "title": "Working Length Determination Method", "level": 2, "blocks": [{"type": "ul", "items": ["What is the accuracy of electronic apex locators vs. radiographic methods?"]}, {"type": "p", "text": "The electronic apex locator is most useful because 92.4% of major foramina open short of the anatomical apex (Burch and Hulen). The apex locator is 96% accurate at locating the apical foramen (Shabahang)."}, {"type": "ul", "items": ["What is the ideal working length endpoint (apical constriction, radiographic apex)?"]}, {"type": "p", "text": "The ideal endpoint is the minor apical constriction since it is a biological constriction/stop and histological research shows that obturation to and not beyond the minor apical constriction shows the best healing and least inflammation (Ricucci, Langeland)."}, {"type": "ul", "items": ["How should working length be determined with EAL?"]}, {"type": "p", "text": "The average distance between the major and minor apical foramina is 0.524-0.659 mm {{cite: Kuttler 1955}}-0.5mm in younger teeth and 0.6 mm in older teeth. The apical constriction is 0.2-.3 mm long {{cite: Dummer 1984}}. Since EAL’s are most accurate at locating the major apical foramen than minor foramen (Ounsi and Naaman), it is prudent to subtract 0.5 to 1.0 mm from the EAL 0 or apex reading."}, {"type": "p", "text": "Ricucci and Langeland and Dummer all confirm that the minor apical constriction is 0.5-1 mm sort of the major foramen."}, {"type": "ul", "items": ["How do canal conditions affect EAL accuracy?"]}, {"type": "ul", "items": ["Larger than .6 mm foramen size decreases accuracy of EAL (Herrera). Irrigants do not affect EAL accuracy though (unless they are significantly pooled and somehow communicate with the PDL as in large carious teeth)."]}, {"type": "ul", "items": ["What is the evidence for maintaining working length during instrumentation?"]}, {"type": "p", "text": "Maintaining working length during instrumentation decreases the packing of debris at the Apex, decreases vapor lock {{cite: Vera 2012}}, and increases irrigant efficacy at the Apex"}]}, {"id": "s5-instrumentation-52-glide-path-establishment", "number": "5.2", "title": "Glide Path Establishment", "level": 2, "blocks": [{"type": "ul", "items": ["What is the rationale for establishing a glide path?"]}, {"type": "p", "text": "A glide path is a smooth, reproducible path from the canal orifice to the apical terminus. It reduces torsional and flexural stress at the NiTi file tip. Without a patent glide path, rotary files risk taper lock and separation because the tip engages dentin before the body can rotate freely. Coronal flaring prior to apical instrumentation straightens the coronal third, improving irrigant access, reducing ledging risk, and allowing more accurate EAL and radiographic working length determination. Coronal pre-flaring helps with accurate WL determination (Ibarrola et al), and its effect on final working length is clinically insignificant (Schroeder et al)."}, {"type": "ul", "items": ["What size glide path is recommended before rotary instrumentation?"]}, {"type": "p", "text": "A minimum glide path of ISO #15–20 K-file is generally recommended before introducing NiTi rotaries. Dedicated glide path systems (ProGlider, PathFile) enlarge the glide path to approximately ISO #19 at 2% taper. A larger glide path diameter decreases the incidence of rotary file separation. Berutti et al found that pre-enlarging to a #15 hand file before ProTaper use significantly reduced fracture rates."}, {"type": "ul", "items": ["Manual vs. mechanical glide path: what does the evidence show?"]}, {"type": "p", "text": "Mechanical glide path files (PathFile, ProGlider, One G) use memory-free alloys and small tapers to safely negotiate tight, curved canals. Arias et al found that mechanical glide path preparation with PathFile was faster and produced comparable canal transportation to manual glide pathing. ProGlider demonstrated less canal transportation than hand-file glide pathing in simulated canals (Patiño et al). For very calcified or severely curved canals, hand files (#6, #8, #10 with watch-winding) remain the safest first-line approach before any rotary."}, {"type": "ul", "items": ["What is the purpose of coronal flaring?"]}, {"type": "p", "text": "Coronal pre-flaring (Gates-Glidden drills, orifice openers, or large tapered rotaries used crown-down) removes restrictive dentin triangles in the coronal and middle thirds, reduces file deflection apically, improves irrigant exchange and NaOCl penetration, and increases apex locator accuracy by reducing coronal leakage currents. It should be performed before establishing working length in most cases."}]}, {"id": "s5-instrumentation-53-instrument-system-selection", "number": "5.3", "title": "Instrument System Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the advantages of different NiTi alloys (conventional, M-Wire, CM, Blue, Gold)?"]}, {"type": "p", "text": "Conventional NiTi (austenitic at body temperature) is stiffer and more prone to cyclic fatigue fracture in curved canals. M-Wire (Dentsply Sirona) uses thermomechanical processing to create a more fatigue-resistant wire; ProFile Vortex Blue uses a similar heat treatment. CM (controlled memory) wire — used in HyFlex CM, CanalPro CM — has an austenitic finish temperature above body temperature, so the file remains in the martensitic/R phase at clinical temperatures. This substantially increases flexibility and cyclic fatigue resistance (Shen et al 2011). CM files can be pre-bent and will hold the bend, useful in severely curved canals. Gold wire (WaveOne Gold, Reciproc Blue) undergoes a proprietary heat treatment that increases flexibility and cyclic fatigue resistance compared to M-Wire; Reciproc Blue showed significantly superior cyclic fatigue resistance over standard Reciproc in laboratory testing (Zupanc et al 2018). Ranked by cyclic fatigue resistance: Gold > CM > M-Wire > conventional NiTi."}, {"type": "ul", "items": ["How do instrument design features affect performance (cross-section, taper, flute design)?"]}, {"type": "p", "text": "Cross-section geometry affects cutting efficiency and debris removal. Triangular cross-sections (ProTaper, K3) have high cutting efficiency due to positive rake angles. S-shaped cross-sections (ProFile, Mtwo) have neutral rake angles and remove dentin more conservatively. Rectangular cross-sections (Reciproc) provide a scraping action via a negative rake angle. Variable taper (progressive taper in ProTaper) concentrates stress at a single point and may increase fracture risk versus fixed-taper designs. Increased pitch (more flutes per unit length) improves debris removal but increases the screw-in effect. Alternating pitch reduces screw-in effect and vibration. Off-center or radial-land designs reduce canal transportation by allowing the file to ride the canal wall."}, {"type": "ul", "items": ["Is there evidence that one system produces better outcomes than another?"]}, {"type": "p", "text": "Large outcome RCTs comparing individual NiTi systems are scarce. NiTi rotary systems as a class produce better-centered preparations with less transportation than hand instrumentation. Short found that rotary file systems stayed more centered in the canal compared to reciprocating file systems. Peters et al showed that no rotary system completely instrumented all canal wall surfaces (35–80% of walls left untouched), underscoring that irrigation is more important than instrument selection for disinfection. A 2020 systematic review (Plotino et al) found no clinically significant difference in periapical healing outcomes between different NiTi systems when proper technique and irrigation were employed."}]}, {"id": "s5-instrumentation-54-apical-preparation-size-determination", "number": "5.4", "title": "Apical Preparation Size Determination", "level": 2, "blocks": [{"type": "ul", "items": ["What is the rationale for larger apical preparations?"]}, {"type": "p", "text": "Larger apical preparations allow irrigant to reach and disinfect the apical portion of the canal system. As apical size increases, the volume of irrigant delivered to the apical third increases substantially. Adequately sized preparations also allow better debris removal and reduce the likelihood of a vapor lock that impedes irrigant flow."}, {"type": "ul", "items": ["What is the minimum apical size for adequate disinfection?"]}, {"type": "p", "text": "The minimal apical size is a #30 K-file (Sulzberger and Brilliant). However, Aminosharie and Kulild found there was no significant difference in bacterial reduction between final preparation sizes of 25 and 40 K-file, suggesting thorough irrigation may compensate for smaller preparation size. A commonly cited benchmark is preparation to at least #25 with 4–6% NaOCl and activation to achieve adequate disinfection."}, {"type": "ul", "items": ["How does original canal anatomy influence final apical size?"]}, {"type": "p", "text": "The recommendation is to increase the apical file size by at least three ISO sizes beyond the first file that binds at the apex (the \"first apical binding file\" concept) to ensure adequate dentin removal and eliminate more bacteria (Mickel). In canals with large original anatomy, a larger apical preparation may be needed. In immature teeth (open apices), the goal shifts from shaping to irrigation and medicament placement, as aggressive apical enlargement is contraindicated."}, {"type": "ul", "items": ["What are the downsides to preparing past the apex?"]}, {"type": "p", "text": "Transportation occurs regardless of file size and instrument type when passing files through the apex for patency (Goldberg and Massone). Over-instrumentation past the apical foramen disrupts the apical constriction, converts a favorable apical anatomy into a larger and less predictable termination point, and extrudes debris and irrigants into the periapical tissues — increasing post-operative pain and potentially seeding a healing lesion with bacteria. Extrusion of NaOCl past the apex can cause severe soft tissue injury (NaOCl accident). The goal is instrumentation to the minor apical constriction, not beyond."}]}, {"id": "s5-instrumentation-55-taper-selection", "number": "5.5", "title": "Taper Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the advantages and disadvantages of larger tapers?"]}, {"type": "p", "text": "Larger tapers (e.g., 0.06, 0.08) create a pronounced funnel shape that facilitates irrigant flow, hydraulic activation, and carrier-based obturation. However, larger tapers remove significantly more radicular dentin in the middle and cervical thirds, weakening the root and increasing the risk of vertical root fracture. Lam et al showed that aggressive coronal tapers reduce fracture resistance, particularly in teeth with thin dentinal walls (mandibular incisors, mesial roots of mandibular molars). A conservative approach — smaller taper (0.02–0.04) combined with adequate apical size — is increasingly recommended for slender roots."}, {"type": "ul", "items": ["How does taper affect irrigation efficacy?"]}, {"type": "p", "text": "Greater taper creates a larger irrigant reservoir in the coronal and middle thirds and reduces the apical dead zone. Usman et al showed that 0.06 taper preparations allowed deeper irrigant penetration than 0.02 taper preparations. However, tapers above 0.06 provide diminishing returns in irrigation efficacy while substantially increasing dentin removal. Irrigant activation (sonic, ultrasonic) compensates for smaller taper by improving fluid dynamics, making large tapers less necessary when activation is used."}, {"type": "ul", "items": ["How does taper affect tooth fracture resistance?"]}, {"type": "p", "text": "Higher taper preparations significantly reduce fracture resistance. Lam et al found that 0.06 taper preparations were significantly weaker than 0.04 taper preparations in extracted teeth under cyclic loading. Rundquist and Versluis confirmed that increased taper concentrates stress at the apical and middle thirds. For thin roots and posterior teeth with narrow roots, a conservative 0.04 or 0.02 taper at the apical third with a wider coronal shape is preferable."}]}, {"id": "s5-instrumentation-56-single-file-vs-multiple-file-sequences", "number": "5.6", "title": "Single File vs. Multiple File Sequences", "level": 2, "blocks": [{"type": "ul", "items": ["What is the evidence comparing single-file vs. multi-file systems?"]}, {"type": "p", "text": "Single-file reciprocating systems (WaveOne, Reciproc, F6 SkyTaper) use asymmetric reciprocation (larger CW angle, smaller CCW angle) to advance apically while reducing cyclic fatigue. Laboratory studies show comparable or slightly more canal transportation compared to rotary multi-file sequences, particularly in curved canals. Sun et al found that traditional multi-file rotary systems produced less postoperative pain compared to single reciprocating file systems and hand instrumentation. A 2016 meta-analysis by Hin et al found no significant difference in periapical healing between single-file and multi-file systems at 12 months."}, {"type": "ul", "items": ["What are the advantages of single-file systems?"]}, {"type": "p", "text": "Single-file systems reduce overall instrumentation time and minimize cross-contamination risk (single-use recommended by manufacturers). They reduce procedural complexity and the number of instruments tracked. For general practitioners or time-constrained settings, single-file systems produce adequate results with a simplified learning curve. Reciprocating motion reduces cyclic fatigue stress on any single instrument cross-section, potentially decreasing fracture risk versus continuous rotation at the same torque."}, {"type": "ul", "items": ["When might multi-file sequences be preferred?"]}, {"type": "p", "text": "Multi-file rotary sequences allow progressive crown-down preparation, better staged debris removal, and more predictable shaping in complex canal morphologies (severe curvatures, S-shaped canals, type III configurations). They allow the operator to use smaller instruments first to gauge canal resistance before committing to a larger apical preparation. Systems with dedicated glide path files (e.g., ProGlider + ProTaper Next, or PathFile + WaveOne Gold) offer hybrid approaches that blend single-file efficiency with progressive safety."}]}, {"id": "s5-instrumentation-57-hand-vs-rotary-vs-reciprocating-instrumentation", "number": "5.7", "title": "Hand vs. Rotary vs. Reciprocating Instrumentation", "level": 2, "blocks": [{"type": "ul", "items": ["What is the evidence comparing rotary and reciprocating motion?"]}, {"type": "p", "text": "Continuous rotary motion produces faster cutting with good tactile feedback but imposes continuous cyclic fatigue on the instrument. Reciprocating motion (asymmetric: larger angle of engagement in the cutting direction, smaller angle in the release direction) reduces cyclic fatigue per work cycle and allows disengagement before the instrument reaches its elastic limit. In vitro cyclic fatigue studies consistently show reciprocating files fracture after significantly more cycles than the same files in continuous rotation. However, reciprocating instruments are generally single-use, and their debris extrusion is comparable to or slightly higher than rotary systems (Bürklein and Schäfer 2012). Short found that rotary file systems stayed more centered in the canal compared to reciprocating file systems. Clinical outcome studies have not demonstrated a significant difference in success rates between motion types."}, {"type": "ul", "items": ["When is hand instrumentation still indicated?"]}, {"type": "p", "text": "Hand instrumentation remains essential for: (1) initial negotiation of calcified, blocked, or severely curved canals where powered rotation would risk ledging or separation; (2) establishing the glide path (#6, #8, #10 with watch-winding or balanced-force technique); (3) maintaining apical patency throughout instrumentation — a small hand file (#8 or #10) to the full working length maintains the foramen patent, decreases debris packing at the apex, reduces vapor lock, and increases irrigant efficacy at the apex {{cite: Vera 2012}}; (4) retreatment cases where gutta-percha or sealer must be engaged and removed before rotary retreatment files are safe; and (5) procedural emergencies such as separated instrument bypass attempts using pre-bent hand files."}, {"type": "ul", "items": ["How does motion type affect instrument fracture risk and canal transportation?"]}, {"type": "p", "text": "Torsional fracture occurs when the file tip locks in the canal while the body continues to rotate, exceeding the file's torsional limit — most common in tight, calcified canals. Cyclic fatigue fracture results from repeated tension-compression cycles as the file flexes around a curve; it is the dominant failure mode in curved canals and is independent of torsional load. Reciprocating motion reduces cyclic fatigue accumulation per stroke but does not eliminate torsional fracture risk if the file is forced apically. Canal transportation is determined more by instrument taper and rigidity than by motion type; stiffer files with larger tapers transport canals more regardless of rotary or reciprocating motion. CM and Gold alloy instruments, due to their superelastic martensitic behavior at body temperature, produce significantly less transportation than conventional NiTi in curved canals."}]}]}, {"id": "s6-irrigation-and-disinfection", "number": "6", "title": "Irrigation and Disinfection", "level": 1, "blocks": [], "subsections": [{"id": "s6-irrigation-and-disinfection-61-irrigant-selection-and-concentration", "number": "6.1", "title": "Irrigant Selection and Concentration", "level": 2, "blocks": [{"type": "ul", "items": ["What is the rationale for sodium hypochlorite as the primary irrigant?"]}, {"type": "p", "text": "NaOCl flushes debris and kills bacteria. This is important because after instrumentation 35% of canal walls remain untouched (Peters). NaOCl should be continuously replenished since it can be inactivated by dentin in as few as 60 seconds (Arias-Moliz)."}, {"type": "ul", "items": ["What concentration of NaOCl provides optimal tissue dissolution vs. safety?"]}, {"type": "p", "text": "5.25% is most effective (Hand)."}, {"type": "ul", "items": ["What are the indications for chlorhexidine as an irrigant?"]}, {"type": "p", "text": "It could be useful for patients with allergies to NaOCl."}, {"type": "p", "text": "Chlorhexidine should not be mixed with NaOCl because it produces parachloroaniline (Basrani et al). But this is being called into question based on newer research by Orhan."}, {"type": "ul", "items": ["What is the role of EDTA in the irrigation protocol?"]}, {"type": "p", "text": "EDTA removes the smear layer (Calt and Serper)."}, {"type": "ul", "items": ["Should NaOCl and EDTA be alternated throughout instrumentation?"]}, {"type": "p", "text": "Probably not since research shows that alternating between NaOCl and EDTA irrigation throughout instrumentation resulted in excessive loss of intertubular dentin (Boumgartner and Mader). The recommended protocol would be NaOCl, penultimate EDTA for one minute, followed by a final sodium hypochlorite irrigation. This final NaaOCl irrigation is justified by tthe finding that the smear layer reduced the disinfecting properties of CHX and NaOCl (Sen et al)."}, {"type": "ul", "items": ["Could ozone be useful?"]}, {"type
