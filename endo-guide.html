": "p", "text": "No. It is not as effective as NaOCl and is not more effective when used in combination than NaOCl alone {{cite: Sliva 2020}}."}]}, {"id": "s6-irrigation-and-disinfection-62-irrigation-delivery-method", "number": "6.2", "title": "Irrigation Delivery Method", "level": 2, "blocks": [{"type": "ul", "items": ["What needle gauge and type is optimal for irrigation?"]}, {"type": "p", "text": "30G {{cite: Boutsioukis 2010}}"}, {"type": "ul", "items": ["How far from working length should the needle be positioned?"]}, {"type": "p", "text": "1 mm {{cite: Boutsioukis 2010}} and {{cite: Sedley 2005}}"}, {"type": "ul", "items": ["What flow rate and volume is recommended?"]}, {"type": "ul", "items": ["What is the evidence for negative pressure irrigation systems?"]}]}, {"id": "s6-irrigation-and-disinfection-63-activation-technique-selection", "number": "6.3", "title": "Activation Technique Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What is the evidence for and against passive ultrasonic irrigation (PUI)?", "- More effective than syringe irrigation at removing debris from canal depressions (Malki). Liang found no improvement in periapical healing with PUI.", "How does sonic activation compare to ultrasonic?", "It has equivalent debridement compared to PUI (Jensen et al).", "What is the role of laser-activated irrigation?", "Research suggests that it leads to greater levels of microbial reduction (Chrepa).", "When is activation essential vs. beneficial?", "While the research doesn’t yet show better outcomes it dows lead to cleaner canls (Virdee et al).", "What about gentle wave?", "It appears to be as effective as traditional methos and potentially better for isthmus cleaning (Molina et al). It has similar post op pain (grisby) and healing outcomes at 1 year (Sigurdsson) compared to traditional technique."]}]}, {"id": "s6-irrigation-and-disinfection-64-intracanal-medicament-use-and-selection", "number": "6.4", "title": "Intracanal Medicament Use and Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What is the evidence for calcium hydroxide as an inter-appointment medicament?"]}, {"type": "p", "text": "CaOH's alkalinity (pH 11-12) provides its antimicrobial properties. It also halts resorption due to its high pH."}, {"type": "ul", "items": ["What is the optimal duration of calcium hydroxide placement?"]}, {"type": "p", "text": "Sjögren (1991) found that 7 days was needed to sufficiently eliminate intracanal bacteria. Kahler found in vitro with lamb teeth no increase in fracture susceptibility with up to 9 months of CaOH placement."}, {"type": "ul", "items": ["Does it help to use EDTA prior to CaOH placement?"]}, {"type": "p", "text": "It is important to do edta before placing CaOH (sayef) because it allows for diffusion of the hydroxyl ions through the root."}, {"type": "ul", "items": ["Are there indications for other medicaments (antibiotics, steroid combinations)?", "DAP or TAP can be used in regenerative endododntics ar low concentrations. Ledermix (steroid + antibiotic combo) does decrease pain but it may just be treating the symptoms, not eliminating the etiology and there are no outcome studies that show it to be superior to CaOH.", "How effective is complete medicament removal before obturation?", "Irrigation alone will leave significant residue. Rotary instrumentation > PUI > hand filing with headstrom {{cite: Kenee 2006}}."]}]}, {"id": "s6-irrigation-and-disinfection-65-smear-layer-removal-protocol", "number": "6.5", "title": "Smear Layer Removal Protocol", "level": 2, "blocks": [{"type": "ul", "items": ["What is the evidence for smear layer removal vs. retention? Th evidence for its removal: smear layer contains bacteria, it decreases penetration of sealer into dentin, and it can dissolve over time allowing for microleakage {{cite: Violich and Chandler 2010}}. The counter argument is that here is no difference in outcome with smear layer removal {{cite: Torabinejad 2009}} and that retaining it may decrease permeability (Pashley).", "What is the optimal EDTA concentration and contact time?"]}, {"type": "p", "text": "The optimal contact time is 1 minute for complete smear layer removal; 10 minutes causes excessive erosion (Calt and Serper)."}, {"type": "ul", "items": ["What is the recommended final irrigation sequence?"]}, {"type": "p", "text": "EDTA followed by NaOCl (Goldman)."}]}]}, {"id": "s7-obturation", "number": "7", "title": "Obturation", "level": 1, "blocks": [], "subsections": [{"id": "s7-obturation-71-obturation-technique-selection", "number": "7.1", "title": "Obturation Technique Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What is the evidence comparing cold lateral condensation vs. warm vertical?", "- Warm vertical is better at obturating laeral canals than CLC (Peng: 28% vs 9%), better for oval canals (Gillhooly, Wu)", "- Watm verical does cause more extrusion though (De Dues)", "System B is safe: <10 dec centigrade rise at 200 deg C) {{cite: Sweatman and Boumgartner 2001}}", "-", "When is continuous wave technique preferred?", "In canals with oval or C sshaped calnals {{cite: Fan 2004}}, curved canals {{cite: Gilhooly 2000}}, canls with multiple portals of exit due to pressure from vertical compaction (Peng: WV fills lateral canals at 28% and lateral condensation fills at 9%).", "C shaped canal classification (Melton)", "Type I: continuous", "Type II: semi colon shape: seperation", "Type III: separated canals", "Isthmuses and fins", "Resorptive defects (mid canal ballooning of canal space)", "Retreament cases (may have irregular anatomy after retreatment)"]}, {"type": "ul", "items": ["What are the indications for single cone obturation?", "In canals with approatiale anatomy (round) and preparation and Bioceramic sealer {{cite: Boutsioukis 2021}}."]}, {"type": "ul", "items": ["How does obturation technique affect treatment outcomes?", "No significant difference in outcomes (Ng 2008, 2011)"]}]}, {"id": "s7-obturation-72-sealer-selection", "number": "7.2", "title": "Sealer Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the properties of an ideal root canal sealer?"]}, {"type": "p", "text": "An ideal sealer is biocompatible, dimensionally stable (minimal shrinkage on setting), adherent to canal walls and gutta-percha, bacteriostatic, radiopaque, insoluble in tissue fluids, easily removed if retreatment is needed, and does not stain tooth structure {{cite: Grossman 1976}}."}, {"type": "ul", "items": ["How do bioceramic sealers compare to resin-based and zinc oxide eugenol sealers?"]}, {"type": "p", "text": "Bioceramic sealers (e.g., Totalfill BC Sealer, BioC Sealer) are calcium silicate-based, bond chemically to dentin via hydroxyapatite formation, are highly biocompatible, and expand slightly on setting (~0.2%), which may aid marginal adaptation. AH Plus (epoxy-resin based) has the longest track record of clinical evidence, superior flowability, and strong bond to dentin. ZOE sealers (e.g., Pulp Canal Sealer) are well-tolerated but eugenol can be cytotoxic and may interfere with resin bonding if a post or retreatment is required. No sealer type has demonstrated statistically significant superiority in periapical healing outcomes in systematic reviews {{cite: Peng 2007}}."}, {"type": "ul", "items": ["What is the evidence for sealer penetration into dentinal tubules?"]}, {"type": "p", "text": "Bioceramic and resin sealers penetrate dentinal tubules more consistently than ZOE sealers. Ultrasonic activation of irrigants prior to sealer placement improves tubular penetration. The clinical significance of tubular penetration on outcomes remains unclear, as bacteria may exist beyond the typical penetration depth {{cite: Haapasalo 2010}}."}, {"type": "ul", "items": ["Does sealer type affect treatment outcomes?"]}, {"type": "p", "text": "No clear difference in clinical outcomes has been demonstrated between sealer types in systematic reviews. The quality of the final coronal seal and adherence to shaping and cleaning protocols appear to have greater influence on outcomes than sealer chemistry {{cite: Peng 2007}}."}]}, {"id": "s7-obturation-73-apical-barrier-material-selection", "number": "7.3", "title": "Apical Barrier Material Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for apical plug placement?"]}, {"type": "p", "text": "Apical plug placement is indicated when a normal apical constriction is absent: open apex due to incomplete root development (immature teeth), iatrogenic over-instrumentation, or resorptive loss of the apical stop. It provides a physical barrier to prevent extrusion of obturation material and allows condensation against a solid endpoint."}, {"type": "ul", "items": ["What is MTA?"]}, {"type": "p", "text": "MTA (Mineral Trioxide Aggregate) is composed of tricalcium silicate, dicalcium silicate, tricalcium aluminate, and bismuth oxide (for radiopacity). It sets in the presence of moisture by forming calcium hydroxide, then calcium silicate hydrate. It has excellent biocompatibility, superior sealing ability, and supports cementum regeneration over its surface."}, {"type": "ul", "items": ["How does MTA compare to Biodentine and other bioceramics for apical barriers?"]}, {"type": "p", "text": "Biodentine has similar biocompatibility and bioactivity to MTA but sets faster (12 minutes vs. 2-4 hours for ProRoot MTA) and has superior compressive strength. Both MTA and Biodentine have demonstrated comparable periapical healing rates. Other tricalcium silicate materials (e.g., Endosequence Root Repair Material, BioAggregate) have similar properties. MTA remains the gold standard with the most long-term clinical data {{cite: Parirokh and Torabinejad 2010}}."}, {"type": "ul", "items": ["What is the optimal apical plug thickness?"]}, {"type": "p", "text": "A minimum of 4 mm of MTA apical plug thickness is recommended to provide an adequate seal and resist displacement during condensation. Plugs less than 3 mm are associated with higher leakage rates. Some authors recommend 4-5 mm as the target thickness {{cite: Lawley 2004}}."}]}, {"id": "s7-obturation-74-open-apex-management-apexification-vs-revascularization", "number": "7.4", "title": "Open Apex Management: Apexification vs. Revascularization", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for apexification vs. regenerative endodontics?"]}, {"type": "p", "text": "Apexification (MTA plug or CaOH) is preferred when the patient is older with near-complete root development, the canal is heavily infected, or the patient cannot commit to the extended timeline of regenerative therapy. Regenerative endodontic procedures (REPs) are preferred in immature necrotic teeth in patients under ~18 years where continued root development (thickening of walls, apical closure, increased root length) is possible. REPs are especially favored when dentinal walls are very thin, as apexification would leave a fragile root prone to cervical fracture."}, {"type": "ul", "items": ["What is the success rate of MTA apexification?"]}, {"type": "p", "text": "93.5% success rate (Witherspoon et al., 2008). This is notable since apexification with CaOH leads to 28-77% cervical root fracture incidence (Cvek)."}, {"type": "ul", "items": ["What is the evidence for continued root development with revascularization?"]}, {"type": "p", "text": "Multiple case series and systematic reviews confirm that REPs can achieve continued root lengthening, apical closure, and thickening of canal walls. Kontakiotis et al. (2015) found that REPs led to increased root length in 76% and increased wall thickness in 66% of cases, with periapical healing in 91%. The new tissue is not histologically confirmed pulp in most cases; it is predominantly cementum-like, bone-like, and PDL-like tissue {{cite: Kontakiotis 2015}}."}, {"type": "ul", "items": ["How do you select between these approaches?"]}, {"type": "p", "text": "Key decision factors include patient age and remaining root development potential, severity of infection, canal wall thickness (assess with CBCT), patient compliance for multiple visits (REPs require 2-3 visits), and patient/guardian preference. If walls are very thin, REPs may be preferred to allow continued thickening; alternatively, fiber post-reinforcement combined with MTA apexification is an option for thin-walled teeth when REPs are not feasible."}]}, {"id": "s7-obturation-75-criteria-for-adequate-fill", "number": "7.5", "title": "Criteria for Adequate Fill", "level": 2, "blocks": [{"type": "ul", "items": ["What are the radiographic criteria for an adequate obturation?"]}, {"type": "p", "text": "An adequate obturation should: (1) terminate within 0-2 mm of the radiographic apex (ideally at the CDJ/minor constriction), (2) demonstrate a dense, homogeneous fill without voids, (3) follow the original canal path without signs of ledging or transportation, (4) demonstrate sealer visible at the canal walls, and (5) show no significant extrusion of material beyond the apex."}, {"type": "ul", "items": ["How does fill length (short, flush, overfill) affect outcomes?"]}, {"type": "p", "text": "Fills terminating 0-2 mm short of the radiographic apex have the best outcomes. Overfills are associated with poorer outcomes, particularly in vital pulp cases, because extruded material provokes a foreign body reaction that impairs healing. Short fills (>2 mm short) are also associated with reduced success due to residual bacteria in the unfilled apical space. Ng's meta-analysis (2011) confirmed that obturation within 2 mm of the apex had significantly higher success rates than short or long fills {{cite: Ng 2011}}."}, {"type": "ul", "items": ["What is the acceptable distance from the radiographic apex?"]}, {"type": "p", "text": "The optimal fill endpoint is 0-2 mm from the radiographic apex, corresponding to the CDJ, which is typically 0.5-1 mm from the radiographic apex. Overfill beyond the apex is associated with reduced healing, pain, and possible inferior alveolar nerve injury in the mandibular posterior region {{cite: Ng 2008}}."}, {"type": "ul", "items": ["What is the composition of gutta-percha?"]}, {"type": "p", "text": "Gutta-percha is 65% zinc oxide, 20% gutta-percha, 15% waxes, resins, and metals (Goodman)."}]}]}, {"id": "s8-restoration", "number": "8", "title": "Restoration", "level": 1, "blocks": [], "subsections": [{"id": "s8-restoration-81-immediate-vs-delayed-coronal-restoration", "number": "8.1", "title": "Immediate vs. Delayed Coronal Restoration", "level": 2, "blocks": [{"type": "ul", "items": ["What is the evidence regarding timing of coronal restoration?"]}, {"type": "p", "text": "Coronal leakage begins within days to weeks after obturation if a proper coronal seal is not placed. Studies have shown that 90 days of exposure to oral fluids can result in coronal leakage in the majority of obturated canals (Saunders and Saunders 1994). Same-visit core placement is associated with improved outcomes in multiple retrospective studies."}, {"type": "ul", "items": ["How does delayed restoration affect tooth survival?"]}, {"type": "p", "text": "Delayed restoration significantly reduces tooth survival and endodontic success. A retrospective study by Gillen et al. (2011) found that the quality of coronal restoration had a greater impact on periapical healing than the quality of root canal treatment. Delaying restoration by more than 4 weeks without an adequate provisional seal is associated with increased failure rates {{cite: Gillen 2011}}."}, {"type": "ul", "items": ["What is the maximum acceptable delay before permanent restoration?"]}, {"type": "p", "text": "While not definitively established, most clinicians and guidelines recommend definitive restoration within 2-4 weeks of obturation. Longer delays require a well-sealed provisional restoration. IRM or Cavit with adequate thickness are acceptable provisional materials for limited periods."}, {"type": "ul", "items": ["How does same-day core placement affect outcomes?"]}, {"type": "p", "text": "Same-day core placement immediately after obturation is generally recommended to reduce the risk of coronal leakage. No evidence suggests that same-day core placement is harmful to the seal. Composite bonding may be performed in the same visit when the canal is dry and well-obturated."}, {"type": "ul", "items": ["What is the minimum thickness of temporary material for adequate seal?"]}, {"type": "p", "text": "3.5 mm of Cavit is necessary to obtain optimal temporary seal (Webber)."}]}, {"id": "s8-restoration-82-post-indications-and-selection", "number": "8.2", "title": "Post Indications and Selection", "level": 2, "blocks": [{"type": "ul", "items": ["When is a post indicated vs. contraindicated?"]}, {"type": "p", "text": "A post is indicated when there is insufficient coronal tooth structure to retain a core (generally when more than 50% of coronal structure is missing) and when a crown is required. A post does not strengthen the root; its sole purpose is core retention. Post placement is contraindicated when adequate coronal structure remains for core retention, when root length or diameter is insufficient (<8 mm), or when there is concern about root fracture risk outweighing the retention benefit."}, {"type": "ul", "items": ["What is the evidence comparing fiber posts vs. metal posts?"]}, {"type": "p", "text": "Fiber posts (glass or quartz fiber in resin matrix) have a modulus of elasticity similar to dentin, which distributes stress more favorably and results in restorable failure modes (debonding, core fracture) rather than catastrophic root fractures. Metal posts (cast or prefabricated stainless steel/titanium) have higher modulus of elasticity than dentin and are associated with unrestorable vertical root fractures when failure occurs. Systematic reviews and meta-analyses consistently favor fiber posts over metal posts for their more favorable failure mode {{cite: Fernandes 2003}}."}, {"type": "ul", "items": ["How does post placement affect fracture resistance and failure mode?"]}, {"type": "p", "text": "Post placement per se does not increase fracture resistance compared to no post when adequate coronal structure exists. The crown provides the cuspal protection that significantly improves fracture resistance. Ferrule effect (2 mm of sound tooth structure circumferentially) is more important than post type for fracture resistance. Fiber posts promote restorable failures (debonding/decementation) while metal posts promote non-restorable failures (vertical root fracture) {{cite: Fernandes 2003}}."}, {"type": "ul", "items": ["What is the optimal post length and diameter?"]}, {"type": "p", "text": "Post length should equal the crown-root ratio length (ideally 2/3 of the root length within bone), and a minimum of 1:1 post-to-crown length ratio is recommended. Post diameter should be 1/3 or less of root diameter to minimize root weakening. At least 5-7 mm of gutta percha should remain in the canal after post preparation (Mattison et al)."}]}, {"id": "s8-restoration-83-core-material-selection", "number": "8.3", "title": "Core Material Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the properties of ideal core materials?"]}, {"type": "p", "text": "An ideal core material is: dimensionally stable (minimal shrinkage), biocompatible, adhesive to dentin or chemically retentive, sufficient compressive and tensile strength to support the overlying crown, moisture-tolerant (especially if placed immediately after obturation), and radiopaque for detectability."}, {"type": "ul", "items": ["How do different core materials (composite, amalgam, resin-modified GI) compare?"]}, {"type": "p", "text": "Composite resin is the most commonly used core material: high compressive strength, bonds to dentin with adhesive systems, and is radiopaque. Amalgam provides excellent compressive strength and marginal adaptation over time but requires mechanical retention (undercuts or pins) and is not adhesive. Resin-modified glass ionomer (RMGI) is moisture-tolerant and fluoride-releasing but has lower strength and is best reserved for limited core buildups. In terms of clinical performance, composite and amalgam cores under crowns have similar survival rates. IRM (intermediate restorative material) is not suitable as a core material due to insufficient strength."}, {"type": "ul", "items": ["What bonding considerations are relevant for endodontically treated teeth?"]}, {"type": "p", "text": "Eugenol-containing sealers (ZOE) can inhibit polymerization of resin composites and adhesives if residual sealer contaminates the pulp chamber. The use of self-etch or 10-MDP-based adhesives (e.g., Clearfil SE Bond, Panavia) is preferred in these situations as they are less inhibited by eugenol. Dentin in endodontically treated teeth may have reduced moisture, which can affect bond strength with total-etch systems; self-etch adhesives are generally more forgiving. NaOCl residue can inhibit polymerization; rinsing with sterile water or sodium thiosulfate before bonding is recommended."}]}, {"id": "s8-restoration-84-cuspal-coverage-decisions", "number": "8.4", "title": "Cuspal Coverage Decisions", "level": 2, "blocks": [{"type": "ul", "items": ["When is cuspal coverage indicated for endodontically treated teeth?"]}, {"type": "p", "text": "Cuspal coverage is indicated for posterior teeth (premolars and molars) after root canal treatment, as these teeth are subject to high occlusal forces and are at significantly higher risk of cuspal fracture. Anterior teeth with adequate remaining structure generally do not require full coverage if the access preparation can be adequately sealed with composite. Any tooth with 2 or more missing walls, heavy occlusal contacts, or parafunctional habits warrants cuspal coverage."}, {"type": "ul", "items": ["How does cuspal coverage affect tooth survival?"]}, {"type": "p", "text": "Cuspal coverage dramatically improves survival of endodontically treated posterior teeth. Molars and premolars without cuspal coverage are 6x more likely to fracture than those with crowns {{cite: Aquilino and Caplan 2002}}. The survival benefit is greatest for posterior teeth under heavy occlusal loading."}, {"type": "p", "text": "The quality of coronal restoration is more important for endodontic outcomes than the quality of the root canal (Ray and Trope)."}, {"type": "ul", "items": ["What factors influence the decision (tooth type, remaining structure, occlusal forces)?"]}, {"type": "p", "text": "Key factors include: (1) tooth type — posterior teeth almost universally benefit from cuspal coverage; (2) remaining tooth structure — number of remaining walls, ferrule height, and cusp integrity; (3) occlusal forces — bruxers and those with high masticatory forces have greater need; (4) strategic importance of the tooth — abutment teeth for fixed or removable prostheses generally warrant the most durable restoration; (5) patient age and long-term treatment plan."}, {"type": "ul", "items": ["What is the evidence for different types of cuspal coverage (crown, onlay, overlay)?"]}, {"type": "p", "text": "Direct composite overlays provide an adhesive, minimally invasive option for teeth with adequate remaining structure. Ceramic or indirect onlays/overlays offer superior strength and wear resistance compared to direct composites. Full coverage crowns remain the traditional choice for heavily broken-down teeth but sacrifice additional tooth structure. Studies show similar outcomes between indirect onlays and crowns when ferrule is adequate and bonding principles are followed."}, {"type": "ul", "items": ["What percentage of crowned vital teeth will eventually need RCT?"]}, {"type": "p", "text": "17% of crowned vital teeth will need RCT within 25 years (Valderhaug et al). This rate is higher for partial denture abutments which need RCT at a rate of 32% (Cheung)."}]}, {"id": "s8-restoration-85-post-operative-pain-and-occlusal-adjustment", "number": "8.5", "title": "Post-Operative Pain and Occlusal Adjustment", "level": 2, "blocks": [{"type": "ul", "items": ["Does occlusal adjustment decrease post-operative pain?"]}, {"type": "p", "text": "According to Rosenberg, occlusal adjustment decreases post-op pain when there is: 1) preoperative pain, 2) percussion sensitivity, 3) pulp vitality, and 4) absence of a periapical radiolucency."}]}]}, {"id": "s9-complications-and-management", "number": "9", "title": "Complications and Management", "level": 1, "blocks": [], "subsections": [{"id": "s9-complications-and-management-91-instrument-separation-management", "number": "9.1", "title": "Instrument Separation Management", "level": 2, "blocks": [{"type": "ul", "items": ["What factors determine prognosis after instrument separation?"]}, {"type": "p", "text": "The presence of a preoperarive lesion Hadley the biggest impact (Spili and Messer)"}, {"type": "ul", "items": ["What techniques are available for separated instrument retrieval?"]}, {"type": "p", "text": "Bypassing, use of ultrasonics"}, {"type": "ul", "items": ["When should you attempt bypass vs. retrieval vs. leave in place?"]}, {"type": "p", "text": "You should leave it in place and obturate to that level of it would be more damaging and risky to the canal to remove it {{cite: Madarrati 2018}}"}, {"type": "ul", "items": ["How does separated instrument affect treatment outcomes?"]}, {"type": "p", "text": "No significant effect of instrument separation on treatment outcomes if there was no pre-op PA and the fracture occurred in the apical 1/3 {{cite: Spili 2005}}."}]}, {"id": "s9-complications-and-management-perforation-repair-timing-and-materials", "number": "", "title": "Perforation Repair Timing and Materials", "level": 2, "blocks": [{"type": "ul", "items": ["How does perforation location affect prognosis?"]}, {"type": "p", "text": "The 1-year and beyond perforation repair success rate is 86% (Mente). Overall pooled success is 72.5% but MTA use increases that to 80.9% (Mente)."}, {"type": "ul", "items": ["What is the evidence for immediate vs. delayed perforation repair?"]}, {"type": "p", "text": "Mente 2014 and Pontious 2013 showed that immediate repair with MTA had similar success rates to traditional NSRCT."}, {"type": "ul", "items": ["What factors predict success of perforation repair?"]}, {"type": "p", "text": "Time, size and location (crestal is the worst) {{cite: Fuss and Trope 1996}}."}]}, {"id": "s9-complications-and-management-93-ledgetransportation-management", "number": "9.3", "title": "Ledge/Transportation Management", "level": 2, "blocks": [{"type": "ul", "items": ["What techniques are used to negotiate ledges?"]}, {"type": "p", "text": "A ledge is an artificially created irregularity on the canal wall that prevents instruments from progressing to the apex. Techniques for negotiation include: (1) pre-curving a small stainless steel hand file (size 10 or 15) in the direction of the ledge to deflect past the obstruction; (2) recapitulation with short, watch-winding, patency-maintaining strokes; (3) use of chelating agents (e.g., EDTA) to soften dentin and aid progression; (4) magnification (microscope or loupes) to visualize the original canal path; and (5) in severe cases, CBCT imaging to confirm canal anatomy before attempting negotiation. Once bypassed, the ledge area should be smoothed with small rotary files using light pressure."}, {"type": "ul", "items": ["How does canal transportation affect treatment outcomes?"]}, {"type": "p", "text": "Canal transportation (deviation of the prepared canal from the original canal path) is associated with reduced treatment success, particularly when apical transportation occurs. Apical transportation can result in loss of the apical stop (causing obturation difficulties), perforation, and reduced seal quality. A systematic review by Peters (2004) noted that transportation was most severe in the apical 5 mm and was related to instrument stiffness and technique. Outcomes are inferior when significant transportation is accompanied by a pre-existing periapical lesion {{cite: Peters 2004}}."}, {"type": "ul", "items": ["What is the acceptable degree of transportation?"]}, {"type": "p", "text": "Minor transportation (<0.3 mm) in the coronal and middle thirds generally does not compromise outcomes. Apical transportation >0.3 mm has a clinically significant negative impact on canal seal and outcomes. Transportation that results in perforation is a serious complication requiring immediate repair. Use of NiTi rotary systems significantly reduces transportation compared to stainless steel files due to the shape memory and flexibility of NiTi alloy."}]}, {"id": "s9-complications-and-management-94-sodium-hypochlorite-accident-response", "number": "9.4", "title": "Sodium Hypochlorite Accident Response", "level": 2, "blocks": [{"type": "ul", "items": ["What is the mechanism of injury in NaOCl accidents?"]}, {"type": "p", "text": "NaOCl accidents occur when irrigant is extruded beyond the apex into periapical tissues. The mechanism of injury is a combination of: (1) direct cytotoxic and hemolytic effect of NaOCl on soft tissue proteins (rapid dissolution of organic tissue); (2) osmotic effect causing tissue edema; and (3) in severe cases, penetration into blood vessels causing systemic effects including subcutaneous emphysema, ecchymosis, and even airway compromise. The severity is directly related to concentration, volume extruded, and pressure of delivery."}, {"type": "ul", "items": ["What is the immediate management protocol?"]}, {"type": "p", "text": "Immediate steps: (1) stop irrigation immediately; (2) place patient supine if near syncope; (3) apply cold compresses to the affected region to reduce swelling; (4) prescribe analgesics (NSAIDs +/- opioids) for pain management; (5) prescribe corticosteroids (dexamethasone 4 mg) to reduce inflammatory edema; (6) prescribe antibiotics (amoxicillin 500 mg TID x 7 days) as prophylaxis against secondary infection; (7) instruct patient on signs of airway compromise and when to go to the emergency room; (8) document the event thoroughly; (9) follow up within 24-48 hours {{cite: Hulsmann 2000}}."}, {"type": "ul", "items": ["What is the expected clinical course and long-term sequelae?"]}, {"type": "p", "text": "The initial triad of signs are sudden pain, profuse bleeding, and immediate swelling."}, {"type": "p", "text": "Swelling typically peaks at 24-48 hours and gradually resolves over 1-2 weeks. Ecchymosis and bruising tracking along fascial planes may appear and spread over several days. Most patients recover fully within 2-4 weeks without permanent sequelae. In severe cases: nerve damage (paresthesia), tissue necrosis requiring surgical debridement, and infection are possible complications. Scarring is rare but possible. Prognosis of the tooth itself depends on how well the root canal can ultimately be completed."}, {"type": "ul", "items": ["What preventive measures reduce risk?"]}, {"type": "p", "text": "Use passive, low-pressure irrigation delivery (no luer-lock syringe forced to depth). Maintain a safety zone: needle 2-3 mm short of working length, with side-venting needles (not end-venting). Use lower concentrations (1-2.5%) especially in immature teeth or teeth with open apices. Avoid forcing irrigant under pressure. Confirm working length before initiating NaOCl irrigation."}]}, {"id": "s9-complications-and-management-95-flare-up-management", "number": "9.5", "title": "Flare-Up Management", "level": 2, "blocks": [{"type": "ul", "items": ["What is the incidence and etiology of endodontic flare-ups?"]}, {"type": "p", "text": "The incidence of flare-ups is 8.4% (Tsesis). The incidence is around 5.8% in teeth with periapical lesions (Yu et al)."}, {"type": "ul", "items": ["What factors increase flare-up risk?"]}, {"type": "p", "text": "Diabetes increases the rate of flare-ups and reduces success (Fouad and Burleson). Walton ‘s review discussed thatflare up risk increases with female gender, pulpal necrosis, acute apical abscess, acute apical periodontitis, large periradicular radiolucency, preoperative pain and swelling. Vital pulp, sinus tract and obturation at treatment are associated with decreased incidence according to Walton."}, {"type": "ul", "items": ["What is the management protocol for flare-ups?"]}, {"type": "p", "text": "Management depends on severity: (1) Mild flare-up (pain without swelling): analgesics (NSAIDs first-line), reassurance, follow-up in 24-48 hours; (2) Moderate flare-up (pain + localized swelling without fluctuance): analgesics + corticosteroids (dexamethasone) to reduce inflammation, possible re-entry for additional irrigation and debridement; (3) Severe flare-up (fluctuant swelling, fever, systemic involvement): incision and drainage if fluctuant, antibiotics, referral if airway/systemic compromise is present. Trephination (penetrating through bone to allow drainage) is an option in non-fluctuant symptomatic cases. Re-entry and additional instrumentation and irrigation may be beneficial."}, {"type": "ul", "items": ["When are antibiotics indicated?"]}, {"type": "p", "text": "Antibiotics are indicated when there are signs of systemic involvement (fever >101°F, malaise, cellulitis with diffuse swelling that crosses fascial planes, lymphadenopathy, or trismus). Antibiotics are NOT indicated for localized, fluctuant abscesses that can be adequately drained. Over-prescription of antibiotics for dental pain without evidence of spreading infection contributes significantly to antibiotic resistance. Amoxicillin 500 mg TID for 7 days is the first-line agent; clindamycin or azithromycin for penicillin-allergic patients {{cite: Fouad and Burleson 2003}}."}]}, {"id": "s9-complications-and-management-96-persistent-infection-workup", "number": "9.6", "title": "Persistent Infection Workup", "level": 2, "blocks": [{"type": "ul", "items": ["What are the causes of persistent periapical pathosis?"]}, {"type": "p", "text": "Causes include periapical actinomycosis (Nair). The prevalence of apical periodontitis in endodontically treated teeth is 41.3% (Jakovljevic et al)."}, {"type": "ul", "items": ["What diagnostic workup is indicated for persistent disease?"]}, {"type": "p", "text": "Workup for persistent periapical pathosis should include: (1) updated periapical radiographs and CBCT to assess for missed canals, untreated anatomy, or extent of lesion; (2) review of original treatment quality (obturation length, density, coronal seal); (3) clinical examination for sinus tracts (trace with gutta-percha point to confirm origin); (4) percussion and palpation testing; (5) assessment for non-endodontic causes (vertical root fracture, periodontal disease, non-odontogenic pathology). CBCT is particularly valuable for detecting missed canals (e.g., MB2 in maxillary molars, middle mesial in mandibular molars) and assessing the relationship of the lesion to adjacent structures {{cite: Lofthag-Hansen 2007}}."}, {"type": "ul", "items": ["What is the role of microbial sampling/culture?"]}, {"type": "p", "text": "Microbial sampling and culture are not routinely performed in standard endodontic practice. They may be considered in immunocompromised patients, cases of persistent infection despite adequate treatment, or in cases of systemic spread. Paper point sampling of the root canal followed by anaerobic culture can guide antibiotic selection in refractory cases. The most common persistent organism in previously treated canals is Enterococcus faecalis, which is resistant to CaOH and many standard intracanal medicaments due to its ability to survive in nutrient-poor, alkaline environments {{cite: Sundqvist 1998}}."}, {"type": "ul", "items": ["When should extraradicular infection be suspected?"]}, {"type": "p", "text": "Extraradicular infection should be suspected when: (1) periapical pathosis persists despite technically adequate retreatment; (2) a sinus tract persists post-treatment; (3) there is a large, longstanding lesion (>1 cm); (4) the lesion does not decrease in size after 12 months of well-executed treatment. Periapical actinomycosis (Nair) is the classic extraradicular infection; biofilm adherent to the outer root surface can maintain pathosis despite canal disinfection. True periapical cysts (bay cysts with epithelial lining independent of the root) may also require surgical management for resolution."}]}, {"id": "s9-complications-and-management-97-cemental-tears", "number": "9.7", "title": "Cemental Tears", "level": 2, "blocks": [{"type": "ul", "items": ["What is the etiology of cemental tears?"]}, {"type": "p", "text": "Cemental tears are most often caused by traumatic occlusion (Haney)."}, {"type": "ul", "items": ["What is the most effective treatment approach for cemental tears?"]}, {"type": "p", "text": "Lin's systematic review found surgical approach to be most effective for treatment. Mid and apical root cemental tears had the best treatment success."}]}]}, {"id": "s10-surgical-endodontics", "number": "10", "title": "Surgical Endodontics", "level": 1, "blocks": [], "subsections": [{"id": "s10-surgical-endodontics-101-case-selection-criteria", "number": "10.1", "title": "Case Selection Criteria", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for apical surgery?", "- Post treatment disease after non surgical retreatment", "What are the contraindications (local and systemic)?", "How do you assess surgical access and anatomical considerations?"]}, {"type": "p", "text": "Use a CBCT. 14% of maxillary molar roots perforate the maxillary sinus according to Pagin et al."}, {"type": "ul", "items": ["Do oroantral communications effect the outcome of apical. Surgery?", "No according to Ericson.", "What antatomical features should be considered for mandibular surgery?"]}, {"type": "p", "text": "1) Proximity to IAN"}, {"type": "p", "text": "2) Proximity to mental foramen (56% between premolars, 25.7% inferior to the second premolar)"}, {"type": "p", "text": "3) Anterior loop of mental foramen"}, {"type": "p", "text": "4) Accessory mental foramina (7% of patients, Naitoh)"}, {"type": "p", "text": "5) Position of roots relative to cortical plates"}, {"type": "ul", "items": ["How do you avoid the mental foramen?"]}, {"type": "p", "text": "Triangle flap with distal vertical incision, grove for retractor (Moiseiwitsch)"}, {"type": "ul", "items": ["What is the success rate of modern EMS compared to traditional techniques?"]}, {"type": "p", "text": "Modern techniques: 94%, Traditional techniques: 59% (Setzer)."}, {"type": "ul", "items": ["What percentage of periapical lesions are scars?"]}, {"type": "p", "text": "25.7% of periapical lesions are scars - this should be considered when evaluating a patient for surgery (Carrillo)."}, {"type": "ul", "items": ["How long should one weigh until taking out the sutures?"]}, {"type": "p", "text": "Hiatt: 2 weeks for 10 x wound stability"}, {"type": "p", "text": "Velvart and Peters: 48-96 hours"}, {"type": "ul", "items": ["Should aspirin ve stopped prior to surgery?"]}, {"type": "p", "text": "No based on a metanalysis of 10 studies (Zhao)."}]}, {"id": "s10-surgical-endodontics-102-flap-design-selection", "number": "10.2", "title": "Flap Design Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the principles of surgical flap design in endodontic surgery?", "How do different flap designs (submarginal, sulcular, papilla-based) compare?", "What factors determine flap selection (esthetics, recession risk, access)?", "Why would you use 1:50000 epi anesthetic suring surgery?"]}, {"type": "p", "text": "Use of 1:50000 k epi decreases blood loss by half during surgery (Buckley et al)."}, {"type": "ul", "items": ["What sutures should be used?"]}, {"type": "p", "text": "Thin, monofilament and synthetic to decrease bacteria and inflammation (Velvart and Peters)"}]}, {"id": "s10-surgical-endodontics-103-osteotomy-technique", "number": "10.3", "title": "Osteotomy Technique", "level": 2, "blocks": [{"type": "ul", "items": ["What size osteotomy provides adequate access while preserving bone?"]}, {"type": "p", "text": "Large enough for ultrasonics to be used but not too large (Toronto study)."}, {"type": "ul", "items": ["What instruments and techniques are used for osteotomy?"]}, {"type": "p", "text": "Either surgical bur or piezotome. Can use TEMS or lead foil radiograph. For the smoothest resection of the root, use a multipurpose bur (Morgan)."}, {"type": "ul", "items": ["How do you manage proximity to anatomical structures?"]}, {"type": "p", "text": "Pre-op CBCT and planning. Visualization and retraction."}]}, {"id": "s10-surgical-endodontics-104-root-end-resection-depth-and-angle", "number": "10.4", "title": "Root-End Resection Depth and Angle", "level": 2, "blocks": [{"type": "ul", "items": ["What is the recommended root-end resection amount and rationale?"]}, {"type": "p", "text": "3 mm is required because it removes most of the apical delta anatomy (Kim and Kratchman as well as Block). Weller says you need 4 mm to get access to the isthmus in most cases."}, {"type": "ul", "items": ["What angle of resection is optimal and why?"]}, {"type": "p", "text": "0 percent (Gilheany and Figdor) to limit leakage."}, {"type": "ul", "items": ["How does resection level affect exposure of anatomical complexities?", "Best way to get hemostasis?"]}, {"type": "p", "text": "Epi pellets for 2-4 min (Little systemic effect – Vickers)). Other hemostatic agents can be difficult to remove and can induce inflammation and alter tissue healing (Ibarolla and Bjorensen)."}, {"type": "ol", "items": ["What is the typical blood losss with apical surgery?"]}, {"type": "p", "text": "9.5 ml (time and location were the biggest factors: longer surgery and palatal surgery (4x))"}, {"type": "ol", "items": ["Does every portion of the lesion need to be removed for healing?"]}, {"type": "p", "text": "According to Lin and Langland, NO but all fortein debris should be removed.."}, {"type": "p", "text": "PreOp Management"}, {"type": "p", "text": "800 mg IBU at beginning of appt to decrease postop pain (Dionne)"}, {"type": "p", "text": "Pre rinse with CHX to decrease bacteria (Martin)"}]}, {"id": "s10-surgical-endodontics-105-root-end-preparation-depth", "number": "10.5", "title": "Root-End Preparation Depth", "level": 2, "blocks": [{"type": "ul", "items": ["What is the recommended root-end preparation depth?", "3 mm (Matisson et al)", "What instruments are used for root-end preparation?"]}, {"type": "p", "text": "Ultrasonic tips because they can access and prep without enlarginf the crypt too much (Mehlhaff)."}, {"type": "ol", "items": ["Do ultrasonic tips cause cracks?"]}, {"type": "p", "text": "Nobody but existing defects can’t be propagated with the tip based on a clinical study. (Tawil)"}, {"type": "ul", "items": ["How does preparation depth affect seal and prognosis?"]}]}, {"id": "s10-surgical-endodontics-106-retrofill-material-selection", "number": "10.6", "title": "Retrofill Material Selection", "level": 2, "blocks": [{"type": "ul", "items": ["What are the properties of an ideal retrofill material?", "How do MTA, Biodentine, and other bioceramics compare as retrofill materials?", "What is the evidence for success rates with different materials?"]}, {"type": "p", "text": "1 year healing: 85% MTA vs 28% GP (Christiansen)"}, {"type": "p", "text": "Chen Found better healing with ESSRM than MTA in dogs"}, {"type": "p", "text": "Torebinejad MTA > amalgam in mopnkeys and dogs"}, {"type": "p", "text": "Baek and Kim: MTA > Super EBA and Amalgam"}, {"type": "ol", "items": ["What are the indications for guided tissue regeneration in apical surgery?"]}, {"type": "p", "text": "Large periapical lesions greater than 10 mm. (Tsesis)"}, {"type": "p", "text": "Through and through lesions (Tsesis)"}, {"type": "p", "text": "Apical-marginal defects (Douthitt, Deitrich)"}]}, {"id": "s10-surgical-endodontics-107-hemisectionroot-amputation-decisions", "number": "10.7", "title": "Hemisection/Root Amputation Decisions", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for hemisection vs. root amputation?", "What factors affect prognosis of these procedures?", "How do survival rates compare to extraction and implant?"]}]}]}, {"id": "s11-recall-and-outcomes", "number": "11", "title": "Recall and Outcomes", "level": 1, "blocks": [], "subsections": [{"id": "s11-recall-and-outcomes-111-recall-interval-determination", "number": "11.1", "title": "Recall Interval Determination", "level": 2, "blocks": [{"type": "ul", "items": ["What recall intervals are recommended after endodontic treatment?", "How does preoperative diagnosis affect follow-up schedule?", "What is the minimum follow-up period to assess healing?"]}]}, {"id": "s11-recall-and-outcomes-112-healing-assessment-criteria-and-timing", "number": "11.2", "title": "Healing Assessment Criteria and Timing", "level": 2, "blocks": [{"type": "ul", "items": ["What are the clinical and radiographic criteria for healed vs. healing vs. disease?", "What is the expected timeline for periapical healing?", "70% of lesions take more than 1 year to heal (Murphy et al).", "What role does CBCT play in healing assessment?"]}, {"type": "p", "text": "CBCTs can assess healing in 3 dimensions but may overestimate persistent disease. Torabinejad found apical hypodensities >1 mm in 20% of endodontically treated teeth using CBCT."}, {"type": "ul", "items": ["How do you define success vs. survival in endodontics?"]}]}, {"id": "s11-recall-and-outcomes-113-when-to-intervene-on-asymptomatic-apical-periodontitis", "number": "11.3", "title": "When to Intervene on Asymptomatic Apical Periodontitis", "level": 2, "blocks": [{"type": "ul", "items": ["What is the natural history of asymptomatic apical periodontitis?", "When is intervention indicated for asymptomatic lesions?", "What factors determine observation vs. treatment?", "How does lesion size affect the decision?"]}]}]}, {"id": "s12-pharmacology-and-pain-management", "number": "12", "title": "Pharmacology and Pain Management", "level": 1, "blocks": [], "subsections": [{"id": "s12-pharmacology-and-pain-management-121-analgesic-selection-and-dosing", "number": "12.1", "title": "Analgesic Selection and Dosing", "level": 2, "blocks": [{"type": "ul", "items": ["What is the NNT for common analgesics in dental pain?"]}, {"type": "p", "text": "The NNT for 800 mg ibuprofen to achieve 50% pain relief is 1.6 (Oxford League Table)."}, {"type": "ul", "items": ["What is the maximum recommended dose of ibuprofen over 24 hours?"]}, {"type": "p", "text": "Maximum is 3.2 grams (Jeske). Even in short durations (8-30 days), dosages above 1.2 grams per day increase cardiovascular risk. Use the lowest effective dose for the least amount of time."}, {"type": "ul", "items": ["What combination analgesic regimens are most effective for endodontic pain?", "When are opioids indicated in endodontic pain management?"]}]}, {"id": "s12-pharmacology-and-pain-management-122-antibiotic-selection-and-indications", "number": "12.2", "title": "Antibiotic Selection and Indications", "level": 2, "blocks": [{"type": "ul", "items": ["What are the indications for antibiotics in endodontic infections?", "What is the first-line antibiotic for endodontic infections?"]}, {"type": "p", "text": "Pen VK or amoxicillin are the recommended first-line drugs (AAE position statement)."}, {"type": "ul", "items": ["When is Augmentin (amoxicillin/clavulanate) indicated?"]}, {"type": "p", "text": "Endodontic abscess bacteria are 100% susceptible to Augmentin vs. only 85% susceptible to penicillin VK (Baumgartner and Xia)."}, {"type": "ul", "items": ["What is the recommended antibiotic for penicillin-allergic patients?"]}, {"type": "p", "text": "Azithromycin is the recommended first-line drug for penicillin-allergic patients (2019 AAE Colleagues for Excellence)."}, {"type": "ul", "items": ["What is the recommended antibiotic course duration?"]}, {"type": "p", "text": "3 to 7 day course (European Society of Endodontology)."}, {"type": "ol", "items": ["Do ABX decrease pain when used in combination with NSAIDS and endo treatment?"]}, {"type": "p", "text": "NO"}, {"type": "ol", "items": ["Fouad, A. F., Rivera, E. M., & Walton, R. E. (1996). Penicillin as a supplement in resolving the localized acute apical abscess. Oral Surgery, Oral Medicine, Oral Pathology, Oral Radiology, and Endodontics."]}, {"type": "ul", "items": ["Methods: A prospective, double-blind, randomized controlled trial involving 32 patients with a localized acute apical abscess (LAAA). After standard local treatment (root canal debridement and/or incision), patients were assigned to one of three groups: (1) penicillin VK, (2) a placebo, or (3) no supplemental medication. All patients received ibuprofen. Pain and swelling were tracked for 72 hours.", "Findings: There was no statistically significant difference in the reduction of symptoms or the course of recovery among the three groups. The majority of patients in all groups recovered quickly with just local treatment and ibuprofen.", "Takeaway: For a localized dental abscess without signs of systemic spread (e.g., fever, malaise), adding penicillin to the treatment regimen offers no demonstrable clinical benefit over performing the necessary local dental procedure and managing pain with anti-inflammatories."]}]}, {"id": "s12-pharmacology-and-pain-management-123-antibiotic-prophylaxis-guidelines", "number": "12.3", "title": "Antibiotic Prophylaxis Guidelines", "level": 2, "blocks": [{"type": "ul", "items": ["What are the current AHA guidelines for antibiotic prophylaxis?"]}, {"type": "p", "text": "Per 2007 American Heart Association guidelines, prophylaxis is indicated for: 1) Prosthetic heart valves, 2) History of infective endocarditis, 3) Unrepaired cyanotic congenital heart defects."}, {"type": "p", "text": "The 2012 joint ADA and AAOS systematic review found that antibiotic prophylaxis reduces bacteria, but not infections. Antibiotics are not recommended prophylactically for patient with prosthetic joints."}, {"type": "ul", "items": ["What dental procedures require prophylaxis in at-risk patients?", "What is the recommended prophylactic regimen?"]}]}]}, {"id": "s13-systemic-conditions-and-endodontics", "number": "13", "title": "Systemic Conditions and Endodontics", "level": 1, "blocks": [], "subsections": [{"id": "s13-systemic-conditions-and-endodontics-131-diabetes-and-endodontic-outcomes", "number": "13.1", "title": "Diabetes and Endodontic Outcomes", "level": 2, "blocks": [{"type": "ul", "items": ["How does diabetes affect endodontic treatment outcomes?"]}, {"type": "p", "text": "Diabetes increases the rate of flare-ups and reduces success (Fouad and Burleson)."}, {"type": "ul", "items": ["What modifications should be considered for diabetic patients?", "How does glycemic control influence prognosis?"]}]}, {"id": "s13-systemic-conditions-and-endodontics-132-cardiovascular-considerations", "number": "13.2", "title": "Cardiovascular Considerations", "level": 2, "blocks": [{"type": "ul", "items": ["What is the relationship between apical periodontitis and cardiovascular disease?"]}, {"type": "p", "text": "Patients with chronic apical periodontitis have 2.8x greater risk of developing coronary heart disease (Costa et al., 2014, 2024)."}, {"type": "ul", "items": ["What precautions are needed for patients on anticoagulants?", "How should epinephrine use be modified in cardiac patients?"]}, {"type": "p", "text": "Maximum epinephrine dose is 0.04 mg for cardiac patients."}]}, {"id": "s13-systemic-conditions-and-endodontics-133-sickle-cell-disease", "number": "13.3", "title": "Sickle Cell Disease", "level": 2, "blocks": [{"type": "ul", "items": ["How does sickle cell disease affect pulp vitality?"]}, {"type": "p", "text": "Sickle cell anemia is associated with 8.3x higher risk of spontaneous pulp necrosis."}, {"type": "ul", "items": ["What special considerations apply to endodontic treatment in sickle cell patients?"]}]}, {"id": "s13-systemic-conditions-and-endodontics-134-head-and-neck-radiation", "number": "13.4", "title": "Head and Neck Radiation", "level": 2, "blocks": [{"type": "ul", "items": ["How does radiation therapy affect pulp testing?"]}, {"type": "p", "text": "Radiation treatment reduces sensitivity to cold sensibility testing, but does not alter pulp histology."}, {"type": "ul", "items": ["What considerations apply to endodontic treatment in irradiated patients?", "What is the risk of osteoradionecrosis with endodontic procedures?"]}]}]}, {"id": "s14-pulp-biology-and-dental-anatomy", "number": "14", "title": "Pulp Biology and Dental Anatomy", "level": 1, "blocks": [], "subsections": [{"id": "s14-pulp-biology-and-dental-anatomy-141-pulp-histology-and-biology", "number": "14.1", "title": "Pulp Histology and Biology", "level": 2, "blocks": [{"type": "ul", "items": ["What is the mineral content of mature dentin?"]}, {"type": "p", "text": "The mineral content of mature dentin is 50%."}, {"type": "ul", "items": ["What is the minimum remaining dentin thickness to prevent pulpal injury?"]}, {"type": "p", "text": "0.5 mm of remaining dentin thickness is required to cause pulpal injury (Murray, 2002; same finding by Reeves and Stanley, 1966). Stanley found that the damage from bacteria getting within 0.5 mm of the pulp is significant and irreversible."}, {"type": "ul", "items": ["What are the zones of the pulp and their functions?", "How does pulp respond to injury at the cellular level?"]}]}, {"id": "s14-pulp-biology-and-dental-anatomy-142-anatomical-variations-and-anomalies", "number": "14.2", "title": "Anatomical Variations and Anomalies", "level": 2, "blocks": [{"type": "ul", "items": ["What is the Oehlers classification of dens invaginatus?"]}, {"type": "p", "text": "Oehlers has three classifications of dens invaginatus."}, {"type": "ul", "items": ["What are the common anatomical variations by tooth type?", "How do you identify and manage C-shaped canals?"]}]}, {"id": "s14-pulp-biology-and-dental-anatomy-143-periapical-pathology", "number": "14.3", "title": "Periapical Pathology", "level": 2, "blocks": [{"type": "ul", "items": ["What is the immunologic theory of periapical cyst formation?"]}, {"type": "p", "text": "The immunologic theory (Torabinejad) suggests cysts increase due to inflammatory mediators stimulating epithelial cells to proliferate. This differs from the abscess theory which states cysts arise from proliferating epithelial cells around an existing abscess cavity (Nair). Ten Cate proposed the nutritional deficiency theory which states the center of a cyst necroses due to loss of nutritional supply."}, {"type": "ul", "items": ["What are the histologic differences between periapical granuloma and cyst?", "How does the immune response contribute to periapical pathosis?"]}, {"type": "h4", "text": "Initially the immune response is innate immunity (dendritic cells, macrophages and neutrophils) and then it transitions to an acquired immunity {{cite: Hahn and Liewehr 2007}}. Unresolved microbial challenge then leads RANKL (receptor activator of NFkB ligand) causing bone resorption."}]}]}, {"id": "s15-dental-trauma", "number": "15", "title": "Dental Trauma", "level": 1, "blocks": [], "subsections": [{"id": "s15-dental-trauma-managing-trauma-patients", "number": "", "title": "Managing trauma patients", "level": 2, "blocks": [{"type": "p", "text": "According to Croll (rapid neurological assessment and initial management of the patient with traumatic injury) et al it is important to asses the overall neurological health of pt to rule out cranial nerve injury prior to treatment. Do a cranial nerve exam first and asses for alertness in time and space (ABCD, airway breathing, circulation and disability)."}]}, {"id": "s15-dental-trauma-concussion-intrusion-and-subluxation-management", "number": "", "title": "Concussion, Intrusion and Subluxation Management", "level": 2, "blocks": []}, {"id": "s15-dental-trauma-according-to-andreasen-it-is-important-to-assess-root-develo", "number": "", "title": "According to Andreasen, it is important to assess root development because that is the most significant factor with intrusion. An immature root is the most important factor for success with intrusion. 1 day of delay does not affect outcome with intrusion.", "level": 2, "blocks": []}, {"id": "s15-dental-trauma-luxation-management", "number": "", "title": "Luxation Management", "level": 2, "blocks": []}, {"id": "s15-dental-trauma-fracture-management", "number": "", "title": "Fracture Management", "level": 2, "blocks": []}, {"id": "s15-dental-trauma-151-avulsion-management", "number": "15.1", "title": "Avulsion Management", "level": 2, "blocks": [{"type": "ul", "items": ["What is the incidence of replacement resorption after replantation?"]}, {"type": "p", "text": "Replacement resorption is common after replantation of avulsed teeth (Souza)."}, {"type": "ul", "items": ["What are the optimal storage media and extra-alveolar times?", "What factors influence prognosis after replantation?", "Intact PDL is the most important determent of healing (Van Hassel)"]}]}, {"id": "s15-dental-trauma-152-splinting-guidelines", "number": "15.2", "title": "Splinting Guidelines", "level": 2, "blocks": [{"type": "ul", "items": ["What are the IADT guidelines for splinting?"]}, {"type": "p", "text": "IADT guidelines state the maximum wire diameter should be 0.4 mm for splinting. Cervical root fractures should be splinted for 4 months (IADT)."}, {"type": "ul", "items": ["What is the recommended splinting duration for different injuries?"]}]}, {"id": "s15-dental-trauma-153-replacement-resorption-and-decoronation", "number": "15.3", "title": "Replacement Resorption and Decoronation", "level": 2, "blocks": [{"type": "ul", "items": ["When is decoronation indicated?"]}, {"type": "p", "text": "If a tooth is infrapositioned 1 mm and undergoing replacement resorption and the patient is prior to growth spurt, decoronation should be performed (Malmgren). This maintains bone while the tooth is resorbed and allows eventual implant placement."}, {"type": "ul", "items": ["What is the technique for decoronation?", "You remove tooth structure 2 mm below the osseous level.", "Is decoronation successful?", "Systematic review says yes especially if done pre pubety (Mohadeb)."]}]}]}, {"id": "s16-differential-diagnosis-and-disease-mimickers", "number": "16", "title": "Differential Diagnosis and Disease Mimickers", "level": 1, "blocks": [], "subsections": [{"id": "s16-differential-diagnosis-and-disease-mimickers-161-non-odontogenic-pain", "number": "16.1", "title": "Non-Odontogenic Pain", "level": 2, "blocks": [{"type": "ul", "items": ["How do you differentiate cardiac pain from dental pain?"]}, {"type": "p", "text": "Cardiac pain is often more pressure and burning compared to dental pain which is throbbing and aching (Kreiner)."}, {"type": "ul", "items": ["What percentage of persistent pain after RCT is non-odontogenic?"]}, {"type": "p", "text": "Persistent pain after root canal treatment is caused by non-odontogenic causes about half the time (Nixdorf). This is important when evaluating patients with persistent pain and to avoid performing RCT on patients without an odontogenic cause."}]}, {"id": "s16-differential-diagnosis-and-disease-mimickers-162-lesions-mimicking-endodontic-pathology", "number": "16.2", "title": "Lesions Mimicking Endodontic Pathology", "level": 2, "blocks": [{"type": "ul", "items": ["What lesions can mimic periapical pathology?"]}, {"type": "p", "text": "Ameloblastomas can appear like endodontic radiolucencies - most often in the posterior mandible. Brown tumors of hyperparathyroidism can cause multiple PARLs and a ground-glass appearance around vital teeth. Nasopalatine duct cysts could mimic endodontic pathology - they appear as heart-shaped radiolucencies at the midline."}, {"type": "ul", "items": ["How do you differentiate true endodontic pathology from mimickers?"]}]}]}, {"id": "s17-notes-and-additional-topics", "number": "17", "title": "Notes and Additional Topics", "level": 1, "blocks": [{"type": "p", "text": "Use this section to add additional decision points or topics as you identify them during your board preparation."}, {"type": "p", "text": "TRAUMA"}, {"type": "p", "text": "Q: What should you do first in a case of trauma?"}, {"type": "p", "text": "A: Cranial nerve exam (Croll)."}, {"type": "p", "text": "Q: How likely is it that a tooth will go necrotic with an uncomplicated crown fracture?"}, {"type": "p", "text": "A: 6%"}, {"type": "p", "text": "Q: How successful are Cvek pulpomies?"}, {"type": "p", "text": "A: 96% (Cvek)"}, {"type": "p", "text": "Q: How successful is it to just treat the coronal portion of a horizontal root fracture?"}, {"type": "p", "text": "A: 86% (Cvek)"}, {"type": "p", "text": "Q: If there is a root fracture what is the chance there will be necrosis of the coronal segment?"}, {"type": "p", "text": "A: 22% (Andreasen)"}, {"type": "p", "text": "Q: According to Andreason how likely are different luxation injuries? A: Intrusion: 85%, Lateral: 58%, Extrusion: 26%, Subluxation: 6%, Concussion 3%"}, {"type": "p", "text": "Q; Do you have to do the root canal on an avulsed open apex tooth with <1hr dry time?"}, {"type": "p", "text": "A: No it may not become necrotic"}, {"type": "p", "text": "Q: What can you do tooth e root of an avulsed tooth with a closed apex and over 1 hr dry time?"}, {"type": "p", "text": "A: Soak in 2% stannous fluoride prior to replanting"}, {"type": "p", "text": "Q: According to Andreason if the tooth is replanted in under 30 mins how likely is resorption? What if it’s over 90 minutes?"}, {"type": "p", "text": "A: 10% if under 30 mins; resorption likely if over 90 minutes"}, {"type": "p", "text": "Q: Is the tooth socket important when replanting?"}, {"type": "p", "text": "A: No according to Oswald who replanted teeth monkey teeth into surgically created sockets."}, {"type": "p", "text": "Q: What does AAE say for when to follow up after trauma? A: 2 weeks, 4 weeks, 6-8 weeks, 6 mo, 1 yr, 5 yrs"}, {"type": "p", "text": "Q: For luxated teeth how likely is PCO? Of the teeth that develop PCO who likely is necrosis?"}, {"type": "p", "text": "A: 40% develop PCO, 7% of the teeth that develop PCO develop necrosis"}, {"type": "p", "text": "Q: What injury factors are most associated with necrosis? A: extent of injury, the age of the patient/the development of the tooth, late necrosis (Andreasen). Sometimes there is transient apical breakdown, that doesn’t necessarily mean there is necrosis"}, {"type": "p", "text": "Q: How do you know fi a tooth is ankylosed?"}, {"type": "p", "text": "A: Anderson (ankylosis) found that sound and lack of mobility are the best indicators of ankylosis"}, {"type": "p", "text": "Q: How does systemic tetracycline compare to amoxicillin? What are absolute contraindications to TCN use?"}, {"type": "p", "text": "A: Systemic TCN is better than amoxicillin or placebo. Can’t use on children or pregnant patients. Sae-Lim."}, {"type": "p", "text": "Q: What causes internal resorption and what is the success rate for nonperforated lesions? What about perforated lesions? How do you treat it?"}, {"type": "p", "text": "A: Involves loss of protective predentin. Treated with long term CaOH. 100% of nonperforating lesions, versus 25% of perforated lesions. (N=4, long term CaOH) (Caliskan)"}, {"type": "p", "text": "Q: What is TCA used and how dows it work?"}, {"type": "p", "text": "A: Trichloracetic acid. It deactivates resorptive cells with coagulative necrosis."}, {"type": "p", "text": "Q: What are the classification systems for incasive cervical resoprtion?"}, {"type": "p", "text": "A: Hithersay’s classification system is used to classify invasive cervical resorption."}, {"type": "p", "text": "Class I and II: small and localized."}, {"type": "p", "text": "Class III: moderate size extending into coronal 1/3 of the root"}, {"type": "p", "text": "Class IV: Extensive lesion extending past coronal 1/3 of root"}, {"type": "p", "text": "Q: What is the treatment for ICR and how successful is the treatment ?"}, {"type": "p", "text": "A: Place glycerol on gingiva. Mechanical debridement with bur and curette. 90% TCA (trichloracetic acid). GI restoration (geristore). NSRCT may or may not be needed, sicne the predentin is often intact and protective of the pulp."}, {"type": "p", "text": "Class I and II 100%"}, {"type": "p", "text": "Class III 78%"}, {"type": "p", "text": "Class IV 12%"}, {"type": "p", "text": "Success rates are from Hithersay’s research."}, {"type": "p", "text": "Pulpal pathology and immunology"}, {"type": "p", "text": "_ IgG predominates, Helepr T cells predominate in eearly active phase of periapical lesion development"}, {"type": "p", "text": "Anacholresis is the theory that bacteria are attracted to and localize to areas of chronic inflammation. This was refuted by Delivanis who injected bacteria into cants afnd found that even with bacteremia the bacteria did not localize to the unfilled canal space."}, {"type": "p", "text": "Nair found that of periapical biopsies 50% were granulomas, 35% were granulomas and 15% were cysts. This differs form a widely held belief that half of periapical lesions are cysts. Nair believes that pocket cysts can heal with RCT but true cysts are less likely to heal."}, {"type": "p", "text": "WOUND HEALING AND FOLLOW UP"}, {"type": "p", "text": "Citations"}, {"type": "p", "text": "Ketterl W."}, {"type": "p", "text": "“Differential diagnosis of pulpal involvement.”"}, {"type": "p", "text": "Quintessence International, 1990"}, {"type": "p", "text": "Kang SH, Kim BS, Kim Y. Cracked teeth: distribution, characteristics, and survival after root canal treatment. J Endod. 2016;42:557–62."}, {"type": "ul", "items": ["Add Lamers cavit leakeage study to my research (note to self). Also oral fluids can reach the apex within 3 days of exposure to the oral environment (Swanson and Madison). This supports the use of a orifice barrier and same day core placement."]}, {"type": "p", "text": "Q: What causes ICR (aka ECRR)?"}, {"type": "p", "text": "A: Trauma, ortho, bleaching."}], "subsections": []}, {"id": "sreferences", "number": "", "title": "References", "level": 1, "blocks": [], "subsections": [{"id": "sreferences-pulp-testing-and-diagnosis", "number": "", "title": "Pulp Testing and Diagnosis", "level": 2, "blocks": [{"type": "p", "text": "Mainkar A, Kim SG. Diagnostic Accuracy of 5 Dental Pulp Tests: A Systematic Review and Meta-analysis. J Endod 2018;44(5):694-702."}, {"type": "p", "text": "Ricucci D, Loghin S, Siqueira JF Jr. Correlation between clinical and histologic pulp diagnoses. J Endod 2014;40(12):1932-9."}, {"type": "p", "text": "Ketterl W. Differential diagnosis of pulpal involvement. Quintessence Int 1990;21(1):53-61."}, {"type": "p", "text": "Andreasen FM, Zhijie Y, Thomsen BL. Occurrence of pulp canal obliteration after luxation injuries. Endod Dent Traumatol 1987;3(3):103-115."}, {"type": "p", "text": "Wilson BL, et al. Safety of electronic apex locators and pulp testers in patients with pacemakers. J Endod 2006;32(9):847-52."}]}, {"id": "sreferences-radiographic-and-cbct-diagnosis", "number": "", "title": "Radiographic and CBCT Diagnosis", "level": 2, "blocks": [{"type": "p", "text": "Bender IB, Seltzer S. Roentgenographic and direct observation of experimental lesions in bone. J Am Dent Assoc 1961;62:152-60."}, {"type": "p", "text": "Brynolf I. A histological and roentgenological study of the periapical region. Odontol Revy 1967;18(Suppl 11):1-176."}, {"type": "p", "text": "de Chevigny C, et al. Treatment outcome in endodontics: the Toronto study--phase 4. J Endod 2008;34(3):258-63."}]}, {"id": "sreferences-cracked-teeth", "number": "", "title": "Cracked Teeth", "l ndodontics", "number": "", "title": "Surgical Endodontics", "level": 2, "blocks": [{"type": "p", "text": "Setzer FC, et al. Outcome of endodontic surgery: a meta-analysis of the literature--Part 1. J Endod 2010;36(11):1757-65."}, {"type": "p", "text": "Carrillo C, et al. Relationship between histological diagnosis and evolution of 70 periapical lesions. J Oral Maxillofac Surg 2008;66(8):1606-9."}]}, {"id": "sreferences-pharmacology", "number": "", "title": "Pharmacology", "level": 2, "blocks": [{"type": "p", "text": "Oxford Pain Research. Bandolier's Little Book of Pain. Oxford University Press; 2003."}, {"type": "p", "text": "Baumgartner JC, Xia T. Antibiotic susceptibility of bacteria associated with endodontic abscesses. J Endod 2003;29(1):44-7."}, {"type": "p", "text": "AAE. AAE Guidance on the Use of Systemic Antibiotics in Endodontics. Chicago: AAE; 2019."}]}, {"id": "sreferences-systemic-conditions", "number": "", "title": "Systemic Conditions", "level": 2, "blocks": [{"type": "p", "text": "Costa TH, et al. Association between chronic apical periodontitis and coronary artery disease. J Endod 2014;40(2):164-7."}, {"type": "p", "text": "Costa CPS, et al. Association between sickle cell anemia and pulp necrosis. J Endod 2013;39(2):177-81."}, {"type": "p", "text": "Fouad AF, Burleson J. The effect of diabetes mellitus on endodontic treatment outcome. J Am Dent Assoc 2003;134(1):43-51."}]}, {"id": "sreferences-dental-trauma", "number": "", "title": "Dental Trauma", "level": 2, "blocks": [{"type": "p", "text": "IADT. International Association of Dental Traumatology guidelines for the management of traumatic dental injuries. Dent Traumatol 2020;36(4):314-30."}, {"type": "p", "text": "Malmgren B. Decoronation: how, why, and when? J Calif Dent Assoc 2000;28(11):846-54."}, {"type": "p", "text": "Andreasen JO, Pedersen BV. Prognosis of luxated permanent teeth--development of pulp necrosis. Endod Dent Traumatol 1985;1(6):207-20."}]}, {"id": "sreferences-differential-diagnosis", "number": "", "title": "Differential Diagnosis", "level": 2, "blocks": [{"type": "p", "text": "Nixdorf DR, et al. Frequency of nonodontogenic pain after endodontic therapy: a systematic review and meta-analysis. J Endod 2010;36(9):1494-8."}, {"type": "p", "text": "Kreiner M, et al. Craniofacial pain as the sole symptom of cardiac ischemia. J Am Dent Assoc 2007;138(1):74-9."}]}, {"id": "sreferences-pulp-biology-and-anatomy", "number": "", "title": "Pulp Biology and Anatomy", "level": 2, "blocks": [{"type": "p", "text": "Murray PE, et al. Restorative pulpal and repair responses. J Am Dent Assoc 2001;132(4):482-91."}, {"type": "p", "text": "Reeves R, Stanley HR. The relationship of bacterial penetration and pulpal pathosis in carious teeth. Oral Surg 1966;22(1):59-65."}, {"type": "p", "text": "Krasner P, Rankow HJ. Anatomy of the pulp-chamber floor. J Endod 2004;30(1):5-16."}, {"type": "p", "text": "Torabinejad M, et al. Inflammatory and immunological aspects of the pathogenesis of human periapical lesions. J Endod 1985;11(11):479-88."}, {"type": "p", "text": "Nair PNR. Pathogenesis of apical periodontitis and the causes of endodontic failures. Crit Rev Oral Biol Med 2004;15(6):348-81."}, {"type": "p", "text": "Eriksson AR, Albrektsson T. Temperature threshold levels for heat-induced bone tissue injury. J Prosthet Dent 1983;50(1):101-7."}, {"type": "p", "text": "CaOH – used for 1) multiple visit tx 2) stop resorption by its high pH (takes 30 days to diffuse through the tooth)"}, {"type": "p", "text": "Types of resorption."}, {"type": "p", "text": "25% of the cases with trauma develop PCO. And about 7% go necrotic."}, {"type": "p", "text": "External cervical resorption – remove the resorption, use TCA, restore with GI"}]}]}], "cards": [{"author": "Mainkar and Kim", "year": "2018", "finding": "EPT has sensitivity of 0.72 and specificity of 0.93, with PPV of 0.89 and NPV of 0.80, giving overall accuracy of 82% .", "section_id": "sroot-canal-treatment-procedural-timeline-11-pulp-testing-methodology-and-interpretation", "section_title": "Pulp Testing Methodology and Interpretation", "source": "marker"}, {"author": "Trowbridge", "year": "", "finding": "Cold testing mechanism: outward hydrodynamic fluid flow stimulates Aδ fibers", "section_id": "sroot-canal-treatment-procedural-timeline-11-pulp-testing-methodology-and-interpretation", "section_title": "Pulp Testing Methodology and Interpretation", "source": "marker"}, {"author": "Miller", "year": "", "finding": "Refrigerant sprays superior to other cold methods for crowned PFM teeth", "section_id": "sroot-canal-treatment-procedural-timeline-11-pulp-testing-methodology-and-interpretation", "section_title": "Pulp Testing Methodology and Interpretation", "source": "marker"}, {"author": "Bierma", "year": "", "finding": "Heated GP tip is safest heat testing method; avoid ball burnisher or hot water", "section_id": "sroot-canal-treatment-procedural-timeline-11-pulp-testing-methodology-and-interpretation", "section_title": "Pulp Testing Methodology and Interpretation", "source": "marker"}, {"author": "Mainkar and Kim", "year": "2018", "finding": "Heat testing accuracy: sensitivity 0.78, specificity 0.67, PPV 0.62, NPV 0.79, overall accuracy 72% .", "section_id": "sroot-canal-treatment-procedural-timeline-11-pulp-testing-methodology-and-interpretation", "section_title": "Pulp Testing Methodology and Interpretation", "source": "marker"}, {"author": "Mainkar and Kim", "year": "2018", "finding": "LDF and pulse oximetry achieve 97% accuracy vs 84% for cold; not yet clinically available", "section_id": "sroot-canal-treatment-procedural-timeline-11-pulp-testing-methodology-and-interpretation", "section_title": "Pulp Testing Methodology and Interpretation", "source": "marker"}, {"author": "Bender", "year": "", "finding": "EPT electrode should be placed at incisal edge or cusp tip", "section_id": "sroot-canal-treatment-procedural-timeline-11-pulp-testing-methodology-and-interpretation", "sectio
