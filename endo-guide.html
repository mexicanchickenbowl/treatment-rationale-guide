. Significant pre-operative factors included narrow but deep periodontal probing depth; pain; discharging sinus; and iatrogenic perforation (for 2°RCTx cases only). Significant intra-operative factors included iatrogenic perforation; patency at apical terminus; and extrusion of root fillings. Significant post-operative restorative factors included presence of cast restoration versus temporary restoration; presence of cast post and core; proximal contacts with both mesial and distal adjacent teeth; and terminal location of the tooth. The presence of pre-operative pain had a profound effect on tooth loss within the first 22 months after treatment [hazard ratio (HR) = 3.1; P = 0.001] with a lesser effect beyond 22 months (HR = 2.4; P = 0.01). Patency at the apical terminus reduced tooth loss (HR = 0.3; P < 0.01) within the first 22 months after treatment but had no significant effect on tooth survival beyond 22 months. Extrusion of gutta-percha root filling did not have any effect on tooth survival (HR = 1.1; P = 0.2) within the first 22 months but significantly increased the hazard of tooth loss beyond 22 months (HR = 3.0; P = 0.003). CONCLUSIONS: The 4-year tooth survival following primary or secondary root canal treatment was 95%, with thirteen prognostic factors common to both.", "journal": "International endodontic journal", "pub_year": "2011", "status": "ok", "score": 0.5, "confidence": "medium", "needs_review": true}, "Owatz|": {"pmid": "17804314", "title": "Measurement of mechanical allodynia and local anesthetic efficacy in patients with irreversible pulpitis and acute periradicular periodontitis.", "abstract": "An essential feature of symptomatic periradicular inflammation is mechanical allodynia, defined as reduced mechanical pain thresholds. A previous study evaluating a new digital force transducer showed that it reliably measures mechanical pain thresholds of teeth with normal periradicular tissues. In this study, we tested the hypothesis that the force transducer quantitatively measures mechanical allodynia in teeth with acute periradicular periodontitis (APP) and detects the effects of local anesthetic injection. Mechanical pain thresholds were measured in patients (n = 30) with irreversible pulpitis (IP) and APP and compared with their contralateral teeth. The results show that the mechanical pain thresholds of teeth with IP and APP were reduced by 77% compared with contralateral control teeth. The administration of local anesthesia reversed the mechanical allodynia by 62%, and significant sex-specific effects were observed. In addition, the normal teeth contralateral to the symptomatic teeth had lower mechanical thresholds than those observed in healthy volunteers, suggesting that central sensitization occurs during this type of odontalgia. Thus, we show that the mechanical pain thresholds are significantly reduced in teeth with IP and APP and that the force transducer has potential application as a diagnostic aid in measuring mechanical allodynia and as an outcome measure in endodontic clinical trials such as pharmacologic studies and mechanistic research.", "journal": "Journal of endodontics", "pub_year": "2007", "status": "ok", "score": 0.4, "query": "Owatz[Author] AND (endodont*[TiAb] OR root canal[TiAb] OR pulp[TiAb] OR periapical[TiAb] OR dental[TiAb] OR dentin[TiAb])", "confidence": "medium", "needs_review": true}, "Pagin|": {"pmid": "23683273", "title": "Maxillary sinus and posterior teeth: accessing close relationship by cone-beam computed tomographic scanning in a Brazilian population.", "abstract": "INTRODUCTION: This study aimed to evaluate the close proximity established between the maxillary sinus floor and posterior teeth roots apices by using cone-beam computed tomographic scanning. METHODS: The relationship of maxillary sinuses and posterior teeth roots, which were divided into 2 groups, was analyzed using i-CAT Vision software (Imaging Sciences, Hatfield, PA). Group 1 included all root apices found in close contact with the maxillary sinus floor without sinus floor elevation, whereas group 2 included all root apices that were protruded within the sinus producing an elevation of the bony cortical. RESULTS: A total of 100 maxillary sinuses and 601 roots apices were evaluated. Group 1 presented 130 of 601 (21.6%) roots and group 2 presented 86 of 601 (14.3%) roots. CONCLUSIONS: The second molar mesiobuccal root apex is frequently found in close proximity with the sinus floor, and the relation between these anatomic structures should be considered in order to prevent an iatrogenic procedure and minimize the risks from an infectious disease within the sinus.", "journal": "Journal of endodontics", "pub_year": "2013", "status": "ok", "score": 0.5, "confidence": "medium", "needs_review": true}, "Parirokh and Torabinejad|2010": {"pmid": "21702853", "title": "The ability of pulp sensibility tests to evaluate the pulp status in primary teeth.", "abstract": "BACKGROUND. Accurate determination of the pulp status is the most important part of conservative pulp therapy. AIM. The aim of this study was to assess the ability of thermal and electrical pulp tests to assess the pulp status in primary teeth. DESIGN. Seventy-eight primary molar teeth in 36 children were investigated. Fifty-six teeth had unknown pulp status in need of endodontic treatment, and 22 were intact teeth with no signs of pulp disease. Cold, hot and electrical pulp testing (EPT) were performed on each tooth. The gold standard was established by direct inspection of the pulp after an access cavity had been made. The sensitivity, specificity, positive and negative predictive values for each test and different sequential combinations of pulp testing were calculated. Sequential combination test analysis was used for data analysis. RESULTS. The highest accuracy was found for EPT, followed by heat and cold tests. No significant difference was found between the accuracy of EPT and the heat test (P-values > 0.05); however, the accuracy of EPT was significantly higher than that of the cold test (P-value< 0.05). CONCLUSION. Based on this study, EPT can be used as a reliable test for diagnosing the pulp status in primary teeth.", "journal": "International journal of paediatric dentistry", "pub_year": "2011", "status": "ok", "score": 0.6, "confidence": "high", "needs_review": false}, "Peng|2007": {"pmid": null, "title": "", "abstract": "", "status": "not_found", "score": 0, "rejected_title": "Comparative Efficacy and Safety of Jintrolong and Other Long-Acting Growth Hormones for Growth Hormone Deficiency in East Asia: A Systematic Review and Network Meta-Analysis.", "confidence": "unknown", "needs_review": true}, "Peters|2004": {"pmid": "15548276", "title": "An analysis of endodontic treatment with three nickel-titanium rotary root canal preparation techniques.", "abstract": "AIM: To investigate clinical results of root canal treatment performed with the aid of nickel-titanium (NiTi) rotary instruments. SUMMARY: A total of 179 patients underwent root canal treatment with either (A) Lightspeed, or (B) ProFile .04 or (C) ProFile .04 and .06 or GT rotary instruments to create tapered preparations. In groups A and B, laterally condensed gutta-percha and AH Plus were used. Canals in group C were obturated with System B, Obtura II and Roth's 801 sealer. Initial and recall radiographs were assessed using the periapical index (PAI). Outcomes were analysed using chi-square tests, event-time analyses and logistic regression models. Two hundred and thirty-three teeth were radiographically assessed after a mean interval of 25.4 +/- 11.8 months. Favourable outcome of treatment, defined as PAI < 3 at recall was 86.7%. Logistic regression analysis and univariate analyses indicated that teeth with preoperative PAI scores >2 and retreated teeth had a significantly lower chance of healing compared with periapically healthy teeth and primary treatments, respectively. Preparation technique, length of fill and the type of sealer did not significantly affect healing rates. KEY LEARNING POINTS: Root canal treatment with NiTi root canal instrumentation systems renders favourable outcomes in more than 86% of the cases. Outcome is significantly affected by preoperative diagnoses but not by the specific choice of instrumentation system.", "journal": "International endodontic journal", "pub_year": "2004", "status": "ok", "score": 0.5, "confidence": "medium", "needs_review": true}, "Pochapski|2009": {"pmid": "19748294", "title": "Effect of pretreatment dexamethasone on postendodontic pain.", "abstract": "OBJECTIVE: This study evaluates the use of a preoperative single oral dose of dexamethasone for the prevention and control of postendodontic pain. STUDY DESIGN: Forty-seven patients were randomly assigned to 2 groups: placebo and dexamethasone (4 mg). The medications were administered 1 hour before the start of endodontic treatment. Postoperative pain was assessed after 4, 12, 24, and 48 hours. RESULTS: Dexamethasone resulted in a statistically significant reduction in postendodontic pain at 4 and 12 hours (P < .05). However, no statistical difference (P > .05) was observed at 24 and 48 hours (Mann-Whitney test). The placebo group exhibited higher rescue medication intake (P < .05; Student t test). No side effects were reported for any of the medications used. CONCLUSION: Preoperative single oral dose of dexamethasone substantially reduced postendodontic pain. Further studies are needed to evaluate the applicability of these findings to other clinical conditions and drug regimens.", "journal": "Oral surgery, oral medicine, oral pathology, oral radiology, and endodontics", "pub_year": "2009", "status": "ok", "score": 0.875, "query": "Pochapski[Author] AND 2009[PDAT] AND (endodont*[TiAb] OR root canal[TiAb] OR pulp[TiAb] OR periapical[TiAb] OR dental[TiAb] OR dentin[TiAb])", "confidence": "high", "needs_review": false}, "Pulikkotil|2018": {"pmid": "29480930", "title": "Effect of oral premedication on the anaesthetic efficacy of inferior alveolar nerve block in patients with irreversible pulpitis - A systematic review and network meta-analysis of randomized controlled trials.", "abstract": "This systematic review (SR; PROSPERO database: CRD42017075160) and network meta-analysis (NMA) identified the most effective oral premedication for anaesthetic success of inferior alveolar nerve blocks (IANB) in cases of irreversible pulpitis. Medline and Ebscohost databases were searched up until 10/2017. Randomized controlled trials (RCT) studying the effect of oral premedication, alone or in combination, on the success of IANB for cases of irreversible pulpitis, compared to placebo or other oral premedications, were included. Quality of the included studies was appraised by the revised Cochrane risk of bias tool for randomized trials. Pairwise analysis, NMA and quality of evidence assessment using GRADE criteria were performed. Nineteen studies (n = 1654 participants) were included. NMA demonstrated that compared to placebo, dexamethasone was most effective in increasing anaesthetic success (RR, 2.92 [95% CI 1.74,4.91]; SUCRA = 0.96), followed by NSAIDs (RR, 1.92 [95% CI 1.63,2.27], SUCRA = 0.738) and Tramadol (RR, 2.03 [95% CI 1.18,3.49], SUCRA = 0.737). Premedication with acetaminophen added to NSAIDs demonstrated similar efficacy as NSAIDs alone (RR, 1.06 [95% CI 0.79,1.43]). Sensitivity analyses proved the superiority of dexamethasone or NSAIDs over any other premedications. Subgroup analyses of specific dosages in comparison with placebo demonstrated that dexamethasone 0.5 mg was most effective, followed by ketorolac 10 mg, piroxicam 20 mg, ibuprofen 400 mg + acetaminophen 500 mg and Tramadol 50 mg. Ibuprofen 400 mg, 600 mg and 800 mg had a significantly improved IANB success, while Ibuprofen 300 mg had no effect. Oral premedication with dexamethasone, NSAIDs or Tramadol significantly increased anaesthetic success. More trials are needed to evaluate the premedication effects of dexamethasone or Tramadol for improved anaesthetic success of IANB when treating irreversible pulpitis.", "journal": "International endodontic journal", "pub_year": "2018", "status": "ok", "score": 0.7, "query": "Pulikkotil[Author] AND 2018[PDAT] AND (endodont*[TiAb] OR root canal[TiAb] OR pulp[TiAb] OR periapical[TiAb] OR dental[TiAb] OR dentin[TiAb])", "confidence": "high", "needs_review": false}, "Read|": {"pmid": "25069908", "title": "Effect of Ibuprofen on masking endodontic diagnosis.", "abstract": "INTRODUCTION: An accurate diagnosis is of upmost importance before initiating endodontic treatment; yet, there are occasions when the practitioner cannot reproduce the patient's chief complaint because the patient has become asymptomatic. Ibuprofen taken beforehand may \"mask\" or eliminate the patient's symptoms. In fact, 64%-83% of patients with dental pain take analgesics before seeing a dentist. The purpose of this study was to examine the possible \"masking\" effect of ibuprofen on endodontic diagnostic tests. METHODS: Forty-two patients with endodontic pain underwent testing (cold, percussion, palpation, and bite force measurement) and then received either placebo or 800 mg ibuprofen. Both patients and operators were blinded to the medication received. One hour later, diagnostic testing was repeated and compared with pretreatment testing. RESULTS: Ibuprofen affected testing values for vital teeth by masking palpation 40%, percussion 25%, and cold 25% on affected teeth with symptomatic irreversible pulpitis and symptomatic apical periodontitis. There was no observed masking effect in the placebo group on palpation, percussion, or cold values. When nonvital teeth were included, the masking effect of ibuprofen was decreased. However, little masking occurred with the bite force measurement differences. CONCLUSIONS: Analgesics taken before the dental appointment can affect endodontic diagnostic testing results. Bite force measurements can assist in identifying the offending tooth in cases in which analgesics \"mask\" the endodontic diagnosis.", "journal": "Journal of endodontics", "pub_year": "2014", "status": "ok", "score": 0.875, "confidence": "high", "needs_review": false}, "Ruddle|2004": {"pmid": "16196235", "title": "Thermal injury through intraradicular heat transfer using ultrasonic devices: precautions and practical preventive strategies.", "abstract": "BACKGROUND: The use of ultrasonic energy is a highly efficient method of removing obstructions and cements within the root canal space when re-treatment or rehabilitation of that ultrasonic energy dislodges and removes cemented objects from the bonded interface of the canal wall. When using this method, there is less potential for structural loss or root damage and significantly less operator stress than when using other methods. CASE DESCRIPTIONS: There is little evidence in published research of the considerable heat transfer that occurs during use of ultrasonic devices to remove posts, pastes and separated instruments in teeth. The authors present three cases of patients who experienced serious burn injuries during application of ultrasonic energy for restorative dentistry. The authors also offer techniques and strategies for safe and effective use of ultrasonic devices. CLINICAL IMPLICATIONS: On the basis of the best available evidence, the authors recommend strategies to provide safe and effective therapy while using ultrasonic devices in intraradicular obstruction removal. The intent of the suggested protocols is to provide advanced and sophisticated therapies in a safe and regulated manner with patient safety as an overriding priority.", "journal": "Journal of the American Dental Association (1939)", "pub_year": "2005", "status": "ok", "score": 0.222, "confidence": "low", "needs_review": true}, "Salehrabi and Rotstein|": {"pmid": "20416420", "title": "Epidemiologic evaluation of the outcomes of orthograde endodontic retreatment.", "abstract": "INTRODUCTION: Teeth undergoing initial endodontic therapy have a very high survival rate. Some teeth that continue to show signs of pathosis after the initial therapy will require nonsurgical (orthograde) retreatment. Outcome assessment of endodontic retreatment is crucial for appropriate case selection and treatment planning. However, reports on outcomes of orthograde endodontic retreatment performed by endodontists are limited in number, and the reported data vary. In this study, outcomes of orthograde endodontic retreatment performed on 4744 teeth were assessed during a period of 5 years. METHODS: Data were obtained from retreatments that were performed by endodontists participating in the Delta Dental Insurance plan that insures approximately 15 million individuals in the USA. RESULTS: Overall, 89% of teeth were retained in the oral cavity 5 years after the endodontic retreatment. Four percent of all teeth underwent apical surgery that occurred mostly within 2 years from completion of orthograde retreatment. Eleven percent of teeth were extracted at the end of the 5-year observation period. CONCLUSIONS: It appears that orthograde endodontic retreatment yields high incidence of tooth retention after 5 years.", "journal": "Journal of endodontics", "pub_year": "2010", "status": "ok", "score": 0.333, "query": "Salehrabi[Author] AND (endodont*[TiAb] OR root canal[TiAb] OR pulp[TiAb] OR periapical[TiAb] OR dental[TiAb] OR dentin[TiAb])", "confidence": "low", "needs_review": true}, "Saunders and Saunders|1994": {"pmid": "7814130", "title": "Assessment of coronal leakage in teeth root filled with gutta-percha and a glass of ionomer root canal sealer.", "abstract": "The effect on coronal leakage of the use of either a single gutta-percha cone or cold lateral condensation of gutta-percha, with a glass ionomer sealer cement was studied. In addition, the effect of the removal of the smear layer was also determined. Eighty-eight single-rooted teeth were prepared chemomechanically using hand files, with the balanced force technique. Lubrication was provided by either Hibiscrub (maintaining the smear layer) or an EDTA-containing paste (to remove the smear layer). Copious irrigation was carried out with 2.2% sodium hypochlorite. The teeth were allocated randomly to four groups of 20 teeth each, the remaining eight teeth served as controls. Two groups of teeth, one with and one without smear layer, were obturated with either a single gutta-percha cone or cold laterally condensed gutta-percha, with Ketac Endo as the sealer. The teeth were stored for 6 weeks, thermocycled, and the extent of coronal leakage determined for each group after immersion in India ink for 90 h. The teeth were demineralized, dehydrated and immersed in methyl salicylate, which rendered them transparent. Linear measurement of maximum dye penetration was recorded. The mean depth (+SD) of leakage for the groups in which the smear layer was left intact was 1.68 mm (+0.38) for the single cone (A1) and 2.29 mm (+1.58) for lateral condensation (B1). When the smear layer was removed the mean depth of leakage for the single cone group (A2) was 2.04 mm (+0.73) and 2.37 mm (+1.70) for the laterally condensed group (B2). There was no significant difference in coronal leakage between the groups (P > 0.05).", "journal": "International endodontic journal", "pub_year": "1994", "status": "ok", "score": 0.5, "confidence": "medium", "needs_review": true}, "Sedley|2005": {"pmid": null, "title": "", "abstract": "", "status": "not_found", "score": 0, "confidence": "unknown", "needs_review": true}, "Seltzer|1965": {"pmid": "9515403", "title": "Hypersensitivity and pain induced by operative procedures and the \"cracked tooth\" syndrome.", "abstract": "Various dental conditions are responsible for tooth hypersensitivity and pain. They include hypersensitive dentin; the \"cracked tooth\" syndrome; pulp and periapical irritation, inflammation and/or degeneration; barodontalgia (aerodontalgia); and periodontal pathoses, particularly the pulpal-periodontal syndrome. Each operative condition is reviewed with respect to its etiology, symptomatology, and diagnosis. Some treatment recommendations are made to prevent or reduce symptoms.", "journal": "General dentistry", "pub_year": "1997", "status": "ok", "score": 0.25, "confidence": "low", "needs_review": true}, "Shanbhag|": {"pmid": null, "title": "", "abstract": "", "status": "not_found", "score": 0, "confidence": "unknown", "needs_review": true}, "Silva|2020": {"pmid": "33219876", "title": "Does the type of endodontic access influence in the cyclic fatigue resistance of reciprocating instruments?", "abstract": "INTRODUCTION: The aim of the present study was to compare the cyclic fatigue resistance of Reciproc R25 (R25) and Reciproc Blue R25 (R25B) instruments, after simulated clinical use in traditional (TradAC) and ultraconservative (UltraAC) endodontic access cavities. METHODS: Forty mandibular molars were randomly assigned into the following groups, according to the type of access and instrument to be used: TradAC and R25, TradAC and R25B, UltraAC and R25, and UltraAC and R25B. Teeth were accessed accordingly, and the root canals were prepared using \"RECIPROC ALL\" kinematics. The cyclic fatigue resistance of the forty used instruments was obtained measuring the time to fracture in an artificial stainless-steel canal. Ten brand new R25 and R25B were used as control groups. The fracture surfaces and the side cutting edges of the instruments were examined with a scanning electron microscope. Data were statistically analyzed using one-way ANOVA and post hoc Tukey tests with a significance level of P < 0.05. RESULTS: R25B instruments showed significantly higher cyclic fatigue resistance than R25, regardless of the access cavity type (P < 0.05). No differences were observed in the cyclic fatigue resistance between instruments without simulated clinical use and used in TradAC (P > 0.05). R25 and R25B used in UltraAC showed significantly lower cyclic fatigue resistance compared with the instruments used in TradAC and without simulated clinical use (P < 0.05). CONCLUSIONS: R25B files showed improved cyclic fatigue resistance than R25. The use of R25B and R25 files in mandibular molars with UltraACs decreased their cyclic fatigue resistance, compared with TradAC. CLINICAL RELEVANCE: The use of Reciproc and Reciproc Blue files in mandibular molars with ultra-conservative endodontic access cavities reduced their cyclic fatigue resistance. Clinicians should be aware about the reduced cyclic fatigue resistance of these files when used in mandibular molars with UltraAC, due to the synergistic effect of access angulation and severe curvature induced in the endodontic files.", "journal": "Clinical oral investigations", "pub_year": "2021", "status": "ok", "score": 0.412, "confidence": "medium", "needs_review": true}, "Spili|2005": {"pmid": "16306815", "title": "The impact of instrument fracture on outcome of endodontic treatment.", "abstract": "Adoption of rotary nickel-titanium instruments has renewed concerns regarding instrument fracture and its consequences. The frequency of instrument fracture and its impact on treatment outcome were determined from an analysis of specialist endodontic practice records involving 8460 cases. A case-control study of treatment outcomes was conducted on a subset of 146 teeth with a retained instrument fragment (plus 146 matched controls), for which clinical and radiographic follow-up of at least 1 year was available. Masked radiographs were assessed by two calibrated examiners. Overall prevalence of retained fractured instruments was 3.3% of treated teeth. In the case-control study, overall healing rates were 91.8% for cases with a fractured instrument and 94.5% for matched controls (p > 0.05, Fisher's exact test). Healing in both groups was lower in teeth with a preoperative periapical radiolucency (86.7% versus 92.9%, p > 0.05). In the hands of skilled endodontists prognosis was not significantly affected by the presence of a retained fractured instrument.", "journal": "Journal of endodontics", "pub_year": "2005", "status": "ok", "score": 0.667, "query": "Spili[Author] AND 2005[PDAT] AND (endodont*[TiAb] OR root canal[TiAb] OR pulp[TiAb] OR periapical[TiAb] OR dental[TiAb] OR dentin[TiAb])", "confidence": "high", "needs_review": false}, "Sundqvist|1998": {"pmid": "9474621", "title": "Microbiologic analysis of teeth with failed endodontic treatment and the outcome of conservative re-treatment.", "abstract": "OBJECTIVE: The purposes of this study were to determine what microbial flora were present in teeth after failed root canal therapy and to establish the outcome of conservative re-treatment. STUDY DESIGN: Fifty-four root-filled teeth with persisting periapical lesions were selected for re-treatment. After removal of the root filling, canals were sampled by means of advanced microbiologic techniques. The teeth were then re-treated and followed for up to 5 years. RESULTS: The microbial flora was mainly single species of predominantly gram-positive organisms. The isolates most commonly recovered were bacteria of the species Enterococcus faecalis. The overall success rate of re-treatment was 74%. CONCLUSIONS: The microbial flora in canals after failed endodontic therapy differed markedly from the flora in untreated teeth. Infection at the time of root filling and size of the periapical lesion were factors that had a negative influence on the prognosis. Three of four endodontic failures were successfully managed by re-treatment.", "journal": "Oral surgery, oral medicine, oral pathology, oral radiology, and endodontics", "pub_year": "1998", "status": "ok", "score": 0.5, "confidence": "medium", "needs_review": true}, "Suresh|2020": {"pmid": "32976660", "title": "Effect of preoperative oral administration of steroids in comparison to an anti-inflammatory drug on postoperative pain following single-visit root canal treatment - a double-blind, randomized clinical trial.", "abstract": "AIM: This randomized, double-blinded, clinical trial evaluated the effect of oral premedication of piroxicam, prednisolone, dexamethasone or placebo on postoperative pain after single-visit root canal treatment in teeth with symptomatic irreversible pulpitis and symptomatic apical periodontitis. METHODOLOGY: The trial is reported according to the Preferred Reporting Items for RAndomized Trials in Endodontics (PRIRATE) 2020 guidelines. The protocol was registered at the clinical trial registry (India) (CTRI/2019/06/019818). In total, 160 patients, assigned to four groups, received orally either 20 mg piroxicam, 20 mg prednisolone, 4 mg dexamethasone or a placebo 60 min before root canal treatment. Patients recorded their postoperative pain intensity at 6, 12, 24, 48 and 72 h using a 10-cm visual analogue scale. Intergroup comparison was performed using Kruskal-Wallis tests with post hoc analysis using Dunns test. Incidence of pain was analysed using chi-square tests. A P value < 0.05 was considered to be statistically significant. Binary logistic regression was used to determine the odds of postoperative pain, with incidence of pain as the dependent variable and intervention groups, gender, age and type of tooth as independent variables. RESULTS: In total, 156 patients were analysed in the trial, since four patients dropped out during follow-up. All drugs were associated with a significantly lower incidence of postoperative pain compared to the placebo at 6 h (P = 0.009), 12 h (P = 0.003) and 24 h (P = 0.008). Mean intensity of pain was significantly more intense at 6, 12 and 24 h with the use of placebo in comparison to the other three intervention groups (P < 0.05). Intensity of pain was not significantly different between the premedications used (P > 0.05). One patient in the piroxicam group reported gastritis, whereas no adverse effects were recorded in other groups. CONCLUSION: Preoperative oral administration of a single dose of 4 mg dexamethasone, 20 mg piroxicam or 20 mg prednisolone reduced the incidence and severity of postoperative pain following single-visit root canal treatment compared to a placebo in patients with symptomatic irreversible pulpitis and symptomatic apical periodontitis up to 24 h. The odds of postoperative pain at 24 h for patients premedicated with 4 mg dexamethasone or 20 mg piroxicam or 20 mg prednisolone were 5.3 times, 3.4 times and 2.5 times less compared to the placebo, respectively.", "journal": "International endodontic journal", "pub_year": "2021", "status": "ok", "score": 0.933, "confidence": "high", "needs_review": false}, "Sweatman and Baumgartner|2001": {"pmid": "11501588", "title": "Radicular temperatures associated with thermoplasticized gutta-percha.", "abstract": "Thermoplasticized gutta-percha has been used to obturate root canals. The continuous wave of condensation technique uses the System B Heat Source with the choice of different-sized pluggers. The purpose of this study was to measure the temperatures within the root canal and on the root surface at different radicular levels while using the System B Heat Source. Fine, Fine-Medium, and Medium pluggers were evaluated at temperature settings of 200 degrees C, 250 degrees C, and 300 degrees C. The Obtura II gutta-percha delivery system following the manufacturer's instructions and ultrasonically thermoplasticized gutta-percha were used for comparative purposes. The highest mean temperature change on the internal root surface was 74.19 degrees C with the system B at the 6 mm level (6 mm coronal to working length) when the Fine-Medium plugger was set at 300 degrees C. The lowest mean temperature change on the internal root surface was 2.09 degrees C at the 0 mm level (at working length) when the F plugger was set at 200 degrees C. With the Obtura II, the lowest mean internal temperature change was 5.22 degrees C at the 0 mm level // --- utilities --------------------------------------------------------------
const CITE_MARKER = /\{\{cite:\s*([^}]+?)\}\}/g;

// Matches: 84%  77.8%  84–97%  70-90%
const PCT_RE = /(\d+(?:\.\d+)?(?:[–\-]\d+(?:\.\d+)?)?)%/g;

// Extended letter chars valid in author names (covers ö, ü, ø, å, é, ñ, etc.)
const CH = `A-Za-z\\u00C0-\\u024F\\-'`;
// Optional lowercase name particle: de, van, von, du, le, la, el, den, der
const P  = `(?:(?:de|van|von|du|le|la|el|den|der)\\s+)?`;
// Core name fragment (uppercase + lowercase 2nd char required to avoid acronyms)
const NM = `${P}[A-Z][a-z][${CH}]*`;

// Pass A — author + year
// "Torabinejad et al (2009)", "Sjögren (1991)", "de Chevigny (2008)", "Low (2011)"
const PROSE_AUTHOR_YEAR_RE = new RegExp(
  `\\b(${NM}(?:(?:\\s+et\\s+al\\.?|\\s+(?:and|&)\\s+${NM}))?)`+
  `\\s*(?:\\((\\d{4})\\)|[,]?\\s*(\\d{4})(?=[;).,\\s]|$))`, "g");

// Pass B — "Name et al." without year
// "de Chevigny et al", "(Jensen et al)", "Sjögren et al found..."
const ET_AL_RE = new RegExp(`\\b${NM}\\s+et\\s+al\\.?`, "g");

// Pass C — two-name pairs without year: "Krasner and Rankow", "Calt and Serper"
const AUTHOR_PAIR_RE = new RegExp(`\\b${NM}\\s+(?:and|&)\\s+${NM}`, "g");

// Pass D — "Name - finding" table cells (lookahead; only name is colored)
// "Low - CBCT…", "de Chevigny - radiolucency…", "Sjögren - Dense fill…"
const AUTHOR_DASH_RE = new RegExp(
  `\\b${NM}(?:\\s+et\\s+al\\.?)?(?=\\s+[—–\\-]\\s)`, "g");

// Pass E — "(Name)" bare parens without year, e.g. "(Webber)"
// Lookbehind + lookahead so only the name inside is colored
const BARE_PAREN_RE = new RegExp(`(?<=\\()${NM}(?:\\s+et\\s+al\\.?)?(?=\\))`, "g");

// Pass F — "According to Name" / "per Name" attribution phrases
const ACCORDING_TO_RE = new RegExp(
  `(?<=\\b[Aa]ccording\\s+to\\s|\\b[Pp]er\\s|\\b[Bb]y\\s)${NM}`, "g");

// Pass G — "Name found/showed/demonstrated/..." reporting verbs
const REPORTING_VERB_RE = new RegExp(
  `\\b${NM}(?=\\s+(?:found|showed|demonstrated|reported|noted|observed|concluded|` +
  `suggested|determined|identified|confirmed|stated|described|revealed|showed))`, "g");

// Applies a sequence of regex passes to remaining text nodes
function applyPasses(text, passes, type = "cite") {
  let nodes = [{ t: "text", v: text }];
  for (const re of passes) {
    const next = [];
    for (const n of nodes) {
      if (n.t !== "text") { next.push(n); continue; }
      for (const n2 of splitByRegex(n.v, re, type)) next.push(n2);
    }
    nodes = next;
  }
  return nodes;
}

const AUTHOR_PASSES = [
  PROSE_AUTHOR_YEAR_RE, ET_AL_RE, AUTHOR_PAIR_RE,
  AUTHOR_DASH_RE, BARE_PAREN_RE, ACCORDING_TO_RE, REPORTING_VERB_RE,
];

// --- environment detection / Cloudflare Access auth ------------------------
// On the deployed site, Cloudflare Access sits in front of /api/* and sets
// an HttpOnly session cookie after login. The client doesn't touch a token —
// it just checks /cdn-cgi/access/get-identity to see who (if anyone) is
// signed in, and triggers /cdn-cgi/access/login when it needs to sign the
// user in. On localhost the old serve.py password flow is used.
const CLOUD_MODE = (() => {
  if (typeof window === "undefined") return false;
  const host = window.location.hostname;
  return host !== "localhost" && host !== "127.0.0.1" && host !== "";
})();

async function checkCloudIdentity() {
  if (!CLOUD_MODE) return "";
  try {
    const r = await fetch("/cdn-cgi/access/get-identity", {
      credentials: "same-origin",
      cache: "no-store",
    });
    if (!r.ok) return "";
    const data = await r.json();
    return data?.email || "";
  } catch { return ""; }
}

function goToCloudLogin() {
  if (!CLOUD_MODE) return;
  const ret = encodeURIComponent(window.location.href);
  window.location.href = `/cdn-cgi/access/login?redirect_uri=${ret}`;
}

function goToCloudLogout() {
  if (!CLOUD_MODE) return;
  window.location.href = "/cdn-cgi/access/logout";
}

async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

// Find a text range inside rootEl matching a stored mark's context + selectedText
function findMarkRange(rootEl, mark) {
  const nodes = []; let text = "";
  const wk = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {
    acceptNode: n => {
      const tag = n.parentElement?.tagName?.toLowerCase();

    }
  });
  let n;
  while ((n = wk.nextNode())) { nodes.push({ node: n, start: text.length }); text += n.textContent; }
  const needle = mark.contextBefore + mark.selectedText;
  const pos = text.indexOf(needle);
  const sp = pos >= 0 ? pos + mark.contextBefore.length : text.indexOf(mark.selectedText);
  if (sp < 0) return null;
  const ep = sp + mark.selectedText.length;
  let sN=null, sO=0, eN=null, eO=0;
  for (const { node, start } of nodes) {
    const end = start + node.textContent.length;
    if (!sN && sp >= start && sp < end) { sN=node; sO=sp-start; }
    if (!eN && ep > start && ep <= end) { eN=node; eO=ep-start; }
    if (sN && eN) break;
  }
  if (!sN || !eN) return null;
  try { const r = document.createRange(); r.setStart(sN,sO); r.setEnd(eN,eO); return r; } catch { return null; }
}

// Re-apply all text marks to the DOM (runs after every React render via useLayoutEffect)
function applyMarks(containerEl, marks) {
  if (!containerEl) return;
  // Unwrap existing mark spans
  for (const s of Array.from(containerEl.querySelectorAll(".user-ann"))) {
    const p = s.parentNode;
    while (s.firstChild) p.insertBefore(s.firstChild, s);
    p.removeChild(s);
    try { p.normalize(); } catch {}
  }
  // Re-apply each mark
  for (const mark of marks) {
    const sec = containerEl.querySelector(`[data-anchor="${mark.sectionId}"]`);
    if (!sec) continue;
    const range = findMarkRange(sec, mark);
    if (!range) continue;
    const sp = document.createElement("span");
    sp.className = "user-ann"; sp.dataset.annId = mark.id; sp.dataset.annType = mark.type;
    sp.style.cssText = mark.type === "highlight"
      ? `background:${mark.color};border-radius:2px;padding:0 1px`
      : `text-decoration:underline;text-decoration-color:${mark.color||"#4338ca"};text-decoration-thickness:2px`;
    try { range.surroundContents(sp); }
    catch { try { const frag = range.extractContents(); sp.appendChild(frag); range.insertNode(sp); } catch {} }
  }
}

// Long-press hook (works on mouse and touch)
function useLongPress(onLong, ms = 500) {
  const timer = useRef(null);
  const cancel = () => clearTimeout(timer.current);
  return {
    onMouseDown:  () => { timer.current = setTimeout(onLong, ms); },
    onMouseUp:    cancel,
    onMouseLeave: cancel,
    onTouchStart: (e) => { e.preventDefault(); timer.current = setTimeout(onLong, ms); },
    onTouchEnd:   cancel,
  };
}

// Colored span: quick click opens abstract (cite only), long-press flags
function FlaggableSpan({ type, text, query, onClickCite }) {
  const { flagged, toggleFlag } = React.useContext(FlagCtx);
  const isFlagged  = flagged.has(text);
  const longFired  = useRef(false);
  const pressTimer = useRef(null);

  function startPress() {
    longFired.current = false;
    pressTimer.current = setTimeout(() => { longFired.current = true; toggleFlag(text); }, 500);
  }
  function endPress() { clearTimeout(pressTimer.current); }

  const cls = isFlagged ? (type === "cite" ? "cite-flagged" : "pct-flagged") : type;
  const title = type === "cite"
    ? (isFlagged ? "Flagged — long-press to unflag" : "Click for abstract · Hold to flag")
    : (isFlagged ? "Flagged — long-press to unflag" : "Long-press to flag as weak");

  return (
    <span
      className={cls}
      title={title}
      onMouseDown={startPress}
      onMouseUp={endPress}
      onMouseLeave={endPress}
      onTouchStart={(e) => { e.preventDefault(); startPress(); }}
      onTouchEnd={endPress}
      onClick={() => { if (!longFired.current && type === "cite" && onClickCite) onClickCite(); }}
    >
      {highlight(text, query)}
    </span>
  );
}

// Parse "Author et al. (2009)" → {author, year} for SRS key generation.
function parseCiteText(s) {
  const m = /^(.*?)(?:\s*\((\d{4})\))?$/.exec(s || "");
  return m ? { author: (m[1] || "").trim(), year: m[2] || "" } : { author: s || "", year: "" };
}

// Inline quiz dropdown
function QuizSpan({ type, correct, pool }) {
  const { onAnswer } = React.useContext(QuizCtx);
  const [status, setStatus] = useState("idle");
  const [chosen, setChosen] = useState("");
  const options = useMemo(() => {
    const others = pool.filter(p => p !== correct).sort(() => Math.random() - 0.5).slice(0, 3);
    return [correct, ...others].sort(() => Math.random() - 0.5);
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Feed the shared SRS deck when a cite quiz is answered. PCT quizzes are
  // excluded because they aren't keyed to a specific card.
  const feedSrs = (ok) => {
    if (!window.SRS || type !== "cite") return;
    const { author, year } = parseCiteText(correct);
    if (!author) return;
    const key = window.SRS.cardKey(author, year, "", "fwd");
    const deck = window.SRS.loadDeck();
    window.SRS.rate(deck, key, ok ? "good" : "again");
  };

  if (status === "correct") return <span className={`${type} quiz-correct`}>{correct}</span>;
  if (status === "wrong") return (
    <span>
      <span className="quiz-wrong-chosen">{chosen}</span>
      {" "}<span className={type}>{correct}</span>
    </span>
  );
  return (
    <select className={`quiz-select${type === "pct" ? " pct-q" : ""}`} value=""
      onChange={e => {
        const v = e.target.value; if (!v) return;
        const ok = v === correct;
        setChosen(v); setStatus(ok ? "correct" : "wrong");
        onAnswer(ok);
        feedSrs(ok);
      }}>
      <option value="">···</option>
      {options.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

// Decides quiz vs flaggable based on context
function CiteNode({ text, query }) {
  const { quizMode, authorPool } = React.useContext(QuizCtx);
  const { openAbstract } = React.useContext(AbstractCtx);
  if (quizMode) return <QuizSpan type="cite" correct={text} pool={authorPool} />;
  return <FlaggableSpan type="cite" text={text} query={query} onClickCite={() => openAbstract(text)} />;
}
function PctNode({ text, query }) {
  const { quizMode, pctPool } = React.useContext(QuizCtx);
  if (quizMode) return <QuizSpan type="pct" correct={text} pool={pctPool} />;
  return <FlaggableSpan type="pct" text={text} query={query} />;
}

// --- Abstract popup modal ---------------------------------------------------
function AbstractModal({ info, onClose }) {
  const { citeText, author, year, abstract, card } = info;

  useEffect(() => {
    const h = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [onClose]);

  function nums(text) {
    if (!text) return null;
    const re = /(\d+(?:[.,]\d+)?(?:[–\-]\d+(?:[.,]\d+)?)?%|\d+(?:[.,]\d+)?-fold|\d+(?:[.,]\d+)?[×x](?=[\s,)])|p\s*[<>=≤≥]\s*0\.\d+|\bRR\s*=?\s*\d+(?:\.\d+)?|\bOR\s*=?\s*\d+(?:\.\d+)?|\d+(?:[.,]\d+)?)/g;
    const parts = [];
    let last = 0, m;
    re.lastIndex = 0;
    while ((m = re.exec(text))) {
      if (m.index > last) parts.push(text.slice(last, m.index));
      parts.push(<mark key={parts.length} className="abstract-num">{m[0]}</mark>);
      last = m.index + m[0].length;
    }
    if (last < text.length) parts.push(text.slice(last));
    return parts.length ? parts : text;
  }

  function renderBody(text) {
    if (!text) return null;
    const labelRe = /\b(BACKGROUND|OBJECTIVE[S]?|AIM[S]?|PURPOSE|INTRODUCTION|METHODS?|MATERIALS\s+AND\s+METHODS?|RESULTS?|DISCUSSION|CONCLUSION[S]?|CLINICAL\s+(?:RELEVANCE|SIGNIFICANCE|IMPLICATIONS?))\s*:/gi;
    const matches = [];
    let lm;
    labelRe.lastIndex = 0;
    while ((lm = labelRe.exec(text))) {
      matches.push({ label: lm[1].replace(/\s+/g, " ").toUpperCase(), start: lm.index, bodyStart: lm.index + lm[0].length });
    }
    if (matches.length >= 2) {
      const sections = matches.map((m, i) => ({
        label: m.label,
        body: text.slice(m.bodyStart, matches[i + 1]?.start ?? text.length).trim(),
      }));
      return (
        <div>
          {sections.map((s, i) => {
            const isConclusion = s.label.startsWith("CONCL");
            const isMethods    = /^(METHODS?|MATERIALS)/.test(s.label);
            return (
              <div key={i} className={`mt-2.5 ${isConclusion ? "abstract-conclusion" : ""}`}>
                <span className={`text-[10px] font-bold uppercase tracking-wider mr-1 ${isConclusion ? "text-green-700" : "text-slate-400"}`}>{s.label}:</span>
                <span className={`text-[13px] leading-relaxed ${isConclusion ? "text-green-900" : isMethods ? "text-slate-500" : "text-slate-700"}`}>{nums(s.body)}</span>
              </div>
            );
          })}
        </div>
      );
    }
    const concRe = /\bCONCLUSION[S]?\b/i;
    const concMatch = concRe.exec(text);
    if (concMatch && concMatch.index > text.length * 0.55) {
      const before = text.slice(0, concMatch.index).trim();
      const after  = text.slice(concMatch.index).replace(/^CONCLUSION[S]?[:\s.]*/i, "").trim();
      return (
        <React.Fragment>
          <p className="text-[13px] leading-relaxed text-slate-700 mb-2">{nums(before)}</p>
          <div className="abstract-conclusion">
            <div className="text-[10px] font-bold uppercase tracking-wider text-green-700 mb-1">Conclusion</div>
            <p className="text-[13px] leading-relaxed text-green-900">{nums(after)}</p>
          </div>
        </React.Fragment>
      );
    }
    return <p className="text-[13px] leading-relaxed text-slate-700">{nums(text)}</p>;
  }

  const pmid       = abstract?.pmid;
  const hasContent = abstract?.status === "ok" && abstract?.abstract;
  const notFound   = abstract?.status === "not_found";
  const confidence = abstract?.confidence || null;
  const needsReview = !!abstract?.needs_review;

  const [reportStatus, setReportStatus] = useState("idle"); // idle|sending|sent|error
  const reportBadAbstract = async () => {
    if (reportStatus === "sending" || reportStatus === "sent") return;
    setReportStatus("sending");
    try {
      const res = await fetch("/api/report-bad-abstract", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          author: author || "",
          year: year || "",
          pmid: pmid || null,
          title: abstract?.title || "",
          finding: card?.finding || "",
          section_id: card?.section_id || "",
        }),
      });
      setReportStatus(res.ok ? "sent" : "error");
    } catch (e) {
      setReportStatus("error");
    }
  };

  return (
    <div className="abstract-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="abstract-panel">
        <div className="abstract-header">
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <h2 className="font-semibold text-slate-800 text-[15px] leading-snug">
                {abstract?.title || citeText}
              </h2>
              <div className="flex flex-wrap items-center gap-x-3 gap-y-0.5 mt-1.5">
                {abstract?.journal && <span className="text-xs text-slate-500 italic truncate max-w-xs">{abstract.journal}</span>}
                {(abstract?.pub_year || year) && <span className="text-xs text-slate-400 shrink-0">{abstract?.pub_year || year}</span>}
                {pmid
                  ? <a href={`https://pubmed.ncbi.nlm.nih.gov/${pmid}/`} target="_blank" rel="noopener noreferrer"
                       className="text-xs font-semibold text-indigo-600 hover:text-indigo-800 hover:underline shrink-0">PubMed ↗</a>
                  : <span className="text-xs text-slate-300 shrink-0">No PubMed record</span>}
              </div>
            </div>
            <button onClick={onClose} aria-label="Close"
              className="shrink-0 text-slate-400 hover:text-slate-700 text-2xl leading-none -mt-0.5">×</button>
          </div>
        </div>
        <div className="abstract-body">
          {/* Confidence banner — only shown when the match score is medium/low */}
          {confidence && confidence !== "high" && !notFound && (
            <div className={`abstract-confidence abstract-confidence--${confidence}`}>
              <span>
                {confidence === "low"
                  ? "⚠ Low-confidence match — this abstract may be the wrong paper."
                  : "⚠ Medium confidence — verify before citing."}
                {typeof abstract?.score === "number" && (
                  <span style={{ marginLeft: 6, opacity: 0.75 }}>
                    (score {abstract.score.toFixed(2)})
                  </span>
                )}
              </span>
              <button
                type="button"
                className="abstract-report-btn"
                onClick={reportBadAbstract}
                disabled={reportStatus === "sending" || reportStatus === "sent"}
                style={{ marginLeft: "auto" }}
              >
                {reportStatus === "sent"    ? "Reported ✓" :
                 reportStatus === "sending" ? "Reporting…" :
                 reportStatus === "error"   ? "Retry report" :
                                              "Report wrong abstract"}
              </button>
            </div>
          )}
          {card?.finding && (
            <div className="abstract-finding">
              <div className="text-[10px] font-bold uppercase tracking-widest text-amber-700 mb-1.5 flex items-center gap-2">
                <span>Key Finding</span>
                {card.section_title && <span className="font-normal normal-case text-amber-500 text-[11px]">· {card.section_title}</span>}
              </div>
              <p className="text-[13px] text-amber-900 leading-relaxed">{nums(card.finding)}</p>
            </div>
          )}
          {hasContent
            ? renderBody(abstract.abstract)
            : <p className="text-[13px] text-slate-400 italic mt-1">
                {notFound ? "No PubMed abstract found for this citation." : "Abstract not available."}
              </p>}
        </div>
      </div>
    </div>
  );
}

function splitByRegex(text, re, type) {
  // Returns [{t:"text"|type, v:string}]
  const nodes = [];
  let last = 0;
  let m;
  const r = new RegExp(re.source, re.flags.includes("g") ? re.flags : re.flags + "g");
  r.lastIndex = 0;
  while ((m = r.exec(text))) {
    if (m.index > last) nodes.push({ t: "text", v: text.slice(last, m.index) });
    nodes.push({ t: type, v: m[0] });
    last = m.index + m[0].length;
  }
  if (last < text.length) nodes.push({ t: "text", v: text.slice(last) });
  return nodes;
}

function renderTextWithCites(text, query) {
  // Pass 0: fact-check highlights ==corrected text==
  if (text.includes("==")) {
    const fcRe = /==([\s\S]+?)==/g;
    const segs = []; let fcLast = 0, fcM;
    fcRe.lastIndex = 0;
    while ((fcM = fcRe.exec(text))) {
      if (fcM.index > fcLast) segs.push({ fc: false, v: text.slice(fcLast, fcM.index) });
      segs.push({ fc: true, v: fcM[1] });
      fcLast = fcM.index + fcM[0].length;
    }
    if (fcLast < text.length) segs.push({ fc: false, v: text.slice(fcLast) });
    if (segs.some(s => s.fc)) {
      return segs.map((s, i) => s.fc
        ? <span key={i} className="factcheck">{renderTextWithCites(s.v, query)}</span>
        : <React.Fragment key={i}>{renderTextWithCites(s.v, query)}</React.Fragment>
      );
    }
  }

  // Pass 1: split on {{cite:}} markers
  const pass1 = [];
  let lastIndex = 0;
  let m;
  const re = new RegExp(CITE_MARKER.source, "g");
  while ((m = re.exec(text))) {
    if (m.index > lastIndex) pass1.push({ t: "text", v: text.slice(lastIndex, m.index) });
    const payload = m[1];
    const head = payload.split(/\s+[—–-]{1,2}\s+/)[0];
    pass1.push({ t: "cite", v: head });
    lastIndex = m.index + m[0].length;
  }
  if (lastIndex < text.length) pass1.push({ t: "text", v: text.slice(lastIndex) });

  // Passes 2+: pct → author passes (A–G)
  const result = [];
  for (const node of pass1) {
    if (node.t !== "text") { result.push(node); continue; }
    for (const n2 of splitByRegex(node.v, PCT_RE, "pct")) {
      if (n2.t !== "text") { result.push(n2); continue; }
      for (const n3 of applyPasses(n2.v, AUTHOR_PASSES)) result.push(n3);
    }
  }

  return result.map((n, i) => {
    if (n.t === "cite") return <CiteNode key={i} text={n.v} query={query} />;
    if (n.t === "pct")  return <PctNode  key={i} text={n.v} query={query} />;
    return <React.Fragment key={i}>{highlight(n.v, query)}</React.Fragment>;
  });
}


function highlight(text, query) {
  if (!query) return text;
  const q = query.toLowerCase();
  const lower = text.toLowerCase();
  const out = [];
  let i = 0;
  while (i < text.length) {
    const idx = lower.indexOf(q, i);
    if (idx < 0) { out.push(text.slice(i)); break; }
    if (idx > i) out.push(text.slice(i, idx));
    out.push(<mark key={out.length}>{text.slice(idx, idx + q.length)}</mark>);
    i = idx + q.length;
  }
  return out;
}

function countMatches(text, query) {
  if (!query || !text) return 0;
  const q = query.toLowerCase();
  const t = text.toLowerCase();
  let n = 0, i = 0;
  while ((i = t.indexOf(q, i)) >= 0) { n++; i += q.length; }
  return n;
}

function blockText(b) {
  if (!b) return "";
  if (b.type === "p" || b.type?.startsWith("h")) return b.text || "";
  if (b.type === "ul" || b.type === "ol") return (b.items || []).join("\n");
  if (b.type === "table") return [(b.headers || []).join(" | "), ...(b.rows || []).map(r => r.join(" | "))].join("\n");
  return "";
}

function sectionText(sec) {
  const own = (sec.blocks || []).map(blockText).join("\n");
  const sub = (sec.subsections || []).map(s => s.title + "\n" + (s.blocks || []).map(blockText).join("\n")).join("\n");
  return sec.title + "\n" + own + "\n" + sub;
}

// --- block renderers --------------------------------------------------------
function isQuestionBlock(b) {
  return b?.type === "ul" && b.items?.some(item => item.trim().endsWith("?"));
}

function Block({ block, query, isAnswer }) {
  const t = block.type;
  if (t === "p") return <p className={isAnswer ? "answer-p" : ""}>{renderTextWithCites(block.text, query)}</p>;
  if (t === "h3") return <h3 className="block-h3">{renderTextWithCites(block.text, query)}</h3>;
  if (t === "h4") return <h4 className="block-h4">{renderTextWithCites(block.text, query)}</h4>;
  if (t === "ul") return <ul>{block.items.map((x, i) => <li key={i} className={x.trim().endsWith("?") ? "question-item" : ""}>{renderTextWithCites(x, query)}</li>)}</ul>;
  if (t === "ol") return <ol>{block.items.map((x, i) => <li key={i}>{renderTextWithCites(x, query)}</li>)}</ol>;
  if (t === "table") return (
    <div className="scroll-table">
      <table>
        <thead><tr>{block.headers.map((h, i) => <th key={i}>{renderTextWithCites(h, query)}</th>)}</tr></thead>
        <tbody>{block.rows.map((r, i) => <tr key={i}>{r.map((c, j) => <td key={j}>{renderTextWithCites(c, query)}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
  return null;
}

function PasswordModal({ onSuccess, onCancel }) {
  const [status, setStatus] = useState("checking"); // "checking"|"has"|"none"|"offline"
  const [pw, setPw] = useState(""); const [pw2, setPw2] = useState("");
  const [err, setErr] = useState(""); const [busy, setBusy] = useState(false);

  useEffect(() => {
    fetch("/api/auth/status", { cache: "no-store" })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => setStatus(d.has_password ? "has" : "none"))
      .catch(() => setStatus("offline"));
  }, []);

  const hasLocalPw = !!localStorage.getItem(ANNO_PWD_KEY);
  // "New" means we need to create a password: server has none, or we're offline with no local hash.
  const isNew = status === "none" || (status === "offline" && !hasLocalPw);

  const submit = async () => {
    if (busy || !pw.trim()) return;
    setBusy(true); setErr("");
    try {
      if (isNew) {
        if (pw !== pw2) { setErr("Passwords don't match"); return; }
        if (status === "none") {
          const r = await fetch("/api/auth/set", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pw }),
          }).catch(() => null);
          const d = r ? await r.json().catch(() => ({})) : {};
          if (!r || !r.ok || !d.ok) { setErr(`Server: ${d.error || "unreachable"}`); return; }
        }
        localStorage.setItem(ANNO_PWD_KEY, await hashPw(pw));
        sessionStorage.setItem(ANNO_SES_KEY, "1");
        sessionStorage.setItem(ANNO_PW_PLAIN, pw);
        onSuccess();
      } else {
        let ok = false;
        if (status === "has") {
          try {
            const r = await fetch("/api/auth/verify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ password: pw }),
            });
            const d = await r.json().catch(() => ({}));
            ok = !!d.ok;
          } catch { ok = false; }
        } else {
          ok = (await hashPw(pw)) === localStorage.getItem(ANNO_PWD_KEY);
        }
        if (ok) {
          sessionStorage.setItem(ANNO_SES_KEY, "1");
          sessionStorage.setItem(ANNO_PW_PLAIN, pw);
          if (!hasLocalPw) localStorage.setItem(ANNO_PWD_KEY, await hashPw(pw));
          onSuccess();
        } else { setErr("Incorrect password"); setPw(""); }
      }
    } finally { setBusy(false); }
  };

  const headline = status === "checking" ? "Checking…" : (isNew ? "Set edit-mode password" : "Unlock edit mode");
  const sub = status === "offline"
    ? "Server unreachable — edits won't write to source. Highlights & notes still work."
    : (isNew ? "Choose a password. Needed for highlights, notes, and live source edits." : null);

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onClick={onCancel}>
      <div className="bg-white rounded-xl p-6 shadow-2xl w-80" onClick={e => e.stopPropagation()}>
        <h2 className="text-base font-semibold text-slate-900 mb-1">{headline}</h2>
        {sub && <p className="text-sm text-slate-500 mb-1">{sub}</p>}
        <input autoFocus type="password"
          className="w-full px-3 py-2 border border-slate-200 rounded-lg mt-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          placeholder="Password" value={pw}
          onChange={e => { setPw(e.target.value); setErr(""); }}
          onKeyDown={e => e.key === "Enter" && (!isNew || pw2) && submit()} />
        {isNew && (
          <input type="password"
            className="w-full px-3 py-2 border border-slate-200 rounded-lg mt-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
            placeholder="Confirm password" value={pw2}
            onChange={e => { setPw2(e.target.value); setErr(""); }}
            onKeyDown={e => e.key === "Enter" && submit()} />
        )}
        {err && <p className="text-rose-600 text-sm mt-2">{err}</p>}
        <div className="flex gap-2 mt-4">
          <button className="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:bg-indigo-300 text-sm font-medium" onClick={submit} disabled={busy || status === "checking"}>
            {busy ? "…" : (isNew ? "Set password" : "Unlock")}
          </button>
          <button className="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 text-sm" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// Floating toolbar: appears on text selection (to add mark) or click on existing mark (to remove)
function AnnotationToolbar({ mainRef }) {
  const { annotateMode, addMark, removeMark } = React.useContext(AnnotateCtx);
  const [pos, setPos] = useState(null);          // {x, y, annId|null}
  const [pendingRange, setPendingRange] = useState(null);
  const [pendingSec, setPendingSec] = useState(null);
  const tbRef = useRef(null);

  useEffect(() => {
    if (!annotateMode) { setPos(null); return; }
    const onUp = e => {
      if (tbRef.current?.contains(e.target)) return;
      // Click on existing mark → show remove option
      const annSp = e.target.closest?.(".user-ann");
      if (annSp) {
        const rect = annSp.getBoundingClientRect();
        setPos({ x: rect.left + rect.width / 2, y: rect.top, annId: annSp.dataset.annId });
        setPendingRange(null); setPendingSec(null); return;
      }
      // Text selection → show mark options
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || !sel.toString().trim()) { setPos(null); setPendingRange(null); return; }
      const range = sel.getRangeAt(0);
      let el = range.commonAncestorContainer;
      if (el.nodeType === Node.TEXT_NODE) el = el.parentElement;
      const sec = el.closest?.("[data-anchor]");
      if (!sec) { setPos(null); return; }
      const rect = range.getBoundingClientRect();
      setPos({ x: rect.left + rect.width / 2, y: rect.top, annId: null });
      setPendingRange(range.cloneRange()); setPendingSec(sec.getAttribute("data-anchor"));
    };
    document.addEventListener("mouseup", onUp);
    return () => document.removeEventListener("mouseup", onUp);
  }, [annotateMode]);

  const applyMark = (type, color) => {
    const secEl = mainRef.current?.querySelector(`[data-anchor="${pendingSec}"]`);
    if (!secEl || !pendingRange) return;
    const selectedText = pendingRange.toString();
    if (!selectedText.trim()) return;
    let contextBefore = "", contextAfter = "";
    try {
      const br = document.createRange(); br.setStart(secEl, 0); br.setEnd(pendingRange.startContainer, pendingRange.startOffset);
      contextBefore = br.toString().slice(-20);
      const ar = document.createRange(); ar.setStart(pendingRange.endContainer, pendingRange.endOffset); ar.setEnd(secEl, secEl.childNodes.length);
      contextAfter = ar.toString().slice(0, 20);
    } catch {}
    addMark({ id: uid(), sectionId: pendingSec, selectedText, contextBefore, contextAfter, type, color });
    window.getSelection()?.removeAllRanges();
    setPos(null); setPendingRange(null);
  };

  if (!pos || !annotateMode) return null;

  const HL = [["#fde68a","Yellow"],["#bfdbfe","Blue"],["#bbf7d0","Green"],["#fecaca","Pink"]];
  return (
    <div ref={tbRef}
      style={{ position:"fixed", left:pos.x, top:pos.y - 4, transform:"translate(-50%,-100%)", zIndex:9999 }}
      className="flex items-center gap-1 bg-slate-800 rounded-lg px-2 py-1.5 shadow-xl select-none"
      onMouseDown={e => e.preventDefault()}>
      {pos.annId ? (
        <>
          <span className="text-slate-300 text-xs px-1">Remove mark?</span>
          <button className="text-xs px-2 py-0.5 bg-rose-500 text-white rounded hover:bg-rose-600"
            onClick={() => { removeMark(pos.annId); setPos(null); }}>Remove</button>
          <button className="text-slate-400 hover:text-white text-xs px-1 ml-1" onClick={() => setPos(null)}>✕</button>
        </>
      ) : (
        <>
          {HL.map(([bg, label]) => (
            <button key={bg} title={`Highlight ${label}`} style={{ background: bg }}
              className="w-5 h-5 rounded-sm border border-white/20 hover:scale-110 transition-transform"
              onClick={() => applyMark("highlight", bg)} />
          ))}
          <div className="w-px h-4 bg-white/20 mx-0.5" />
          <button title="Underline" className="text-white text-xs px-1.5 py-0.5 rounded hover:bg-white/20"
            onClick={() => applyMark("underline", "#818cf8")}>
            <span style={{ textDecoration:"underline", textDecorationColor:"#a5b4fc" }}>U</span>
          </button>
          <div className="w-px h-4 bg-white/20 mx-0.5" />
          <button className="text-slate-400 hover:text-white text-xs px-1"
            onClick={() => { setPos(null); window.getSelection()?.removeAllRanges(); }}>✕</button>
        </>
      )}
    </div>
  );
}

// Inline note display (saved state)
function NoteBlock({ note, annotateMode, onUpdate, onDelete }) {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(note.text);
  if (editing) {
    return (
      <div className="note-ed">
        <textarea value={text} autoFocus rows={Math.max(2, text.split("\n").length + 1)}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => {
            if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { onUpdate(note.id, text); setEditing(false); }
            else if (e.key === "Escape") { setText(note.text); setEditing(false); }
          }} />
        <div className="note-ed-acts">
          <button className="ns" onClick={() => { onUpdate(note.id, text); setEditing(false); }}>Save</button>
          <span className="nh">⌘Enter · Esc to cancel</span>
          <button className="nc" onClick={() => { setText(note.text); setEditing(false); }}>Cancel</button>
        </div>
      </div>
    );
  }
  return (
    <div className="inline-note" style={annotateMode ? { paddingRight:"5.5rem" } : {}}>
      {note.text}
      {annotateMode && (
        <div className="inline-note-acts">
          <button onClick={() => setEditing(true)}>Edit</button>
          <button onClick={() => onDelete(note.id)}>×</button>
        </div>
      )}
    </div>
  );
}

// "+ note" button that expands to an inline text editor
function AddNoteInline({ sectionId, subsectionId, afterBlockIndex }) {
  const { addNote } = React.useContext(AnnotateCtx);
  const [active, setActive] = useState(false);
  const [text, setText] = useState("");
  const save = () => {
    if (text.trim()) addNote({ id: uid(), sectionId, subsectionId: subsectionId || null, afterBlockIndex, text: text.trim() });
    setActive(false); setText("");
  };
  if (!active) return (
    <button className="add-note-btn" onClick={() => setActive(true)} title="Add a note here">+ note</button>
  );
  return (
    <div className="note-ed">
      <textarea autoFocus value={text} rows={3} placeholder="Add your note…"
        onChange={e => setText(e.target.value)}
        onKeyDown={e => {
          if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) save();
          else if (e.key === "Escape") { setActive(false); setText(""); }
        }} />
      <div className="note-ed-acts">
        <button className="ns" onClick={save}>Save</button>
        <span className="nh">⌘Enter to save · Esc to cancel</span>
        <button className="nc" onClick={() => { setActive(false); setText(""); }}>Cancel</button>
      </div>
    </div>
  );
}

// Inline source-editor for a paragraph / h3 / h4. Double-click the block to open;
// Save posts to /api/save-block, which rewrites endo-guide.md and reruns build.py.
function EditableBlockWrap({ block, sectionId, subsectionId, blockIndex, query, isAnswer }) {
  const { annotateMode, saveBlock } = React.useContext(AnnotateCtx);
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(block.text || "");
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState("");

  const canEdit = annotateMode && !!block.raw && (block.type === "p" || block.type === "h3" || block.type === "h4");

  useEffect(() => { if (!editing) setText(block.text || ""); }, [block.text, editing]);

  const startEdit = (e) => {
    // Don't steal dbl-clicks on existing annotation marks — those have their own remove flow
    if (e.target.closest?.(".user-ann")) return;
    // Browsers auto-select a word on dblclick; clear it so the selection toolbar doesn't linger
    window.getSelection?.().removeAllRanges();
    setText(block.text || "");
    setErr("");
    setEditing(true);
  };

  const commit = async () => {
    const trimmed = text.replace(/\s+/g, " ").trim();
    if (!trimmed) { setErr("cannot be empty"); return; }
    if (trimmed === (block.text || "").trim()) { setEditing(false); return; }
    setSaving(true); setErr("");
    const res = await saveBlock({
      sectionId, subsectionId: subsectionId || null, blockIndex,
      type: block.type, oldRaw: block.raw, newText: trimmed,
    });
    setSaving(false);
    if (res.ok) setEditing(false);
    else setErr(res.error || "save failed");
  };

  const cancel = () => { setEditing(false); setErr(""); setText(block.text || ""); };

  if (editing) {
    return (
      <div className="block-ed">
        <textarea
          value={text}
          autoFocus
          rows={Math.max(3, Math.min(14, Math.ceil((text.length || 1) / 70) + 1))}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => {
            if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); commit(); }
            else if (e.key === "Escape") { e.preventDefault(); cancel(); }
          }}
          disabled={saving}
        />
        <div className="block-ed-acts">
          <button className="bs" onClick={commit} disabled={saving}>{saving ? "Saving…" : "Save"}</button>
          <button className="bc" onClick={cancel} disabled={saving}>Cancel</button>
          <span className="bh">⌘Enter · Esc · writes to endo-guide.md</span>
          {err && <span className="be">{err}</span>}
        </div>
      </div>
    );
  }

  const rendered = <Block block={block} query={query} isAnswer={isAnswer} />;
  if (!canEdit) return rendered;
  return (
    <div className="editable-block" onDoubleClick={startEdit} title="Double-click to edit — saves to endo-guide.md">
      {rendered}
    </div>
  );
}

// Renders blocks interleaved with saved notes + add-note buttons (in edit mode)
function BlocksWithNotes({ blocks, sectionId, subsectionId, query }) {
  const { annotateMode, notes, updateNote, removeNote } = React.useContext(AnnotateCtx);
  return blocks.map((b, i) => {
    const isAns = b.type === "p" && isQuestionBlock(blocks[i - 1]);
    const blockNotes = notes.filter(n =>
      n.sectionId === sectionId &&
      (n.subsectionId || null) === (subsectionId || null) &&
      n.afterBlockIndex === i
    );
    return (
      <React.Fragment key={i}>
        <EditableBlockWrap block={b} sectionId={sectionId} subsectionId={subsectionId || null}
          blockIndex={i} query={query} isAnswer={isAns} />
        {blockNotes.map(note => (
          <NoteBlock key={note.id} note={note} annotateMode={annotateMode}
            onUpdate={updateNote} onDelete={removeNote} />
        ))}
        {annotateMode && <AddNoteInline sectionId={sectionId} subsectionId={subsectionId} afterBlockIndex={i} />}
      </React.Fragment>
    );
  });
}

function ReferencePane({ sections, query, authorPool, pctPool }) {
  const [activeId, setActiveId] = useState(sections[0]?.id);
  const [quizMode, setQuizMode] = useState(false);
  const [score, setScore] = useState({ c: 0, t: 0 });
  const [sidebarOpen, setSidebarOpen] = useState(() => typeof window !== "undefined" && window.innerWidth >= 768);
  const mainRef = useRef(null);
  const onAnswer = useCallback((ok) => setScore(s => ({ c: s.c + (ok ? 1 : 0), t: s.t + 1 })), []);
  const toggleQuiz = () => { setQuizMode(m => !m); setScore({ c: 0, t: 0 }); };

  const { annotateMode, marks } = React.useContext(AnnotateCtx);
  // Re-apply text marks after every render (before browser paint)
  useLayoutEffect(() => { applyMarks(mainRef.current, marks); });

  // IntersectionObserver for active section
  useEffect(() => {
    const root = mainRef.current;
    if (!root) return;
    const els = root.querySelectorAll("[data-anchor]");
    const obs = new IntersectionObserver((entries) => {
      const vis = entries.filter(e => e.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (vis.length) setActiveId(vis[0].target.getAttribute("data-anchor"));
    }, { root, rootMargin: "-20% 0px -70% 0px", threshold: 0 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, [sections]);

  // filter sidebar: show only sections with matches when searching
  const matchCounts = useMemo(() => {
    if (!query) return null;
    const map = {};
    for (const sec of sections) {
      const text = sectionText(sec);
      map[sec.id] = countMatches(text, query);
    }
    return map;
  }, [sections, query]);

  const filteredSections = useMemo(() => {
    if (!query) return sections;
    return sections.filter(s => (matchCounts?.[s.id] || 0) > 0);
  }, [sections, query, matchCounts]);

  const jumpTo = (id) => {
    const el = mainRef.current?.querySelector(`[data-anchor="${id}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    // On mobile, auto-close the drawer after navigating so the user sees the
    // content they jumped to (the sidebar normally covers ~75 % of the screen).
    if (typeof window !== "undefined" && window.matchMedia &&
        window.matchMedia("(max-width: 767px)").matches) {
      setSidebarOpen(false);
    }
  };

  // Shared site header (site-nav.js) dispatches this event when the user
  // taps the hamburger button. Toggle our drawer in response.
  useEffect(() => {
    const toggle = () => setSidebarOpen(s => !s);
    document.addEventListener("site-nav:toggle-sidebar", toggle);
    return () => document.removeEventListener("site-nav:toggle-sidebar", toggle);
  }, []);

  return (
    <QuizCtx.Provider value={{ quizMode, authorPool, pctPool, onAnswer }}>
    <div className="flex flex-1 min-h-0 relative">
      {sidebarOpen && (
        <div className="fixed inset-0 bg-black/30 z-40 md:hidden" onClick={() => setSidebarOpen(false)} />
      )}
      <aside className={`sidebar border-r bg-slate-50 overflow-y-auto shrink-0 fixed inset-y-0 left-0 z-50 w-72 transition-transform duration-200 md:relative md:translate-x-0 md:z-auto md:w-64 ${sidebarOpen ? "translate-x-0" : "-translate-x-full"}`}>
        <div className="px-3 pt-3 pb-2 border-b border-slate-100 flex items-center justify-between">
          <button
            onClick={toggleQuiz}
            className={`text-xs font-semibold px-2.5 py-1 rounded-full transition ${quizMode ? "bg-indigo-600 text-white" : "bg-slate-200 text-slate-600 hover:bg-slate-300"}`}>
            {quizMode ? "📝 Quiz on" : "Quiz mode"}
          </button>
          {quizMode && score.t > 0 && (
            <span className="text-xs text-slate-500 tabular-nums">{score.c}/{score.t} ✓</span>
          )}
          <button className="md:hidden ml-auto text-slate-400 hover:text-slate-700 px-2 py-1 text-lg leading-none" onClick={() => setSidebarOpen(false)}>✕</button>
        </div>
        <nav className="p-3">
          {filteredSections.length === 0 && query && (
            <div className="text-slate-500 p-3 text-sm">No matches.</div>
          )}
          {filteredSections.map(sec => (
            <div key={sec.id} className="mb-1">
              <a href={`#${sec.id}`} onClick={e => { e.preventDefault(); jumpTo(sec.id); }}
                 className={`flex items-baseline gap-1.5 rounded-md px-2 py-1.5 text-sm font-medium hover:bg-white hover:shadow-sm transition ${activeId === sec.id ? "active" : "text-slate-700"}`}>
                <span className={`text-xs tabular-nums shrink-0 w-5 text-right ${activeId === sec.id ? "text-indigo-400" : "text-slate-400"}`}>{sec.number}</span>
                <span className="truncate leading-snug">{sec.title}</span>
                {query && matchCounts?.[sec.id] ? <span className="ml-auto shrink-0 text-xs text-amber-600 font-normal">·{matchCounts[sec.id]}</span> : null}

                  {sec.subsections.map(sub => (

                        <span className={`tabular-nums shrink-0 ${activeId === sub.id ? "text-indigo-400" : "text-slate-400"}`}>{sub.number}</span>
                        <span className="truncate leading-snug">{sub.title}</span>

              ) : null}
            </div>

        </nav>
      </aside>
      <main ref={mainRef} className={`flex-1 overflow-y-auto bg-white${annotateMode ? " ann-active" : ""}`}>
        <div key={quizMode ? "quiz" : "read"} className="max-w-2xl mx-auto px-4 py-6 md:px-10 md:py-12 prose-body">
          {sections.map((sec, si) => (
