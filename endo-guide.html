<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Endo Rationale Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* inlined from /assets/theme.css */
/* ============================================================================
 * theme.css — shared design tokens, typography, components, dark mode
 * Used by endo-guide.html, endo-debates.html, cochrane-endo.html
 * Inlined into endo-guide.html by build.py for offline self-contained artifact.
 * ========================================================================= */

/* ---------- Design tokens ---------- */

:root {
  /* Color — light theme (default) */
  --color-bg:             #f8fafc;
  --color-surface:        #ffffff;
  --color-surface-2:      #f1f5f9;
  --color-surface-3:      #eef2ff;
  --color-text:           #1e293b;
  --color-text-muted:     #64748b;
  --color-text-subtle:    #94a3b8;
  --color-border:         #e2e8f0;
  --color-border-strong:  #cbd5e1;

  --color-primary:        #4338ca;
  --color-primary-weak:   #eef2ff;
  --color-primary-strong: #3730a3;
  --color-primary-ring:   #c7d2fe;
  --color-primary-text:   #ffffff;

  --color-accent:         #f59e0b;
  --color-accent-weak:    #fffbeb;
  --color-accent-strong:  #92400e;

  --color-success:        #16a34a;
  --color-success-weak:   #f0fdf4;
  --color-success-strong: #15803d;

  --color-warning:        #d97706;
  --color-warning-weak:   #fef3c7;
  --color-warning-strong: #b45309;

  --color-danger:         #e11d48;
  --color-danger-weak:    #ffe4e6;
  --color-danger-strong:  #be123c;

  --color-info:           #0369a1;
  --color-info-weak:      #e0f2fe;
  --color-info-strong:    #0c4a6e;
  --color-info-ring:      #7dd3fc;

  /* Stance palette (debates page) */
  --stance-pro:           #4f46e5;
  --stance-con:           #e11d48;
  --stance-nuanced:       #d97706;

  /* Evidence level (debates timeline) */
  --ev-cochrane:          #0369a1;
  --ev-sr-meta:           #15803d;
  --ev-rct:               #047857;
  --ev-cohort:            #0369a1;
  --ev-case:              #92400e;
  --ev-expert:            #475569;

  /* Typography */
  --font-sans:  'Inter', ui-sans-serif, system-ui, -apple-system, 'Segoe UI',
                Roboto, 'Helvetica Neue', Arial, sans-serif;
  --font-mono:  ui-monospace, 'SF Mono', Menlo, Consolas, monospace;

  --fs-xs:      0.78rem;    /* 12.5 px — smallest label, was 0.62-0.68 rem */
  --fs-sm:      0.875rem;   /* 14   px */
  --fs-base:    1rem;       /* 16   px — up from 15.5 px */
  --fs-md:      1.0625rem;  /* 17   px */
  --fs-lg:      1.25rem;    /* 20   px */
  --fs-xl:      1.5rem;     /* 24   px */
  --fs-2xl:     1.875rem;   /* 30   px */
  --fs-3xl:     2.25rem;    /* 36   px */

  --lh-tight:   1.25;
  --lh-snug:    1.4;
  --lh-normal:  1.6;
  --lh-loose:   1.8;

  --fw-normal:  400;
  --fw-medium:  500;
  --fw-semibold:600;
  --fw-bold:    700;

  /* Spacing (4 px grid) */
  --space-1:    0.25rem;
  --space-2:    0.5rem;
  --space-3:    0.75rem;
  --space-4:    1rem;
  --space-5:    1.25rem;
  --space-6:    1.5rem;
  --space-8:    2rem;
  --space-10:   2.5rem;
  --space-12:   3rem;

  /* Radius */
  --radius-sm:  0.375rem;
  --radius-md:  0.625rem;
  --radius-lg:  1rem;
  --radius-full:9999px;

  /* Shadow */
  --shadow-sm:  0 1px 2px rgba(15, 23, 42, 0.04), 0 1px 3px rgba(15, 23, 42, 0.06);
  --shadow-md:  0 2px 8px rgba(15, 23, 42, 0.08);
  --shadow-lg:  0 10px 30px rgba(15, 23, 42, 0.12);
  --shadow-xl:  0 24px 60px rgba(15, 23, 42, 0.22);

  /* Layout */
  --site-header-height: 3.25rem;
  --transition-fast:    120ms ease;
  --transition-base:    180ms ease;
}

/* ---------- Dark theme overrides ---------- */

:root[data-theme="dark"] {
  --color-bg:             #0b1220;
  --color-surface:        #111a2e;
  --color-surface-2:      #182340;
  --color-surface-3:      #1e2a4a;
  --color-text:           #e2e8f0;
  --color-text-muted:     #94a3b8;
  --color-text-subtle:    #64748b;
  --color-border:         #1e2a4a;
  --color-border-strong:  #334155;

  --color-primary:        #818cf8;
  --color-primary-weak:   #1e1b4b;
  --color-primary-strong: #a5b4fc;
  --color-primary-ring:   #3730a3;
  --color-primary-text:   #0b1220;

  --color-accent:         #fbbf24;
  --color-accent-weak:    #27211a;
  --color-accent-strong:  #fcd34d;

  --color-success:        #4ade80;
  --color-success-weak:   #14281d;
  --color-success-strong: #86efac;

  --color-warning:        #fbbf24;
  --color-warning-weak:   #27211a;
  --color-warning-strong: #fcd34d;

  --color-danger:         #f87171;
  --color-danger-weak:    #2a1115;
  --color-danger-strong:  #fca5a5;

  --color-info:           #38bdf8;
  --color-info-weak:      #0f2235;
  --color-info-strong:    #7dd3fc;
  --color-info-ring:      #0369a1;

  --stance-pro:           #818cf8;
  --stance-con:           #fb7185;
  --stance-nuanced:       #fbbf24;

  --ev-cochrane:          #38bdf8;
  --ev-sr-meta:           #4ade80;
  --ev-rct:               #34d399;
  --ev-cohort:            #38bdf8;
  --ev-case:              #fbbf24;
  --ev-expert:            #94a3b8;

  --shadow-sm:  0 1px 2px rgba(0, 0, 0, 0.35), 0 1px 3px rgba(0, 0, 0, 0.45);
  --shadow-md:  0 2px 10px rgba(0, 0, 0, 0.5);
  --shadow-lg:  0 10px 30px rgba(0, 0, 0, 0.55);
  --shadow-xl:  0 24px 60px rgba(0, 0, 0, 0.7);
}

/* ---------- Base / reset ---------- */

html, body { height: 100%; }

body {
  font-family: var(--font-sans);
  font-size: var(--fs-base);
  line-height: var(--lh-normal);
  color: var(--color-text);
  background: var(--color-bg);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

*, *::before, *::after { box-sizing: border-box; }

:focus-visible {
  outline: 2px solid var(--color-primary);
  outline-offset: 2px;
  border-radius: var(--radius-sm);
}

/* ---------- Page shell layout ---------- */

.site-shell {
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}
.site-main {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
}

/* ---------- Site header (shared nav) ---------- */

.site-header {
  position: sticky;
  top: 0;
  z-index: 70;
  display: flex;
  align-items: center;
  min-height: var(--site-header-height);
  padding: 0 var(--space-4);
  background: color-mix(in srgb, var(--color-surface) 92%, transparent);
  backdrop-filter: saturate(140%) blur(8px);
  -webkit-backdrop-filter: saturate(140%) blur(8px);
  border-bottom: 1px solid var(--color-border);
}

.site-header__inner {
  display: flex;
  align-items: center;
  gap: var(--space-4);
  width: 100%;
  max-width: 90rem;
  margin: 0 auto;
}

.site-header__brand {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-weight: var(--fw-bold);
  font-size: var(--fs-sm);
  letter-spacing: -0.01em;
  color: var(--color-text);
  text-decoration: none;
  white-space: nowrap;
}

.site-header__brand-dot {
  width: 10px;
  height: 10px;
  border-radius: var(--radius-full);
  background: var(--color-primary);
  box-shadow: 0 0 0 3px var(--color-primary-weak);
}

.site-header__nav {
  display: flex;
  align-items: center;
  gap: var(--space-1);
  flex: 1;
}

.site-header__nav-link {
  display: inline-flex;
  align-items: center;
  gap: 0.4rem;
  padding: 0.4rem 0.7rem;
  border-radius: var(--radius-sm);
  font-size: var(--fs-sm);
  font-weight: var(--fw-medium);
  color: var(--color-text-muted);
  text-decoration: none;
  transition: background var(--transition-fast), color var(--transition-fast);
}

.site-header__nav-link:hover {
  background: var(--color-surface-2);
  color: var(--color-text);
}

.site-header__nav-link[aria-current="page"] {
  background: var(--color-primary-weak);
  color: var(--color-primary);
  font-weight: var(--fw-semibold);
}

.site-header__due-badge {
  display: inline-flex;
  align-items: center;
  padding: 0 0.45rem;
  min-width: 1.3rem;
  height: 1.3rem;
  border-radius: var(--radius-full);
  background: var(--color-accent);
  color: #fff;
  font-size: 0.7rem;
  font-weight: var(--fw-bold);
  line-height: 1;
}

.site-header__actions {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-left: auto;
}

.site-header__theme-toggle,
.site-header__menu-btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 2.25rem;
  height: 2.25rem;
  padding: 0;
  background: transparent;
  border: 1px solid var(--color-border);
  border-radius: var(--radius-sm);
  color: var(--color-text-muted);
  cursor: pointer;
  transition: background var(--transition-fast),
              border-color var(--transition-fast),
              color var(--transition-fast);
}

.site-header__theme-toggle:hover,
.site-header__menu-btn:hover {
  background: var(--color-surface-2);
  color: var(--color-text);
  border-color: var(--color-border-strong);
}

.site-header__theme-toggle svg,
.site-header__menu-btn svg {
  width: 18px;
  height: 18px;
}

.site-header__menu-btn { display: none; }

@media (max-width: 720px) {
  .site-header { padding: 0 var(--space-3); }
  .site-header__brand-text { display: none; }
  .site-header__nav-link { padding: 0.4rem 0.55rem; }
  .site-header__menu-btn { display: inline-flex; }
}

@media (max-width: 480px) {
  .site-header__nav-link-label { display: none; }
  .site-header__nav-link { padding: 0.45rem; min-width: 2.25rem; justify-content: center; }
}

/* ---------- Pills ---------- */

.pill {
  display: inline-flex;
  align-items: center;
  padding: 0.14rem 0.6rem;
  border-radius: var(--radius-full);
  font-size: var(--fs-xs);
  font-weight: var(--fw-semibold);
  letter-spacing: 0.02em;
  text-transform: uppercase;
  white-space: nowrap;
  border: 1px solid transparent;
}
.pill-pro         { background: var(--color-primary-weak); color: var(--color-primary);
                    border-color: var(--color-primary-ring); }
.pill-con         { background: var(--color-danger-weak);  color: var(--color-danger-strong);
                    border-color: color-mix(in srgb, var(--color-danger) 30%, transparent); }
.pill-nuanced     { background: var(--color-warning-weak); color: var(--color-warning-strong);
                    border-color: color-mix(in srgb, var(--color-warning) 30%, transparent); }
.pill-cochrane    { background: var(--color-info-weak);    color: var(--color-info);
                    border-color: var(--color-info-ring); }
.pill-sr-meta     { background: var(--color-success-weak); color: var(--color-success-strong);
                    border-color: color-mix(in srgb, var(--color-success) 30%, transparent); }
.pill-rct         { background: var(--color-success-weak); color: var(--color-success-strong);
                    border-color: color-mix(in srgb, var(--color-success) 25%, transparent); }
.pill-cohort      { background: var(--color-info-weak);    color: var(--color-info);
                    border-color: color-mix(in srgb, var(--color-info) 25%, transparent); }
.pill-case-series { background: var(--color-warning-weak); color: var(--color-warning-strong);
                    border-color: color-mix(in srgb, var(--color-warning) 25%, transparent); }
.pill-expert      { background: var(--color-surface-2);    color: var(--color-text-muted);
                    border-color: var(--color-border); }

/* ---------- Chips ---------- */

.chip {
  padding: 0.3rem 0.85rem;
  min-height: 1.9rem;
  border-radius: var(--radius-full);
  font-size: var(--fs-xs);
  font-weight: var(--fw-medium);
  border: 1px solid var(--color-border);
  background: var(--color-surface);
  color: var(--color-text-muted);
  cursor: pointer;
  transition: background var(--transition-fast),
              color var(--transition-fast),
              border-color var(--transition-fast);
}
.chip:hover { background: var(--color-surface-2); color: var(--color-text); }
.chip-active-all     { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }
.chip-active-pro     { background: var(--stance-pro);    color: #fff; border-color: var(--stance-pro); }
.chip-active-con     { background: var(--stance-con);    color: #fff; border-color: var(--stance-con); }
.chip-active-nuanced { background: var(--stance-nuanced);color: #fff; border-color: var(--stance-nuanced); }
.chip-active         { background: var(--color-info);    color: #fff; border-color: var(--color-info); }

/* ---------- Cards (entry / review / verdict / consensus) ---------- */

.entry-card,
.review-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-4) var(--space-5);
  margin-bottom: var(--space-3);
  transition: box-shadow var(--transition-base),
              border-color var(--transition-base);
}
.entry-card:hover,
.review-card:hover {
  box-shadow: var(--shadow-md);
  border-color: var(--color-border-strong);
}
.entry-card.flash,
.review-card.flash {
  animation: cardFlash 1.2s ease;
}
@keyframes cardFlash {
  0%   { box-shadow: 0 0 0 0 rgba(129,140,248,0);
         border-color: var(--color-border); }
  15%  { box-shadow: 0 0 0 4px rgba(129,140,248,0.55);
         border-color: var(--color-primary); }
  100% { box-shadow: 0 0 0 0 rgba(129,140,248,0);
         border-color: var(--color-border); }
}

.entry-year {
  font-size: var(--fs-md);
  font-weight: var(--fw-bold);
  color: var(--color-primary);
  letter-spacing: -0.01em;
  line-height: 1;
}
.entry-author {
  font-size: var(--fs-sm);
  font-weight: var(--fw-medium);
  color: var(--color-text);
  margin-top: 0.2rem;
}
.entry-finding {
  font-size: var(--fs-sm);
  line-height: var(--lh-normal);
  color: var(--color-text);
  margin-top: 0.55rem;
}

.review-year {
  font-size: var(--fs-md);
  font-weight: var(--fw-bold);
  color: var(--color-info);
  letter-spacing: -0.01em;
}
.review-title {
  font-size: var(--fs-sm);
  font-weight: var(--fw-semibold);
  color: var(--color-text);
  margin-top: 0.2rem;
  line-height: var(--lh-snug);
}
.review-authors {
  font-size: var(--fs-xs);
  color: var(--color-text-muted);
  margin-top: 0.2rem;
}

.consensus-card {
  background: linear-gradient(135deg,
              color-mix(in srgb, var(--color-primary-weak) 85%, transparent),
              color-mix(in srgb, var(--color-primary-ring) 40%, transparent));
  border: 1px solid var(--color-primary-ring);
  border-left: 4px solid var(--color-primary);
  border-radius: var(--radius-md);
  padding: var(--space-4) var(--space-5);
  margin: var(--space-4) 0 var(--space-6);
}
.consensus-label {
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-primary);
  margin-bottom: 0.4rem;
}
.consensus-text {
  font-size: var(--fs-sm);
  line-height: var(--lh-normal);
  color: var(--color-text);
}

.verdict-box {
  background: linear-gradient(135deg,
              color-mix(in srgb, var(--color-info-weak) 85%, transparent),
              color-mix(in srgb, var(--color-info-ring) 25%, transparent));
  border: 1px solid var(--color-info-ring);
  border-left: 4px solid var(--color-info);
  border-radius: var(--radius-sm);
  padding: 0.75rem var(--space-4);
  margin-top: 0.85rem;
}
.verdict-label {
  font-size: var(--fs-xs);
  font-weight: var(--fw-bold);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-info);
  margin-bottom: 0.35rem;
}
.verdict-text {
  font-size: var(--fs-sm);
  line-height: var(--lh-normal);
  color: var(--color-text);
}

/* ---------- Timeline rail ---------- */

.rail-wrap {
  position: relative;
  padding: 2.1rem 1.75rem 1.2rem;
  margin: 0.5rem 0 1.25rem;
  overflow-x: auto;
  overflow-y: visible;
  scrollbar-width: thin;
}
.rail {
  position: relative;
  min-width: 100%;
  height: 66px;
}
.rail-line {
  position: absolute;
  left: 0; right: 0;
  top: 30px;
  height: 2px;
  background: var(--color-border-strong);
}
.rail-tick {
  position: absolute;
  top: 36px;
  width: 1px;
  height: 8px;
  background: var(--color-border-strong);
}
.rail-tick-label {
  position: absolute;
  top: 46px;
  font-size: var(--fs-xs);
  color: var(--color-text-subtle);
  transform: translateX(-50%);
  white-space: nowrap;
}
.rail-dot {
  position: absolute;
  top: 30px;
  border-radius: var(--radius-full);
  cursor: pointer;
  transform: translate(-50%, -50%);
  transition: transform var(--transition-fast),
              box-shadow var(--transition-fast);
  border: 2px solid var(--color-surface);
  box-shadow: var(--shadow-sm);
}
.rail-dot:hover {
  transform: translate(-50%, -50%) scale(1.25);
  z-index: 2;
}
.rail-dot-label {
  position: absolute;
  top: -6px;
  font-size: var(--fs-xs);
  color: var(--color-text-muted);
  transform: translate(-50%, -100%);
  white-space: nowrap;
  pointer-events: none;
}
.rail-dot-withdrawn { opacity: 0.45; }

.stance-pro     { background: var(--stance-pro); }
.stance-con     { background: var(--stance-con); }
.stance-nuanced { background: var(--stance-nuanced); }

.ev-cochrane    { width: 18px; height: 18px;
                  box-shadow: 0 0 0 2px var(--color-info-ring), var(--shadow-sm); }
.ev-sr-meta     { width: 18px; height: 18px; }
.ev-rct         { width: 16px; height: 16px; }
.ev-cohort      { width: 13px; height: 13px; }
.ev-case-series { width: 11px; height: 11px; }
.ev-expert      { width: 10px; height: 10px; opacity: 0.85; }

.rail-wrap::-webkit-scrollbar        { height: 8px; }
.rail-wrap::-webkit-scrollbar-track  { background: transparent; }
.rail-wrap::-webkit-scrollbar-thumb  { background: var(--color-border-strong); border-radius: 4px; }

@media (max-width: 640px) {
  .rail-wrap { padding: 2.4rem 0.75rem 1rem; }
  .rail { min-width: 720px; height: 78px; }
  .rail-dot { border-width: 2.5px; }
  .ev-cochrane, .ev-sr-meta { width: 22px; height: 22px; }
  .ev-rct    { width: 20px; height: 20px; }
  .ev-cohort { width: 16px; height: 16px; }
  .ev-case-series { width: 14px; height: 14px; }
  .ev-expert { width: 12px; height: 12px; }
  .rail-dot-label { font-size: 0.7rem; }
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 0.55rem 1rem;
  font-size: var(--fs-xs);
  color: var(--color-text-muted);
  align-items: center;
}
.legend-dot {
  display: inline-block;
  border-radius: var(--radius-full);
  border: 2px solid var(--color-surface);
  box-shadow: var(--shadow-sm);
  vertical-align: middle;
  margin-right: 0.35rem;
  width: 10px;
  height: 10px;
}

/* ---------- Abstract popup (shared across all pages) ---------- */

.abstract-overlay {
  position: fixed;
  inset: 0;
  z-index: 90;
  display: flex;
  align-items: flex-end;
  justify-content: center;
  background: color-mix(in srgb, var(--color-text) 55%, transparent);
  backdrop-filter: blur(3px);
  -webkit-backdrop-filter: blur(3px);
  animation: abFadeIn 0.15s ease;
}
@media (min-width: 640px) {
  .abstract-overlay { align-items: center; padding: 1.5rem; }
}
.abstract-panel {
  background: var(--color-surface);
  color: var(--color-text);
  border-radius: var(--radius-lg) var(--radius-lg) 0 0;
  box-shadow: 0 -8px 50px rgba(0, 0, 0, 0.35);
  width: 100%;
  max-width: 680px;
  max-height: 88vh;
  display: flex;
  flex-direction: column;
  animation: abSlideUp 0.22s cubic-bezier(0.16, 1, 0.3, 1);
}
@media (min-width: 640px) {
  .abstract-panel {
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-xl);
    animation: abScaleIn 0.2s cubic-bezier(0.16, 1, 0.3, 1);
  }
}
.abstract-header {
  padding: 1.2rem 1.4rem 0.9rem;
  border-bottom: 1px solid var(--color-border);
  flex-shrink: 0;
}
.abstract-body {
  padding: 1.1rem 1.4rem 1.6rem;
  overflow-y: auto;

<script>
/* inlined from /assets/srs.js */
/* ============================================================================
 * srs.js — Leitner-SM2-lite, time-gated five-box spaced repetition.
 * Exposes window.SRS with: loadDeck, saveDeck, rate, pickDue, stats,
 *                          migrateFromV1, cardKey
 * Persistence: localStorage["endo-guide.srs.v2"]
 * Also bumps a "srs:change" custom event on every write so the shared
 * site header can update its "Due" badge.
 *
 * Card state shape:
 *   {
 *     box: 0..4,              // 0 New, 1 Learning, 2 Young, 3 Mature, 4 Mastered
 *     lastReviewAt: ISOString | null,
 *     nextReviewAt: ISOString,   // card is "due" when now >= nextReviewAt
 *     reps: number,
 *     lapses: number,
 *     shaky: boolean,         // flagged by user for audit re-verification
 *     dir:  "fwd" | "rev"     // (encoded into the key, not stored here)
 *   }
 * ========================================================================= */
(function (global) {
  "use strict";

  var STORAGE_KEY = "endo-guide.srs.v2";
  var V1_KEY      = "endo-guide.study.v1";

  // Intervals keyed by box; [correct, wrong] -> [nextBox, delayMinutes]
  // "correct" means Good/Easy; "wrong" means Again; "Hard" is a separate path.
  var INTERVALS = {
    // box: { good: [nextBox, minutes], easy: [nextBox, minutes],
    //        hard: [nextBox, minutes], again: [nextBox, minutes] }
    0: { good:  [1, 60],            easy: [2, 60 * 24],
         hard:  [0, 15],            again:[0, 10] },
    1: { good:  [2, 60 * 24],       easy: [3, 60 * 24 * 3],
         hard:  [1, 60 * 6],        again:[0, 10] },
    2: { good:  [3, 60 * 24 * 3],   easy: [4, 60 * 24 * 7],
         hard:  [2, 60 * 24],       again:[1, 60] },
    3: { good:  [4, 60 * 24 * 7],   easy: [4, 60 * 24 * 14],
         hard:  [3, 60 * 24 * 2],   again:[1, 60 * 24] },
    4: { good:  [4, 60 * 24 * 21],  easy: [4, 60 * 24 * 35],
         hard:  [4, 60 * 24 * 7],   again:[2, 60 * 24] },
  };

  var BOX_NAMES = ["New", "Learning", "Young", "Mature", "Mastered"];

  function nowIso() { return new Date().toISOString(); }

  function addMinutesIso(isoOrNow, minutes) {
    var d = new Date(isoOrNow || nowIso());
    d.setTime(d.getTime() + minutes * 60 * 1000);
    return d.toISOString();
  }

  function safeParse(str) {
    try { return JSON.parse(str); } catch (e) { return null; }
  }

  // ---------- Card key ---------------------------------------------------
  // Stable across builds: lowercased author, year, first 60 chars of finding.
  // Direction is encoded as a suffix so fwd/rev progress independently.
  function cardKey(author, year, finding, direction) {
    var a = String(author || "").toLowerCase().trim();
    var y = String(year || "").trim();
    var f = String(finding || "").slice(0, 60).toLowerCase();
    var d = direction === "rev" ? "rev" : "fwd";
    return a + "|" + y + "|" + f + "|" + d;
  }

  // ---------- Deck load / save ------------------------------------------
  function emptyDeck() {
    return {
      version: 2,
      cards: {},         // key -> CardState
      meta: {
        streak: 0,
        lastReviewAt: null,
        createdAt: nowIso(),
      },
      history: [],       // [{t, key, rating}]
    };
  }

  function loadDeck() {
    var raw = null;
    try { raw = localStorage.getItem(STORAGE_KEY); } catch (e) {}
    var parsed = raw ? safeParse(raw) : null;
    if (parsed && parsed.version === 2 && parsed.cards) {
      if (!parsed.meta)    parsed.meta = { streak: 0, lastReviewAt: null };
      if (!parsed.history) parsed.history = [];
      return parsed;
    }
    // Try v1 migration
    var v1raw = null;
    try { v1raw = localStorage.getItem(V1_KEY); } catch (e) {}
    var v1 = v1raw ? safeParse(v1raw) : null;
    if (v1 && v1.boxes) {
      var migrated = migrateFromV1(v1);
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(migrated)); } catch (e) {}
      return migrated;
    }
    return emptyDeck();
  }

  function saveDeck(deck) {
    try {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(deck));
      document.dispatchEvent(new CustomEvent("srs:change"));
    } catch (e) {}
  }

  // ---------- Migration from v1 (3-box Leitner) -------------------------
  function migrateFromV1(v1) {
    var deck = emptyDeck();
    var boxes = v1.boxes || {};
    Object.keys(boxes).forEach(function (oldKey) {
      var v1box = Number(boxes[oldKey]) || 0;
      var newBox = Math.min(2, Math.max(0, v1box)); // 0..2 maps to 0..2
      // The old key format was "author|year|finding[0..60]" — no direction.
      // Carry it forward as fwd; the new cardKey has a "|fwd" suffix.
      var key = oldKey + "|fwd";
      deck.cards[key] = {
        box: newBox,
        lastReviewAt: null,
        nextReviewAt: nowIso(), // everything shows as due
        reps: newBox,
        lapses: 0,
        shaky: false,
      };
    });
    if (Array.isArray(v1.history)) {
      deck.history = v1.history.slice(-200);
    }
    if (typeof v1.streak === "number") {
      deck.meta.streak = v1.streak;
    }
    deck.meta.migratedFromV1At = nowIso();
    return deck;
  }

  // ---------- Rating ----------------------------------------------------
  // rating: "again" | "hard" | "good" | "easy"
  function rate(deck, key, rating) {
    if (!deck.cards[key]) {
      deck.cards[key] = {
        box: 0,
        lastReviewAt: null,
        nextReviewAt: nowIso(),
        reps: 0,
        lapses: 0,
        shaky: false,
      };
    }
    var card = deck.cards[key];
    var step = INTERVALS[card.box] || INTERVALS[0];
    var entry = step[rating] || step.good;
    var nextBox = entry[0];
    var delayMin = entry[1];

    card.lastReviewAt = nowIso();
    card.nextReviewAt = addMinutesIso(null, delayMin);
    card.reps += 1;
    if (rating === "again") card.lapses += 1;
    card.box = nextBox;

    // Streak: advance if user rated something today for the first time
    var today = nowIso().slice(0, 10);
    if (deck.meta.lastReviewAt) {
      var lastDay = deck.meta.lastReviewAt.slice(0, 10);
      if (lastDay !== today) {
        // is it yesterday or a gap?
        var yesterday = new Date(Date.now() - 86400000)
          .toISOString().slice(0, 10);
        deck.meta.streak = lastDay === yesterday
          ? (deck.meta.streak || 0) + 1
          : 1;
      }
    } else {
      deck.meta.streak = 1;
    }
    deck.meta.lastReviewAt = nowIso();

    deck.history.push({
      t: Date.now(),
      key: key,
      rating: rating,
      box: nextBox,
    });
    if (deck.history.length > 500) {
      deck.history = deck.history.slice(-500);
    }
    saveDeck(deck);
    return card;
  }

  function markShaky(deck, key, shaky) {
    if (!deck.cards[key]) {
      deck.cards[key] = {
        box: 1,
        lastReviewAt: null,
        nextReviewAt: nowIso(),
        reps: 0,
        lapses: 0,
        shaky: !!shaky,
      };
    } else {
      deck.cards[key].shaky = !!shaky;
    }
    saveDeck(deck);
  }

  // ---------- Queue selection -------------------------------------------
  // candidatePool: array of { key, ...anyExtra }. Only keys in this pool
  // are considered so stale keys (old cards removed from guide) don't
  // clog the queue.
  function pickDue(deck, candidatePool, options) {
    options = options || {};
    var limit = options.limit || 1;
    var nowMs = options.now ? new Date(options.now).getTime() : Date.now();

    var poolKeys = {};
    for (var i = 0; i < candidatePool.length; i++) {
      poolKeys[candidatePool[i].key] = true;
    }

    var due = [];
    var fresh = [];
    var lapsed = [];
    var backlog = [];
    var keys = Object.keys(deck.cards);
    for (var j = 0; j < keys.length; j++) {
      var k = keys[j];
      if (!poolKeys[k]) continue;
      var c = deck.cards[k];
      var next = new Date(c.nextReviewAt || 0).getTime();
      if (next <= nowMs) {
        var overdueDays = (nowMs - next) / 86400000;
        if (overdueDays > 7) {
          lapsed.push({ key: k, overdue: overdueDays, box: c.box });
        } else {
          due.push({ key: k, overdue: overdueDays, box: c.box });
        }
      } else {
        backlog.push({ key: k, in: (next - nowMs) / 60000, box: c.box });
      }
    }
    // Fresh = pool keys we've never seen
    for (var p = 0; p < candidatePool.length; p++) {
      var pk = candidatePool[p].key;
      if (!deck.cards[pk]) fresh.push({ key: pk, box: -1 });
    }

    // Priority: lapsed first, then due by most overdue, then fresh, then
    // earliest backlog.
    lapsed.sort(function (a, b) { return b.overdue - a.overdue; });
    due.sort(function (a, b) { return b.overdue - a.overdue; });
    backlog.sort(function (a, b) { return a.in - b.in; });

    var out = [];
    function take(list) {
      for (var i = 0; i < list.length && out.length < limit; i++) {
        out.push(list[i].key);
      }
    }
    take(lapsed);
    take(due);
    take(fresh);
    if (out.length < limit) take(backlog);
    return out;
  }

  // ---------- Stats ------------------------------------------------------
  function stats(deck) {
    var now = Date.now();
    var counts = {
      total: 0, due: 0, newCount: 0,
      learning: 0, young: 0, mature: 0, mastered: 0,
      shaky: 0, lapses: 0,
    };
    var keys = Object.keys(deck.cards);
    for (var i = 0; i < keys.length; i++) {
      var c = deck.cards[keys[i]];
      counts.total += 1;
      counts.lapses += c.lapses || 0;
      if (c.shaky) counts.shaky += 1;
      var next = new Date(c.nextReviewAt || 0).getTime();
      if (next <= now) counts.due += 1;
      switch (c.box) {
        case 0: counts.newCount += 1; break;
        case 1: counts.learning += 1; break;
        case 2: counts.young    += 1; break;
        case 3: counts.mature   += 1; break;
        case 4: counts.mastered += 1; break;
      }
    }
    counts.streak = (deck.meta && deck.meta.streak) || 0;
    return counts;
  }

  // ---------- Public API ------------------------------------------------
  var SRS = {
    STORAGE_KEY: STORAGE_KEY,
    V1_KEY: V1_KEY,
    BOX_NAMES: BOX_NAMES,
    INTERVALS: INTERVALS,
    cardKey: cardKey,
    loadDeck: loadDeck,
    saveDeck: saveDeck,
    rate: rate,
    markShaky: markShaky,
    pickDue: pickDue,
    stats: stats,
    migrateFromV1: migrateFromV1,
  };

  global.SRS = SRS;
})(typeof window !== "undefined" ? window : this);

    if (!link) return;
    var label = link.querySelector(".site-header__nav-link-label");
    var badge = link.querySelector(".site-header__due-badge");
    var due = dueCount();
    if (due > 0) {
      if (badge) {

        var span = document.createElement("span");

        span.textContent = String(due);
        span.title = due + " cards due";
        label.parentNode.insertBefore(span, label.nextSibling);
      }
    } else if (badge) {
      badge.parentNode.removeChild(badge);
    }
  });

  window.addEventListener("storage", function (e) {
    if (e.key === "endo-guide.theme" &&

    }
    if (e.key === "endo-guide.srs.v2") {
      document.dispatchEvent(new CustomEvent("srs:change"));
    }
  });
})();

need chemical disinfection"], ["", "EDTA Application", "1 minute penultimate rinse for smear layer removal", "Calt & Serper - 1 min optimal; 10 min causes erosion"], ["", "Final NaOCl Rinse", "Removes organic debris after EDTA", "Baumgartner & Mader - don't alternate throughout"], ["", "Activation (PUI/Sonic)", "Improves debridement in isthmuses, fins", "Enhances irrigant penetration"], ["", "Dry Canals", "Paper points to confirm dryness before obturation", "Persistent exudate may require medicament"], ["OBTURATION", "Master Cone Fit", "Tug-back at working length", "Radiographic confirmation"], ["", "Sealer Application", "Thin layer; bioceramic or resin-based", "Sealer fills discrepancies"], ["", "Obturation Technique", "Warm vertical, lateral condensation, or single cone", "Technique less important than coronal seal - Ray & Trope"], ["", "Radiographic Confirmation", "Verify fill to WL, density, no voids", "Sjögren - Dense fill 0-2mm from apex optimal"], ["RESTORATION", "Orifice Barrier", "Prevents coronal leakage", "==Swanson & Madison - dye penetrated 79–85% of root length after just 3 days of coronal exposure (not necessarily to the apex)=="], ["", "Core Placement", "Same-day if possible; minimum 3.5mm Cavit if temp", "Webber - 3.5mm Cavit for adequate seal"], ["", "Cuspal Coverage Planning", "Crown for posteriors; assess remaining structure", "Ray & Trope - coronal restoration more important than fill quality"], ["POST-OP", "Occlusal Adjustment", "Reduce if pre-op pain, percussion sensitivity, vital", "Rosenberg - decreases pain with specific indications"], ["", "Post-operative Instructions", "Pain expectations, medications, when to call", "Tsesis - 8.4% flare-up rate"], ["", "Analgesic Prescription", "Ibuprofen 400-600mg q6h; combo with acetaminophen", "Oxford League Table - 800mg ibuprofen NNT 1.6"], ["", "Follow-up Scheduling", "6-12 months; longer for large lesions", "Murphy - 70% lesions >1 year to heal"]], "raw": "| PHASE | STEP | RATIONALE | EVIDENCE |\n| th Determination | EAL is 96% accurate; 0.5-1mm from radiographic apex | Burch & Hulen - 92.4% foramina short of apex; Kuttler - CDJ 0.5-0.66mm from apex |\n|  | Glide Path Establishment | Manual or mechanical to #15-20 | Reduces instrument separation risk |\n|  | Canal Shaping | Minimum #30 apical size for disinfection | Sulzberger & Brilliant - #30 minimum; |\n|  | Maintain Patency | Prevents blockage, improves irrigant flow | Vera 2012 - patency increases irrigant penetration |\n| IRRIGATION | NaOCl Irrigation | 5.25% most effective; continuous replenishment | Hand - concentration matters; Peters - 35% untouched walls need chemical disinfection |\n|  | EDTA Application | 1 minute penultimate rinse for smear layer removal | Calt & Serper - 1 min optimal; 10 min causes erosion |\n|  | Final NaOCl Rinse | Removes organic debris after EDTA | Baumgartner & Mader - don't alternate throughout |\n|  | Activation (PUI/Sonic) | Improves debridement in isthmuses, fins | Enhances irrigant penetration |\n|  | Dry Canals | Paper points to confirm dryness before obturation | Persistent exudate may require medicament |\n| OBTURATION | Master Cone Fit | Tug-back at working length | Radiographic confirmation |\n|  | Sealer Application | Thin layer; bioceramic or resin-based | Sealer fills discrepancies |\n|  | Obturation Technique | Warm vertical, lateral condensation, or single cone | Technique less important than coronal seal - Ray & Trope |\n|  | Radiographic Confirmation | Verify fill to WL, density, no voids | Sjögren - Dense fill 0-2mm from apex optimal |\n| RESTORATION | Orifice Barrier | Prevents coronal leakage | ==Swanson & Madison - dye penetrated 79–85% of root length after just 3 days of coronal exposure (not necessarily to the apex)== |\n|  | Core Placement | Same-day if possible; minimum 3.5mm Cavit if temp | Webber - 3.5mm Cavit for adequate seal |\n|  | Cuspal Coverage Planning | Crown for posteriors; assess remaining structure | Ray & Trope - coronal restoration more important than fill quality |\n| POST-OP | Occlusal Adjustment | Reduce if pre-op pain, percussion sensitivity, vital | Rosenberg - decreases pain with specific indications |\n|  | Post-operative Instructions | Pain expectations, medications, when to call | Tsesis - 8.4% flare-up rate |\n|  | Analgesic Prescription | Ibuprofen 400-600mg q6h; combo with acetaminophen | Oxford League Table - 800mg ibuprofen NNT 1.6 |\n|  | Follow-up Scheduling | 6-12 months; longer for large lesions | Murphy - 70% lesions >1 year to heal |"}], "subsections": []}, {"id": "s1-diagnosis-and-case-assessment", "number": "1", "title": "Diagnosis and Case Assessment", "level": 1, "blocks": [], "subsections": [{"id": "s1-diagnosis-and-case-assessment-11-pulp-testing-methodology-and-interpretation", "number": "1.1", "title": "Pulp Testing Methodology and Interpretation", "level": 2, "blocks": [{"type": "ul", "items": ["What is the sensitivity and specificity of cold testing vs. EPT for determining pulp vitality?"], "raw": "- What is the sensitivity and specificity of cold testing vs. EPT for determining pulp vitality?"}, {"type": "p", "text": "Cold testing is the most useful tool for determining pulp vitality. Ricucci et al., 2014 found 84-97% agreement between clinical and histological diagnoses. Cold testing has sensitivity of 0.87 and specificity of 0.84. PPV is 0.81, NPV is 0.87, giving overall accuracy of 84%. This exceeds heat testing accuracy of 72%. EPT has sensitivity of 0.72 and specificity of 0.93, with PPV of 0.89 and NPV of 0.80, giving overall accuracy of 82% {{cite: Mainkar and Kim 2018}}.", "raw": "Cold testing is the most useful tool for determining pulp vitality. Ricucci et al., 2014 found 84-97% agreement between clinical and histological diagnoses. Cold testing has sensitivity of 0.87 and specificity of 0.84. PPV is 0.81, NPV is 0.87, giving overall accuracy of 84%. This exceeds heat testing accuracy of 72%. EPT has sensitivity of 0.72 and specificity of 0.93, with PPV of 0.89 and NPV of 0.80, giving overall accuracy of 82% {{cite: Mainkar and Kim 2018}}."}, {"type": "ul", "items": ["How does pulp canal obliteration affect test reliability?"], "raw": "- How does pulp canal obliteration affect test reliability?"}, {"type": "p", "text": "EPT is more useful in calcified teeth (Ketterl) due to less fluid for movement with thermal testing. EPT is less accurate in immature teeth due to later development of A-delta fibers (Fulling and Andreasen). Only 7% of teeth with pulp canal obliteration develop necrosis (Andreasen et al., 1987).", "raw": "EPT is more useful in calcified teeth (Ketterl) due to less fluid for movement with thermal testing. EPT is less accurate in immature teeth due to later development of A-delta fibers (Fulling and Andreasen). Only 7% of teeth with pulp canal obliteration develop necrosis (Andreasen et al., 1987)."}, {"type": "ul", "items": ["What is the recommended sequence of pulp tests and why?"], "raw": "- What is the recommended sequence of pulp tests and why?"}, {"type": "p", "text": "Perform cold testing first due to high accuracy and ease of test, then EPT to confirm necrosis if there are doubts about vitality.", "raw": "Perform cold testing first due to high accuracy and ease of test, then EPT to confirm necrosis if there are doubts about vitality."}, {"type": "ul", "items": ["How do you interpret discordant test results?"], "raw": "- How do you interpret discordant test results?"}, {"type": "p", "text": "If test results are discordant one should correlate with clinical and symptom history, look for radiographic signs (especially progressive radiographic pathology), realize that in multi-rooted teeth one canal may be necrotic while another is vital which could affect testing, consider monitoring and re-evaluating at a follow-up appointment.", "raw": "If test results are discordant one should correlate with clinical and symptom history, look for radiographic signs (especially progressive radiographic pathology), realize that in multi-rooted teeth one canal may be necrotic while another is vital which could affect testing, consider monitoring and re-evaluating at a follow-up appointment."}, {"type": "ul", "items": ["Does the EPT interfere with pacemaker function?"], "raw": "- Does the EPT interfere with pacemaker function?"}, {"type": "p", "text": "Wilson found that EPT does not interfere with pacemaker function.", "raw": "Wilson found that EPT does not interfere with pacemaker function."}, {"type": "ul", "items": ["What is the mechanism of cold testing and is it safe?"], "raw": "- What is the mechanism of cold testing and is it safe?"}, {"type": "p", "text": "Cold testing works via outward hydrodynamic fluid flow in the dentinal tubules, which stimulates Aδ fibers {{cite: Trowbridge — Cold testing mechanism: outward hydrodynamic fluid flow stimulates Aδ fibers}}. Rickoff et al found no pathologic changes resulting from cold testing. The best method for cold testing is refrigerant sprays (tetrafluoroethane): White and Cooley demonstrated superiority over cold-water bath or ice stick, and Miller et al found refrigerant sprays are superior for crowned teeth (PFM) {{cite: Miller — Refrigerant sprays superior to other cold methods for crowned PFM teeth}}.", "raw": "Cold testing works via outward hydrodynamic fluid flow in the dentinal tubules, which stimulates Aδ fibers {{cite: Trowbridge — Cold testing mechanism: outward hydrodynamic fluid flow stimulates Aδ fibers}}. Rickoff et al found no pathologic changes resulting from cold testing. The best method for cold testing is refrigerant sprays (tetrafluoroethane): White and Cooley demonstrated superiority over cold-water bath or ice stick, and Miller et al found refrigerant sprays are superior for crowned teeth (PFM) {{cite: Miller — Refrigerant sprays superior to other cold methods for crowned PFM teeth}}."}, {"type": "ul", "items": ["What is the mechanism of heat testing and what are its accuracy statistics?"], "raw": "- What is the mechanism of heat testing and what are its accuracy statistics?"}, {"type": "p", "text": "Heat testing is reserved as a second-line test or when heat is the chief complaint. It works via inward hydrodynamic fluid flow. Bierma et al found that heated gutta-percha via a warm vertical compaction tip is the safest heat testing method — a heated ball burnisher or hot water can cause pulpal damage {{cite: Bierma — Heated GP tip is safest heat testing method; avoid ball burnisher or hot water}}. Rickoff et al found no pathologic changes. Heat testing accuracy: sensitivity 0.78, specificity 0.67, PPV 0.62, NPV 0.79, overall accuracy 72% {{cite: Mainkar and Kim 2018}}.", "raw": "Heat testing is reserved as a second-line test or when heat is the chief complaint. It works via inward hydrodynamic fluid flow. Bierma et al found that heated gutta-percha via a warm vertical compaction tip is the safest heat testing method — a heated ball burnisher or hot water can cause pulpal damage {{cite: Bierma — Heated GP tip is safest heat testing method; avoid ball burnisher or hot water}}. Rickoff et al found no pathologic changes. Heat testing accuracy: sensitivity 0.78, specificity 0.67, PPV 0.62, NPV 0.79, overall accuracy 72% {{cite: Mainkar and Kim 2018}}."}, {"type": "ul", "items": ["What is the complete comparison of pulp testing modalities?"], "raw": "- What is the complete comparison of pulp testing modalities?"}, {"type": "p", "text": "From Mainkar and Kim (Table 6-1), comparing Sensitivity / Specificity / PPV / NPV / Overall accuracy: Cold 87/84/81/87/84%; Heat 78/67/62/79/72%; EPT 72/93/89/80/82%; LDF 98/95/94/100/97%; Pulse oximetry 97/95/94/99/97%. Laser Doppler flowmetry (LDF) and pulse oximetry are true vitality tests (measuring blood flow/oxygen saturation) rather than sensitivity tests, with 97% accuracy vs. 84% for cold — but neither is currently available for routine clinical use {{cite: Mainkar and Kim 2018 — LDF and pulse oximetry achieve 97% accuracy vs 84% for cold; not yet clinically available}}.", "raw": "From Mainkar and Kim (Table 6-1), comparing Sensitivity / Specificity / PPV / NPV / Overall accuracy: Cold 87/84/81/87/84%; Heat 78/67/62/79/72%; EPT 72/93/89/80/82%; LDF 98/95/94/100/97%; Pulse oximetry 97/95/94/99/97%. Laser Doppler flowmetry (LDF) and pulse oximetry are true vitality tests (measuring blood flow/oxygen saturation) rather than sensitivity tests, with 97% accuracy vs. 84% for cold — but neither is currently available for routine clinical use {{cite: Mainkar and Kim 2018 — LDF and pulse oximetry achieve 97% accuracy vs 84% for cold; not yet clinically available}}."}, {"type": "ul", "items": ["Where should the EPT electrode be placed and does orthodontic treatment affect EPT reliability?"], "raw": "- Where should the EPT electrode be placed and does orthodontic treatment affect EPT reliability?"}, {"type": "p", "text": "The EPT electrode should be placed at the incisal edge or cusp tip for optimal results {{cite: Bender — EPT electrode should be placed at incisal edge or cusp tip}}. During orthodontic treatment, Alomari found that thermal tests may be more accurate than EPT since orthodontic tooth movement alters EPT thresholds {{cite: Alomari — Thermal tests more reliable than EPT during orthodontic treatment}}.", "raw": "The EPT electrode should be placed at the incisal edge or cusp tip for optimal results {{cite: Bender — EPT electrode should be placed at incisal edge or cusp tip}}. During orthodontic treatment, Alomari found that thermal tests may be more accurate than EPT since orthodontic tooth movement alters EPT thresholds {{cite: Alomari — Thermal tests more reliable than EPT during orthodontic treatment}}."}, {"type": "ul", "items": ["Do common analgesics affect pulp test results?"], "raw": "- Do common analgesics affect pulp test results?"}, {"type": "p", "text": "Read et al found that ibuprofen taken prior to testing significantly affects percussion, palpation, and cold testing results {{cite: Read — Ibuprofen taken before testing significantly affects percussion, palpation, and cold test results}}. However, Fowler et al found that an acetaminophen/hydrocodone combination had NO effect on cold testing in patients with symptomatic irreversible pulpitis {{cite: Fowler — Acetaminophen/hydrocodone combination had no effect on cold testing in SIP patients}}.", "raw": "Read et al found that ibuprofen taken prior to testing significantly affects percussion, palpation, and cold testing results {{cite: Read — Ibuprofen taken before testing significantly affects percussion, palpation, and cold test results}}. However, Fowler et al found that an acetaminophen/hydrocodone combination had NO effect on cold testing in patients with symptomatic irreversible pulpitis {{cite: Fowler — Acetaminophen/hydrocodone combination had no effect on cold testing in SIP patients}}."}, {"type": "ul", "items": ["How does dental trauma affect pulp test reliability?"], "raw": "- How does dental trauma affect pulp test reliability?"}, {"type": "p", "text": "Bhaskar and Rappaport found that vital tissue can be present in traumatized teeth that are nonresponsive to sensitivity tests. They advise delaying a diagnosis of necrosis in trauma cases because of transient sensory deficiencies following injury {{cite: Bhaskar and Rappaport — Vital tissue found in traumatized teeth nonresponsive to sensitivity tests; delay necrosis diagnosis post-trauma}}.", "raw": "Bhaskar and Rappaport found that vital tissue can be present in traumatized teeth that are nonresponsive to sensitivity tests. They advise delaying a diagnosis of necrosis in trauma cases because of transient sensory deficiencies following injury {{cite: Bhaskar and Rappaport — Vital tissue found in traumatized teeth nonresponsive to sensitivity tests; delay necrosis diagnosis post-trauma}}."}, {"type": "ul", "items": ["What is the clinical significance of percussion and palpation testing?"], "raw": "- What is the clinical significance of percussion and palpation testing?"}, {"type": "p", "text": "Owatz et al established that percussion tenderness represents mechanical allodynia — a painful response to a normally nonnoxious stimulus. This may result from endodontic disease extending beyond the apex, periodontal disease, occlusal disease, or physical trauma {{cite: Owatz — Percussion tenderness is mechanical allodynia; may reflect endo, perio, occlusal, or traumatic etiology}}. Seltzer (1965) also described percussion sensitivity in the context of periodontal and occlusal causes. Palpation evaluates soft tissue swelling and bony expansion. For biting pain, a Tooth Slooth or bite stick should be used to isolate discomfort to a specific cusp.", "raw": "Owatz et al established that percussion tenderness represents mechanical allodynia — a painful response to a normally nonnoxious stimulus. This may result from endodontic disease extending beyond the apex, periodontal disease, occlusal disease, or physical trauma {{cite: Owatz — Percussion tenderness is mechanical allodynia; may reflect endo, perio, occlusal, or traumatic etiology}}. Seltzer (1965) also described percussion sensitivity in the context of periodontal and occlusal causes. Palpation evaluates soft tissue swelling and bony expansion. For biting pain, a Tooth Slooth or bite stick should be used to isolate discomfort to a specific cusp."}]}, {"id": "s1-diagnosis-and-case-assessment-12-periapical-diagnosis-classification", "number": "1.2", "title": "Periapical Diagnosis Classification", "level": 2, "blocks": [{"type": "ul", "items": ["What are the AAE diagnostic categories and their defining criteria?"], "raw": "- What are the AAE diagnostic categories and their defining criteria?"}, {"type": "h3", "text": "Pulpal Diagnostic Categories", "raw": "### Pulpal Diagnostic Categories"}, {"type": "table", "headers": ["Category", "Key Findings"], "rows": [["Normal Pulp", "Healthy pulp tissue with no pathological findings"], ["Reversible Pulpitis", "Inflammation capable of healing after removal of irritant"], ["Symptomatic Irreversible Pulpitis (SIP)", "Lingering thermal pain, spontaneous pain, or referred pain; vital inflamed pulp incapable of healing. Kayaoglu found adjacent and contralateral teeth have mechanical allodynia present compared to pulp necrosis"], ["Asymptomatic Irreversible Pulpitis (AIP)", "No symptoms but inflammation attributed to caries, caries excavation, or trauma; vital pulp incapable of healing"], ["Pulp Necrosis (PN)", "Death of dental pulp; usually nonresponsive to pulp sensitivity testing"], ["Previously Treated", "Root canal treatment has been performed; canals filled with obturating material"], ["Previously Initiated Therapy", "Partial endodontic treatment has been started (e.g., pulpotomy, pulpectomy)"]], "raw": "| Category | Key Findings |\n| --- | --- |\n| Normal Pulp | Healthy pulp tissue with no pathological findings |\n| Reversible Pulpitis | Inflammation capable of healing after removal of irritant |\n| Symptomatic Irreversible Pulpitis (SIP) | Lingering thermal pain, spontaneous pain, or referred pain; vital inflamed pulp incapable of healing. Kayaoglu found adjacent and contralateral teeth have mechanical allodynia present compared to pulp necrosis |\n| Asymptomatic Irreversible Pulpitis (AIP) | No symptoms but inflammation attributed to caries, caries excavation, or trauma; vital pulp incapable of healing |\n| Pulp Necrosis (PN) | Death of dental pulp; usually nonresponsive to pulp sensitivity testing |\n| Previously Treated | Root canal treatment has been performed; canals filled with obturating material |\n| Previously Initiated Therapy | Partial endodontic treatment has been started (e.g., pulpotomy, pulpectomy) |"}, {"type": "h3", "text": "Periapical Diagnostic Categories", "raw": "### Periapical Diagnostic Categories"}, {"type": "table", "headers": ["Category", "Clinical Findings", "Radiographic Findings"], "rows": [["Normal Apical Tissues", "No pain to biting, palpation, or percussion", "Normal PDL and lamina dura"], ["Symptomatic Apical Periodontitis", "Pain with biting, palpation, or percussion", "May have radiographic signs of inflammation"], ["Asymptomatic Apical Periodontitis", "No pain", "Periapical radiolucency present"], ["Acute Apical Abscess", "Rapid onset, spontaneous pain, tenderness to pressure, pus formation, swelling; potential systemic signs", "May or may not show periapical changes"], ["Chronic Apical Abscess", "Gradual onset, little or no discomfort, intermittent discharge of pus through a sinus tract", "Periapical radiolucency"], ["Condensing Osteitis", "Low grade inflammation", "Radiopaque area around apex"]], "raw": "| Category | Clinical Findings | Radiographic Findings |\n| --- | --- | --- |\n| Normal Apical Tissues | No pain to biting, palpation, or percussion | Normal PDL and lamina dura |\n| Symptomatic Apical Periodontitis | Pain with biting, palpation, or percussion | May have radiographic signs of inflammation |\n| Asymptomatic Apical Periodontitis | No pain | Periapical radiolucency present |\n| Acute Apical Abscess | Rapid onset, spontaneous pain, tenderness to pressure, pus formation, swelling; potential systemic signs | May or may not show periapical changes |\n| Chronic Apical Abscess | Gradual onset, little or no discomfort, intermittent discharge of pus through a sinus tract | Periapical radiolucency |\n| Condensing Osteitis | Low grade inflammation | Radiopaque area around apex |"}, {"type": "ul", "items": ["How do radiographic findings correlate with histologic disease?"], "raw": "- How do radiographic findings correlate with histologic disease?"}, {"type": "p", "text": "Bender and Seltzer (1961) demonstrated that periapical bone lesions are typically only visible radiographically once they perforate or involve the cortical plate. Multiple PAs from different angles improve detection: Brynolf found diagnostic accuracy increased from 74% with a single radiograph to 90% when three radiographs were taken from different angles.", "raw": "Bender and Seltzer (1961) demonstrated that periapical bone lesions are typically only visible radiographically once they perforate or involve the cortical plate. Multiple PAs from different angles improve detection: Brynolf found diagnostic accuracy increased from 74% with a single radiograph to 90% when three radiographs were taken from different angles."}, {"type": "ul", "items": ["What is the clinical significance of a widened PDL space vs. frank radiolucency?"], "raw": "- What is the clinical significance of a widened PDL space vs. frank radiolucency?"}, {"type": "p", "text": "The presence of a periapical radiolucency decreases root canal success from 93% to 82% (de Chevigny).", "raw": "The presence of a periapical radiolucency decreases root canal success from 93% to 82% (de Chevigny)."}, {"type": "ul", "items": ["When is CBCT indicated for periapical diagnosis?"], "raw": "- When is CBCT indicated for periapical diagnosis?"}, {"type": "table", "headers": ["Study/Author", "Finding", "Clinical Significance"], "rows": [["Low", "34% of lesions in posterior maxilla missed by traditional radiography compared to CBCT", "Significant diagnostic advantage of CBCT in posterior maxilla"], ["Goldman", "Periapical radiographs interpreted inconsistently: 70% intraobserver reliability, 47% interrater agreement", "Poor reliability of traditional radiographs supports CBCT use"], ["{{cite: Tewary 2011}}", "Only moderate agreement between observers of digital periapical radiographs", "Confirms inconsistency in PA interpretation"], ["Tsai", "Minimum 1.4 mm lesion diameter required for CBCT detection", "Establishes detection threshold for CBCT imaging"], ["Ee", "62% of clinicians changed diagnosis and treatment plan when evaluating cases with CBCT after initially using periapical radiographs", "CBCT significantly impacts clinical decision-making"], ["Aminoshariae", "CBCT is 2× as likely to detect periapical radiolucencies compared to periapical radiographs", "Doubled detection rate for periapical pathology"], ["Dutra", "Accuracy for detecting PARLs: Conventional 73%, Digital 72%, CBCT 96%", "CBCT is significantly more accurate than 2D radiography"]], "raw": "| Study/Author | Finding | Clinical Significance |\n| --- | --- | --- |\n| Low | 34% of lesions in posterior maxilla missed by traditional radiography compared to CBCT | Significant diagnostic advantage of CBCT in posterior maxilla |\n| Goldman | Periapical radiographs interpreted inconsistently: 70% intraobserver reliability, 47% interrater agreement | Poor reliability of traditional radiographs supports CBCT use |\n| {{cite: Tewary 2011}} | Only moderate agreement between observers of digital periapical radiographs | Confirms inconsistency in PA interpretation |\n| Tsai | Minimum 1.4 mm lesion diameter required for CBCT detection | Establishes detection threshold for CBCT imaging |\n| Ee | 62% of clinicians changed diagnosis and treatment plan when evaluating cases with CBCT after initially using periapical radiographs | CBCT significantly impacts clinical decision-making |\n| Aminoshariae | CBCT is 2× as likely to detect periapical radiolucencies compared to periapical radiographs | Doubled detection rate for periapical pathology |\n| Dutra | Accuracy for detecting PARLs: Conventional 73%, Digital 72%, CBCT 96% | CBCT is significantly more accurate than 2D radiography |"}, {"type": "ul", "items": ["When is CBCT NOT indicated for endodontic diagnosis?"], "raw": "- When is CBCT NOT indicated for endodontic diagnosis?"}, {"type": "p", "text": "CBCT is not justified when: (1) a diagnostic-quality periapical radiograph is sufficient to answer the clinical question; (2) the CBCT finding would not change the treatment plan; or (3) the purpose is routine follow-up of straightforward cases where 2D healing assessment is adequate. The radiation dose of CBCT ranges from 40–500 µSv depending on field of view, compared with 1–8 µSv for a single periapical radiograph — a 10 to 100× difference. Even small-field (limited) CBCT (~40 µSv) substantially exceeds periapical radiography. CBCT is justified when the expected diagnostic yield is high and the finding will materially change clinical management — for example, detecting missed canals in retreatment, assessing resorption extent, evaluating surgical access, or characterizing complex anatomy prior to a high-difficulty case. The AAE and AAO 2015 Joint Position Statement recommends case-by-case selection: ordering CBCT only when the clinical benefit outweighs the additional radiation dose {{cite: AAE and AAO 2015 joint position statement — CBCT indicated only when expected diagnostic benefit outweighs added radiation dose; not for routine diagnosis when PA radiography is sufficient}}.", "raw": "CBCT is not justified when: (1) a diagnostic-quality periapical radiograph is sufficient to answer the clinical question; (2) the CBCT finding would not change the treatment plan; or (3) the purpose is routine follow-up of straightforward cases where 2D healing assessment is adequate. The radiation dose of CBCT ranges from 40–500 µSv depending on field of view, compared with 1–8 µSv for a single periapical radiograph — a 10 to 100× difference. Even small-field (limited) CBCT (~40 µSv) substantially exceeds periapical radiography. CBCT is justified when the expected diagnostic yield is high and the finding will materially change clinical management — for example, detecting missed canals in retreatment, assessing resorption extent, evaluating surgical access, or characterizing complex anatomy prior to a high-difficulty case. The AAE and AAO 2015 Joint Position Statement recommends case-by-case selection: ordering CBCT only when the clinical benefit outweighs the additional radiation dose {{cite: AAE and AAO 2015 joint position statement — CBCT indicated only when expected diagnostic benefit outweighs added radiation dose; not for routine diagnosis when PA radiography is sufficient}}."}, {"type": "ul", "items": ["What is the clinical significance of maxillary molar root proximity to the maxillary sinus?"], "raw": "- What is the clinical significance of maxillary molar root proximity to the maxillary sinus?"}, {"type": "p", "text": "Pagin et al found that 14% of maxillary molar roots perforate the maxillary sinus — an important consideration in pre-operative assessment and when evaluating CBCT imaging {{cite: Pagin — 14% of maxillary molar roots perforate the maxillary sinus}}. Shanbhag found that maxillary sinus mucositis is 9x more likely adjacent to molars with apical periodontitis, underscoring the importance of treating apical disease in this region {{cite: Shanbhag — Maxillary sinus mucositis 9x more likely adjacent to molars with apical periodontitis}}.", "raw": "Pagin et al found that 14% of maxillary molar roots perforate the maxillary sinus — an important consideration in pre-operative assessment and when evaluating CBCT imaging {{cite: Pagin — 14% of maxillary molar roots perforate the maxillary sinus}}. Shanbhag found that maxillary sinus mucositis is 9x more likely adjacent to molars with apical periodontitis, underscoring the importance of treating apical disease in this region {{cite: Shanbhag — Maxillary sinus mucositis 9x more likely adjacent to molars with apical periodontitis}}."}, {"type": "ul", "items": ["What is stressed pulp syndrome?"], "raw": "- What is stressed pulp syndrome?"}, {"type": "p", "text": "Stressed pulp syndrome, described by Abou-Rass, refers to the concept that a tooth's cumulative history of injury and restorative treatment progressively reduces pulp resilience and increases susceptibility to necrosis. These teeth often show a blunted or decreased response to cold testing compared to healthy teeth.", "raw": "Stressed pulp syndrome, described by Abou-Rass, refers to the concept that a tooth's cumulative history of injury and restorative treatment progressively reduces pulp resilience and increases susceptibility to necrosis. These teeth often show a blunted or decreased response to cold testing compared to healthy teeth."}]}, {"id": "s1-diagnosis-and-case-assessment-13-crackfracture-identification-and-prognosis", "number": "1.3", "title": "Crack/Fracture Identification and Prognosis", "level": 2, "blocks": [{"type": "ul", "items": ["What clinical and radiographic signs suggest a cracked tooth?"], "raw": "- What clinical and radiographic signs suggest a cracked tooth?"}, {"type": "p", "text": "The classic symptomatic presentation is sharp, electric pain on bite loading that is relieved on release — a pattern distinct from the sustained aching of periapical pathology. Cold hypersensitivity that is brief and sharp is common when the pulp is involved. The key diagnostic tools and signs are:", "raw": "The classic symptomatic presentation is sharp, electric pain on bite loading that is relieved on release — a pattern distinct from the sustained aching of periapical pathology. Cold hypersensitivity that is brief and sharp is common when the pulp is involved. The key diagnostic tools and signs are:"}, {"type": "ul", "items": ["**Tooth Slooth or bite stick:** Load individual cusps in isolation to reproduce pain and localize to a specific cusp. Pain on biting one cusp but not adjacent cusps is pathognomonic for a crack in that cusp's supporting structure.", "**Transillumination:** Shine the curing light or fiberoptic at the tooth surface in a darkened field. A crack line blocks the passage of light, producing a shadow that stops abruptly at the fracture plane — distinguishing a crack from a craze line, which allows light through.", "**Dye staining:** Apply methylene blue or Gentian violet dye to the cleaned tooth surface; cracks take up dye while intact enamel does not. Useful for delineating crack extent on the occlusal surface and into the dentin.", "**Narrow isolated probing depth:** A pocket 4–6 mm deep on a single surface in an otherwise periodontally healthy patient is a cardinal sign — bacteria track along the crack into the PDL, creating a linear defect rather than the circumferential bone loss of periodontal disease.", "**Radiographic signs:** J-shaped radiolucency adjacent to a single root (not circumferential), isolated PDL widening along the crack, or a radiopaque line in the dentin. CBCT can reveal the crack path, its apical extent, and any associated bone loss not visible on 2D radiographs."], "raw": "- **Tooth Slooth or bite stick:** Load individual cusps in isolation to reproduce pain and localize to a specific cusp. Pain on biting one cusp but not adjacent cusps is pathognomonic for a crack in that cusp's supporting structure.\n- **Transillumination:** Shine the curing light or fiberoptic at the tooth surface in a darkened field. A crack line blocks the passage of light, producing a shadow that stops abruptly at the fracture plane — distinguishing a crack from a craze line, which allows light through.\n- **Dye staining:** Apply methylene blue or Gentian violet dye to the cleaned tooth surface; cracks take up dye while intact enamel does not. Useful for delineating crack extent on the occlusal surface and into the dentin.\n- **Narrow isolated probing depth:** A pocket 4–6 mm deep on a single surface in an otherwise periodontally healthy patient is a cardinal sign — bacteria track along the crack into the PDL, creating a linear defect rather than the circumferential bone loss of periodontal disease.\n- **Radiographic signs:** J-shaped radiolucency adjacent to a single root (not circumferential), isolated PDL widening along the crack, or a radiopaque line in the dentin. CBCT can reveal the crack path, its apical extent, and any associated bone loss not visible on 2D radiographs."}, {"type": "p", "text": "{{cite: Berman and Kuttler 2010 — cracked tooth produces sharp pain on bite loading of a single cusp relieved on release; narrow isolated probing depth is a hallmark clinical sign}}", "raw": "{{cite: Berman and Kuttler 2010 — cracked tooth produces sharp pain on bite loading of a single cusp relieved on release; narrow isolated probing depth is a hallmark clinical sign}}"}, {"type": "ul", "items": ["How do you differentiate craze lines from true cracks?"], "raw": "- How do you differentiate craze lines from true cracks?"}, {"type": "p", "text": "Craze lines are superficial enamel microfractures confined above the enamel-dentin junction (EDJ). They are extremely common in adult teeth, cause no symptoms, require no treatment, and are of no clinical significance beyond aesthetics. True cracks extend through or beyond the EDJ into dentin and may propagate toward the pulp chamber or root.", "raw": "Craze lines are superficial enamel microfractures confined above the enamel-dentin junction (EDJ). They are extremely common in adult teeth, cause no symptoms, require no treatment, and are of no clinical significance beyond aesthetics. True cracks extend through or beyond the EDJ into dentin and may propagate toward the pulp chamber or root."}, {"type": "p", "text": "Key clinical differentiation:", "raw": "Key clinical differentiation:"}, {"type": "table", "headers": ["Feature", "Craze Line", "True Crack"], "rows": [["Symptoms", "None", "Pain on bite loading, cold sensitivity"], ["Dye uptake", "None", "Takes up methylene blue or Gentian violet"], ["Transillumination", "Light passes through", "Light blocked at fracture plane (shadow)"], ["Probing", "Normal", "Narrow isolated deep probing if involving PDL"], ["Treatment", "None", "Depends on depth (see below)"]], "raw": "| Feature | Craze Line | True Crack |\n| --- | --- | --- |\n| Symptoms | None | Pain on bite loading, cold sensitivity |\n| Dye uptake | None | Takes up methylene blue or Gentian violet |\n| Transillumination | Light passes through | Light blocked at fracture plane (shadow) |\n| Probing | Normal | Narrow isolated deep probing if involving PDL |\n| Treatment | None | Depends on depth (see below) |"}, {"type": "p", "text": "Depth determines prognosis and treatment: crack limited to enamel → no treatment or crown for protection; crack extending to dentin but not the chamber → may respond to crown; crack reaching the pulp chamber → RCT + crown; crack propagating into the root → guarded to poor prognosis; VRF (vertical root fracture) → extraction (multirooted exception: root resection). {{cite: Kang 2016 — 5-year survival of cracked teeth: 95% without pulp chamber involvement, 81% with chamber involvement}}", "raw": "Depth determines prognosis and treatment: crack limited to enamel → no treatment or crown for protection; crack extending to dentin but not the chamber → may respond to crown; crack reaching the pulp chamber → RCT + crown; crack propagating into the root → guarded to poor prognosis; VRF (vertical root fracture) → extraction (multirooted exception: root resection). {{cite: Kang 2016 — 5-year survival of cracked teeth: 95% without pulp chamber involvement, 81% with chamber involvement}}"}, {"type": "ul", "items": ["What is the prognosis for different crack patterns (cracked tooth, split tooth, VRF)?"], "raw": "- What is the prognosis for different crack patterns (cracked tooth, split tooth, VRF)?"}, {"type": "p", "text": "Cracked teeth: 95% without pulpal chamber involvement at 5 years. 81% with chamber involvement at five years {{cite: Kang 2016 — 5-year survival of cracked teeth: 95% without chamber involvement, 81% with chamber involvement}}.", "raw": "Cracked teeth: 95% without pulpal chamber involvement at 5 years. 81% with chamber involvement at five years {{cite: Kang 2016 — 5-year survival of cracked teeth: 95% without chamber involvement, 81% with chamber involvement}}."}, {"type": "ul", "items": ["{{cite: Sim — fracture extending to the pulpal floor decreases five-year survival by 11×}}"], "raw": "- {{cite: Sim — fracture extending to the pulpal floor decreases five-year survival by 11×}}"}, {"type": "p", "text": "Split tooth: May be saved with root resection, but generally hopeless", "raw": "Split tooth: May be saved with root resection, but generally hopeless"}, {"type": "p", "text": "VRF: Hopeless unless it is a multirooted tooth in which the resected root can be removed, then >90% survival over 10 years) {{cite: Carnevale 1998}}", "raw": "VRF: Hopeless unless it is a multirooted tooth in which the resected root can be removed, then >90% survival over 10 years) {{cite: Carnevale 1998}}"}, {"type": "ul", "items": ["What role does transillumination play and what are its limitations?"], "raw": "- What role does transillumination play and what are its limitations?"}, {"type": "p", "text": "Transillumination helps distinguish superficial craze lines from deeper cracks, but its usefulness is limited to coronal cracks and it does not reliably reveal the apical extent of a crack.", "raw": "Transillumination helps distinguish superficial craze lines from deeper cracks, but its usefulness is limited to coronal cracks and it does not reliably reveal the apical extent of a crack."}, {"type": "ul", "items": ["What is the outcome of crowned cracked teeth?"], "raw": "- What is the outcome of crowned cracked teeth?"}, {"type": "p", "text": "21% of symptomatic vital cracked teeth that received crowns go on to develop irreversible pulpitis or necrosis (Krell and Rivera). 89% of patients with cracked teeth experience complete resolution of symptoms with full coverage temporary placement (Guthrie and DiFiore).", "raw": "21% of symptomatic vital cracked teeth that received crowns go on to develop irreversible pulpitis or necrosis (Krell and Rivera). 89% of patients with cracked teeth experience complete resolution of symptoms with full coverage temporary placement (Guthrie and DiFiore)."}]}, {"id": "s1-diagnosis-and-case-assessment-14-restorability-assessment", "number": "1.4", "title": "Restorability Assessment", "level": 2, "blocks": [{"type": "ul", "items": ["What are the criteria for determining a tooth is non-restorable?"], "raw": "- What are the criteria for determining a tooth is non-restorable?"}, {"type": "p", "text": "Restorative: Insufficient ferrule, deep/sub osseous caries, unfavorable crown to root ratio.", "raw": "Restorative: Insufficient ferrule, deep/sub osseous caries, unfavorable crown to root ratio."}, {"type": "p", "text": "Perio: Severe bone loss, grade III mobility, advanced non-cleansable furcation involvement", "raw": "Perio: Severe bone loss, grade III mobility, advanced non-cleansable furcation involvement"}, {"type": "p", "text": "VRFs, extensive/non-reparable root perforations, extensive resorption", "raw": "VRFs, extensive/non-reparable root perforations, extensive resorption"}, {"type": "ul", "items": ["How does ferrule effect influence endodontic treatment decisions?"], "raw": "- How does ferrule effect influence endodontic treatment decisions?"}, {"type": "p", "text": "The recommended ferrule is 1.5–2 mm of vertical wall, circumferentially, to support the core and crown and resist fracture.", "raw": "The recommended ferrule is 1.5–2 mm of vertical wall, circumferentially, to support the core and crown and resist fracture."}, {"type": "ul", "items": ["When should crown lengthening be considered vs. extraction?"], "raw": "- When should crown lengthening be considered vs. extraction?"}, {"type": "p", "text": "When 3 mm of biologic width can be established without compromising esthetics or causing a <1:1 crown: root ratio.", "raw": "When 3 mm of biologic width can be established without compromising esthetics or causing a <1:1 crown: root ratio."}]}, {"id": "s1-diagnosis-and-case-assessment-15-periodontal-endodontic-lesion-differentiation", "number": "1.5", "title": "Periodontal-Endodontic Lesion Differentiation", "level": 2, "blocks": [{"type": "ul", "items": ["What are the distinguishing features of primary endodontic vs. primary periodontal lesions?"], "raw": "- What are the distinguishing features of primary endodontic vs. primary periodontal lesions?"}, {"type": "p", "text": "The key diagnostic feature is pulp vitality testing: a vital pulp rules out a primary endodontic etiology. Clinically, a narrow, deep isolated probing depth suggests an endodontic source (sinus tract draining through the PDL), while broad, widespread bone loss is characteristic of a primary periodontal origin. In a primary endodontic lesion with secondary periodontal involvement (Simon classification), the endodontic lesion drains through the PDL pocket, producing a narrow, deep, isolated probing depth. Harrington described this as a sinus tract through the PDL space originating from a periapical or lateral lesion — treatment with endodontic therapy alone is appropriate {{cite: Harrington — Primary endo lesion draining via PDL produces narrow isolated probing; endodontic tx alone is appropriate}}.", "raw": "The key diagnostic feature is pulp vitality testing: a vital pulp rules out a primary endodontic etiology. Clinically, a narrow, deep isolated probing depth suggests an endodontic source (sinus tract draining through the PDL), while broad, widespread bone loss is characteristic of a primary periodontal origin. In a primary endodontic lesion with secondary periodontal involvement (Simon classification), the endodontic lesion drains through the PDL pocket, producing a narrow, deep, isolated probing depth. Harrington described this as a sinus tract through the PDL space originating from a periapical or lateral lesion — treatment with endodontic therapy alone is appropriate {{cite: Harrington — Primary endo lesion draining via PDL produces narrow isolated probing; endodontic tx alone is appropriate}}."}, {"type": "p", "text": "Theoretically, extensive periodontal involvement could cause endodontic disease (primary perio, secondary endo — Simon classification). However, Langeland found that periodontal pathology is unlikely to cause endodontic involvement UNLESS the lesion reaches the apex {{cite: Langeland — Perio pathology unlikely to cause endo involvement unless lesion reaches the apex}}. Supporting this, Neves (2017) found that once periodontal bone loss nears the apex, pulp sensitivity responses are affected, suggesting degenerative pulpal changes {{cite: Neves 2017 — Once perio bone loss nears the apex, pulp sensitivity is affected, suggesting pulpal degeneration}}.", "raw": "Theoretically, extensive periodontal involvement could cause endodontic disease (primary perio, secondary endo — Simon classification). However, Langeland found that periodontal pathology is unlikely to cause endodontic involvement UNLESS the lesion reaches the apex {{cite: Langeland — Perio pathology unlikely to cause endo involvement unless lesion reaches the apex}}. Supporting this, Neves (2017) found that once periodontal bone loss nears the apex, pulp sensitivity responses are affected, suggesting degenerative pulpal changes {{cite: Neves 2017 — Once perio bone loss nears the apex, pulp sensitivity is affected, suggesting pulpal degeneration}}."}, {"type": "ul", "items": ["How does treatment sequence differ for combined lesions?"], "raw": "- How does treatment sequence differ for combined lesions?"}, {"type": "p", "text": "Gupta found faster healing when periodontal therapy is performed concurrently with endodontic therapy in noncommunicating endo-perio pathosis {{cite: Gupta — Concurrent perio and endo therapy yields faster healing in noncommunicating endo-perio lesions}}. Harrington established there is no reason to expect reduced success of periodontal procedures in endodontically treated teeth. Expedient treatment of both diseases simultaneously improves outcomes.", "raw": "Gupta found faster healing when periodontal therapy is performed concurrently with endodontic therapy in noncommunicating endo-perio pathosis {{cite: Gupta — Concurrent perio and endo therapy yields faster healing in noncommunicating endo-perio lesions}}. Harrington established there is no reason to expect reduced success of periodontal procedures in endodontically treated teeth. Expedient treatment of both diseases simultaneously improves outcomes."}, {"type": "ul", "items": ["What is the prognosis for true combined lesions?"], "raw": "- What is the prognosis for true combined lesions?"}, {"type": "p", "text": "True combined lesions — where independent endodontic and periodontal infections extend enough to coalesce — do exist but are rare (Harrington). Vertical root fractures (VRFs) and perforations can clinically mimic combined endo-perio lesions but are NOT true combined lesions and carry a substantially worse prognosis. True combined lesions have a guarded prognosis depending on the extent of periodontal destruction and the patient's response to periodontal therapy after endodontic treatment.", "raw": "True combined lesions — where independent endodontic and periodontal infections extend enough to coalesce — do exist but are rare (Harrington). Vertical root fractures (VRFs) and perforations can clinically mimic combined endo-perio lesions but are NOT true combined lesions and carry a substantially worse prognosis. True combined lesions have a guarded prognosis depending on the extent of periodontal destruction and the patient's response to periodontal therapy after endodontic treatment."}, {"type": "ul", "items": ["How do you evaluate healing in endo-perio cases?"], "raw": "- How do you evaluate healing in endo-perio cases?"}, {"type": "p", "text": "Healing is evaluated by resolution of symptoms, probing depth reduction, and radiographic bone fill over time. After endodontic treatment of a primary endodontic lesion, the isolated deep pocket should improve if the periodontal component is truly secondary. Persistent or worsening probing depths after endodontic treatment suggest a true combined lesion or an unresolved primary periodontal component requiring periodontal therapy.", "raw": "Healing is evaluated by resolution of symptoms, probing depth reduction, and radiographic bone fill over time. After endodontic treatment of a p
