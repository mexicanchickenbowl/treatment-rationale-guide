t reports choking"}, {"letter": "D", "text": "The tooth must be extracted if aspiration occurs"}], "correctAnswer": "B", "explanation": "Aspiration of instruments, obturation materials, or other items during endodontic treatment is a serious complication requiring immediate assessment. Medical consultation and potentially radiographic imaging may be necessary to determine the location and nature of the aspirated object.", "answer": "B"}, {"id": 65, "chapter": 13, "chapterTitle": "Complications", "number": 165, "question": "According to the textbook, what is the prevention strategy for aspiration and ingestion accidents?", "options": [{"letter": "A", "text": "Prevention is impossible; aspiration is an unavoidable consequence of treatment"}, {"letter": "B", "text": "Use of rubber dam isolation, tray placement, and careful instrument handling are essential"}, {"letter": "C", "text": "Aspiration only occurs with careless operators"}, {"letter": "D", "text": "Prevention is unnecessary if the patient is aware"}], "correctAnswer": "B", "explanation": "Prevention of aspiration and ingestion accidents requires use of rubber dam isolation to secure the tooth, placement of items in a stable tray, use of floss ligatures on instruments when possible, and careful handling and placement of materials.", "answer": "B"}, {"id": 66, "chapter": 13, "chapterTitle": "Complications", "number": 166, "question": "What is the primary clinical consequence of instrument separation in the coronal or middle third of the canal?", "options": [{"letter": "A", "text": "It has minimal impact on treatment success"}, {"letter": "B", "text": "It can usually be retrieved, but if not, it significantly compromises treatment success"}, {"letter": "C", "text": "It improves treatment success by creating an internal stop"}, {"letter": "D", "text": "Separation has no effect on treatment outcome"}], "correctAnswer": "B", "explanation": "Instrument separation in the coronal or middle third is more problematic than apical separation because retrieval is more feasible in these accessible locations. If retrieval fails, the fragment prevents complete cleaning and obturation of the apical third.", "answer": "B"}, {"id": 67, "chapter": 13, "chapterTitle": "Complications", "number": 167, "question": "According to the textbook, what is the relationship between patient anxiety and intraoperative complications?", "options": [{"letter": "A", "text": "Anxiety has no effect on complication rates"}, {"letter": "B", "text": "Anxious patients experience fewer complications"}, {"letter": "C", "text": "Anxiety can increase risk of complications through muscle tension and patient movement"}, {"letter": "D", "text": "Anxiety is beneficial as it keeps the patient alert"}], "correctAnswer": "C", "explanation": "Patient anxiety can increase the risk of intraoperative complications by causing muscle tension, involuntary movement, or difficulty cooperating with the procedure. Proper anxiety management is important for treatment safety and success.", "answer": "C"}, {"id": 68, "chapter": 13, "chapterTitle": "Complications", "number": 168, "question": "What is the recommended approach for managing a patient with a history of treatment anxiety during endodontic therapy?", "options": [{"letter": "A", "text": "Proceed with standard treatment; anxiety should not affect treatment approach"}, {"letter": "B", "text": "Consider sedation options, shorter appointments, or behavioral techniques"}, {"letter": "C", "text": "Extract the tooth to avoid anxiety exposure"}, {"letter": "D", "text": "Force exposure therapy by continuing despite anxiety"}], "correctAnswer": "B", "explanation": "Patients with treatment anxiety should be accommodated through consideration of sedation options, shorter appointment intervals, relaxation techniques, and behavioral management. This improves cooperation, reduces complication risk, and improves treatment outcomes.", "answer": "B"}, {"id": 69, "chapter": 13, "chapterTitle": "Complications", "number": 169, "question": "According to the textbook, what is the primary cause of inaccurate working length determination using electronic apex locators?", "options": [{"letter": "A", "text": "Electronic apex locators are inherently inaccurate"}, {"letter": "B", "text": "Improper electrode placement or moisture-related conditions can reduce accuracy"}, {"letter": "C", "text": "Electronic devices are always more accurate than radiographs"}, {"letter": "D", "text": "Accuracy is unrelated to technique"}], "correctAnswer": "B", "explanation": "Electronic apex locators are generally accurate, but accuracy can be compromised by improper electrode placement, excessive moisture or blood in the canal, or proximity to metal restorations. Calibration before use and radiographic confirmation are recommended.", "answer": "B"}, {"id": 70, "chapter": 13, "chapterTitle": "Complications", "number": 170, "question": "What is the clinical significance of discovering a root fracture during endodontic treatment?", "options": [{"letter": "A", "text": "Root fracture has no effect on treatment planning"}, {"letter": "B", "text": "Root fracture significantly compromises tooth prognosis and may warrant extraction"}, {"letter": "C", "text": "Root fracture improves treatment success"}, {"letter": "D", "text": "Fractures can be managed without affecting treatment"}], "correctAnswer": "B", "explanation": "Discovery of a root fracture during endodontic treatment significantly compromises tooth prognosis due to the pathway it creates for bacterial leakage and communication between the root canal system and periodontal tissues. Extraction may be indicated depending on fracture location and extent.", "answer": "B"}, {"id": 71, "chapter": 13, "chapterTitle": "Complications", "number": 171, "question": "According to the textbook, what is the recommended approach for a horizontal root fracture in the apical third?", "options": [{"letter": "A", "text": "Extract the tooth due to poor prognosis"}, {"letter": "B", "text": "Obturate the coronal portion and monitor the fracture"}, {"letter": "C", "text": "The coronal fragment will separate and exfoliate"}, {"letter": "D", "text": "Fractures do not require treatment"}], "correctAnswer": "B", "explanation": "Horizontal root fractures in the apical third may have better prognosis if the fracture is not severely displaced. Obturation of the coronal portion and careful monitoring are appropriate management approaches.", "answer": "B"}, {"id": 72, "chapter": 13, "chapterTitle": "Complications", "number": 172, "question": "What is the primary complication of excessive pressure during lateral condensation of gutta-percha?", "options": [{"letter": "A", "text": "Improved apical seal and treatment success"}, {"letter": "B", "text": "Root fracture and extrusion of obturation material"}, {"letter": "C", "text": "Better obturation of lateral canals"}, {"letter": "D", "text": "No complications from excessive pressure"}], "correctAnswer": "B", "explanation": "Excessive pressure during lateral condensation of gutta-percha can cause root fracture, apical extrusion of obturation material, and other complications. Controlled, steady pressure with appropriate condensation instruments is recommended.", "answer": "B"}, {"id": 73, "chapter": 13, "chapterTitle": "Complications", "number": 173, "question": "According to the textbook, what is the relationship between prolonged treatment time and complication risk?", "options": [{"letter": "A", "text": "Treatment duration has no effect on complications"}, {"letter": "B", "text": "Longer appointments increase patient fatigue and complication risk"}, {"letter": "C", "text": "Extended treatment time improves outcomes and reduces complications"}, {"letter": "D", "text": "Duration is irrelevant to patient safety"}], "correctAnswer": "B", "explanation": "Prolonged treatment appointments increase patient fatigue, muscle tension, and risk of involuntary movement. This increases complication risk including aspiration, inhalation, and technical errors. Scheduling multiple appointments for complex cases is often advisable.", "answer": "B"}, {"id": 74, "chapter": 13, "chapterTitle": "Complications", "number": 174, "question": "What is the clinical significance of inadequate access opening for endodontic treatment?", "options": [{"letter": "A", "text": "Inadequate access has no effect on treatment"}, {"letter": "B", "text": "Inadequate access compromises visualization and increases risk of ledge, perforation, and missed canals"}, {"letter": "C", "text": "Inadequate access actually improves treatment by reducing trauma"}, {"letter": "D", "text": "Access size is irrelevant to treatment success"}], "correctAnswer": "B", "explanation": "Inadequate access opening compromises visualization of the pulp chamber and canal orifices, increasing the risk of iatrogenic complications including ledge formation, perforation, and missed canals. Proper access opening is essential for safe, successful treatment.", "answer": "B"}, {"id": 75, "chapter": 13, "chapterTitle": "Complications", "number": 175, "question": "According to the textbook, what is the recommended management of strip perforation (perforation along the root wall)?", "options": [{"letter": "A", "text": "Strip perforations can be ignored without management"}, {"letter": "B", "text": "Extract the tooth due to poor prognosis"}, {"letter": "C", "text": "Identify location precisely and seal if accessible; monitor if not accessible"}, {"letter": "D", "text": "Strip perforations always result in treatment failure"}], "correctAnswer": "C", "explanation": "Strip perforations should be identified precisely and sealed if they are accessible. If not accessible during treatment, the patient should be informed and the tooth monitored. The prognosis depends on the size and location of the perforation.", "answer": "C"}, {"id": 76, "chapter": 13, "chapterTitle": "Complications", "number": 176, "question": "What is the primary clinical consequence of blockage of a canal orifice?", "options": [{"letter": "A", "text": "Blockage improves treatment success by reducing contamination"}, {"letter": "B", "text": "Blockage prevents instrumentation and treatment of the affected canal"}, {"letter": "C", "text": "Blockage has no clinical consequence"}, {"letter": "D", "text": "Blocked canals automatically drain into adjacent canals"}], "correctAnswer": "B", "explanation": "Blockage of a canal orifice, whether by calcification, instruments, or other obstruction, prevents access and treatment of that canal. This results in an untreated canal system and is a significant cause of treatment failure.", "answer": "B"}, {"id": 77, "chapter": 13, "chapterTitle": "Complications", "number": 177, "question": "According to the textbook, what is the relationship between inadequate obturation and long-term treatment success?", "options": [{"letter": "A", "text": "Inadequate obturation has no effect on success"}, {"letter": "B", "text": "Inadequate obturation significantly increases failure rates"}, {"letter": "C", "text": "Inadequate obturation actually improves success"}, {"letter": "D", "text": "Success is determined entirely by access quality"}], "correctAnswer": "B", "explanation": "Inadequate obturation, whether underfilled or with voids, significantly increases endodontic treatment failure rates. Untreated canal portions and voids allow bacterial growth and leakage, compromising long-term success.", "answer": "B"}, {"id": 78, "chapter": 13, "chapterTitle": "Complications", "number": 178, "question": "What is the primary complication of using too large a primary gutta-percha cone during obturation?", "options": [{"letter": "A", "text": "Improved apical adaptation and seal"}, {"letter": "B", "text": "Inability to place lateral condensation and inadequate sealing"}, {"letter": "C", "text": "Better treatment success"}, {"letter": "D", "text": "No complications from large cones"}], "correctAnswer": "B", "explanation": "Using a gutta-percha cone that is too large for the canal prevents adequate placement of lateral condensation and sealer, resulting in inadequate obturation and voids. The primary cone should have an apical fit that allows room for lateral condensation.", "answer": "B"}, {"id": 79, "chapter": 13, "chapterTitle": "Complications", "number": 179, "question": "According to the textbook, what is the recommended management of a missed buccal canal in a maxillary molar?", "options": [{"letter": "A", "text": "The missed canal can be ignored without consequences"}, {"letter": "B", "text": "Locate and treat the canal; if not accessible, consider retreatment or surgical treatment"}, {"letter": "C", "text": "Extract the tooth due to treatment failure"}, {"letter": "D", "text": "Missed canals automatically self-seal"}], "correctAnswer": "B", "explanation": "Missed buccal canals in maxillary molars represent significant treatment failure because they remain a source of infection. Attempts should be made to locate and treat these canals; if unsuccessful, retreatment or surgical treatment should be considered.", "answer": "B"}, {"id": 80, "chapter": 13, "chapterTitle": "Complications", "number": 180, "question": "What is the primary clinical consequence of inadequate disinfection of the root canal system?", "options": [{"letter": "A", "text": "Inadequate disinfection has no effect on treatment success"}, {"letter": "B", "text": "Remaining bacteria and inflammatory mediators compromise healing and increase failure risk"}, {"letter": "C", "text": "Poor disinfection actually improves treatment success"}, {"letter": "D", "text": "Disinfection quality is irrelevant to long-term outcomes"}], "correctAnswer": "B", "explanation": "Inadequate disinfection of the root canal system leaves bacterial biofilm and inflammatory mediators that compromise periapical healing and increase the risk of treatment failure. Proper irrigation, instrumentation, and intracanal medication are essential for adequate disinfection.", "answer": "B"}, {"id": 81, "chapter": 13, "chapterTitle": "Complications", "number": 181, "question": "According to the textbook, what is the primary advantage of using an operating microscope or magnification system during endodontic treatment?", "options": [{"letter": "A", "text": "Magnification is unnecessary for treatment success"}, {"letter": "B", "text": "Enhanced visualization reduces risk of ledge, perforation, and missed canals"}, {"letter": "C", "text": "Magnification increases treatment time without benefit"}, {"letter": "D", "text": "Magnification is only useful for anterior teeth"}], "correctAnswer": "B", "explanation": "Magnification through operating microscope or magnifying loupes enhances visualization of the pulp chamber, canal orifices, and canal anatomy. This significantly reduces the risk of iatrogenic complications including ledge formation, perforation, and missed canals.", "answer": "B"}, {"id": 82, "chapter": 13, "chapterTitle": "Complications", "number": 182, "question": "What is the relationship between thermoplasticization of gutta-percha and the risk of apical extrusion?", "options": [{"letter": "A", "text": "Thermoplasticization prevents apical extrusion"}, {"letter": "B", "text": "Thermoplasticization may increase risk of apical extrusion if excessive force is applied"}, {"letter": "C", "text": "Thermoplasticization has no effect on extrusion risk"}, {"letter": "D", "text": "All thermoplastic techniques prevent extrusion"}], "correctAnswer": "B", "explanation": "Thermoplasticization of gutta-percha through heat softening allows better adaptation to canal anatomy but requires careful pressure control. Excessive pressure with thermoplastic condensation techniques can force material beyond the apical foramen.", "answer": "B"}, {"id": 83, "chapter": 13, "chapterTitle": "Complications", "number": 183, "question": "According to the textbook, what is the primary clinical consequence of leaving calcium hydroxide in the root canal indefinitely without final obturation?", "options": [{"letter": "A", "text": "Indefinite calcium hydroxide placement prevents reinfection"}, {"letter": "B", "text": "The tooth is left without a permanent apical seal and remains at risk for reinfection"}, {"letter": "C", "text": "Calcium hydroxide dissolves and provides permanent sealing"}, {"letter": "D", "text": "Extended dressing time improves treatment success"}], "correctAnswer": "B", "explanation": "Leaving calcium hydroxide in the canal indefinitely without final obturation leaves the tooth without a permanent apical seal. The tooth remains at risk for bacterial contamination and reinfection. Final obturation with gutta-percha and sealer should be completed once disinfection is achieved.", "answer": "B"}, {"id": 84, "chapter": 13, "chapterTitle": "Complications", "number": 184, "question": "What is the recommended management approach for a patient with severe gag reflex who becomes unconscious during endodontic treatment?", "options": [{"letter": "A", "text": "Continue treatment while the patient is unconscious"}, {"letter": "B", "text": "Immediately stop treatment, remove any obstructions, check vital signs, and seek emergency medical assistance"}, {"letter": "C", "text": "Postpone treatment indefinitely"}, {"letter": "D", "text": "Proceed carefully without modification"}], "correctAnswer": "B", "explanation": "Loss of consciousness during treatment requires immediate cessation, removal of any materials from the mouth, assessment of vital signs, and emergency medical assistance. This is potentially a serious complication requiring appropriate response.", "answer": "B"}, {"id": 85, "chapter": 13, "chapterTitle": "Complications", "number": 185, "question": "According to the textbook, what is the primary complication of excessive enlargement of the apical foramen during instrumentation?", "options": [{"letter": "A", "text": "Better cleaning of the apical region"}, {"letter": "B", "text": "Zipping and apical transportation, making apical seal difficult"}, {"letter": "C", "text": "Improved treatment success"}, {"letter": "D", "text": "No clinical consequence from apical enlargement"}], "correctAnswer": "B", "explanation": "Excessive enlargement of the apical foramen causes zipping and apical transportation that compromises the ability to achieve an adequate apical seal. This significantly reduces treatment success.", "answer": "B"}, {"id": 86, "chapter": 13, "chapterTitle": "Complications", "number": 186, "question": "What is the relationship between operator experience and complication incidence?", "options": [{"letter": "A", "text": "Operator experience has no effect on complications"}, {"letter": "B", "text": "Experienced operators have significantly lower complication rates"}, {"letter": "C", "text": "Novice operators actually have fewer complications due to extra caution"}, {"letter": "D", "text": "Complications are unrelated to operator skill"}], "correctAnswer": "B", "explanation": "Experienced operators consistently achieve lower complication rates through better case selection, improved technique, enhanced problem-solving, and knowledge of how to manage complications when they occur.", "answer": "B"}, {"id": 87, "chapter": 13, "chapterTitle": "Complications", "number": 187, "question": "According to the textbook, what is the primary cause of obturation voids in the root canal system?", "options": [{"letter": "A", "text": "Voids are unavoidable and cannot be prevented"}, {"letter": "B", "text": "Inadequate condensation pressure and improper technique create voids"}, {"letter": "C", "text": "Voids improve treatment success by allowing drainage"}, {"letter": "D", "text": "Voids are clinically insignificant"}], "correctAnswer": "B", "explanation": "Obturation voids result from inadequate lateral and vertical condensation of gutta-percha and sealer. Proper technique with steady pressure and complete condensation is essential to minimize voids and ensure an effective apical seal.", "answer": "B"}, {"id": 88, "chapter": 13, "chapterTitle": "Complications", "number": 188, "question": "What is the clinical significance of sealer-only obturation without gutta-percha core?", "options": [{"letter": "A", "text": "Sealer alone provides adequate obturation"}, {"letter": "B", "text": "Sealer alone is inadequate; gutta-percha core is necessary for three-dimensional seal"}, {"letter": "C", "text": "Sealer obturation is superior to gutta-percha"}, {"letter": "D", "text": "Both methods are equivalent"}], "correctAnswer": "B", "explanation": "Sealer alone is inadequate for obturation because it can dissolve and shrink over time, compromising the seal. Gutta-percha core provides structural stability and, combined with sealer, achieves three-dimensional obturation essential for long-term success.", "answer": "B"}, {"id": 89, "chapter": 13, "chapterTitle": "Complications", "number": 189, "question": "According to the textbook, what is the recommended management of a symptomatic non-restored endodontically treated tooth?", "options": [{"letter": "A", "text": "Continue observation without restoration"}, {"letter": "B", "text": "Prompt placement of coronal restoration to protect the tooth from fracture and reinfection"}, {"letter": "C", "text": "Extract the tooth if symptoms persist"}, {"letter": "D", "text": "Root canal retreatment before restoration"}], "correctAnswer": "B", "explanation": "A symptomatic non-restored endodontically treated tooth is at high risk for fracture and coronal leakage. Prompt placement of a protective coronal restoration is essential to seal the access, provide structural strength, and protect from further complications.", "answer": "B"}, {"id": 90, "chapter": 13, "chapterTitle": "Complications", "number": 190, "question": "What is the primary clinical consequence of color change in the treated tooth following endodontic treatment?", "options": [{"letter": "A", "text": "Color change indicates successful treatment"}, {"letter": "B", "text": "Color change may indicate internal bleeding, dentin discoloration, or other complications requiring investigation"}, {"letter": "C", "text": "Color change is purely cosmetic with no clinical significance"}, {"letter": "D", "text": "Discoloration indicates the tooth should be extracted"}], "correctAnswer": "B", "explanation": "Color change in an endodontically treated tooth may indicate internal bleeding from the obturation process, dentin discoloration from medicament or obturation material, or other complications. Investigation may be necessary to determine the cause.", "answer": "B"}, {"id": 91, "chapter": 13, "chapterTitle": "Complications", "number": 191, "question": "According to the textbook, what is the recommended approach when both surgical and non-surgical retreatment options exist for a failed endodontic case?", "options": [{"letter": "A", "text": "Always choose extraction as the simplest option"}, {"letter": "B", "text": "Non-surgical retreatment should be attempted first, with surgical treatment reserved for cases that fail retreatment"}, {"letter": "C", "text": "Surgical treatment is always superior to non-surgical retreatment"}, {"letter": "D", "text": "Treatment option selection is irrelevant to outcomes"}], "correctAnswer": "B", "explanation": "Non-surgical retreatment should be attempted first due to its lower invasiveness and reasonable success rates (65-75%). Surgical treatment is reserved for cases that fail non-surgical retreatment or where non-surgical approach is not feasible.", "answer": "B"}, {"id": 92, "chapter": 13, "chapterTitle": "Complications", "number": 192, "question": "What is the relationship between the amount of gutta-percha extrusion and the risk of chronic symptoms?", "options": [{"letter": "A", "text": "Extrusion has no effect on symptom risk"}, {"letter": "B", "text": "Larger amounts of extrusion increase risk of inflammation and chronic symptoms"}, {"letter": "C", "text": "Extrusion prevents symptom development"}, {"letter": "D", "text": "Symptom risk is unrelated to extrusion volume"}], "correctAnswer": "B", "explanation": "Larger amounts of gutta-percha extrusion cause greater foreign body reaction and inflammation in periapical tissues, increasing the risk of post-operative pain, swelling, and chronic symptoms.", "answer": "B"}, {"id": 93, "chapter": 13, "chapterTitle": "Complications", "number": 193, "question": "According to the textbook, what is the primary advantage of using a rubber dam clamp with a slight bend or index?", "options": [{"letter": "A", "text": "The bend serves no purpose and is unnecessary"}, {"letter": "B", "text": "The bend allows better stabilization of the dam and improved visibility"}, {"letter": "C", "text": "The bend only affects posterior tooth isolation"}, {"letter": "D", "text": "Clamp design is irrelevant to isolation quality"}], "correctAnswer": "B", "explanation": "A properly indexed rubber dam clamp with appropriate bend provides better stabilization and maintains the dam in proper position, improving visibility and preventing contamination during endodontic treatment.", "answer": "B"}, {"id": 94, "chapter": 13, "chapterTitle": "Complications", "number": 194, "question": "What is the clinical significance of inadvertent contact with the eye during endodontic treatment?", "options": [{"letter": "A", "text": "Eye contact with irrigation materials has no effect"}, {"letter": "B", "text": "Especially with sodium hypochlorite, eye contact causes severe irritation and requires immediate irrigation"}, {"letter": "C", "text": "Eye contact only causes temporary discomfort"}, {"letter": "D", "text": "No precautions are necessary"}], "correctAnswer": "B", "explanation": "Inadvertent contact of sodium hypochlorite or other irrigation materials with the eye causes severe irritation and chemical injury. Immediate and copious irrigation of the eye is necessary. Protective eyewear for both operator and patient is recommended.", "answer": "B"}, {"id": 95, "chapter": 13, "chapterTitle": "Complications", "number": 195, "question": "According to the textbook, what is the primary purpose of periodic evaluation of endodontically treated teeth?", "options": [{"letter": "A", "text": "Evaluation is unnecessary once treatment is completed"}, {"letter": "B", "text": "To identify delayed complications, assess healing, and determine if retreatment is needed"}, {"letter": "C", "text": "Evaluation is only needed if symptoms develop"}, {"letter": "D", "text": "Evaluation has no impact on treatment outcomes"}], "correctAnswer": "B", "explanation": "Periodic evaluation of endodontically treated teeth through clinical and radiographic examination allows identification of delayed complications, assessment of periapical healing, and determination of whether further treatment is needed.", "answer": "B"}, {"id": 96, "chapter": 13, "chapterTitle": "Complications", "number": 196, "question": "What is the relationship between use of intravenous sedation and intraoperative complication risk?", "options": [{"letter": "A", "text": "Sedation has no effect on complication risk"}, {"letter": "B", "text": "Sedation increases patient cooperation and may reduce complication risk"}, {"letter": "C", "text": "Sedation increases aspiration risk and complication rate"}, {"letter": "D", "text": "Sedation is irrelevant to treatment safety"}], "correctAnswer": "B", "explanation": "Appropriate use of intravenous sedation can improve patient cooperation and reduce involuntary movement, potentially reducing complication risk. However, sedation requires appropriate monitoring and management to ensure patient safety.", "answer": "B"}, {"id": 97, "chapter": 13, "chapterTitle": "Complications", "number": 197, "question": "According to the textbook, what is the clinical significance of discovering an underfilled root canal on post-operative radiographs?", "options": [{"letter": "A", "text": "Underfilling has no effect on treatment success"}, { function updateStreak() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (progress.lastStudyDate === today) return;
  if (progress.lastStudyDate === yesterday) {
    progress.streak++;
  } else if (progress.lastStudyDate !== today) {
    progress.streak = progress.lastStudyDate ? 0 : 0;
  }
}
function recordStudyToday() {
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (progress.lastStudyDate !== today) {
    if (progress.lastStudyDate === yesterday) {
      progress.streak++;
    } else {
      progress.streak = 1;
    }
    progress.lastStudyDate = today;
  }
}

function getChapterStats(chNum) {
  const chQuestions = QUESTIONS.filter(q => q.chapter === chNum);
  let attempted = 0, correct = 0, mastered = 0;
  chQuestions.forEach(q => {
    const h = progress.questionHistory[q.id];
    if (h && h.attempts > 0) {
      attempted++;
      if (h.correct > 0) correct++;
      if (h.correct >= 2) mastered++;
    }
  });
  return {
    total: chQuestions.length,
    attempted, correct, mastered,
    pct: attempted > 0 ? Math.round((correct / attempted) * 100) : 0,
    masteryPct: chQuestions.length > 0 ? Math.round((mastered / chQuestions.length) * 100) : 0
  };
}
function getBoardReadiness() {
  let totalWeight = 0, weightedScore = 0;
  CHAPTERS.forEach(ch => {
    const stats = getChapterStats(ch.num);
    const weight = stats.total;
    const recency = getRecencyFactor(ch.num);
    totalWeight += weight;
    weightedScore += (stats.pct / 100) * weight * recency;
  });
  return totalWeight > 0 ? Math.round((weightedScore / totalWeight) * 100) : 0;
}
function getRecencyFactor(chNum) {
  const chQuestions = QUESTIONS.filter(q => q.chapter === chNum);
  let latestSeen = 0;
  chQuestions.forEach(q => {
    const h = progress.questionHistory[q.id];
    if (h && h.lastSeen) latestSeen = Math.max(latestSeen, h.lastSeen);
  });
  if (!latestSeen) return 0.5;
  const daysSince = (Date.now() - latestSeen) / 86400000;
  if (daysSince < 7) return 1;
  if (daysSince < 30) return 0.8;
  return 0.6;
}
function getWeakQuestions() {
  return QUESTIONS.filter(q => {
    const h = progress.questionHistory[q.id];
    return h && h.attempts > 0 && (h.correct / h.attempts) < 0.5;
  });
}
function getUnseenQuestions() {
  return QUESTIONS.filter(q => !progress.questionHistory[q.id]);
}

function startQuiz(mode, chapters) {
  let questions = [];
  const chapterNums = chapters && chapters.length > 0 ? chapters : CHAPTERS.map(c => c.num);
  if (mode === 'study') {
    questions = QUESTIONS.filter(q => chapterNums.includes(q.chapter));
    shuffleArray(questions);
  } else if (mode === 'exam') {
    const pool = QUESTIONS.filter(q => chapterNums.includes(q.chapter));
    shuffleArray(pool);
    questions = pool.slice(0, 50);
  } else if (mode === 'weak') {
    questions = getWeakQuestions().filter(q => chapterNums.includes(q.chapter));
    shuffleArray(questions);
    if (questions.length === 0) {
      questions = getUnseenQuestions().filter(q => chapterNums.includes(q.chapter));
      shuffleArray(questions);
      questions = questions.slice(0, 20);
    }
  } else if (mode === 'quick10') {
    const pool = QUESTIONS.filter(q => chapterNums.includes(q.chapter));
    shuffleArray(pool);
    questions = pool.slice(0, 10);
  } else if (mode === 'flagged') {
    const flaggedIds = Object.keys(progress.flagged || {});
    questions = QUESTIONS.filter(q => flaggedIds.includes(String(q.id)) && chapterNums.includes(q.chapter));
    shuffleArray(questions);
  }
  state.quizMode = mode;
  state.quizQuestions = questions;
  state.currentIndex = 0;
  state.selectedAnswer = null;
  state.answered = false;
  state.sessionResults = [];
  state.screen = 'quiz';
  if (mode === 'exam') {
    state.timerSeconds = 0;
    clearInterval(state.timerInterval);
    state.timerInterval = setInterval(() => {
      state.timerSeconds++;
      const timerEl = document.getElementById('quiz-timer');
      if (timerEl) {
        const mins = Math.floor(state.timerSeconds / 60);
        const secs = state.timerSeconds % 60;
        timerEl.textContent = mins+':'+secs.toString().padStart(2,'0');
      }
    }, 1000);
  }
  render();
}
function selectAnswer(letter) {
  if (state.answered) return;
  state.selectedAnswer = letter;
  state.answered = true;
  const q = state.quizQuestions[state.currentIndex];
  const isCorrect = letter === (q.answer || q.correctAnswer);
  if (!progress.questionHistory[q.id]) {
    progress.questionHistory[q.id] = {attempts: 0, correct: 0, lastSeen: 0};
  }
  progress.questionHistory[q.id].attempts++;
  if (isCorrect) progress.questionHistory[q.id].correct++;
  progress.questionHistory[q.id].lastSeen = Date.now();
  progress.totalQuestions++;
  if (isCorrect) progress.totalCorrect++;
  state.sessionResults.push({questionId: q.id, correct: isCorrect});
  recordStudyToday();
  if (isCorrect) addXP(10);
  else addXP(2);
  saveProgress();
  renderQuizQuestion();
}

  }
}
function finishQuiz() {

  progress.sessionHistory.push({

    mode: state.quizMode,
    score: correct,
    total: total,
    chapters: [...new Set(state.quizQuestions.map(q => q.chapter))]

function shuffleArray(arr) {

    + '<button class="flag-btn '+(isFlagged?'flagged':'')+'" onclick="toggleFlag(\''+q.id+'\')" title="Flag for review">'+(isFlagged?'\u{1F6A9}':'\u{1F3F3}&#xFE0F;')+'</button>'
    + '</div>'
    + '<div class="q-text">'+escHtml(q.question)+'</div>';

  q.options.forEach((opt, i) => {
    const num = i + 1;
    let cls = 'option-btn';
    if (state.answered) {
      if (opt.letter === correctAnswer) cls += ' correct show-correct';
      else if (opt.letter === state.selectedAnswer && opt.letter !== correctAnswer) cls += ' incorrect';
    } else if (state.selectedAnswer === opt.letter) {
      cls += ' selected';
    }
    html += '<button class="'+cls+'" onclick="selectAnswer(\''+opt.letter+'\')" '+(state.answered?'disabled':'')+' data-key="'+num+'">'
      + '<span class="option-num">'+num+'</span> '+escHtml(opt.text)+'</button>';
  });

  if (state.answered) {
    const isCorrect = state.selectedAnswer === correctAnswer;
    html += '<div class="explanation-box show"><strong>'
      + (isCorrect ? '\u2705 Correct!' : '\u274C Incorrect \u2014 Answer: '+correctAnswer)
      + '</strong><br>'+escHtml(q.explanation||'')+'</div>';
  } else {
    html += '<div class="explanation-box"></div>';
    html += '<div class="kbd-hint">Press 1 \u00b7 2 \u00b7 3 \u00b7 4 to answer &nbsp;\u2502&nbsp; F to flag</div>';
  }
  html += '</div>';

  if (state.answered) {
    const isLast = state.currentIndex >= state.quizQuestions.length - 1;
    html += '<button class="next-btn" id="next-btn" onclick="nextQuestion()">'+(isLast ? 'See Results \u279C' : 'Next Question \u279C')+'</button>';
    html += '<div class="kbd-hint" style="margin-bottom:12px">Space or Enter for next &nbsp;\u2502&nbsp; F to flag</div>';
  }

  area.innerHTML = html;

  // Update progress bar
  const fillEl = document.getElementById('quiz-progress-fill');
  if (fillEl) {
    const pct = Math.round(((state.currentIndex + (state.answered ? 1 : 0)) / state.quizQuestions.length) * 100);
    fillEl.style.width = pct + '%';
  }

  setupQuizKeyboard();
}

function setupQuizKeyboard() {
  if (window._quizKeyHandler) document.removeEventListener('keydown', window._quizKeyHandler);
  window._quizKeyHandler = function(e) {
    if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
    if (state.screen !== 'quiz') {
      document.removeEventListener('keydown', window._quizKeyHandler);
      return;
    }
    const q = state.quizQuestions[state.currentIndex];
    if (!q) return;
    if (!state.answered) {
      if (['1','2','3','4'].includes(e.key)) {
        const idx = parseInt(e.key) - 1;
        if (q.options[idx]) selectAnswer(q.options[idx].letter);
      }
    } else {
      if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); nextQuestion(); }
    }
    if (e.key === 'f' || e.key === 'F') toggleFlag(q.id);
  };
  document.addEventListener('keydown', window._quizKeyHandler);
}

function toggleFlag(qid) {
  if (!progress.flagged) progress.flagged = {};
  if (progress.flagged[qid]) delete progress.flagged[qid];
  else progress.flagged[qid] = Date.now();
  saveProgress();
  const btn = document.querySelector('.flag-btn');
  if (btn) {
    const flagged = !!progress.flagged[qid];
    btn.className = 'flag-btn' + (flagged ? ' flagged' : '');
    btn.innerHTML = flagged ? '\u{1F6A9}' : '\u{1F3F3}\uFE0F';
    btn.title = flagged ? 'Flagged for review' : 'Flag for review';
  }
}
function renderResults(app) {
  const correct = state.sessionResults.filter(r => r.correct).length;
  const total = state.sessionResults.length;
  const pct = total > 0 ? Math.round(correct/total*100) : 0;
  const emoji = pct >= 90 ? '&#x1F929;' : pct >= 70 ? '&#x1F44F;' : pct >= 50 ? '&#x1F4AA;' : '&#x1F4DA;';
  const message = pct >= 90 ? 'Outstanding!' : pct >= 70 ? 'Great work!' : pct >= 50 ? 'Keep going!' : 'Review time!';
  let html = '<div class="quiz-wrapper"><div class="quiz-header"><button class="quiz-back" onclick="state.screen=\'dashboard\';render()">&#x2190; Done</button><span class="quiz-progress-text">Results</span><span></span></div><div class="results-container"><div style="font-size:48px;margin-bottom:8px">'+emoji+'</div><div class="results-score">'+pct+'%</div><div class="results-label">'+correct+'/'+total+' correct &middot; '+message+'</div><div style="font-size:14px;color:var(--success);margin-bottom:24px">+'+(correct*10 + (total-correct)*2)+' XP earned</div></div><div class="card"><div class="card-title">Review Missed Questions</div><div class="results-breakdown">';
  state.sessionResults.forEach((r, i) => {
    if (!r.correct) {
      const q = state.quizQuestions[i];
      html += '<div class="result-item"><div class="result-q"><strong>Ch'+q.chapter+' Q'+q.number+':</strong> '+escHtml(q.question.substring(0,80))+'...</div><div class="result-badge incorrect">&#x274C;</div></div>';
    }
  });
  if (state.sessionResults.every(r => r.correct)) {
    html += '<p style="text-align:center;color:var(--success);padding:16px">Perfect score!</p>';
  }
  html += '</div></div><button class="next-btn" onclick="state.screen=\'dashboard\';render()">Back to Dashboard</button>';
  html += '</div>';
  html += renderBottomNav('dashboard');
  app.innerHTML = html;
}
function renderFlashcardScreen(app) {
  if (!state.flashcards || state.flashcards.length === 0) {
    app.innerHTML = '<div class="card text-center mt-16"><p>No flashcards available.</p><button class="next-btn" onclick="state.screen=\'dashboard\';render()">Back</button></div>';
    return;
  }
  const card = state.flashcards[state.flashcardIndex];
  const chTitle = CHAPTERS.find(c => c.num === card.chapter)?.short || '';
  let html = '<div class="quiz-header"><button class="quiz-back" onclick="state.screen=\'dashboard\';render()">&#x2190;</button><span class="quiz-progress-text">'+(state.flashcardIndex + 1)+' / '+state.flashcards.length+'</span><span class="quiz-progress-text">Ch'+card.chapter+' '+chTitle+'</span></div><div class="flashcard-container" onclick="flipCard()"><div class="flashcard '+(state.flashcardFlipped ? 'flipped' : '')+'"><div class="flashcard-face flashcard-front"><div>'+escHtml(card.front)+'</div><div class="flashcard-hint">Tap to reveal</div></div><div class="flashcard-face flashcard-back"><div>'+escHtml(card.back)+'</div></div></div></div>';
  if (state.flashcardFlipped) {
    html += '<div class="flashcard-nav"><button class="study-more" onclick="event.stopPropagation();flashcardResponse(false)">&#x1F504; Study More</button><button class="knew-it" onclick="event.stopPropagation();flashcardResponse(true)">&#x2705; Knew It</button></div>';
  }
  app.innerHTML = html;
}
function renderStatsScreen(app) {
  let html = '<div class="page-inner"><div class="header"><h1>Your Progress</h1><div class="subtitle">Performance over time</div></div>';
  html += '<div class="card"><div class="card-title">Score by Chapter</div><div class="chart-bar-group">';
  CHAPTERS.forEach(ch => {
    const s = getChapterStats(ch.num);
    const h = Math.max(4, (s.pct / 100) * 140);
    const color = s.pct >= 80 ? 'var(--success)' : s.pct >= 50 ? 'var(--warning)' : s.pct > 0 ? 'var(--danger)' : 'var(--border)';
    html += '<div class="chart-bar-wrapper"><div class="chart-percent">'+s.pct+'%</div><div class="chart-bar" style="height:'+h+'px;background:'+color+'"></div><div class="chart-bar-label">'+ch.short+'</div></div>';
  });
  html += '</div></div>';
  html += '<div class="card"><div class="card-title">Recent Sessions</div>';
  const recent = [...progress.sessionHistory].reverse().slice(0, 10);
  if (recent.length === 0) {
    html += '<p style="color:var(--text-secondary);text-align:center;padding:16px">No sessions yet. Start studying!</p>';
  } else {
    recent.forEach(s => {
      const date = new Date(s.date);
      const dateStr = date.toLocaleDateString('en-US', {month:'short', day:'numeric'});
      const pct = Math.round(s.score/s.total*100);
      const color = pct >= 80 ? 'var(--success)' : pct >= 50 ? 'var(--warning)' : 'var(--danger)';
      html += '<div class="result-item"><div class="result-q">'+dateStr+' &middot; '+s.mode+' &middot; '+s.score+'/'+s.total+'</div><div class="result-badge" style="background:'+color+';color:white">'+pct+'%</div></div>';
    });
  }
  html += '</div>';
  html += '<div class="card"><div class="card-title">Lifetime Stats</div><div class="stats-row" style="margin:0"><div class="stat-card"><div class="stat-value">'+progress.totalQuestions+'</div><div class="stat-label">Answered</div></div><div class="stat-card"><div class="stat-value">'+progress.streak+'</div><div class="stat-label">Day Streak</div></div><div class="stat-card"><div class="stat-value">'+progress.xp+'</div><div class="stat-label">Total XP</div></div></div></div>';
  html += '</div>';
  html += renderBottomNav('stats');
  app.innerHTML = html;
}
function renderSettings(app) {
  let html = '<div class="page-inner">'
    + '<div class="header"><h1>Settings</h1><div class="subtitle">Preferences</div></div>'
    + '<div class="card"><div class="card-title">Data Management</div>'
    + '<button onclick="exportProgress()" style="display:block;width:100%;padding:12px;margin-bottom:8px;border-radius:8px;border:2px solid var(--primary);background:none;color:var(--primary);font-weight:600;cursor:pointer;font-family:inherit">Export Progress (JSON)</button>'
    + '<label style="display:block;width:100%;padding:12px;margin-bottom:8px;border-radius:8px;border:2px solid var(--success);background:none;color:var(--success);font-weight:600;cursor:pointer;text-align:center;font-family:inherit">Import Progress<input type="file" accept=".json" onchange="importProgress(event)" style="display:none"></label>'
    + '<button onclick="if(confirm(\'Reset ALL progress? This cannot be undone.\')){progress=getDefaultProgress();saveProgress();render()}" style="display:block;width:100%;padding:12px;border-radius:8px;border:2px solid var(--danger);background:none;color:var(--danger);font-weight:600;cursor:pointer;font-family:inherit">Reset All Progress</button>'
    + '</div>'
    + '<div class="card"><div class="card-title">About</div>'
    + '<p style="font-size:13px;color:var(--text-secondary);line-height:1.7">EndoBoard v1.0<br>' + QUESTIONS.length + ' MCQs &middot; ' + FLASHCARDS.length + ' Flashcards<br>13 Chapters from the Blue Book<br><br>Built for ABE Board Prep</p>'
    + '</div>'
    + '</div>';
  html += renderBottomNav('settings');
  app.innerHTML = html;
}
function renderBottomNav(active) {
  const svgHome = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';
  const svgStudy = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>';
  const svgStats = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>';
  const svgSettings = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>';
  const svgExam = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>';
  const svgFlash = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M8 10h8M8 14h4"/></svg>';

  const sidebar = `<div class="sidebar">
    <div class="sidebar-logo">Endo<span>Board</span></div>
    <button class="sidebar-item ${active==='dashboard'?'active':''}" onclick="state.screen='dashboard';render()">${svgHome} Dashboard</button>
    <button class="sidebar-item" onclick="state.screen='chapterSelect';state.quizMode='study';render()">${svgStudy} Study Mode</button>
    <button class="sidebar-item" onclick="startQuiz('exam',[])">${svgExam} Exam Sim</button>
    <button class="sidebar-item" onclick="state.screen='chapterSelect';state.quizMode='flashcards';render()">${svgFlash} Flashcards</button>
    <button class="sidebar-item ${active==='stats'?'active':''}" onclick="state.screen='stats';render()">${svgStats} Stats</button>
    <div class="sidebar-spacer"></div>
    <button class="sidebar-item ${active==='settings'?'active':''}" onclick="state.screen='settings';render()">${svgSettings} Settings</button>
    <div class="sidebar-version">EndoBoard v1.0 &middot; ${QUESTIONS.length} Qs</div>
  </div>`;

  const bottomNav = `<div class="bottom-nav">
    <button class="nav-item ${active==='dashboard'?'active':''}" onclick="state.screen='dashboard';render()">${svgHome} Home</button>
    <button class="nav-item" onclick="state.screen='chapterSelect';state.quizMode='study';render()">${svgStudy} Study</button>
    <button class="nav-item ${active==='stats'?'active':''}" onclick="state.screen='stats';render()">${svgStats} Stats</button>
    <button class="nav-item ${active==='settings'?'active':''}" onclick="state.screen='settings';render()">${svgSettings} Settings</button>
  </div>`;

  return sidebar + bottomNav;
}


function exportProgress() {
  const data = JSON.stringify(progress, null, 2);
  const blob = new Blob([data], {type: 'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'endoboard_progress_' + new Date().toISOString().slice(0,10) + '.json';
  a.click();
  URL.revokeObjectURL(url);
}
function importProgress(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const imported = JSON.parse(e.target.result);
      progress = {...getDefaultProgress(), ...imported};
      saveProgress();
      render();
      alert('Progress imported successfully!');
    } catch(err) {
      alert('Invalid file format');
    }
  };
  reader.readAsText(file);
}
loadProgress();
updateStreak();
state.screen = 'dashboard';
render();
</script>
</body>
