hapterTitle": "Resorptive Dental Diseases", "number": 179, "question": "According to the textbook, what is the recommended interval for radiographic monitoring of a tooth that has been treated for internal root resorption?", "options": [{"letter": "A", "text": "No follow-up radiographs needed after completion of treatment"}, {"letter": "B", "text": "Every 6 months indefinitely"}, {"letter": "C", "text": "At 6 months, 1 year, and 2 years to assess for recurrence"}, {"letter": "D", "text": "Only if patient reports symptoms"}], "correctAnswer": "C", "explanation": "Recommended radiographic follow-up for teeth treated for internal root resorption includes evaluation at 6 months, 1 year, and 2 years after treatment to assess for complete arrest of resorption and detect any early recurrence of disease.", "answer": "C"}, {"id": 80, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 180, "question": "In the differential diagnosis of root resorption types, why is pulp vitality testing sometimes unreliable for distinguishing internal from external resorption?", "options": [{"letter": "A", "text": "Vital teeth always have internal resorption and non-vital teeth always have external resorption"}, {"letter": "B", "text": "External inflammatory resorption can occur in vital teeth, making vitality testing nonspecific"}, {"letter": "C", "text": "Vitality testing is always unreliable for all resorptive conditions"}, {"letter": "D", "text": "Non-vital teeth cannot develop any form of root resorption"}], "correctAnswer": "B", "explanation": "Pulp vitality testing can be unreliable for distinguishing resorption types because external inflammatory resorption (EIRR) can occur in vital teeth. A positive vitality response does not definitively indicate internal resorption; radiographic location and appearance of the lesion relative to the tooth outline are more reliable diagnostic indicators.", "answer": "B"}, {"id": 81, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 181, "question": "What is the clinical significance of the finding of a smooth, round radiolucent lesion on radiographs in a tooth with suspected resorption?", "options": [{"letter": "A", "text": "This finding is diagnostic for internal root resorption"}, {"letter": "B", "text": "This finding indicates the resorption has halted and the tooth will heal spontaneously"}, {"letter": "C", "text": "The rounded appearance may indicate early internal resorption before the lesion becomes irregular"}, {"letter": "D", "text": "This finding indicates the lesion is benign and does not require treatment"}], "correctAnswer": "C", "explanation": "An early internal root resorption lesion may appear as a smooth, round radiolucent area within the root outline. As the resorption progresses, the lesion typically becomes more irregular and expansile. The smooth rounded appearance represents early-stage resorption that warrants prompt treatment.", "answer": "C"}, {"id": 82, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 182, "question": "According to the textbook, what is the relationship between the extent of internal root resorption and the likelihood of spontaneous arrest without treatment?", "options": [{"letter": "A", "text": "Extensive resorption is more likely to arrest spontaneously than early-stage resorption"}, {"letter": "B", "text": "The extent of resorption is unrelated to likelihood of spontaneous arrest"}, {"letter": "C", "text": "Internal root resorption does not arrest spontaneously; it is progressive without treatment"}, {"letter": "D", "text": "Early-stage resorption is more likely to arrest spontaneously than extensive resorption"}], "correctAnswer": "C", "explanation": "Internal root resorption does not arrest spontaneously and is progressive without intervention. The resorptive process will continue and potentially destroy the entire tooth if not treated. This is why immediate treatment upon diagnosis is critical.", "answer": "C"}, {"id": 83, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 183, "question": "In external cervical resorption, what is the primary purpose of the surgical phase of treatment?", "options": [{"letter": "A", "text": "To extract the tooth due to poor prognosis"}, {"letter": "B", "text": "To expose, visualize, and remove the resorptive granulation tissue"}, {"letter": "C", "text": "To place orthodontic brackets for tooth movement"}, {"letter": "D", "text": "To biopsy tissue and rule out malignant disease"}], "correctAnswer": "B", "explanation": "The primary purpose of the surgical phase of treatment for external cervical resorption is to expose, visualize, and completely remove the resorptive granulation tissue. This allows restoration of the defect with biocompatible material to prevent recurrence.", "answer": "B"}, {"id": 84, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 184, "question": "What is the clinical significance of the finding of a resorption cavity that is inaccessible for complete removal of resorptive tissue during surgical treatment of external cervical resorption?", "options": [{"letter": "A", "text": "The inaccessible area can be left untreated as it will eventually heal"}, {"letter": "B", "text": "Incomplete removal of resorptive tissue significantly increases the risk of recurrence"}, {"letter": "C", "text": "Inaccessibility indicates the tooth should be extracted"}, {"letter": "D", "text": "Inaccessible areas do not contribute to future resorption progression"}], "correctAnswer": "B", "explanation": "Incomplete removal of resorptive granulation tissue due to inaccessibility significantly increases the risk of recurrence of external cervical resorption. This may indicate that the lesion has progressed beyond a stage where conservative treatment will be successful, potentially necessitating extraction.", "answer": "B"}, {"id": 85, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 185, "question": "According to the textbook, what is the histological composition of the resorptive lesion in external inflammatory root resorption?", "options": [{"letter": "A", "text": "Necrotic tissue with minimal cellular activity"}, {"letter": "B", "text": "Highly vascularized granulation tissue with abundant osteoclasts and odontoclasts"}, {"letter": "C", "text": "Fibrous tissue without inflammatory cells"}, {"letter": "D", "text": "Cementum and dentin fragments"}], "correctAnswer": "B", "explanation": "External inflammatory root resorption consists of highly vascularized granulation tissue containing abundant osteoclasts and odontoclasts. The inflammatory mediators and cytokines released in this tissue recruit and activate these multinucleated cells, driving the resorptive process.", "answer": "B"}, {"id": 86, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 186, "question": "In the treatment of internal root resorption with calcium hydroxide, what is the mechanism by which the antimicrobial effect contributes to arrest of resorption?", "options": [{"letter": "A", "text": "Bacterial elimination reduces inflammatory mediator production"}, {"letter": "B", "text": "The antimicrobial effect is unrelated to resorption arrest"}, {"letter": "C", "text": "Antimicrobial activity eliminates the need for further treatment"}, {"letter": "D", "text": "Bacteria are the sole cause of internal resorption"}], "correctAnswer": "A", "explanation": "While calcium hydroxide's primary mechanism in arresting internal resorption is its high alkaline pH, its antimicrobial effect contributes by reducing bacterial contamination and associated inflammatory mediator production. This reduces the inflammatory stimulus driving odontoclast recruitment and activation.", "answer": "A"}, {"id": 87, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 187, "question": "What is the primary clinical implication of detecting replacement resorption in the permanent dentition?", "options": [{"letter": "A", "text": "The tooth will continue to function normally indefinitely"}, {"letter": "B", "text": "The tooth will progressively be replaced by bone and eventually require extraction"}, {"letter": "C", "text": "Replacement resorption does not occur in permanent teeth"}, {"letter": "D", "text": "The tooth should be immediately extracted before symptoms develop"}], "correctAnswer": "B", "explanation": "Replacement resorption in the permanent dentition indicates that the tooth will progressively be replaced by bone (ankylosis). The tooth will eventually submerge relative to adjacent teeth and typically requires extraction within several years. Early intervention may extend tooth survival.", "answer": "B"}, {"id": 88, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 188, "question": "According to the textbook, what is the relationship between the location of internal root resorption and radiographic visibility?", "options": [{"letter": "A", "text": "All internal resorption is equally visible radiographically regardless of location"}, {"letter": "B", "text": "Internal resorption in the pulp chamber is more readily visible than resorption in the apical third"}, {"letter": "C", "text": "Internal resorption in the apical third is more radiographically visible"}, {"letter": "D", "text": "Location does not affect radiographic visibility of internal resorption"}], "correctAnswer": "B", "explanation": "Internal resorption in the pulp chamber is typically more readily visible radiographically than resorption limited to the apical third. Pulpal involvement creates more obvious changes in the pulp chamber outline, making early detection and diagnosis more likely.", "answer": "B"}, {"id": 89, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 189, "question": "In the differential diagnosis between internal resorption and a large carious lesion, what is the most helpful distinguishing radiographic feature?", "options": [{"letter": "A", "text": "Internal resorption is always more radiolucent than caries"}, {"letter": "B", "text": "Internal resorption affects the pulp chamber outline while caries does not"}, {"letter": "C", "text": "Caries always causes pain while internal resorption is asymptomatic"}, {"letter": "D", "text": "The two conditions cannot be differentiated radiographically"}], "correctAnswer": "B", "explanation": "Internal resorption is distinguished from caries by its effect on the pulp chamber outline. Internal resorption causes loss of definition and expansion of the pulp chamber outline, while carious lesions typically do not affect the pulp chamber outline unless very extensive and approaching the pulp.", "answer": "B"}, {"id": 90, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 190, "question": "What is the clinical significance of the finding that external cervical resorption often remains undiagnosed until the lesion becomes relatively advanced?", "options": [{"letter": "A", "text": "Early diagnosis is impossible due to the nature of the condition"}, {"letter": "B", "text": "Late diagnosis contributes to poor treatment outcomes and limited options"}, {"letter": "C", "text": "Late diagnosis indicates the tooth should be immediately extracted"}, {"letter": "D", "text": "The timing of diagnosis does not affect treatment outcomes"}], "correctAnswer": "B", "explanation": "The fact that external cervical resorption often remains undiagnosed until relatively advanced stages contributes to poor treatment outcomes and limited treatment options. Early diagnosis through routine clinical and radiographic examination could identify lesions at earlier, more treatable stages with better prognosis.", "answer": "B"}, {"id": 91, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 191, "question": "According to the textbook, what is the recommended approach to management of a tooth with early internal root resorption and incomplete root development in a pediatric patient?", "options": [{"letter": "A", "text": "Extraction due to poor prognosis in developing teeth"}, {"letter": "B", "text": "Immediate root canal treatment with calcium hydroxide to arrest resorption while allowing continued development"}, {"letter": "C", "text": "Observation until root development is complete"}, {"letter": "D", "text": "Systemic fluoride supplementation alone without endodontic treatment"}], "correctAnswer": "B", "explanation": "In pediatric patients with early internal root resorption and incomplete root development, immediate root canal treatment with calcium hydroxide is recommended. This arrests the resorption while potentially allowing continued apical development and root maturation.", "answer": "B"}, {"id": 92, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 192, "question": "In external inflammatory root resorption, what is the significance of obtaining periodontal probing depths and evidence of periodontal pocket formation?", "options": [{"letter": "A", "text": "Periodontal status is unrelated to external inflammatory resorption"}, {"letter": "B", "text": "Periodontal pockets indicate the periodontal ligament is the source of inflammatory mediators driving resorption"}, {"letter": "C", "text": "Periodontal probing is contraindicated due to risk of further trauma"}, {"letter": "D", "text": "Periodontal status only matters if the pulp is non-vital"}], "correctAnswer": "B", "explanation": "In external inflammatory resorption, periodontal pocket formation indicates that the periodontal tissues are the source of inflammatory mediators driving the resorptive process. Assessment of periodontal status is important for understanding the etiology and planning comprehensive treatment including both endodontic and periodontal therapy.", "answer": "B"}, {"id": 93, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 193, "question": "What is the primary clinical advantage of early detection of Grade I or II external cervical resorption?", "options": [{"letter": "A", "text": "Early grades require more extensive treatment than advanced grades"}, {"letter": "B", "text": "Early grades have significantly better treatment prognosis and higher rates of successful arrest"}, {"letter": "C", "text": "Early and late grades have equivalent prognosis with appropriate treatment"}, {"letter": "D", "text": "Early detection is clinically irrelevant to treatment planning"}], "correctAnswer": "B", "explanation": "Early detection of Grade I or II external cervical resorption is clinically advantageous because these earlier grades have significantly better treatment prognosis with higher rates of successful arrest of resorption. Treatment outcomes decline dramatically with more advanced grades.", "answer": "B"}, {"id": 94, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 194, "question": "According to the textbook, what is the anatomical distinction between the resorption process in Grade II versus Grade III Heithersay external cervical resorption?", "options": [{"letter": "A", "text": "Grade II is limited to enamel and dentin while Grade III involves the pulp"}, {"letter": "B", "text": "Grade II involves the cervical third while Grade III extends into the middle third"}, {"letter": "C", "text": "Grade II involves the pulp chamber while Grade III does not"}, {"letter": "D", "text": "Grade III is limited to the cervical region while Grade II extends apically"}], "correctAnswer": "A", "explanation": "In the Heithersay classification, Grade II external cervical resorption extends into dentin but does not involve the pulp chamber. Grade III resorption extends beyond the cervical third, involves more of the root, and typically includes pulp chamber involvement.", "answer": "A"}, {"id": 95, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 195, "question": "In the treatment of replacement resorption affecting a permanent tooth, why is the tooth's prognosis measured in years rather than indefinite retention?", "options": [{"letter": "A", "text": "The resorptive process cannot be halted and will progress to tooth loss"}, {"letter": "B", "text": "All permanent teeth eventually require extraction due to age-related changes"}, {"letter": "C", "text": "Replacement resorption responds well to treatment but only provides temporary benefit"}, {"letter": "D", "text": "Ankylosed teeth submerse and become non-functional regardless of treatment"}], "correctAnswer": "A", "explanation": "Replacement resorption has a limited prognosis measured in years because the ankylosed tooth is being progressively replaced by bone. The resorptive process cannot be halted and the tooth will eventually become non-functional and require extraction.", "answer": "A"}, {"id": 96, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 196, "question": "What is the clinical significance of the finding of generalized external cervical resorption affecting multiple teeth in a middle-aged adult?", "options": [{"letter": "A", "text": "This finding is always idiopathic with no identifiable etiology"}, {"letter": "B", "text": "Systemic investigation including thyroid function tests is warranted to identify metabolic disease"}, {"letter": "C", "text": "Multiple tooth involvement indicates all affected teeth should be extracted immediately"}, {"letter": "D", "text": "Generalized resorption in adults is always associated with advanced periodontal disease"}], "correctAnswer": "B", "explanation": "Generalized external cervical resorption affecting multiple teeth in a middle-aged adult warrants systemic investigation including thyroid function testing, as hyperthyroidism and Paget's disease have been associated with generalized ECR. Identification and treatment of underlying systemic disease may help manage the resorption.", "answer": "B"}, {"id": 97, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 197, "question": "According to the textbook, what is the recommended treatment interval for changing calcium hydroxide dressing during treatment of active internal root resorption?", "options": [{"letter": "A", "text": "Change weekly for optimal effect"}, {"letter": "B", "text": "Change every 2-4 weeks to refresh the medicament"}, {"letter": "C", "text": "No changes needed; place once and leave for 4-6 weeks"}, {"letter": "D", "text": "Change only if patient reports symptoms"}], "correctAnswer": "B", "explanation": "While calcium hydroxide can be left in place for extended periods, periodic replacement every 2-4 weeks ensures optimal medicament efficacy and allows assessment of the resorptive process. This allows monitoring to determine when resorption has been arrested before proceeding with final obturation.", "answer": "B"}, {"id": 98, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 198, "question": "In the differential diagnosis of internal versus external root resorption, what is the significance of widening of the root canal space?", "options": [{"letter": "A", "text": "Widening indicates external resorption only"}, {"letter": "B", "text": "Widening is a hallmark of internal resorption when it affects the pulp chamber outline"}, {"letter": "C", "text": "Widening is unrelated to any form of root resorption"}, {"letter": "D", "text": "Widening occurs equally in internal and external resorption with no diagnostic value"}], "correctAnswer": "B", "explanation": "Widening of the pulp canal space with loss of definition of the pulp chamber outline is a hallmark radiographic finding of internal root resorption. This expanding appearance from within the tooth outline is the key diagnostic feature distinguishing internal from external resorption.", "answer": "B"}, {"id": 99, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 199, "question": "What is the primary clinical implication of the finding that endodontic treatment alone may be insufficient for arresting external inflammatory root resorption in some cases?", "options": [{"letter": "A", "text": "All cases of EIRR should be treated with extraction rather than endodontics"}, {"letter": "B", "text": "Endodontic treatment must be combined with periodontal therapy to control the inflammatory source"}, {"letter": "C", "text": "EIRR cannot be treated successfully regardless of approach"}, {"letter": "D", "text": "Endodontic treatment is always sufficient to arrest EIRR"}], "correctAnswer": "B", "explanation": "Since external inflammatory root resorption originates from the periodontal ligament, endodontic treatment alone may be insufficient if periodontal inflammation persists. Comprehensive treatment should include both endodontic and periodontal therapy to control the inflammatory sources driving resorption.", "answer": "B"}, {"id": 100, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 200, "question": "According to the textbook, what is the single most important factor in improving the prognosis of external cervical resorption?", "options": [{"letter": "A", "text": "Patient age at time of diagnosis"}, {"letter": "B", "text": "Early detection and prompt initiation of treatment while lesions are in early stages"}, {"letter": "C", "text": "Extraction of the tooth to prevent spread to adjacent teeth"}, {"letter": "D", "text": "Selection of specific restorative material for the lesion"}], "correctAnswer": "B", "explanation": "The single most important factor in improving the prognosis of external cervical resorption is early detection and prompt initiation of treatment while lesions are in early stages (Grade I-II). Early intervention has significantly higher success rates in arresting resorption and preserving the tooth.", "answer": "B"}, {"id": 1, "chapter": 12, "chapterTitle": "Prognosis", "number": 101, "question": "According to the Toronto study, what was the overall success rate of initial root canal treatment in the first attempt?", "options": [{"letter": "A", "text": "78-82%"}, {"letter": "B", "text": "85-90%"}, {"letter": "C", "text": "92-96%"}, {"letter": "D", "text": "98-99%"}], "correctAnswer": "B", "explanation": "The Toronto study reported that the success rate of initial root canal treatment (treatment on the first attempt) ranged from approximately 85-90%. This landmark study provided important baseline data for assessing the prognosis of root canal therapy in various tooth types and clinical situations.", "answer": "B"}, {"id": 2, "chapter": 12, "chapterTitle": "Prognosis", "number": 102, "question": "What is the primary prognostic factor for the success of endodontic treatment according to current evidence?", "options": [{"letter": "A", "text": "Patient age at time of treatment"}, {"letter": "B", "text": "Tooth color and crown-to-root ratio"}, {"letter": "C", "text": "Quality of the coronal restoration and apical seal of the root canal"}, {"letter": "D", "text": "Patient's systemic health status"}], "correctAnswer": "C", "explanation": "The quality of the coronal restoration and apical seal of the root canal are the primary prognostic factors for endodontic success. Studies consistently demonstrate that teeth with well-sealed coronal restorations and three-dimensional root canal obturation show significantly better success rates than those without adequate coronal or apical sealing.", "answer": "C"}, {"id": 3, "chapter": 12, "chapterTitle": "Prognosis", "number": 103, "question": "According to the textbook, what is the impact of pre-operative periapical pathology on endodontic prognosis?", "options": [{"letter": "A", "text": "Presence of periapical pathology has no effect on treatment success"}, {"letter": "B", "text": "Periapical pathology slightly improves treatment prognosis"}, {"letter": "C", "text": "Periapical pathology significantly decreases treatment success rates"}, {"letter": "D", "text": "Periapical pathology only affects prognosis in posterior teeth"}], "correctAnswer": "C", "explanation": "Presence of pre-operative periapical pathology significantly decreases endodontic treatment success rates. Teeth with symptomatic apical periodontitis or radiographic evidence of apical pathology have lower success rates compared to asymptomatic teeth with vital pulps.", "answer": "C"}, {"id": 4, "chapter": 12, "chapterTitle": "Prognosis", "number": 104, "question": "What is the approximate success rate difference between treatment of teeth with vital pulps versus teeth with non-vital pulps?", "options": [{"letter": "A", "text": "No significant difference"}, {"letter": "B", "text": "Vital teeth have approximately 15-20% higher success rates"}, {"letter": "C", "text": "Non-vital teeth have approximately 15-20% higher success rates"}, {"letter": "D", "text": "Vital teeth have approximately 50% higher success rates"}], "correctAnswer": "B", "explanation": "Teeth with vital pulps generally have approximately 15-20% higher success rates compared to teeth with non-vital pulps. This difference reflects the better healing potential and lower bacterial burden associated with vital tissues.", "answer": "B"}, {"id": 5, "chapter": 12, "chapterTitle": "Prognosis", "number": 105, "question": "According to the textbook, which tooth type demonstrates the highest success rate for endodontic treatment?", "options": [{"letter": "A", "text": "Mandibular molars"}, {"letter": "B", "text": "Maxillary molars"}, {"letter": "C", "text": "Maxillary incisors"}, {"letter": "D", "text": "Posterior teeth with multiple roots"}], "correctAnswer": "C", "explanation": "Maxillary incisors generally demonstrate the highest success rate for endodontic treatment. Single-rooted teeth with simpler anatomy, better accessibility, and more straightforward instrumentation and obturation typically have better prognosis than multirooted teeth.", "answer": "C"}, {"id": 6, "chapter": 12, "chapterTitle": "Prognosis", "number": 106, "question": "What is the impact of instrument separation in the root canal on endodontic prognosis according to current evidence?", "options": [{"letter": "A", "text": "Separated instruments have no impact on treatment success"}, {"letter": "B", "text": "Separated instruments slightly decrease success rates by less than 5%"}, {"letter": "C", "text": "Separated instruments decrease success rates by approximately 10-15%"}, {"letter": "D", "text": "Separated instruments make successful treatment impossible"}], "correctAnswer": "C", "explanation": "Instrument separation in the root canal decreases endodontic success rates by approximately 10-15%. While teeth with separated instruments can still achieve successful treatment, the retained foreign body and incomplete preparation of the canal system compromise the outcome compared to uncomplicated treatments.", "answer": "C"}, {"id": 7, "chapter": 12, "chapterTitle": "Prognosis", "number": 107, "question": "According to the textbook, what is the success rate of retreatment of previously endodontically treated teeth?", "options": [{"letter": "A", "text": "Less than 50%"}, {"letter": "B", "text": "65-75%"}, {"letter": "C", "text": "85-90%"}, {"letter": "D", "text": "Greater than 95%"}], "correctAnswer": "B", "explanation": "The success rate of retreatment of previously endodontically treated teeth is approximately 65-75%. This is significantly lower than the success rate of initial treatment, reflecting the challenges of accessing and cleaning previously treated canals with residual filling material.", "answer": "B"}, {"id": 8, "chapter": 12, "chapterTitle": "Prognosis", "number": 108, "question": "What is the primary reason that teeth requiring retreatment have lower success rates than teeth receiving initial treatment?", "options": [{"letter": "A", "text": "Teeth requiring retreatment are inherently more susceptible to resorption"}, {"letter": "B", "text": "Previous treatment has compromised the structural integrity of the tooth"}, {"letter": "C", "text": "Retreatment involves more complex techniques that are less predictable"}, {"letter": "D", "text": "Canal anatomy is altered during initial treatment, making complete cleaning difficult"}], "correctAnswer": "D", "explanation": "Teeth requiring retreatment have lower success rates primarily because the canal anatomy is altered during initial treatment, making complete removal of previous filling material and complete cleaning of the canal system difficult. This results in inadequate removal of irritants and incomplete instrumentation.", "answer": "D"}, {"id": 9, "chapter": 12, "chapterTitle": "Prognosis", "number": 109, "question": "According to current evidence, what is the impact of the quality of working length determination on endodontic treatment success?", "options": [{"letter": "A", "text": "Working length determination has minimal impact on success"}, {"letter": "B", "text": "Accurate working length determination is a critical factor affecting success"}, {"letter": "C", "text": "Working length accuracy only affects posterior teeth success rates"}, {"letter": "D", "text": "Visual estimation without instruments provides equivalent results to electronic methods"}], "correctAnswer": "B", "explanation": "Accurate working length determination is a critical factor affecting endodontic treatment success. Underfilling or overfilling reduces the quality of the apical seal and increases the risk of treatment failure. Electronic apex locators combined with radiographic confirmation provide the most reliable method.", "answer": "B"}, {"id": 10, "chapter": 12, "chapterTitle": "Prognosis", "number": 110, "question": "What is the reported success rate of surgical endodontic treatment (apicoectomy) according to the textbook?", "options": [{"letter": "A", "text": "50-60%"}, {"letter": "B", "text": "70-80%"}, {"letter": "C", "text": "85-95%"}, {"letter": "D", "text": "Greater than 98%"}], "correctAnswer": "C", "explanation": "Surgical endodontic treatment (apicoectomy) has a reported success rate of approximately 85-95% when properly executed with appropriate case selection and technique. This represents a high success rate for surgical retreatment of previously failed or compromised teeth.", "answer": "C"}, {"id": 11, "chapter": 12, "chapterTitle": "Prognosis", "number": 111, "question": "According to the textbook, what is the impact of perioperative antibiotic use on endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Antibiotics significantly improve treatment success rates in all cases"}, {"letter": "B", "text": "Antibiotics have no impact on endodontic treatment prognosis"}, {"letter": "C", "text": "Antibiotics may benefit symptomatic teeth with periapical involvement but are not routinely necessary"}, {"letter": "D", "text": "Antibiotics are contraindicated in endodontic treatment"}], "correctAnswer": "C", "explanation": "While antibiotics are not routinely necessary for most endodontic treatment cases, they may provide benefit in symptomatic teeth with significant periapical involvement or patients with compromised immune systems. The decision to use antibiotics should be based on clinical presentation and individual patient factors.", "answer": "C"}, {"id": 12, "chapter": 12, "chapterTitle": "Prognosis", "number": 112, "question": "What is the primary prognostic significance of the timing of coronal restoration placement after root canal completion?", "options": [{"letter": "A", "text": "Timing is clinically irrelevant; coronal restoration can be delayed indefinitely"}, {"letter": "B", "text": "Immediate coronal restoration is critical to prevent contamination of the canal system"}, {"letter": "C", "text": "Coronal restoration is not necessary if the root canal is properly sealed"}, {"letter": "D", "text": "Restoration can safely be delayed for months after canal completion"}], "correctAnswer": "B", "explanation": "Timing of coronal restoration placement after root canal completion is prognostically critical. An unprotected root canal is subject to bacterial contamination through leakage, which compromises the seal and can lead to treatment failure. Prompt placement of a coronal restoration is important for long-term success.", "answer": "B"}, {"id": 13, "chapter": 12, "chapterTitle": "Prognosis", "number": 113, "question": "According to the Toronto study, what percentage of endodontically treated teeth required retreatment within 4-6 years?", "options": [{"letter": "A", "text": "Approximately 5-10%"}, {"letter": "B", "text": "Approximately 15-20%"}, {"letter": "C", "text": "Approximately 30-35%"}, {"letter": "D", "text": "Approximately 45-50%"}], "correctAnswer": "B", "explanation": "The Toronto study reported that approximately 15-20% of initially successful endodontically treated teeth required retreatment within 4-6 years of follow-up. This reflects the reality that some teeth that appear successful initially may develop complications requiring further intervention.", "answer": "B"}, {"id": 14, "chapter": 12, "chapterTitle": "Prognosis", "number": 114, "question": "What is the impact of tooth type (anterior vs. posterior) on the long-term prognosis of endodontically treated teeth?", "options": [{"letter": "A", "text": "No significant difference between anterior and posterior teeth"}, {"letter": "B", "text": "Anterior teeth have significantly better long-term prognosis"}, {"letter": "C", "text": "Posterior teeth have significantly better long-term prognosis"}, {"letter": "D", "text": "Long-term prognosis depends entirely on restoration type, not tooth type"}], "correctAnswer": "B", "explanation": "Anterior teeth generally have significantly better long-term prognosis compared to posterior teeth. This is due to simpler canal anatomy, better visibility and access, easier instrumentation and obturation, and simpler coronal restoration designs.", "answer": "B"}, {"id": 15, "chapter": 12, "chapterTitle": "Prognosis", "number": 115, "question": "According to the textbook, what is the relationship between pre-operative tooth mobility and endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Pre-operative mobility has no impact on prognosis"}, {"letter": "B", "text": "Slight mobility actually improves treatment success"}, {"letter": "C", "text": "Increased mobility indicates compromised periodontal support and worsens prognosis"}, {"letter": "D", "text": "Mobility only affects prognosis in anterior teeth"}], "correctAnswer": "C", "explanation": "Increased pre-operative tooth mobility indicates compromised periodontal support and significantly worsens endodontic treatment prognosis. Teeth with severe mobility may have limited functional longevity regardless of successful root canal treatment.", "answer": "C"}, {"id": 16, "chapter": 12, "chapterTitle": "Prognosis", "number": 116, "question": "What is the reported impact of re-treating cases where the initial treatment has failed on patient acceptance of further treatment?", "options": [{"letter": "A", "text": "Patients readily accept retreatment with no impact on treatment compliance"}, {"letter": "B", "text": "Patient anxiety and hesitation may increase with retreatment, potentially affecting outcomes"}, {"letter": "C", "text": "Retreatment has no psychological impact on patients"}, {"letter": "D", "text": "Patients universally prefer extraction over retreatment"}], "correctAnswer": "B", "explanation": "Patient anxiety and hesitation may increase when retreatment is needed due to initial failure, potentially affecting treatment compliance and outcomes. This psychological factor is an important consideration in managing patient expectations and ensuring successful retreatment.", "answer": "B"}, {"id": 17, "chapter": 12, "chapterTitle": "Prognosis", "number": 117, "question": "According to the textbook, what is the success rate of endodontic treatment in mandibular molars?", "options": [{"letter": "A", "text": "Greater than 95%"}, {"letter": "B", "text": "85-90%"}, {"letter": "C", "text": "70-80%"}, {"letter": "D", "text": "Less than 70%"}], "correctAnswer": "C", "explanation": "Mandibular molars demonstrate a success rate of approximately 70-80% for endodontic treatment. This is lower than anterior teeth and maxillary molars due to the increased complexity of the canal anatomy, potential for incomplete cleaning, and challenges in achieving optimal obturation.", "answer": "C"}, {"id": 18, "chapter": 12, "chapterTitle": "Prognosis", "number": 118, "question": "What is the primary reason that maxillary anterior teeth have higher endodontic success rates than posterior teeth?", "options": [{"letter": "A", "text": "Anterior teeth have stronger roots and require less treatment"}, {"letter": "B", "text": "Better visibility, simpler anatomy, and easier instrumentation"}, {"letter": "C", "text": "Anterior teeth rarely develop pulpal pathology"}, {"letter": "D", "text": "Anterior teeth respond better to antibiotics"}], "correctAnswer": "B", "explanation": "Maxillary anterior teeth have higher success rates due to better visibility during treatment, simpler and more uniform canal anatomy, easier instrumentation and obturation techniques, and more straightforward coronal restoration design.", "answer": "B"}, {"id": 19, "chapter": 12, "chapterTitle": "Prognosis", "number": 119, "question": "According to the textbook, what is the relationship between the presence of a pre-operative periapical radiolucency and endodontic success?", "options": [{"letter": "A", "text": "Presence of periapical radiolucency does not affect success rates"}, {"letter": "B", "text": "Periapical radiolucency slightly improves treatment success"}, {"letter": "C", "text": "Periapical radiolucency significantly reduces success rates by 20-30%"}, {"letter": "D", "text": "All teeth with periapical radiolucencies cannot be treated successfully"}], "correctAnswer": "C", "explanation": "Presence of pre-operative periapical radiolucency significantly reduces endodontic success rates by approximately 20-30% compared to teeth without periapical pathology. Despite adequate treatment, healing of the periapical lesion is not guaranteed.", "answer": "C"}, {"id": 20, "chapter": 12, "chapterTitle": "Prognosis", "number": 120, "question": "What is the reported success rate for endodontic treatment of maxillary molars according to clinical studies?", "options": [{"letter": "A", "text": "50-60%"}, {"letter": "B", "text": "70-75%"}, {"letter": "C", "text": "85-90%"}, {"letter": "D", "text": "Greater than 95%"}], "correctAnswer": "B", "explanation": "Maxillary molars have a reported success rate of approximately 70-75% for endodontic treatment. While not as high as anterior teeth, this represents a reasonable success rate for the more complex three-rooted anatomy of maxillary molars.", "answer": "B"}, {"id": 21, "chapter": 12, "chapterTitle": "Prognosis", "number": 121, "question": "According to the textbook, what impact does the use of rubber dam isolation have on endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Rubber dam has minimal impact on treatment success"}, {"letter": "B", "text": "Rubber dam is contraindicated in endodontic treatment"}, {"letter": "C", "text": "Rubber dam improves success rates by reducing contamination and saliva ingress"}, {"letter": "D", "text": "Rubber dam only improves success in anterior teeth"}], "correctAnswer": "C", "explanation": "Rubber dam isolation improves endodontic treatment success rates by reducing contamination with saliva and oral bacteria, protecting the operative field, improving visualization, and preventing ingestion of instruments and materials. It is considered essential for optimal endodontic outcomes.", "answer": "C"}, {"id": 22, "chapter": 12, "chapterTitle": "Prognosis", "number": 122, "question": "What is the relationship between the extent of caries and endodontic prognosis?", "options": [{"letter": "A", "text": "Caries extent has no impact on endodontic outcomes"}, {"letter": "B", "text": "Extensive caries compromises the tooth structure and may worsen endodontic prognosis"}, {"letter": "C", "text": "Extensive caries improves prognosis by allowing better access"}, {"letter": "D", "text": "Only caries on anterior teeth affects prognosis"}], "correctAnswer": "B", "explanation": "Extensive caries compromises tooth structure and may worsen endodontic prognosis by affecting coronal restoration success and compromising the structural integrity of the tooth. Teeth with extensive caries may have limited long-term functional longevity.", "answer": "B"}, {"id": 23, "chapter": 12, "chapterTitle": "Prognosis", "number": 123, "question": "According to the textbook, what is the primary purpose of long-term follow-up of endodontically treated teeth?", "options": [{"letter": "A", "text": "To identify teeth requiring extraction"}, {"letter": "B", "text": "To monitor for delayed treatment failures and identify complications requiring retreatment"}, {"letter": "C", "text": "Follow-up is unnecessary if initial treatment appears successful"}, {"letter": "D", "text": "To determine if additional antibiotics are needed"}], "correctAnswer": "B", "explanation": "Long-term follow-up of endodontically treated teeth is essential to monitor for delayed treatment failures and identify complications requiring retreatment. Some teeth that appear successful initially may develop problems requiring further intervention.", "answer": "B"}, {"id": 24, "chapter": 12, "chapterTitle": "Prognosis", "number": 124, "question": "What is the impact of adequate coronal restoration design on long-term endodontic prognosis?", "options": [{"letter": "A", "text": "Coronal restoration design has minimal impact on success"}, {"letter": "B", "text": "Adequate coronal restoration significantly improves long-term prognosis"}, {"letter": "C", "text": "Only restorations on posterior teeth affect prognosis"}, {"letter": "D", "text": "Coronal restoration type has no effect on root canal treatment outcome"}], "correctAnswer": "B", "explanation": "Adequate coronal restoration design significantly improves long-term endodontic prognosis by providing a good apical seal, preventing bacterial recontamination, and protecting the tooth structure from fracture and further damage. Full-coverage restorations generally provide better prognosis than partial coverage restorations.", "answer": "B"}, {"id": 25, "chapter": 12, "chapterTitle": "Prognosis", "number": 125, "question": "According to the textbook, what percentage of endodontically treated teeth remain functional for at least 10 years?", "options": [{"letter": "A", "text": "Less than 50%"}, {"letter": "B", "text": "50-70%"}, {"letter": "C", "text": "80-90%"}, {"letter": "D", "text": "Greater than 95%"}], "correctAnswer": "C", "explanation": "Approximately 80-90% of successfully treated endodontically treated teeth remain functional for at least 10 years. This reflects the generally favorable long-term outcomes of root canal therapy when proper techniques and materials are used.", "answer": "C"}, {"id": 26, "chapter": 12, "chapterTitle": "Prognosis", "number": 126, "question": "What is the relationship between incomplete working length determination and endodontic treatment failure?", "options": [{"letter": "A", "text": "Working length errors have minimal impact on success"}, {"letter": "B", "text": "Underfilled canals significantly increase failure rates due to inadequate obturation"}, {"letter": "C", "text": "Overfilled canals rarely cause problems due to biocompatibility of sealer"}, {"letter": "D", "text": "Working length errors only affect the short-term prognosis"}], "correctAnswer": "B", "explanation": "Underfilled canals significantly increase endodontic treatment failure rates due to inadequate obturation leaving portions of the canal system exposed to the periapical environment. This allows bacterial contamination and leakage, compromising the apical seal and long-term success.", "answer": "B"}, {"id": 27, "chapter": 12, "chapterTitle": "Prognosis", "number": 127, "question": "According to the textbook, what is the impact of curved roots on endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Curved roots have no impact on treatment success"}, {"letter": "B", "text": "Curved roots make treatment more challenging but do not significantly affect success"}, {"letter": "C", "text": "Severely curved roots may compromise treatment success due to difficulty in instrumentation and obturation"}, {"letter": "D", "text": "Curved roots actually improve treatment success due to increased surface area"}], "correctAnswer": "C", "explanation": "Severely curved roots may compromise endodontic treatment success due to difficulty in complete instrumentation, the risk of ledge formation, zipping, or root perforation, and challenges in achieving adequate obturation of curved canals.", "answer": "C"}, {"id": 28, "chapter": 12, "chapterTitle": "Prognosis", "number": 128, "question": "What is the reported success rate for endodontic treatment in mandibular incisors?", "options": [{"letter": "A", "text": "70-75%"}, {"letter": "B", "text": "80-85%"}, {"letter": "C", "text": "90-95%"}, {"letter": "D", "text": "Greater than 98%"}], "correctAnswer": "C", "explanation": "Mandibular incisors have a reported success rate of approximately 90-95% for endodontic treatment. As single-rooted anterior teeth, they have relatively simple anatomy and good accessibility, contributing to high success rates.", "answer": "C"}, {"id": 29, "chapter": 12, "chapterTitle": "Prognosis", "number": 129, "question": "According to the textbook, what is the primary reason that symptomatic teeth have lower endodontic success rates than asymptomatic teeth?", "options": [{"letter": "A", "text": "Symptomatic teeth have stronger immune response"}, {"letter": "B", "text": "Symptoms indicate more advanced pathology with greater bacterial contamination and inflammation"}, {"letter": "C", "text": "Symptomatic teeth have better blood supply"}, {"letter": "D", "text": "There is no difference in prognosis between symptomatic and asymptomatic teeth"}], "correctAnswer": "B", "explanation": "Symptomatic teeth have lower endodontic success rates because symptoms indicate more advanced pathology with greater bacterial contamination, inflammatory burden, and potential for periapical pathology, all of which compromise healing potential.", "answer": "B"}, {"id": 30, "chapter": 12, "chapterTitle": "Prognosis", "number": 130, "question": "What is the impact of excessive root resorption on the long-term prognosis of an endodontically treated tooth?", "options": [{"letter": "A", "text": "Resorption has no impact on long-term tooth survival"}, {"letter": "B", "text": "Resorption may compromise long-term tooth survival if extensive"}, {"letter": "C", "text": "Resorption improves prognosis by increasing surface area"}, {"letter": "D", "text": "All teeth with resorption must be extracted immediately"}], "correctAnswer": "B", "explanation": "Extensive root resorption may compromise the long-term prognosis of an endodontically treated tooth by reducing the root surface area available for support and retention, potentially leading to increased mobility and functional impairment.", "answer": "B"}, {"id": 31, "chapter": 12, "chapterTitle": "Prognosis", "number": 131, "question": "According to current evidence, what is the impact of electronic apex locator use on working length accuracy and treatment prognosis?", "options": [{"letter": "A", "text": "Electronic apex locators have no advantage over radiographic methods"}, {"letter": "B", "text": "Electronic apex locators significantly improve accuracy and may improve treatment prognosis"}, {"letter": "C", "text": "Electronic apex locators are contraindicated in endodontic treatment"}, {"letter": "D", "text": "Electronic apex locators only work in dry canals"}], "correctAnswer": "B", "explanation": "Electronic apex locators significantly improve working length accuracy compared to radiographic methods alone. Improved accuracy in working length determination may improve endodontic treatment prognosis by enabling more precise instrumentation and obturation.", "answer": "B"}, {"id": 32, "chapter": 12, "chapterTitle": "Prognosis", "number": 132, "question": "What is the relationship between pre-operative root length and endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Root length has no impact on treatment success"}, {"letter": "B", "text": "Longer roots are associated with improved prognosis"}, {"letter": "C", "text": "Severely shortened roots may compromise retention and long-term prognosis"}, {"letter": "D", "text": "Root length only affects the difficulty of the procedure, not the outcome"}], "correctAnswer": "C", "explanation": "Severely shortened roots due to resorption or previously extracted tooth portions may compromise retention of a restoration and long-term prognosis. Teeth with severely compromised root length may have limited functional longevity despite successful endodontic treatment.", "answer": "C"}, {"id": 33, "chapter": 12, "chapterTitle": "Prognosis", "number": 133, "question": "According to the textbook, what is the success rate difference between initial endodontic treatment and retreatment cases?", "options": [{"letter": "A", "text": "No significant difference between initial and retreatment success"}, {"letter": "B", "text": "Initial treatment is approximately 10-15% more successful than retreatment"}, {"letter": "C", "text": "Initial treatment is approximately 20-30% more successful than retreatment"}, {"letter": "D", "text": "Retreatment is more successful than initial treatment"}], "correctAnswer": "C", "explanation": "Initial endodontic treatment is approximately 20-30% more successful than retreatment cases. This significant difference reflects the challenges of accessing and cleaning previously treated canals and removing residual filling materials.", "answer": "C"}, {"id": 34, "chapter": 12, "chapterTitle": "Prognosis", "number": 134, "question": "What is the impact of patient age on long-term endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Age has no significant impact on endodontic prognosis"}, {"letter": "B", "text": "Older patients have significantly worse prognosis"}, {"letter": "C", "text": "Younger patients typically have better healing potential and prognosis"}, {"letter": "D", "text": "Prognosis is determined entirely by systemic disease, not age"}], "correctAnswer": "C", "explanation": "Younger patients typically have better healing potential and improved endodontic treatment prognosis compared to older patients. Age-related changes in healing capacity, dentinal sclerosis, and potential for systemic compromise affect prognosis.", "answer": "C"}, {"id": 35, "chapter": 12, "chapterTitle": "Prognosis", "number": 135, "question": "According to the Toronto study, what was the success rate of endodontic treatment when adequate apical taper and obturation were achieved?", "options": [{"letter": "A", "text": "60-70%"}, {"letter": "B", "text": "75-80%"}, {"letter": "C", "text": "85-95%"}, {"letter": "D", "text": "Greater than 98%"}], "correctAnswer": "C", "explanation": "The Toronto study reported that when adequate apical taper and complete three-dimensional obturation were achieved, the success rate of endodontic treatment was approximately 85-95%. This emphasizes the critical importance of proper obturation technique and quality on treatment outcomes.", "answer": "C"}, {"id": 36, "chapter": 12, "chapterTitle": "Prognosis", "number": 136, "question": "What is the reported impact of calcium hydroxide as an inter-appointment dressing on endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Calcium hydroxide has no impact on treatment success"}, {"letter": "B", "text": "Calcium hydroxide significantly improves treatment success in all cases"}, {"letter": "C", "text": "Calcium hydroxide may benefit symptomatic cases but does not significantly improve treatment success overall"}, {"letter": "D", "text": "Calcium hydroxide is contraindicated in endodontic treatment"}], "correctAnswer": "C", "explanation": "While calcium hydroxide inter-appointment dressing may benefit symptomatic cases by reducing pain and bacterial load, it does not significantly improve overall endodontic treatment success rates when comprehensive cleaning and obturation are performed in single appointments.", "answer": "C"}, {"id": 37, "chapter": 12, "chapterTitle": "Prognosis", "number": 137, "question": "According to the textbook, what is the relationship between microbial contamination during endodontic treatment and treatment prognosis?", "options": [{"letter": "A", "text": "Microbial contamination has minimal impact on outcomes"}, {"letter": "B", "text": "Contamination during treatment significantly increases failure rates"}, {"letter": "C", "text": "Contamination is beneficial as it stimulates immune response"}, {"letter": "D", "text": "Microbial factors are irrelevant to endodontic success"}], "correctAnswer": "B", "explanation": "Microbial contamination during endodontic treatment significantly increases treatment failure rates. Proper isolation with rubber dam, sterile technique, and adequate irrigation and disinfection are essential to minimize contamination and improve prognosis.", "answer": "B"}, {"id": 38, "chapter": 12, "chapterTitle": "Prognosis", "number": 138, "question": "What is the impact of incomplete removal of infected dentin or coronal leakage sources on endodontic prognosis?", "options": [{"letter": "A", "text": "Incomplete removal has minimal impact if the root canal is properly sealed"}, {"letter": "B", "text": "Incomplete removal of infected tissue significantly increases failure rates"}, {"letter": "C", "text": "Coronal leakage does not affect success rates if the root canal is obtured"}, {"letter": "D", "text": "Complete removal is unnecessary if root canal system is sealed"}], "correctAnswer": "B", "explanation": "Incomplete removal of infected dentin or failure to address sources of coronal leakage significantly increases endodontic treatment failure rates. Complete removal of infected tissue and isolation of the treated tooth from the oral environment are essential for success.", "answer": "B"}, {"id": 39, "chapter": 12, "chapterTitle": "Prognosis", "number": 139, "question": "According to the textbook, what is the success rate for endodontic treatment of premolars?", "options": [{"letter": "A", "text": "Less than 70%"}, {"letter": "B", "text": "70-80%"}, {"letter": "C", "text": "85-90%"}, {"letter": "D", "text": "Greater than 95%"}], "correctAnswer": "C", "explanation": "Premolars have a reported success rate of approximately 85-90% for endodontic treatment. As single-rooted teeth with relatively simple anatomy, they have good accessibility and generally favorable outcomes.", "answer": "C"}, {"id": 40, "chapter": 12, "chapterTitle": "Prognosis", "number": 140, "question": "What is the relationship between the diagnosis of irreversible pulpitis and endodontic treatment success?", "options": [{"letter": "A", "text": "Irreversible pulpitis diagnosis has no impact on prognosis"}, {"letter": "B", "text": "Teeth with irreversible pulpitis have worse prognosis than vital asymptomatic teeth"}, {"letter": "C", "text": "Teeth with irreversible pulpitis have better prognosis due to established pathology"}, {"letter": "D", "text": "Prognosis is identical regardless of pulp diagnosis"}], "correctAnswer": "B", "explanation": "Teeth diagnosed with irreversible pulpitis generally have worse endodontic prognosis compared to vital asymptomatic teeth, as the diagnosis indicates significant pulpal inflammation and potential for periapical pathology, compromising healing potential.", "answer": "B"}, {"id": 41, "chapter": 12, "chapterTitle": "Prognosis", "number": 141, "question": "According to the textbook, what is the recommended follow-up interval for monitoring endodontically treated teeth?", "options": [{"letter": "A", "text": "6 months only"}, {"letter": "B", "text": "Annual follow-up for 2-3 years minimum"}, {"letter": "C", "text": "Every 2-3 years indefinitely"}, {"letter": "D", "text": "Follow-up only if patient reports symptoms"}], "correctAnswer": "B", "explanation": "Recommended follow-up for endodontically treated teeth includes annual radiographic and clinical examination for at least 2-3 years after treatment to monitor for complications and assess treatment success.", "answer": "B"}, {"id": 42, "chapter": 12, "chapterTitle": "Prognosis", "number": 142, "question": "What is the impact of excessive apical extrusion of obturation material on endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Extrusion has no impact on success rates"}, {"letter": "B", "text": "Extrusion slightly improves success rates"}, {"letter": "C", "text": "Extrusion may increase inflammatory response and decrease success rates"}, {"letter": "D", "text": "All cases with extrusion must be retreated"}], "correctAnswer": "C", "explanation": "Excessive apical extrusion of obturation material may provoke inflammatory response and increase periapical inflammation, potentially decreasing success rates. While some extrusion can be tolerated, the general goal is to maintain the obturation within the root canal system.", "answer": "C"}, {"id": 43, "chapter": 12, "chapterTitle": "Prognosis", "number": 143, "question": "According to current evidence, what is the relationship between operator experience and endodontic treatment success?", "options": [{"letter": "A", "text": "Operator experience has no impact on success rates"}, {"letter": "B", "text": "Experienced operators have significantly higher success rates than novices"}, {"letter": "C", "text": "Novice operators actually have better outcomes due to fresher knowledge"}, {"letter": "D", "text": "Success rates are determined entirely by patient factors, not operator skill"}], "correctAnswer": "B", "explanation": "Experienced operators consistently achieve significantly higher endodontic success rates compared to less experienced clinicians. Technical skill, decision-making, and knowledge of complications contribute to improved outcomes in experienced hands.", "answer": "B"}, {"id": 44, "chapter": 12, "chapterTitle": "Prognosis", "number": 144, "question": "What is the primary impact of inadequate irrigation during root canal treatment on long-term prognosis?", "options": [{"letter": "A", "text": "Irrigation has minimal impact on treatment success"}, {"letter": "B", "text": "Inadequate irrigation may leave bacterial and organic debris, increasing failure rates"}, {"letter": "C", "text": "Irrigation is only necessary in infected teeth"}, {"letter": "D", "text": "Over-irrigation improves prognosis regardless of agent used"}], "correctAnswer": "B", "explanation": "Inadequate irrigation during root canal treatment may leave bacterial biofilm, organic debris, and smear layer, reducing the effectiveness of disinfection and obturation. Proper irrigation with appropriate agents such as sodium hypochlorite is essential for improving treatment success.", "answer": "B"}, {"id": 45, "chapter": 12, "chapterTitle": "Prognosis", "number": 145, "question": "According to the textbook, what is the relationship between the presence of an open apex and endodontic treatment prognosis in a young permanent tooth?", "options": [{"letter": "A", "text": "Open apex has no impact on prognosis"}, {"letter": "B", "text": "Open apex compromises prognosis due to difficulty achieving apical seal"}, {"letter": "C", "text": "Open apex actually improves drainage and prognosis"}, {"letter": "D", "text": "Open apex makes treatment impossible"}], "correctAnswer": "B", "explanation": "Open apex in a young permanent tooth compromises endodontic treatment prognosis due to the difficulty in achieving an adequate apical seal. Alternative techniques such as apical closure with biocompatible materials or resorcinol-formaldehyde treatment may be considered.", "answer": "B"}, {"id": 46, "chapter": 12, "chapterTitle": "Prognosis", "number": 146, "question": "What is the reported relationship between the number of visits required for treatment completion and endodontic success?", "options": [{"letter": "A", "text": "Single-visit treatment has worse prognosis than multiple-visit treatment"}, {"letter": "B", "text": "Multiple-visit treatment has worse prognosis than single-visit treatment"}, {"letter": "C", "text": "Number of visits has minimal impact on success if proper technique is used"}, {"letter": "D", "text": "Success rates are identical regardless of number of visits"}], "correctAnswer": "C", "explanation": "The number of visits has minimal impact on endodontic success if comprehensive cleaning, shaping, and obturation are accomplished regardless of whether treatment is completed in one or multiple visits. What matters is the quality and completeness of treatment.", "answer": "C"}, {"id": 47, "chapter": 12, "chapterTitle": "Prognosis", "number": 147, "question": "According to the textbook, what is the impact of excessive instrumentation beyond the apical foramen on endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Instrumentation beyond the apex improves success"}, {"letter": "B", "text": "It has no impact on prognosis"}, {"letter": "C", "text": "Excessive instrumentation may cause periapical trauma and decrease prognosis"}, {"letter": "D", "text": "All apical foramen must be instrumented past for success"}], "correctAnswer": "C", "explanation": "Excessive instrumentation beyond the apical foramen may cause periapical trauma, inflammation, and damage to tissues, potentially decreasing endodontic treatment prognosis. The goal is to instrument to the apical foramen, not beyond it.", "answer": "C"}, {"id": 48, "chapter": 12, "chapterTitle": "Prognosis", "number": 148, "question": "What is the relationship between the status of the opposite tooth (contralateral) and the prognosis of endodontic treatment?", "options": [{"letter": "A", "text": "Contralateral tooth status has no impact on prognosis"}, {"letter": "B", "text": "If the contralateral tooth has failed treatment, the treated tooth has worse prognosis"}, {"letter": "C", "text": "Contralateral tooth status is irrelevant to the outcome of treatment"}, {"letter": "D", "text": "Only the status of the same-side tooth affects prognosis"}], "correctAnswer": "A", "explanation": "The status of the contralateral tooth has no direct impact on the prognosis of endodontic treatment of the opposite tooth. Each tooth's treatment outcome is determined by its individual factors, such as anatomy, pulp diagnosis, and treatment quality.", "answer": "A"}, {"id": 49, "chapter": 12, "chapterTitle": "Prognosis", "number": 149, "question": "According to the textbook, what is the success rate for root canal retreatment with modern instrumentation and obturation techniques?", "options": [{"letter": "A", "text": "50-60%"}, {"letter": "B", "text": "60-65%"}, {"letter": "C", "text": "75-80%"}, {"letter": "D", "text": "Greater than 90%"}], "correctAnswer": "C", "explanation": "The success rate for root canal retreatment has improved with modern instrumentation techniques, better irrigation, and advanced obturation materials. Current reported success rates for retreatment are approximately 75-80%, representing improvement over historical data.", "answer": "C"}, {"id": 50, "chapter": 12, "chapterTitle": "Prognosis", "number": 150, "question": "What is the primary prognostic significance of achieving complete obturation of the entire root canal system?", "options": [{"letter": "A", "text": "Complete obturation has minimal impact on success"}, {"letter": "B", "text": "Complete obturation is the most critical factor for long-term treatment success"}, {"letter": "C", "text": "Partial obturation is as effective as complete obturation"}, {"letter": "D", "text": "Obturation quality is unrelated to periapical healing"}], "correctAnswer": "B", "explanation": "Achieving complete three-dimensional obturation of the entire root canal system is the most critical factor for long-term endodontic treatment success. Studies consistently demonstrate significantly higher success rates when complete obturation is achieved.", "answer": "B"}, {"id": 51, "chapter": 12, "chapterTitle": "Prognosis", "number": 151, "question": "According to the textbook, what is the relationship between the extent of pre-operative pocket depth and endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Pocket depth has no impact on endodontic prognosis"}, {"letter": "B", "text": "Shallow pockets improve prognosis while deep pockets worsen it"}, {"letter": "C", "text": "Deep periodontal pockets indicate compromised periodontal support affecting tooth prognosis"}, {"letter": "D", "text": "Pocket depth is irrelevant to endodontic treatment outcome"}], "correctAnswer": "C", "explanation": "Deep periodontal pockets indicate compromised periodontal support and active periodontal inflammation. These findings significantly worsen the overall long-term prognosis of the tooth, regardless of successful endodontic treatment.", "answer": "C"}, {"id": 52, "chapter": 12, "chapterTitle": "Prognosis", "number": 152, "question": "What is the reported success rate difference between teeth treated with rotary instruments versus manual hand instruments?", "options": [{"letter": "A", "text": "No significant difference in success rates"}, {"letter": "B", "text": "Rotary instruments are approximately 10-15% more successful"}, {"letter": "C", "text": "Manual instruments are more successful than rotary instruments"}, {"letter": "D", "text": "Success rates depend entirely on the operator, not the instrument type"}], "correctAnswer": "A", "explanation": "Modern evidence suggests there is no significant difference in endodontic success rates between teeth treated with rotary instruments versus manual hand instruments when proper technique is used. The quality of preparation and obturation is more important than the instrumentation method.", "answer": "A"}, {"id": 53, "chapter": 12, "chapterTitle": "Prognosis", "number": 153, "question": "According to the textbook, what is the impact of using a heat-source to soften gutta-percha during compaction on obturation quality and prognosis?", "options": [{"letter": "A", "text": "Heat-source application has no impact on obturation quality"}, {"letter": "B", "text": "Heat-softened gutta-percha improves adaptation and may improve prognosis"}, {"letter": "C", "text": "Heat application degrades gutta-percha and decreases prognosis"}, {"letter": "D", "text": "Heat-source methods are contraindicated in all cases"}], "correctAnswer": "B", "explanation": "Using heat-source methods to soften gutta-percha during compaction may improve material adaptation to the canal walls and lateral canals, potentially improving the obturation quality and endodontic prognosis compared to cold compaction techniques.", "answer": "B"}, {"id": 54, "chapter": 12, "chapterTitle": "Prognosis", "number": 154, "question": "What is the relationship between the presence of a positive periapical culture and treatment prognosis in endodontic cases?", "options": [{"letter": "A", "text": "Positive cultures have no impact on treatment prognosis"}, {"letter": "B", "text": "Positive cultures indicate active infection that may compromise treatment success"}, {"letter": "C", "text": "Positive cultures are beneficial as they indicate the immune system is responding"}, {"letter": "D", "text": "Culture results are irrelevant to endodontic treatment outcomes"}], "correctAnswer": "B", "explanation": "Positive periapical cultures indicate active infection and bacterial contamination that may compromise treatment success. Adequate irrigation, disinfection, and antimicrobial strategies are essential to reduce bacterial load and improve prognosis in culture-positive cases.", "answer": "B"}, {"id": 55, "chapter": 12, "chapterTitle": "Prognosis", "number": 155, "question": "According to the textbook, what is the relationship between the smear layer and endodontic treatment prognosis?", "options": [{"letter": "A", "text": "The smear layer has no effect on treatment success"}, {"letter": "B", "text": "The smear layer blocks bacterial penetration and improves prognosis"}, {"letter": "C", "text": "Removal of the smear layer may improve disinfection and obturation quality"}, {"letter": "D", "text": "The smear layer must be left intact for optimal sealing"}], "correctAnswer": "C", "explanation": "Removal of the smear layer by chelating agents such as EDTA may improve disinfection of the root canal system, improve sealer penetration into dentinal tubules, and potentially improve obturation quality and endodontic prognosis.", "answer": "C"}, {"id": 56, "chapter": 12, "chapterTitle": "Prognosis", "number": 156, "question": "What is the impact of the presence of a file in the apex during radiographic evaluation on endodontic treatment success?", "options": [{"letter": "A", "text": "File position in the apex has no impact on treatment success"}, {"letter": "B", "text": "A file in the apex at the correct working length is essential for accurate preparation"}, {"letter": "C", "text": "Accurate determination of working length using a file at the apex is critical for success"}, {"letter": "D", "text": "Files should never be advanced to the apex"}], "correctAnswer": "C", "explanation": "Accurate radiographic determination of working length with a file positioned at the apex is critical for successful endodontic treatment. Proper working length ensures complete instrumentation and obturation while avoiding excessive apical pressure.", "answer": "C"}, {"id": 57, "chapter": 12, "chapterTitle": "Prognosis", "number": 157, "question": "According to the textbook, what is the relationship between post-operative pain and endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Post-operative pain has no impact on long-term prognosis"}, {"letter": "B", "text": "Moderate post-operative pain is expected and does not affect outcomes"}, {"letter": "C", "text": "Severe post-operative pain may indicate complications requiring investigation and retreatment"}, {"letter": "D", "text": "Post-operative pain is irrelevant to treatment success"}], "correctAnswer": "C", "explanation": "While mild to moderate post-operative discomfort is expected, severe pain may indicate complications such as periapical inflammation, overpacking of obturation material, or inadequate anesthesia. Investigation and retreatment may be necessary if severe symptoms persist.", "answer": "C"}, {"id": 58, "chapter": 12, "chapterTitle": "Prognosis", "number": 158, "question": "What is the reported success rate of apicoectomy with modern surgical techniques and retrograde obturation?", "options": [{"letter": "A", "text": "60-70%"}, {"letter": "B", "text": "75-80%"}, {"letter": "C", "text": "85-95%"}, {"letter": "D", "text": "Greater than 98%"}], "correctAnswer": "C", "explanation": "Surgical endodontic treatment (apicoectomy) with modern techniques and retrograde obturation has a reported success rate of approximately 85-95%. This represents a high success rate for the treatment of cases that have failed or cannot be managed by nonsurgical retreatment.", "answer": "C"}, {"id": 59, "chapter": 12, "chapterTitle": "Prognosis", "number": 159, "question": "According to the textbook, what is the impact of the biofilm architecture on the difficulty of disinfection and endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Biofilm has no impact on treatment difficulty or success"}, {"letter": "B", "text": "Biofilm structure protects bacteria from antimicrobial agents and complicates disinfection"}, {"letter": "C", "text": "Biofilms improve treatment outcomes by organizing bacterial metabolism"}, {"letter": "D", "text": "Biofilms are irrelevant to endodontic treatment"}], "correctAnswer": "B", "explanation": "Bacterial biofilm architecture creates a protective environment for bacteria, reducing the effectiveness of antimicrobial agents and complicating disinfection of the root canal system. Proper irrigation techniques, mechanical debridement, and adjunctive disinfection methods are essential to penetrate biofilms.", "answer": "B"}, {"id": 60, "chapter": 12, "chapterTitle": "Prognosis", "number": 160, "question": "What is the relationship between the duration of symptoms before treatment and endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Duration of symptoms has no impact on treatment outcomes"}, {"letter": "B", "text": "Longer symptom duration indicates more advanced pathology and may worsen prognosis"}, {"letter": "C", "text": "Chronic symptoms improve prognosis by allowing immune adaptation"}, {"letter": "D", "text": "Prognosis is determined entirely by tooth type, not symptom duration"}], "correctAnswer": "B", "explanation": "Longer duration of symptoms before treatment indicates more advanced pathology with greater bacterial contamination, inflammatory burden, and potential for periapical pathology. These factors may compromise healing potential and worsen endodontic treatment prognosis.", "answer": "B"}, {"id": 61, "chapter": 12, "chapterTitle": "Prognosis", "number": 161, "question": "According to the textbook, what percentage of teeth with anatomic variations (such as C-shaped canals) can be successfully treated?", "options": [{"letter": "A", "text": "Less than 50%"}, {"letter": "B", "text": "50-70%"}, {"letter": "C", "text": "75-85%"}, {"letter": "D", "text": "Greater than 90%"}], "correctAnswer": "C", "explanation": "Teeth with anatomic variations such as C-shaped canals can be successfully treated approximately 75-85% of the time with proper techniques. Understanding anatomic variations and adapting treatment strategies are essential for managing these challenging cases.", "answer": "C"}, {"id": 62, "chapter": 12, "chapterTitle": "Prognosis", "number": 162, "question": "What is the impact of patient compliance with post-operative instructions on endodontic treatment prognosis?", "options": [{"letter": "A", "text": "Patient compliance has minimal impact on outcomes"}, {"letter": "B", "text": "Patient compliance with instructions affects post-operative healing and long-term prognosis"}, {"letter": "C", "text": "Instructions are unnecessary; treatment success is independent of patient behavior"}, {"letter": "D", "text": "Only compliance with restoration timing affects prognosis"}], "correctAnswer": "B", "explanation": "Patient compliance with post-operative instructions, including avoidance of chewing on the treated tooth, timely restoration placement, and maintenance of oral hygiene, significantly affects post-operative healing and long-term endodontic treatment prognosis.", "answer": "B"}, {"id": 63, "chapter": 12, "chapterTitle": "Prognosis", "number": 163, "question": "According to the textbook, what is the relationship between the apical constriction and working length determination accuracy?", "options": [{"letter": "A", "text": "The apical constriction is irrelevant to working length"}, {"letter": "B", "text": "The apical constriction is a reliable anatomic landmark for determining working length"}, {"letter": "C", "text": "The apical constriction is absent in many teeth, making working length unreliable"}, {"letter": "D", "text": "Working length should always be 1mm beyond the apical constriction"}], "correctAnswer": "B", "explanation": "The apical constriction is a reliable anatomic landmark for determining working length in most teeth. The apical foramen is typically 0.5-1mm apical to the apical constriction. Electronic apex locators are designed to identify the apical constriction.", "answer": "B"}, {"id": 64, "chapter": 12, "chapterTitle": "Prognosis", "number": 164, "question": "What is the reported relationship between the use of lentulo-spiral for sealer delivery and the quality of obturation in endodontic treatment?", "options": [{"letter": "A", "text": "Lentulo-spiral use has no impact on sealer distribution"}, {"letter": "B", "text": "Lentulo-spiral use may improve sealer distribution and obturation quality"}, {"letter": "C", "text": "Lentulo-spiral application always causes overfilling"}, {"letter": "D", "text": "Lentulo-spiral use is contraindicated in endodontic treatment"}], "correctAnswer": "B", "explanation": "The lentulo-spiral, when used properly, may improve sealer distribution throughout the root canal system, potentially improving the quality of obturation and endodontic treatment prognosis compared to sealer application by hand instruments.", "answer": "B"}, {"id": 65, "chapter": 12, "chapterTitle": "Prognosis", "number": 165, "question": "According to the textbook, what is the impact of endodontic retreatment on tooth structure compared to the original treatment?", "options": [{"letter": "A", "text": "Retreatment causes minimal additional tooth structure loss"}, {"letter": "B", "text": "Retreatment causes significant additional removal of tooth structure"}, {"letter": "C", "text": "Retreatment removes less tooth structure than initial treatment"}, {"letter": "D", "text": "Tooth structure loss is irrelevant to endodontic outcomes"}], "correctAnswer": "B", "explanation": "Endodontic retreatment involves significant additional removal of tooth structure due to the need to remove previous filling material and re-instrument the canal system. This additional loss of tooth structure may compromise long-term tooth prognosis and restoration retention.", "answer": "B"}, {"id": 66, "chapter": 12, "chapterTitle": "Prognosis", "number": 166, "question": "What is the relationship between the presence of an apical stop (condensed gutta-percha at the working length) and endodontic treatment success?", "options": [{"letter": "A", "text": "An apical stop is unnecessary for treatment success"}, {"letter": "B", "text": "An apical stop is important for preventing overfilling and maintaining the apical seal"}, {"letter": "C", "text": "An apical stop should never be created during obturation"}, {"letter": "D", "text": "An apical stop only affects anterior tooth treatment success"}], "correctAnswer": "B", "explanation": "Creation of an apical stop with condensed gutta-percha at the working length is important for preventing overfilling of obturation material and maintaining an effective apical seal. Proper apical condensation is essential for successful endodontic treatment.", "answer": "B"}, {"id": 67, "chapter": 12, "chapterTitle": "Prognosis", "number": 167, "question": "According to the textbook, what is the significance of a negative outcome on radiographs at the 1-year follow-up?", "options": [{"letter": "A", "text": "Negative outcomes at 1 year indicate treatment failure requiring retreatment"}, {"letter": "B", "text": "Negative outcomes at 1 year predict a poor long-term prognosis"}, {"letter": "C", "text": "Negative outcomes at 1 year may improve with additional time for healing"}, {"letter": "D", "text": "Radiographic findings are irrelevant to endodontic prognosis"}], "correctAnswer": "C", "explanation": "Negative radiographic outcomes (persistence of periapical pathology) at 1 year do not necessarily predict poor long-term prognosis. Many periapical lesions continue to heal beyond the 1-year mark. Extended follow-up at 2-4 years is recommended for accurate assessment of treatment success.", "answer": "C"}, {"id": 68, "chapter": 12, "chapterTitle": "Prognosis", "number": 168, "question": "What is the relationship between the extent of dentinal sclerosis and endodontic treatment success?", "options": [{"letter": "A", "text": "Dentinal sclerosis has no impact on treatment outcomes"}, {"letter": "B", "text": "Dentinal sclerosis makes canal location and instrumen
