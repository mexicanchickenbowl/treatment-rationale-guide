: "A", "text": "Referred pain is not relevant"}, {"letter": "B", "text": "Pain from cracked teeth may be perceived in adjacent teeth or different areas, making diagnosis challenging; systematic testing is necessary to identify the true source"}, {"letter": "C", "text": "Referred pain always indicates multiple teeth affected"}, {"letter": "D", "text": "Pain localization is always accurate"}], "correctAnswer": "B", "explanation": "Cracked tooth pain can be referred to adjacent teeth or other areas, confusing the patient and clinician about the pain source. This referred pain phenomenon necessitates systematic diagnostic testing (selective anesthesia, percussion testing, transillumination) to identify the actual tooth causing symptoms.", "answer": "B"}, {"id": 96, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 196, "question": "In the assessment of root fractures, what radiographic finding indicates poor healing potential?", "options": [{"letter": "A", "text": "Close approximation indicates poor healing"}, {"letter": "B", "text": "Wide fracture gap with displacement, particularly in middle or coronal third, indicates poor healing potential and increased complication risk"}, {"letter": "C", "text": "All fractures heal equally"}, {"letter": "D", "text": "Radiographic findings do not indicate healing potential"}], "correctAnswer": "B", "explanation": "Wide fracture gaps with segment displacement, particularly when located in the middle or coronal third of the root, indicate poor healing potential. The larger gap makes bone bridging more difficult and increases risk of non-union, pulp necrosis, and healing complications.", "answer": "B"}, {"id": 97, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 197, "question": "What is the significance of 'selective cusp pressure' in cracked tooth management?", "options": [{"letter": "A", "text": "Selective pressure has no value"}, {"letter": "B", "text": "Reducing or redistributing occlusal pressure from specific cusps (particularly cusps over cracks) reduces stress concentration and can prevent progression"}, {"letter": "C", "text": "Occlusal pressure should not be modified"}, {"letter": "D", "text": "Pressure modification has no effect"}], "correctAnswer": "B", "explanation": "Selective cusp pressure reduction targets the specific cusps involved in the crack. By reducing occlusal force on the cracked cusp or redistributing force to other cusps, stress concentration at the crack is reduced, potentially preventing progression and alleviating symptoms.", "answer": "B"}, {"id": 98, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 198, "question": "In the diagnosis of cracked teeth, what is the value of examining opposing tooth wear patterns?", "options": [{"letter": "A", "text": "Wear patterns have no diagnostic value"}, {"letter": "B", "text": "Asymmetric wear or heavy wear on one side may indicate traumatic occlusion or habits affecting the cracked tooth, providing clues about cause"}, {"letter": "C", "text": "Opposing tooth examination is not necessary"}, {"letter": "D", "text": "Wear patterns are irrelevant"}], "correctAnswer": "B", "explanation": "Examining the opposing tooth for wear patterns provides clues about occlusal force distribution and habits. Heavy wear opposing a suspected cracked tooth suggests significant force concentration on that tooth, supporting the diagnosis and indicating need for occlusal modification.", "answer": "B"}, {"id": 99, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 199, "question": "What is the primary purpose of conservative initial management in suspected cracked teeth?", "options": [{"letter": "A", "text": "Conservation has no purpose"}, {"letter": "B", "text": "Conservative initial management (observation, bonding, occlusal adjustment) determines if symptoms resolve; if successful, tooth is preserved; if unsuccessful, more aggressive treatment is indicated"}, {"letter": "C", "text": "All teeth with cracks require aggressive treatment"}, {"letter": "D", "text": "Initial management should always be aggressive"}], "correctAnswer": "B", "explanation": "Conservative initial management of cracked teeth serves a critical diagnostic function. If symptoms resolve with conservative measures, the tooth may be retained long-term. If symptoms persist despite conservative treatment, this indicates either more extensive cracking or pulp involvement requiring more aggressive intervention.", "answer": "B"}, {"id": 100, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 200, "question": "In the comprehensive assessment of cracked and fractured teeth, what is the ultimate goal of treatment planning?", "options": [{"letter": "A", "text": "Extract all cracked teeth"}, {"letter": "B", "text": "Optimize tooth retention while maintaining function, comfort, and esthetics; balance immediate treatment needs with long-term prognosis and patient quality of life"}, {"letter": "C", "text": "Maximize treatment complexity"}, {"letter": "D", "text": "Provide only temporary solutions"}], "correctAnswer": "B", "explanation": "The ultimate goal in cracked and fractured tooth management is to preserve the natural tooth when reasonable prognosis exists, while maintaining functional, comfortable, and esthetic status. This goal is balanced against realistic assessment of long-term outcomes and patient life expectancy.", "answer": "B"}, {"id": 1, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 101, "question": "According to the Heithersay classification, what is the defining characteristic of Grade III external cervical resorption (ECR)?", "options": [{"letter": "A", "text": "Resorption limited to enamel and outer dentin"}, {"letter": "B", "text": "Resorption extending into dentin with pulp chamber involvement"}, {"letter": "C", "text": "Extensive resorption involving more than half the cervical third with pulp involvement"}, {"letter": "D", "text": "Resorption involving the apical third of the root"}], "correctAnswer": "C", "explanation": "Heithersay Grade III ECR is characterized by extensive resorption that extends beyond the cervical third and involves the pulp chamber. This classification helps clinicians determine prognosis and treatment planning for cervical resorptive lesions.", "answer": "C"}, {"id": 2, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 102, "question": "Which of the following is the primary distinguishing feature between internal root resorption (IRR) and external root resorption (ERR)?", "options": [{"letter": "A", "text": "Location of the resorptive process relative to the cementum-dentin junction"}, {"letter": "B", "text": "Rate of progression of resorption"}, {"letter": "C", "text": "Response to calcium hydroxide treatment"}, {"letter": "D", "text": "Color of the resorbing lesion on periapical radiographs"}], "correctAnswer": "A", "explanation": "The fundamental distinction between IRR and ERR is anatomical location. Internal resorption originates from odontoclasts within the pulp chamber, while external resorption originates from odontoclasts outside the cementum-dentin junction. This distinction is critical for diagnosis and treatment planning.", "answer": "A"}, {"id": 3, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 103, "question": "What is the earliest clinical sign of internal root resorption that can be detected on a radiograph?", "options": [{"letter": "A", "text": "Complete obliteration of the pulp chamber"}, {"letter": "B", "text": "Loss of definition of the pulp chamber outline with a diffuse radiolucent area"}, {"letter": "C", "text": "Widening of the pulp canal space"}, {"letter": "D", "text": "Root apex perforation with periapical pathology"}], "correctAnswer": "B", "explanation": "The earliest radiographic sign of internal resorption is loss of definition of the pulp chamber outline with a diffuse radiolucent appearance. Early detection is crucial as internal resorption can progress rapidly and may be irreversible if treatment is delayed.", "answer": "B"}, {"id": 4, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 104, "question": "According to Patel's classification of external cervical resorption, what distinguishes Type II lesions from Type I?", "options": [{"letter": "A", "text": "Type II lesions are subgingival rather than supragingival"}, {"letter": "B", "text": "Type II lesions involve multiple teeth whereas Type I affects single teeth"}, {"letter": "C", "text": "Type II lesions are associated with trauma while Type I lesions are idiopathic"}, {"letter": "D", "text": "Type II lesions are more amenable to orthodontic correction of position"}], "correctAnswer": "A", "explanation": "Patel's classification distinguishes ECR lesions based on location and clinical presentation. Type II lesions are subgingival, making them more challenging to identify and treat. The subgingival location often leads to delayed diagnosis and more advanced resorption at the time of detection.", "answer": "A"}, {"id": 5, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 105, "question": "What is the recommended initial treatment approach for external inflammatory root resorption (EIRR) with vital pulp tissue?", "options": [{"letter": "A", "text": "Extraction of the tooth due to poor prognosis"}, {"letter": "B", "text": "Root canal treatment with calcium hydroxide to arrest odontoclastic activity"}, {"letter": "C", "text": "Topical application of fluoride to the root surface"}, {"letter": "D", "text": "Orthodontic movement to reposition the tooth"}], "correctAnswer": "B", "explanation": "Root canal treatment combined with calcium hydroxide placement is the standard approach for EIRR. The alkaline pH of calcium hydroxide inhibits odontoclast activity by disrupting the low-pH microenvironment necessary for resorption, potentially arresting the resorptive process.", "answer": "B"}, {"id": 6, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 106, "question": "In the context of replacement resorption (ankylosis), what percentage of ankylosed teeth have a poor long-term prognosis?", "options": [{"letter": "A", "text": "15-25%"}, {"letter": "B", "text": "35-45%"}, {"letter": "C", "text": "55-65%"}, {"letter": "D", "text": "75-85%"}], "correctAnswer": "C", "explanation": "Replacement resorption, also known as ankylosis, has a poor long-term prognosis in a significant percentage of cases, typically ranging from 55-65%. The tooth becomes progressively replaced by bone, eventually requiring extraction. Early intervention and management are important to extend the functional life of the tooth.", "answer": "C"}, {"id": 7, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 107, "question": "What clinical presentation on a periapical radiograph is most characteristic of internal root resorption affecting a posterior tooth?", "options": [{"letter": "A", "text": "A well-defined radiopaque lesion at the apex"}, {"letter": "B", "text": "An expanding radiolucent lesion within the root canal space with loss of pulp chamber outline"}, {"letter": "C", "text": "A crescent-shaped radiolucent lesion at the cervical third"}, {"letter": "D", "text": "Multiple small radiolucent areas along the root surface"}], "correctAnswer": "B", "explanation": "Internal root resorption typically presents as an expanding radiolucent lesion within the root canal space with progressive loss of definition of the pulp chamber outline. This appearance is sometimes described as a 'ballooning' or 'blunting' of the pulp chamber. The lesion may initially appear as a widening of the canal space.", "answer": "B"}, {"id": 8, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 108, "question": "Which of the following etiological factors is MOST commonly associated with external cervical resorption?", "options": [{"letter": "A", "text": "Excessive occlusal forces"}, {"letter": "B", "text": "History of orthodontic treatment"}, {"letter": "C", "text": "Trauma to the anterior region"}, {"letter": "D", "text": "Caries lesion adjacent to the cervical area"}], "correctAnswer": "C", "explanation": "Trauma to the anterior region is the most commonly identified etiological factor for external cervical resorption. Even minor injuries that may not be immediately apparent can trigger an inflammatory response in the periodontal ligament and adjacent tissues, leading to the release of odontoclasts that initiate resorptive activity.", "answer": "C"}, {"id": 9, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 109, "question": "In internal root resorption, the resorptive process originates from which anatomical source?", "options": [{"letter": "A", "text": "Odontoclasts in the periodontal ligament"}, {"letter": "B", "text": "Cementoblasts on the root surface"}, {"letter": "C", "text": "Odontoclasts within the pulp tissue"}, {"letter": "D", "text": "Osteoclasts from surrounding bone"}], "correctAnswer": "C", "explanation": "Internal root resorption originates from odontoclasts that are derived from hematopoietic precursor cells within the pulp tissue. These cells are activated by inflammatory mediators released during pulp inflammation, particularly following trauma or irritation to the pulp.", "answer": "C"}, {"id": 10, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 110, "question": "What is the typical clinical presentation of a tooth with internal root resorption at the time of patient presentation?", "options": [{"letter": "A", "text": "Pink discoloration of the crown with no symptoms"}, {"letter": "B", "text": "Acute pain with swelling and mobility"}, {"letter": "C", "text": "Asymptomatic tooth with incidental radiographic finding"}, {"letter": "D", "text": "Severe pain unresponsive to analgesics"}], "correctAnswer": "C", "explanation": "Teeth with internal root resorption are often asymptomatic and are frequently discovered incidentally on routine radiographic examination. The absence of symptoms is due to the fact that the resorption occurs internally within the pulp tissue without affecting the periodontal structures.", "answer": "C"}, {"id": 11, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 111, "question": "According to current literature, what is the primary mechanism by which calcium hydroxide arrests internal root resorption?", "options": [{"letter": "A", "text": "Formation of a physical barrier preventing odontoclast access"}, {"letter": "B", "text": "Elevation of pH to inhibit odontoclast activity and disrupt the resorptive microenvironment"}, {"letter": "C", "text": "Direct cytotoxic effect on odontoclasts"}, {"letter": "D", "text": "Stimulation of cementoblast differentiation"}], "correctAnswer": "B", "explanation": "Calcium hydroxide arrests internal resorption primarily through its high alkaline pH (12.5), which creates an environment unfavorable for odontoclast activity. The elevated pH disrupts the acidic microenvironment necessary for odontoclast function, effectively inhibiting the resorptive process.", "answer": "B"}, {"id": 12, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 112, "question": "What is the recommended treatment protocol for Grade I external cervical resorption according to the Heithersay classification?", "options": [{"letter": "A", "text": "Immediate extraction due to poor prognosis"}, {"letter": "B", "text": "Observation with periodic radiographs to monitor progression"}, {"letter": "C", "text": "Root canal treatment with coronal restoration"}, {"letter": "D", "text": "Surgical removal of resorptive tissue with restoration"}], "correctAnswer": "D", "explanation": "Grade I ECR (limited to enamel and outer dentin) has the most favorable prognosis and can often be treated conservatively with surgical removal of the resorptive tissue, restoration of the defect, and monitoring. Early intervention at this stage prevents progression to more advanced grades with poorer outcomes.", "answer": "D"}, {"id": 13, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 113, "question": "Which radiographic finding is most specific for distinguishing internal root resorption from a pulpal stone?", "options": [{"letter": "A", "text": "Radiopacity within the pulp chamber"}, {"letter": "B", "text": "Expansion and widening of the pulp canal with irregular borders"}, {"letter": "C", "text": "Single discrete radiopaque lesion within the pulp"}, {"letter": "D", "text": "Loss of lamina dura around the root"}], "correctAnswer": "B", "explanation": "Internal root resorption is characterized by expansion and progressive widening of the pulp canal with irregular, ill-defined borders. Pulpal stones, by contrast, appear as discrete radiopaque bodies within the pulp chamber. The expanding nature of the radiolucent lesion in IRR is the key diagnostic feature.", "answer": "B"}, {"id": 14, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 114, "question": "In the context of external inflammatory root resorption, what is the significance of pulp vitality testing?", "options": [{"letter": "A", "text": "Vitality testing is diagnostic and pathognomonic for EIRR"}, {"letter": "B", "text": "A vital response indicates potential pulp involvement and justifies root canal treatment"}, {"letter": "C", "text": "Non-vital teeth with EIRR have a better prognosis than vital teeth"}, {"letter": "D", "text": "Vitality testing is unreliable in cases of EIRR"}], "correctAnswer": "B", "explanation": "In external inflammatory root resorption, vitality testing can indicate pulp involvement. A vital response suggests the pulp is still viable and may be contributing to the inflammatory process. Root canal treatment is often indicated in vital teeth with EIRR to eliminate the inflammatory stimulus and arrest the resorptive process.", "answer": "B"}, {"id": 15, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 115, "question": "What is the primary clinical implication of replacement resorption in the pediatric patient?", "options": [{"letter": "A", "text": "The tooth will eventually be replaced by natural bone healing"}, {"letter": "B", "text": "The affected tooth will progressively ankylose and submerge, requiring eventual extraction"}, {"letter": "C", "text": "Replacement resorption is reversible with proper endodontic treatment"}, {"letter": "D", "text": "The tooth can continue to function indefinitely if properly restored"}], "correctAnswer": "B", "explanation": "In replacement resorption (ankylosis), the affected tooth progressively becomes ankylosed and will submerge as normal alveolar bone height is maintained with normal vertical growth. This process is essentially irreversible, and the tooth will eventually require extraction. Early intervention may extend the functional life of the tooth.", "answer": "B"}, {"id": 16, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 116, "question": "According to the textbook, what percentage of teeth with external cervical resorption show evidence of previous trauma?", "options": [{"letter": "A", "text": "Less than 10%"}, {"letter": "B", "text": "Approximately 30-40%"}, {"letter": "C", "text": "Approximately 70-80%"}, {"letter": "D", "text": "More than 90%"}], "correctAnswer": "C", "explanation": "Approximately 70-80% of teeth with external cervical resorption show a history of previous trauma. This strong association suggests that traumatic injury is a significant etiological factor in the development of ECR, supporting the importance of trauma assessment in the history of patients presenting with resorptive lesions.", "answer": "C"}, {"id": 17, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 117, "question": "What is the primary mechanism by which orthodontic forces can contribute to external root resorption?", "options": [{"letter": "A", "text": "Direct mechanical fracture of the root by the orthodontic appliance"}, {"letter": "B", "text": "Excessive pressure causing compromise of apical blood supply"}, {"letter": "C", "text": "Pressure-induced ischemia triggering inflammatory response and odontoclast activation"}, {"letter": "D", "text": "Fluoride toxicity from orthodontic bracket materials"}], "correctAnswer": "C", "explanation": "Excessive orthodontic forces can cause pressure-induced ischemia in the periodontal ligament and dental tissues, triggering an inflammatory response that leads to odontoclast recruitment and activation. This mechanism explains why aggressive orthodontic movements, particularly with excessive forces or prolonged application, are associated with root resorption.", "answer": "C"}, {"id": 18, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 118, "question": "In a case of internal root resorption with incomplete root development, what treatment consideration is unique to the pediatric patient?", "options": [{"letter": "A", "text": "Root canal treatment must be delayed until root maturation is complete"}, {"letter": "B", "text": "Immediate root canal treatment should be performed using calcium hydroxide to arrest resorption and promote continued root development"}, {"letter": "C", "text": "The tooth should be extracted to prevent ankylosis"}, {"letter": "D", "text": "Systemic antibiotics are required to prevent spread of the resorptive process"}], "correctAnswer": "B", "explanation": "In pediatric cases of internal root resorption, immediate root canal treatment with calcium hydroxide is indicated to arrest the resorptive process while allowing the potential for continued root maturation. Early intervention is critical as the resorption can rapidly progress and compromise the tooth's long-term prognosis.", "answer": "B"}, {"id": 19, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 119, "question": "What is the relationship between pulp inflammation and internal root resorption?", "options": [{"letter": "A", "text": "Pulp inflammation is unrelated to internal resorption"}, {"letter": "B", "text": "Pulp inflammation triggers the release of inflammatory mediators that recruit and activate odontoclasts"}, {"letter": "C", "text": "Internal resorption causes pulp inflammation as a secondary event"}, {"letter": "D", "text": "Only chronic pulp inflammation leads to internal resorption; acute inflammation does not"}], "correctAnswer": "B", "explanation": "Pulp inflammation is the primary trigger for internal root resorption. Inflammatory mediators such as cytokines and growth factors released during pulp inflammation recruit and activate odontoclasts from hematopoietic precursor cells within the pulp tissue, initiating the resorptive process.", "answer": "B"}, {"id": 20, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 120, "question": "According to current evidence, what is the success rate of arresting external cervical resorption when treatment is initiated at Grade II (Heithersay)?", "options": [{"letter": "A", "text": "Less than 30%"}, {"letter": "B", "text": "Approximately 50-60%"}, {"letter": "C", "text": "Approximately 70-80%"}, {"letter": "D", "text": "Greater than 90%"}], "correctAnswer": "C", "explanation": "Treatment of Grade II ECR shows a success rate of approximately 70-80% in arresting resorption when intervention is timely. Earlier intervention (Grade I) has higher success rates, while later intervention (Grade III-IV) has significantly lower success rates, emphasizing the importance of early detection and treatment.", "answer": "C"}, {"id": 21, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 121, "question": "What is the characteristic location of external cervical resorption lesions on maxillary anterior teeth?", "options": [{"letter": "A", "text": "Apical third of the root"}, {"letter": "B", "text": "Middle third of the root surface"}, {"letter": "C", "text": "Cervical third, typically on the buccal surface"}, {"letter": "D", "text": "Interproximal areas between the roots"}], "correctAnswer": "C", "explanation": "External cervical resorption typically affects the cervical third of the root, most commonly on the buccal surface of maxillary anterior teeth. This location corresponds to the area of greatest vulnerability following trauma or compromise of the protective cementum layer.", "answer": "C"}, {"id": 22, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 122, "question": "In internal root resorption, the resorbing tissue appears as what color clinically when viewed through the tooth structure?", "options": [{"letter": "A", "text": "White or cream-colored"}, {"letter": "B", "text": "Dark red or pink, due to granulation tissue and increased vascularity"}, {"letter": "C", "text": "Yellow or amber-colored"}, {"letter": "D", "text": "Black or charred appearance"}], "correctAnswer": "B", "explanation": "Internal root resorption presents clinically as a dark red or pink discoloration visible through the tooth structure. This characteristic appearance is due to the highly vascularized granulation tissue that comprises the resorptive lesion. The pink discoloration can be visualized from the incisal or occlusal aspect of the crown.", "answer": "B"}, {"id": 23, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 123, "question": "What is the significance of Patel Type III external cervical resorption in terms of treatment planning?", "options": [{"letter": "A", "text": "Type III lesions are more responsive to conservative treatment than Type I or II"}, {"letter": "B", "text": "Type III lesions typically involve multiple teeth and require systemic investigation"}, {"letter": "C", "text": "Type III lesions have the same prognosis as Type I lesions"}, {"letter": "D", "text": "Type III lesions are always associated with neoplastic disease"}], "correctAnswer": "B", "explanation": "Patel Type III ECR (generalized/multiple tooth involvement) has different treatment implications than localized forms. Multiple tooth involvement warrants systemic investigation to identify underlying causes such as hyperthyroidism, Paget's disease, or other systemic conditions that may trigger generalized resorption.", "answer": "B"}, {"id": 24, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 124, "question": "According to the textbook, how rapidly does internal root resorption typically progress from initial detection to pulp chamber perforation if left untreated?", "options": [{"letter": "A", "text": "Months to years"}, {"letter": "B", "text": "Several weeks to months"}, {"letter": "C", "text": "Hours to days"}, {"letter": "D", "text": "Years to decades"}], "correctAnswer": "A", "explanation": "Internal root resorption can progress relatively rapidly, typically progressing from initial radiographic detection to pulp chamber perforation over months to years. The rate of progression varies depending on the severity of the inflammatory stimulus and individual factors, but the process is generally considered progressive and irreversible without intervention.", "answer": "A"}, {"id": 25, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 125, "question": "In the differential diagnosis of internal versus external root resorption, which finding is most helpful in distinguishing the two?", "options": [{"letter": "A", "text": "Tooth mobility"}, {"letter": "B", "text": "Presence or absence of a lamina dura"}, {"letter": "C", "text": "The location and radiographic appearance of the radiolucent lesion relative to the tooth outline"}, {"letter": "D", "text": "Response to percussion testing"}], "correctAnswer": "C", "explanation": "The radiographic location and appearance of the lesion relative to the tooth outline is the most reliable way to differentiate internal from external resorption. Internal resorption appears as a radiolucent lesion within the root outline that expands from within. External resorption appears as a radiolucent lesion that originates from outside the root outline.", "answer": "C"}, {"id": 26, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 126, "question": "What is the recommended duration of calcium hydroxide placement for internal root resorption treatment?", "options": [{"letter": "A", "text": "1-2 weeks until symptoms resolve"}, {"letter": "B", "text": "2-4 weeks to establish initial arrest"}, {"letter": "C", "text": "At least 4-6 weeks with periodic monitoring for complete arrest"}, {"letter": "D", "text": "Indefinitely as a permanent dressing"}], "correctAnswer": "C", "explanation": "Calcium hydroxide should be maintained for at least 4-6 weeks in cases of internal root resorption to allow sufficient time for pH elevation and arrest of the resorptive process. Periodic radiographic monitoring during this period is recommended to assess whether resorption has halted before proceeding with final obturation.", "answer": "C"}, {"id": 27, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 127, "question": "According to the textbook, what is the primary reason why external cervical resorption is often discovered late in its progression?", "options": [{"letter": "A", "text": "The lesion is always internal and cannot be detected by clinical examination"}, {"letter": "B", "text": "Subgingival location of many lesions makes them difficult to visualize clinically"}, {"letter": "C", "text": "Patients are typically asymptomatic until extensive resorption has occurred"}, {"letter": "D", "text": "All of the above"}], "correctAnswer": "D", "explanation": "Late discovery of ECR is multifactorial. Many lesions are subgingival and not visible clinically, patients are typically asymptomatic, and some ECR lesions are purely internal. This combination of factors often results in diagnosis only after significant resorption has progressed, limiting treatment options.", "answer": "D"}, {"id": 28, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 128, "question": "What is the relationship between cementum loss and external root resorption development?", "options": [{"letter": "A", "text": "Cementum loss is unrelated to external resorption"}, {"letter": "B", "text": "Loss of the protective cementum layer exposes dentin to odontoclastic attack"}, {"letter": "C", "text": "Cementum loss occurs as a result of external resorption, not as a cause"}, {"letter": "D", "text": "Only pathological cementum loss leads to resorption; physiological loss does not"}], "correctAnswer": "B", "explanation": "The cementum layer provides protection against resorption. When cementum is lost due to trauma, attrition, or other causes, the underlying dentin becomes exposed to odontoclasts, significantly increasing the risk of external root resorption. This is why traumatized teeth, especially those with cementum loss, are particularly susceptible to resorption.", "answer": "B"}, {"id": 29, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 129, "question": "In the context of replacement resorption, what is the clinical significance of tooth submergence?", "options": [{"letter": "A", "text": "Submergence indicates the tooth is becoming mobile and will soon exfoliate"}, {"letter": "B", "text": "Submergence is a sign of successful stabilization and healing"}, {"letter": "C", "text": "Progressive submergence indicates continuation of the replacement resorptive process"}, {"letter": "D", "text": "Submergence is irrelevant to the prognosis of the tooth"}], "correctAnswer": "C", "explanation": "Progressive submergence of an ankylosed tooth indicates ongoing replacement resorption. As normal vertical growth continues around the ankylosed tooth, the tooth appears to submerge relative to adjacent teeth and normal alveolar crest height. This is a sign of continued resorptive activity and progression toward eventual need for extraction.", "answer": "C"}, {"id": 30, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 130, "question": "What is the most significant prognostic factor for the long-term retention of a tooth with external cervical resorption?", "options": [{"letter": "A", "text": "Patient age at time of diagnosis"}, {"letter": "B", "text": "Grade of resorption at the time of treatment initiation"}, {"letter": "C", "text": "Tooth type (anterior versus posterior)"}, {"letter": "D", "text": "Previous history of trauma to the tooth"}], "correctAnswer": "B", "explanation": "The grade of resorption at the time of treatment is the most significant prognostic factor. Early grades (I-II) have significantly better prognosis than advanced grades (III-IV). This highlights the importance of early detection and timely intervention in managing external cervical resorption.", "answer": "B"}, {"id": 31, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 131, "question": "According to the textbook, what is the characteristic histological appearance of the resorptive lesion in internal root resorption?", "options": [{"letter": "A", "text": "Dense fibrous tissue with minimal cellular activity"}, {"letter": "B", "text": "Highly vascularized granulation tissue with abundant odontoclasts and osteoclasts"}, {"letter": "C", "text": "Necrotic tissue with calcification"}, {"letter": "D", "text": "Epithelial tissue with inflammatory infiltrate"}], "correctAnswer": "B", "explanation": "Histologically, internal root resorption consists of highly vascularized granulation tissue containing abundant odontoclasts and osteoclasts. This highly cellular and active tissue is responsible for the progressive resorption of dentin and other hard tissues within the pulp chamber and root canal space.", "answer": "B"}, {"id": 32, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 132, "question": "What is the primary difference between cervical resorption and external inflammatory root resorption (EIRR)?", "options": [{"letter": "A", "text": "Cervical resorption is internal; EIRR is external"}, {"letter": "B", "text": "Cervical resorption is limited to the cervical third; EIRR can involve any portion of the root"}, {"letter": "C", "text": "Cervical resorption is associated with trauma; EIRR is not"}, {"letter": "D", "text": "There is no clinical difference; the terms are synonymous"}], "correctAnswer": "B", "explanation": "External cervical resorption, by definition, is limited to the cervical third of the root. External inflammatory root resorption (EIRR) can involve any portion of the root surface. This anatomical distinction is important for diagnosis and treatment planning, as lesions in different locations may require different management approaches.", "answer": "B"}, {"id": 33, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 133, "question": "In the treatment of external cervical resorption, what is the purpose of surgical exposure of the lesion?", "options": [{"letter": "A", "text": "To allow extraction of the tooth"}, {"letter": "B", "text": "To visualize the extent of resorption and remove resorptive tissue"}, {"letter": "C", "text": "To drain any periapical abscess"}, {"letter": "D", "text": "To allow placement of orthodontic brackets"}], "correctAnswer": "B", "explanation": "Surgical exposure of an external cervical resorptive lesion allows the clinician to visualize the extent of resorption and remove the resorptive granulation tissue. This is typically followed by restoration of the defect with biocompatible materials such as glass ionomer or composite resin to prevent recurrence of resorption.", "answer": "B"}, {"id": 34, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 134, "question": "According to the textbook, what is the typical radiographic appearance of a tooth with Grade II external cervical resorption (Heithersay)?", "options": [{"letter": "A", "text": "A small radiolucent defect limited to the cervical area"}, {"letter": "B", "text": "An expanding radiolucent lesion extending into the middle third of the root"}, {"letter": "C", "text": "Complete loss of the apical third of the root"}, {"letter": "D", "text": "A well-demarcated radiopaque mass at the cervical region"}], "correctAnswer": "B", "explanation": "Grade II ECR shows a radiolucent lesion that extends beyond the cervical third into the middle third of the root. This represents moderate involvement that has extended beyond the superficial cervical area, indicating more advanced disease that requires intervention to prevent further progression.", "answer": "B"}, {"id": 35, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 135, "question": "What is the clinical significance of a positive response to vitality tests in a tooth with suspected external inflammatory root resorption?", "options": [{"letter": "A", "text": "It indicates the tooth has no pulpal involvement and does not require root canal treatment"}, {"letter": "B", "text": "It confirms the diagnosis of external inflammatory resorption with pulpal vitality intact"}, {"letter": "C", "text": "It suggests the resorptive process has arrested and the tooth will heal spontaneously"}, {"letter": "D", "text": "It indicates the tooth should be extracted due to poor prognosis"}], "correctAnswer": "B", "explanation": "A positive response to vitality tests in external inflammatory root resorption indicates that the pulp is still vital. This finding confirms that the resorption is occurring externally from the periodontal side, but the pulp may still be involved in the inflammatory process. Root canal treatment is often indicated to eliminate the inflammatory stimulus.", "answer": "B"}, {"id": 36, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 136, "question": "In internal root resorption, why is immediate treatment essential rather than observation?", "options": [{"letter": "A", "text": "The condition is always painful and requires urgent relief"}, {"letter": "B", "text": "The resorptive process is progressive and can lead to loss of the tooth if untreated"}, {"letter": "C", "text": "Observation will result in spread of resorption to adjacent teeth"}, {"letter": "D", "text": "The condition is always associated with systemic disease requiring medical evaluation"}], "correctAnswer": "B", "explanation": "Internal root resorption is a progressive condition. If left untreated, it will continue to advance, eventually leading to perforation of the pulp chamber and potentially loss of the tooth. Immediate intervention with root canal treatment and calcium hydroxide can arrest the resorptive process and preserve the tooth.", "answer": "B"}, {"id": 37, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 137, "question": "According to Patel's classification, what distinguishes Type I external cervical resorption from Type II?", "options": [{"letter": "A", "text": "Type I is pink; Type II is dark red"}, {"letter": "B", "text": "Type I is supragingival; Type II is subgingival"}, {"letter": "C", "text": "Type I involves single teeth; Type II affects multiple teeth"}, {"letter": "D", "text": "Type I is symptomatic; Type II is asymptomatic"}], "correctAnswer": "B", "explanation": "In Patel's classification, Type I external cervical resorption is supragingival (visible clinically), while Type II is subgingival (located below the gingival margin). The subgingival location of Type II lesions makes them more difficult to detect and treat, contributing to delayed diagnosis and more advanced disease at presentation.", "answer": "B"}, {"id": 38, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 138, "question": "What is the recommended material for filling the root canal after arresting internal root resorption with calcium hydroxide?", "options": [{"letter": "A", "text": "Calcium hydroxide left permanently without gutta-percha obturation"}, {"letter": "B", "text": "Gutta-percha with a calcium hydroxide-based sealer"}, {"letter": "C", "text": "Silver amalgam for superior apical seal"}, {"letter": "D", "text": "Zinc oxide eugenol cement without gutta-percha"}], "correctAnswer": "B", "explanation": "After arresting internal root resorption with calcium hydroxide, the root canal should be obturated with gutta-percha using a calcium hydroxide-based sealer or another biocompatible sealer. This provides a three-dimensional seal of the root canal system while maintaining the beneficial effects of calcium hydroxide.", "answer": "B"}, {"id": 39, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 139, "question": "In the treatment of replacement resorption in an adolescent patient, what is the primary goal of intervention?", "options": [{"letter": "A", "text": "To cure the condition and prevent any further resorption"}, {"letter": "B", "text": "To extend the functional life of the tooth as long as possible"}, {"letter": "C", "text": "To prepare the patient for inevitable extraction"}, {"letter": "D", "text": "To stimulate secondary dentin formation"}], "correctAnswer": "B", "explanation": "Replacement resorption is essentially irreversible. The goal of treatment is to extend the functional life of the tooth as long as possible, recognizing that the tooth will eventually ankylose and submerge. Interventions such as root canal treatment may help stabilize the situation temporarily, but extraction will eventually be necessary.", "answer": "B"}, {"id": 40, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 140, "question": "What is the primary mechanism by which trauma initiates external root resorption?", "options": [{"letter": "A", "text": "Direct mechanical damage to cementum and dentin"}, {"letter": "B", "text": "Mechanical disruption of blood supply leading to ischemia and inflammatory response"}, {"letter": "C", "text": "Infection of the periodontal ligament following traumatic injury"}, {"letter": "D", "text": "Chemical toxicity from breakdown products of pulp necrosis"}], "correctAnswer": "B", "explanation": "Trauma initiates external root resorption through mechanical disruption of the periodontal ligament and blood supply, leading to ischemia and hypoxia. This triggers an inflammatory response with release of cytokines and growth factors that recruit and activate odontoclasts, initiating the resorptive process.", "answer": "B"}, {"id": 41, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 141, "question": "According to the textbook, what is the prevalence of external cervical resorption in the general population?", "options": [{"letter": "A", "text": "Less than 1%"}, {"letter": "B", "text": "1-2%"}, {"letter": "C", "text": "5-10%"}, {"letter": "D", "text": "Greater than 15%"}], "correctAnswer": "B", "explanation": "External cervical resorption has a reported prevalence of approximately 1-2% in the general population, though some studies suggest it may be higher due to subgingival lesions that are not detected. The condition is relatively uncommon compared to other pathologies but is clinically significant due to its potentially serious consequences.", "answer": "B"}, {"id": 42, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 142, "question": "In the differential diagnosis of internal root resorption, what finding on vitality testing would be expected?", "options": [{"letter": "A", "text": "Complete non-responsiveness to all vitality tests"}, {"letter": "B", "text": "Normal or exaggerated response to vitality tests due to intact pulp tissue"}, {"letter": "C", "text": "Delayed response compared to contralateral teeth"}, {"letter": "D", "text": "Variable response depending on the location of the stimulation"}], "correctAnswer": "B", "explanation": "In internal root resorption, the pulp tissue is typically vital and will respond normally or sometimes in an exaggerated manner to vitality tests. This is because the resorptive process occurs within vital pulp tissue. Non-vitality would suggest external resorption or other pathology.", "answer": "B"}, {"id": 43, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 143, "question": "What is the recommended follow-up radiographic schedule for a tooth treated for internal root resorption?", "options": [{"letter": "A", "text": "No follow-up radiographs needed after final obturation"}, {"letter": "B", "text": "Radiographs at 6 months, 1 year, and 2 years to monitor for recurrence"}, {"letter": "C", "text": "Annual radiographs for 5 years to ensure no recurrence of resorption"}, {"letter": "D", "text": "Only if patient reports symptoms"}], "correctAnswer": "B", "explanation": "Periodic radiographic monitoring is recommended following treatment of internal root resorption to ensure that the resorptive process has been arrested and to detect any recurrence. Follow-up radiographs at 6 months, 1 year, and 2 years are typically recommended to confirm successful treatment.", "answer": "B"}, {"id": 44, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 144, "question": "In external inflammatory root resorption, what is the significance of the location of the lesion relative to the epithelial attachment?", "options": [{"letter": "A", "text": "Location is clinically irrelevant; all lesions require the same treatment"}, {"letter": "B", "text": "Lesions at the epithelial attachment may be associated with deeper periodontal involvement"}, {"letter": "C", "text": "Lesions apical to the epithelial attachment are always benign and do not require treatment"}, {"letter": "D", "text": "Location determines whether the tooth can be saved or must be extracted"}], "correctAnswer": "B", "explanation": "External resorptive lesions located at the epithelial attachment may indicate involvement of the periodontal structures and potential for deeper periodontal defects. This location is clinically significant because it suggests periodontal inflammation may be contributing to the resorptive process.", "answer": "B"}, {"id": 45, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 145, "question": "What is the primary advantage of using mineral trioxide aggregate (MTA) over calcium hydroxide in treating internal root resorption?", "options": [{"letter": "A", "text": "MTA has superior antimicrobial properties"}, {"letter": "B", "text": "MTA provides a more permanent biocompatible barrier with superior sealing ability"}, {"letter": "C", "text": "MTA requires shorter treatment duration than calcium hydroxide"}, {"letter": "D", "text": "MTA eliminates the need for final obturation with gutta-percha"}], "correctAnswer": "B", "explanation": "While calcium hydroxide remains the standard treatment for internal resorption, MTA offers advantages as a more permanent biocompatible barrier with superior sealing ability. MTA can be used for final obturation or as a blockage apical to persistent resorption if treatment with calcium hydroxide alone is unsuccessful.", "answer": "B"}, {"id": 46, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 146, "question": "According to the textbook, what is the typical tooth most commonly affected by internal root resorption?", "options": [{"letter": "A", "text": "Maxillary incisors"}, {"letter": "B", "text": "Mandibular molars"}, {"letter": "C", "text": "Mandibular incisors"}, {"letter": "D", "text": "Maxillary canines"}], "correctAnswer": "A", "explanation": "Maxillary incisors are the teeth most commonly affected by internal root resorption. This is likely due to their susceptibility to trauma, which is a common etiological factor in initiating the inflammatory response that triggers internal resorption.", "answer": "A"}, {"id": 47, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 147, "question": "In the treatment of external cervical resorption, what is the purpose of applying a biocompatible material to the defect after surgical removal of resorptive tissue?", "options": [{"letter": "A", "text": "To provide antimicrobial properties and prevent infection"}, {"letter": "B", "text": "To stop the resorptive process and prevent recurrence by sealing the defect"}, {"letter": "C", "text": "To stimulate cementum regeneration"}, {"letter": "D", "text": "To prevent the tooth from exfoliation"}], "correctAnswer": "B", "explanation": "Application of a biocompatible material such as glass ionomer, composite, or MTA after surgical removal of resorptive tissue serves to seal the defect and prevent recurrence of resorption. The material creates a barrier that prevents further ingress of odontoclasts and inflammatory mediators.", "answer": "B"}, {"id": 48, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 148, "question": "What is the clinical significance of pink discoloration visible through the crown in internal root resorption?", "options": [{"letter": "A", "text": "It indicates the tooth pulp has become necrotic"}, {"letter": "B", "text": "It is a pathognomonic sign of internal resorption and indicates urgent treatment need"}, {"letter": "C", "text": "It is a cosmetic concern only with no clinical significance"}, {"letter": "D", "text": "It indicates external resorption rather than internal"}], "correctAnswer": "B", "explanation": "Pink discoloration visible through the crown due to the highly vascularized resorptive granulation tissue is a pathognomonic sign of internal root resorption. This visible sign indicates the resorptive process is advanced enough to affect the crown color and warrants immediate treatment to arrest the process.", "answer": "B"}, {"id": 49, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 149, "question": "According to the textbook, what is the estimated prevalence of internal root resorption among teeth that have experienced traumatic injury?", "options": [{"letter": "A", "text": "Less than 1%"}, {"letter": "B", "text": "2-3%"}, {"letter": "C", "text": "5-10%"}, {"letter": "D", "text": "15-20%"}], "correctAnswer": "B", "explanation": "Approximately 2-3% of traumatized teeth develop internal root resorption. While not common in all traumatized teeth, there is a clear association between trauma and subsequent internal resorption, making periodic monitoring of traumatized teeth important for early detection and treatment.", "answer": "B"}, {"id": 50, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 150, "question": "In the treatment of Grade IV external cervical resorption (Heithersay), what is the most appropriate clinical approach?", "options": [{"letter": "A", "text": "Conservative treatment with calcium hydroxide"}, {"letter": "B", "text": "Surgical exposure and removal of resorptive tissue with restoration"}, {"letter": "C", "text": "Extraction due to extensive resorption and poor prognosis"}, {"letter": "D", "text": "Root canal treatment alone without surgical intervention"}], "correctAnswer": "C", "explanation": "Grade IV external cervical resorption is extensive and has invaded the apical third of the root and potentially the apex itself. At this advanced stage, the prognosis is very poor and extraction is typically the most appropriate treatment option. Earlier intervention at Grade I or II offers significantly better chances of successful arrest and retention.", "answer": "C"}, {"id": 51, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 151, "question": "What is the primary clinical implication of external inflammatory root resorption (EIRR) originating from the periodontal ligament?", "options": [{"letter": "A", "text": "The resorption can be arrested by root canal treatment alone without periodontal therapy"}, {"letter": "B", "text": "Periodontal health and inflammation control are essential components of treatment strategy"}, {"letter": "C", "text": "EIRR is always associated with complete loss of periodontal support"}, {"letter": "D", "text": "External resorption from the PDL cannot be treated successfully"}], "correctAnswer": "B", "explanation": "Since EIRR originates from the periodontal ligament and is driven by periodontal inflammation, control of periodontal disease and inflammation is essential to arrest the resorptive process. Root canal treatment may be necessary to eliminate endodontic sources of inflammation, but periodontal therapy is equally important for successful treatment.", "answer": "B"}, {"id": 52, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 152, "question": "In the radiographic diagnosis of internal root resorption, why is the use of multiple angles important?", "options": [{"letter": "A", "text": "Multiple angles are unnecessary; a single periapical radiograph is sufficient"}, {"letter": "B", "text": "Multiple angles help differentiate internal resorption from artifacts and other pathologies"}, {"letter": "C", "text": "Multiple angles allow better visualization of the expanding resorptive lesion"}, {"letter": "D", "text": "Both B and C"}], "correctAnswer": "D", "explanation": "Multiple radiographic angles are important in diagnosing internal root resorption because they help differentiate the resorption from radiographic artifacts, superimposition, and other pathologies. Multiple angles also provide better visualization of the three-dimensional extent of the expanding resorptive lesion within the root.", "answer": "D"}, {"id": 53, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 153, "question": "According to the textbook, what is the mechanism by which elevated pH inhibits odontoclast activity in internal root resorption treatment?", "options": [{"letter": "A", "text": "Direct toxicity to odontoclasts due to alkalinity"}, {"letter": "B", "text": "Disruption of the acidic microenvironment necessary for odontoclast function and mineral resorption"}, {"letter": "C", "text": "Stimulation of osteoblast and cementoblast formation to replace resorbed tissue"}, {"letter": "D", "text": "Neutralization of inflammatory mediators that recruit odontoclasts"}], "correctAnswer": "B", "explanation": "Odontoclasts require an acidic microenvironment to function and demineralize hard tissues. Calcium hydroxide's high alkaline pH (12.5) disrupts this necessary acidic environment, effectively inhibiting odontoclast activity. This mechanism is why calcium hydroxide is so effective in arresting internal resorption.", "answer": "B"}, {"id": 54, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 154, "question": "What is the clinical significance of detecting internal root resorption at an early stage when the lesion has not yet affected the root outline?", "options": [{"letter": "A", "text": "Early lesions are not progressive and do not require treatment"}, {"letter": "B", "text": "Early detection allows intervention before extensive tooth structure loss, improving prognosis"}, {"letter": "C", "text": "Early lesions will arrest spontaneously without treatment"}, {"letter": "D", "text": "Early detection is clinically insignificant because symptoms will eventually prompt treatment"}], "correctAnswer": "B", "explanation": "Early detection and treatment of internal root resorption before extensive involvement of the root outline significantly improves prognosis by allowing intervention before large amounts of dentin and pulp tissue are lost. This underscores the importance of regular radiographic monitoring of teeth with risk factors for resorption, such as traumatized teeth.", "answer": "B"}, {"id": 55, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 155, "question": "In external cervical resorption, what is the relationship between the location of the lesion and its accessibility for treatment?", "options": [{"letter": "A", "text": "Supragingival lesions are easier to treat than subgingival lesions"}, {"letter": "B", "text": "Subgingival lesions are easier to treat due to less exposure to oral bacteria"}, {"letter": "C", "text": "Location does not affect treatment accessibility or prognosis"}, {"letter": "D", "text": "Lesions on posterior teeth are always easier to treat than anterior teeth"}], "correctAnswer": "A", "explanation": "Supragingival external cervical resorption lesions (Patel Type I) are more accessible for surgical treatment and restoration compared to subgingival lesions (Patel Type II). The subgingival location of Type II lesions makes them more difficult to visualize, treat, and restore, contributing to less favorable outcomes.", "answer": "A"}, {"id": 56, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 156, "question": "According to the textbook, what is the recommended approach if internal root resorption recurs after initial treatment with calcium hydroxide?", "options": [{"letter": "A", "text": "Immediate extraction of the tooth"}, {"letter": "B", "text": "Retreatment with calcium hydroxide for a longer duration"}, {"letter": "C", "text": "Consideration of MTA or other biocompatible materials apical to the resorptive site"}, {"letter": "D", "text": "Systemic antibiotics combined with increased calcium hydroxide concentration"}], "correctAnswer": "C", "explanation": "If internal root resorption recurs despite adequate calcium hydroxide treatment, consideration should be given to alternative approaches such as placement of MTA apical to the resorptive site to create a biocompatible barrier. This may be more effective in arresting persistent resorption than calcium hydroxide alone.", "answer": "C"}, {"id": 57, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 157, "question": "What is the clinical significance of pulp chamber obliteration in internal root resorption?", "options": [{"letter": "A", "text": "Obliteration indicates the resorptive process has halted and the tooth is healing"}, {"letter": "B", "text": "Obliteration is a sign of successful treatment and no further monitoring is needed"}, {"letter": "C", "text": "Obliteration may indicate reparative processes but does not necessarily mean resorption has completely arrested"}, {"letter": "D", "text": "Obliteration is a contraindication to root canal treatment"}], "correctAnswer": "C", "explanation": "While pulp chamber obliteration may represent a reparative response and suggest some arrest of the resorptive process, it does not definitively indicate complete arrest of resorption. Continued monitoring is necessary because resorption can recur even after apparent reparative changes have occurred.", "answer": "C"}, {"id": 58, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 158, "question": "In the treatment of external inflammatory root resorption with non-vital teeth, what is the primary treatment objective?", "options": [{"letter": "A", "text": "Root canal treatment is contraindicated in non-vital teeth with EIRR"}, {"letter": "B", "text": "Root canal treatment to eliminate endodontic sources of inflammation that perpetuate resorption"}, {"letter": "C", "text": "Extraction due to combined endodontic and resorptive pathology"}, {"letter": "D", "text": "Observation with periodic radiographs to monitor disease progression"}], "correctAnswer": "B", "explanation": "In non-vital teeth with EIRR, root canal treatment is indicated to eliminate endodontic inflammation and sources of cytokines that perpetuate the resorptive process. Combined with periodontal therapy and control of periodontal inflammation, root canal treatment may help arrest external inflammatory resorption.", "answer": "B"}, {"id": 59, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 159, "question": "According to the textbook, what is the anatomical reason why maxillary anterior teeth are more susceptible to internal root resorption than other teeth?", "options": [{"letter": "A", "text": "Maxillary anterior teeth have thinner pulp chambers making them more prone to trauma"}, {"letter": "B", "text": "Maxillary anterior teeth are exposed to greater mechanical trauma due to their position"}, {"letter": "C", "text": "Maxillary anterior teeth have different pulpal tissue composition than posterior teeth"}, {"letter": "D", "text": "Maxillary anterior teeth lack protective enamel on the cervical region"}], "correctAnswer": "B", "explanation": "Maxillary anterior teeth are more susceptible to internal root resorption primarily because they are exposed to greater mechanical trauma due to their prominent anterior position. Trauma is a significant etiological factor in initiating internal resorption, explaining the higher prevalence in anterior teeth.", "answer": "B"}, {"id": 60, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 160, "question": "What is the primary clinical advantage of early diagnosis of external cervical resorption before the lesion becomes subgingival?", "options": [{"letter": "A", "text": "The lesion is always reversible if detected supragingival"}, {"letter": "B", "text": "Supragingival lesions are visible and accessible for treatment before they become more extensive"}, {"letter": "C", "text": "Supragingival lesions do not progress to subgingival involvement"}, {"letter": "D", "text": "Diagnosis is easier but treatment outcomes are the same regardless of timing"}], "correctAnswer": "B", "explanation": "The primary advantage of early diagnosis of external cervical resorption while the lesion is still supragingival is that the lesion is visible and easily accessible for surgical treatment. Supragingival lesions can be diagnosed and treated before they progress to the subgingival region where they become more difficult to visualize and treat.", "answer": "B"}, {"id": 61, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 161, "question": "According to the textbook, what is the long-term prognosis of a tooth with Grade III external cervical resorption (Heithersay)?", "options": [{"letter": "A", "text": "Excellent prognosis with high probability of long-term retention"}, {"letter": "B", "text": "Good prognosis if treated early with surgical intervention"}, {"letter": "C", "text": "Poor prognosis with low probability of long-term retention despite treatment"}, {"letter": "D", "text": "Prognosis is variable and depends only on the patient's age"}], "correctAnswer": "C", "explanation": "Grade III external cervical resorption has poor prognosis with low probability of long-term tooth retention. The extensive nature of the lesion involving the pulp chamber makes it difficult to arrest completely, and the amount of tooth structure loss is significant. Extraction may eventually be necessary.", "answer": "C"}, {"id": 62, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 162, "question": "In the differential diagnosis of internal root resorption, why is checking for a history of trauma important?", "options": [{"letter": "A", "text": "Trauma history is diagnostic and pathognomonic for internal resorption"}, {"letter": "B", "text": "Trauma is the most common etiological factor initiating internal resorption"}, {"letter": "C", "text": "Trauma history rules out other resorptive conditions"}, {"letter": "D", "text": "Trauma history is clinically irrelevant to resorption diagnosis"}], "correctAnswer": "B", "explanation": "A history of trauma is important in the diagnosis of internal root resorption because trauma is the most common etiological factor triggering the inflammatory response that initiates resorption. While not diagnostic alone, a positive trauma history significantly increases the likelihood of internal resorption in a tooth with appropriate radiographic findings.", "answer": "B"}, {"id": 63, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 163, "question": "What is the primary reason that external inflammatory root resorption may progress more rapidly than other forms of root resorption?", "options": [{"letter": "A", "text": "EIRR only affects the root apex and progresses rapidly toward the pulp"}, {"letter": "B", "text": "EIRR originates from the highly vascularized periodontal tissues providing abundant inflammatory mediators"}, {"letter": "C", "text": "EIRR is always associated with bacterial infection"}, {"letter": "D", "text": "EIRR is the result of complete pulp necrosis"}], "correctAnswer": "B", "explanation": "External inflammatory root resorption may progress rapidly because it originates from the highly vascularized periodontal ligament and surrounding tissues. These tissues provide abundant inflammatory mediators and cytokines that continuously recruit and activate odontoclasts, driving the resorptive process.", "answer": "B"}, {"id": 64, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 164, "question": "According to the textbook, what is the recommended initial radiographic investigation for a patient with suspected internal root resorption?", "options": [{"letter": "A", "text": "Periapical radiograph only with no additional imaging"}, {"letter": "B", "text": "Periapical radiograph supplemented by occlusal radiographs or CBCT for three-dimensional assessment"}, {"letter": "C", "text": "Bitewings and occlusal radiographs only"}, {"letter": "D", "text": "Panoramic radiograph as the sole diagnostic imaging"}], "correctAnswer": "B", "explanation": "Periapical radiographs supplemented by occlusal radiographs or cone-beam computed tomography provide the most comprehensive radiographic assessment of internal root resorption. This allows visualization of the lesion from multiple angles and provides information about the three-dimensional extent of resorption.", "answer": "B"}, {"id": 65, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 165, "question": "What is the clinical significance of the finding of inflammatory cells and granulation tissue in the histology of internal root resorption?", "options": [{"letter": "A", "text": "This finding indicates infection and need for antibiotics"}, {"letter": "B", "text": "This finding indicates an inflammatory response driving odontoclast activation and resorption"}, {"letter": "C", "text": "This finding indicates healing and arrest of the resorptive process"}, {"letter": "D", "text": "This finding is nonspecific and clinically irrelevant"}], "correctAnswer": "B", "explanation": "The presence of inflammatory cells and granulation tissue in internal root resorption indicates active inflammatory response that is driving odontoclast recruitment and activation. This inflammatory activity is the underlying cause of the resorption and explains why anti-inflammatory treatment with calcium hydroxide is effective.", "answer": "B"}, {"id": 66, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 166, "question": "In external cervical resorption, what is the significance of cementum loss in the pathogenesis?", "options": [{"letter": "A", "text": "Cementum loss is a consequence of resorption, not a cause"}, {"letter": "B", "text": "Loss of the protective cementum layer is the initial pathological event"}, {"letter": "C", "text": "Cementum loss only occurs after advanced dentin resorption"}, {"letter": "D", "text": "Cementum loss is irrelevant to external cervical resorption pathogenesis"}], "correctAnswer": "B", "explanation": "In external cervical resorption, loss of the protective cementum layer is often the initial pathological event, frequently due to trauma, attrition, or periodontal disease. Once cementum is lost, the underlying dentin becomes exposed and vulnerable to odontoclastic resorption, initiating or accelerating the resorptive process.", "answer": "B"}, {"id": 67, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 167, "question": "According to the textbook, what is the relationship between the duration of pulp inflammation and the development of internal root resorption?", "options": [{"letter": "A", "text": "Very brief pulp inflammation does not lead to resorption; prolonged inflammation is required"}, {"letter": "B", "text": "Even brief inflammatory episodes can initiate resorption in susceptible teeth"}, {"letter": "C", "text": "The duration of inflammation is unrelated to resorption development"}, {"letter": "D", "text": "Chronic inflammation is less likely to cause resorption than acute inflammation"}], "correctAnswer": "B", "explanation": "Even brief inflammatory episodes in the pulp can initiate internal root resorption in susceptible teeth. The inflammatory mediators released during the initial inflammatory response can activate resident hematopoietic precursor cells within the pulp, leading to odontoclast differentiation and resorption.", "answer": "B"}, {"id": 68, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 168, "question": "What is the primary clinical implication of detecting a pulp perforation caused by internal root resorption?", "options": [{"letter": "A", "text": "The tooth must be immediately extracted"}, {"letter": "B", "text": "Immediate root canal treatment is required to prevent further loss of tooth structure"}, {"letter": "C", "text": "The tooth will spontaneously heal without intervention"}, {"letter": "D", "text": "A perforation indicates a superior prognosis due to drainage of inflammatory tissue"}], "correctAnswer": "B", "explanation": "Detection of a pulp perforation caused by internal root resorption indicates the resorptive process is very advanced and immediate root canal treatment is urgently needed to prevent further structural loss. The presence of a perforation indicates the resorption has affected the integrity of the pulp chamber.", "answer": "B"}, {"id": 69, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 169, "question": "In the treatment of replacement resorption, why is the timing of intervention important?", "options": [{"letter": "A", "text": "Earlier intervention is associated with longer functional tooth survival"}, {"letter": "B", "text": "Later intervention provides better outcomes due to greater tooth development"}, {"letter": "C", "text": "Timing of intervention has no impact on tooth survival"}, {"letter": "D", "text": "Replacement resorption cannot be treated regardless of timing"}], "correctAnswer": "A", "explanation": "In replacement resorption (ankylosis), earlier intervention is associated with longer functional tooth survival. Once a tooth becomes ankylosed, the progressive replacement resorption is difficult to arrest, making early detection and intervention important to extend the useful life of the tooth.", "answer": "A"}, {"id": 70, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 170, "question": "According to the textbook, what is the primary clinical advantage of MTA over gutta-percha for final obturation of internal root resorption?", "options": [{"letter": "A", "text": "MTA is more radiopaque and easier to visualize radiographically"}, {"letter": "B", "text": "MTA provides superior biocompatibility and antimicrobial properties"}, {"letter": "C", "text": "MTA can be used to create a blockage apical to persistent resorption sites"}, {"letter": "D", "text": "MTA eliminates the need for calcium hydroxide treatment"}], "correctAnswer": "C", "explanation": "While gutta-percha is typically used for final obturation after calcium hydroxide has arrested internal resorption, MTA has the advantage of being able to be placed apical to a resorption site as a biocompatible blockage if resorption persists despite calcium hydroxide treatment.", "answer": "C"}, {"id": 71, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 171, "question": "What is the clinical significance of determining the location of internal root resorption within the root canal system?", "options": [{"letter": "A", "text": "Location is clinically irrelevant; all internal resorptions are treated identically"}, {"letter": "B", "text": "Coronal location requires extraction while apical location can be treated conservatively"}, {"letter": "C", "text": "The location determines accessibility for treatment and prognosis"}, {"letter": "D", "text": "Location determines the histological appearance but not the clinical treatment"}], "correctAnswer": "C", "explanation": "The location of internal root resorption within the root canal system determines accessibility for treatment and influences prognosis. Coronal resorptions may be more accessible for treatment, while very apical resorptions or those involving multiple areas may be more challenging to arrest and have worse prognosis.", "answer": "C"}, {"id": 72, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 172, "question": "In external inflammatory root resorption, what is the significance of the finding of vital pulp tissue with clinical evidence of resorption?", "options": [{"letter": "A", "text": "Vital pulp indicates the resorption is internal, not external"}, {"letter": "B", "text": "Vital pulp confirms external resorption is occurring from the periodontal side"}, {"letter": "C", "text": "Vital pulp is contraindicated for root canal treatment"}, {"letter": "D", "text": "Vital pulp indicates the tooth should be extracted"}], "correctAnswer": "B", "explanation": "In external inflammatory root resorption, the finding of vital pulp tissue with clinical evidence of external resorption confirms that the resorptive process is originating from the periodontal tissues rather than internally. This finding has important implications for treatment, indicating that both endodontic and periodontal therapy may be needed.", "answer": "B"}, {"id": 73, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 173, "question": "According to the textbook, what is the primary reason calcium hydroxide is preferred over other medicaments for treating internal root resorption?", "options": [{"letter": "A", "text": "Calcium hydroxide has superior antimicrobial properties"}, {"letter": "B", "text": "Calcium hydroxide's high alkaline pH inhibits odontoclast activity by disrupting the acidic resorptive microenvironment"}, {"letter": "C", "text": "Calcium hydroxide is the least expensive treatment option"}, {"letter": "D", "text": "Calcium hydroxide eliminates the need for root canal obturation"}], "correctAnswer": "B", "explanation": "Calcium hydroxide is the preferred medicament for internal root resorption because its high alkaline pH creates an environment unfavorable for odontoclast activity. Odontoclasts require an acidic pH to function, and the elevated pH disrupts this necessary microenvironment, effectively inhibiting the resorptive process.", "answer": "B"}, {"id": 74, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 174, "question": "In the treatment of external cervical resorption, what is the purpose of gingival retraction during surgical exposure of the lesion?", "options": [{"letter": "A", "text": "To improve visibility and accessibility of the resorptive lesion"}, {"letter": "B", "text": "To prevent bleeding and contamination of the surgical field"}, {"letter": "C", "text": "To allow placement of orthodontic brackets"}, {"letter": "D", "text": "To provide space for suturing"}], "correctAnswer": "A", "explanation": "Gingival retraction during surgical exposure of an external cervical resorptive lesion provides improved visibility and accessibility of the resorptive defect. This allows the clinician to completely remove the resorptive granulation tissue and restore the defect with biocompatible material.", "answer": "A"}, {"id": 75, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 175, "question": "What is the primary clinical implication of generalized external cervical resorption affecting multiple teeth (Patel Type III)?", "options": [{"letter": "A", "text": "Each tooth should be treated independently without investigating underlying causes"}, {"letter": "B", "text": "Systemic investigation is warranted to identify underlying metabolic or endocrine disease"}, {"letter": "C", "text": "Multiple tooth involvement indicates poor prognosis for all affected teeth"}, {"letter": "D", "text": "Generalized resorption is always idiopathic without identifiable cause"}], "correctAnswer": "B", "explanation": "Patel Type III external cervical resorption affecting multiple teeth warrants systemic investigation to identify underlying causes such as hyperthyroidism, Paget's disease, or other metabolic/endocrine conditions. Identification and treatment of the underlying systemic condition may help prevent progression of resorption.", "answer": "B"}, {"id": 76, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 176, "question": "According to the textbook, what is the typical radiographic finding that distinguishes internal root resorption at an early stage from other pulpal pathologies?", "options": [{"letter": "A", "text": "Discrete radiopaque lesion within the pulp chamber"}, {"letter": "B", "text": "Loss of lamina dura around the root apex"}, {"letter": "C", "text": "Widening of the pulp canal with loss of definition of the pulp chamber outline"}, {"letter": "D", "text": "Periapical radiolucency"}], "correctAnswer": "C", "explanation": "Early internal root resorption is characterized radiographically by widening of the pulp canal and progressive loss of definition of the pulp chamber outline. This expanding radiolucent appearance within the root canal space is the key distinguishing feature that differentiates internal resorption from other pulpal pathologies.", "answer": "C"}, {"id": 77, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 177, "question": "In the treatment of internal root resorption, what is the significance of monitoring the patient after completion of root canal treatment?", "options": [{"letter": "A", "text": "Monitoring is unnecessary after root canal obturation is completed"}, {"letter": "B", "text": "Monitoring is needed to detect early recurrence of resorption and ensure complete arrest"}, {"letter": "C", "text": "Monitoring is only needed if the patient reports symptoms"}, {"letter": "D", "text": "Monitoring is needed only for pediatric patients with incomplete root development"}], "correctAnswer": "B", "explanation": "Monitoring after root canal treatment of internal resorption is important to detect early recurrence and ensure the resorptive process has been completely arrested. Periodic radiographic follow-up at regular intervals is recommended to document continued stability and rule out recurrence.", "answer": "B"}, {"id": 78, "chapter": 11, "chapterTitle": "Resorptive Dental Diseases", "number": 178, "question": "What is the primary reason why external inflammatory root resorption may be difficult to arrest even with appropriate treatment?", "options": [{"letter": "A", "text": "The inflammatory stimulus from the periodontal ligament may persist despite endodontic treatment"}, {"letter": "B", "text": "EIRR is caused by bacterial toxins that cannot be removed by conventional treatment"}, {"letter": "C", "text": "Once resorption has begun, it cannot be stopped regardless of treatment"}, {"letter": "D", "text": "EIRR is always associated with malignant transformation"}], "correctAnswer": "A", "explanation": "External inflammatory root resorption can be difficult to arrest because the inflammatory stimulus originates from the periodontal ligament. Even with appropriate root canal treatment, if periodontal inflammation and disease are not adequately controlled, the resorptive process may continue due to persistent inflammatory mediators.", "answer": "A"}, {"id": 79, "chapter": 11, "c
