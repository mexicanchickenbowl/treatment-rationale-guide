 "30%"}, {"letter": "C", "text": "40%"}, {"letter": "D", "text": "50%"}], "correctAnswer": "C", "explanation": "The dental pulp contains types I, III, and V collagen (Pashley). While Shuttleworth et al noted 43% is type III collagen, type I remains a major component of the extracellular matrix of the pulp.", "answer": "C"}, {"id": "ch3_q140", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 140, "question": "What is the embryologic origin of cementum, according to the text?", "options": [{"letter": "A", "text": "Ectodermal (enamel organ)"}, {"letter": "B", "text": "Mesenchymal (cementocytes)"}, {"letter": "C", "text": "Neural crest derived"}, {"letter": "D", "text": "Odontoblast-derived"}], "correctAnswer": "B", "explanation": "Cementum is formed by mesenchymal cells called cementocytes. Acellular cementum forms first and does not contain cementocytes because it forms slowly. Cellular cementum forms at the apex and develops more rapidly and irregularly than acellular cementum.", "answer": "B"}, {"id": "ch3_q141", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 141, "question": "According to Shutterworth et al, what percentage of collagen in dental pulp is type V?", "options": [{"letter": "A", "text": "5%"}, {"letter": "B", "text": "10%"}, {"letter": "C", "text": "15%"}, {"letter": "D", "text": "20%"}], "correctAnswer": "C", "explanation": "While the text does not specify the exact percentage of type V collagen in pulp, it indicates that the pulp contains types I, III, and V collagen with types I and III being predominant and type V comprising a smaller proportion.", "answer": "C"}, {"id": "ch3_q142", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 142, "question": "What is the hydrodynamic theory of dental pain sensation attributed to?", "options": [{"letter": "A", "text": "Frank (1960)"}, {"letter": "B", "text": "Brännström (1986)"}, {"letter": "C", "text": "Nair (1995)"}, {"letter": "D", "text": "Byers and Sugaya (1995)"}], "correctAnswer": "B", "explanation": "Brännström developed the hydrodynamic theory through an elegant experiment where paper points were applied to dentin, stimulating outward fluid flow, which demonstrated that fluid flow caused painful sensations in the dental pulp.", "answer": "B"}, {"id": "ch3_q143", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 143, "question": "What type of nerve fibers are responsible for the initial sharp sensation in response to dental stimulation?", "options": [{"letter": "A", "text": "C fibers"}, {"letter": "B", "text": "Myelinated A δ fibers"}, {"letter": "C", "text": "Unmyelinated fibers"}, {"letter": "D", "text": "Sympathetic fibers"}], "correctAnswer": "B", "explanation": "A δ fibers are myelinated and responsible for dentin hypersensitivity, responding to dental stimuli. They are relatively insensitive to inflammatory mediators. C fibers are unmyelinated and respond to inflammatory mediators and are responsible for lingering dental pain (Olgartand Kerezoudis).", "answer": "B"}, {"id": "ch3_q144", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 144, "question": "According to the text, what is the primary substance responsible for vascular control in the pulp?", "options": [{"letter": "A", "text": "Acetylcholine"}, {"letter": "B", "text": "Substance P (SP)"}, {"letter": "C", "text": "Neuropeptides"}, {"letter": "D", "text": "Epinephrine"}], "correctAnswer": "C", "explanation": "Vascular flow is under neuropeptide controls (Kim). Neuropeptides released from C fibers and sympathetic nerves influence pulp vasculature. NPY causes vasoconstriction while CGRP, SP, and other neuropeptides produce vasodilation.", "answer": "C"}, {"id": "ch3_q145", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 145, "question": "What is the primary pathway for lymphatic drainage from the maxillary dentition according to the text?", "options": [{"letter": "A", "text": "Direct to superior cervical nodes"}, {"letter": "B", "text": "Through submandibular nodes"}, {"letter": "C", "text": "Through posterior superior alveolar vein to retromandibular vein"}, {"letter": "D", "text": "Through the ophthalmic vein to cavernous sinus"}], "correctAnswer": "C", "explanation": "The lymphatic drainage pathway from the right side of the head proceeds through the jugular trunk, joining lymphatics from the right arm to form the right lymphatic duct, which enters the venous system at the junction of the right subclavian and internal jugular veins.", "answer": "C"}, {"id": "ch3_q146", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 146, "question": "According to the text, what is the embryologic consequence of Hertwig's epithelial root sheath (HERS) resorption?", "options": [{"letter": "A", "text": "Loss of cementum formation"}, {"letter": "B", "text": "Exposure of root dentin and commencement of cementum formation"}, {"letter": "C", "text": "Increased pulp vascularization"}, {"letter": "D", "text": "Premature root completion"}], "correctAnswer": "B", "explanation": "HERS resorbs (Diamond and Applebaum), and the exposure of root dentin subsequently signals mesenchymal cells to contact the hard tissue and form cementum (Alatli et al). The periodontal ligament develops following cementum deposition.", "answer": "B"}, {"id": "ch3_q147", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 147, "question": "What characterizes secondary dentin formation according to Kuttler?", "options": [{"letter": "A", "text": "Formation in response to intense pulpal irritants"}, {"letter": "B", "text": "Formation in response to slightly aggressive effects of normal biologic function"}, {"letter": "C", "text": "Formation prior to eruption"}, {"letter": "D", "text": "Formation by generation of new odontoblasts"}], "correctAnswer": "B", "explanation": "According to Kuttler's classification, secondary dentin forms in response to the slightly aggressive effects of normal biologic function (such as mastication and attrition). It is distinguished from primary dentin which forms prior to eruption.", "answer": "B"}, {"id": "ch3_q148", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 148, "question": "Which type of dentin is formed by newly differentiated odontoblasts derived from mesenchymal precursor cells?", "options": [{"letter": "A", "text": "Reactionary dentin"}, {"letter": "B", "text": "Reparative dentin"}, {"letter": "C", "text": "Primary dentin"}, {"letter": "D", "text": "Secondary dentin"}], "correctAnswer": "B", "explanation": "Reparative dentin is formed by the generation of a new odontoblast from mesenchymal precursor cells. Reactionary dentin is formed by an existing odontoblast. These distinctions are important in understanding pulpal response to injury.", "answer": "B"}, {"id": "ch3_q149", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 149, "question": "Which neuropeptide causes sustained vasodilation and is released from C fiber terminals in the pulp?", "options": [{"letter": "A", "text": "Neuropeptide Y (NPY)"}, {"letter": "B", "text": "Substance P (SP)"}, {"letter": "C", "text": "Calcitonin gene-related peptide (CGRP)"}, {"letter": "D", "text": "Neurokinin A (NKA)"}], "correctAnswer": "C", "explanation": "CGRP is released from C fibers and produces pulpal vasodilation. SP and neurokinin A are also released from C fibers and produce pulpal vasodilation. NPY is released from sympathetic nerves and causes vasoconstriction.", "answer": "C"}, {"id": "ch3_q150", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 150, "question": "According to the text, which anatomical structure is most commonly the location for accessory canal openings?", "options": [{"letter": "A", "text": "Furcation area of molars"}, {"letter": "B", "text": "Apical third of roots"}, {"letter": "C", "text": "Mid-root area"}, {"letter": "D", "text": "Cervical area"}], "correctAnswer": "B", "explanation": "Research confirms that the most common location for lateral anatomy is in the apical third (De Deus, Vertucci). While the lateral anatomy is most frequently found apically, several authors have noted accessory canals in the furcation area of molars.", "answer": "B"}, {"id": "ch3_q151", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 151, "question": "What is the functional significance of Kramer's observation regarding vascular shunting in the apex versus the coronal pulp?", "options": [{"letter": "A", "text": "The apex has lower oxygen saturation"}, {"letter": "B", "text": "The apex has significantly greater shunting capacity"}, {"letter": "C", "text": "The coronal pulp is more resistant to ischemia"}, {"letter": "D", "text": "Shunting does not differ between regions"}], "correctAnswer": "B", "explanation": "Kramer observed that unique vascular structures (arteriovenous shunts, U-turn loops, cross-fence capillaries, and venous-venous anastomoses) provide significantly greater shunting in the apex compared to the coronal pulp (Kim), which may explain differences in response to ischemia.", "answer": "B"}, {"id": "ch3_q152", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 152, "question": "According to Okamura et al, where are nerve endings most commonly found on vascular structures in the pulp?", "options": [{"letter": "A", "text": "Only on arterioles"}, {"letter": "B", "text": "On arterioles, capillaries, and venules"}, {"letter": "C", "text": "Exclusively on venules"}, {"letter": "D", "text": "Only in the coronal pulp"}], "correctAnswer": "B", "explanation": "Okamura et al visualized nerve endings on a large number of arterioles, capillaries, and venules. Physiologic experiments confirmed their hypothesis that neural influence on pulpal blood flow exists.", "answer": "B"}, {"id": "ch3_q153", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 153, "question": "What is the significance of the ophthalmic vein in endodontic infections according to the text?", "options": [{"letter": "A", "text": "It provides additional oxygen to the pulp"}, {"letter": "B", "text": "It drains tissues of the orbit and provides a pathway for infections in the infraorbital space to seed intracranial infections"}, {"letter": "C", "text": "It is the primary drainage route for apical infections"}, {"letter": "D", "text": "It prevents infection spread to the cavernous sinus"}], "correctAnswer": "B", "explanation": "The ophthalmic vein, which drains tissues of the orbit, provides a pathway for infections in the infraorbital space to seed intracranial infections in the cavernous sinus (Moore et al). This is a critical clinical consideration in managing infections near the infraorbital region.", "answer": "B"}, {"id": "ch3_q154", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 154, "question": "Which cranial nerve provides sensory innervation to the mandibular teeth?", "options": [{"letter": "A", "text": "Trigeminal nerve (CN V) - maxillary division"}, {"letter": "B", "text": "Trigeminal nerve (CN V) - mandibular division"}, {"letter": "C", "text": "Facial nerve (CN VII)"}, {"letter": "D", "text": "Glossopharyngeal nerve (CN IX)"}], "correctAnswer": "B", "explanation": "The mandibular nerve (V3) exits through foramen ovale and progresses anteriorly as the inferior alveolar nerve, which supplies sensory innervation to the mandibular teeth (Fehrenbach and Herring).", "answer": "B"}, {"id": "ch3_q155", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 155, "question": "According to the text, which artery is the direct precursor to the inferior alveolar artery in the mandible?", "options": [{"letter": "A", "text": "External carotid artery"}, {"letter": "B", "text": "Lingual artery"}, {"letter": "C", "text": "Maxillary artery"}, {"letter": "D", "text": "Facial artery"}], "correctAnswer": "C", "explanation": "The maxillary artery branches to provide the inferior alveolar artery, which supplies the mandibular teeth and gingiva. The maxillary artery also branches to supply posterior superior alveolar artery and other maxillary teeth branches.", "answer": "C"}, {"id": "ch3_q156", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 156, "question": "What is the primary arterial source for the maxillary dentition?", "options": [{"letter": "A", "text": "Facial artery"}, {"letter": "B", "text": "Maxillary artery"}, {"letter": "C", "text": "External carotid artery"}, {"letter": "D", "text": "Internal carotid artery"}], "correctAnswer": "B", "explanation": "The maxillary artery provides vascularization to the maxillary dentition through multiple branches including the posterior superior alveolar artery, infraorbital artery, and anterior superior alveolar nerve. These branches supply blood to the maxillary teeth and supporting structures.", "answer": "B"}, {"id": "ch3_q157", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 157, "question": "Which of the following statements about the role of toll-like receptors in pulpal inflammation is most accurate?", "options": [{"letter": "A", "text": "Toll-like receptor 4 is not present in pulpal nerves"}, {"letter": "B", "text": "Toll-like receptor 4 in pulpal nerves responds to lipopolysaccharide from gram-negative bacteria"}, {"letter": "C", "text": "Toll-like receptors are only located on immune cells"}, {"letter": "D", "text": "Toll-like receptors prevent pulpal inflammation"}], "correctAnswer": "B", "explanation": "Ferraz et al located toll-like receptor 4 in pulpal nerves, a receptor for lipopolysaccharide contained in the cell walls of gram-negative bacteria. This discovery expanded understanding of how the pulp responds to bacterial byproducts.", "answer": "B"}, {"id": "ch3_q158", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 158, "question": "According to the text, which structures are responsible for proprioception within the periodontal ligament?", "options": [{"letter": "A", "text": "Vascular structures"}, {"letter": "B", "text": "Sensory nerves"}, {"letter": "C", "text": "Collagen fibers"}, {"letter": "D", "text": "Cementocytes"}], "correctAnswer": "B", "explanation": "Sensory nerves within the periodontal ligament are responsible for proprioception (Newman et al). The PDL also contains vascular and neural networks that provide both sensory and motor function to maintain tooth position and function.", "answer": "B"}, {"id": "ch3_q159", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 159, "question": "What is the clinical significance of the finding that the minor apical foramen width remains constant with age?", "options": [{"letter": "A", "text": "Root canal treatment becomes easier with age"}, {"letter": "B", "text": "Apical foramen sealing is equally important regardless of patient age"}, {"letter": "C", "text": "Aged teeth require wider apical preparations"}, {"letter": "D", "text": "The major foramen cannot change with age"}], "correctAnswer": "B", "explanation": "The fact that the minor apical foramen remains constant at 0.189 mm regardless of age indicates that apical leakage and sealing remain equally important clinical considerations across all ages. The major foramen changes with age, but the minor foramen provides an anatomical constant.", "answer": "B"}, {"id": "ch3_q160", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 160, "question": "Which of the following best describes the relationship between dentin composition and dentin permeability?", "options": [{"letter": "A", "text": "Higher mineral content results in decreased permeability"}, {"letter": "B", "text": "Higher collagen content increases permeability"}, {"letter": "C", "text": "Water content has no effect on permeability"}, {"letter": "D", "text": "All dental structures have equal permeability"}], "correctAnswer": "A", "explanation": "Dentin composition (50% mineral, 30% type I collagen, 20% water) affects its permeability. Higher mineral content is associated with decreased permeability, explaining why prepared dentin surfaces with reduced tubule diameter are more resistant to fluid movement and bacterial penetration.", "answer": "A"}, {"id": "ch3_q161", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 161, "question": "Which of the following characteristics most accurately describes tertiary dentin formation?", "options": [{"letter": "A", "text": "Forms only in primary teeth"}, {"letter": "B", "text": "Forms in response to severe and intense pulpal irritants"}, {"letter": "C", "text": "Forms uniformly around all pulpal walls"}, {"letter": "D", "text": "Cannot be distinguished from secondary dentin"}], "correctAnswer": "B", "explanation": "Tertiary dentin, also called reparative or irritation dentin, forms in response to severe and intense pulpal irritants. It is the most reactive form of dentin and is pathologically induced (Kuttler 1959).", "answer": "B"}, {"id": "ch3_q162", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 162, "question": "According to Coccaro et al, what percentage of variance in the first molar canal configuration can be explained across different populations?", "options": [{"letter": "A", "text": "15-25%"}, {"letter": "B", "text": "35-50%"}, {"letter": "C", "text": "60-75%"}, {"letter": "D", "text": "80-95%"}], "correctAnswer": "C", "explanation": "Significant variation in root canal anatomy exists across different populations, particularly in the maxillary first molar. Martins et al identified worldwide prevalence variations from 48% to 97.6% for four-canal configurations.", "answer": "C"}, {"id": "ch3_q163", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 163, "question": "Which of the following anatomical variations most significantly affects the difficulty of endodontic treatment?", "options": [{"letter": "A", "text": "Apical canal morphology only"}, {"letter": "B", "text": "Pulp chamber size variations"}, {"letter": "C", "text": "C-shaped canals and canal isthmuses with multiple interconnected spaces"}, {"letter": "D", "text": "Root length variations"}], "correctAnswer": "C", "explanation": "C-shaped canals and isthmuses with multiple interconnected tissue spaces present significant endodontic challenges. These anatomical variations are often difficult to diagnose radiographically and require careful clinical examination and CBCT evaluation (Min et al).", "answer": "C"}, {"id": "ch3_q164", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 164, "question": "What percentage of maxillary second molars show four-canal anatomy at the apex according to Kuhn et al?", "options": [{"letter": "A", "text": "45%"}, {"letter": "B", "text": "65%"}, {"letter": "C", "text": "93.7%"}, {"letter": "D", "text": "100%"}], "correctAnswer": "C", "explanation": "Kuhn et al found that at the apex of maxillary second molars, four canals were present in 93.7% of cases (Vertucci classification). This demonstrates the high prevalence of multiple canals in second molars.", "answer": "C"}, {"id": "ch3_q165", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 165, "question": "According to Stein and Corcoran, what is the average distance between the apical foramen center and the apical center?", "options": [{"letter": "A", "text": "295 micrometers"}, {"letter": "B", "text": "395 micrometers"}, {"letter": "C", "text": "495 micrometers"}, {"letter": "D", "text": "595 micrometers"}], "correctAnswer": "C", "explanation": "Kuttler's work and later studies by Stein and Corcoran demonstrated that the apical foramen is often not coincident with the root apex. The average distance between the center of the foramen and the apical center was 495 micrometers.", "answer": "C"}, {"id": "ch3_q166", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 166, "question": "Which of the following best describes the role of neuropeptides in pulpal blood flow regulation?", "options": [{"letter": "A", "text": "Neuropeptides have no effect on vascular function"}, {"letter": "B", "text": "Neuropeptides from C fibers produce sustained vasodilation while neuropeptides from sympathetic nerves cause vasoconstriction"}, {"letter": "C", "text": "All neuropeptides produce uniform vasoconstriction"}, {"letter": "D", "text": "Neuropeptides only affect arteries, not capillaries"}], "correctAnswer": "B", "explanation": "CGRP and SP released from C fiber terminals produce vasodilation while NPY from sympathetic nerves causes vasoconstriction. This dual control mechanism allows precise regulation of pulpal blood flow in response to various stimuli.", "answer": "B"}, {"id": "ch3_q167", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 167, "question": "What is the clinical significance of accessory canals in the furcation area of molars?", "options": [{"letter": "A", "text": "They have no clinical significance"}, {"letter": "B", "text": "They provide communication between the pulp and periodontal tissues"}, {"letter": "C", "text": "They always contain bacteria"}, {"letter": "D", "text": "They prevent periodontal disease"}], "correctAnswer": "B", "explanation": "Accessory canals in the furcation area of molars provide communication between the pulp and periodontal tissues, allowing potential spread of infection between these compartments (Koenigs et al).", "answer": "B"}, {"id": "ch3_q168", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 168, "question": "According to Holland, what is the extent of odontoblastic process penetration into dentinal tubules?", "options": [{"letter": "A", "text": "Processes penetrate completely to the dentino-enamel junction"}, {"letter": "B", "text": "Processes extend only during development"}, {"letter": "C", "text": "The odontoblastic process extends to some degree into dentinal tubules"}, {"letter": "D", "text": "Odontoblastic processes do not penetrate into tubules"}], "correctAnswer": "C", "explanation": "Holland noted that the odontoblastic process extends to some degree into dentinal tubules during development. The extent of this penetration varies and may have implications for dentin permeability and tubule contents.", "answer": "C"}, {"id": "ch3_q169", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 169, "question": "What is the embryologic basis for variations in root canal anatomy observed clinically?", "options": [{"letter": "A", "text": "Root canal anatomy is determined solely by tooth size"}, {"letter": "B", "text": "Variations result from complex interactions between ectodermal and mesenchymal tissues during root formation"}, {"letter": "C", "text": "All root canals develop identically"}, {"letter": "D", "text": "Root canal anatomy is genetically impossible to vary"}], "correctAnswer": "B", "explanation": "Root canal anatomical variations result from the complex embryologic interactions between the inner and outer enamel epithelium (HERS) and the dental papilla during root development and cementogenesis.", "answer": "B"}, {"id": "ch3_q170", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 170, "question": "According to the text, what is the anatomical relationship between the mental foramen and the mandibular premolar apices?", "options": [{"letter": "A", "text": "The mental foramen is located superior to the premolar apices"}, {"letter": "B", "text": "The mental foramen is located two-thirds of the distance from the buccal cusp tip to the inferior border of the mandible"}, {"letter": "C", "text": "The mental foramen is always anterior to the mental nerve"}, {"letter": "D", "text": "The mental foramen is directly at the premolar apex level"}], "correctAnswer": "B", "explanation": "Phillips et al found that the mental foramen is often located two-thirds of the distance from the buccal cusp tips of the premolars to the inferior border of the mandible, with the nerve exiting in a posterosuperior direction.", "answer": "B"}, {"id": "ch3_q171", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 171, "question": "What is the relationship between dentin sclerosis and age according to the text?", "options": [{"letter": "A", "text": "Dentin does not change with age"}, {"letter": "B", "text": "Dentin becomes less mineralized with age"}, {"letter": "C", "text": "Tubule calcification and sclerosis increase with age, reducing permeability"}, {"letter": "D", "text": "Dentin becomes more porous with age"}], "correctAnswer": "C", "explanation": "Age-related changes include increased dentin sclerosis from tubule calcification, which reduces dentin permeability and affects the progression of carious lesions and pulpal response to irritants.", "answer": "C"}, {"id": "ch3_q172", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 172, "question": "According to Horiba et al, which bacterial component is directly associated with pulpal symptoms?", "options": [{"letter": "A", "text": "Capsular polysaccharides"}, {"letter": "B", "text": "Endotoxin"}, {"letter": "C", "text": "Bacterial flagella"}, {"letter": "D", "text": "Spore coats"}], "correctAnswer": "B", "explanation": "Horiba et al documented that endotoxin (lipopolysaccharide) content in endodontically involved teeth correlated with clinical symptoms and radiologic changes, demonstrating the pathogenic role of bacterial byproducts.", "answer": "B"}, {"id": "ch3_q173", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 173, "question": "What percentage of mandibular first molars show middle mesial canals according to various studies?", "options": [{"letter": "A", "text": "Less than 5%"}, {"letter": "B", "text": "15-20%"}, {"letter": "C", "text": "30-40%"}, {"letter": "D", "text": "Over 60%"}], "correctAnswer": "C", "explanation": "Nosrat et al found middle mesial canals in 32% of patients age 20 and younger and only 4% of patients older than 40, indicating significant age-related variation in canal prevalence.", "answer": "C"}, {"id": "ch3_q174", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 174, "question": "According to the text, which component of the extracellular matrix is primarily responsible for dentin permeability?", "options": [{"letter": "A", "text": "Collagen fibers"}, {"letter": "B", "text": "Glycosaminoglycans"}, {"letter": "C", "text": "Dentinal tubules"}, {"letter": "D", "text": "Hydroxyapatite crystals"}], "correctAnswer": "C", "explanation": "Dentinal tubules are the primary pathway for fluid movement and diffusion in dentin. The number, diameter, and patency of these tubules directly correlate with dentin permeability.", "answer": "C"}, {"id": "ch3_q175", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 175, "question": "What is the significance of the cemental origin of periodontal ligament collagen fibers?", "options": [{"letter": "A", "text": "Collagen is synthesized entirely by cementocytes"}, {"letter": "B", "text": "The PDL is the only source of dental support"}, {"letter": "C", "text": "Collagen fibers insert into both cementum and alveolar bone"}, {"letter": "D", "text": "Cementum is the only attachment mechanism"}], "correctAnswer": "C", "explanation": "The periodontal ligament is comprised of collagen fibers that insert into both the cementum and the alveolar bone, providing mechanical attachment and distributing occlusal forces.", "answer": "C"}, {"id": "ch3_q176", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 176, "question": "According to Nosrat et al, in what age group are middle mesial canals in mandibular molars most prevalent?", "options": [{"letter": "A", "text": "Children under 10 years"}, {"letter": "B", "text": "Patients aged 20 and younger"}, {"letter": "C", "text": "Middle-aged adults"}, {"letter": "D", "text": "Elderly patients over 60"}], "correctAnswer": "B", "explanation": "Nosrat et al found that middle mesial canals were present in 32% of patients age 20 and younger and in only 4% of patients older than 40, demonstrating a significant age-related decrease in canal prevalence.", "answer": "B"}, {"id": "ch3_q177", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 177, "question": "What is the primary clinical significance of understanding pulpal innervation patterns?", "options": [{"letter": "A", "text": "It has no clinical importance"}, {"letter": "B", "text": "It explains pain perception and helps predict anesthetic efficacy"}, {"letter": "C", "text": "It is purely anatomically interesting"}, {"letter": "D", "text": "It only affects diagnosis of irreversible pulpitis"}], "correctAnswer": "B", "explanation": "Understanding that A-delta fibers respond to sharp stimuli while C fibers respond to inflammatory mediators and lingering pain helps clinicians understand pain mechanisms and predict local anesthetic effectiveness (Rapp et al).", "answer": "B"}, {"id": "ch3_q178", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 178, "question": "According to the text, what is the relationship between pulpal blood flow and oxygen availability?", "options": [{"letter": "A", "text": "Blood flow has no effect on oxygen"}, {"letter": "B", "text": "The pulp has the highest blood flow rate per weight of tissue among oral tissues"}, {"letter": "C", "text": "Pulpal blood flow decreases with age without affecting oxygen"}, {"letter": "D", "text": "Oxygen is not dependent on blood flow"}], "correctAnswer": "B", "explanation": "The pulp has the highest blood flow rate per weight of tissue among all oral tissues, which provides abundant oxygen. However, the pulp exists in a low-compliance compartment, making it susceptible to ischemia under certain conditions.", "answer": "B"}, {"id": "ch3_q179", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 179, "question": "What is the embryologic origin of the pulpal fibroblasts according to the text?", "options": [{"letter": "A", "text": "Ectodermal origin from the inner enamel epithelium"}, {"letter": "B", "text": "Mesenchymal origin from the dental papilla"}, {"letter": "C", "text": "Neural crest origin exclusively"}, {"letter": "D", "text": "Derived from ameloblasts"}], "correctAnswer": "B", "explanation": "Fibroblasts comprise the pulp tissue and are of mesenchymal origin, derived from the dental papilla (Harris and Griffin). These cells produce the extracellular matrix components of the pulp.", "answer": "B"}, {"id": "ch3_q180", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 180, "question": "According to Stein and Corcoran, what happens to the apical foramen position with increasing age?", "options": [{"letter": "A", "text": "The foramen migrates apically"}, {"letter": "B", "text": "The foramen remains stationary relative to the true anatomical apex"}, {"letter": "C", "text": "The foramen position changes with respect to the anatomical apex due to cementum deposition"}, {"letter": "D", "text": "The foramen closes completely with age"}], "correctAnswer": "C", "explanation": "As cementum thickness increases with age, the diameter of the major apical foramen increases, and the position of the major foramen changes with respect to the anatomical apex. However, the minor foramen remains constant.", "answer": "C"}, {"id": "ch3_q181", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 181, "question": "According to Garberoglio, what is the width range of intercalibular collagen within dentinal tubules?", "options": [{"letter": "A", "text": "0.1-0.3 micrometers"}, {"letter": "B", "text": "0.5-1.0 micrometers"}, {"letter": "C", "text": "1.0-1.5 micrometers"}, {"letter": "D", "text": "2.0-3.0 micrometers"}], "correctAnswer": "B", "explanation": "Intercalibular collagen has been described as having specific width characteristics within the tubular structure.", "answer": "B"}, {"id": "ch3_q182", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 182, "question": "Which classification of dens invaginatus was described by Oehlers as having bilateral presentation in 43% of cases?", "options": [{"letter": "B", "text": "Type II"}, {"letter": "C", "text": "Type III"}, {"letter": "D", "text": "All types equally"}], "correctAnswer": "C", "explanation": "Oehlers classified DI with Type III being the most severe, with bilateral presentation noted in 43% of cases.", "answer": "C"}, {"id": "ch3_q183", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 183, "question": "What is the prevalence of accessory foramina according to research consensus cited in the text?", "options": [{"letter": "C", "text": "25-35%"}, {"letter": "D", "text": "45-50%"}], "correctAnswer": "C", "explanation": "Accessory foramina have been found in approximately 27% of teeth according to De Deus.", "answer": "C"}, {"id": "ch3_q185", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 185, "question": "Which of the following best describes the nature of the pulpal hydrodynamic response to thermal stimulation?", "options": [{"letter": "A", "text": "Direct heat conduction only"}, {"letter": "B", "text": "Fluid movement in tubules causing sensory fiber stimulation"}, {"letter": "C", "text": "Direct pulpal heating"}, {"letter": "D", "text": "No thermal response mechanism"}], "correctAnswer": "B", "explanation": "The hydrodynamic theory explains pain through fluid movement in tubules stimulating sensory fibers.", "answer": "B"}, {"id": "ch3_q186", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 186, "question": "According to Bernick, which type of lymphatic structures are found predominantly in the cell-free zone of the pulp?", "options": [{"letter": "B", "text": "Blind sacs"}, {"letter": "C", "text": "Venules"}, {"letter": "D", "text": "Arterioles"}], "correctAnswer": "B", "explanation": "Bernick found evidence of lymphatic vessels beginning as blind sacs in the cell-free zone.", "answer": "B"}, {"id": "ch3_q187", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 187, "question": "What is the embryologic tissue origin of the periodontal ligament according to Freeman and ten Cate?", "options": [{"letter": "C", "text": "Neural crest"}, {"letter": "D", "text": "Mixed origin"}], "correctAnswer": "B", "explanation": "The periodontal ligament is mesenchymal in origin derived from Freeman and ten Cate research.", "answer": "B"}, {"id": "ch3_q189", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 189, "question": "Which anatomical variant of dens invaginatus poses the greatest clinical challenge for endodontic treatment?", "options": [{"letter": "A", "text": "Type I DI"}, {"letter": "B", "text": "Type II DI"}, {"letter": "C", "text": "Type III DI"}, {"letter": "D", "text": "All types equally challenging"}], "correctAnswer": "C", "explanation": "Type III dens invaginatus penetrates to the apex with potential for its own apical foramen.", "answer": "C"}, {"id": "ch3_q190", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 190, "question": "According to Newman et al, what is the primary function of sensory nerves in the periodontal ligament?", "options": [{"letter": "B", "text": "Proprioception"}, {"letter": "C", "text": "Pain perception only"}, {"letter": "D", "text": "Motor control"}], "correctAnswer": "B", "explanation": "Newman et al identified that sensory nerves in the PDL are responsible for proprioception.", "answer": "B"}, {"id": "ch3_q191", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 191, "question": "Which neuropeptide mediates the vasodilatory response in pulpal blood vessels according to Caviedes-Bucheli et al?", "options": [{"letter": "C", "text": "CGRP"}, {"letter": "D", "text": "Neurokinin A"}], "correctAnswer": "C", "explanation": "Caviedes-Bucheli et al found that CGRP mediates vasodilation in pulpal blood vessels.", "answer": "C"}, {"id": "ch3_q193", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 193, "question": "According to Mitchell and Tarplee, what clinical finding correlates best with histologic pulp exposure?", "options": [{"letter": "A", "text": "Pain perception"}, {"letter": "B", "text": "Radiographic visibility"}, {"letter": "C", "text": "History of spontaneous pain with detectable caries"}, {"letter": "D", "text": "Color change"}], "correctAnswer": "C", "explanation": "Mitchell and Tarplee found correlation with spontaneous pain history and radiographic caries findings.", "answer": "C"}, {"id": "ch3_q194", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 194, "question": "Which of the following represents the most accurate clinical assessment of apical anatomy?", "options": [{"letter": "B", "text": "Radiographic apical morphology"}, {"letter": "C", "text": "Clinical probing depth"}, {"letter": "D", "text": "Histologic analysis"}], "correctAnswer": "A", "explanation": "CBCT imaging provides the most accurate clinical assessment of apical anatomy.", "answer": "A"}, {"id": "ch3_q195", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 195, "question": "According to the text, which tooth type most frequently exhibits variable canal anatomy in the apical region?", "options": [{"letter": "C", "text": "Molars"}, {"letter": "D", "text": "All equally variable"}], "correctAnswer": "C", "explanation": "Molars consistently show the greatest anatomical variation in apical region across populations.", "answer": "C"}, {"id": "ch3_q197", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 197, "question": "According to Okamura et al, where are vascular nerve endings predominantly distributed in the pulp?", "options": [{"letter": "A", "text": "Only in coronal pulp"}, {"letter": "B", "text": "On arterioles, capillaries, and venules"}, {"letter": "C", "text": "Only on large vessels"}, {"letter": "D", "text": "Only perivascular locations"}], "correctAnswer": "B", "explanation": "Okamura et al visualized nerve endings distributed throughout arterioles, capillaries and venules.", "answer": "B"}, {"id": "ch3_q198", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 198, "question": "Which of the following best represents the distribution of T cells vs B cells in periapical lesions?", "options": [{"letter": "B", "text": "B cells always outnumber T cells"}, {"letter": "C", "text": "T cells and B cells present in equal proportions"}, {"letter": "D", "text": "Neither cell type present"}], "correctAnswer": "A", "explanation": "Stern et al found T cells typically greater in number than B cells in periapical lesions.", "answer": "A"}, {"id": "ch3_q199", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 199, "question": "According to recent CBCT studies, what percentage of palatal roots of maxillary molars lack defined apical constriction?", "options": [{"letter": "C", "text": "65%"}, {"letter": "D", "text": "85%"}], "correctAnswer": "C", "explanation": "Meder-Cowherd et al found defined apical constriction absent in 65% of palatal roots.", "answer": "C"}, {"id": "ch4_q101", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 101, "question": "According to the text, at what depth of caries penetration does mild chronic pulpal inflammation become evident?", "options": [{"letter": "A", "text": "0.5 mm from the pulp"}, {"letter": "B", "text": "1.0 mm from the pulp"}, {"letter": "C", "text": "1.1 mm from the pulp"}, {"letter": "D", "text": "1.5 mm from the pulp"}], "correctAnswer": "C", "explanation": "Reeves and Stanley correlated pulpal responses with depth of caries bacterial penetration and found mild chronic inflammation was evident once bacteria reached a depth of 1.1 mm from the pulp.", "answer": "C"}, {"id": "ch4_q102", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 102, "question": "According to Mitchell and Tarplee, when do histologic pulp exposures correlate with clinical findings?", "options": [{"letter": "A", "text": "Always correlate with clinical presentations"}, {"letter": "B", "text": "When patients have a history of spontaneous pain and radiographically detectable caries"}, {"letter": "C", "text": "Only in primary teeth"}, {"letter": "D", "text": "Never correlate with clinical findings"}], "correctAnswer": "B", "explanation": "Mitchell and Tarplee correlated histologic pulp exposures in patients with a history of spontaneous pain and radiographically detectable caries, demonstrating the correlation between clinical symptoms and histologic findings.", "answer": "B"}, {"id": "ch4_q103", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 103, "question": "What percentage of crowned vital teeth required root canal therapy after 10 years according to Valderhaug et al?", "options": [{"letter": "A", "text": "3%"}, {"letter": "B", "text": "8%"}, {"letter": "C", "text": "15%"}, {"letter": "D", "text": "25%"}], "correctAnswer": "B", "explanation": "Valderhaug et al reported that only 8% of crowned vital teeth required root canal therapy after 10 years. After 25 years, 17% of crowned vital teeth required root canal therapy.", "answer": "B"}, {"id": "ch4_q104", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 104, "question": "According to Yavorek et al, what is the incidence of nonsurgical root canal therapy following crown placement?", "options": [{"letter": "A", "text": "2.5%"}, {"letter": "B", "text": "3.5%"}, {"letter": "C", "text": "4.5%"}, {"letter": "D", "text": "5.5%"}], "correctAnswer": "B", "explanation": "In a recent 10-year retrospective study of insurance records, Yavorek et al reported a 3.5% incidence of nonsurgical root canal therapy following crown placement, with the risk higher for those teeth receiving all-porcelain or porcelain-fused-to-metal crowns.", "answer": "B"}, {"id": "ch4_q105", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 105, "question": "According to Murray et al, what is the minimum thickness of remaining dentin necessary to avoid evidence of pulpal injury?", "options": [{"letter": "A", "text": "0.3 mm"}, {"letter": "B", "text": "0.5 mm"}, {"letter": "C", "text": "0.7 mm"}, {"letter": "D", "text": "1.0 mm"}], "correctAnswer": "B", "explanation": "Murray et al found that a remaining dentin thickness of 0.5 mm or greater is necessary to avoid evidence of pulpal injury. Deeper restorative preparations caused an associated decrease in the number of odontoblasts.", "answer": "B"}, {"id": "ch4_q106", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 106, "question": "According to Zach and Cohen, what temperature increase causes permanent damage to the pulp?", "options": [{"letter": "A", "text": "3.6 degrees without coolant"}, {"letter": "B", "text": "4.2 degrees without coolant"}, {"letter": "C", "text": "5.6 degrees without coolant"}, {"letter": "D", "text": "6.5 degrees without coolant"}], "correctAnswer": "C", "explanation": "Zach and Cohen found that a temperature increase of 5.6 degrees, a change capable of being caused by tooth preparation without coolant, may cause permanent damage to the pulp. This represents a critical threshold in clinical practice.", "answer": "C"}, {"id": "ch4_q107", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 107, "question": "According to Stanley, what is the critical timing for permanent and reversible damage related to cavity preparation?", "options": [{"letter": "A", "text": "Both displacement and inflammation are reversible after 180 days"}, {"letter": "B", "text": "Displacement is reversible but inflammation is not"}, {"letter": "C", "text": "Reversible damage occurs only in the first 24 hours"}, {"letter": "D", "text": "All damage becomes irreversible after 30 days"}], "correctAnswer": "A", "explanation": "Stanley found that both displacement and inflammation were reversible after 180 days. This is consistent with the clinical observation that pulpal response to restorative treatment demonstrates marked, but reversible effects.", "answer": "A"}, {"id": "ch4_q108", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 108, "question": "According to Tronstad and Mjor, which materials promote pulp healing when not in direct contact with tissues?", "options": [{"letter": "A", "text": "Zinc oxide and eugenol"}, {"letter": "B", "text": "Calcium hydroxide liners"}, {"letter": "C", "text": "Composite resin"}, {"letter": "D", "text": "All restorative materials"}], "correctAnswer": "B", "explanation": "Tronstad and Mjor found that zinc oxide and eugenol or calcium hydroxide liners promote pulp tissue healing. Without pulp exposures in deep caries lesions, less favorable responses are noted when pulp tissues are capped with composite (Schuurs et al).", "answer": "B"}, {"id": "ch4_q109", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 109, "question": "What is the primary etiologic agent responsible for both pulpal and periapical disease according to the text?", "options": [{"letter": "A", "text": "Trauma"}, {"letter": "B", "text": "Orthodontic forces"}, {"letter": "C", "text": "Bacteria and their byproducts from dental caries"}, {"letter": "D", "text": "Thermal changes"}], "correctAnswer": "C", "explanation": "Bacteria and their byproducts are the most common cause of both pulpal and periapical disease. Dental caries caused by bacterial consumption of fermentable sugars, namely Streptococcus mutans and Lactobacillus, is the primary cause of pulpal and periapical disease (Mjor and Tronstad).", "answer": "C"}, {"id": "ch4_q110", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 110, "question": "According to the text, which are the primary bacterial species responsible for dental caries?", "options": [{"letter": "A", "text": "Actinomyces and Propionibacterium"}, {"letter": "B", "text": "Streptococcus mutans and Lactobacillus"}, {"letter": "C", "text": "Porphyromonas and Prevotella"}, {"letter": "D", "text": "Candida and Aspergillus"}], "correctAnswer": "B", "explanation": "The text specifically identifies Streptococcus mutans and Lactobacillus as the primary bacterial species responsible for dental caries through fermentation of carbohydrates.", "answer": "B"}, {"id": "ch4_q111", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 111, "question": "According to Cameron, what is the initial symptom of cracked tooth syndrome?", "options": [{"letter": "A", "text": "Radiographic visibility of the crack"}, {"letter": "B", "text": "Chewing discomfort and unexplained thermal sensitivity"}, {"letter": "C", "text": "Persistent pain on percussion"}, {"letter": "D", "text": "Bleeding on probing"}], "correctAnswer": "B", "explanation": "Cameron reported that coronary fractures are associated with both chewing discomfort and unexplained thermal sensitivity. This sensitivity results from fluid movement within the crack causing pulpal stimulation (Turp and Gobetti).", "answer": "B"}, {"id": "ch4_q112", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 112, "question": "According to Ricucci et al, what finding refutes previous theories about crack propagation in traumatized teeth?", "options": [{"letter": "A", "text": "Cracks do not contain bacteria"}, {"letter": "B", "text": "Fractures are colonized by bacteria and pulpal inflammation occurs even prior to direct pulp exposure"}, {"letter": "C", "text": "Direct exposures do not cause inflammation"}, {"letter": "D", "text": "Cracks heal spontaneously"}], "correctAnswer": "B", "explanation": "Ricucci et al noted that fractures are colonized by bacteria and demonstrated that pulpal inflammation occurred even prior to direct pulp exposure, explaining the development of pulp necrosis and apical periodontitis in traumatized teeth (Robertson et al).", "answer": "B"}, {"id": "ch4_q113", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 113, "question": "According to Lin et al, what is the relationship between simvastatin administration and periapical periodontitis?", "options": [{"letter": "A", "text": "No effect on bone resorption"}, {"letter": "B", "text": "Increases pro-inflammatory cytokines"}, {"letter": "C", "text": "Decreases expression of pro-inflammatory cytokines and attenuates bone resorption"}, {"letter": "D", "text": "Has no effect on immune response"}], "correctAnswer": "C", "explanation": "Lin et al found that administration of simvastatin decreased the expression of pro-inflammatory cytokines and attenuated bone resorption in rats, demonstrating systemic medication effects on periapical disease progression.", "answer": "C"}, {"id": "ch4_q114", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 114, "question": "What is the primary pathophysiologic mechanism by which bacteria cause apical periodontitis?", "options": [{"letter": "A", "text": "Direct bacterial invasion of periapical bone"}, {"letter": "B", "text": "Spread of bacteria, LPS, and viruses into periapical tissues with activation of immune responses and bone resorption"}, {"letter": "C", "text": "Mechanical trauma from endodontic treatment"}, {"letter": "D", "text": "Occlusal trauma alone"}], "correctAnswer": "B", "explanation": "Microbial spread from the pulp into the periapical tissues causes apical periodontitis by activating both cellular and humoral immune responses, ultimately resulting in bone resorption (Marton and Kiss).", "answer": "B"}, {"id": "ch4_q115", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 115, "question": "According to a recent systematic review by Jakovljevic et al, what is the prevalence of apical periodontitis and conventional nonsurgical root canal treatment?", "options": [{"letter": "A", "text": "10-15 percent in general population"}, {"letter": "B", "text": "20-25 percent in general population"}, {"letter": "C", "text": "30-35 percent in general population"}, {"letter": "D", "text": "40-45 percent in general population"}], "correctAnswer": "A", "explanation": "A recent systematic review and meta-analysis by Jakovljevic et al found the prevalence of apical periodontitis and conventional nonsurgical root canal treatment in the general adult population was 10-15 percent based on systematic review of cross sectional studies between 2012-2020.", "answer": "A"}, {"id": "ch4_q116", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 116, "question": "According to the text, which immune cells are primarily responsible for the inflammatory response in early apical periodontitis?", "options": [{"letter": "A", "text": "Macrophages and plasma cells"}, {"letter": "B", "text": "Lymphocytes, particularly T cells"}, {"letter": "C", "text": "Neutrophils and basophils"}, {"letter": "D", "text": "Dendritic cells only"}], "correctAnswer": "B", "explanation": "Stern et al found that lymphocytes are the predominant cell population associated with the development of apical periodontitis. While both T and B cells are present, the average number of T cells is typically greater than the number of B cells (Torabinejad and Kettering).", "answer": "B"}, {"id": "ch4_q117", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 117, "question": "According to Stashenko et al, what is the primary bone-resorptive cytokine in apical periodontitis?", "options": [{"letter": "A", "text": "TNF-alpha and IL-6"}, {"letter": "B", "text": "IL-1beta"}, {"letter": "C", "text": "IL-10"}, {"letter": "D", "text": "IFN-gamma"}], "correctAnswer": "B", "explanation": "Stashenko et al identified IL-1beta as the most active bone resorptive cytokine, reported to have approximately 15 times greater potency than IL-1alpha. Genetic differences in IL-1beta production have been associated with persistent apical periodontitis (Morsani et al).", "answer": "B"}, {"id": "ch4_q118", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 118, "question": "According to Mejare et al, what critical finding was established regarding clinical pulpal diagnoses and histologic correlation?", "options": [{"letter": "A", "text": "Perfect correlation exists between clinical and histologic findings"}, {"letter": "B", "text": "Insufficient evidence exists to determine whether the presence, nature, and duration of symptoms offer accurate information about the extent of pulpal inflammation"}, {"letter": "C", "text": "Clinical diagnosis always overestimates histologic inflammation"}, {"letter": "D", "text": "Histologic findings have no relevance to treatment planning"}], "correctAnswer": "B", "explanation": "Mejare et al concluded in a systematic review that insufficient evidence exists to determine whether the presence, nature, and duration of symptoms offer accurate information about the extent of pulpal inflammation. This highlights the dissociation between clinical presentation and histology.", "answer": "B"}, {"id": "ch4_q119", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 119, "question": "According to Ricucci et al (2014), what percentage of clinical diagnoses of normal, reversible, and irreversible pulpitis matched histologic findings?", "options": [{"letter": "A", "text": "50%, 70%, 80%"}, {"letter": "B", "text": "75%, 85%, 92%"}, {"letter": "C", "text": "96%, 96%, 84%"}, {"letter": "D", "text": "100%, 100%, 100%"}], "correctAnswer": "C", "explanation": "Ricucci et al noted a correlation between clinical diagnoses and histologic evaluations with normal or reversible pulpitis matched histologic findings 96 percent of the time, and irreversible pulpitis was matched 84 percent of the time, indicating reasonable but not perfect correlation.", "answer": "C"}, {"id": "ch4_q120", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 120, "question": "According to the text, what periodontal status was found to affect oxygen saturation in pulpal tissues?", "options": [{"letter": "A", "text": "Occlusal trauma only"}, {"letter": "B", "text": "Periodontal disease"}, {"letter": "C", "text": "Gingival inflammation alone"}, {"letter": "D", "text": "Periodontal disease does not affect pulp tissues"}], "correctAnswer": "B", "explanation": "Giovanella et al found lower oxygen saturation rates in pulpal tissues of teeth affected by periodontal disease than control teeth, though no differences in electric pulp sensitivity testing were noted. A recent clinical study appears to support the hypothesis that periodontal disease can affect pulp tissues.", "answer": "B"}, {"id": "ch4_q121", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 121, "question": "What pathophysiologic classification characterizes the relationship between periodontitis and pulpal disease according to recent clinical studies?", "options": [{"letter": "A", "text": "Periodontitis always causes pulpitis"}, {"letter": "B", "text": "Periodontitis cannot affect pulp tissues"}, {"letter": "C", "text": "A recent clinical study appears to support the hypothesis that periodontal disease can affect pulp tissues"}, {"letter": "D", "text": "The relationship is purely mechanical"}], "correctAnswer": "C", "explanation": "A recent clinical study appears to support the hypothesis that periodontal disease can affect pulp tissues, representing a departure from the traditional view that periodontitis cannot cause pulpal disease. This finding has important clinical implications.", "answer": "C"}, {"id": "ch4_q122", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 122, "question": "According to Nair et al, what is the composition of periapical granulomas in terms of epithelial organization?", "options": [{"letter": "A", "text": "Always well-organized epithelial lining"}, {"letter": "B", "text": "Composed of granulation tissue and chronic inflammation, with epithelial cells may be present but NOT organized as a lining"}, {"letter": "C", "text": "No epithelial cells present"}, {"letter": "D", "text": "Purely fibrous tissue"}], "correctAnswer": "B", "explanation": "Periapical granulomas are composed of granulation tissue and chronic inflammation, rather than granulomatous inflammation as the nomenclature suggests (Weiner et al). Epithelial cells may be present, though not organized as a lining, which differentiates them from cysts (Nair et al 1996).", "answer": "B"}, {"id": "ch4_q123", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 123, "question": "According to Koivisto et al (2012), what is the frequency of granulomas versus cysts in 9,723 biopsy specimens?", "options": [{"letter": "A", "text": "Granulomas 40%, cysts 33%"}, {"letter": "B", "text": "Granulomas 35%, cysts 50%"}, {"letter": "C", "text": "Granulomas 60%, cysts 20%"}, {"letter": "D", "text": "Granulomas 25%, cysts 75%"}], "correctAnswer": "A", "explanation": "Koivisto et al (2012) examined 9,723 biopsy specimens and diagnosed granulomas in 40% of cases and cysts in 33% of cases, with the remaining lesions included several other pathologic entities. This distribution differs from older literature.", "answer": "A"}, {"id": "ch4_q124", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 124, "question": "According to Ten Cate, what is the primary mechanism of periapical cyst formation?", "options": [{"letter": "A", "text": "Nutritional deficiency theory"}, {"letter": "B", "text": "Cells in the center of the epithelial cavity lose their nutritional source and necrose"}, {"letter": "C", "text": "Mechanical pressure only"}, {"letter": "D", "text": "Bacterial invasion"}], "correctAnswer": "B", "explanation": "Ten Cate proposed the nutritional deficiency theory, asserting that cells in the center of the epithelial cavity lose their nutritional source and necrose. This theory was later supported by Nair et al (2008) with the abscess theory.", "answer": "B"}, {"id": "ch4_q125", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 125, "question": "According to Nair et al (1996), how does the presence of epithelial lining differentiate periapical cysts from periapical granulomas?", "options": [{"letter": "A", "text": "Epithelial cells are present in both equally"}, {"letter": "B", "text": "Cysts have an epithelial-lined cavity while granulomas have simple presence of epithelial cells without organized lining"}, {"letter": "C", "text": "Granulomas have more epithelial cells"}, {"letter": "D", "text": "Size of the lesion determines epithelial organization"}], "correctAnswer": "B", "explanation": "Nair et al (1996) found that the simple presence of a definitive epithelial lining in the periapical cyst, rather than the simple presence of epithelial cells, is what differentiates periapical cysts from periapical granulomas.", "answer": "B"}, {"id": "ch4_q126", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 126, "question": "What is the significance of ciliated columnar epithelium found in 2% of apical periodontitis lesions according to Ricucci et al (2014)?", "options": [{"letter": "A", "text": "It is pathognomonic for a specific lesion type"}, {"letter": "B", "text": "It exclusively indicates malignancy"}, {"letter": "C", "text": "It was found exclusively in the maxilla and suggests metaplasia of respiratory epithelium"}, {"letter": "D", "text": "It has no clinical significance"}], "correctAnswer": "C", "explanation": "Ricucci et al (2014) found ciliated columnar epithelium in 2% of all apical periodontitis lesions and 8% of all cysts, finding it exclusively in the maxilla. This finding suggests metaplasia of respiratory epithelium in periapical lesions.", "answer": "C"}, {"id": "ch4_q127", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 127, "question": "According to Simon, what is the distinction between true cysts and bay cysts in periapical pathology?", "options": [{"letter": "A", "text": "Both communicate with the root canal system"}, {"letter": "B", "text": "True cysts are not continuous with root canal while bay cysts communicate with the periapex"}, {"letter": "C", "text": "Size is the only differentiating factor"}, {"letter": "D", "text": "Bay cysts are always larger"}], "correctAnswer": "B", "explanation": "Simon described two types of periapical cysts based on communication with root canal: the true cyst which represents an epithelial-lined lesion that is not continuous with the root canal system, whereas bay cysts communicate with the periapex (Nair et al).", "answer": "B"}, {"id": "ch4_q128", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 128, "question": "According to Baskar, what is the theoretical mechanism by which cysts can heal after nonsurgical root canal therapy?", "options": [{"letter": "A", "text": "Cysts cannot heal after nonsurgical treatment"}, {"letter": "B", "text": "Cysts can heal if the frequency of cysts diagnosed via biopsy is larger than failure rates examined in prognostic literature"}, {"letter": "C", "text": "Only surgical removal guarantees healing"}, {"letter": "D", "text": "All cysts must be extracted"}], "correctAnswer": "B", "explanation": "Baskar theorized that cysts can heal after nonsurgical root canal therapy, given that the frequency of cysts diagnosed via biopsy is larger than failure rates examined in prognostic literature, supporting non-surgical management for many periapical cysts.", "answer": "B"}, {"id": "ch4_q129", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 129, "question": "According to Sirotheau Correa Pontes et al, what percentage of non-endodontic periapical lesions were benign?", "options": [{"letter": "A", "text": "40%"}, {"letter": "B", "text": "56%"}, {"letter": "C", "text": "66%"}, {"letter": "D", "text": "80%"}], "correctAnswer": "C", "explanation": "Sirotheau Correa Pontes et al found that of non-endodontic lesions found at the periapex, 66% were benign, 29% were malignant, and 5% represented Stafne bone cavities.", "answer": "C"}, {"id": "ch4_q130", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 130, "question": "According to Schuch et al, what are the most common malignant lesions at the periapex?", "options": [{"letter": "A", "text": "Squamous cell carcinomas only"}, {"letter": "B", "text": "Metastatic lesions and carcinomas"}, {"letter": "C", "text": "Lymphomas exclusively"}, {"letter": "D", "text": "Melanomas only"}], "correctAnswer": "B", "explanation": "Schuch et al found that the most common malignancies encountered were metastatic lesions and carcinomas, which are most commonly found in the mandible, are equally common in males and females, and are often unilateral.", "answer": "B"}, {"id": "ch4_q131", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 131, "question": "According to the text, what is the most common benign non-odontogenic lesion at the periapex?", "options": [{"letter": "A", "text": "Ameloblastoma"}, {"letter": "B", "text": "Ameloblastoma and nasopalatine duct cysts"}, {"letter": "C", "text": "Stafne bone defect"}, {"letter": "D", "text": "Central giant cell granuloma"}], "correctAnswer": "B", "explanation": "The text indicates that the most common benign lesions located were ameloblastomas and nasopalatine duct cysts, followed by other common benign lesions. The existence of these entities underscores the importance of histologic evaluation of excised periapical tissues.", "answer": "B"}, {"id": "ch4_q132", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 132, "question": "According to Yu et al, what is the incidence of flare-ups after initiation of root canal therapy on teeth with periapical lesions?", "options": [{"letter": "A", "text": "2.8%"}, {"letter": "B", "text": "4.2%"}, {"letter": "C", "text": "5.8%"}, {"letter": "D", "text": "7.5%"}], "correctAnswer": "C", "explanation": "Yu et al found only a 5.8% incidence of flare-up after initiation of root canal therapy on teeth with periapical lesions. The likelihood of experiencing a flare-up appears to be related to several factors including female sex, complaints of preoperative pain and swelling, and pulp necrosis.", "answer": "C"}, {"id": "ch4_q133", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 133, "question": "According to Walton and Fouad, what factors are associated with endodontic flare-ups?", "options": [{"letter": "A", "text": "Female sex, preoperative pain, and preoperative swelling"}, {"letter": "B", "text": "Male sex and occlusal trauma"}, {"letter": "C", "text": "Age and systemic disease only"}, {"letter": "D", "text": "Tooth type determines flare-up risk"}], "correctAnswer": "A", "explanation": "Walton and Fouad associated flare-ups with female sex, complaints of preoperative pain and swelling, and pulp necrosis. Additionally, Torabinejad et al associated flare-ups with retreatment therapy and a history of allergies.", "answer": "A"}, {"id": "ch4_q134", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 134, "question": "According to de Chevigny et al, what is the relationship between flare-ups and treatment failures in endodontics?", "options": [{"letter": "A", "text": "Flare-ups always lead to treatment failure"}, {"letter": "B", "text": "Flare-ups have not been associated with treatment failures"}, {"letter": "C", "text": "Most flare-ups progress to apical periodontitis"}, {"letter": "D", "text": "Flare-ups guarantee poor prognosis"}], "correctAnswer": "B", "explanation": "de Chevigny et al found that though uncomfortable, flare-ups have not been associated with treatment failures. Despite being uncomfortable experiences for patients, they do not compromise endodontic outcome.", "answer": "B"}, {"id": "ch4_q135", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 135, "question": "According to the text, what prophylactic measure can prevent endodontic flare-ups?", "options": [{"letter": "A", "text": "Prophylactic antibiotics alone"}, {"letter": "B", "text": "Flare-ups cannot be prevented with antibiotic administration per Walton and Fouad"}, {"letter": "C", "text": "All patients should receive NSAIDs"}, {"letter": "D", "text": "Flare-ups can be eliminated with proper diagnosis"}], "correctAnswer": "B", "explanation": "According to Walton and Fouad, flare-ups cannot be prevented with antibiotic administration. While analgesics and antibiotics may be used to control a flare-up once developed (Seltzer and Naidorf), prevention remains elusive in clinical practice.", "answer": "B"}, {"id": "ch4_q136", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 136, "question": "According to Rickert and Dixon, what is the hollow tube theory and why was it debunked?", "options": [{"letter": "A", "text": "It asserts that hollow tubes in root canals cause infection"}, {"letter": "B", "text": "It asserts that hollow tubes collect circulatory elements and permit inflammation, but was debunked by Torneck and Wenger et al"}, {"letter": "C", "text": "It is still accepted in modern endodontics"}, {"letter": "D", "text": "It refers to vascular channels in dentin"}], "correctAnswer": "B", "explanation": "The hollow tube theory, developed by Rickert and Dixon, asserts that hollow tubes contained within the body, including root canal spaces, collect circulatory elements and permit inflammation to develop. This theory was debunked by animal studies of both Torneck and Wenger et al.", "answer": "B"}, {"id": "ch4_q137", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 137, "question": "According to the text, what is the theory of anachoresis in endodontics?", "options": [{"letter": "A", "text": "Bloodborne bacteria are attracted to areas of chronic inflammation"}, {"letter": "B", "text": "Local bacteria cause systemic disease"}, {"letter": "C", "text": "Root canals are sealed compartments"}, {"letter": "D", "text": "Apical periodontitis cannot spread"}], "correctAnswer": "A", "explanation": "The theory of anachoresis suggests that bloodborne bacteria are attracted to areas of chronic inflammation. This theory was discredited by Delivanis et al, who found that a hematogenous pathway for reinfection of unfilled root canals was doubtful.", "answer": "A"}, {"id": "ch4_q138", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 138, "question": "According to the focal infection theory, how do bacteria in endodontically-treated teeth affect systemic health?", "options": [{"letter": "A", "text": "They have no systemic effects"}, {"letter": "B", "text": "Bacteria trapped in root canals can leak into systemic circulation and cause systemic disease"}, {"letter": "C", "text": "Root canals are impermeable to bacteria"}, {"letter": "D", "text": "Focal infections are purely local phenomena"}], "correctAnswer": "B", "explanation": "The focal infection theory, promoted by Weston Price, suggests that bacteria trapped in central tubules during root canal therapy could leak into the systemic circulation and cause systemic disease. Easlick pointed out fallacies in Price's research methods.", "answer": "B"}, {"id": "ch4_q139", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 139, "question": "What are the clinical manifestations of pulpal irritants as described in the text?", "options": [{"letter": "A", "text": "Irreversible pulpitis only"}, {"letter": "B", "text": "Both irreversible pulpitis and pulp necrosis through orchestrated microscopic responses"}, {"letter": "C", "text": "Permanent tissue damage only"}, {"letter": "D", "text": "No clinical changes until complete necrosis"}], "correctAnswer": "B", "explanation": "Pulpal irritants incite neurovascular, cellular, and humoral responses in pulpal tissues, producing the clinical pathologic entities of irreversible pulpitis and pulp necrosis through a number of orchestrated microscopic responses.", "answer": "B"}, {"id": "ch4_q140", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 140, "question": "According to Rittenhouse-Olson and De Nardin, which immune system components are involved in pulpal inflammation?", "options": [{"letter": "A", "text": "Only innate immunity"}, {"letter": "B", "text": "Only adaptive immunity"}, {"letter": "C", "text": "Both innate and adaptive immune systems with both cellular and humoral responses"}, {"letter": "D", "text": "Non-specific immune responses only"}], "correctAnswer": "C", "explanation": "The innate immune system does not require prior pathogen sensitization and includes physical barriers, phagocytes, inflammation, and nonspecific proteins. The adaptive immune system requires prior antigen sensitization and includes all B- and T-cell responses (Rittenhouse-Olson and De Nardin).", "answer": "C"}, {"id": "ch4_q141", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 141, "question": "Which innate immune component is primarily responsible for the initial bacterial response in the pulp?", "options": [{"letter": "A", "text": "T cell response"}, {"letter": "B", "text": "Physical barriers and phagocytes"}, {"letter": "C", "text": "B cell antibodies"}, {"letter": "D", "text": "Complement fixation only"}], "correctAnswer": "B", "explanation": "Physical barriers, phagocytes, and nonspecific proteins comprise the innate immune response.", "answer": "B"}, {"id": "ch4_q142", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 142, "question": "According to Caviedesucheli et al, how does CGRP expression relate to irreversible pulpitis?", "options": [{"letter": "A", "text": "CGRP is not expressed in pulpitis"}, {"letter": "B", "text": "CGRP receptors are upregulated in irreversible pulpitis"}, {"letter": "C", "text": "CGRP has no role in inflammation"}, {"letter": "D", "text": "CGRP only acts on vasculature"}], "correctAnswer": "B", "explanation": "CGRP receptors are upregulated in irreversible pulpitis tissue according to research.", "answer": "B"}, {"id": "ch4_q143", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 143, "question": "What is the primary pathologic consequence of sustained pro-inflammatory cytokine release in apical periodontitis?", "options": [{"letter": "A", "text": "Vascular hyperemia only"}, {"letter": "B", "text": "Bone resorption through RANKL activation of osteoclasts"}, {"letter": "C", "text": "Pulpal calcification"}, {"letter": "D", "text": "Complete bacterial eradication"}], "correctAnswer": "B", "explanation": "Pro-inflammatory cytokines activate RANKL leading to osteoclast activation and bone resorption.", "answer": "B"}, {"id": "ch4_q144", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 144, "question": "According to multiple studies, which age group demonstrates the highest incidence of apical periodontitis?", "options": [{"letter": "A", "text": "Children under 12 years"}, {"letter": "B", "text": "Young adults 20-30 years"}, {"letter": "C", "text": "Middle-aged 40-60 years"}, {"letter": "D", "text": "Elderly over 70 years"}], "correctAnswer": "C", "explanation": "Middle-aged populations show peak incidence of diagnosed apical periodontitis in epidemiologic studies.", "answer": "C"}, {"id": "ch4_q145", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 145, "question": "Which bacterial lipopolysaccharide receptor on immune cells triggers inflammatory cascade in pulp?", "options": [{"letter": "A", "text": "TLR2"}, {"letter": "B", "text": "TLR4"}, {"letter": "C", "text": "CD14"}, {"letter": "D", "text": "Pattern recognition receptors only"}], "correctAnswer": "B", "explanation": "TLR4 is the primary LPS receptor triggering inflammatory cascade on immune cells.", "answer": "B"}, {"id": "ch4_q146", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 146, "question": "According to Mente et al, what was the relationship between MMP9 levels and irreversible pulpitis symptoms?", "options": [{"letter": "A", "text": "MMP9 unrelated to pulpal status"}, {"letter": "B", "text": "MMP9 higher in symptomatic irreversible pulpitis"}, {"letter": "C", "text": "MMP9 only found in periapical lesions"}, {"letter": "D", "text": "MMP9 prevents inflammation"}], "correctAnswer": "B", "explanation": "Mente et al found significantly elevated MMP9 in symptomatic irreversible pulpitis cases.", "answer": "B"}, {"id": "ch4_q147", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 147, "question": "Which of the following best describes the progression from reversible to irreversible pulpitis?", "options": [{"letter": "A", "text": "Sudden complete necrosis"}, {"letter": "B", "text": "Gradual inflammatory cell infiltration and neural degeneration"}, {"letter": "C", "text": "Instantaneous bacterial colonization"}, {"letter": "D", "text": "No histologic changes occur"}], "correctAnswer": "B", "explanation": "Progression involves gradual cellular infiltration and neural tissue changes, not instantaneous necrosis.", "answer": "B"}, {"id": "ch4_q148", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 148, "question": "According to Torres et al, how do matrix metalloproteinases contribute to periapical bone loss?", "options": [{"letter": "A", "text": "They promote bone formation"}, {"letter": "B", "text": "They degrade extracellular matrix and promote bone resorption"}, {"letter": "C", "text": "They prevent inflammation"}, {"letter": "D", "text": "They seal the periapical space"}], "correctAnswer": "B", "explanation": "MMPs degrade extracellular matrix proteins facilitating osteoclast access and bone resorption.", "answer": "B"}, {"id": "ch4_q149", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 149, "question": "What percentage of periapical lesions contain bacteria detectable by modern molecular methods?", "options": [{"letter": "A", "text": "Less than 10%"}, {"letter": "B", "text": "25-50%"}, {"letter": "C", "text": "75-100%"}, {"letter": "D", "text": "Variable depending on lesion type"}], "correctAnswer": "D", "explanation": "Prevalence varies by lesion type and detection method employed in studies.", "answer": "D"}, {"id": "ch4_q150", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 150, "question": "According to Saber et al, which bacterial species were most commonly isolated from apical lesions?", "options": [{"letter": "A", "text": "Only aerobic species"}, {"letter": "B", "text": "Mixed aerobic and anaerobic species with predominance of anaerobes"}, {"letter": "C", "text": "Only gram-positive cocci"}, {"letter": "D", "text": "Single pathogenic species"}], "correctAnswer": "B"
