<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#667eea">
<title>EndoBoard - Board Review</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary:       #6366f1;
  --primary-dark:  #4f46e5;
  --primary-light: #a5b4fc;
  --primary-glow:  rgba(99,102,241,.15);
  --success:       #22c55e;
  --success-bg:    #f0fdf4;
  --danger:        #ef4444;
  --danger-bg:     #fef2f2;
  --warning:       #f59e0b;
  --warning-bg:    #fffbeb;
  --bg:            #f1f5f9;
  --card:          #ffffff;
  --text:          #0f172a;
  --text-secondary:#475569;
  --border:        #e2e8f0;
  --radius:        18px;
  --radius-sm:     12px;
  --shadow:        0 1px 3px rgba(0,0,0,.08), 0 4px 12px rgba(0,0,0,.06);
  --shadow-lg:     0 4px 6px rgba(0,0,0,.06), 0 12px 32px rgba(0,0,0,.1);
  --transition:    all .2s cubic-bezier(.4,0,.2,1);
  --sidebar-w:     240px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg:           #0f172a;
    --card:         #1e293b;
    --text:         #f1f5f9;
    --text-secondary:#b0bec5;
    --border:       #334155;
    --success-bg:   #052e16;
    --danger-bg:    #2d0a0a;
    --warning-bg:   #1c1208;
    --shadow:       0 1px 3px rgba(0,0,0,.3), 0 4px 12px rgba(0,0,0,.25);
    --shadow-lg:    0 4px 6px rgba(0,0,0,.3), 0 12px 32px rgba(0,0,0,.4);
    --primary-glow: rgba(99,102,241,.2);
  }
}
*, *::before, *::after {
  margin: 0; padding: 0; box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  min-height: 100dvh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}

/* ── Layout ── */
.app {
  max-width: 680px;
  margin: 0 auto;
  padding-bottom: 84px;
}
@media (min-width: 900px) {
  body { display: block; }
  .app {
    max-width: none;
    margin-left: var(--sidebar-w);
    padding-bottom: 40px;
    min-height: 100vh;
    width: calc(100vw - var(--sidebar-w));
  }
  .page-inner {
    max-width: 820px;
    margin: 0 auto;
    padding: 0 32px;
  }
}

/* ── Bottom nav (mobile) ── */
.bottom-nav {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--card);
  border-top: 1px solid var(--border);
  display: flex; justify-content: space-around;
  padding: 8px 0 max(8px, env(safe-area-inset-bottom));
  z-index: 100;
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
@media (min-width: 900px) {
  .bottom-nav { display: none !important; }
}
.nav-item {
  display: flex; flex-direction: column; align-items: center;
  font-size: 11px; font-weight: 500; color: var(--text-secondary);
  cursor: pointer; padding: 4px 16px;
  transition: var(--transition); border: none; background: none;
  gap: 2px;
}
.nav-item.active { color: var(--primary); }
.nav-item svg { width: 22px; height: 22px; }

/* ── Sidebar (desktop) ── */
.sidebar {
  display: none;
}
@media (min-width: 900px) {
  .sidebar {
    display: flex; flex-direction: column;
    position: fixed; top: 0; left: 0; bottom: 0;
    width: var(--sidebar-w);
    background: var(--card);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    z-index: 200;
    gap: 4px;
  }
  .sidebar-logo {
    font-size: 20px; font-weight: 800; color: var(--primary);
    letter-spacing: -0.5px;
    padding: 0 12px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
  }
  .sidebar-logo span { color: var(--text); }
  .sidebar-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: var(--radius-sm);
    font-size: 14px; font-weight: 500; color: var(--text-secondary);
    cursor: pointer; transition: var(--transition);
    border: none; background: none; width: 100%; text-align: left;
  }
  .sidebar-item:hover { background: var(--bg); color: var(--text); }
  .sidebar-item.active {
    background: var(--primary-glow);
    color: var(--primary);
    font-weight: 600;
  }
  .sidebar-item svg { width: 20px; height: 20px; flex-shrink: 0; }
  .sidebar-spacer { flex: 1; }
  .sidebar-version {
    font-size: 11px; color: var(--text-secondary);
    padding: 8px 12px;
    opacity: .6;
  }
}

/* ── Header ── */
.header {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white;
  padding: 28px 24px 20px;
  position: sticky; top: 0; z-index: 50;
}
@media (min-width: 900px) {
  .header {
    border-radius: 0 0 var(--radius) var(--radius);
    position: relative;
    padding: 32px 32px 24px;
  }
}
.header h1 {
  font-size: 24px; font-weight: 800; letter-spacing: -.5px;
}
.header .subtitle { font-size: 14px; opacity: .75; margin-top: 2px; font-weight: 500; }

/* ── Streak banner ── */
.streak-banner {
  display: flex; align-items: center; justify-content: center;
  gap: 8px; padding: 10px 20px; margin: 0 20px;
  background: linear-gradient(135deg, #f59e0b, #d97706);
  border-radius: 0 0 var(--radius) var(--radius);
  color: white; font-weight: 700; font-size: 14px;
  box-shadow: 0 4px 12px rgba(245,158,11,.3);
}
@media (min-width: 900px) {
  .streak-banner { margin: 0 0 8px; border-radius: var(--radius); }
}
.streak-banner .fire { font-size: 18px; }

/* ── Cards ── */
.card {
  background: var(--card);
  border-radius: var(--radius);
  padding: 20px;
  margin: 12px 16px;
  box-shadow: var(--shadow);
  transition: var(--transition);
}
@media (min-width: 900px) {
  .card { margin: 16px 0; padding: 24px; }
}
.card-title {
  font-size: 12px; font-weight: 700; color: var(--text-secondary);
  text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px;
}

/* ── Stats row ── */
.stats-row {
  display: flex; gap: 10px; margin: 12px 16px;
}
@media (min-width: 900px) {
  .stats-row { margin: 16px 0; gap: 16px; }
}
.stat-card {
  flex: 1; background: var(--card); border-radius: var(--radius-sm);
  padding: 16px 10px; text-align: center; box-shadow: var(--shadow);
}
.stat-value { font-size: 26px; font-weight: 800; color: var(--primary); letter-spacing: -1px; }
.stat-label { font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: .5px; margin-top: 2px; }

/* ── Readiness ring ── */
.readiness-ring {
  width: 130px; height: 130px; margin: 0 auto 16px;
  position: relative;
}
.readiness-ring svg { transform: rotate(-90deg); }
.readiness-ring .score {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
  font-size: 30px; font-weight: 800; color: var(--primary); letter-spacing: -1px;
}
.readiness-label { text-align: center; font-size: 14px; color: var(--text-secondary); font-weight: 500; }

/* ── Chapter list ── */
.chapter-item {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 0; border-bottom: 1px solid var(--border);
  cursor: pointer; transition: var(--transition);
}
.chapter-item:hover { padding-left: 4px; }
.chapter-item:last-child { border-bottom: none; }
.chapter-num {
  width: 38px; height: 38px; border-radius: 10px;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-weight: 700; font-size: 14px; flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(99,102,241,.3);
}
.chapter-num.mastered { background: linear-gradient(135deg, #22c55e, #16a34a); box-shadow: 0 2px 8px rgba(34,197,94,.3); }
.chapter-num.learning  { background: linear-gradient(135deg, #f59e0b, #d97706); box-shadow: 0 2px 8px rgba(245,158,11,.3); }
.chapter-info { flex: 1; min-width: 0; }
.chapter-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.chapter-progress { font-size: 12px; color: var(--text-secondary); margin-top: 2px; font-weight: 500; }
.chapter-bar { height: 5px; background: var(--border); border-radius: 3px; margin-top: 7px; overflow: hidden; }
.chapter-bar-fill { height: 100%; border-radius: 3px; transition: width .6s cubic-bezier(.4,0,.2,1); }
@media (min-width: 900px) {
  .chapters-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0 24px;
  }
  .chapter-item { padding: 12px 0; }
}

/* ── Quiz header ── */
.quiz-header {
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 20px;
  background: var(--card);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 0; z-index: 50;
}
@media (min-width: 900px) {
  .quiz-header { border-radius: var(--radius) var(--radius) 0 0; padding: 16px 28px; }
}
.quiz-back {
  background: none; border: none; font-size: 15px;
  color: var(--primary); cursor: pointer; padding: 8px 12px;
  border-radius: 8px; font-weight: 600;
  transition: var(--transition);
}
.quiz-back:hover { background: var(--primary-glow); }
.quiz-progress-text { font-size: 14px; color: var(--text-secondary); font-weight: 600; }
.quiz-timer { font-size: 14px; color: var(--warning); font-weight: 700; font-variant-numeric: tabular-nums; }
.quiz-wrapper {
  max-width: 820px;
  margin: 0 auto;
  padding: 0 32px;
}
@media (max-width: 899px) {
  .quiz-wrapper { padding: 0; }
}
.progress-bar-strip {
  height: 3px; background: var(--border);
  position: sticky; top: 53px; z-index: 49;
}
.progress-bar-strip-fill {
  height: 100%; background: linear-gradient(90deg, var(--primary), var(--primary-light));
  transition: width .4s ease;
}

/* ── Question card ── */
.question-card {
  background: var(--card);
  margin: 16px;
  border-radius: var(--radius);
  padding: 28px 24px;
  box-shadow: var(--shadow-lg);
}
@media (min-width: 900px) {
  .question-card { margin: 24px 0; padding: 36px 36px 28px; }
}
.q-number {
  font-size: 12px; color: var(--primary); font-weight: 700;
  text-transform: uppercase; letter-spacing: .8px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 6px;
}
.q-number::before {
  content: '';
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--primary);
}
.q-text {
  font-size: 18px; line-height: 1.7; font-weight: 500; margin-bottom: 24px;
  color: var(--text);
}
@media (min-width: 900px) {
  .q-text { font-size: 19px; }
}

/* ── Options ── */
.option-btn {
  display: flex; align-items: flex-start; gap: 12px;
  width: 100%; text-align: left;
  padding: 16px 20px; margin-bottom: 12px;
  background: var(--bg); border: 2px solid var(--border);
  border-radius: var(--radius-sm); font-size: 16px; line-height: 1.5;
  cursor: pointer; transition: var(--transition);
  color: var(--text); font-family: inherit;
}
.option-btn:hover:not(:disabled) { border-color: var(--primary); background: var(--primary-glow); transform: translateX(2px); }
.option-btn.selected  { border-color: var(--primary); background: var(--primary-glow); }
.option-btn.correct   { border-color: var(--success); background: var(--success-bg); }
.option-btn.incorrect { border-color: var(--danger);  background: var(--danger-bg); }
.option-btn.show-correct { border-color: var(--success); background: var(--success-bg); }
.option-letter {
  font-weight: 700; color: var(--primary);
  width: 22px; height: 22px; border-radius: 6px;
  background: var(--primary-glow);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; margin-top: 1px;
}
.option-btn.correct   .option-letter { background: var(--success-bg); color: var(--success); }
.option-btn.incorrect .option-letter { background: var(--danger-bg);  color: var(--danger); }

/* ── Explanation ── */
.explanation-box {
  margin-top: 20px; padding: 20px 24px; border-radius: var(--radius-sm);
  background: var(--primary-glow); border-left: 4px solid var(--primary);
  font-size: 15px; line-height: 1.75; display: none;
}
.explanation-box.show { display: block; }
.explanation-box strong { color: var(--primary); font-size: 16px; }

/* ── Buttons ── */
.next-btn {
  display: block; width: calc(100% - 32px); margin: 16px auto;
  padding: 16px;
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white; border: none; border-radius: var(--radius-sm);
  font-size: 16px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: var(--transition);
  box-shadow: 0 4px 16px rgba(99,102,241,.35);
  letter-spacing: .2px;
}
.next-btn:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,.45); }
.next-btn:active { transform: scale(.98); }
@media (min-width: 900px) {
  .next-btn { width: 100%; margin: 20px 0 0; }
}

/* ── Mode grid ── */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.mode-btn {
  background: var(--card); border: 2px solid var(--border);
  border-radius: var(--radius); padding: 20px 14px;
  text-align: center; cursor: pointer; transition: var(--transition);
}
.mode-btn:hover { border-color: var(--primary); box-shadow: var(--shadow-lg); transform: translateY(-2px); }
.mode-btn:active { transform: scale(.97); }
.mode-btn .mode-icon { font-size: 28px; margin-bottom: 8px; }
.mode-btn .mode-name { font-size: 14px; font-weight: 700; }
.mode-btn .mode-desc { font-size: 12px; color: var(--text-secondary); margin-top: 4px; font-weight: 500; }

/* ── Flashcard ── */
.flashcard-container { perspective: 1200px; margin: 16px; }
@media (min-width: 900px) { .flashcard-container { margin: 20px 0; } }
.flashcard {
  width: 100%; min-height: 220px; position: relative;
  transform-style: preserve-3d; transition: transform .55s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
.flashcard.flipped { transform: rotateY(180deg); }
.flashcard-face {
  position: absolute; width: 100%; min-height: 220px;
  backface-visibility: hidden; border-radius: var(--radius);
  padding: 32px 28px;
  display: flex; flex-direction: column;
  justify-content: center; align-items: center; text-align: center;
  box-shadow: var(--shadow-lg);
}
.flashcard-front {
  background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
  color: white; font-size: 18px; line-height: 1.6; font-weight: 500;
}
.flashcard-back {
  background: var(--card); transform: rotateY(180deg);
  font-size: 16px; line-height: 1.7; color: var(--text);
}
.flashcard-hint { font-size: 12px; opacity: .65; margin-top: 16px; }
.flashcard-nav { display: flex; gap: 12px; margin: 16px; }
@media (min-width: 900px) { .flashcard-nav { margin: 16px 0; } }
.flashcard-nav button {
  flex: 1; padding: 14px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 700; font-family: inherit;
  cursor: pointer; border: 2px solid var(--border);
  background: var(--card); color: var(--text);
  transition: var(--transition);
}
.flashcard-nav .knew-it  { border-color: var(--success); color: var(--success); }
.flashcard-nav .study-more { border-color: var(--warning); color: var(--warning); }
.flashcard-nav .knew-it:hover   { background: var(--success-bg); }
.flashcard-nav .study-more:hover { background: var(--warning-bg); }

/* ── Results ── */
.results-container { text-align: center; padding: 32px 16px 16px; }
.results-score { font-size: 64px; font-weight: 800; color: var(--primary); letter-spacing: -3px; line-height: 1; }
.results-label { font-size: 15px; color: var(--text-secondary); margin: 8px 0 20px; font-weight: 500; }
.results-breakdown { text-align: left; }
.result-item {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 0; border-bottom: 1px solid var(--border);
}
.result-q { font-size: 14px; flex: 1; margin-right: 12px; line-height: 1.5; }
.result-badge {
  padding: 4px 12px; border-radius: 20px;
  font-size: 12px; font-weight: 700; white-space: nowrap;
}
.result-badge.correct   { background: var(--success-bg); color: var(--success); }
.result-badge.incorrect { background: var(--danger-bg);  color: var(--danger); }

/* ── Chapter select grid ── */
.chapter-select-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin: 12px 0; }
@media (min-width: 900px) {
  .chapter-select-grid { grid-template-columns: repeat(7, 1fr); }
}
.ch-select-btn {
  padding: 10px 4px; border-radius: 10px; border: 2px solid var(--border);
  background: var(--card); font-size: 13px; font-weight: 600;
  cursor: pointer; text-align: center; transition: var(--transition);
  color: var(--text); font-family: inherit;
}
.ch-select-btn.selected { border-color: var(--primary); background: var(--primary-glow); color: var(--primary); }
.ch-select-btn:hover { border-color: var(--primary); }

/* ── Charts ── */
.chart-bar-group { display: flex; align-items: flex-end; justify-content: space-between; height: 160px; padding: 0 4px; gap: 4px; }
.chart-bar-wrapper { display: flex; flex-direction: column; align-items: center; flex: 1; }
.chart-bar { width: 80%; min-width: 10px; border-radius: 6px 6px 0 0; transition: height .6s cubic-bezier(.4,0,.2,1); }
.chart-bar-label { font-size: 10px; font-weight: 600; color: var(--text-secondary); margin-top: 5px; writing-mode: vertical-lr; transform: rotate(180deg); height: 32px; }
.chart-percent { font-size: 10px; font-weight: 700; color: var(--text); margin-bottom: 3px; }

/* ── Misc ── */
.xp-popup {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 28px; font-weight: 800; color: var(--success);
  pointer-events: none; z-index: 200;
  animation: xpFloat 1s ease-out forwards;
  text-shadow: 0 2px 12px rgba(34,197,94,.4);
}
@keyframes xpFloat {
  0%   { opacity: 1; transform: translate(-50%,-50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%,-120%) scale(1.4); }
}
.confetti {
  position: fixed; top: -10px; z-index: 300;
  pointer-events: none; border-radius: 2px;
  animation: confettiFall 3s ease-in forwards;
}
@keyframes confettiFall {
  0%   { transform: translateY(0) rotate(0);    opacity: 1; }
  100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
}
.user-badge {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 14px 16px;
  background: var(--primary-glow);
  border-radius: var(--radius-sm);
  margin-bottom: 16px;
}
.user-badge-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--primary), var(--primary-dark));
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 700; flex-shrink: 0;
}
.user-badge-info { flex: 1; }
.user-badge-email { font-size: 14px; font-weight: 600; color: var(--text); }
.user-badge-status { font-size: 11px; color: var(--success); font-weight: 500; }
.flag-btn {
  background: none; border: none; cursor: pointer;
  font-size: 20px; padding: 6px 10px; border-radius: 8px;
  transition: var(--transition); line-height: 1;
  color: var(--text-secondary);
}
.flag-btn:hover { background: var(--warning-bg); }
.flag-btn.flagged { color: var(--warning); }
.quiz-actions {
  display: flex; align-items: center; gap: 8px;
  margin: 0 16px 0;
}
@media (min-width: 900px) { .quiz-actions { margin: 0; } }
.kbd-hint {
  font-size: 12px; color: var(--text-secondary);
  text-align: center; margin: 6px 0 0;
  font-weight: 500; letter-spacing: .3px;
}
.option-num {
  font-weight: 700; color: var(--primary);
  width: 26px; height: 26px; border-radius: 8px;
  background: var(--primary-glow);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; flex-shrink: 0; margin-top: 1px;
  font-variant-numeric: tabular-nums;
}
.option-btn.correct   .option-num { background: var(--success-bg); color: var(--success); }
.option-btn.incorrect .option-num { background: var(--danger-bg);  color: var(--danger); }
.spinner {
  width: 40px; height: 40px;
  border: 4px solid var(--border); border-top-color: var(--primary);
  border-radius: 50%; animation: spin 1s linear infinite; margin: 48px auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.sync-status { font-size: 11px; color: var(--text-secondary); text-align: center; padding: 4px; font-weight: 500; }
.sync-status.synced  { color: var(--success); }
.sync-status.syncing { color: var(--warning); }
.hidden { display: none !important; }
.text-center { text-align: center; }
.mb-8  { margin-bottom: 8px; }
.mb-12 { margin-bottom: 12px; }

<script>
const QUESTIONS = [{"id": "ch1_q101", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 101, "question": "According to the Oxford Centre for Evidence-Based Medicine (OCEBM) hierarchy, which represents the highest level of evidence?", "options": [{"letter": "A", "text": "Expert opinion"}, {"letter": "B", "text": "Case series"}, {"letter": "C", "text": "Systematic review including meta-analysis"}, {"letter": "D", "text": "Randomized controlled trial"}], "correctAnswer": "C", "explanation": "Systematic reviews including meta-analyses represent the highest level of evidence in OCEBM hierarchy. They involve comprehensive search and review of literature with statistical analyses comparing studies.", "answer": "C"}, {"id": "ch1_q102", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 102, "question": "What primarily distinguishes a meta-analysis from a systematic review?", "options": [{"letter": "A", "text": "Meta-analysis requires RCTs only"}, {"letter": "B", "text": "Meta-analysis performs statistical analyses to compare studies"}, {"letter": "C", "text": "Meta-analysis uses post-publication peer review"}, {"letter": "D", "text": "Meta-analysis focuses on expert opinions"}], "correctAnswer": "B", "explanation": "Meta-analysis delves deeper by performing statistical analyses to make direct comparisons between studies. Depending on statistical variability, meta-analysis may not be achievable.", "answer": "B"}, {"id": "ch1_q103", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 103, "question": "Which organization produces systematic reviews considered the gold standard for evidence-based medicine?", "options": [{"letter": "A", "text": "Oxford Centre for Evidence-Based Medicine"}, {"letter": "B", "text": "The Cochrane Collaborative"}, {"letter": "C", "text": "National Institutes of Health"}, {"letter": "D", "text": "American Dental Association"}], "correctAnswer": "B", "explanation": "The Cochrane Collaborative produces systematic reviews considered gold standard with constant updates, post-publication peer review, and strong conflict of interest policy.", "answer": "B"}, {"id": "ch1_q104", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 104, "question": "Randomized controlled trials are high quality because they:", "options": [{"letter": "A", "text": "Reduce effects of confounders through randomization"}, {"letter": "B", "text": "Eliminate need for sample size calculations"}, {"letter": "C", "text": "Ensure all population members studied"}, {"letter": "D", "text": "Eliminate peer review requirements"}], "correctAnswer": "A", "explanation": "Randomization distributes known and unknown confounders equally between groups. RCTs are resource- and time-intensive but remain high quality evidence.", "answer": "A"}, {"id": "ch1_q105", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 105, "question": "In the OCEBM hierarchy, cohort studies rank:", "options": [{"letter": "A", "text": "Highest above RCTs"}, {"letter": "B", "text": "Below case-control but above case series"}, {"letter": "C", "text": "Below RCTs but above case-control"}, {"letter": "D", "text": "Same level as expert opinion"}], "correctAnswer": "C", "explanation": "Cohort studies rank below RCTs. They are prospective, longitudinal, measuring incidence of new disease cases and assessing risk factors.", "answer": "C"}, {"id": "ch1_q106", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 106, "question": "Case-control studies are preferred for rare outcomes because they are:", "options": [{"letter": "A", "text": "More expensive than cohort studies"}, {"letter": "B", "text": "Less expensive but subject to recall bias"}, {"letter": "C", "text": "Always free from bias"}, {"letter": "D", "text": "Prospective rather than retrospective"}], "correctAnswer": "B", "explanation": "Case-control studies are less expensive and time-intensive, useful for rare outcomes. However, lower quality due to recall bias and misdiagnosis issues.", "answer": "B"}, {"id": "ch1_q107", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 107, "question": "Case series or case reports represent which level of evidence?", "options": [{"letter": "A", "text": "Lowest"}, {"letter": "B", "text": "Second-lowest"}, {"letter": "C", "text": "Third-lowest"}, {"letter": "D", "text": "Second-highest"}], "correctAnswer": "B", "explanation": "Case series or case reports are second-lowest level. Their value is introducing novel disease presentations or treatments for further investigation.", "answer": "B"}, {"id": "ch1_q108", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 108, "question": "Expert opinions have limited utility in evidence-based practice because they:", "options": [{"letter": "A", "text": "Are based on RCTs"}, {"letter": "B", "text": "Have limited value in justifying evidence-based diagnosis"}, {"letter": "C", "text": "Provide statistical analysis"}, {"letter": "D", "text": "Subject to publication bias"}], "correctAnswer": "B", "explanation": "Expert opinions have limited utility in justifying evidence-based diagnosis and treatment. They introduce innovation and new techniques.", "answer": "B"}, {"id": "ch1_q109", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 109, "question": "In Spili et al's study, P value was .49 for retained fractured instruments. This indicates:", "options": [{"letter": "A", "text": "49% chance difference due to chance"}, {"letter": "B", "text": "49% probability instrument separation caused difference"}, {"letter": "C", "text": "Difference is significant at P=.05"}, {"letter": "D", "text": "Retained instruments do not affect outcomes"}], "correctAnswer": "A", "explanation": "P=.49 means 49% probability difference in healing was due to chance. At P=.05 significance level, difference is statistically insignificant.", "answer": "A"}, {"id": "ch1_q110", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 110, "question": "Which P value indicates statistical significance at P=.05 threshold?", "options": [{"letter": "A", "text": "P=.07"}, {"letter": "B", "text": "P=.49"}, {"letter": "C", "text": "P=.03"}, {"letter": "D", "text": "P=.15"}], "correctAnswer": "C", "explanation": "P≤.05 indicates statistical significance. P=.03 meets criterion while .07, .15, .49 do not.", "answer": "C"}, {"id": "ch1_q111", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 111, "question": "Sample size is ___ related to likelihood of error.", "options": [{"letter": "A", "text": "directly"}, {"letter": "B", "text": "inversely"}, {"letter": "C", "text": "not"}, {"letter": "D", "text": "exponentially"}], "correctAnswer": "B", "explanation": "Sample size is inversely related to error likelihood. Larger samples are more representative, reducing sampling error.", "answer": "B"}, {"id": "ch1_q112", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 112, "question": "Power calculations ensure:", "options": [{"letter": "A", "text": "Determine significance level"}, {"letter": "B", "text": "Adequate sample sizes for testing"}, {"letter": "C", "text": "Eliminate need for confidence intervals"}, {"letter": "D", "text": "Guarantee statistical significance"}], "correctAnswer": "B", "explanation": "Power calculations ensure adequate sample sizes. Note if appropriate calculations made to justify sample size used.", "answer": "B"}, {"id": "ch1_q113", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 113, "question": "Confidence intervals primarily serve to:", "options": [{"letter": "A", "text": "Eliminate statistical testing"}, {"letter": "B", "text": "Infer likely range accounting for sampling error"}, {"letter": "C", "text": "Guarantee significance"}, {"letter": "D", "text": "Directly increase precision"}], "correctAnswer": "B", "explanation": "Confidence intervals infer likely range accounting for sampling error. Narrower intervals indicate more accurate results.", "answer": "B"}, {"id": "ch1_q114", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 114, "question": "According to Mainkar and Kim's meta-analysis, highest sensitivity test was:", "options": [{"letter": "A", "text": "Heat testing (0.78)"}, {"letter": "B", "text": "Cold testing"}, {"letter": "C", "text": "Laser Doppler flowmetry (0.98)"}, {"letter": "D", "text": "Electric pulp testing"}], "correctAnswer": "C", "explanation": "LDF had sensitivity of 0.98, correctly identifying teeth with pulp necrosis 98% of time vs heat testing 78%.", "answer": "C"}, {"id": "ch1_q115", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 115, "question": "Sensitivity is the ability of a test to:", "options": [{"letter": "A", "text": "Correctly identify healthy individuals"}, {"letter": "B", "text": "Detect diseased individuals"}, {"letter": "C", "text": "Predict positive results"}, {"letter": "D", "text": "Eliminate false positives"}], "correctAnswer": "B", "explanation": "Sensitivity calculated by comparing true positives with total diseased subjects (true positives plus false negatives).", "answer": "B"}, {"id": "ch1_q116", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 116, "question": "Positive predictive value is calculated as:", "options": [{"letter": "A", "text": "True positives ÷ all positive results"}, {"letter": "B", "text": "True positives ÷ total diseased"}, {"letter": "C", "text": "True negatives ÷ all negatives"}, {"letter": "D", "text": "True negatives ÷ total healthy"}], "correctAnswer": "A", "explanation": "Positive predictive value = proportion of true positives compared with positive results. Likelihood positive result identifies disease.", "answer": "A"}, {"id": "ch1_q117", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 117, "question": "In Mainkar and Kim's study, LDF negative predictive value was:", "options": [{"letter": "A", "text": "0.79"}, {"letter": "B", "text": "0.95"}, {"letter": "C", "text": "1.00"}, {"letter": "D", "text": "0.98"}], "correctAnswer": "C", "explanation": "LDF had NPV of 1.00, meaning negative result (flow present) indicated vital pulp tissue 100% of time.", "answer": "C"}, {"id": "ch1_q118", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 118, "question": "Specificity is the ability to correctly identify:", "options": [{"letter": "A", "text": "Diseased individuals"}, {"letter": "B", "text": "Healthy individuals"}, {"letter": "C", "text": "False positive results"}, {"letter": "D", "text": "Total positive results"}], "correctAnswer": "B", "explanation": "Specificity calculated by comparing true negatives with total nondiseased subjects (true negatives plus false positives).", "answer": "B"}, {"id": "ch1_q119", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 119, "question": "Knowledge of risk factors aids in:", "options": [{"letter": "A", "text": "Disease diagnosis only"}, {"letter": "B", "text": "Prevention, prediction, diagnosis, and establishing cause"}, {"letter": "C", "text": "Statistical analysis only"}, {"letter": "D", "text": "Cost reduction exclusively"}], "correctAnswer": "B", "explanation": "Risk factors help in diagnosing disease, preventing disease, predicting future incidence, and establishing disease cause.", "answer": "B"}, {"id": "ch1_q120", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 120, "question": "Oxford Pain Group League table NNT for 800mg ibuprofen achieving 50% pain reduction was:", "options": [{"letter": "A", "text": "1.6"}, {"letter": "B", "text": "2.2"}, {"letter": "C", "text": "3.0"}, {"letter": "D", "text": "4.5"}], "correctAnswer": "A", "explanation": "NNT was 1.6 for 800mg ibuprofen vs 2.2 for narcotic combinations for 50% pain reduction.", "answer": "A"}, {"id": "ch1_q121", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 121, "question": "Relative risk states:", "options": [{"letter": "A", "text": "Incidence minus baseline rate"}, {"letter": "B", "text": "How many times exposure increases chance of outcome"}, {"letter": "C", "text": "Proportion of positive tests"}, {"letter": "D", "text": "Total diseased individuals"}], "correctAnswer": "B", "explanation": "Relative risk shows how many times exposure increases chance of outcome. NNT is derived from relative risk.", "answer": "B"}, {"id": "ch1_q122", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 122, "question": "Sim et al reported odds ratio of 11 for pulpal floor fractures regarding:", "options": [{"letter": "A", "text": "Tooth sensitivity"}, {"letter": "B", "text": "Tooth loss over 5 years"}, {"letter": "C", "text": "Periapical pathology"}, {"letter": "D", "text": "Treatment cost"}], "correctAnswer": "B", "explanation": "Teeth with pulpal floor fractures 11 times more likely lost in 5 years following treatment.", "answer": "B"}, {"id": "ch1_q123", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 123, "question": "Odds ratio of 1 indicates:", "options": [{"letter": "A", "text": "Risk factor strongly associated with disease"}, {"letter": "B", "text": "Case no more likely exposed than control"}, {"letter": "C", "text": "Factor protective against disease"}, {"letter": "D", "text": "Risk factor causes disease"}], "correctAnswer": "B", "explanation": "OR=1 indicates no more likelihood in cases vs controls, suggesting no association.", "answer": "B"}, {"id": "ch1_q124", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 124, "question": "Prevalence refers to:", "options": [{"letter": "A", "text": "New disease cases during period"}, {"letter": "B", "text": "Total people affected at one point in time"}, {"letter": "C", "text": "Rate new cases develop"}, {"letter": "D", "text": "Percentage disease-free"}], "correctAnswer": "B", "explanation": "Prevalence = total affected at particular point in time. Incidence = new cases during defined period.", "answer": "B"}, {"id": "ch1_q125", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 125, "question": "According to Eriksen et al, apical periodontitis prevalence in European populations:", "options": [{"letter": "A", "text": "5% to 15%"}, {"letter": "B", "text": "15% to 35%"}, {"letter": "C", "text": "26% to 70%"}, {"letter": "D", "text": "70% to 90%"}], "correctAnswer": "C", "explanation": "Between 26% and 70% of European patients sampled had apical periodontitis on radiographs.", "answer": "C"}, {"id": "ch1_q126", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 126, "question": "Incidence better than prevalence for toothache because:", "options": [{"letter": "A", "text": "Develops slowly"}, {"letter": "B", "text": "Is permanent"}, {"letter": "C", "text": "Has rapid onset and decline"}, {"letter": "D", "text": "Is rare in population"}], "correctAnswer": "C", "explanation": "Toothache has rapid onset/decline, so point-in-time assessment misses many cases.", "answer": "C"}, {"id": "ch1_q127", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 127, "question": "According to Rampa et al, ED visits for periapical abscess increased from 2008 to 2014:", "options": [{"letter": "A", "text": "250,000 to 350,000"}, {"letter": "B", "text": "460,260 to 545,693"}, {"letter": "C", "text": "600,000 to 750,000"}, {"letter": "D", "text": "1,000,000 to 1,500,000"}], "correctAnswer": "B", "explanation": "Nationwide Emergency Department Sample showed increase from 460,260 to 545,693.", "answer": "B"}, {"id": "ch1_q128", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 128, "question": "Rampa et al mean charge per ED discharge for periapical abscess:", "options": [{"letter": "A", "text": "$500"}, {"letter": "B", "text": "$1,080.50"}, {"letter": "C", "text": "$5,000"}, {"letter": "D", "text": "$34,245"}], "correctAnswer": "B", "explanation": "Mean charge $1,080.50 per ED discharge, totaling $3.4 billion nationwide.", "answer": "B"}, {"id": "ch1_q129", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 129, "question": "Percentage of periapical abscess ED visits uninsured (Rampa et al):", "options": [{"letter": "A", "text": "15%"}, {"letter": "B", "text": "30%"}, {"letter": "C", "text": "40%"}, {"letter": "D", "text": "60%"}], "correctAnswer": "C", "explanation": "40% uninsured and 30% Medicaid. Higher rates in ages 18-34.", "answer": "C"}, {"id": "ch1_q130", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 130, "question": "Roberts et al reported dental diagnostic codes incidence in US ED visits:", "options": [{"letter": "A", "text": "0.5%"}, {"letter": "B", "text": "2%"}, {"letter": "C", "text": "5%"}, {"letter": "D", "text": "10%"}], "correctAnswer": "B", "explanation": "2% incidence, higher with Medicaid and in ages 18-34.", "answer": "B"}, {"id": "ch1_q131", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 131, "question": "In endodontic outcome studies, success is best defined as:", "options": [{"letter": "A", "text": "Presence/absence of tooth"}, {"letter": "B", "text": "Absence of symptoms and periapical pathology"}, {"letter": "C", "text": "Patient satisfaction"}, {"letter": "D", "text": "Absence of complications"}], "correctAnswer": "B", "explanation": "Success = absence of symptoms and pathology on radiographs. Survival = tooth presence/absence.", "answer": "B"}, {"id": "ch1_q132", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 132, "question": "Survival in endodontic studies refers to:", "options": [{"letter": "A", "text": "Complete healing"}, {"letter": "B", "text": "Absence of symptoms"}, {"letter": "C", "text": "Absolute presence/absence of tooth"}, {"letter": "D", "text": "Restoration of function"}], "correctAnswer": "C", "explanation": "Survival = tooth presence/absence regardless of symptoms or pathology.", "answer": "C"}, {"id": "ch1_q133", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 133, "question": "Wu et al suggested CBCT may alter definitions by:", "options": [{"letter": "A", "text": "Eliminating definitions"}, {"letter": "B", "text": "Detecting more lesions, blurring success/survival"}, {"letter": "C", "text": "Making definitions irrelevant"}, {"letter": "D", "text": "Reducing sensitivity"}], "correctAnswer": "B", "explanation": "CBCT detects more lesions than traditional radiography, potentially blurring success/survival lines.", "answer": "B"}, {"id": "ch1_q134", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 134, "question": "Patient-centered outcomes focus on:", "options": [{"letter": "A", "text": "Radiographic measures"}, {"letter": "B", "text": "Histologic evidence"}, {"letter": "C", "text": "Symptoms and economic factors"}, {"letter": "D", "text": "Operator satisfaction"}], "correctAnswer": "C", "explanation": "Newer research focuses on symptoms and economic factors rather than radiographic/histologic measures.", "answer": "C"}, {"id": "ch1_q135", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 135, "question": "Narrow confidence interval indicates:", "options": [{"letter": "A", "text": "Results less likely accurate"}, {"letter": "B", "text": "Results more likely accurate"}, {"letter": "C", "text": "Sample size too small"}, {"letter": "D", "text": "Significance not achieved"}], "correctAnswer": "B", "explanation": "Narrower intervals indicate more accurate results. Only way to narrow is increase sample size.", "answer": "B"}, {"id": "ch1_q136", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 136, "question": "Attributable risk measures:", "options": [{"letter": "A", "text": "How many times risk factor increases likelihood"}, {"letter": "B", "text": "Additional incidence attributable to risk factor"}, {"letter": "C", "text": "Total disease cases"}, {"letter": "D", "text": "Treatment effectiveness"}], "correctAnswer": "B", "explanation": "Attributable risk = additional incidence attributable to risk factor.", "answer": "B"}, {"id": "ch1_q137", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 137, "question": "Prospective cohort studies determine:", "options": [{"letter": "A", "text": "Past exposures retrospectively"}, {"letter": "B", "text": "Relative risk and attributable risk"}, {"letter": "C", "text": "Only case-control relationships"}, {"letter": "D", "text": "Expert opinions only"}], "correctAnswer": "B", "explanation": "Both relative and attributable risk determined from prospective cohort studies.", "answer": "B"}, {"id": "ch1_q138", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 138, "question": "Readers should note when reviewing research:", "options": [{"letter": "A", "text": "Only if peer-reviewed"}, {"letter": "B", "text": "If appropriate power calculations made"}, {"letter": "C", "text": "Only author affiliation"}, {"letter": "D", "text": "Only publication date"}], "correctAnswer": "B", "explanation": "Note if appropriate power calculations made to justify sample size.", "answer": "B"}, {"id": "ch1_q139", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 139, "question": "Researchers must avoid:", "options": [{"letter": "A", "text": "Using multiple tests"}, {"letter": "B", "text": "Reporting P value"}, {"letter": "C", "text": "Overstating results"}, {"letter": "D", "text": "Acknowledging limitations"}], "correctAnswer": "C", "explanation": "Important never to overstate results beyond what data supports.", "answer": "C"}, {"id": "ch1_q140", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 140, "question": "Cause and effect versus association requires:", "options": [{"letter": "A", "text": "Small studies"}, {"letter": "B", "text": "Large RCTs with longitudinal follow-ups"}, {"letter": "C", "text": "Only expert consensus"}, {"letter": "D", "text": "Cross-sectional designs"}], "correctAnswer": "B", "explanation": "Cause and effect extremely difficult to prove, requiring large-scale RCTs with longitudinal follow-ups.", "answer": "B"}, {"id": "ch1_q141", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 141, "question": "High sensitivity, low specificity means:", "options": [{"letter": "A", "text": "Excellent at identifying diseased; many healthy labeled diseased"}, {"letter": "B", "text": "Excellent at identifying healthy"}, {"letter": "C", "text": "Perfect accuracy"}, {"letter": "D", "text": "Useless for diagnosis"}], "correctAnswer": "A", "explanation": "High sensitivity = few false negatives. Low specificity = many false positives.", "answer": "A"}, {"id": "ch1_q142", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 142, "question": "True negative results:", "options": [{"letter": "A", "text": "Correctly identify diseased"}, {"letter": "B", "text": "Incorrectly identify diseased as healthy"}, {"letter": "C", "text": "Correctly identify healthy"}, {"letter": "D", "text": "Incorrectly identify healthy as diseased"}], "correctAnswer": "C", "explanation": "True negatives correctly identify healthy individuals.", "answer": "C"}, {"id": "ch1_q143", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 143, "question": "Odds ratio of 0.5 suggests factor is:", "options": [{"letter": "A", "text": "Associated with increased risk"}, {"letter": "B", "text": "Not associated with disease"}, {"letter": "C", "text": "Protective against disease"}, {"letter": "D", "text": "Causative of disease"}], "correctAnswer": "C", "explanation": "OR<1 suggests protection. OR=1 no association. OR>1 increased association.", "answer": "C"}, {"id": "ch1_q144", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 144, "question": "Most credible evidence source:", "options": [{"letter": "A", "text": "Textbooks citing opinions"}, {"letter": "B", "text": "Lectures by clinicians"}, {"letter": "C", "text": "Primary resources in peer-reviewed journals"}, {"letter": "D", "text": "Manufacturer marketing"}], "correctAnswer": "C", "explanation": "Peer-reviewed journals considered unbiased and most useful.", "answer": "C"}, {"id": "ch1_q145", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 145, "question": "SORT evaluates based on:", "options": [{"letter": "A", "text": "Author credentials"}, {"letter": "B", "text": "Journal impact factor"}, {"letter": "C", "text": "Quality, quantity, consistency"}, {"letter": "D", "text": "Publication date"}], "correctAnswer": "C", "explanation": "SORT evaluates based on quality, quantity, and consistency of evidence.", "answer": "C"}, {"id": "ch1_q146", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 146, "question": "GRADE system aims to:", "options": [{"letter": "A", "text": "Eliminate research studies"}, {"letter": "B", "text": "Summarize evidence for systematic reviews and guidelines"}, {"letter": "C", "text": "Replace peer-review"}, {"letter": "D", "text": "Determine impact factors"}], "correctAnswer": "B", "explanation": "GRADE system summarizes evidence for producing systematic reviews and guidelines.", "answer": "B"}, {"id": "ch1_q147", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 147, "question": "Publication bias best addressed by:", "options": [{"letter": "A", "text": "Limit to major journals"}, {"letter": "B", "text": "Use systematic reviews finding all studies"}, {"letter": "C", "text": "Ignore negative results"}, {"letter": "D", "text": "Select only significant results"}], "correctAnswer": "B", "explanation": "Systematic reviews attempt comprehensive searches of all literature.", "answer": "B"}, {"id": "ch1_q148", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 148, "question": "P value of .001 indicates:", "options": [{"letter": "A", "text": "0.1% probability by chance"}, {"letter": "B", "text": "1% probability"}, {"letter": "C", "text": "10% probability"}, {"letter": "D", "text": "50% probability"}], "correctAnswer": "A", "explanation": "P=.001 = 0.1% chance. Highly significant, far below P=.05.", "answer": "A"}, {"id": "ch1_q149", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 149, "question": "Statistical significance means:", "options": [{"letter": "A", "text": "Clinically important"}, {"letter": "B", "text": "Unlikely to occur by chance"}, {"letter": "C", "text": "Well-designed study"}, {"letter": "D", "text": "Large enough sample"}], "correctAnswer": "B", "explanation": "Statistical significance indicates unlikely to occur by chance. Doesn't guarantee clinical importance.", "answer": "B"}, {"id": "ch1_q150", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 150, "question": "Primary goal of evidence-based dentistry:", "options": [{"letter": "A", "text": "Eliminate experience"}, {"letter": "B", "text": "Make decisions based on highest-quality evidence"}, {"letter": "C", "text": "Standardize all protocols"}, {"letter": "D", "text": "Reduce costs exclusively"}], "correctAnswer": "B", "explanation": "Evidence-based dentistry requires decisions based on comprehensive evaluation of research.", "answer": "B"}, {"id": "ch1_q151", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 151, "question": "Heterogeneity may prevent:", "options": [{"letter": "A", "text": "Conducting review"}, {"letter": "B", "text": "Performing meta-analysis despite review"}, {"letter": "C", "text": "Publishing in journals"}, {"letter": "D", "text": "Determining sample"}], "correctAnswer": "B", "explanation": "High heterogeneity may prevent statistical comparison for meta-analysis.", "answer": "B"}, {"id": "ch1_q152", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 152, "question": "Type I error refers to:", "options": [{"letter": "A", "text": "Failing to detect true effect"}, {"letter": "B", "text": "Concluding effect when doesn't exist"}, {"letter": "C", "text": "Wrong statistical test"}, { itive"}], "correctAnswer": "B", "explanation": "Systematic reviews synthesize multiple studies improving quality.", "answer": "B"}, {"id": "ch1_q183", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 183, "question": "CI crossing 1.0 for OR/RR indicates:", "options": [{"letter": "A", "text": "Clinically important"}, {"letter": "B", "text": "Statistically significant"}, {"letter": "C", "text": "Likely not significant at P=.05"}, {"letter": "D", "text": "Appropriate sample"}], "correctAnswer": "C", "explanation": "CI crossing null value typically not significant at P=.05.", "answer": "C"}, {"id": "ch1_q184", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 184, "question": "Evidence-based means decisions integrate:", "options": [{"letter": "A", "text": "Only experience"}, {"letter": "B", "text": "Ignore preferences"}, {"letter": "C", "text": "Research evidence, expertise, patient values"}, {"letter": "D", "text": "Always follow protocols"}], "correctAnswer": "C", "explanation": "Evidence-based integrates best evidence, expertise, patient preferences.", "answer": "C"}, {"id": "ch1_q185", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 185, "question": "Study with 95% power has Type II error of:", "options": [{"letter": "A", "text": "5%"}, {"letter": "B", "text": "1%"}, {"letter": "C", "text": "10%"}, {"letter": "D", "text": "50%"}], "correctAnswer": "A", "explanation": "Power = 1-beta. 95% power = 5% Type II error rate.", "answer": "A"}, {"id": "ch1_q186", "chapter": 1, "chapterTitle": "Evidence-Based Dentistry", "number": 186, "question": "Case reports' primary value is:", "options": [{"letter": "A", "text": "Definitive treatment evidence"}, {"letter": "B", "text": "Introducing novel presentations for investigation"}, {"letter": "C", "text": "Establishing causation"}, {"letter": "D", "text": "Replace other designs"}], "correctAnswer": "B", "explanation": "Case reports introduce novel presentations prompting fur  "D", "text": "Self-limiting"}], "correctAnswer": "B", "explanation": "Require emergency medical facility.", "answer": "B"}, {"id": "ch2_q200", "chapter": 2, "chapterTitle": "Microbiology", "number": 200, "question": "Understanding endodontic microbiology and infection spread is critical for:", "options": [{"letter": "A", "text": "Academic purposes only"}, {"letter": "B", "text": "Diagnosing and managing periapical pathology and preventing complications"}, {"letter": "C", "text": "Research only"}, {"letter": "D", "text": "Historical interest"}], "correctAnswer": "B", "explanation": "Essential clinical knowledge for endodontists.", "answer": "B"}, {"id": "ch3_q101", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 101, "question": "Which of the following growth factors is NOT mentioned in the text as being essential to odontogenesis?", "options": [{"letter": "A", "text": "Bone morphogenetic protein 4 (BMP4)"}, {"letter": "B", "text": "Fibroblast growth factor (FGF)"}, {"letter": "C", "text": "Vascular endothelial growth factor (VEGF)"}, {"letter": "D", "text": "Insulin-like growth factor (IGF)"}], "correctAnswer": "C", "explanation": "The text specifically identifies BMP4, msh homeobox 1 (MSX1), paired box gene 9 (PAX9), TGF, FGF, and IGF as essential signaling molecules in odontogenesis. VEGF is not mentioned among these essential factors.", "answer": "C"}, {"id": "ch3_q102", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 102, "question": "According to the text, at what distance from the pulp do bacteria cause severe acute inflammation in carious teeth?", "options": [{"letter": "A", "text": "0.5 mm"}, {"letter": "B", "text": "1.0 mm"}, {"letter": "C", "text": "1.5 mm"}, {"letter": "D", "text": "2.0 mm"}], "correctAnswer": "A", "explanation": "Reeves and Stanley found that mild chronic inflammation was evident once bacteria reached a depth of 1.1 mm from the pulp, whereas severe acute inflammation was observed when bacteria approached within 0.5 mm of the pulp.", "answer": "A"}, {"id": "ch3_q103", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 103, "question": "What percentage of the collagen found in dental pulp tissue is type III collagen, according to Shuttleworth et al?", "options": [{"letter": "A", "text": "23%"}, {"letter": "B", "text": "43%"}, {"letter": "C", "text": "63%"}, {"letter": "D", "text": "83%"}], "correctAnswer": "B", "explanation": "The text states that according to Shuttleworth et al, 43% of the collagen found in the dental pulp tissue is type III collagen. Together with collagen types I and V, this comprises the extracellular connective tissue composition.", "answer": "B"}, {"id": "ch3_q104", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 104, "question": "At the dentino-enamel junction (DEJ), approximately how many dentinal tubules are found per square millimeter according to Garberoglio and Brännström?", "options": [{"letter": "A", "text": "10,000 tubules/mm²"}, {"letter": "B", "text": "20,000 tubules/mm²"}, {"letter": "C", "text": "35,000 tubules/mm²"}, {"letter": "D", "text": "50,000 tubules/mm²"}], "correctAnswer": "B", "explanation": "Garberoglio and Brännström counted 20,000 tubules per square millimeter at the DEJ, whereas at the pulp surface, 45,000 tubules per square millimeter were found, demonstrating the increase in tubule density with proximity to the pulp.", "answer": "B"}, {"id": "ch3_q105", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 105, "question": "According to Reeves and Stanley, how much reparative dentin is formed per day on average?", "options": [{"letter": "A", "text": "0.75 μm per day"}, {"letter": "B", "text": "1.0 μm per day"}, {"letter": "C", "text": "1.49 μm per day"}, {"letter": "D", "text": "2.0 μm per day"}], "correctAnswer": "C", "explanation": "The text specifically states that an average of 1.49 μm of reparative dentin is formed per day. Reparative dentin initially forms rapidly and then slows over time following an insult to the pulp.", "answer": "C"}, {"id": "ch3_q106", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 106, "question": "Which classification system for dentin types is attributed to Kuttler?", "options": [{"letter": "A", "text": "Primary, secondary, and tertiary"}, {"letter": "B", "text": "Reactionary and reparative"}, {"letter": "C", "text": "Active and latent"}, {"letter": "D", "text": "Calcified and non-calcified"}], "correctAnswer": "A", "explanation": "Kuttler (1959) classified dentin into three basic types: primary dentin (formed prior to eruption), secondary dentin (formed in response to slightly aggressive effects of normal biologic function), and tertiary dentin (formed in response to intense pulpal irritants).", "answer": "A"}, {"id": "ch3_q107", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 107, "question": "According to the text, mature dentin is composed of what percentage of mineral by volume?", "options": [{"letter": "A", "text": "30%"}, {"letter": "B", "text": "40%"}, {"letter": "C", "text": "50%"}, {"letter": "D", "text": "70%"}], "correctAnswer": "C", "explanation": "The text states that in its fully mature state, dentin is composed of 50% mineral by volume, 30% type I collagen, and 20% water (Kinney et al).", "answer": "C"}, {"id": "ch3_q108", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 108, "question": "What is the width of the minor apical foramen, as measured by Stein and Corcoran?", "options": [{"letter": "A", "text": "0.089 mm"}, {"letter": "B", "text": "0.189 mm"}, {"letter": "C", "text": "0.289 mm"}, {"letter": "D", "text": "0.389 mm"}], "correctAnswer": "B", "explanation": "The text states that the average width of the minor apical foramen does not change with age and remains constant at 0.189 mm (Stein and Corcoran). This is an important anatomical constant in endodontics.", "answer": "B"}, {"id": "ch3_q109", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 109, "question": "According to Burch and Hulen, what percentage of the major foramina of all classes of teeth open short of the anatomical apex?", "options": [{"letter": "A", "text": "72.4%"}, {"letter": "B", "text": "82.4%"}, {"letter": "C", "text": "92.4%"}, {"letter": "D", "text": "98.4%"}], "correctAnswer": "C", "explanation": "Burch and Hulen found that 92.4% of the major foramina of all classes of teeth open short of the anatomical apex. These findings were corroborated by El Ayouti et al in a recent CBCT study.", "answer": "C"}, {"id": "ch3_q110", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 110, "question": "According to El Ayouti et al using CBCT, what is the average distance between the apical foramen and the anatomical apex?", "options": [{"letter": "A", "text": "0.3 mm"}, {"letter": "B", "text": "0.59 mm"}, {"letter": "C", "text": "0.9 mm"}, {"letter": "D", "text": "1.2 mm"}], "correctAnswer": "C", "explanation": "El Ayouti et al found that the distance between the apical foramen and the apex was 0.9 mm on average when evaluated by CBCT. Additionally, the average distance between the foramen and the anatomical root apex is 0.59 mm.", "answer": "C"}, {"id": "ch3_q111", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 111, "question": "What percentage of A δ fibers entering the pulp are unmyelinated according to the text?", "options": [{"letter": "A", "text": "37%"}, {"letter": "B", "text": "57%"}, {"letter": "C", "text": "77%"}, {"letter": "D", "text": "87%"}], "correctAnswer": "D", "explanation": "The text states that of all axons entering the pulp, 87% are the unmyelinated C fibers. The remaining unmyelinated fibers include the C fibers, which are responsible for lingering dental pain.", "answer": "D"}, {"id": "ch3_q112", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 112, "question": "According to Avery et al, where is the highest concentration of adrenergic nerve endings located in the pulp?", "options": [{"letter": "A", "text": "In the cell body region"}, {"letter": "B", "text": "In the pulp horns"}, {"letter": "C", "text": "In the root canal"}, {"letter": "D", "text": "In the coronal pulp"}], "correctAnswer": "B", "explanation": "Avery et al found that the highest concentration of adrenergic nerve endings is located in the pulp horns. This has significant implications for pulpal sensitivity and innervation patterns.", "answer": "B"}, {"id": "ch3_q113", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 113, "question": "What is the theory of dental pain sensation that attributes sensation to nerve endings at gap junctions between nerves and odontoblasts?", "options": [{"letter": "A", "text": "Direct conduction theory (Frank)"}, {"letter": "B", "text": "Transduction theory (Avery et al)"}, {"letter": "C", "text": "Hydrodynamic theory (Brännström)"}, {"letter": "D", "text": "Neural inflammation theory (Nair)"}], "correctAnswer": "B", "explanation": "The transduction theory is attributed to Avery et al. They located gap junctions between nerves and odontoblasts and theorized that sensation is transduced by these structures. This theory was refuted by Berger and Byers, who found no evidence of gap junctions in their histologic analysis.", "answer": "B"}, {"id": "ch3_q114", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 114, "question": "Which of the following statements about pulpal blood flow is FALSE?", "options": [{"letter": "A", "text": "The pulp has the highest blood flow rate per weight of tissue among all oral tissues"}, {"letter": "B", "text": "The capillary flow in the coronal portion is two times that in the root"}, {"letter": "C", "text": "Sympathetic stimulation increases pulpal blood flow"}, {"letter": "D", "text": "Vascular flow is under neuropeptide control"}], "correctAnswer": "C", "explanation": "According to the text, sympathetic stimulation DECREASES pulpal blood flow. When Kim found administration of a β-agonist (which causes vasodilation), he found the opposite result in sympathetic nerve stimulation, which reduces blood flow through arteriole dilation in a low-compliance system.", "answer": "C"}, {"id": "ch3_q115", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 115, "question": "According to Kramer, what unique vascular structures provide significant shunting in the apical pulp compared to the coronal pulp?", "options": [{"letter": "A", "text": "Arteriovenous anastomoses and U-turn loops"}, {"letter": "B", "text": "Capillary beds only"}, {"letter": "C", "text": "Terminal arterioles and venules"}, {"letter": "D", "text": "Lymphatic vessels only"}], "correctAnswer": "A", "explanation": "The text mentions that Kramer observed arteriovenous shunts, U-turn loops, cross-fence capillaries, and venous-venous anastomoses. The shunting provided by these structures is significantly greater in the apex than in the coronal pulp (Kim).", "answer": "A"}, {"id": "ch3_q116", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 116, "question": "According to Bernick, lymphatic structures in the pulp begin as what type of structure?", "options": [{"letter": "A", "text": "Valved vessels"}, {"letter": "B", "text": "Blind sacs"}, {"letter": "C", "text": "Venules"}, {"letter": "D", "text": "Arterioles"}], "correctAnswer": "B", "explanation": "Bernick found evidence of large, valved lymphatic vessels in pulp tissue that begin as blind sacs. Matsumoto et al found the majority of these vessels in the cell-free zone beneath the odontoblast layer.", "answer": "B"}, {"id": "ch3_q117", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 117, "question": "According to the text, which age-related change does NOT occur in the dental pulp?", "options": [{"letter": "A", "text": "Decrease in number of nerves and blood vessels"}, {"letter": "B", "text": "Increase in fibrosis"}, {"letter": "C", "text": "Increase in diameter of the major apical foramen"}, {"letter": "D", "text": "Increased width of cementum"}], "correctAnswer": "C", "explanation": "The text states that the average width of the minor apical foramen does not change with age and remains constant at 0.189 mm. However, the diameter of the MAJOR apical foramen does increase with age, as cementum thickness increases.", "answer": "C"}, {"id": "ch3_q118", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 118, "question": "According to Stein and Corcoran, what is the average distance between the major and minor foramina?", "options": [{"letter": "A", "text": "0.324 mm"}, {"letter": "B", "text": "0.524 mm"}, {"letter": "C", "text": "0.724 mm"}, {"letter": "D", "text": "0.924 mm"}], "correctAnswer": "C", "explanation": "Stein and Corcoran found that the average distance between the major and minor foramina was 0.724 mm, and the width of the CDJ remained constant with age at 0.189 mm.", "answer": "C"}, {"id": "ch3_q119", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 119, "question": "According to Meder-Cowherd et al, what percentage of palatal roots of maxillary first molars have a defined apical constriction?", "options": [{"letter": "A", "text": "35%"}, {"letter": "B", "text": "55%"}, {"letter": "C", "text": "65%"}, {"letter": "D", "text": "85%"}], "correctAnswer": "C", "explanation": "Meder-Cowherd et al were unable to locate a defined apical constriction in 65% of the palatal roots of maxillary first molars evaluated with CBCT scans, indicating significant anatomical variability.", "answer": "C"}, {"id": "ch3_q120", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 120, "question": "According to De Deus, what percentage of teeth contain accessory anatomy in the apical third?", "options": [{"letter": "A", "text": "17%"}, {"letter": "B", "text": "27.4%"}, {"letter": "C", "text": "37%"}, {"letter": "D", "text": "47%"}], "correctAnswer": "B", "explanation": "De Deus found accessory anatomy in 27.4% of teeth, with 17% found in the apical third. While lateral anatomy is most frequently found apically, several authors have noted accessory canals in the furcation area of molars.", "answer": "B"}, {"id": "ch3_q121", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 121, "question": "According to Weller et al, at what distance from the apex is an isthmus between mesiobuccal and second mesiobuccal canals most likely to be found in maxillary molars?", "options": [{"letter": "A", "text": "2 mm from apex"}, {"letter": "B", "text": "3 mm from apex"}, {"letter": "C", "text": "4 mm from apex"}, {"letter": "D", "text": "5 mm from apex"}], "correctAnswer": "C", "explanation": "Weller et al located an isthmus between the mesiobuccal and second mesiobuccal canals 4 mm from the apex in 95% of maxillary molars. This is a critical anatomical consideration for endodontic treatment.", "answer": "C"}, {"id": "ch3_q122", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 122, "question": "What is the classification of dens invaginatus Type III according to Oehlers (1957, 1957b, 1958)?", "options": [{"letter": "A", "text": "Minor extension into the root canal space"}, {"letter": "B", "text": "Dens extends into root and may perforate the pulp tissue"}, {"letter": "C", "text": "Dens penetrates to the apex and may present with its own apical foramen"}, {"letter": "D", "text": "Dens is limited to the crown only"}], "correctAnswer": "C", "explanation": "Oehlers classified DI severity with Type III being the most severe, where the dens penetrates to the apex and may have its own apical foramen. Type I extends minor distance into the root canal space, and Type II extends into the root and may perforate the pulp tissue.", "answer": "C"}, {"id": "ch3_q123", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 123, "question": "According to Rotstein et al, what percentage of dens invaginatus cases occurred in lateral incisors?", "options": [{"letter": "A", "text": "22%"}, {"letter": "B", "text": "32%"}, {"letter": "C", "text": "42%"}, {"letter": "D", "text": "52%"}], "correctAnswer": "C", "explanation": "Rotstein et al found that 42% of DI cases occurred in lateral incisors. Hülsmann found bilateral presentation in 43% of cases, and DI presents with significant anatomical variability requiring careful preoperative evaluation.", "answer": "C"}, {"id": "ch3_q124", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 124, "question": "According to Narayana et al, what are the proposed etiologic factors for dens invaginatus formation?", "options": [{"letter": "A", "text": "Trauma and infection only"}, {"letter": "B", "text": "Trauma, infection, growth retardation, and genetic predisposition"}, {"letter": "C", "text": "Genetic predisposition only"}, {"letter": "D", "text": "Growth factors and trauma only"}], "correctAnswer": "B", "explanation": "Narayana et al proposed several potential etiologic factors for dens invaginatus including trauma, infection, growth retardation of specific cells, disruption in regulation of the enamel organ, and genetic predisposition.", "answer": "B"}, {"id": "ch3_q125", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 125, "question": "According to Lu et al, what percentage of mandibular first premolars in a Chinese population exhibit C-shaped canal anatomy?", "options": [{"letter": "A", "text": "8%"}, {"letter": "B", "text": "18%"}, {"letter": "C", "text": "28%"}, {"letter": "D", "text": "38%"}], "correctAnswer": "B", "explanation": "Lu et al located the anomaly in 18% of mandibular premolars in a Chinese population. Newton and McDonald reported a case in a maxillary molar, and C-shaped canals have also been noted in nonfused roots.", "answer": "B"}, {"id": "ch3_q126", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 126, "question": "According to Cooke and Cox, what percentage of mandibular second molars clinically examined exhibit C-shaped canal configurations?", "options": [{"letter": "A", "text": "5%"}, {"letter": "B", "text": "8%"}, {"letter": "C", "text": "12%"}, {"letter": "D", "text": "16%"}], "correctAnswer": "B", "explanation": "Cooke and Cox found C-shaped canals in as many as 8% of mandibular second molars when examined clinically. C-shaped canals present with large, interconnected tissue spaces and are often difficult to diagnose by 2D radiographs alone.", "answer": "B"}, {"id": "ch3_q127", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 127, "question": "What percentage of pulpal root canal anatomy consists of secondary canals branching toward the periodontal ligament?", "options": [{"letter": "A", "text": "15%"}, {"letter": "B", "text": "25%"}, {"letter": "C", "text": "35%"}, {"letter": "D", "text": "45%"}], "correctAnswer": "D", "explanation": "The text indicates that a significant volume of the endodontic literature points to the common presence of isthuses and secondary canals. Holland noted that the odontoblastic process extends to some degree into dentinal tubules during development.", "answer": "D"}, {"id": "ch3_q128", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 128, "question": "According to Garberoglio and Brännström, how far do odontoblastic processes extend into dentinal tubules?", "options": [{"letter": "A", "text": "0.2 mm"}, {"letter": "B", "text": "0.5 mm"}, {"letter": "C", "text": "1.0 mm"}, {"letter": "D", "text": "1.5 mm"}], "correctAnswer": "B", "explanation": "Garberoglio and Brännström demonstrated the extension of odontoblastic processes 0.5 mm into dentinal tubules. Byers and Sugaya found that processes extended to the DEJ early in development only, while Yamada et al found processes extended to the DEJ following completion of development.", "answer": "B"}, {"id": "ch3_q129", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 129, "question": "According to the text, at what age does the position of the major foramen change with respect to the anatomical apex?", "options": [{"letter": "A", "text": "It remains constant throughout life"}, {"letter": "B", "text": "It changes only in the first 5 years"}, {"letter": "C", "text": "It changes as cementum deposits with age"}, {"letter": "D", "text": "It migrates coronally after age 20"}], "correctAnswer": "C", "explanation": "As cementum thickness increases with age, the diameter of the major apical foramen increases, and the position of the major foramen changes with respect to the anatomical apex. However, the average width of the minor apical foramen remains constant at 0.189 mm.", "answer": "C"}, {"id": "ch3_q130", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 130, "question": "What is the embryologic origin of the dental pulp according to the text?", "options": [{"letter": "A", "text": "Ectodermal"}, {"letter": "B", "text": "Mesenchymal"}, {"letter": "C", "text": "Endodermal"}, {"letter": "D", "text": "Neural crest only"}], "correctAnswer": "B", "explanation": "The dental pulp arises from the dental papilla, a mesenchymal tissue entrapped by the inner and outer enamel epithelium that is capable of producing pulpal connective tissues, vasculature, and innervation (Thesleff).", "answer": "B"}, {"id": "ch3_q131", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 131, "question": "According to Fristad et al, when do C fibers enter the developing pulp tissue relative to A δ fibers?", "options": [{"letter": "A", "text": "Before A δ fibers"}, {"letter": "B", "text": "At the same time as A δ fibers"}, {"letter": "C", "text": "After A δ fibers"}, {"letter": "D", "text": "Not until after eruption"}], "correctAnswer": "C", "explanation": "The text states that sensory nerves containing calcitonin gene-related peptide (CGRP) and substance P (SP) enter the tissue earlier than sympathetic structures expressing neuropeptide Y (NPY), with C fibers entering after A δ fibers (Fristad et al).", "answer": "C"}, {"id": "ch3_q132", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 132, "question": "Which of the following is a characteristic feature that differentiates periapical cysts from periapical granulomas?", "options": [{"letter": "A", "text": "Presence of epithelial cells"}, {"letter": "B", "text": "Presence of immune cells only"}, {"letter": "C", "text": "Organization of epithelial cells into a defined lining"}, {"letter": "D", "text": "Size of the lesion"}], "correctAnswer": "C", "explanation": "The simple presence of epithelial cells is what differentiates periapical cysts from periapical granulomas. Cysts have epithelial-lined cavities, while granulomas may contain epithelial cells but lack the organized epithelial lining structure.", "answer": "C"}, {"id": "ch3_q133", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 133, "question": "What is the average width of the periodontal ligament (PDL) according to the text?", "options": [{"letter": "A", "text": "0.1 mm"}, {"letter": "B", "text": "0.2 mm"}, {"letter": "C", "text": "0.5 mm"}, {"letter": "D", "text": "1.0 mm"}], "correctAnswer": "B", "explanation": "The periodontal ligament is mesenchymal in origin (Freeman and ten Cate). It is comprised of collagen fibers and has an average width of 0.2 mm. Vascular and neural networks are also present within the PDL.", "answer": "B"}, {"id": "ch3_q134", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 134, "question": "According to the text, which maxillary tooth has the highest percentage (97.6%) of a single canal configuration at the apex?", "options": [{"letter": "A", "text": "Central incisor"}, {"letter": "B", "text": "Lateral incisor"}, {"letter": "C", "text": "Canine"}, {"letter": "D", "text": "First premolar"}], "correctAnswer": "A", "explanation": "According to Table 3-1, the maxillary central incisor has 1 canal 100% of the time in the root body and at the apex (Vertucci), indicating complete consistency in single canal anatomy.", "answer": "A"}, {"id": "ch3_q135", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 135, "question": "According to Table 3-2, what is the canal configuration of mandibular central incisors at the apex according to Vertucci?", "options": [{"letter": "A", "text": "1 canal 97%, 2 canals 3%"}, {"letter": "B", "text": "1 canal 99.5%, 2 canals 0.5%"}, {"letter": "C", "text": "1 canal 98.7%, 2 canals 1.3%"}, {"letter": "D", "text": "1 canal 70%, 2 canals 30%"}], "correctAnswer": "C", "explanation": "According to Table 3-2, Vertucci found that at the apex of mandibular central incisors, 1 canal is present 98.7% of the time and 2 canals 1.3% of the time, according to Madeira and Hetem.", "answer": "C"}, {"id": "ch3_q136", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 136, "question": "What percentage of mandibular molars have middle mesial canals according to Nosrat et al?", "options": [{"letter": "A", "text": "15% in patients aged 20 and younger"}, {"letter": "B", "text": "32% in patients aged 20 and younger"}, {"letter": "C", "text": "50% in patients aged 20 and younger"}, {"letter": "D", "text": "75% in patients aged 20 and younger"}], "correctAnswer": "B", "explanation": "Nosrat et al found that middle mesial canals are present in 32% of patients age 20 and younger and in 4% of patients older than 40, indicating a significant age-related difference in canal anatomy prevalence.", "answer": "B"}, {"id": "ch3_q137", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 137, "question": "According to Martins et al, what is the worldwide incidence of maxillary first molar second mesiobuccal canals?", "options": [{"letter": "A", "text": "48%"}, {"letter": "B", "text": "63.8%"}, {"letter": "C", "text": "73.8%"}, {"letter": "D", "text": "97.6%"}], "correctAnswer": "C", "explanation": "Martins et al reported 4 canals in 73.8% worldwide, with the lowest incidence in Venezuela at 48% and the highest incidence in Belgium at 97.6%, demonstrating significant geographic variation in canal anatomy prevalence.", "answer": "C"}, {"id": "ch3_q138", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 138, "question": "What is the importance of understanding Vertucci's canal classification system in endodontic treatment?", "options": [{"letter": "A", "text": "To predict treatment success rates"}, {"letter": "B", "text": "To identify the number, location, morphology of canals within the root"}, {"letter": "C", "text": "To determine the need for surgical intervention"}, {"letter": "D", "text": "To establish the cause of periapical pathology"}], "correctAnswer": "B", "explanation": "Vertucci's classification system is one of the most famous canal classification systems, identifying the number, location, and morphology of canals within the root. This system will be referenced throughout the endodontic literature and chapter.", "answer": "B"}, {"id": "ch3_q139", "chapter": 3, "chapterTitle": "Pulpal & Periapical Anatomy and Physiology", "number": 139, "question": "According to the text, what percentage of pulpal collagen is type I collagen?", "options": [{"letter": "A", "text": "20%"}, {"letter": "B", "text":
