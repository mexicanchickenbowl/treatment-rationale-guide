eases with prolonged immobilization and disuse.", "answer": "B"}, {"id": 20, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 120, "question": "In the management of crown-root fractures involving the pulp, what is the immediate treatment priority?", "options": [{"letter": "A", "text": "Extraction of the tooth"}, {"letter": "B", "text": "Restoration of the fracture only"}, {"letter": "C", "text": "Exposure of the fracture line, removal of loose fragments, and pulp management followed by restoration"}, {"letter": "D", "text": "No treatment necessary"}], "correctAnswer": "C", "explanation": "Crown-root fractures extending below the gingival margin require careful exposure of the entire fracture line, removal of loose/mobile fragments, pulp management (capping or removal), and restoration. This comprehensive approach prevents further complications and optimizes tooth preservation.", "answer": "C"}, {"id": 21, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 121, "question": "What percentage of traumatic dental injuries in the anterior region involve the maxillary central incisor?", "options": [{"letter": "A", "text": "Less than 10%"}, {"letter": "B", "text": "Approximately 35-50% of injuries involve maxillary central incisors"}, {"letter": "C", "text": "Over 75%"}, {"letter": "D", "text": "Less than 5%"}], "correctAnswer": "B", "explanation": "Maxillary central incisors are the most commonly injured teeth in traumatic dental injuries, accounting for approximately 35-50% of all anterior trauma cases. This high frequency reflects their anterior prominence and vulnerability to direct trauma.", "answer": "B"}, {"id": 22, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 122, "question": "In the treatment of a severely traumatized intrusively luxated tooth that cannot be repositioned, what is the management approach?", "options": [{"letter": "A", "text": "Immediate extraction"}, {"letter": "B", "text": "Observation allowing spontaneous re-eruption over 3-4 months, with endodontic treatment as indicated"}, {"letter": "C", "text": "Aggressive surgical repositioning"}, {"letter": "D", "text": "No treatment is necessary"}], "correctAnswer": "B", "explanation": "Severely intruded teeth may be allowed to re-erupt spontaneously over 3-4 months rather than forcing surgical repositioning, which can cause additional trauma. During this period, regular monitoring occurs and endodontic treatment is initiated if pulp necrosis develops.", "answer": "B"}, {"id": 23, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 123, "question": "What is the primary purpose of splinting traumatized teeth?", "options": [{"letter": "A", "text": "To permanently fix the tooth in place"}, {"letter": "B", "text": "To provide pain relief only"}, {"letter": "C", "text": "To reduce mobility, protect from further injury, and allow periodontal and bone healing"}, {"letter": "D", "text": "To prevent all endodontic complications"}], "correctAnswer": "C", "explanation": "Splinting immobilizes the traumatized tooth, reduces pain, protects it from further injury, and critically, allows healing of the damaged periodontal ligament and alveolar bone. Splinting is temporary (2-4 weeks) to prevent complications like ankylosis.", "answer": "C"}, {"id": 24, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 124, "question": "In the management of pulp exposure in traumatized teeth, what is the critical decision point?", "options": [{"letter": "A", "text": "All exposed pulps should be extracted"}, {"letter": "B", "text": "Time since injury, size of exposure, and contamination status determine whether pulp capping or pulpectomy is appropriate"}, {"letter": "C", "text": "Exposed pulps cannot be treated conservatively"}, {"letter": "D", "text": "Pulp exposure always leads to necrosis"}], "correctAnswer": "B", "explanation": "When pulp is exposed in traumatized teeth, treatment depends on time elapsed since injury (fresh exposures within hours may be capped), size of exposure (small capped exposures have better prognosis), contamination status, and patient age. These factors guide decisions between pulp capping and pulpectomy.", "answer": "B"}, {"id": 25, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 125, "question": "What is the recommended interval for clinical and radiographic follow-up assessment after traumatic dental injury?", "options": [{"letter": "A", "text": "Only if symptoms develop"}, {"letter": "B", "text": "Initial follow-up at 2-4 weeks, then 6-8 weeks, 6 months, and 1 year post-injury to monitor healing and pulp status"}, {"letter": "C", "text": "Once immediately post-injury"}, {"letter": "D", "text": "Not necessary if tooth appears normal"}], "correctAnswer": "B", "explanation": "Structured follow-up at 2-4 weeks, 6-8 weeks, 6 months, and 1 year post-injury is essential to monitor healing progression, detect delayed complications like pulp necrosis, root resorption, or ankylosis, and initiate appropriate treatment when needed.", "answer": "B"}, {"id": 26, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 126, "question": "In the classification of root fractures, what is the most common location?", "options": [{"letter": "A", "text": "Apical third of the root"}, {"letter": "B", "text": "Middle third of the root (most common location)"}, {"letter": "C", "text": "Coronal third near the alveolar crest"}, {"letter": "D", "text": "At the root apex only"}], "correctAnswer": "B", "explanation": "Root fractures most commonly occur in the middle third of the root. Fractures in the apical third generally have good prognosis, while fractures in the coronal or middle third have higher risk of complications including pulp necrosis and healing difficulties.", "answer": "B"}, {"id": 27, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 127, "question": "What is the primary indication for extraction following traumatic dental injury?", "options": [{"letter": "A", "text": "Any tooth with crown fracture"}, {"letter": "B", "text": "Any tooth with pulp exposure"}, {"letter": "C", "text": "Teeth with uncontrollable infection, severe periodontal damage, or unfavorable fracture extending to unrestorable depths"}, {"letter": "D", "text": "All traumatized teeth should be extracted"}], "correctAnswer": "C", "explanation": "Extraction should be considered when the traumatized tooth has uncontrollable periapical infection, severe irreversible periodontal damage, or fracture extending apically beyond the alveolar crest making restoration impossible. Many traumatized teeth can be successfully retained with appropriate treatment.", "answer": "C"}, {"id": 28, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 128, "question": "In the healing of luxation injuries, what is the significance of the inflammatory response in the first 2-4 weeks?", "options": [{"letter": "A", "text": "Inflammation indicates failure"}, {"letter": "B", "text": "Inflammation is a necessary response for removing damaged tissue and initiating healing of the periodontal ligament and bone"}, {"letter": "C", "text": "Inflammation means the tooth will be lost"}, {"letter": "D", "text": "Inflammation has no clinical relevance"}], "correctAnswer": "B", "explanation": "The inflammatory response following luxation is essential for removing necrotic tissue, bacteria, and cellular debris. This same inflammatory process initiates healing of the periodontal ligament and alveolar bone, making it necessary for recovery.", "answer": "B"}, {"id": 29, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 129, "question": "What is the primary mechanism of external root resorption following traumatic dental injury?", "options": [{"letter": "A", "text": "Internal inflammatory process alone"}, {"letter": "B", "text": "Periapical inflammation and injury to the root surface stimulating osteoclastic activity"}, {"letter": "C", "text": "Dietary deficiency"}, {"letter": "D", "text": "Loss of mechanical function"}], "correctAnswer": "B", "explanation": "Post-traumatic external root resorption results from periapical inflammation and damage to the root surface protective layer (cementum). This damage stimulates recruitment of osteoclasts that progressively resorb the root. Early endodontic treatment to eliminate periapical infection is critical to prevent or arrest this process.", "answer": "B"}, {"id": 30, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 130, "question": "In the management of a multi-root fractured permanent tooth with the coronal fragment retaining the pulp, what is the optimal treatment?", "options": [{"letter": "A", "text": "Immediate extraction of both fragments"}, {"letter": "B", "text": "Extraction of both fragments for implant placement"}, {"letter": "C", "text": "Reattachment of the coronal fragment to the apical fragment with subsequent endodontic treatment if pulp necrosis occurs"}, {"letter": "D", "text": "Extraction of coronal fragment only"}], "correctAnswer": "C", "explanation": "When a traumatized multi-rooted tooth is fractured into coronal and apical segments with vital pulp in the coronal fragment, reattachment using adhesive bonding techniques allows retention of the tooth. If subsequent pulp necrosis develops, endodontic treatment of the reattached tooth is then performed.", "answer": "C"}, {"id": 31, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 131, "question": "What is the primary complication risk of leaving avulsed teeth out of the mouth for extended periods?", "options": [{"letter": "A", "text": "No complications from time delay"}, {"letter": "B", "text": "Irreversible damage to periodontal ligament cells, dramatically reducing healing and reattachment capacity"}, {"letter": "C", "text": "Only esthetic concerns"}, {"letter": "D", "text": "Increased crown color"}], "correctAnswer": "B", "explanation": "The periodontal ligament cells on the root surface are highly susceptible to damage from desiccation and prolonged exposure to non-physiologic environments. Even 30 minutes out of the mouth can damage PDL cells; after 60 minutes, significant cell death occurs; and after 2 hours, healing potential is severely compromised.", "answer": "B"}, {"id": 32, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 132, "question": "In the management of traumatized primary teeth, what is the primary concern that differs from permanent teeth management?", "options": [{"letter": "A", "text": "Primary teeth are less important"}, {"letter": "B", "text": "Risk to the underlying developing permanent tooth bud must be carefully considered in all treatment decisions"}, {"letter": "C", "text": "Primary teeth cannot be treated conservatively"}, {"letter": "D", "text": "All traumatized primary teeth should be extracted"}], "correctAnswer": "B", "explanation": "In primary tooth trauma, the location of the underlying developing permanent tooth bud is a critical consideration. Treatment must balance preserving the primary tooth function with avoiding damage to the developing permanent tooth through trauma, infection spread, or mechanical disruption.", "answer": "B"}, {"id": 33, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 133, "question": "What radiographic finding suggests pulp canal obliteration rather than pulp necrosis following traumatic injury?", "options": [{"letter": "A", "text": "Periapical radiolucency"}, {"letter": "B", "text": "Complete loss of visible canal space with narrowed or obliterated pulp chamber"}, {"letter": "C", "text": "Tooth appears completely normal"}, {"letter": "D", "text": "Root fracture line"}], "correctAnswer": "B", "explanation": "Pulp obliteration is characterized by progressive narrowing or complete obliteration of the pulp chamber and canal space on radiographs. This represents a healing response with secondary dentin formation and indicates the pulp survived the trauma. This contrasts with pulp necrosis where periapical radiolucency develops.", "answer": "B"}, {"id": 34, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 134, "question": "In the treatment of reimplanted avulsed teeth, what is the primary reason for establishing an appropriate coronal restoration within 2-4 weeks?", "options": [{"letter": "A", "text": "Esthetic improvement only"}, {"letter": "B", "text": "Prevention of bacterial contamination and coronal microleakage leading to treatment failure"}, {"letter": "C", "text": "To speed healing"}, {"letter": "D", "text": "No time frame matters"}], "correctAnswer": "B", "explanation": "Prompt coronal restoration of reimplanted avulsed teeth is critical to prevent bacterial microleakage that can contaminate the internal root structure. Even small gaps in the coronal seal can allow bacterial invasion, compromising healing and long-term success of the reimplanted tooth.", "answer": "B"}, {"id": 35, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 135, "question": "What is the incidence of pulp necrosis following traumatic dental injury when the injury involves luxation or avulsion?", "options": [{"letter": "A", "text": "Less than 10%"}, {"letter": "B", "text": "20-30%"}, {"letter": "C", "text": "50-70% depending on injury severity and time to treatment"}, {"letter": "D", "text": "Less than 5%"}], "correctAnswer": "C", "explanation": "Luxation and avulsion injuries have high risk of pulp necrosis, ranging from 50-70% depending on injury severity, magnitude of displacement, and time to treatment and reimplantation. Even clinically asymptomatic teeth may develop pulp necrosis silently, requiring delayed endodontic treatment.", "answer": "C"}, {"id": 36, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 136, "question": "In the treatment of lateral luxation with significant displacement, what is the recommended repositioning approach?", "options": [{"letter": "A", "text": "Aggressive orthodontic movement immediately"}, {"letter": "B", "text": "Gentle manual repositioning using fingers or instruments, avoiding excessive force that could cause further damage"}, {"letter": "C", "text": "No repositioning needed"}, {"letter": "D", "text": "Surgical repositioning only"}], "correctAnswer": "B", "explanation": "Gentle manual repositioning without excessive force is recommended for laterally displaced teeth. Excessive force can cause additional trauma to the periodontal ligament and alveolar bone. After gentle repositioning, splinting is applied to maintain position during healing.", "answer": "B"}, {"id": 37, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 137, "question": "What is the significance of discoloration color in predicting pulp status following traumatic injury?", "options": [{"letter": "A", "text": "Color is not significant"}, {"letter": "B", "text": "Gray/dark discoloration suggests pulp necrosis; yellow/pink discoloration may indicate pulp vitality with internal bleeding or calcification"}, {"letter": "C", "text": "Any discoloration means extraction"}, {"letter": "D", "text": "Color indicates treatment has succeeded"}], "correctAnswer": "B", "explanation": "The pattern and color of discoloration can provide clues about pulp status. Gray or black discoloration suggests pulp necrosis. Yellow or slightly pink discoloration may indicate internal bleeding within a vital pulp or early calcification. However, color changes alone don't definitively diagnose pulp status.", "answer": "B"}, {"id": 38, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 138, "question": "In assessing traumatic injuries, why is it important to evaluate and document opposing occlusion?", "options": [{"letter": "A", "text": "Occlusion has no relationship to trauma"}, {"letter": "B", "text": "Traumatic occlusion can exacerbate healing complications and contribute to root resorption; documentation guides treatment planning"}, {"letter": "C", "text": "Only for esthetic purposes"}, {"letter": "D", "text": "Opposing teeth never affect injured teeth"}], "correctAnswer": "B", "explanation": "Traumatic occlusion (excessive occlusal forces on the injured tooth) can impair healing, accelerate root resorption, and compromise long-term prognosis. Evaluating opposing occlusion and considering occlusal adjustment or protective measures is an important part of trauma management.", "answer": "B"}, {"id": 39, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 139, "question": "What is the primary risk of immediately applying a stiff/rigid splint for extended periods (beyond 2-4 weeks) following luxation injury?", "options": [{"letter": "A", "text": "Patient discomfort only"}, {"letter": "B", "text": "Increased risk of ankylosis through disuse and lack of normal physiologic movement"}, {"letter": "C", "text": "No risk from prolonged splinting"}, {"letter": "D", "text": "Esthetic concerns only"}], "correctAnswer": "B", "explanation": "Prolonged rigid splinting (beyond 2-4 weeks) can increase the risk of ankylosis by preventing normal physiologic movement and proprioceptive feedback. Modern evidence supports shorter splinting periods to balance healing support with the prevention of disuse-related complications.", "answer": "B"}, {"id": 40, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 140, "question": "In the management of infra-positioned (ankylosed) teeth, what is the long-term prognosis?", "options": [{"letter": "A", "text": "Teeth can be retained indefinitely without problems"}, {"letter": "B", "text": "Progressive replacement resorption occurs leading to gradual bone fill-in and ultimate loss of the tooth, eventually requiring replacement"}, {"letter": "C", "text": "Teeth regain normal position spontaneously"}, {"letter": "D", "text": "No treatment is necessary"}], "correctAnswer": "B", "explanation": "Ankylosed teeth undergo progressive replacement resorption where the root is replaced by bone over time. Eventually the tooth is lost and the bone fills in the space. This process accelerates with continued function and trauma. Some teeth may require extraction and replacement with implants if malocclusion develops.", "answer": "B"}, {"id": 41, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 141, "question": "What is the recommended approach for temporary stabilization of a traumatized multi-fragment tooth at the emergency visit?", "options": [{"letter": "A", "text": "No stabilization should be attempted"}, {"letter": "B", "text": "Gentle reapproximation of fragments with splinting to stabilize and reduce pain during transport and initial healing"}, {"letter": "C", "text": "Aggressive compression"}, {"letter": "D", "text": "Immediate extraction recommended"}], "correctAnswer": "B", "explanation": "At the emergency visit, gentle reapproximation of fractured fragments and temporary splinting provides pain relief, protects the tooth from further injury during healing, and stabilizes the tooth for transport and initial healing before definitive restoration.", "answer": "B"}, {"id": 42, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 142, "question": "In traumatic injuries affecting the primary dentition, what is the significance of developmental stage of the underlying permanent tooth?", "options": [{"letter": "A", "text": "Developmental stage is irrelevant"}, {"letter": "B", "text": "Immature permanent teeth (open apex, incomplete root formation) are more vulnerable to developmental disturbances from injury to the primary tooth"}, {"letter": "C", "text": "Only mature permanent teeth are at risk"}, {"letter": "D", "text": "Permanent teeth are never affected by primary tooth trauma"}], "correctAnswer": "B", "explanation": "Immature permanent teeth with open apices and incomplete root formation are particularly vulnerable to developmental disturbances from injury to primary tooth and subsequent infection or trauma spread. This vulnerability decreases as the permanent tooth matures and completes root formation.", "answer": "B"}, {"id": 43, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 143, "question": "What is the clinical significance of progressive mobility of a traumatized tooth over weeks to months following injury?", "options": [{"letter": "A", "text": "Normal healing response"}, {"letter": "B", "text": "Suggests developing ankylosis, loss of periodontal ligament function, and potential tooth loss despite absence of symptoms"}, {"letter": "C", "text": "Indicates successful treatment"}, {"letter": "D", "text": "No clinical significance"}], "correctAnswer": "B", "explanation": "Progressive loss of mobility (rather than initial improvement) of a traumatized tooth over time suggests development of ankylosis with replacement resorption. Although asymptomatic, this complication indicates progressive tooth loss that may eventually require extraction and replacement.", "answer": "B"}, {"id": 44, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 144, "question": "In reimplanted avulsed teeth, what is the most common long-term complication despite appropriate treatment?", "options": [{"letter": "A", "text": "Pulp necrosis only"}, {"letter": "B", "text": "Ankylosis and replacement resorption, eventually leading to loss of the tooth despite successful initial healing"}, {"letter": "C", "text": "Immediate rejection"}, {"letter": "D", "text": "No complications expected"}], "correctAnswer": "B", "explanation": "Ankylosis with progressive replacement resorption is the most common long-term complication of reimplanted avulsed teeth, even when treatment protocols are followed meticulously. The risk increases with time, and many reimplanted teeth eventually require extraction and replacement with implants.", "answer": "B"}, {"id": 45, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 145, "question": "What is the recommended timing for endodontic treatment of traumatized permanent teeth with pulp necrosis?", "options": [{"letter": "A", "text": "Immediately at emergency visit"}, {"letter": "B", "text": "As soon as clinical signs of pulp necrosis develop (discoloration, periapical radiolucency), but delaying allows acute inflammation to resolve"}, {"letter": "C", "text": "Only if symptoms develop"}, {"letter": "D", "text": "Never needed"}], "correctAnswer": "B", "explanation": "Root canal treatment of traumatized teeth with pulp necrosis should be initiated once diagnosis is confirmed. Delaying several days allows acute inflammation around the tooth to resolve, making treatment less uncomfortable and potentially improving healing.", "answer": "B"}, {"id": 46, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 146, "question": "In the treatment of root fractures with displacement and mobility of the coronal segment, what is the immediate management approach?", "options": [{"letter": "A", "text": "Extraction immediately"}, {"letter": "B", "text": "Gentle repositioning and splinting for 4 weeks to allow natural healing and bridging of fractured segments"}, {"letter": "C", "text": "No treatment necessary"}, {"letter": "D", "text": "Surgical fixation only"}], "correctAnswer": "B", "explanation": "Root fractures with mobile coronal segments require gentle repositioning to approximate the segments and splinting for 4 weeks to stabilize and allow natural healing and bone bridging across the fracture line. Most root fractures can heal successfully with this conservative approach.", "answer": "B"}, {"id": 47, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 147, "question": "What percentage of traumatized teeth develop pulp necrosis following minor luxation injuries (slight displacement, minimal mobility)?", "options": [{"letter": "A", "text": "Over 70%"}, {"letter": "B", "text": "Less than 10%"}, {"letter": "C", "text": "20-40% even with minor trauma suggesting significant vascular compromise"}, {"letter": "D", "text": "0%"}], "correctAnswer": "C", "explanation": "Even minor luxation injuries with slight displacement and minimal mobility result in pulp necrosis in 20-40% of cases, indicating that vascular damage can be significant even without obvious clinical signs. This emphasizes the need for careful long-term monitoring and pulp vitality testing.", "answer": "C"}, {"id": 48, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 148, "question": "In the assessment of traumatized teeth, what is the significance of negative vitality testing responses in the first 2-4 weeks post-trauma?", "options": [{"letter": "A", "text": "Definitively indicates pulp death"}, {"letter": "B", "text": "May represent inflammation or neurovascular disruption rather than complete pulp death; repeat testing at 4-6 weeks may show return of vitality if pulp survives"}, {"letter": "C", "text": "Always requires immediate extraction"}, {"letter": "D", "text": "Has no clinical significance"}], "correctAnswer": "B", "explanation": "Early negative vitality responses following trauma may represent transient neurovascular disruption or inflammation rather than permanent pulp death. In some teeth, vitality returns within 4-6 weeks as inflammation resolves and neurovascular function recovers. Immediate treatment decisions should not be based solely on early negative responses.", "answer": "B"}, {"id": 49, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 149, "question": "What is the primary advantage of splinting severely displaced traumatized teeth rather than immediate surgical repositioning?", "options": [{"letter": "A", "text": "Faster healing"}, {"letter": "B", "text": "Allows time for acute inflammation to resolve before handling, reduces additional trauma, and allows spontaneous repositioning in some cases"}, {"letter": "C", "text": "Cost savings only"}, {"letter": "D", "text": "No advantage"}], "correctAnswer": "B", "explanation": "Gentle repositioning and splinting rather than immediate aggressive surgical intervention reduces additional trauma to the periodontal ligament and bone. It allows time for initial healing and inflammation to resolve, improves tissue response, and in some cases tissues naturally reposition the tooth during healing.", "answer": "B"}, {"id": 50, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 150, "question": "In reimplanted avulsed teeth, what is the significance of root completion status at the time of reimplantation?", "options": [{"letter": "A", "text": "No significance"}, {"letter": "B", "text": "Immature teeth with open apices have better long-term prognosis for pulp revascularization but higher risk of ankylosis; mature teeth with closed apices have higher pulp necrosis risk"}, {"letter": "C", "text": "Only mature teeth should be reimplanted"}, {"letter": "D", "text": "Root status is irrelevant"}], "correctAnswer": "B", "explanation": "Immature teeth with open apices have increased potential for pulp revascularization and healing but higher ankylosis risk due to larger surface area for bone contact. Mature teeth with closed apices have low probability of pulp revascularization and typically require endodontic treatment, but may have lower ankylosis risk.", "answer": "B"}, {"id": 51, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 151, "question": "What is the recommended protocol for emergency management of an avulsed tooth prior to reimplantation?", "options": [{"letter": "A", "text": "Clean under running tap water with vigorous brushing"}, {"letter": "B", "text": "Hold the tooth by the crown only; gently rinse with saline without touching the root surface; place in saline or milk for transport; reimplant within 30 minutes if possible"}, {"letter": "C", "text": "Aggressive scrubbing to remove debris"}, {"letter": "D", "text": "No cleaning necessary"}], "correctAnswer": "B", "explanation": "Proper avulsed tooth management includes: handling only the crown to avoid damaging PDL cells, gentle rinsing with saline (not tap water), placement in saline or milk for transport to maintain PDL cell viability, and reimplantation as soon as possible (ideally within 30 minutes). This protocol preserves periodontal ligament cells critical for healing.", "answer": "B"}, {"id": 52, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 152, "question": "In the treatment of crown-root fractures not involving the pulp, what is the primary restoration consideration?", "options": [{"letter": "A", "text": "Simple filling is adequate"}, {"letter": "B", "text": "Fracture must be restored with technique that maintains biological width and restorative margins above the alveolar crest when possible to avoid periodontal compromise"}, {"letter": "C", "text": "Extraction is required"}, {"letter": "D", "text": "No restoration necessary"}], "correctAnswer": "B", "explanation": "Crown-root fractures require careful restoration with margins positioned to maintain biological width (approximately 3 mm from the pulp/restoration interface to alveolar crest). Subgingival margins that violate biological width compromise periodontal health and prognosis.", "answer": "B"}, {"id": 53, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 153, "question": "What is the clinical significance of 'grayish' discoloration of a traumatized tooth within the first few days of injury?", "options": [{"letter": "A", "text": "Pulp is definitely vital"}, {"letter": "B", "text": "May indicate pulp vascular injury and bleeding within the pulp chamber; this early discoloration may precede pulp necrosis"}, {"letter": "C", "text": "Indicates successful healing"}, {"letter": "D", "text": "No clinical significance"}], "correctAnswer": "B", "explanation": "Grayish discoloration appearing within days of trauma suggests pulp hemorrhage with blood breakdown products staining dentin. While the pulp may initially survive, this finding indicates significant vascular injury and increased risk of subsequent pulp necrosis that should be monitored carefully.", "answer": "B"}, {"id": 54, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 154, "question": "In the management of intrusive luxation in primary dentition, why is extraction or allowing natural shedding often preferred over forced repositioning?", "options": [{"letter": "A", "text": "Primary teeth are less important"}, {"letter": "B", "text": "Risk of damaging the permanent tooth bud underlying the intruded primary tooth is high; natural shedding avoids additional trauma to the developing permanent tooth"}, {"letter": "C", "text": "Forced repositioning is always successful"}, {"letter": "D", "text": "No reason exists for this approach"}], "correctAnswer": "B", "explanation": "In primary teeth, intrusion often damages the developing permanent tooth bud. Forced repositioning risks compounding this damage. Allowing natural shedding after monitoring for infection provides time for the permanent tooth to develop and erupt into the space more safely than aggressive primary tooth intervention.", "answer": "B"}, {"id": 55, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 155, "question": "What is the primary reason for monitoring traumatized teeth at regular intervals even when they appear clinically stable?", "options": [{"letter": "A", "text": "Monitoring is unnecessary"}, {"letter": "B", "text": "Serious complications like pulp necrosis, root resorption, and ankylosis can develop silently without symptoms, requiring early detection for optimal management"}, {"letter": "C", "text": "Only for esthetic documentation"}, {"letter": "D", "text": "Monitoring interferes with healing"}], "correctAnswer": "B", "explanation": "Many serious post-traumatic complications (pulp necrosis, replacement resorption, ankylosis) develop without obvious clinical symptoms. Regular clinical and radiographic monitoring allows early detection when treatment options are still available, improving long-term prognosis.", "answer": "B"}, {"id": 56, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 156, "question": "In the assessment of traumatic injuries, what is the significance of fracture location relative to the alveolar crest?", "options": [{"letter": "A", "text": "Location has no significance"}, {"letter": "B", "text": "Fractures extending apical to the alveolar crest compromise periodontal support and may be unrestorable; fractures at or coronal to the crest generally have better prognosis"}, {"letter": "C", "text": "All fractures have equal prognosis"}, {"letter": "D", "text": "Apical fractures are easier to treat"}], "correctAnswer": "B", "explanation": "Crown-root fractures extending significantly apical to the alveolar crest compromise periodontal attachment and bone support, creating difficulties for restoration and potentially making the tooth unrestorable. Fractures at or coronal to the crest have better prognosis.", "answer": "B"}, {"id": 57, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 157, "question": "What is the recommended treatment for external root resorption developing following traumatic injury?", "options": [{"letter": "A", "text": "Observation without treatment"}, {"letter": "B", "text": "No treatment is possible"}, {"letter": "C", "text": "Early endodontic treatment to eliminate periapical inflammation that drives the resorptive process"}, {"letter": "D", "text": "Only extraction is effective"}], "correctAnswer": "C", "explanation": "External root resorption following trauma is driven by periapical inflammation. Early endodontic treatment to eliminate this inflammation can halt the resorptive process. Once root structure is extensively resorbed, the tooth becomes unrestorable, making prompt treatment critical.", "answer": "C"}, {"id": 58, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 158, "question": "In the management of traumatized maxillary central incisors, what is a critical consideration for long-term esthetic outcome?", "options": [{"letter": "A", "text": "Tooth color immediately after injury predicts permanent color"}, {"letter": "B", "text": "Delayed restoration until tissue healing completes allows for more accurate shade matching; internal bleaching may improve discolored teeth if pulp treatment is required"}, {"letter": "C", "text": "Restoration should be placed immediately"}, {"letter": "D", "text": "Esthetics are not important"}], "correctAnswer": "B", "explanation": "For maxillary central incisors, delaying definitive restoration (while maintaining function) until tissue healing completes (4-6 weeks) allows for accurate assessment of tooth shade and proper restoration. If pulp necrosis develops, internal bleaching combined with endodontic treatment may improve discoloration before final restoration.", "answer": "B"}, {"id": 59, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 159, "question": "What is the primary clinical significance of bleeding from the gingival sulcus immediately following traumatic injury?", "options": [{"letter": "A", "text": "No clinical significance"}, {"letter": "B", "text": "Indicates injury to the gingival tissues and periodontal ligament; suggests possible luxation injury requiring clinical assessment and stabilization"}, {"letter": "C", "text": "Definitively indicates extraction is needed"}, {"letter": "D", "text": "Only superficial injury"}], "correctAnswer": "B", "explanation": "Sulcular bleeding immediately after trauma indicates injury to gingival tissues and periodontal ligament. This finding, combined with other clinical signs, suggests luxation injury requiring assessment of tooth mobility, proper repositioning if displaced, and splinting for healing support.", "answer": "B"}, {"id": 60, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 160, "question": "In treating avulsion injuries, what is the significance of the 'golden hour' concept?", "options": [{"letter": "A", "text": "The concept has no validity"}, {"letter": "B", "text": "Teeth reimplanted within 1 hour of avulsion have significantly better healing outcomes due to minimal periodontal ligament cell damage"}, {"letter": "C", "text": "Only teeth reimplanted after 1 hour have good outcomes"}, {"letter": "D", "text": "Time is irrelevant to success"}], "correctAnswer": "B", "explanation": "The 'golden hour' concept emphasizes that teeth reimplanted within 60 minutes of avulsion have substantially better outcomes. Within 30 minutes is ideal, but outcomes remain favorable to 60 minutes. After 1 hour, PDL cell damage accelerates, reducing long-term success and increasing ankylosis risk.", "answer": "B"}, {"id": 61, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 161, "question": "In the treatment of primary dentition traumatic injuries, what is the most important consideration guiding treatment decisions?", "options": [{"letter": "A", "text": "Preserving the primary tooth at any cost"}, {"letter": "B", "text": "Avoiding damage to the developing permanent tooth bud and maintaining primary tooth function until natural shedding"}, {"letter": "C", "text": "Cost of treatment"}, {"letter": "D", "text": "Immediate esthetic restoration"}], "correctAnswer": "B", "explanation": "Primary dentition trauma management is uniquely guided by the overriding need to protect the developing permanent tooth while maintaining the primary tooth's function. Treatment decisions balance primary tooth preservation with protection of the developing permanent tooth.", "answer": "B"}, {"id": 62, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 162, "question": "What is the recommended approach when a partially erupted permanent tooth is luxated into the bone overlying the alveolar crest?", "options": [{"letter": "A", "text": "Aggressive surgical extraction"}, {"letter": "B", "text": "Gentle orthodontic traction allowing gradual eruption while avoiding additional trauma to the developing root"}, {"letter": "C", "text": "Immediate surgical repositioning"}, {"letter": "D", "text": "Observation without intervention"}], "correctAnswer": "B", "explanation": "Partially erupted traumatized permanent teeth with luxation can often be managed with gentle orthodontic traction to guide eruption into proper position. This approach avoids surgical trauma and allows the tooth to erupt naturally while healing from the initial injury.", "answer": "B"}, {"id": 63, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 163, "question": "In the assessment of traumatic injuries, what pulp vitality test combination provides the most reliable assessment of pulp status?", "options": [{"letter": "A", "text": "Single test result is always reliable"}, {"letter": "B", "text": "Combination of cold response, electric pulp testing, and if available laser Doppler flowmetry; also consider delayed repeat testing"}, {"letter": "C", "text": "Percussion testing alone"}, {"letter": "D", "text": "Visual inspection only"}], "correctAnswer": "B", "explanation": "Reliable pulp vitality assessment uses multiple modalities: cold response, electric pulp testing, and when available, laser Doppler flowmetry. Delayed repeat testing (at 4-6 weeks) is also valuable because early post-trauma responses may not accurately reflect final pulp status due to inflammation and neurovascular changes.", "answer": "B"}, {"id": 64, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 164, "question": "What is the primary mechanism by which replacement resorption/ankylosis leads to eventual tooth loss?", "options": [{"letter": "A", "text": "The tooth falls out immediately"}, {"letter": "B", "text": "Root structure is progressively replaced by bone, shortening the root and reducing alveolar bone height; eventually the tooth is lost and bone fills the space"}, {"letter": "C", "text": "The crown fractures"}, {"letter": "D", "text": "The tooth remains stable indefinitely"}], "correctAnswer": "B", "explanation": "Replacement resorption involves progressive substitution of tooth root structure by bone. This process shortens the root, reduces alveolar bone height, and eventually results in complete loss of tooth structure. The space is then filled by bone, eliminating implant placement options in this location.", "answer": "B"}, {"id": 65, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 165, "question": "In managing traumatic injuries of anterior teeth, what is the significance of creating a detailed baseline photograph at the emergency visit?", "options": [{"letter": "A", "text": "Only for esthetic documentation"}, {"letter": "B", "text": "Provides objective baseline for monitoring healing progression, discoloration, and changes in tooth position over time"}, {"letter": "C", "text": "Photographs are unnecessary"}, {"letter": "D", "text": "Only for insurance purposes"}], "correctAnswer": "B", "explanation": "Baseline photographs at the emergency visit objectively document initial injury and tooth position. Serial photographs at follow-up visits allow clinician and patient to monitor healing, discoloration progression, and any changes in tooth position that might indicate ankylosis or other complications.", "answer": "B"}, {"id": 66, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 166, "question": "What is the clinical significance of progressive tooth mobility increasing over weeks following injury when splint has been removed?", "options": [{"letter": "A", "text": "Normal healing response"}, {"letter": "B", "text": "Suggests development of ankylosis and replacement resorption, indicating progressive loss of periodontal ligament and bone support"}, {"letter": "C", "text": "Indicates successful healing"}, {"letter": "D", "text": "No clinical significance"}], "correctAnswer": "B", "explanation": "Progressive loss of tooth mobility (decreasing bounce/increased rigidity) following injury and splint removal suggests ankylosis development. True increased mobility (rather than initial decrease after removing splint) in a healing traumatized tooth is unusual and warrants investigation for complications.", "answer": "B"}, {"id": 67, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 167, "question": "In the treatment of traumatized immature permanent teeth with open apices and pulp exposure, what is the primary consideration?", "options": [{"letter": "A", "text": "Immediate pulpectomy and root filling"}, {"letter": "B", "text": "Pulp capping or vital pulp therapy may be attempted to preserve pulp vitality and allow continued root maturation when injury is fresh and uncontaminated"}, {"letter": "C", "text": "Only extraction is appropriate"}, {"letter": "D", "text": "No treatment is needed"}], "correctAnswer": "B", "explanation": "In immature teeth with pulp exposure from recent trauma (within 24 hours, uncontaminated field), pulp capping or partial pulpotomy may preserve pulp vitality and allow completion of root maturation. This is preferred to complete pulpectomy when conditions are favorable.", "answer": "B"}, {"id": 68, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 168, "question": "What is the recommended protocol for splinting material selection in traumatic injuries?", "options": [{"letter": "A", "text": "Any rigid splint will work"}, {"letter": "B", "text": "Flexible splint materials that allow physiologic movement while preventing gross mobility reduce risk of ankylosis; semi-rigid orthodontic appliances are often preferred"}, {"letter": "C", "text": "Only rigid splints are appropriate"}, {"letter": "D", "text": "Splinting material doesn't matter"}], "correctAnswer": "B", "explanation": "Evidence supports semi-rigid or flexible splinting that allows limited physiologic movement while preventing gross mobility. This approach provides stabilization necessary for healing while reducing the risk of ankylosis associated with prolonged rigid immobilization.", "answer": "B"}, {"id": 69, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 169, "question": "In traumatized teeth showing evidence of pulp necrosis with periapical pathology, what is the indication for surgical treatment versus non-surgical endodontic therapy?", "options": [{"letter": "A", "text": "Always extract traumatized teeth"}, {"letter": "B", "text": "Non-surgical root canal therapy is the initial treatment; surgery is indicated only if periapical lesions fail to heal after appropriate endodontic treatment"}, {"letter": "C", "text": "Always perform surgery"}, {"letter": "D", "text": "No treatment is necessary"}], "correctAnswer": "B", "explanation": "Non-surgical endodontic therapy should be the initial treatment for traumatized teeth with pulp necrosis and periapical pathology. Surgical intervention is reserved for cases where non-surgical treatment fails to resolve periapical pathology or when the tooth becomes inaccessible for retreatment.", "answer": "B"}, {"id": 70, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 170, "question": "What is the primary purpose of assessing tooth color changes in traumatized teeth over the first 6-12 months post-injury?", "options": [{"letter": "A", "text": "Color change is purely esthetic with no clinical significance"}, {"letter": "B", "text": "Color changes help track pulp status; darkening may indicate pulp necrosis and guide timing of endodontic treatment or internal bleaching therapy"}, {"letter": "C", "text": "All traumatized teeth change color immediately"}, {"letter": "D", "text": "Color assessment is unnecessary"}], "correctAnswer": "B", "explanation": "Progressive tooth discoloration following trauma is a useful clinical sign of pulp status. Gray or black discoloration suggests pulp necrosis. Tracking color changes provides objective evidence of pulp status changes and guides decisions about endodontic treatment timing and potential internal bleaching.", "answer": "B"}, {"id": 71, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 171, "question": "In the management of root-fractured teeth where the coronal segment demonstrates vital pulp, what is the prognosis for the apical segment?", "options": [{"letter": "A", "text": "The apical segment always becomes necrotic"}, {"letter": "B", "text": "The apical segment typically remains vital even if the coronal segment is vital, allowing for natural healing without endodontic treatment in many cases"}, {"letter": "C", "text": "Both segments always require endodontic treatment"}, {"letter": "D", "text": "The apical segment is always extracted"}], "correctAnswer": "B", "explanation": "In root fractures, if the coronal segment responds to vitality testing, the apical segment (with its direct vascular supply through the apical foramen) typically remains vital. Natural healing often occurs in the apical segment without endodontic treatment, though the fracture site requires splinting and monitoring.", "answer": "B"}, {"id": 72, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 172, "question": "What is the significance of immediate post-trauma radiographs in traumatic dental injury assessment?", "options": [{"letter": "A", "text": "Not necessary"}, {"letter": "B", "text": "Provides baseline documentation of fracture location, root fracture presence, alveolar bone fractures, and tooth position; guides initial treatment planning and serves as comparison for future healing assessment"}, {"letter": "C", "text": "Only for insurance documentation"}, {"letter": "D", "text": "Radiographs should only be taken at follow-up"}], "correctAnswer": "B", "explanation": "Immediate post-trauma radiographs (from multiple angles) establish baseline documentation of fracture lines, root fracture presence, alveolar crest fractures, and tooth positioning. These images are essential for treatment planning and serve as baseline for comparing healing progression on future radiographs.", "answer": "B"}, {"id": 73, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 173, "question": "In the treatment of severely traumatized teeth with multiple complications, what factors guide the decision to extract versus attempt salvage?", "options": [{"letter": "A", "text": "All traumatized teeth should be extracted"}, {"letter": "B", "text": "Tooth prognosis, patient age, remaining bone support, restorative feasibility, and systemic factors all influence salvage versus extraction decisions"}, {"letter": "C", "text": "All traumatized teeth can be salvaged"}, {"letter": "D", "text": "Only patient age matters"}], "correctAnswer": "B", "explanation": "The decision to extract or attempt salvage of traumatized teeth requires comprehensive assessment of: tooth prognosis (potential for healing), patient age and life expectancy, remaining periodontal and bone support, restorative feasibility, and patient preferences. Each case requires individualized analysis of these factors.", "answer": "B"}, {"id": 74, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 174, "question": "What is the clinical significance of continuous or progressive deepening of the gingival sulcus following traumatic injury?", "options": [{"letter": "A", "text": "No significance"}, {"letter": "B", "text": "May indicate loss of bone support, periodontal disease, or development of ankylosis with crown exposure; requires periodontal monitoring"}, {"letter": "C", "text": "Normal healing response"}, {"letter": "D", "text": "Indicates successful treatment"}], "correctAnswer": "B", "explanation": "Progressive deepening of the sulcus following trauma can indicate bone loss from periapical disease, inflammatory response, or development of ankylosis with apparent crown elongation as bone is replaced. This finding requires careful monitoring and may indicate need for treatment intervention.", "answer": "B"}, {"id": 75, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 175, "question": "In the management of avulsion injuries, what is the significance of establishing prophylactic antibiotic therapy?", "options": [{"letter": "A", "text": "Antibiotics are not indicated"}, {"letter": "B", "text": "Prophylactic antibiotics are recommended to prevent bacterial colonization and support healing, particularly in contaminated avulsions or when time to reimplantation is extended"}, {"letter": "C", "text": "Only therapeutic antibiotics are needed"}, {"letter": "D", "text": "Antibiotics interfere with healing"}], "correctAnswer": "B", "explanation": "Prophylactic antibiotic therapy is recommended for avulsed teeth, particularly when there has been environmental contamination or when time to reimplantation has been extended beyond 60 minutes. Antibiotics help prevent bacterial colonization and support healing of the damaged periodontal ligament.", "answer": "B"}, {"id": 76, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 176, "question": "What is the recommended approach for long-term monitoring of ankylosed traumatized teeth?", "options": [{"letter": "A", "text": "No monitoring is needed"}, {"letter": "B", "text": "Regular clinical and radiographic evaluation to document progressive infra-positioning and bone resorption; anticipate eventual tooth loss and plan replacement options"}, {"letter": "C", "text": "Ankylosed teeth remain stable indefinitely"}, {"letter": "D", "text": "Monitoring interferes with healing"}], "correctAnswer": "B", "explanation": "Ankylosed teeth require long-term monitoring to document progressive replacement resorption and infra-positioning. As the tooth is gradually replaced by bone, the crown appears to move apically relative to the adjacent teeth. Clinician and patient should anticipate eventual loss and plan replacement with implants or other prosthetics.", "answer": "B"}, {"id": 77, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 177, "question": "In the assessment of traumatic injuries with root fractures, what radiographic finding indicates favorable healing potential?", "options": [{"letter": "A", "text": "Wide fracture gap"}, {"letter": "B", "text": "Displacement of the coronal fragment"}, {"letter": "C", "text": "Close approximation of fracture segments with minimal gap, indicating good bone healing potential"}, {"letter": "D", "text": "Complete root fracture"}], "correctAnswer": "C", "explanation": "Root fractures with close approximation of the separated fragments have better healing potential. Wide fracture gaps with fragment displacement increase the risk of inter-fragment healing complications and pulp necrosis. Close approximation of segments is a favorable prognostic indicator.", "answer": "C"}, {"id": 78, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 178, "question": "What is the primary clinical significance of 'dark/gray' discoloration appearing 1-3 months post-trauma?", "options": [{"letter": "A", "text": "Early normal discoloration that resolves"}, {"letter": "B", "text": "Indicates progressive pulp necrosis with hemoglobin breakdown; confirms diagnosis of pulp death and indicates need for endodontic treatment"}, {"letter": "C", "text": "No clinical significance"}, {"letter": "D", "text": "Indicates successful healing"}], "correctAnswer": "B", "explanation": "Dark/gray discoloration appearing weeks to months after trauma indicates progressive pulp necrosis with hemoglobin breakdown and iron deposition in dentin. This delayed discoloration pattern confirms pulp death and indicates endodontic treatment is necessary for this tooth.", "answer": "B"}, {"id": 79, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 179, "question": "In the treatment of traumatized teeth with pulp exposure, what is the critical time window for successful pulp capping?", "options": [{"letter": "A", "text": "Pulp capping is never successful"}, {"letter": "B", "text": "Within 24 hours post-injury in an uncontaminated field with no prior endodontic disease provides optimal conditions for pulp capping success"}, {"letter": "C", "text": "Any time after injury"}, {"letter": "D", "text": "Beyond 48 hours only"}], "correctAnswer": "B", "explanation": "Pulp capping has highest success when performed within 24 hours of trauma when the exposure is fresh, uncontaminated, and the pulp is minimally inflamed. Capping after 24 hours, in contaminated fields, or in teeth with previous endodontic disease has reduced success rates.", "answer": "B"}, {"id": 80, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 180, "question": "What is the significance of lateral tooth movement (buccolingual displacement) visible on occlusal trauma assessment in traumatized teeth?", "options": [{"letter": "A", "text": "No significance"}, {"letter": "B", "text": "Indicates incomplete healing or development of ankylosis affecting normal tooth positioning in the arch"}, {"letter": "C", "text": "Normal healing response"}, {"letter": "D", "text": "Indicates successful treatment"}], "correctAnswer": "B", "explanation": "Lateral displacement of traumatized teeth that develops over weeks to months suggests ankylosis development with loss of normal functional proprioceptive positioning. This lateral shift is an early sign of replacement resorption and indicates the tooth is gradually being immobilized in bone.", "answer": "B"}, {"id": 81, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 181, "question": "In managing traumatic injuries to the maxillary anterior region, what is the role of occlusal adjustment?", "options": [{"letter": "A", "text": "Occlusal adjustment is not needed"}, {"letter": "B", "text": "Reducing occlusal forces on traumatized teeth, particularly in eccentric movements, protects healing tissues and reduces risk of complications"}, {"letter": "C", "text": "Occlusion never affects traumatized teeth"}, {"letter": "D", "text": "Occlusal forces improve healing"}], "correctAnswer": "B", "explanation": "Occlusal adjustment that reduces forces on traumatized teeth, particularly during eccentric movements, protects healing tissues and reduces periapical trauma risk. Traumatic occlusion exacerbates inflammation and can accelerate root resorption. Conservative occlusal therapy is indicated during the healing period.", "answer": "B"}, {"id": 82, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 182, "question": "What is the recommended approach for managing traumatic injuries affecting both the primary dentition and underlying developing permanent teeth?", "options": [{"letter": "A", "text": "Treat only the primary tooth"}, {"letter": "B", "text": "Comprehensive assessment of both primary and permanent tooth injury; treatment balances primary tooth preservation with protection of the developing permanent tooth to avoid creating additional pathology"}, {"letter": "C", "text": "Always extract primary teeth"}, {"letter": "D", "text": "Only treat permanent teeth"}], "correctAnswer": "B", "explanation": "When trauma affects both primary and developing permanent teeth, comprehensive assessment of both is essential. Treatment decisions must balance preserving primary tooth function with avoiding additional damage to the underlying developing permanent tooth. Conservative primary tooth management is often indicated.", "answer": "B"}, {"id": 83, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 183, "question": "In the assessment of traumatic injuries, what is the significance of crepitus (bone fracture sensation) on palpation?", "options": [{"letter": "A", "text": "No significance"}, {"letter": "B", "text": "Indicates alveolar bone fracture; requires splinting for bone healing and monitoring for periodontal complications"}, {"letter": "C", "text": "Only indicates soft tissue injury"}, {"letter": "D", "text": "Indicates tooth must be extracted"}], "correctAnswer": "B", "explanation": "Crepitus on palpation suggests alveolar bone fracture(s) in addition to tooth injury. This finding requires comprehensive assessment of the extent of bone fracture, splinting of the entire fractured segment for healing, and careful monitoring for healing and periodontal complications.", "answer": "B"}, {"id": 84, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 184, "question": "What is the primary mechanism of delayed pulp necrosis (necrosis developing weeks to months after trauma) in teeth without apparent exposure?", "options": [{"letter": "A", "text": "Does not occur"}, {"letter": "B", "text": "Progressive vascular disruption and ischemia of the pulp tissue despite intact dentin barrier; inflammation accelerates degeneration"}, {"letter": "C", "text": "Bacterial invasion of intact pulp"}, {"letter": "D", "text": "Spontaneous pulp death"}], "correctAnswer": "B", "explanation": "Delayed pulp necrosis without direct pulp exposure occurs when the initial trauma severely damages the apical neurovascular bundle. Progressive ischemia and inflammatory damage gradually lead to pulp tissue necrosis over weeks to months, despite the dentin barrier remaining intact.", "answer": "B"}, {"id": 85, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 185, "question": "In the treatment of traumatized teeth requiring endodontic therapy, what is the optimal timing for treatment initiation?", "options": [{"letter": "A", "text": "Immediately at emergency visit"}, {"letter": "B", "text": "After 7-10 days allowing acute inflammation to resolve, unless acute symptoms/periapical abscess require immediate treatment"}, {"letter": "C", "text": "Only if symptoms develop"}, {"letter": "D", "text": "Treatment is never needed"}], "correctAnswer": "B", "explanation": "For traumatized teeth requiring endodontic therapy, initiating treatment after 7-10 days (unless acute abscess with systemic symptoms develops) allows acute inflammation to resolve, tissue swelling to decrease, and improves patient comfort during treatment. Emergency treatment is reserved for symptomatic cases.", "answer": "B"}, {"id": 86, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 186, "question": "What is the clinical significance of rapid loss of tooth mobility in the first few weeks following luxation injury?", "options": [{"letter": "A", "text": "Indicates healing is progressing"}, {"letter": "B", "text": "May indicate rapid ankylosis development; further loss of mobility suggests replacement resorption rather than normal healing"}, {"letter": "C", "text": "Normal healing response always results in increased mobility"}, {"letter": "D", "text": "Loss of mobility is always favorable"}], "correctAnswer": "B", "explanation": "While some decrease in mobility is expected as healing stabilizes the tooth, rapid loss of all mobility (stiffening) in the first few weeks can indicate early ankylosis development. This finding warrants careful monitoring as it suggests replacement resorption may be initiating.", "answer": "B"}, {"id": 87, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 187, "question": "In the management of crown fractures involving exposed dentinal tubules, what is the primary concern?", "options": [{"letter": "A", "text": "No concerns with exposed dentin"}, {"letter": "B", "text": "Exposed dentinal tubules provide a pathway for bacterial invasion and can lead to pulp inflammation; prompt restoration is necessary to seal exposed tubules"}, {"letter": "C", "text": "Exposed dentin cannot be restored"}, {"letter": "D", "text": "Restoration is not needed for esthetic reasons"}], "correctAnswer": "B", "explanation": "Exposed dentinal tubules in crown fractures provide direct pathways for bacterial invasion toward the pulp, accelerating pulp inflammation and necrosis risk. Prompt restoration with dentinal sealants or restorative materials is necessary to occlude tubules and reduce bacterial ingress.", "answer": "B"}, {"id": 88, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 188, "question": "What is the primary reason for recommending against aggressive manipulation of intrusively luxated teeth in the emergency phase?", "options": [{"letter": "A", "text": "Manipulation is always safe"}, {"letter": "B", "text": "Aggressive manipulation compounds injury to the apical neurovascular bundle and periapical tissues; conservative management or delayed repositioning reduces additional trauma"}, {"letter": "C", "text": "No reason exists for conservative management"}, {"letter": "D", "text": "Aggressive manipulation improves healing"}], "correctAnswer": "B", "explanation": "Intrusively luxated teeth have already sustained severe apical compression and vascular damage. Aggressive manipulation during emergency treatment compounds this injury. Conservative management allowing inflammatory response to resolve before gentle repositioning (or spontaneous eruption in primary teeth) reduces additional trauma.", "answer": "B"}, {"id": 89, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 189, "question": "In the assessment of traumatic injuries, what is the significance of absence of response to vitality testing immediately post-trauma?", "options": [{"letter": "A", "text": "Definitively indicates pulp death"}, {"letter": "B", "text": "May represent transient neurovascular disruption or profound inflammation rather than irreversible pulp death; repeat testing in 4-6 weeks is essential"}, {"letter": "C", "text": "Always requires immediate extraction"}, {"letter": "D", "text": "Has no significance"}], "correctAnswer": "B", "explanation": "Immediate post-trauma negative vitality responses (to cold or electric stimuli) may represent temporary neurovascular dysfunction or inflammation rather than irreversible pulp death. Some teeth show return of vitality responses within 4-6 weeks as inflammation resolves and vascular function recovers. Repeat testing is essential for accurate diagnosis.", "answer": "B"}, {"id": 90, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 190, "question": "What is the primary purpose of radiographic follow-up of traumatized teeth at 1 year post-injury?", "options": [{"letter": "A", "text": "Not necessary"}, {"letter": "B", "text": "Documents healing of periapical lesions if endodontic treatment was required; identifies late-developing complications like root resorption or ankylosis"}, {"letter": "C", "text": "Only for insurance documentation"}, {"letter": "D", "text": "Radiographs at 1 year are not helpful"}], "correctAnswer": "B", "explanation": "One-year radiographic follow-up documents healing response (particularly if periapical pathology was present), identifies late-developing complications such as replacement resorption or ankylosis, and serves as baseline for continued long-term monitoring of the traumatized tooth.", "answer": "B"}, {"id": 91, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 191, "question": "In the management of reimplanted avulsed teeth, what is the significance of splint removal timing?", "options": [{"letter": "A", "text": "Splint removal timing is not important"}, {"letter": "B", "text": "Removal at 2-4 weeks allows functional movement to resume while ankylosis risk remains low; prolonged splinting increases ankylosis risk"}, {"letter": "C", "text": "Splints should remain indefinitely"}, {"letter": "D", "text": "Early splint removal is always better"}], "correctAnswer": "B", "explanation": "Current evidence supports splint removal at 2-4 weeks post-reimplantation. Removal at this interval allows functional movement to resume while ankylosis risk remains acceptable. Prolonged splinting (beyond 4 weeks) does not improve healing and may increase ankylosis incidence.", "answer": "B"}, {"id": 92, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 192, "question": "What is the clinical significance of 'feeling of elevation' or 'bite on the tooth' sensation weeks to months post-trauma?", "options": [{"letter": "A", "text": "Normal healing response"}, {"letter": "B", "text": "May indicate ankylosis development with loss of periodontal proprioception; the tooth feels elevated because bone support increases while adjacent teeth maintain normal position"}, {"letter": "C", "text": "Indicates healing is progressing well"}, {"letter": "D", "text": "No clinical significance"}], "correctAnswer": "B", "explanation": "A sensation of the traumatized tooth being 'too high' or patient 'biting on it' weeks post-injury suggests ankylosis development. Loss of normal periodontal ligament proprioception combined with potential bone infill around the ankylosed tooth creates the sensation of elevation.", "answer": "B"}, {"id": 93, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 193, "question": "In the treatment of traumatic injuries affecting multiple anterior teeth, what is the primary restorative consideration?", "options": [{"letter": "A", "text": "Each tooth should be restored independently"}, {"letter": "B", "text": "Restoration should consider the arch and esthetic unit as a whole; coordinated approach across multiple teeth provides optimal esthetic and functional outcomes"}, {"letter": "C", "text": "Only the most severely injured tooth needs treatment"}, {"letter": "D", "text": "Restorations are not needed"}], "correctAnswer": "B", "explanation": "When multiple anterior teeth are traumatized, comprehensive restorative planning across the esthetic unit optimizes outcomes. Shade matching, form coordination, and functional restoration of the entire anterior region provides superior esthetics and function compared to treating teeth individually.", "answer": "B"}, {"id": 94, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 194, "question": "What is the primary mechanism of peripheral giant cell granuloma development following traumatic dental injury?", "options": [{"letter": "A", "text": "Does not occur"}, {"letter": "B", "text": "Chronic irritation and periapical inflammation from pulpal necrosis; granulation tissue develops in response to persistent irritant"}, {"letter": "C", "text": "Viral infection"}, {"letter": "D", "text": "Spontaneous bone loss"}], "correctAnswer": "B", "explanation": "Peripheral giant cell granuloma can develop as a reactive lesion responding to chronic irritation from traumatized teeth with pulpal necrosis and periapical pathology. Early recognition and endodontic treatment of the causative tooth eliminates the irritant and may prevent or reverse granuloma development.", "answer": "B"}, {"id": 95, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 195, "question": "In the assessment of traumatic injuries, what is the significance of evaluating lip/oral commissure position and symmetry?", "options": [{"letter": "A", "text": "No significance"}, {"letter": "B", "text": "Documents potential soft tissue trauma that may indicate force direction and severity; guides assessment of tooth and bone injury extent"}, {"letter": "C", "text": "Only for esthetic documentation"}, {"letter": "D", "text": "Soft tissue findings are unrelated to tooth injury"}], "correctAnswer": "B", "explanation": "Documentation of soft tissue injury (lip lacerations, swelling, commissure position) provides clues about trauma mechanism, force direction, and severity. This information helps predict extent of dental and skeletal injury. Asymmetric facial swelling may indicate alveolar fractures or deeper tissue involvement.", "answer": "B"}, {"id": 96, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 196, "question": "What is the recommended protocol for emergency management of an avulsed permanent tooth that has been out of the mouth for 2 hours?", "options": [{"letter": "A", "text": "Extraction recommended, tooth cannot be saved"}, {"letter": "B", "text": "Reimplantation still possible but prognosis is guarded; place in saline or milk and proceed with reimplantation, understanding healing challenges ahead"}, {"letter": "C", "text": "Teeth can never be reimplanted after 2 hours"}, {"letter": "D", "text": "No treatment possible"}], "correctAnswer": "B", "explanation": "While 2 hours is beyond the ideal period, reimplantation may still be attempted with understanding that periodontal ligament cell viability is severely compromised and healing prognosis is guarded. The risk-benefit analysis favors attempting reimplantation in appropriate cases rather than immediate extraction.", "answer": "B"}, {"id": 97, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 197, "question": "In managing traumatic injuries, what is the significance of establishing a trauma risk reduction plan with the patient?", "options": [{"letter": "A", "text": "Risk reduction is not necessary"}, {"letter": "B", "text": "Mouthguard prescription and behavioral counseling reduce reinjury risk; anterior teeth are at high reinjury risk following initial trauma"}, {"letter": "C", "text": "Only one traumatic injury occurs per patient"}, {"letter": "D", "text": "Patient education has no value"}], "correctAnswer": "B", "explanation": "Patients with anterior traumatic injuries, particularly young males in contact sports, have significantly elevated reinjury risk. Mouthguard prescription and behavioral counseling are essential components of trauma management to prevent additional injuries and maximize the benefit of treatment provided.", "answer": "B"}, {"id": 98, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 198, "question": "What is the primary indication for intentional replantation in traumatic injury management?", "options": [{"letter": "A", "text": "Routine treatment of all luxated teeth"}, {"letter": "B", "text": "Not indicated in traumatic injuries"}, {"letter": "C", "text": "Inaccessible periapical pathology where normal repositioning fails; tooth is extracted, treated endodontically, and replanted"}, {"letter": "D", "text": "Only for esthetic purposes"}], "correctAnswer": "C", "explanation": "Intentional replantation in trauma cases is indicated for teeth with inaccessible periapical pathology that cannot be treated nonsurgically or surgically through normal approaches. The tooth is extracted, treated ex vivo, and carefully replanted with minimal trauma.", "answer": "C"}, {"id": 99, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 199, "question": "In the long-term management of traumatized anterior teeth, what is the significance of establishing a recall/monitoring schedule?", "options": [{"letter": "A", "text": "Follow-up care is not necessary"}, {"letter": "B", "text": "Regular clinical and radiographic monitoring at 3-4 months, 6-12 months, and annually detects complications early and optimizes outcomes"}, {"letter": "C", "text": "Only one follow-up visit is needed"}, {"letter": "D", "text": "Patient recalls are burdensome and unnecessary"}], "correctAnswer": "B", "explanation": "Structured long-term recall and monitoring is essential for traumatized teeth. Early detection of pulp necrosis, root resorption, ankylosis, or other complications allows appropriate intervention. Serial clinical and radiographic assessment documents healing and identifies changes requiring treatment.", "answer": "B"}, {"id": 100, "chapter": 9, "chapterTitle": "Traumatic Dental Injuries", "number": 200, "question": "What is the primary significance of maintaining detailed records and photographs of traumatized teeth from the initial emergency visit through long-term follow-up?", "options": [{"letter": "A", "text": "Documentation has no clinical value"}, {"letter": "B", "text": "Comprehensive records provide objective evidence of healing progression, allow comparison of tooth position/appearance over time, document complications, and guide treatment decisions"}, {"letter": "C", "text": "Only for insurance purposes"}, {"letter": "D", "text": "Detailed records are not necessary"}], "correctAnswer": "B", "explanation": "Detailed documentation through photographs, radiographs, and clinical notes from emergency visit through long-term follow-up provides objective evidence of healing, allows comparison of subtle changes in tooth position/discoloration/mobility, documents complications, and guides evidence-based treatment decisions throughout the tooth's lifetime.", "answer": "B"}, {"id": 1, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 101, "question": "What is the definition of a cracked tooth syndrome?", "options": [{"letter": "A", "text": "A complete fracture through the entire crown"}, {"letter": "B", "text": "A complex of symptoms caused by a crack in a tooth, including pain on biting, sensitivity, and difficulty isolating causation clinically or radiographically"}, {"letter": "C", "text": "Surface enamel fracture only"}, {"letter": "D", "text": "A fracture extending to the apex"}], "correctAnswer": "B", "explanation": "Cracked tooth syndrome is a collection of symptoms including sharp pain on biting or chewing (often when releasing bite), sensitivity to thermal or osmotic changes, and difficulty isolating the exact causative tooth. The crack is often not visible on standard radiographs, making diagnosis challenging and requiring comprehensive clinical assessment.", "answer": "B"}, {"id": 2, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 102, "question": "Which trauma incidence data is most relevant in endodontics regarding dental injuries?", "options": [{"letter": "A", "text": "Traumatic dental injuries occur in less than 1% of the population"}, {"letter": "B", "text": "Approximately 25-33% of permanent teeth are affected by traumatic dental injuries in some populations"}, {"letter": "C", "text": "Traumatic injuries are extremely rare"}, {"letter": "D", "text": "No incidence data is relevant"}], "correctAnswer": "B", "explanation": "Studies document that 25-33% of permanent teeth are affected by traumatic dental injuries depending on population studies and geographic region. This substantial incidence makes traumatic injury management a critical component of endodontic and restorative practice.", "answer": "B"}, {"id": 3, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 103, "question": "In the classification of cracked and fractured teeth, what distinguishes a 'crack' from a 'fracture'?", "options": [{"letter": "A", "text": "No distinction exists"}, {"letter": "B", "text": "Cracks are incomplete lines of separation in dentin without complete fracture; fractures involve complete separation of tooth segments"}, {"letter": "C", "text": "All cracks are fractures"}, {"letter": "D", "text": "Cracks are only in enamel"}], "correctAnswer": "B", "explanation": "A crack represents an incomplete line of separation extending through dentin but not resulting in complete separation of tooth segments. A fracture is complete separation of tooth segments. This distinction is important for treatment planning, as cracks may be managed conservatively while fractures often require more definitive treatment.", "answer": "B"}, {"id": 4, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 104, "question": "What is the primary mechanism of pain in cracked tooth syndrome?", "options": [{"letter": "A", "text": "Bacterial invasion of the pulp"}, {"letter": "B", "text": "Flexure and separation of tooth segments with stimulation of hydrodynamic fluid movement in dentinal tubules and potential pulpal irritation"}, {"letter": "C", "text": "Enamel fracture only"}, {"letter": "D", "text": "Periapical abscess"}], "correctAnswer": "B", "explanation": "Pain in cracked tooth syndrome results from flexure and movement of separated tooth segments during chewing, which stimulates fluid movement in dentinal tubules (hydrodynamic mechanism). This mechanical stimulation can irritate the pulp and cause the characteristic sharp pain on biting and release.", "answer": "B"}, {"id": 5, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 105, "question": "Which diagnostic test is most helpful in identifying a vertical root fracture?", "options": [{"letter": "A", "text": "Percussion testing alone"}, {"letter": "B", "text": "Visual inspection"}, {"letter": "C", "text": "Cone-beam computed tomography (CBCT), which can visualize the fracture line in three dimensions"}, {"letter": "D", "text": "Periapical radiographs only"}], "correctAnswer": "C", "explanation": "Vertical root fractures are often not visible on standard two-dimensional periapical radiographs. CBCT provides three-dimensional visualization of the fracture line in the buccolingual or mesiodistal dimension, allowing definitive diagnosis. Traditional radiographs may show subtle findings like widened periodontal ligament.", "answer": "C"}, {"id": 6, "chapter": 10, "chapterTitle": "Cracked and Fractured Teeth", "number": 106, "question": "What is the primary etiology of cracks and fractures in teeth?", "options": [{"letter": "A", "text": "Caries progression"}, {"letter": "B", "text": "Traumatic injury, excessive occlusal forces, and thermal cycling causing stress concentration in weakened areas"}, {"letter": "C", "text": "Only developmental defects"}, {"letter": "D", "text": "Periodontal disease"}], "correctAnswer": "B", "explanation": "The primary causes of tooth cracks and fractures are traumatic injuries (falls, impacts), excessive or traumatic occlusal forces (grinding, clenching), and thermal cycling (hot and cold beverages). Stress concentration occurs at cusps, existing restoration
