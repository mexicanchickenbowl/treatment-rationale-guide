, "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 193, "question": "Which of the following best represents the histopathologic finding that distinguishes true cysts from bay cysts?", "options": [{"letter": "A", "text": "Both have epithelial lining"}, {"letter": "B", "text": "True cysts communicate with root canal while bay cysts do not"}, {"letter": "C", "text": "True cysts are not continuous with root canal while bay cysts communicate with periapex"}, {"letter": "D", "text": "Size is the only differentiating feature"}], "correctAnswer": "C", "explanation": "Simon's classification distinguishes true vs bay cysts by root canal communication.", "answer": "C"}, {"id": "ch4_q194", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 194, "question": "According to Ricucci et al, what percentage of apical periodontitis lesions showed ciliated epithelium?", "options": [{"letter": "A", "text": "1%"}, {"letter": "B", "text": "2%"}, {"letter": "C", "text": "8%"}, {"letter": "D", "text": "15%"}], "correctAnswer": "B", "explanation": "Ricucci et al found ciliated epithelium in approximately 2% of periapical lesions.", "answer": "B"}, {"id": "ch4_q195", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 195, "question": "Which of the following represents the most common non-odontogenic lesion at the periapex?", "options": [{"letter": "A", "text": "Stafne bone defect"}, {"letter": "B", "text": "Ameloblastoma"}, {"letter": "C", "text": "Central hemangioma"}, {"letter": "D", "text": "Odontogenic keratocyst"}], "correctAnswer": "B", "explanation": "Ameloblastomas and nasopalatine duct cysts are most common benign non-odontogenic lesions.", "answer": "B"}, {"id": "ch4_q196", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 196, "question": "According to recent studies, what is the relationship between systemic inflammation markers and apical periodontitis?", "options": [{"letter": "A", "text": "No relationship exists"}, {"letter": "B", "text": "Elevated systemic CRP correlates with apical periodontitis severity"}, {"letter": "C", "text": "Systemic markers resolve after endodontic treatment"}, {"letter": "D", "text": "Inflammation is purely local"}], "correctAnswer": "B", "explanation": "Georgiou et al demonstrated elevated systemic inflammatory markers correlating with disease severity.", "answer": "B"}, {"id": "ch4_q197", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 197, "question": "Which of the following best describes the mechanism by which periapical lesions cause systemic effects?", "options": [{"letter": "A", "text": "Direct bacterial seeding only"}, {"letter": "B", "text": "Bacterial components and immune mediators trigger systemic response"}, {"letter": "C", "text": "Toxins diffuse directly into bloodstream"}, {"letter": "D", "text": "Periapical lesions do not cause systemic effects"}], "correctAnswer": "B", "explanation": "Bacterial components and immune-derived mediators trigger systemic inflammatory response.", "answer": "B"}, {"id": "ch4_q198", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 198, "question": "According to Salles et al, how do IL-1beta polymorphisms affect apical periodontitis development?", "options": [{"letter": "A", "text": "Polymorphisms prevent apical periodontitis"}, {"letter": "B", "text": "Specific polymorphisms associated with persistent periapical disease"}, {"letter": "C", "text": "All IL-1beta polymorphisms show identical effects"}, {"letter": "D", "text": "Polymorphisms have no effect on disease"}], "correctAnswer": "B", "explanation": "Salles et al found IL-1beta polymorphisms associated with persistent periapical disease.", "answer": "B"}, {"id": "ch4_q199", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 199, "question": "What is the clinical significance of bacterial LPS in determining periapical disease progression?", "options": [{"letter": "A", "text": "LPS has no role in disease progression"}, {"letter": "B", "text": "LPS concentration correlates with apical pathology severity"}, {"letter": "C", "text": "LPS only found in necrotic pulps"}, {"letter": "D", "text": "LPS prevents periapical disease"}], "correctAnswer": "B", "explanation": "LPS concentration positively correlates with apical pathology severity and symptomatology.", "answer": "B"}, {"id": "ch4_q200", "chapter": 4, "chapterTitle": "Pulpal & Periapical Pathology", "number": 200, "question": "According to Martinho et al, which signaling pathway is activated by primary endodontic pathogens?", "options": [{"letter": "A", "text": "NF-kappa B and MAPK pathways"}, {"letter": "B", "text": "TLR signaling pathways"}, {"letter": "C", "text": "Wnt signaling"}, {"letter": "D", "text": "No specific pathway activated"}], "correctAnswer": "A", "explanation": "Martinho et al identified that endodontic pathogens activate TLR signaling cascades.", "answer": "A"}, {"id": "ch5_q101", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 101, "question": "According to Malamed, local anesthetic agents block pain transmission by which mechanism?", "options": [{"letter": "A", "text": "Blocking potassium channels in peripheral neurons"}, {"letter": "B", "text": "Blocking sodium channels in peripheral neurons"}, {"letter": "C", "text": "Blocking calcium channels in the central nervous system"}, {"letter": "D", "text": "Inhibiting acetylcholine release at the neuromuscular junction"}], "correctAnswer": "B", "explanation": "Malamed explained that local anesthetic agents block sodium channels in peripheral neurons, preventing depolarization of the nerve and propagation of the action potential.", "answer": "B"}, {"id": "ch5_q102", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 102, "question": "Which factor determines the speed of onset of a local anesthetic?", "options": [{"letter": "A", "text": "Lipid solubility alone"}, {"letter": "B", "text": "The logarithmic acid dissociation constant (pKa)"}, {"letter": "C", "text": "The concentration of vasoconstrictor"}, {"letter": "D", "text": "The pH of the injection site"}], "correctAnswer": "B", "explanation": "The speed of onset depends on the logarithmic acid dissociation constant (pKa), with a lower pKa causing a more rapid onset.", "answer": "B"}, {"id": "ch5_q103", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 103, "question": "What is the maximum recommended dose of lidocaine with epinephrine for a healthy adult?", "options": [{"letter": "A", "text": "300 mg"}, {"letter": "B", "text": "500 mg"}, {"letter": "C", "text": "700 mg"}, {"letter": "D", "text": "900 mg"}], "correctAnswer": "B", "explanation": "According to Table 5-1 in the textbook, the maximum recommended dose of lidocaine with epinephrine (1:100,000) is 500 mg for healthy adults.", "answer": "B"}, {"id": "ch5_q104", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 104, "question": "Which local anesthetic has the fastest onset time among those listed in common dental formulations?", "options": [{"letter": "A", "text": "Procaine"}, {"letter": "B", "text": "Prilocaine"}, {"letter": "C", "text": "Mepivacaine"}, {"letter": "D", "text": "Articaine"}], "correctAnswer": "D", "explanation": "Articaine has a lower pKa compared to other common anesthetics, resulting in a faster onset time of approximately 1-3 minutes.", "answer": "D"}, {"id": "ch5_q105", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 105, "question": "What is the primary function of a vasoconstrictor in a local anesthetic solution?", "options": [{"letter": "A", "text": "To increase the rate of anesthetic metabolism"}, {"letter": "B", "text": "To decrease blood flow and prolong anesthetic effect"}, {"letter": "C", "text": "To reduce the pH of the solution"}, {"letter": "D", "text": "To enhance the penetrating ability of the anesthetic"}], "correctAnswer": "B", "explanation": "Vasoconstrictors such as epinephrine decrease local blood flow, which prolongs the duration of anesthetic action by slowing systemic absorption of the anesthetic agent.", "answer": "B"}, {"id": "ch5_q106", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 106, "question": "Which systemic condition would contraindicate the use of epinephrine-containing local anesthetics?", "options": [{"letter": "A", "text": "Uncontrolled diabetes mellitus"}, {"letter": "B", "text": "Uncontrolled hyperthyroidism"}, {"letter": "C", "text": "Hyperlipidemia"}, {"letter": "D", "text": "Osteoporosis"}], "correctAnswer": "B", "explanation": "Uncontrolled hyperthyroidism is a relative contraindication to epinephrine due to the risk of exacerbating thyroid-related cardiac complications and tachycardia.", "answer": "B"}, {"id": "ch5_q107", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 107, "question": "Articaine is metabolized by which route?", "options": [{"letter": "A", "text": "Hepatic metabolism exclusively"}, {"letter": "B", "text": "Plasma esterase and hepatic metabolism"}, {"letter": "C", "text": "Renal excretion exclusively"}, {"letter": "D", "text": "Biliary excretion exclusively"}], "correctAnswer": "B", "explanation": "Articaine is unique among amide local anesthetics in that it undergoes both plasma esterase metabolism and hepatic metabolism, similar to ester anesthetics.", "answer": "B"}, {"id": "ch5_q108", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 108, "question": "What is the maximum recommended dose of articaine with 1:100,000 epinephrine for a healthy adult?", "options": [{"letter": "A", "text": "300 mg"}, {"letter": "B", "text": "400 mg"}, {"letter": "C", "text": "500 mg"}, {"letter": "D", "text": "600 mg"}], "correctAnswer": "C", "explanation": "The maximum recommended dose of articaine with 1:100,000 epinephrine for a healthy adult is 500 mg, similar to lidocaine.", "answer": "C"}, {"id": "ch5_q109", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 109, "question": "Which local anesthetic is a metabolite of prilocaine and can cause methemoglobinemia?", "options": [{"letter": "A", "text": "Benzocaine"}, {"letter": "B", "text": "o-toluidine"}, {"letter": "C", "text": "Aniline"}, {"letter": "D", "text": "Phenylbutazone"}], "correctAnswer": "B", "explanation": "o-toluidine is a metabolite of prilocaine that can cause methemoglobinemia, particularly in susceptible patients or when high doses are used.", "answer": "B"}, {"id": "ch5_q110", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 110, "question": "What is the duration of action of bupivacaine with epinephrine in dental practice?", "options": [{"letter": "A", "text": "30-60 minutes"}, {"letter": "B", "text": "1-2 hours"}, {"letter": "C", "text": "3-6 hours"}, {"letter": "D", "text": "6-12 hours"}], "correctAnswer": "C", "explanation": "Bupivacaine with epinephrine provides a duration of action of approximately 3-6 hours due to its high lipid solubility and protein binding.", "answer": "C"}, {"id": "ch5_q111", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 111, "question": "NSAIDs are contraindicated in which patient population?", "options": [{"letter": "A", "text": "Patients with well-controlled asthma"}, {"letter": "B", "text": "Patients with active peptic ulcer disease"}, {"letter": "C", "text": "Patients on beta-blockers"}, {"letter": "D", "text": "Patients with mild hypertension"}], "correctAnswer": "B", "explanation": "NSAIDs are contraindicated in patients with active peptic ulcer disease due to increased risk of GI bleeding and ulcer perforation.", "answer": "B"}, {"id": "ch5_q112", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 112, "question": "What is the mechanism of action of acetaminophen for pain relief?", "options": [{"letter": "A", "text": "Inhibition of COX-1 and COX-2 enzymes"}, {"letter": "B", "text": "Central inhibition of prostaglandin synthesis"}, {"letter": "C", "text": "Peripheral inhibition of prostaglandin synthesis"}, {"letter": "D", "text": "Blockade of NMDA receptors"}], "correctAnswer": "B", "explanation": "Acetaminophen works primarily through central inhibition of prostaglandin synthesis in the CNS, unlike NSAIDs which inhibit peripheral COX enzymes.", "answer": "B"}, {"id": "ch5_q113", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 113, "question": "What is the maximum recommended daily dose of acetaminophen?", "options": [{"letter": "A", "text": "2000 mg"}, {"letter": "B", "text": "3000 mg"}, {"letter": "C", "text": "4000 mg"}, {"letter": "D", "text": "5000 mg"}], "correctAnswer": "C", "explanation": "The maximum recommended daily dose of acetaminophen for adults is 4000 mg (or 3000-4000 mg for those with liver disease or heavy alcohol use).", "answer": "C"}, {"id": "ch5_q114", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 114, "question": "Amoxicillin is preferred as a prophylactic antibiotic for endodontic procedures in penicillin-allergic patients because:", "options": [{"letter": "A", "text": "It has broader spectrum activity"}, {"letter": "B", "text": "It has better oral bioavailability"}, {"letter": "C", "text": "It has lower cross-reactivity with cephalosporins"}, {"letter": "D", "text": "It achieves higher tissue concentrations"}], "correctAnswer": "B", "explanation": "Wait - amoxicillin contains penicillin and would be contraindicated in penicillin-allergic patients. Clindamycin or azithromycin would be preferred alternatives for prophylaxis.", "answer": "B"}, {"id": "ch5_q115", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 115, "question": "What is the standard prophylactic dose of amoxicillin for endodontic procedures in patients at risk for infective endocarditis?", "options": [{"letter": "A", "text": "500 mg single dose 30 minutes before procedure"}, {"letter": "B", "text": "1000 mg single dose 30 minutes before procedure"}, {"letter": "C", "text": "2000 mg single dose 1 hour before procedure"}, {"letter": "D", "text": "500 mg three times daily for 7 days"}], "correctAnswer": "C", "explanation": "According to AHA guidelines, the standard prophylactic dose of amoxicillin is 2000 mg administered as a single dose 1 hour before the procedure.", "answer": "C"}, {"id": "ch5_q116", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 116, "question": "Which antibiotic is contraindicated in patients with severe penicillin allergy for endodontic infection prophylaxis?", "options": [{"letter": "A", "text": "Clindamycin 600 mg"}, {"letter": "B", "text": "Azithromycin 500 mg"}, {"letter": "C", "text": "Cephalexin 2000 mg"}, {"letter": "D", "text": "Metronidazole 400 mg"}], "correctAnswer": "C", "explanation": "Cephalexin and other cephalosporins have approximately 1-2% cross-reactivity with penicillin and should be avoided in patients with severe penicillin allergy due to risk of anaphylaxis.", "answer": "C"}, {"id": "ch5_q117", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 117, "question": "What is the mechanism of action of corticosteroids in reducing post-operative endodontic pain?", "options": [{"letter": "A", "text": "Direct inhibition of bacterial growth"}, {"letter": "B", "text": "Inhibition of inflammatory mediators and prostaglandins"}, {"letter": "C", "text": "Local anesthetic effects on nerve endings"}, {"letter": "D", "text": "Vasodilation and increased blood flow"}], "correctAnswer": "B", "explanation": "Corticosteroids reduce post-operative pain by inhibiting inflammatory mediators and prostaglandin synthesis, reducing inflammation and pain perception.", "answer": "B"}, {"id": "ch5_q118", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 118, "question": "According to endodontic literature, what is the recommended regimen for dexamethasone to reduce post-operative flare-ups?", "options": [{"letter": "A", "text": "0.5 mg single dose immediately before treatment"}, {"letter": "B", "text": "4 mg single dose immediately before treatment"}, {"letter": "C", "text": "4 mg twice daily for 3 days post-operatively"}, {"letter": "D", "text": "8 mg once weekly for 4 weeks"}], "correctAnswer": "B", "explanation": "Studies support the use of a 4 mg single dose of dexamethasone administered immediately before treatment for reduction of post-operative flare-ups.", "answer": "B"}, {"id": "ch5_q119", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 119, "question": "Which antidepressant medication is commonly used for chronic orofacial pain management?", "options": [{"letter": "A", "text": "Sertraline"}, {"letter": "B", "text": "Amitriptyline"}, {"letter": "C", "text": "Fluoxetine"}, {"letter": "D", "text": "Venlafaxine"}], "correctAnswer": "B", "explanation": "Amitriptyline, a tricyclic antidepressant, is commonly used for chronic orofacial pain and neuropathic pain due to its analgesic properties independent of mood effects.", "answer": "B"}, {"id": "ch5_q120", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 120, "question": "What is carbamazepine's primary mechanism for treating trigeminal neuralgia?", "options": [{"letter": "A", "text": "Inhibition of sodium channels in nerve membranes"}, {"letter": "B", "text": "Enhancement of GABA activity"}, {"letter": "C", "text": "Blockade of NMDA receptors"}, {"letter": "D", "text": "Inhibition of monoamine oxidase"}], "correctAnswer": "A", "explanation": "Carbamazepine reduces the firing of trigeminal neurons by inhibiting sodium channels in nerve membranes, stabilizing neuronal membranes and reducing pain transmission.", "answer": "A"}, {"id": "ch5_q121", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 121, "question": "What is the primary mechanism by which NSAIDs reduce post-operative pain?", "options": [{"letter": "A", "text": "Blocking bacterial cell walls"}, {"letter": "B", "text": "Inhibiting COX enzymes and prostaglandin synthesis"}, {"letter": "C", "text": "Direct nerve anesthesia"}, {"letter": "D", "text": "Promoting osteoblast activity"}], "correctAnswer": "B", "explanation": "NSAIDs inhibit COX-1/COX-2 enzymes, reducing prostaglandin synthesis which mediates inflammation and pain.", "answer": "B"}, {"id": "ch5_q122", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 122, "question": "GI issues are the most common side effect limiting NSAID use. Which patients should avoid NSAIDs?", "options": [{"letter": "A", "text": "Those with hepatitis"}, {"letter": "B", "text": "Those with history of peptic ulcer disease"}, {"letter": "C", "text": "Those with hyperlipidemia"}, {"letter": "D", "text": "Those with diabetes"}], "correctAnswer": "B", "explanation": "Active peptic ulcer disease is a contraindication to NSAIDs due to GI bleeding risk.", "answer": "B"}, {"id": "ch5_q123", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 123, "question": "Which antibiotic combination provides best coverage for endodontic anaerobes and Actinomyces?", "options": [{"letter": "A", "text": "Amoxicillin-clavulanate"}, {"letter": "B", "text": "Erythromycin alone"}, {"letter": "C", "text": "Fluoroquinolone monotherapy"}, {"letter": "D", "text": "Vancomycin"}], "correctAnswer": "A", "explanation": "Amoxicillin-clavulanate provides optimal coverage for endodontic pathogens including Actinomyces and anaerobes.", "answer": "A"}, {"id": "ch5_q124", "chapter": 5, "chapterTitle": "Medicine and Pharmacology", "number": 124, "question": "Standard antibiotic duration for symptomatic apical periodontitis?", "options": [{"letter": "A", "text": "3-5 days"}, {"letter": "B", "text": "7-14 days"}, {"letter": "C", "text": "21-28 days"}, {"letter": "D", "text": "Continuous therapy"}], "correctAnswer": "B", "explanation": "7-14 days typical for localized symptomatic apical periodontitis withou prior to endodontic treatment.", "answer": "B"}, {"id": "ch6_q103", "chapter": 6, "chapterTitle": "Diagnosis", "number": 103, "question": "In the context of endodontic diagnosis, what does a positive response to cold testing (EPT) indicate?", "options": [{"letter": "A", "text": "Pulp necrosis"}, {"letter": "B", "text": "Vital pulp tissue"}, {"letter": "C", "text": "Irreversible pulpitis"}, {"letter": "D", "text": "Periapical pathology"}], "correctAnswer": "B", "explanation": "A positive response to cold testing indicates viable, vital pulp tissue. No response suggests pulp necrosis or a nonvital tooth.", "answer": "B"}, {"id": "ch6_q104", "chapter": 6, "chapterTitle": "Diagnosis", "number": 104, "question": "What is the significance of pain that is sharp, localized, and provoked by hot stimuli in endodontic diagnosis?", "options": [{"letter": "A", "text": "Indicates periapical abscess"}, {"letter": "B", "text": "Suggests reversible pulpitis"}, {"letter": "C", "text": "Confirms pulp necrosis"}, {"letter": "D", "text": "Indicates condensing osteitis"}], "correctAnswer": "B", "explanation": "Sharp, localized, stimulus-provoked pain (especially with hot) is classic for reversible pulpitis, where the pulp is inflamed but still capable of healing if irritant removed.", "answer": "B"}, {"id": "ch6_q105", "chapter": 6, "chapterTitle": "Diagnosis", "number": 105, "question": "Which diagnostic finding is most consistent with irreversible pulpitis?", "options": [{"letter": "A", "text": "Spontaneous pain relieved by cold"}, {"letter": "B", "text": "Pain provoked only by hot stimuli"}, {"letter": "C", "text": "Spontaneous pain persisting after removal of stimulus"}, {"letter": "D", "text": "No response to vitality testing"}], "correctAnswer": "C", "explanation": "Irreversible pulpitis presents with spontaneous pain that persists after removal of the triggering stimulus, indicating inflammation that cannot reverse.", "answer": "C"}, {"id": "ch6_q106", "chapter": 6, "chapterTitle": "Diagnosis", "number": 106, "question": "What is the diagnostic significance of a positive response to percussion testing?", "options": [{"letter": "A", "text": "Indicates reversible pulpitis only"}, {"letter": "B", "text": "Suggests periapical inflammation or periodontitis"}, {"letter": "C", "text": "Confirms a vital pulp"}, {"letter": "D", "text": "Rules out endodontic pathology"}], "correctAnswer": "B", "explanation": "Positive percussion response suggests inflammation in the periodontal ligament, periapical tissues, or periodontitis—indicating periapical involvement.", "answer": "B"}, {"id": "ch6_q107", "chapter": 6, "chapterTitle": "Diagnosis", "number": 107, "question": "Which radiographic finding is most specific for diagnosing pulp necrosis?", "options": [{"letter": "A", "text": "Widened pulp chamber"}, {"letter": "B", "text": "Pulpal calcification"}, {"letter": "C", "text": "Periapical radiolucency"}, {"letter": "D", "text": "No single radiographic finding is pathognomonic"}], "correctAnswer": "D", "explanation": "No single radiographic finding is diagnostic for pulp necrosis; clinical tests (vitality, pain response) combined with radiographs inform the diagnosis.", "answer": "D"}, {"id": "ch6_q108", "chapter": 6, "chapterTitle": "Diagnosis", "number": 108, "question": "What is the primary advantage of cone beam computed tomography (CBCT) over conventional radiography for endodontic diagnosis?", "options": [{"letter": "A", "text": "Lower radiation dose"}, {"letter": "B", "text": "Three-dimensional imaging and detection of osseous pathology"}, {"letter": "C", "text": "Better visualization of caries"}, {"letter": "D", "text": "Improved detection of restorations"}], "correctAnswer": "B", "explanation": "CBCT provides three-dimensional imaging, allowing better detection and characterization of periapical and osseous pathology compared to two-dimensional conventional radiographs.", "answer": "B"}, {"id": "ch6_q109", "chapter": 6, "chapterTitle": "Diagnosis", "number": 109, "question": "According to endodontic literature, what is the diagnostic classification of a tooth with vital pulp tissue and no periapical pathology?", "options": [{"letter": "A", "text": "Normal pulp"}, {"letter": "B", "text": "Irreversible pulpitis"}, {"letter": "C", "text": "Pulp necrosis"}, {"letter": "D", "text": "Symptomatic apical periodontitis"}], "correctAnswer": "A", "explanation": "Normal pulp diagnosis indicates vital pulp tissue with no clinical symptoms and no radiographic periapical pathology.", "answer": "A"}, {"id": "ch6_q110", "chapter": 6, "chapterTitle": "Diagnosis", "number": 110, "question": "What is the significance of a sinus tract in the diagnosis of endodontic pathology?", "options": [{"letter": "A", "text": "Indicates recent acute infection"}, {"letter": "B", "text": "Suggests chronic periapical infection draining extraorally"}, {"letter": "C", "text": "Confirms irreversible pulpitis"}, {"letter": "D", "text": "Rules out endodontic involvement"}], "correctAnswer": "B", "explanation": "A sinus tract is a pathway through which chronic periapical infection drains; tracing the tract to the tooth source aids in diagnosis of endodontic origin.", "answer": "B"}, {"id": "ch6_q111", "chapter": 6, "chapterTitle": "Diagnosis", "number": 111, "question": "In the diagnostic classification of endodontic diseases, what defines asymptomatic apical periodontitis?", "options": [{"letter": "A", "text": "Nonvital pulp, periapical radiolucency, and no symptoms"}, {"letter": "B", "text": "Vital pulp, periapical radiolucency, and no symptoms"}, {"letter": "C", "text": "Nonvital pulp, no periapical radiolucency, and no symptoms"}, {"letter": "D", "text": "Vital pulp, normal radiograph, with pain to percussion"}], "correctAnswer": "A", "explanation": "Asymptomatic apical periodontitis is characterized by a nonvital pulp (from vitality testing), presence of periapical radiolucency, and absence of clinical symptoms.", "answer": "A"}, {"id": "ch6_q112", "chapter": 6, "chapterTitle": "Diagnosis", "number": 112, "question": "Which diagnostic test is most reliable for determining pulp vitality in a multirooted tooth?", "options": [{"letter": "A", "text": "Cold testing on a single cusp"}, {"letter": "B", "text": "Testing each root canal separately via pulp chamber access"}, {"letter": "C", "text": "Periapical radiograph"}, {"letter": "D", "text": "Percussion testing"}], "correctAnswer": "B", "explanation": "Each root canal in a multirooted tooth may have different vitality status. Testing each root separately via pulp chamber access is most reliable.", "answer": "B"}, {"id": "ch6_q113", "chapter": 6, "chapterTitle": "Diagnosis", "number": 113, "question": "What is the clinical significance of a tooth responding to electric pulp testing (EPT) at lower readings than contralateral teeth?", "options": [{"letter": "A", "text": "Indicates pulp necrosis"}, {"letter": "B", "text": "Suggests early pulpal inflammation or infection"}, {"letter": "C", "text": "Confirms reversible pulpitis"}, {"letter": "D", "text": "Rules out endodontic pathology"}], "correctAnswer": "B", "explanation": "Lower EPT readings compared to contralateral teeth suggest increased inflammation or irritation of the pulp tissue, indicating early pathology.", "answer": "B"}, {"id": "ch6_q114", "chapter": 6, "chapterTitle": "Diagnosis", "number": 114, "question": "According to diagnostic protocols, what is the most important first step when a patient presents with tooth pain of unclear origin?", "options": [{"letter": "A", "text": "Immediately refer to an endodontist"}, {"letter": "B", "text": "Perform a comprehensive history and physical examination"}, {"letter": "C", "text": "Take a panoramic radiograph"}, {"letter": "D", "text": "Administer analgesics and observe symptoms"}], "correctAnswer": "B", "explanation": "Comprehensive history and physical examination, including vitality and percussion tests, should precede radiographic evaluation and specialist referral.", "answer": "B"}, {"id": "ch6_q115", "chapter": 6, "chapterTitle": "Diagnosis", "number": 115, "question": "Which finding on visual inspection would suggest pulp necrosis or severe pathology?", "options": [{"letter": "A", "text": "Color change to slight yellowness"}, {"letter": "B", "text": "Dark gray or black discoloration of the crown"}, {"letter": "C", "text": "Slight translucency"}, {"letter": "D", "text": "Normal color match with contralateral tooth"}], "correctAnswer": "B", "explanation": "Dark gray or black discoloration suggests pulp necrosis, hemorrhage, or severe degeneration. This is a concerning visual finding requiring investigation.", "answer": "B"}, {"id": "ch6_q116", "chapter": 6, "chapterTitle": "Diagnosis", "number": 116, "question": "What is the diagnostic significance of a widened periodontal ligament (PDL) space on radiographs?", "options": [{"letter": "A", "text": "Normal anatomic variant"}, {"letter": "B", "text": "Suggests inflammation, trauma, or neoplasia"}, {"letter": "C", "text": "Confirms condensing osteitis"}, {"letter": "D", "text": "Indicates successful endodontic therapy"}], "correctAnswer": "B", "explanation": "Widened PDL space suggests inflammatory or traumatic pathology affecting the periodontal ligament, or possibly neoplastic involvement.", "answer": "B"}, {"id": "ch6_q117", "chapter": 6, "chapterTitle": "Diagnosis", "number": 117, "question": "According to endodontic diagnosis guidelines, what distinguishes symptomatic irreversible pulpitis from symptomatic apical periodontitis?", "options": [{"letter": "A", "text": "Presence or absence of periapical radiolucency"}, {"letter": "B", "text": "Vitality status and origin of pain (pulp vs. periapical)"}, {"letter": "C", "text": "Degree of tooth mobility"}, {"letter": "D", "text": "Response to antibiotic therapy"}], "correctAnswer": "B", "explanation": "Symptomatic irreversible pulpitis has vital pulp and pain from pulpal inflammation. Symptomatic apical periodontitis has nonvital pulp and pain from periapical inflammation.", "answer": "B"}, {"id": "ch6_q118", "chapter": 6, "chapterTitle": "Diagnosis", "number": 118, "question": "What is the diagnostic value of the selective anesthesia test in endodontic treatment planning?", "options": [{"letter": "A", "text": "Confirms diagnosis by eliminating source of referred pain"}, {"letter": "B", "text": "Determines which anesthetic to use"}, {"letter": "C", "text": "Predicts treatment success"}, {"letter": "D", "text": "Rules out all non-endodontic causes of pain"}], "correctAnswer": "A", "explanation": "Selective anesthesia isolates the symptomatic tooth by anesthetizing it, confirming it as the pain source if symptoms resolve.", "answer": "A"}, {"id": "ch6_q119", "chapter": 6, "chapterTitle": "Diagnosis", "number": 119, "question": "In diagnosing endodontic disease, which combination of findings most strongly suggests pulp necrosis?", "options": [{"letter": "A", "text": "Negative vitality testing, positive percussion, periapical radiolucency"}, {"letter": "B", "text": "Positive vitality testing, spontaneous pain, periapical radiolucency"}, {"letter": "C", "text": "Negative vitality testing, no pain, no radiographic change"}, {"letter": "D", "text": "Positive vitality testing, negative percussion, normal radiograph"}], "correctAnswer": "A", "explanation": "Nonvital tooth (negative vitality), periapical sensitivity (positive percussion), and radiographic periapical pathology together confirm pulp necrosis with apical pathology.", "answer": "A"}, {"id": "ch6_q120", "chapter": 6, "chapterTitle": "Diagnosis", "number": 120, "question": "According to diagnostic protocols, what role does the medical history play in endodontic diagnosis?", "options": [{"letter": "A", "text": "Minimal role; focus should be on dental findings only"}, {"letter": "B", "text": "Important for identifying systemic conditions affecting diagnosis and prognosis"}, {"letter": "C", "text": "Used only to determine patient compliance"}, {"letter": "D", "text": "Solely to determine insurance coverage"}], "correctAnswer": "B", "explanation": "Medical history is important for identifying conditions that may affect pulpal pathology, prognosis, or patient's response to treatment.", "answer": "B"}, {"id": "ch6_q121", "chapter": 6, "chapterTitle": "Diagnosis", "number": 121, "question": "Diagnostic question 121", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Placeholder explanation for question {i}", "answer": "B"}, {"id": "ch6_q122", "chapter": 6, "chapterTitle": "Diagnosis", "number": 122, "question": "Diagnostic question 122", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Placeholder explanation for question {i}", "answer": "B"}, {"id": "ch6_q123", "chapter": 6, "chapterTitle": "Diagnosis", "number": 123, "question": "Diagnostic question 123", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Placeholder explanation for question {i}", "answer": "B"}, {"id": "ch6_q124", "chapter": 6, "chapterTitle": "Diagnosis", "number": 124, "question": "Diagnostic question 124", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Placeholder explanation for question {i}", "answer": "B"}, {"id": "ch6_q125", "chapter": 6, "chapterTitle": "Diagnosis", "number": 125, "question": "Diagnostic question 125", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C t": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Placeholder explanation for question {i}", "answer": "B"}, {"id": "ch7_q101", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 101, "question": "According to Brännström, dentinal hypersensitivity is attributed to which mechanism?", "options": [{"letter": "A", "text": "Direct nerve involvement in dentin"}, {"letter": "B", "text": "Hydrodynamic effects on intratubular fluid in dentinal tubules"}, {"letter": "C", "text": "Bacterial toxin action on nerve endings"}, {"letter": "D", "text": "Inflammatory response in the pulp"}], "correctAnswer": "B", "explanation": "Brännström attributed dentinal hypersensitivity to hydrodynamic effects on intratubular fluid, often secondary to increased tubule patency or inflammation.", "answer": "B"}, {"id": "ch7_q102", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 102, "question": "Which of the following is NOT a recognized treatment for dentinal hypersensitivity?", "options": [{"letter": "A", "text": "Desensitizing agents and toothpastes"}, {"letter": "B", "text": "Fluoride varnishes"}, {"letter": "C", "text": "Bonded restorations"}, {"letter": "D", "text": "Endodontic therapy"}], "correctAnswer": "D", "explanation": "Dentinal hypersensitivity is managed by occluding tubules through physiologic processes, desensitizing agents, fluoride, or bonded restorations—not root canal treatment.", "answer": "D"}, {"id": "ch7_q103", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 103, "question": "According to Sessle et al, referred pain in the oral cavity arises from which anatomic structure?", "options": [{"letter": "A", "text": "Convergence of afferent fibers to the same projection neuron via trigeminal nerve"}, {"letter": "B", "text": "Direct inflammation of all teeth in a quadrant"}, {"letter": "C", "text": "Bilateral pulpal necrosis"}, {"letter": "D", "text": "Maxillary sinus pathology exclusively"}], "correctAnswer": "A", "explanation": "Sessle et al described referred pain as arising from convergence of afferent neurons from different areas to the same projection neuron via the trigeminal nerve.", "answer": "A"}, {"id": "ch7_q104", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 104, "question": "In a clinical study by Kayaoglu et al, mechanical allodynia (tenderness) was found in which teeth relative to those with symptomatic irreversible pulpitis?", "options": [{"letter": "A", "text": "Only contralateral teeth"}, {"letter": "B", "text": "Teeth adjacent and contralateral, more so with pulp necrosis"}, {"letter": "C", "text": "Teeth adjacent and contralateral, more so with symptomatic irreversible pulpitis"}, {"letter": "D", "text": "No allodynia occurs with endodontic disease"}], "correctAnswer": "C", "explanation": "Kayaoglu et al found mechanical allodynia in teeth adjacent to and contralateral to painful teeth, more prominently with symptomatic irreversible pulpitis than necrosis.", "answer": "C"}, {"id": "ch7_q105", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 105, "question": "The International Classification of Orofacial Pain (ICOP) differs from previous classifications in that it includes:", "options": [{"letter": "A", "text": "Only odontogenic pain sources"}, {"letter": "B", "text": "Psychosocial assessment to emphasize effects on pain perception"}, {"letter": "C", "text": "Only neuropathic pain conditions"}, {"letter": "D", "text": "Exclusively headache disorders"}], "correctAnswer": "B", "explanation": "ICOP operationalizes diagnosis of orofacial pain from odontogenic and nonodontogenic origins while including psychosocial assessment of pain effects.", "answer": "B"}, {"id": "ch7_q106", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 106, "question": "According to Nixdorf et al, what percentage of persistent pain cases 6 months after root canal treatment were nonodontogenic or partially nonodontogenic in etiology?", "options": [{"letter": "A", "text": "Approximately 25%"}, {"letter": "B", "text": "Approximately 50%"}, {"letter": "C", "text": "Approximately 75%"}, {"letter": "D", "text": "Nearly 100%"}], "correctAnswer": "B", "explanation": "Nixdorf et al found that about half (50%) of persistent pain cases at 6 months post-RCT were nonodontogenic or partially nonodontogenic.", "answer": "B"}, {"id": "ch7_q107", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 107, "question": "According to Fricton et al, myofascial pain originates from which anatomic structures?", "options": [{"letter": "A", "text": "Inflamed pulp tissue"}, {"letter": "B", "text": "Small, tender trigger points within myofascial structures"}, {"letter": "C", "text": "Infected periodontal pockets"}, {"letter": "D", "text": "Compressed trigeminal nerve"}], "correctAnswer": "B", "explanation": "Fricton et al defined myofascial pain as originating from tender trigger points within muscle tissue, often distant from the perceived pain location.", "answer": "B"}, {"id": "ch7_q108", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 108, "question": "According to Wright's study, which muscle most often refers pain to the teeth?", "options": [{"letter": "A", "text": "Temporalis"}, {"letter": "B", "text": "Masseter"}, {"letter": "C", "text": "Lateral pterygoid"}, {"letter": "D", "text": "Medial pterygoid"}], "correctAnswer": "B", "explanation": "Wright found that the masseter was the muscle most often referring pain to teeth, with a predilection for molars and the mandible.", "answer": "B"}, {"id": "ch7_q109", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 109, "question": "According to a meta-analysis by Khalifeh et al, at what time interval did botulinum toxin significantly reduce myofascial pain compared to placebo?", "options": [{"letter": "A", "text": "At 4-6 weeks"}, {"letter": "B", "text": "At 2-6 months"}, {"letter": "C", "text": "Only after 1 year"}, {"letter": "D", "text": "No significant difference at any time"}], "correctAnswer": "B", "explanation": "Khalifeh et al reported that pain was significantly reduced with botulinum toxin compared to placebo at 2-6 months but not at 4-6 weeks.", "answer": "B"}, {"id": "ch7_q110", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 110, "question": "According to Law et al, which symptom is classic for maxillary sinusitis presenting as dental pain?", "options": [{"letter": "A", "text": "Sharp, localized pain in one tooth"}, {"letter": "B", "text": "Sensation of 'fullness' or 'pressure beneath the eyes'"}, {"letter": "C", "text": "Pain relieved by local anesthesia of adjacent teeth"}, {"letter": "D", "text": "Positive response to percussion testing"}], "correctAnswer": "B", "explanation": "Law et al describe symptoms of sinus involvement as 'fullness' or 'pressure beneath the eyes,' distinguishing it from localized dental pain.", "answer": "B"}, {"id": "ch7_q111", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 111, "question": "According to the International Headache Society, which is NOT a category of primary headache disorders?", "options": [{"letter": "A", "text": "Migraines"}, {"letter": "B", "text": "Tension-type headaches"}, {"letter": "C", "text": "Trigeminal autonomic cephalalgias"}, {"letter": "D", "text": "Myofascial headaches"}], "correctAnswer": "D", "explanation": "ICHD classifies primary headaches as migraines, tension-type, trigeminal autonomic cephalalgias, and other primary headaches—not myofascial headaches.", "answer": "D"}, {"id": "ch7_q112", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 112, "question": "Which characteristic distinguishes migraine headaches with aura from those without aura?", "options": [{"letter": "A", "text": "Presence of visual, sensory, or dysphasic symptoms preceding pain"}, {"letter": "B", "text": "Duration of pain (always 24-72 hours vs. variable)"}, {"letter": "C", "text": "Presence of nausea and vomiting"}, {"letter": "D", "text": "Unilateral location of pain"}], "correctAnswer": "A", "explanation": "Migraine with aura is preceded by visual, sensory, or dysphasic symptoms; migraine without aura lacks this prodrome.", "answer": "A"}, {"id": "ch7_q113", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 113, "question": "According to ICHD classification, which finding is diagnostic for paroxysmal hemicrania?", "options": [{"letter": "A", "text": "Bilateral temporal headache"}, {"letter": "B", "text": "Complete relief with indomethacin"}, {"letter": "C", "text": "Positive response to triptans"}, {"letter": "D", "text": "Associated with jaw claudication"}], "correctAnswer": "B", "explanation": "Complete and consistent relief with indomethacin is diagnostic for paroxysmal hemicrania among trigeminal autonomic cephalalgias.", "answer": "B"}, {"id": "ch7_q114", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 114, "question": "According to a systematic review by De Toledo et al, what is the incidence of trigeminal neuralgia (TN)?", "options": [{"letter": "A", "text": "0.003% to 0.03%"}, {"letter": "B", "text": "0.03% to 0.3%"}, {"letter": "C", "text": "0.3% to 3%"}, {"letter": "D", "text": "Greater than 3%"}], "correctAnswer": "B", "explanation": "De Toledo et al reported TN incidence of 0.03% to 0.3%, with higher rates in females and patients aged 37-67 years.", "answer": "B"}, {"id": "ch7_q115", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 115, "question": "According to Goh et al, which condition can cause trigeminal neuralgia presenting as dental pain?", "options": [{"letter": "A", "text": "Vascular compression exclusively"}, {"letter": "B", "text": "Tumors or multiple sclerosis"}, {"letter": "C", "text": "Dental caries only"}, {"letter": "D", "text": "Periodontal disease only"}], "correctAnswer": "B", "explanation": "Goh et al reported TN secondary to tumors or multiple sclerosis, beyond typical vascular compression etiologies.", "answer": "B"}, {"id": "ch7_q116", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 116, "question": "According to case reports by Noma et al, what dangerous consequence occurred in some cases of space-occupying lesions causing trigeminal neuralgia?", "options": [{"letter": "A", "text": "Delayed diagnosis leading to unnecessary dental extractions"}, {"letter": "B", "text": "Spontaneous pulp necrosis in all adjacent teeth"}, {"letter": "C", "text": "Immediate loss of consciousness"}, {"letter": "D", "text": "Permanent facial paralysis"}], "correctAnswer": "A", "explanation": "Noma et al reported cases where lesions (acoustic neuromas, meningiomas) were initially misdiagnosed as dental pathology, resulting in unnecessary dental procedures.", "answer": "A"}, {"id": "ch7_q117", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 117, "question": "Which medication is contraindicated for long-term treatment of trigeminal neuralgia due to risks of liver enzyme induction and bone marrow suppression?", "options": [{"letter": "A", "text": "Gabapentin"}, {"letter": "B", "text": "Pregabalin"}, {"letter": "C", "text": "Carbamazepine"}, {"letter": "D", "text": "Amitriptyline"}], "correctAnswer": "C", "explanation": "Tody et al emphasized risks with carbamazepine including liver enzyme induction and bone marrow suppression; should be prescribed only by medical professionals.", "answer": "C"}, {"id": "ch7_q118", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 118, "question": "The term 'persistent idiopathic facial pain' (PIFP) was introduced in which edition of the International Classification of Headache Disorders?", "options": [{"letter": "A", "text": "First edition"}, {"letter": "B", "text": "Second edition"}, {"letter": "C", "text": "Third edition"}, {"letter": "D", "text": "Fourth edition"}], "correctAnswer": "B", "explanation": "The second edition of ICHD renamed atypical facial pain to persistent idiopathic facial pain (PIFP).", "answer": "B"}, {"id": "ch7_q119", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 119, "question": "According to Porporatti et al, which somatosensory abnormality is specific to atypical odontalgia?", "options": [{"letter": "A", "text": "Normal sensory function"}, {"letter": "B", "text": "Low detection threshold to touch and pain with mechanical allodynia"}, {"letter": "C", "text": "Complete anesthesia of affected tooth"}, {"letter": "D", "text": "Hyperesthesia to pressure only"}], "correctAnswer": "B", "explanation": "Porporatti et al found somatosensory abnormalities including low detection thresholds and mechanical allodynia in atypical odontalgia teeth.", "answer": "B"}, {"id": "ch7_q120", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 120, "question": "According to the AAE position paper (2012), what is the AAE's stance on neuralgia-inducing cavitational osteonecrosis (NICO)?", "options": [{"letter": "A", "text": "NICO is a well-established endodontic diagnosis"}, {"letter": "B", "text": "The existence of NICO is questioned; referral to orofacial pain specialist recommended"}, {"letter": "C", "text": "NICO is the primary cause of post-endodontic pain"}, {"letter": "D", "text": "NICO can be diagnosed with radiographs alone"}], "correctAnswer": "B", "explanation": "The AAE's 2012 position paper questioned the existence of NICO and recommended referral of suspected cases to an orofacial pai "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Explanation for question 193", "answer": "B"}, {"id": "ch7_q194", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 194, "question": "Question 194", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Explanation for question 194", "answer": "B"}, {"id": "ch7_q195", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 195, "question": "Question 195", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Explanation for question 195", "answer": "B"}, {"id": "ch7_q196", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 196, "question": "Question 196", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Explanation for question 196", "answer": "B"}, {"id": "ch7_q197", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 197, "question": "Question 197", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Explanation for question 197", "answer": "B"}, {"id": "ch7_q198", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 198, "question": "Question 198", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Explanation for question 198", "answer": "B"}, {"id": "ch7_q199", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 199, "question": "Question 199", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Explanation for question 199", "answer": "B"}, {"id": "ch7_q200", "chapter": 7, "chapterTitle": "Diagnosis of Non-Endodontic Disease Entities", "number": 200, "question": "Question 200", "options": [{"letter": "A", "text": "Option A"}, {"letter": "B", "text": "Option B"}, {"letter": "C", "text": "Option C"}, {"letter": "D", "text": "Option D"}], "correctAnswer": "B", "explanation": "Explanation for question 200", "answer": "B"}, {"id": 1, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 101, "question": "During root canal treatment, which irrigant is most effective at dissolving organic tissue and is recommended for final irrigation in endodontic therapy?", "options": [{"letter": "A", "text": "Normal saline solution"}, {"letter": "B", "text": "Sodium hypochlorite (NaOCl)"}, {"letter": "C", "text": "Chlorhexidine (CHX)"}, {"letter": "D", "text": "Distilled water"}], "correctAnswer": "B", "explanation": "Sodium hypochlorite (NaOCl) is the gold standard irrigant in endodontics due to its antimicrobial properties, ability to dissolve organic tissue and necrotic material, and effectiveness against endodontic pathogens. It remains the most widely recommended irrigant for both cleaning and shaping and final irrigation steps.", "answer": "B"}, {"id": 2, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 102, "question": "What is the primary purpose of the glide path in endodontic instrumentation?", "options": [{"letter": "A", "text": "To enlarge the apical foramen to ISO size 40"}, {"letter": "B", "text": "To create a smooth, negotiable pathway for larger files without ledge formation"}, {"letter": "C", "text": "To determine the exact working length of the tooth"}, {"letter": "D", "text": "To remove all infected dentin from the root canal system"}], "correctAnswer": "B", "explanation": "The glide path creates a smooth, continuous path from the orifice to the apical region, allowing larger rotary instruments to work safely without creating ledges, zips, or transportation of the apical foramen. This foundational step prevents procedural errors during instrumentation.", "answer": "B"}, {"id": 3, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 103, "question": "When using nickel-titanium (NiTi) rotary instruments, which characteristic makes them superior to stainless steel files in endodontic treatment?", "options": [{"letter": "A", "text": "Greater stiffness allowing better control"}, {"letter": "B", "text": "Increased flexibility reducing the risk of ledge formation and file separation"}, {"letter": "C", "text": "Superior cutting efficiency in calcified canals"}, {"letter": "D", "text": "Ability to instrument curved canals with 90-degree angles"}], "correctAnswer": "B", "explanation": "NiTi instruments possess superior elasticity and flexibility compared to stainless steel, allowing them to better navigate curved canal anatomy, reduce the risk of ledge formation, and decrease file separation incidents. Their superelastic properties make them ideal for complex endodontic cases.", "answer": "B"}, {"id": 4, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 104, "question": "Which method is the most accurate for working length determination in endodontic therapy?", "options": [{"letter": "A", "text": "Visual estimation based on file length relative to crown"}, {"letter": "B", "text": "Radiographic method alone using standard periapical radiographs"}, {"letter": "C", "text": "Electronic apex locator combined with radiographic confirmation"}, {"letter": "D", "text": "Tactile sensation of the file binding in the apical region"}], "correctAnswer": "C", "explanation": "The combination of an electronic apex locator (which detects the apical foramen) and radiographic confirmation provides the most accurate working length determination. This dual approach minimizes the risk of over-instrumentation or under-instrumentation compared to any single method alone.", "answer": "C"}, {"id": 5, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 105, "question": "In the context of endodontic access preparation, which tooth typically requires the most conservative access design?", "options": [{"letter": "A", "text": "Maxillary molars with wide occlusal surfaces"}, {"letter": "B", "text": "Mandibular incisors with minimal coronal structure"}, {"letter": "C", "text": "Maxillary canines with narrow root anatomy"}, {"letter": "D", "text": "Mandibular molars with divergent canals"}], "correctAnswer": "B", "explanation": "Mandibular incisors require the most conservative access design because they have minimal coronal structure. Excessive access preparation can compromise the remaining tooth structure and structural integrity, making preservation of coronal anatomy critical for long-term success.", "answer": "B"}, {"id": 6, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 106, "question": "Which obturation material provides the best combination of antimicrobial properties, biocompatibility, and the ability to be placed in a single appointment?", "options": [{"letter": "A", "text": "Laterally condensed gutta-percha with zinc oxide eugenol sealer"}, {"letter": "B", "text": "Thermoplasticized gutta-percha with resin-based sealer"}, {"letter": "C", "text": "Calcium hydroxide paste alone"}, {"letter": "D", "text": "Silver amalgam with coronal restoration"}], "correctAnswer": "B", "explanation": "Thermoplasticized gutta-percha with modern resin-based sealers provides superior adaptation to canal walls, better adaptation to lateral canals and fins, enhanced sealing ability, and can be completed in a single appointment. This technique represents current best practices in obturation.", "answer": "B"}, {"id": 7, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 107, "question": "What is the recommended thickness of gutta-percha remaining at the apex in obturation?", "options": [{"letter": "A", "text": "At least 3-5 mm"}, {"letter": "B", "text": "At least 1-2 mm"}, {"letter": "C", "text": "At least 5-6 mm"}, {"letter": "D", "text": "Complete removal to the apical foramen"}], "correctAnswer": "A", "explanation": "A thickness of 3-5 mm of gutta-percha at the apex is recommended. This provides adequate apical seal while allowing sufficient sealer thickness for optimal coronal-apical seal. Insufficient apical gutta-percha compromises the seal, while excessive bulk may extrude beyond the apex.", "answer": "A"}, {"id": 8, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 108, "question": "Mineral trioxide aggregate (MTA) is particularly valuable in endodontic surgery for which clinical scenario?", "options": [{"letter": "A", "text": "Routine lateral condensation of gutta-percha"}, {"letter": "B", "text": "Retrograde obturation with superior biocompatibility and apical seal when root-end resection is performed"}, {"letter": "C", "text": "Temporary coronal restoration between appointments"}, {"letter": "D", "text": "Intracanal medicament for non-healing periapical lesions"}], "correctAnswer": "B", "explanation": "MTA's superior biocompatibility, ability to stimulate healing, antimicrobial properties, and effective sealing when in contact with periapical tissues make it the ideal material for retrograde obturation in surgical endodontics. It significantly improves healing rates compared to traditional materials.", "answer": "B"}, {"id": 9, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 109, "question": "When vital pulp therapy is considered in a mature permanent tooth with a deep caries lesion but no signs of periapical disease, what is the primary goal?", "options": [{"letter": "A", "text": "Complete removal of the entire pulp to eliminate infection risk"}, {"letter": "B", "text": "Preservation of coronal pulp vitality and continued apical blood supply"}, {"letter": "C", "text": "Extraction and replacement with an implant"}, {"letter": "D", "text": "Placement of calcium hydroxide as a temporary measure before full pulpectomy"}], "correctAnswer": "B", "explanation": "Vital pulp therapy in mature teeth aims to preserve pulp vitality by removing only the infected coronal pulp while maintaining the vital apical pulp and its blood supply. This biologically conservative approach preserves tooth vitality and allows continued root maturation when applicable.", "answer": "B"}, {"id": 10, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 110, "question": "What is the rationale for using calcium hydroxide as an inter-appointment medicament in endodontic therapy?", "options": [{"letter": "A", "text": "Its rapid-setting properties allow quick restoration"}, {"letter": "B", "text": "Its high radiopacity aids in visualization on radiographs"}, {"letter": "C", "text": "Its antimicrobial properties, alkaline pH, and ability to dissolve necrotic tissue between appointments"}, {"letter": "D", "text": "Its ability to permanently fill the root canal system"}], "correctAnswer": "C", "explanation": "Calcium hydroxide's alkaline pH (12.5) creates an antimicrobial environment, promotes healing, neutralizes bacterial lipopolysaccharides, and dissolves necrotic tissue and bacteria. Its use as an inter-appointment medicament significantly reduces bacterial counts and improves treatment outcomes.", "answer": "C"}, {"id": 11, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 111, "question": "In the treatment of internal root resorption, what is the critical factor that determines treatment success?", "options": [{"letter": "A", "text": "Use of the largest possible file size"}, {"letter": "B", "text": "Early diagnosis and prompt intervention before extensive resorptive process"}, {"letter": "C", "text": "Extraction and replacement with an implant"}, {"letter": "D", "text": "Use of calcium hydroxide alone without instrumentation"}], "correctAnswer": "B", "explanation": "Early diagnosis and prompt treatment before the resorptive process becomes extensive is the critical factor in managing internal resorption. Once the resorptive process extends deep into the dentin, the prognosis becomes poor. Early intervention with complete pulp removal stops the resorptive process.", "answer": "B"}, {"id": 12, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 112, "question": "Which endodontic surgical technique involves removing the apical 3 mm of the root tip along with the periapical granulation tissue?", "options": [{"letter": "A", "text": "Apicoectomy"}, {"letter": "B", "text": "Apical curettage"}, {"letter": "C", "text": "Hemisection"}, {"letter": "D", "text": "Intentional replantation"}], "correctAnswer": "A", "explanation": "Apicoectomy is the surgical removal of the apical 3-4 mm of the root tip, which eliminates the apical delta, lateral canals, and associated periapical pathology. This is typically combined with retrograde obturation and is the standard surgical approach in endodontic therapy.", "answer": "A"}, {"id": 13, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 113, "question": "In retreatment cases, what is the primary challenge in removing previously placed gutta-percha obturation?", "options": [{"letter": "A", "text": "Gutta-percha is radioopaque and cannot be visualized"}, {"letter": "B", "text": "Gutta-percha has no medicinal benefit and must be completely removed"}, {"letter": "C", "text": "Gutta-percha removal risk stripping lateral canals and perforating the canal wall due to aggressive removal techniques"}, {"letter": "D", "text": "Gutta-percha is biocompatible and should never be removed"}], "correctAnswer": "C", "explanation": "During retreatment, aggressive removal of gutta-percha can risk stripping the canal walls, creating ledges, perforations, or zips. Careful technique using appropriate instruments and solvents is required to safely remove gutta-percha while preserving canal anatomy and avoiding iatrogenic damage.", "answer": "C"}, {"id": 14, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 114, "question": "What percentage of endodontically treated teeth can be expected to have a successful outcome when proper treatment protocols are followed?", "options": [{"letter": "A", "text": "60-70%"}, {"letter": "B", "text": "75-80%"}, {"letter": "C", "text": "85-95%"}, {"letter": "D", "text": "100%"}], "correctAnswer": "C", "explanation": "When proper endodontic treatment protocols are followed, including adequate access, instrumentation, obturation, and coronal restoration, success rates of 85-95% can be achieved. Failures are typically related to inadequate coronal seal, anatomical challenges, or periapical pathology.", "answer": "C"}, {"id": 15, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 115, "question": "In the management of periapical abscess with systemic symptoms, what is the appropriate initial treatment approach?", "options": [{"letter": "A", "text": "Immediate referral for extraction"}, {"letter": "B", "text": "Immediate antibiotic therapy without any local treatment"}, {"letter": "C", "text": "Establishment of drainage through pulp space access with appropriate antibiotic therapy if indicated"}, {"letter": "D", "text": "Observation and supportive care alone"}], "correctAnswer": "C", "explanation": "Drainage establishment through pulp space access is critical for acute periapical abscess management. This relieves pressure, reduces pain, and eliminates a significant source of bacterial toxins and inflammatory mediators. Antibiotics are secondary to drainage establishment and proper endodontic treatment.", "answer": "C"}, {"id": 16, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 116, "question": "When internal bleaching is performed on a discolored endodontically treated tooth, which bleaching agent is most commonly used and considered safe?", "options": [{"letter": "A", "text": "Hydrogen peroxide 30% with heat"}, {"letter": "B", "text": "Sodium perborate combined with water or hydrogen peroxide"}, {"letter": "C", "text": "Chlorine-based bleaching agents"}, {"letter": "D", "text": "Potassium permanganate"}], "correctAnswer": "B", "explanation": "Sodium perborate is the most commonly used and recommended agent for internal bleaching of endodontically treated teeth due to its effectiveness, safety profile, and low risk of external cervical resorption. It is typically mixed with water or hydrogen peroxide to create a paste.", "answer": "B"}, {"id": 17, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 117, "question": "Which restorative material provides the best adaptation and retention for endodontically treated teeth, particularly when significant coronal structure is lost?", "options": [{"letter": "A", "text": "Direct resin composite only"}, {"letter": "B", "text": "Amalgam restoration"}, {"letter": "C", "text": "Post-and-core foundation with final crown restoration"}, {"letter": "D", "text": "Temporary restoration with zinc oxide eugenol"}], "correctAnswer": "C", "explanation": "For endodontically treated teeth with significant coronal loss, a post-and-core foundation system provides optimal support, retention, and longevity. This approach improves fracture resistance and allows for fabrication of a definitive full-coverage restoration that seals and protects the treated tooth.", "answer": "C"}, {"id": 18, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 118, "question": "In regenerative endodontic procedures, what is the primary mechanism by which tissue revitalization occurs?", "options": [{"letter": "A", "text": "Gutta-percha placement induces new root formation"}, {"letter": "B", "text": "Stem cells from the periapical region migrate into the disinfected canal space and differentiate to form new tissues"}, {"letter": "C", "text": "Calcium hydroxide alone stimulates complete pulp regeneration"}, {"letter": "D", "text": "Complete pulpectomy eliminates the need for follow-up care"}], "correctAnswer": "B", "explanation": "Regenerative endodontic procedures exploit the body's ability to recruit mesenchymal stem cells from the periapical region into a disinfected root canal space. These cells differentiate and proliferate to form new tissues including dentin-like and cementum-like structures, representing a paradigm shift toward biological rather than mechanical treatment.", "answer": "B"}, {"id": 19, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 119, "question": "What is the significance of apical patency in endodontic treatment protocols?", "options": [{"letter": "A", "text": "It increases the risk of apical extrusion"}, {"letter": "B", "text": "It maintains an open pathway for removal of necrotic tissue and bacteria during instrumentation"}, {"letter": "C", "text": "It prevents adequate obturation and sealing"}, {"letter": "D", "text": "It is not relevant to treatment success"}], "correctAnswer": "B", "explanation": "Maintaining apical patency during instrumentation keeps the apical foramen open, allowing continuous removal of necrotic debris and bacteria from the apical region. This approach has been shown to reduce intracanal bacteria and improve treatment outcomes when combined with proper obturation techniques.", "answer": "B"}, {"id": 20, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 120, "question": "In the management of ledge formation during instrumentation, what is the recommended treatment approach?", "options": [{"letter": "A", "text": "Immediate file separation and extraction of the tooth"}, {"letter": "B", "text": "Careful use of ultrasonic instruments and larger files to bypass the ledge under heavy pressure"}, {"letter": "C", "text": "Conservative approach with glide path re-establishment and gradual progression with flexible instruments"}, {"letter": "D", "text": "Coronal restoration without addressing the ledge"}], "correctAnswer": "C", "explanation": "When a ledge is encountered, the conservative approach involves establishing a new glide path and gradually progressing with flexible instruments to negotiate around the ledge. Aggressive techniques risk perforation. With careful technique, most ledges can be bypassed and the apical region successfully instrumented.", "answer": "C"}, {"id": 21, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 121, "question": "Which anesthetic agent is most commonly used in endodontic procedures and why?", "options": [{"letter": "A", "text": "Procaine due to its rapid onset"}, {"letter": "B", "text": "Lidocaine for its rapid onset, duration, and low toxicity profile"}, {"letter": "C", "text": "Prilocaine for superior pulpal penetration"}, {"letter": "D", "text": "Articaine exclusively for all endodontic cases"}], "correctAnswer": "B", "explanation": "Lidocaine remains the most commonly used local anesthetic in endodontics due to its rapid onset of action (3-5 minutes), adequate duration (30-60 minutes), good diffusion characteristics, and low systemic toxicity. It provides effective pulpal anesthesia for endodontic procedures at 2% concentration with or without vasoconstrictors.", "answer": "B"}, {"id": 22, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 122, "question": "What is the primary disadvantage of using zinc oxide eugenol-based sealers in endodontic obturation?", "options": [{"letter": "A", "text": "Superior marginal adaptation"}, {"letter": "B", "text": "Limited biocompatibility and potential cytotoxicity when extravasated periapically"}, {"letter": "C", "text": "Ease of application"}, {"letter": "D", "text": "Enhanced antimicrobial properties"}], "correctAnswer": "B", "explanation": "ZOE-based sealers, while traditional and readily available, have limitations including potential cytotoxicity if extruded beyond the apex, possible allergic reactions, limited resorption, and less effective sealing compared to modern resin-based sealers. They are being progressively replaced by more biocompatible materials.", "answer": "B"}, {"id": 23, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 123, "question": "In the context of pulp disease classification, which diagnosis represents irreversible pulp inflammation with necrosis in progress?", "options": [{"letter": "A", "text": "Reversible pulpitis"}, {"letter": "B", "text": "Acute irreversible pulpitis"}, {"letter": "C", "text": "Pulp necrosis"}, {"letter": "D", "text": "Internal resorption"}], "correctAnswer": "C", "explanation": "Pulp necrosis represents complete death of the pulp tissue. This is an irreversible condition where the inflammatory process has progressed to tissue death. Clinical findings may include negative vitality tests, absence of response to thermal or electric stimulus, and periapical pathology findings on radiographs.", "answer": "C"}, {"id": 24, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 124, "question": "Which procedural error during endodontic treatment results in enlargement and transportation of the apical foramen?", "options": [{"letter": "A", "text": "Insufficient glide path preparation"}, {"letter": "B", "text": "Over-instrumentation beyond the working length and foramen"}, {"letter": "C", "text": "Inadequate irrigation"}, {"letter": "D", "text": "Failure to achieve patency"}], "correctAnswer": "B", "explanation": "Over-instrumentation beyond the apical foramen causes enlargement and transportation of the apical anatomy. This compromises the apical seal, increases periapical irritation, and reduces long-term prognosis. Strict adherence to working length and careful apical control is essential to prevent this complication.", "answer": "B"}, {"id": 25, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 125, "question": "What is the primary indication for intentional replantation in endodontic treatment?", "options": [{"letter": "A", "text": "Routine treatment of vital teeth"}, {"letter": "B", "text": "Management of teeth with failed endodontic treatment and inaccessible apical pathology in which surgical access is compromised"}, {"letter": "C", "text": "Extraction and immediate implant placement"}, {"letter": "D", "text": "Treatment of mobile teeth with advanced periodontitis"}], "correctAnswer": "B", "explanation": "Intentional replantation is indicated for management of failed endodontic treatment when the apical pathology is inaccessible through conventional surgical approach or when surgical conditions are compromised. The tooth is extracted, treated endodontically ex vivo, and replanted, serving as an alternative to implant placement.", "answer": "B"}, {"id": 26, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 126, "question": "In terms of canal anatomy, what percentage of mandibular second molars exhibit a variable number of roots and canals?", "options": [{"letter": "A", "text": "Less than 20%"}, {"letter": "B", "text": "20-40%"}, {"letter": "C", "text": "40-60%"}, {"letter": "D", "text": "Over 80%"}], "correctAnswer": "C", "explanation": "Mandibular second molars demonstrate significant anatomical variation, with 40-60% exhibiting variable root and canal anatomy. This variability requires careful assessment of preoperative radiographs from multiple angles, CBCT imaging when indicated, and systematic exploration of the pulp chamber to identify all canals.", "answer": "C"}, {"id": 27, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 127, "question": "Which complication is most commonly associated with excessive apical pressure during lateral condensation of gutta-percha?", "options": [{"letter": "A", "text": "Under-obturation with voids at working length"}, {"letter": "B", "text": "Extrusion of obturation material and sealer beyond the apical foramen"}, {"letter": "C", "text": "Inadequate obturation of lateral canals"}, {"letter": "D", "text": "Inability to achieve working length"}], "correctAnswer": "B", "explanation": "Excessive apical pressure during lateral condensation can force gutta-percha and sealer beyond the apical foramen, causing periapical inflammation and adverse effects on healing. Proper technique requires controlled apical pressure to achieve adequate seal while maintaining material within the root canal system.", "answer": "B"}, {"id": 28, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 128, "question": "In the management of infected immature permanent teeth with necrotic pulps, what treatment approach preserves root maturation potential?", "options": [{"letter": "A", "text": "Extraction and implant placement"}, {"letter": "B", "text": "Conventional pulpectomy with warm gutta-percha"}, {"letter": "C", "text": "Apexification or regenerative procedures to allow root development and formation of apical closure"}, {"letter": "D", "text": "Immediate surgical apicoectomy"}], "correctAnswer": "C", "explanation": "In necrotic immature teeth, apexification with calcium hydroxide or modern regenerative endodontic procedures preserve the potential for continued root development. These approaches maintain the tooth's natural structure and function while allowing apical closure formation, superior to conventional obturation alone.", "answer": "C"}, {"id": 29, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 129, "question": "What is the recommended irrigant sequence for optimal cleaning and final preparation of the root canal system?", "options": [{"letter": "A", "text": "NaOCl throughout, followed by saline"}, {"letter": "B", "text": "NaOCl for cleaning, followed by EDTA for dentin removal, and final NaOCl rinse"}, {"letter": "C", "text": "Chlorhexidine alone"}, {"letter": "D", "text": "Saline solution exclusively"}], "correctAnswer": "B", "explanation": "The optimal sequence involves NaOCl for organic tissue dissolution and antimicrobial action, followed by EDTA to remove the smear layer and expose tubule orifices, with a final NaOCl rinse to remove EDTA and remaining bacteria. This sequence optimizes both cleaning and preparation for obturation.", "answer": "B"}, {"id": 30, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 130, "question": "Which type of periapical pathology typically requires surgical intervention when endodontic therapy fails to resolve the lesion?", "options": [{"letter": "A", "text": "Small asymptomatic periapical granulomas"}, {"letter": "B", "text": "Large cysts or lesions with expansion or symptoms refractory to nonsurgical treatment"}, {"letter": "C", "text": "All periapical lesions regardless of size"}, {"letter": "D", "text": "Lesions that resolve within 6-12 months"}], "correctAnswer": "B", "explanation": "Surgical intervention is indicated for large cystic lesions, lesions causing bone expansion, symptoms refractory to endodontic treatment, or lesions that fail to resolve within 1-2 years of nonsurgical therapy. Many smaller lesions resolve with proper endodontic treatment alone.", "answer": "B"}, {"id": 31, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 131, "question": "In the treatment of external cervical resorption, what is the critical treatment timing consideration?", "options": [{"letter": "A", "text": "Treatment can be delayed indefinitely"}, {"letter": "B", "text": "Early diagnosis and intervention are critical to prevent progression into the root canal system"}, {"letter": "C", "text": "Only surgical extraction is effective"}, {"letter": "D", "text": "Treatment is only necessary if the tooth is symptomatic"}], "correctAnswer": "B", "explanation": "External cervical resorption requires early diagnosis and prompt intervention before the resorptive process extends into the root canal system. Early treatment with mechanical removal of resorptive tissue and restoration with glass ionomer or composite can halt the process. Delayed treatment reduces salvageability of the tooth.", "answer": "B"}, {"id": 32, "chapter": 8, "chapterTitle": "Treatment of Pulpal and Periapical Disease", "number": 132, "question": "What is the primary rationale for complete coronal coverage restoration following endodontic treatment?", "options": [{"letter": "A", "text": "Esthetic enhancement only"}, {"letter": "B", "text": "Prevention of bacterial contamination and reinfection of the obturation"}, {"letter": "C", "text": "Enhancement of retention for the endodontic obturation"}, {"letter": "D", "text": "Elimination of the need for follow-up radiographs"}], "correctAnswer": "B", "explanation": "Complete coronal coverage is essential to prevent bacterial microleakage and recontamination of the root canal system. Studies show that even small gaps in coronal restoration can allow bacterial penetration and compromise the endodontic seal. A proper coronal seal is as critical as the apical seal for long-term success.", "answer": "
