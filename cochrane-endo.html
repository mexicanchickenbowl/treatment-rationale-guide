<style>
  /* Page-specific rules for cochrane-endo. Shared tokens/components live in
     /assets/theme.css. */

  /* Category colors */
  .cat-treatment       { background: var(--color-primary-weak); color: var(--color-primary);         border-color: var(--color-primary-ring); }
  .cat-disinfection    { background: color-mix(in srgb, #c2410c 10%, var(--color-surface)); color: #c2410c; border-color: color-mix(in srgb, #c2410c 25%, transparent); }
  .cat-materials       { background: var(--color-success-weak); color: var(--color-success-strong);  border-color: color-mix(in srgb, var(--color-success) 25%, transparent); }
  .cat-restoration     { background: color-mix(in srgb, #7c3aed 10%, var(--color-surface)); color: #7c3aed; border-color: color-mix(in srgb, #7c3aed 25%, transparent); }
  .cat-pulp            { background: var(--color-warning-weak); color: var(--color-warning-strong);  border-color: color-mix(in srgb, var(--color-warning) 25%, transparent); }
  .cat-trauma          { background: var(--color-info-weak);    color: var(--color-info);            border-color: var(--color-info-ring); }
  .cat-instrumentation { background: var(--color-surface-2);    color: var(--color-text-muted);      border-color: var(--color-border); }

  /* Cochrane badge */
  .cochrane-badge { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.22rem 0.65rem; border-radius: var(--radius-full); font-size: var(--fs-xs); font-weight: var(--fw-bold); letter-spacing: 0.03em; background: var(--color-info-weak); color: var(--color-info); border: 1px solid var(--color-info-ring); }

  /* Status badges */
  .badge-current   { background: var(--color-success-weak); color: var(--color-success-strong); border: 1px solid color-mix(in srgb, var(--color-success) 30%, transparent); }
  .badge-updated   { background: var(--color-warning-weak); color: var(--color-warning-strong); border: 1px solid color-mix(in srgb, var(--color-warning) 35%, transparent); }
  .badge-withdrawn { background: var(--color-danger-weak);  color: var(--color-danger-strong);  border: 1px solid color-mix(in srgb, var(--color-danger) 35%, transparent); }

  /* Category dot colors */
  .dot-treatment       { background: var(--color-primary); }
  .dot-disinfection    { background: #c2410c; }
  .dot-materials       { background: var(--color-success); }
  .dot-restoration     { background: #7c3aed; }
  .dot-pulp            { background: var(--color-warning); }
  .dot-trauma          { background: var(--color-info); }
  .dot-instrumentation { background: var(--color-text-muted); }

  /* Cochrane-specific review-card colors (override theme defaults) */
  .review-year  { color: var(--color-info); }
  .review-title { color: var(--color-text); }
  .verdict-box  {
    background: linear-gradient(135deg,
                color-mix(in srgb, var(--color-info-weak) 85%, transparent),
                color-mix(in srgb, var(--color-info-ring) 25%, transparent));
    border: 1px solid var(--color-info-ring);
    border-left: 4px solid var(--color-info);
  }

  /* Cochrane header banner */
  .cochrane-banner {
    background: linear-gradient(135deg, var(--color-info-strong) 0%, var(--color-info) 100%);
    color: #fff;
    padding: 1.5rem 1.75rem;
  }

  /* Article no badge */
  .art-no { font-size: 0.7rem; font-family: var(--font-mono); background: var(--color-surface-2); color: var(--color-text-muted); border: 1px solid var(--color-border); border-radius: 4px; padding: 0.15rem 0.45rem; }
</style>

<script type="text/babel" data-presets="react">

const CATEGORIES = {
  "treatment":      { label: "Treatment outcomes",   dotClass: "dot-treatment",    catClass: "cat-treatment" },

  "restoration":    { label: "Restoration",           dotClass: "dot-restoration",  catClass: "cat-restoration" },
  "pulp":           { label: "Pulp treatment",        dotClass: "dot-pulp",         catClass: "cat-pulp" },
  "trauma":         { label: "Traumatic injuries",    dotClass: "dot-trauma",       catClass: "cat-trauma" },
  "instrumentation":{ label: "Instrumentation",       dotClass: "dot-instrumentation", catClass: "cat-instrumentation" },
};

// status: "current" | "updated" (a newer version exists, this is historical) | "withdrawn"
const REVIEWS = [
  {
    id: "single-multi-2007",
    year: 2007,
    title: "Single versus multiple visits for endodontic treatment of permanent teeth",
    shortTitle: "Single vs multi-visit RCT (pub2)",
    authors: "Figini L, Lodi G, Gorni F, Gagliani M",

    artNo: "CD005296",
    pubVersion: "pub2",
    pmid: "18718362",
    doi: "10.1002/14651858.CD005296.pub2",
    category: "treatment",
    status: "updated",
    verdict: "First Cochrane synthesis on this question: no statistically significant difference in outcome between single- and multiple-visit root canal treatment of vital or non-vital teeth. Quality of evidence was low.",
  },
  {
    id: "posts-2007",
    year: 2007,
    title: "Root canal posts for the restoration of root-filled teeth",
    shortTitle: "Root canal posts",
    authors: "Bolla M, Muller-Bolla M, Borg C, et al.",
    journal: "Cochrane Database Syst Rev",
    artNo: "CD004623",
    pubVersion: "pub2",
    pmid: "17253516",

    category: "restoration",
    status: "withdrawn",

    id: "instrumentation-2007",
    year: 2007,

    authors: "Sequeira P, et al.",
    journal: "Cochrane Database Syst Rev",

    pubVersion: "pub2",

    status: "withdrawn",
    verdict: "Insufficient evidence to confirm that ultrasonic instrumentation is clinically superior to hand instrumentation for root canal shaping or treatment outcomes. Withdrawn (2019) due to low usage and resource constraints.",
  },
  {
    id: "irrigants-2012",
    year: 2012,
    title: "Irrigants for non-surgical root canal treatment in mature permanent teeth",
    shortTitle: "Irrigants for non-surgical RCT",
    authors: "Fedorowicz Z, Nasser M, Sequeira-Byron P, de Souza RF, Carter B, Heft M",
    journal: "Cochrane Database Syst Rev",
    artNo: "CD008948",

  },
  {
    id: "root-fracture-2012",
    year: 2012,
    title: "Interventions for treating traumatised permanent front teeth: root fracture",
    shortTitle: "TDI: root fracture",
    authors: "Al-Hennawi D, Day P, Duggal M",
    journal: "Cochrane Database Syst Rev",
    artNo: "CD005408",
    pubVersion: "pub2",
    pmid: null,
    doi: "10.1002/14651858.CD005408.pub2",
    category: "trauma",
    status: "current",
    verdict: "No RCTs were identified. Evidence regarding optimal management (splinting duration, endodontic intervention timing) of horizontal/oblique root fractures is entirely absent from the clinical trial literature; clinical guidelines rest on case series and expert opinion.",
  },
  {
    id: "luxated-2013",
    year: 2013,
    title: "Interventions for treating traumatised permanent front teeth: luxated teeth",
    shortTitle: "TDI: luxated teeth",
    authors: "Belmonte FM, Flores MT, Andersson L, Cohenca N",
    journal: "Cochrane Database Syst Rev",
    artNo: "CD006203",
    pubVersion: "pub2",
    pmid: "23633334",
    doi: "10.1002/14651858.CD006203.pub2",
    category: "trauma",
    status: "current",
    verdict: "No RCTs were identified for any intervention to treat intruded, extruded, or laterally luxated permanent front teeth. Current clinical guidelines rest entirely on case series and expert opinion.",
  },
  {
    id: "crowns-2015",
    year: 2015,
    title: "Single crowns versus conventional fillings for the restoration of root-filled teeth",
    shortTitle: "Crowns vs fillings for root-filled teeth",

    journal: "Cochrane Database Syst Rev",
    artNo: "CD009109",

    verdict: "Only one study met inclusion criteria; evidence is insufficient to determine whether root-filled teeth are better restored with a crown or a direct filling. The comparative clinical performance of the two options remains clinically unknown.",
  },
  {
    id: "ankylosis-2015",
    year: 2015,
    title: "Interventions for treating traumatised ankylosed permanent front teeth",
    shortTitle: "TDI: ankylosed teeth",
    authors: "de Souza RF, Travess H, Newton T, Marchesan MA",

    artNo: "CD007820",

    authors: "Smail-Faugeron V, Glenny A-M, Courson F, Durieux P, Muller-Bolla M, Fron Chabouis H",
    journal: "Cochrane Database Syst Rev",
    artNo: "CD003220",
    pubVersion: "pub3",
    pmid: "29852056",
    doi: "10.1002/14651858.CD003220.pub3",
    category: "pulp",
    status: "current",
    verdict: "Pulp treatment for extensive caries in primary teeth is generally successful across techniques; 87 included trials with 125 comparisons showed low failure proportions. Evidence quality was low-to-moderate; no single technique or medicament was clearly superior to others.",
  },
  {
    id: "avulsed-2019",
    year: 2019,
    title: "Interventions for treating traumatised permanent front teeth: avulsed and replanted",
    shortTitle: "TDI: avulsed & replanted",
    authors: "Day PF, Duggal M, Nazzal H",
    journal: "Cochrane Database Syst Rev",
    artNo: "CD006542",
    pubVersion: "pub3",
    pmid: "30720860",
    doi: "10.1002/14651858.CD006542.pub3",
    category: "trauma",
    status: "current",
    verdict: "Insufficient evidence (4 studies, 183 participants, 257 teeth) to support or refute the effectiveness of specific interventions for replanted avulsed permanent incisors. Evidence quality was very low; existing guidelines rely mainly on expert opinion and case series.",
  },
  {
    id: "retrograde-2021",
    year: 2021,
    title: "Materials for retrograde filling in root canal therapy",
    shortTitle: "Retrograde filling materials",
    authors: "Li H, Guo Z, Li C, Ma X, Wang Y, Zhou X, Johnson TM, Huang D",
    journal: "Cochrane Database Syst Rev",
    artNo: "CD005517",
    pubVersion: "pub3",
    pmid: "34647617",
    doi: "10.1002/14651858.CD005517.pub3",
    category: "materials",
    status: "current",
    verdict: "Based on 8 high-risk-of-bias studies (1,399 participants, 1,471 teeth): insufficient evidence to conclude that any one retrograde filling material (MTA, IRM, Super-EBA, etc.) is superior. More high-quality RCTs are urgently needed.",
  },
  {
    id: "single-multi-2022",
    year: 2022,
    title: "Single versus multiple visits for endodontic treatment of permanent teeth",

  },
  {
    id: "antibiotics-2024",
    year: 2024,
    title: "Systemic antibiotics for symptomatic apical periodontitis and acute apical abscess in adults",
    shortTitle: "Systemic antibiotics for apical periodontitis",
    authors: "Cope AL, Francis N, Wood F, Thompson W, Chestnutt IG",
    journal: "Cochrane Database Syst Rev",
    artNo: "CD010136",
    pubVersion: "pub4",
    pmid: "38712714",
    doi: "10.1002/14651858.CD010136.pub4",
    category: "disinfection",
    status: "current",
    verdict: "Evidence is very uncertain about antibiotic benefit; preoperative clindamycin results in little to no difference in pain or swelling when combined with chemo-mechanical debridement. Antibiotics should not routinely substitute for — or supplement — endodontic treatment in otherwise healthy adults.",
  },
];

const STATUS_LABELS = { current: "Current", updated: "Superseded", withdrawn: "Withdrawn" };
const STATUS_CLASSES = { current: "badge-current", updated: "badge-updated", withdrawn: "badge-withdrawn" };

function CategoryPill({ category }) {
  const def = CATEGORIES[category];
  return <span className={`cochrane-badge ${def.catClass}`}>{def.label}</span>;
}

function ReviewCard({ review, cardRef, flash }) {
  const pubmedUrl = review.pmid ? `https://pubmed.ncbi.nlm.nih.gov/${review.pmid}/` : null;
  const cochraneUrl = `https://doi.org/${review.doi}`;
  const isWithdrawn = review.status === "withdrawn";

  return (
    <div ref={cardRef} className={`review-card ${flash ? "flash" : ""} ${isWithdrawn ? "opacity-70" : ""}`}>
      <div className="flex items-start justify-between gap-3 flex-wrap">
        <div className="flex-1 min-w-0">
          <div className="flex items-center gap-2 flex-wrap">
            <span className="review-year">{review.year}</span>
            <span className={`cochrane-badge text-[0.65rem] font-bold px-2 py-0.5 ${STATUS_CLASSES[review.status]}`}>
              {STATUS_LABELS[review.status]}
            </span>
          </div>
          <div className="review-title">{review.title}</div>
          <div className="review-authors mt-0.5">{review.authors} · <em>{review.journal}</em></div>
          <div className="flex items-center gap-2 mt-1.5 flex-wrap">
            <CategoryPill category={review.category} />
            <span className="art-no">{review.artNo}.{review.pubVersion}</span>
            {pubmedUrl && (
              <a href={pubmedUrl} target="_blank" rel="noopener noreferrer"
                 className="text-[0.72rem] font-semibold text-sky-600 hover:text-sky-800 hover:underline">
                PubMed ↗
              </a>
            )}
            <a href={cochraneUrl} target="_blank" rel="noopener noreferrer"
               className="text-[0.72rem] font-semibold text-sky-600 hover:text-sky-800 hover:underline">
              Cochrane ↗
            </a>
          </div>
        </div>
      </div>
      <div className="verdict-box">
        <div className="verdict-label">Cochrane verdict</div>
        <p className="verdict-text">{review.verdict}</p>
      </div>
    </div>
  );
}

function TimelineRail({ reviews, onDotClick }) {
  const years = reviews.map(r => r.year);
  const minY = Math.min(...years, 2005);
  const maxY = Math.max(...years, 2026);
  const span = maxY - minY;
  const pctFor = y => ((y - minY) / span) * 100;

  const ticks = [];
  for (let y = Math.ceil(minY / 5) * 5; y <= maxY; y += 5) ticks.push(y);

  const yearCount = {};
  const byReview = reviews.map((r, i) => {
    const k = r.year;
    yearCount[k] = (yearCount[k] || 0) + 1;
    return { ...r, _idx: i, _stackIndex: yearCount[k] - 1 };
  });

  const catDef = CATEGORIES;

  return (
    <div className="rail-wrap">
      <div className="rail" style={{ minWidth: Math.max(700, reviews.length * 55) + "px" }}>
        <div className="rail-line" />
        {ticks.map((y, i) => (
          <React.Fragment key={"tick"+i}>
            <div className="rail-tick" style={{ left: pctFor(y) + "%" }} />
            <div className="rail-tick-label" style={{ left: pctFor(y) + "%" }}>{y}</div>
          </React.Fragment>
        ))}
        {byReview.map((r) => (
          <button
            key={r.id}
            type="button"
            onClick={() => onDotClick(r._idx)}
            title={`${r.year} · ${r.shortTitle}`}
            className={`rail-dot ${catDef[r.category].dotClass} ${r.status === "withdrawn" ? "rail-dot-withdrawn" : ""}`}
            style={{ left: pctFor(r.year) + "%", marginTop: (r._stackIndex * 14) + "px" }}
          />
        ))}
      </div>
    </div>
  );
}

function CochraneApp() {
  const [catFilter, setCatFilter] = useState("all");
  const [flashIdx, setFlashIdx] = useState(null);
  const [showWithdrawn, setShowWithdrawn] = useState(false);
  const cardRefs = useRef([]);

  const sorted = useMemo(() => [...REVIEWS].sort((a, b) => a.year - b.year), []);

  const filtered = useMemo(() => {
    let list = sorted;
    if (!showWithdrawn) list = list.filter(r => r.status !== "withdrawn");
    if (catFilter !== "all") list = list.filter(r => r.category === catFilter);
    return list;
  }, [sorted, catFilter, showWithdrawn]);

  const handleDotClick = useCallback((idx) => {
    const el = cardRefs.current[idx];
    if (el) el.scrollIntoView({ behavior: "smooth", block: "center" });
    setFlashIdx(idx);
    setTimeout(() => setFlashIdx(null), 1300);
  }, []);

  const currentCount = sorted.filter(r => r.status === "current").length;

  return (
    <div className="flex flex-col flex-1 min-h-0">
      {/* Header */}
      <header className="bg-white border-b shadow-sm shrink-0">
        <div className="flex items-center justify-between px-3 md:px-5 h-14">
          <div className="flex items-center gap-3 min-w-0">
            <div className="cochrane-badge text-sm font-bold px-3 py-1">Cochrane</div>
            <span className="font-bold text-slate-700 text-sm tracking-tight">Endodontics Evidence</span>
            <span className="text-slate-300 hidden sm:inline">·</span>
            <span className="text-slate-500 text-xs hidden sm:inline">{currentCount} current reviews · {sorted.length} total</span>
          </div>
          <div className="flex items-center gap-3">
            <a href="endo-debates.html" className="text-xs font-semibold text-sky-600 hover:text-sky-800 hover:underline shrink-0">Endo Debates →</a>
            <a href="endo-guide.html" className="text-xs font-semibold text-indigo-600 hover:text-indigo-800 hover:underline shrink-0">← Endo Guide</a>
          </div>
        </div>
      </header>

      {/* Banner */}
      <div className="cochrane-banner">
        <div className="max-w-3xl">
          <h1 className="text-xl font-bold mb-1">Cochrane Systematic Reviews in Endodontics</h1>
          <p className="text-sky-200 text-sm leading-relaxed">
            All published Cochrane reviews covering root canal treatment, pulp therapy, traumatic dental injuries,
            irrigants, materials, and restoration of root-filled teeth — displayed as a chronological evidence timeline.
            The striking recurring theme: <strong className="text-white">most areas of endodontics lack adequate RCT-level evidence</strong>, and clinical guidelines remain largely opinion-based.
          </p>
        </div>
      </div>

      {/* Main content */}
      <main className="flex-1 max-w-4xl w-full mx-auto px-4 py-6">

        {/* Filter controls */}
        <div className="flex flex-wrap gap-2 mb-5 items-center">
          <button
            className={`chip ${catFilter === "all" ? "chip-active" : ""}`}
            onClick={() => setCatFilter("all")}
          >All categories</button>
          {Object.entries(CATEGORIES).map(([k, v]) => (
            <button
              key={k}
              className={`chip ${catFilter === k ? "chip-active" : ""}`}
              onClick={() => setCatFilter(catFilter === k ? "all" : k)}
            >{v.label}</button>
          ))}
          <label className="flex items-center gap-1.5 cursor-pointer ml-auto">
            <input
              type="checkbox"
              checked={showWithdrawn}
              onChange={e => setShowWithdrawn(e.target.checked)}
              className="rounded"
            />
            <span className="text-xs text-slate-500">Show withdrawn reviews</span>
          </label>
        </div>

        {/* Timeline rail */}
        <div className="bg-white border border-slate-200 rounded-xl mb-5 overflow-hidden">
          <div className="px-4 pt-3 pb-0">
            <div className="text-[10px] font-bold uppercase tracking-widest text-slate-400 mb-0.5">Timeline — click a dot to jump to review</div>
          </div>
          <TimelineRail reviews={filtered} onDotClick={handleDotClick} />
          <div className="legend px-4 pb-3">
            {Object.entries(CATEGORIES).map(([k, v]) => (
              <span key={k}>
                <span className={`legend-dot ${v.dotClass}`} style={{ display: "inline-block" }}></span>
                {v.label}
              </span>
            ))}
          </div>
        </div>

        {/* Review cards */}
        <div>
          {filtered.length === 0 && (
            <div className="text-center text-slate-400 text-sm py-10">No reviews match this filter.</div>
          )}
          {filtered.map((review, i) => (
            <ReviewCard
              key={review.id}
              review={review}
              cardRef={el => (cardRefs.current[i] = el)}
              flash={flashIdx === i}
            />
          ))}
        </div>

        {/* Footer note */}
        <div className="mt-8 p-4 bg-sky-50 border border-sky-200 rounded-xl text-xs text-sky-800 leading-relaxed">
