name: Rebuild artifacts

# When the worker commits endo-guide.md (or anything else feeding into build.py)
# this action runs build.py and commits the regenerated HTML / JSON back to main
# so GitHub Pages serves the up-to-date render.

on:
  push:
    branches: [main]
    paths:
      - 'endo-guide.md'
      - 'endo-guide.template.html'
      - 'build.py'
      - 'abstracts.json'
      - 'suggestions.json'
      - 'site-config.json'

permissions:
  contents: write

concurrency:
  group: rebuild-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Build
        run: python build.py
      - name: Commit rebuilt artifacts
        run: |
          if git diff --quiet index.html endo-guide.html guide-data.json; then
            echo "No artifact changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html endo-guide.html guide-data.json
          git commit -m "Rebuild artifacts [skip ci]

Triggered by ${{ github.event.head_commit.message }}"
          git push
