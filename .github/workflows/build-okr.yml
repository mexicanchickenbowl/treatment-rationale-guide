name: Build OKR Dashboard

on:
  push:
    branches: [main]
    paths:
      - "apps/okr-dashboard/**"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/okr-dashboard/package-lock.json

      - name: Install dependencies
        working-directory: apps/okr-dashboard
        run: npm ci

      - name: Build
        working-directory: apps/okr-dashboard
        run: npm run build

      - name: Copy dist to okr-dashboard/
        run: |
          rm -rf okr-dashboard/
          cp -r apps/okr-dashboard/dist/ okr-dashboard/

      - name: Commit built output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add okr-dashboard/
          git diff --staged --quiet || git commit -m "chore: rebuild okr-dashboard [skip ci]"
          git push
