<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Endo Rationale Guide</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  html, body { height: 100%; }
  body { font-family: 'Inter', ui-sans-serif, system-ui, -apple-system, sans-serif; }
  /* Reference pane body */
  .prose-body { font-family: 'Inter', ui-sans-serif, system-ui, sans-serif; font-size: 15.5px; line-height: 1.8; color: #1e293b; }
  .block-h3 { font-weight: 650; font-size: 0.97rem; margin-top: 1.75rem; margin-bottom: 0.5rem; color: #1e293b; border-left: 3px solid #a5b4fc; padding-left: 0.65rem; letter-spacing: -0.01em; }
  .block-h4 { font-weight: 600; font-size: 0.9rem; margin-top: 1.1rem; margin-bottom: 0.3rem; color: #475569; text-transform: uppercase; letter-spacing: 0.04em; font-size: 0.78rem; }
  .prose-body p { margin: 1rem 0; }
  .prose-body ul { list-style: disc; padding-left: 1.6rem; margin: 0.9rem 0; }
  .prose-body ol { list-style: decimal; padding-left: 1.6rem; margin: 0.9rem 0; }
  .prose-body li { margin: 0.55rem 0; line-height: 1.65; }
  .prose-body table { width: 100%; border-collapse: collapse; font-size: 0.845rem; margin: 1.5rem 0; }
  .prose-body th, .prose-body td { border: 1px solid #e2e8f0; padding: 0.6rem 0.85rem; text-align: left; vertical-align: top; line-height: 1.55; }
  .prose-body thead th { background: #eef2ff; color: #3730a3; position: sticky; top: 0; font-weight: 600; letter-spacing: 0.02em; font-size: 0.8rem; text-transform: uppercase; }
  .prose-body tbody tr:nth-child(even) { background: #f8fafc; }
  .prose-body tbody tr:hover { background: #f1f5f9; }
  .prose-body mark { background: #fde68a; padding: 0 2px; border-radius: 2px; }
  .prose-body mark.current { background: #fb923c; color: #fff; }
  .cite { color: #b45309; font-weight: 500; cursor: pointer; }
  .pct  { background: #fef08a; color: #713f12; font-weight: 600; padding: 0 3px; border-radius: 3px; cursor: pointer; }
  .cite-flagged { color: #be123c; font-weight: 600; text-decoration: underline dotted; cursor: pointer; }
  .pct-flagged  { background: #fee2e2; color: #be123c; font-weight: 600; padding: 0 3px; border-radius: 3px; text-decoration: underline dotted; cursor: pointer; }
  .quiz-select { display: inline; font-size: inherit; font-family: inherit; background: #fef9c3; border: 1.5px dashed #ca8a04; border-radius: 4px; padding: 1px 4px; cursor: pointer; color: #78350f; font-weight: 500; vertical-align: baseline; max-width: 200px; }
  .quiz-select.pct-q { background: #fef9c3; border-color: #ca8a04; color: #713f12; }
  .quiz-correct { color: #16a34a; font-weight: 600; }
  .quiz-wrong-chosen { color: #dc2626; text-decoration: line-through; }
  .sidebar a.active { background: #eef2ff; color: #4338ca; font-weight: 600; border-left: 2px solid #4338ca; padding-left: calc(0.5rem - 2px); }
  .scroll-table { overflow-x: auto; }
  kbd { font-family: ui-monospace, monospace; background: #f3f4f6; border: 1px solid #e5e7eb; border-bottom-width: 2px; border-radius: 4px; padding: 1px 5px; font-size: 0.75rem; }
  .tab-btn { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.875rem; font-weight: 500; transition: background 0.12s, color 0.12s; }
  .tab-active { background: #4338ca; color: #fff; }
  .tab-inactive { color: #64748b; }
  .tab-inactive:hover { background: #f1f5f9; color: #1e293b; }
  .question-item { list-style: none; margin-left: -1.6rem; font-weight: 650; color: #3730a3; font-size: 1rem; margin-top: 1.4rem; margin-bottom: 0.15rem; line-height: 1.5; }
  .answer-p { color: #166534; }
  /* ── annotation / edit mode ─────────────────────────────────────────────── */
  .inline-note { background:#fffbeb; border-left:3px solid #f59e0b; padding:.5rem .85rem; margin:.5rem 0; border-radius:0 6px 6px 0; font-size:.9rem; color:#78350f; line-height:1.6; position:relative; white-space:pre-wrap; word-break:break-word; }
  .inline-note-acts { position:absolute; top:.35rem; right:.4rem; display:flex; gap:.25rem; }
  .inline-note-acts button { font-size:.7rem; padding:.1rem .4rem; background:#f59e0b20; border:1px solid #f59e0b40; border-radius:4px; cursor:pointer; color:#92400e; }
  .inline-note-acts button:hover { background:#f59e0b40; }
  .add-note-btn { display:block; font-size:.73rem; color:#cbd5e1; margin:.1rem 0 .3rem; padding:.1rem .45rem; border-radius:4px; border:1px dashed transparent; cursor:pointer; background:none; transition:all .12s; }
  .add-note-btn:hover { color:#f59e0b; border-color:#f59e0b60; background:#fffbeb; }
  .note-ed { background:#fffbeb; border:1px solid #f59e0b80; border-radius:6px; padding:.5rem; margin:.4rem 0; }
  .note-ed textarea { width:100%; border:none; background:transparent; resize:vertical; font-family:inherit; font-size:.9rem; color:#78350f; outline:none; min-height:56px; line-height:1.6; }
  .note-ed-acts { display:flex; align-items:center; gap:.5rem; margin-top:.25rem; }
  .note-ed-acts .ns { font-size:.75rem; padding:.2rem .65rem; background:#f59e0b; color:#fff; border:none; border-radius:4px; cursor:pointer; font-weight:600; }
  .note-ed-acts .ns:hover { background:#d97706; }
  .note-ed-acts .nc { font-size:.75rem; padding:.2rem .55rem; background:#f1f5f9; color:#64748b; border:none; border-radius:4px; cursor:pointer; }
  .note-ed-acts .nh { font-size:.7rem; color:#94a3b8; flex:1; }
  .user-ann { cursor:default; }
  .ann-active .user-ann { cursor:pointer; outline:1px solid rgba(0,0,0,.09); outline-offset:1px; }
</style>
</head>
<body class="bg-slate-50 text-slate-800">
<div id="root"></div>
<script type="text/babel" data-presets="react">
const DATA = /*__DATA__*/null;

const { useState, useMemo, useEffect, useLayoutEffect, useRef, useCallback } = React;

// --- utilities --------------------------------------------------------------
const CITE_MARKER = /\{\{cite:\s*([^}]+?)\}\}/g;

// Matches: 84%  77.8%  84–97%  70-90%
const PCT_RE = /(\d+(?:\.\d+)?(?:[–\-]\d+(?:\.\d+)?)?)%/g;

// Extended letter chars valid in author names (covers ö, ü, ø, å, é, ñ, etc.)
const CH = `A-Za-z\\u00C0-\\u024F\\-'`;
// Optional lowercase name particle: de, van, von, du, le, la, el, den, der
const P  = `(?:(?:de|van|von|du|le|la|el|den|der)\\s+)?`;
// Core name fragment (uppercase + lowercase 2nd char required to avoid acronyms)
const NM = `${P}[A-Z][a-z][${CH}]*`;

// Pass A — author + year
// "Torabinejad et al (2009)", "Sjögren (1991)", "de Chevigny (2008)", "Low (2011)"
const PROSE_AUTHOR_YEAR_RE = new RegExp(
  `\\b(${NM}(?:(?:\\s+et\\s+al\\.?|\\s+(?:and|&)\\s+${NM}))?)`+
  `\\s*(?:\\((\\d{4})\\)|[,]?\\s*(\\d{4})(?=[;).,\\s]|$))`, "g");

// Pass B — "Name et al." without year
// "de Chevigny et al", "(Jensen et al)", "Sjögren et al found..."
const ET_AL_RE = new RegExp(`\\b${NM}\\s+et\\s+al\\.?`, "g");

// Pass C — two-name pairs without year: "Krasner and Rankow", "Calt and Serper"
const AUTHOR_PAIR_RE = new RegExp(`\\b${NM}\\s+(?:and|&)\\s+${NM}`, "g");

// Pass D — "Name - finding" table cells (lookahead; only name is colored)
// "Low - CBCT…", "de Chevigny - radiolucency…", "Sjögren - Dense fill…"
const AUTHOR_DASH_RE = new RegExp(
  `\\b${NM}(?:\\s+et\\s+al\\.?)?(?=\\s+[—–\\-]\\s)`, "g");

// Pass E — "(Name)" bare parens without year, e.g. "(Webber)"
// Lookbehind + lookahead so only the name inside is colored
const BARE_PAREN_RE = new RegExp(`(?<=\\()${NM}(?:\\s+et\\s+al\\.?)?(?=\\))`, "g");

// Pass F — "According to Name" / "per Name" attribution phrases
const ACCORDING_TO_RE = new RegExp(
  `(?<=\\b[Aa]ccording\\s+to\\s|\\b[Pp]er\\s|\\b[Bb]y\\s)${NM}`, "g");

// Pass G — "Name found/showed/demonstrated/..." reporting verbs
const REPORTING_VERB_RE = new RegExp(
  `\\b${NM}(?=\\s+(?:found|showed|demonstrated|reported|noted|observed|concluded|` +
  `suggested|determined|identified|confirmed|stated|described|revealed|showed))`, "g");

// Applies a sequence of regex passes to remaining text nodes
function applyPasses(text, passes, type = "cite") {
  let nodes = [{ t: "text", v: text }];
  for (const re of passes) {
    const next = [];
    for (const n of nodes) {
      if (n.t !== "text") { next.push(n); continue; }
      for (const n2 of splitByRegex(n.v, re, type)) next.push(n2);
    }
    nodes = next;
  }
  return nodes;
}

const AUTHOR_PASSES = [
  PROSE_AUTHOR_YEAR_RE, ET_AL_RE, AUTHOR_PAIR_RE,
  AUTHOR_DASH_RE, BARE_PAREN_RE, ACCORDING_TO_RE, REPORTING_VERB_RE,
];

// --- contexts ---------------------------------------------------------------
const QuizCtx = React.createContext({ quizMode: false, authorPool: [], pctPool: [], onAnswer: () => {} });
const FlagCtx  = React.createContext({ flagged: new Set(), toggleFlag: () => {} });

// --- annotation system -------------------------------------------------------
const ANNO_KEY    = "endo-guide.annotations.v1";
const ANNO_PWD_KEY = "endo-guide.anno-pwd";
const ANNO_SES_KEY = "endo-guide.anno-sess";
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

function loadAnnotations() {
  try { const d = JSON.parse(localStorage.getItem(ANNO_KEY) || "{}"); return { marks: d.marks || [], notes: d.notes || [] }; }
  catch { return { marks: [], notes: [] }; }
}
function saveAnnotations(d) { try { localStorage.setItem(ANNO_KEY, JSON.stringify(d)); } catch {} }

async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

const AnnotateCtx = React.createContext({
  annotateMode: false, marks: [], notes: [],
  addMark: ()=>{}, removeMark: ()=>{},
  addNote: ()=>{}, updateNote: ()=>{}, removeNote: ()=>{},
});

// Find a text range inside rootEl matching a stored mark's context + selectedText
function findMarkRange(rootEl, mark) {
  const nodes = []; let text = "";
  const wk = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {
    acceptNode: n => {
      const tag = n.parentElement?.tagName?.toLowerCase();
      return (tag === "script" || tag === "style" || tag === "option") ? NodeFilter.FILTER_SKIP : NodeFilter.FILTER_ACCEPT;
    }
  });
  let n;
  while ((n = wk.nextNode())) { nodes.push({ node: n, start: text.length }); text += n.textContent; }
  const needle = mark.contextBefore + mark.selectedText;
  const pos = text.indexOf(needle);
  const sp = pos >= 0 ? pos + mark.contextBefore.length : text.indexOf(mark.selectedText);
  if (sp < 0) return null;
  const ep = sp + mark.selectedText.length;
  let sN=null, sO=0, eN=null, eO=0;
  for (const { node, start } of nodes) {
    const end = start + node.textContent.length;
    if (!sN && sp >= start && sp < end) { sN=node; sO=sp-start; }
    if (!eN && ep > start && ep <= end) { eN=node; eO=ep-start; }
    if (sN && eN) break;
  }
  if (!sN || !eN) return null;
  try { const r = document.createRange(); r.setStart(sN,sO); r.setEnd(eN,eO); return r; } catch { return null; }
}

// Re-apply all text marks to the DOM (runs after every React render via useLayoutEffect)
function applyMarks(containerEl, marks) {
  if (!containerEl) return;
  // Unwrap existing mark spans
  for (const s of Array.from(containerEl.querySelectorAll(".user-ann"))) {
    const p = s.parentNode;
    while (s.firstChild) p.insertBefore(s.firstChild, s);
    p.removeChild(s);
    try { p.normalize(); } catch {}
  }
  // Re-apply each mark
  for (const mark of marks) {
    const sec = containerEl.querySelector(`[data-anchor="${mark.sectionId}"]`);
    if (!sec) continue;
    const range = findMarkRange(sec, mark);
    if (!range) continue;
    const sp = document.createElement("span");
    sp.className = "user-ann"; sp.dataset.annId = mark.id; sp.dataset.annType = mark.type;
    sp.style.cssText = mark.type === "highlight"
      ? `background:${mark.color};border-radius:2px;padding:0 1px`
      : `text-decoration:underline;text-decoration-color:${mark.color||"#4338ca"};text-decoration-thickness:2px`;
    try { range.surroundContents(sp); }
    catch { try { const frag = range.extractContents(); sp.appendChild(frag); range.insertNode(sp); } catch {} }
  }
}

// Long-press hook (works on mouse and touch)
function useLongPress(onLong, ms = 500) {
  const timer = useRef(null);
  const cancel = () => clearTimeout(timer.current);
  return {
    onMouseDown:  () => { timer.current = setTimeout(onLong, ms); },
    onMouseUp:    cancel,
    onMouseLeave: cancel,
    onTouchStart: (e) => { e.preventDefault(); timer.current = setTimeout(onLong, ms); },
    onTouchEnd:   cancel,
  };
}

// Colored span that can be long-pressed to flag
function FlaggableSpan({ type, text, query }) {
  const { flagged, toggleFlag } = React.useContext(FlagCtx);
  const isFlagged = flagged.has(text);
  const lp = useLongPress(() => toggleFlag(text));
  const cls = isFlagged ? (type === "cite" ? "cite-flagged" : "pct-flagged") : type;
  return (
    <span className={cls}
      title={isFlagged ? "Flagged — long-press to unflag" : "Long-press to flag as weak"}
      {...lp}>
      {highlight(text, query)}
    </span>
  );
}

// Inline quiz dropdown
function QuizSpan({ type, correct, pool }) {
  const { onAnswer } = React.useContext(QuizCtx);
  const [status, setStatus] = useState("idle");
  const [chosen, setChosen] = useState("");
  const options = useMemo(() => {
    const others = pool.filter(p => p !== correct).sort(() => Math.random() - 0.5).slice(0, 3);
    return [correct, ...others].sort(() => Math.random() - 0.5);
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  if (status === "correct") return <span className={`${type} quiz-correct`}>{correct}</span>;
  if (status === "wrong") return (
    <span>
      <span className="quiz-wrong-chosen">{chosen}</span>
      {" "}<span className={type}>{correct}</span>
    </span>
  );
  return (
    <select className={`quiz-select${type === "pct" ? " pct-q" : ""}`} value=""
      onChange={e => {
        const v = e.target.value; if (!v) return;
        const ok = v === correct;
        setChosen(v); setStatus(ok ? "correct" : "wrong"); onAnswer(ok);
      }}>
      <option value="">···</option>
      {options.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

// Decides quiz vs flaggable based on context
function CiteNode({ text, query }) {
  const { quizMode, authorPool } = React.useContext(QuizCtx);
  if (quizMode) return <QuizSpan type="cite" correct={text} pool={authorPool} />;
  return <FlaggableSpan type="cite" text={text} query={query} />;
}
function PctNode({ text, query }) {
  const { quizMode, pctPool } = React.useContext(QuizCtx);
  if (quizMode) return <QuizSpan type="pct" correct={text} pool={pctPool} />;
  return <FlaggableSpan type="pct" text={text} query={query} />;
}

function splitByRegex(text, re, type) {
  // Returns [{t:"text"|type, v:string}]
  const nodes = [];
  let last = 0;
  let m;
  const r = new RegExp(re.source, re.flags.includes("g") ? re.flags : re.flags + "g");
  r.lastIndex = 0;
  while ((m = r.exec(text))) {
    if (m.index > last) nodes.push({ t: "text", v: text.slice(last, m.index) });
    nodes.push({ t: type, v: m[0] });
    last = m.index + m[0].length;
  }
  if (last < text.length) nodes.push({ t: "text", v: text.slice(last) });
  return nodes;
}

function renderTextWithCites(text, query) {
  // Pass 1: split on {{cite:}} markers
  const pass1 = [];
  let lastIndex = 0;
  let m;
  const re = new RegExp(CITE_MARKER.source, "g");
  while ((m = re.exec(text))) {
    if (m.index > lastIndex) pass1.push({ t: "text", v: text.slice(lastIndex, m.index) });
    const payload = m[1];
    const head = payload.split(/\s+[—–-]{1,2}\s+/)[0];
    pass1.push({ t: "cite", v: head });
    lastIndex = m.index + m[0].length;
  }
  if (lastIndex < text.length) pass1.push({ t: "text", v: text.slice(lastIndex) });

  // Passes 2+: pct → author passes (A–G)
  const result = [];
  for (const node of pass1) {
    if (node.t !== "text") { result.push(node); continue; }
    for (const n2 of splitByRegex(node.v, PCT_RE, "pct")) {
      if (n2.t !== "text") { result.push(n2); continue; }
      for (const n3 of applyPasses(n2.v, AUTHOR_PASSES)) result.push(n3);
    }
  }

  return result.map((n, i) => {
    if (n.t === "cite") return <CiteNode key={i} text={n.v} query={query} />;
    if (n.t === "pct")  return <PctNode  key={i} text={n.v} query={query} />;
    return <React.Fragment key={i}>{highlight(n.v, query)}</React.Fragment>;
  });
}


function highlight(text, query) {
  if (!query) return text;
  const q = query.toLowerCase();
  const lower = text.toLowerCase();
  const out = [];
  let i = 0;
  while (i < text.length) {
    const idx = lower.indexOf(q, i);
    if (idx < 0) { out.push(text.slice(i)); break; }
    if (idx > i) out.push(text.slice(i, idx));
    out.push(<mark key={out.length}>{text.slice(idx, idx + q.length)}</mark>);
    i = idx + q.length;
  }
  return out;
}

function countMatches(text, query) {
  if (!query || !text) return 0;
  const q = query.toLowerCase();
  const t = text.toLowerCase();
  let n = 0, i = 0;
  while ((i = t.indexOf(q, i)) >= 0) { n++; i += q.length; }
  return n;
}

function blockText(b) {
  if (!b) return "";
  if (b.type === "p" || b.type?.startsWith("h")) return b.text || "";
  if (b.type === "ul" || b.type === "ol") return (b.items || []).join("\n");
  if (b.type === "table") return [(b.headers || []).join(" | "), ...(b.rows || []).map(r => r.join(" | "))].join("\n");
  return "";
}

function sectionText(sec) {
  const own = (sec.blocks || []).map(blockText).join("\n");
  const sub = (sec.subsections || []).map(s => s.title + "\n" + (s.blocks || []).map(blockText).join("\n")).join("\n");
  return sec.title + "\n" + own + "\n" + sub;
}

// --- block renderers --------------------------------------------------------
function isQuestionBlock(b) {
  return b?.type === "ul" && b.items?.some(item => item.trim().endsWith("?"));
}

function Block({ block, query, isAnswer }) {
  const t = block.type;
  if (t === "p") return <p className={isAnswer ? "answer-p" : ""}>{renderTextWithCites(block.text, query)}</p>;
  if (t === "h3") return <h3 className="block-h3">{renderTextWithCites(block.text, query)}</h3>;
  if (t === "h4") return <h4 className="block-h4">{renderTextWithCites(block.text, query)}</h4>;
  if (t === "ul") return <ul>{block.items.map((x, i) => <li key={i} className={x.trim().endsWith("?") ? "question-item" : ""}>{renderTextWithCites(x, query)}</li>)}</ul>;
  if (t === "ol") return <ol>{block.items.map((x, i) => <li key={i}>{renderTextWithCites(x, query)}</li>)}</ol>;
  if (t === "table") return (
    <div className="scroll-table">
      <table>
        <thead><tr>{block.headers.map((h, i) => <th key={i}>{renderTextWithCites(h, query)}</th>)}</tr></thead>
        <tbody>{block.rows.map((r, i) => <tr key={i}>{r.map((c, j) => <td key={j}>{renderTextWithCites(c, query)}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
  return null;
}

// --- annotation components --------------------------------------------------

function PasswordModal({ onSuccess, onCancel }) {
  const isNew = !localStorage.getItem(ANNO_PWD_KEY);
  const [pw, setPw] = useState(""); const [pw2, setPw2] = useState(""); const [err, setErr] = useState("");
  const submit = async () => {
    if (!pw.trim()) return;
    if (isNew) {
      if (pw !== pw2) { setErr("Passwords don't match"); return; }
      localStorage.setItem(ANNO_PWD_KEY, await hashPw(pw));
      sessionStorage.setItem(ANNO_SES_KEY, "1"); onSuccess();
    } else {
      if (await hashPw(pw) === localStorage.getItem(ANNO_PWD_KEY)) {
        sessionStorage.setItem(ANNO_SES_KEY, "1"); onSuccess();
      } else { setErr("Incorrect password"); setPw(""); }
    }
  };
  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onClick={onCancel}>
      <div className="bg-white rounded-xl p-6 shadow-2xl w-80" onClick={e => e.stopPropagation()}>
        <h2 className="text-base font-semibold text-slate-900 mb-1">{isNew ? "Set edit-mode password" : "Unlock edit mode"}</h2>
        {isNew && <p className="text-sm text-slate-500 mb-1">Choose a password to protect annotations and notes.</p>}
        <input autoFocus type="password"
          className="w-full px-3 py-2 border border-slate-200 rounded-lg mt-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          placeholder="Password" value={pw}
          onChange={e => { setPw(e.target.value); setErr(""); }}
          onKeyDown={e => e.key === "Enter" && (!isNew || pw2) && submit()} />
        {isNew && (
          <input type="password"
            className="w-full px-3 py-2 border border-slate-200 rounded-lg mt-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
            placeholder="Confirm password" value={pw2}
            onChange={e => { setPw2(e.target.value); setErr(""); }}
            onKeyDown={e => e.key === "Enter" && submit()} />
        )}
        {err && <p className="text-rose-600 text-sm mt-2">{err}</p>}
        <div className="flex gap-2 mt-4">
          <button className="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 text-sm font-medium" onClick={submit}>
            {isNew ? "Set password" : "Unlock"}
          </button>
          <button className="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 text-sm" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// Floating toolbar: appears on text selection (to add mark) or click on existing mark (to remove)
function AnnotationToolbar({ mainRef }) {
  const { annotateMode, addMark, removeMark } = React.useContext(AnnotateCtx);
  const [pos, setPos] = useState(null);          // {x, y, annId|null}
  const [pendingRange, setPendingRange] = useState(null);
  const [pendingSec, setPendingSec] = useState(null);
  const tbRef = useRef(null);

  useEffect(() => {
    if (!annotateMode) { setPos(null); return; }
    const onUp = e => {
      if (tbRef.current?.contains(e.target)) return;
      // Click on existing mark → show remove option
      const annSp = e.target.closest?.(".user-ann");
      if (annSp) {
        const rect = annSp.getBoundingClientRect();
        setPos({ x: rect.left + rect.width / 2, y: rect.top, annId: annSp.dataset.annId });
        setPendingRange(null); setPendingSec(null); return;
      }
      // Text selection → show mark options
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || !sel.toString().trim()) { setPos(null); setPendingRange(null); return; }
      const range = sel.getRangeAt(0);
      let el = range.commonAncestorContainer;
      if (el.nodeType === Node.TEXT_NODE) el = el.parentElement;
      const sec = el.closest?.("[data-anchor]");
      if (!sec) { setPos(null); return; }
      const rect = range.getBoundingClientRect();
      setPos({ x: rect.left + rect.width / 2, y: rect.top, annId: null });
      setPendingRange(range.cloneRange()); setPendingSec(sec.getAttribute("data-anchor"));
    };
    document.addEventListener("mouseup", onUp);
    return () => document.removeEventListener("mouseup", onUp);
  }, [annotateMode]);

  const applyMark = (type, color) => {
    const secEl = mainRef.current?.querySelector(`[data-anchor="${pendingSec}"]`);
    if (!secEl || !pendingRange) return;
    const selectedText = pendingRange.toString();
    if (!selectedText.trim()) return;
    let contextBefore = "", contextAfter = "";
    try {
      const br = document.createRange(); br.setStart(secEl, 0); br.setEnd(pendingRange.startContainer, pendingRange.startOffset);
      contextBefore = br.toString().slice(-20);
      const ar = document.createRange(); ar.setStart(pendingRange.endContainer, pendingRange.endOffset); ar.setEnd(secEl, secEl.childNodes.length);
      contextAfter = ar.toString().slice(0, 20);
    } catch {}
    addMark({ id: uid(), sectionId: pendingSec, selectedText, contextBefore, contextAfter, type, color });
    window.getSelection()?.removeAllRanges();
    setPos(null); setPendingRange(null);
  };

  if (!pos || !annotateMode) return null;

  const HL = [["#fde68a","Yellow"],["#bfdbfe","Blue"],["#bbf7d0","Green"],["#fecaca","Pink"]];
  return (
    <div ref={tbRef}
      style={{ position:"fixed", left:pos.x, top:pos.y - 4, transform:"translate(-50%,-100%)", zIndex:9999 }}
      className="flex items-center gap-1 bg-slate-800 rounded-lg px-2 py-1.5 shadow-xl select-none"
      onMouseDown={e => e.preventDefault()}>
      {pos.annId ? (
        <>
          <span className="text-slate-300 text-xs px-1">Remove mark?</span>
          <button className="text-xs px-2 py-0.5 bg-rose-500 text-white rounded hover:bg-rose-600"
            onClick={() => { removeMark(pos.annId); setPos(null); }}>Remove</button>
          <button className="text-slate-400 hover:text-white text-xs px-1 ml-1" onClick={() => setPos(null)}>✕</button>
        </>
      ) : (
        <>
          {HL.map(([bg, label]) => (
            <button key={bg} title={`Highlight ${label}`} style={{ background: bg }}
              className="w-5 h-5 rounded-sm border border-white/20 hover:scale-110 transition-transform"
              onClick={() => applyMark("highlight", bg)} />
          ))}
          <div className="w-px h-4 bg-white/20 mx-0.5" />
          <button title="Underline" className="text-white text-xs px-1.5 py-0.5 rounded hover:bg-white/20"
            onClick={() => applyMark("underline", "#818cf8")}>
            <span style={{ textDecoration:"underline", textDecorationColor:"#a5b4fc" }}>U</span>
          </button>
          <div className="w-px h-4 bg-white/20 mx-0.5" />
          <button className="text-slate-400 hover:text-white text-xs px-1"
            onClick={() => { setPos(null); window.getSelection()?.removeAllRanges(); }}>✕</button>
        </>
      )}
    </div>
  );
}

// Inline note display (saved state)
function NoteBlock({ note, annotateMode, onUpdate, onDelete }) {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(note.text);
  if (editing) {
    return (
      <div className="note-ed">
        <textarea value={text} autoFocus rows={Math.max(2, text.split("\n").length + 1)}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => {
            if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { onUpdate(note.id, text); setEditing(false); }
            else if (e.key === "Escape") { setText(note.text); setEditing(false); }
          }} />
        <div className="note-ed-acts">
          <button className="ns" onClick={() => { onUpdate(note.id, text); setEditing(false); }}>Save</button>
          <span className="nh">⌘Enter · Esc to cancel</span>
          <button className="nc" onClick={() => { setText(note.text); setEditing(false); }}>Cancel</button>
        </div>
      </div>
    );
  }
  return (
    <div className="inline-note" style={annotateMode ? { paddingRight:"5.5rem" } : {}}>
      {note.text}
      {annotateMode && (
        <div className="inline-note-acts">
          <button onClick={() => setEditing(true)}>Edit</button>
          <button onClick={() => onDelete(note.id)}>×</button>
        </div>
      )}
    </div>
  );
}

// "+ note" button that expands to an inline text editor

// Renders blocks interleaved with saved notes + add-note buttons (in edit mode)
function BlocksWithNotes({ blocks, sectionId, subsectionId, query }) {
  const { annotateMode, notes, updateNote, removeNote } = React.useContext(AnnotateCtx);
  return blocks.map((b, i) => {
    const isAns = b.type === "p" && isQuestionBlock(blocks[i - 1]);
    const blockNotes = notes.filter(n =>
      n.sectionId === sectionId &&
      (n.subsectionId || null) === (subsectionId || null) &&
      n.afterBlockIndex === i
    );
    return (
      <React.Fragment key={i}>
        <Block block={b} query={query} isAnswer={isAns} />
        {blockNotes.map(note => (
          <NoteBlock key={note.id} note={note} annotateMode={annotateMode}
            onUpdate={updateNote} onDelete={removeNote} />
        ))}
        {annotateMode && <AddNoteInline sectionId={sectionId} subsectionId={subsectionId} afterBlockIndex={i} />}
      </React.Fragment>
    );
  });
}

// --- study pane helpers -----------------------------------------------------
function levenshtein(a, b) {
  const dp = Array.from({ length: b.length + 1 }, (_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    let prev = i;
    for (let j = 1; j <= b.length; j++) {
      const val = a[i-1] === b[j-1] ? dp[j-1] : Math.min(dp[j-1], dp[j], prev) + 1;
      dp[j-1] = prev; prev = val;
    }
    dp[b.length] = prev;
  }
  return dp[b.length];
}
function authorMatch(typed, correct) {
  const norm = s => s.toLowerCase().replace(/[^a-z]/g, " ").trim().replace(/\s+/g, " ");
  const t = norm(typed), c = norm(correct);
  if (!t) return false;
  if (c.includes(t) || t.includes(c)) return true;         // substring match
  const first = c.split(" ")[0];                           // first surname only
  if (t === first) return true;
  return levenshtein(t, first) <= 2;                       // typo tolerance ≤2
}

// --- abstract panel (PubMed) ------------------------------------------------
function normalizeAuthorForSearch(author) {
  return author
    .replace(/\s+et\s+al\.?/gi, "")
    .replace(/\s+(and|&)\s+.*/i, "")
    .trim();
}

const ABSTRACT_CACHE_KEY = "endo-guide.abstracts.v1";
function loadAbstractCache() { try { return JSON.parse(localStorage.getItem(ABSTRACT_CACHE_KEY) || "{}"); } catch { return {}; } }
function saveAbstractCache(c) { try { localStorage.setItem(ABSTRACT_CACHE_KEY, JSON.stringify(c)); } catch {} }

function useAbstract(author, year) {
  const [state, setState] = useState(() => {
    // 1. Check pre-built abstracts embedded at build time
    const key = `${author}|${year}`;
    const prebuilt = DATA?.abstracts?.[key];
    if (prebuilt?.status === "ok" && prebuilt.abstract) {
      return { status: "done", pmid: prebuilt.pmid, title: prebuilt.title, abstract: prebuilt.abstract };
    }
    if (prebuilt?.status === "not_found") {
      return { status: "notfound" };
    }
    // 2. Fall back to localStorage cache from previous runtime fetches
    if (author && year) {
      const cacheKey = `${normalizeAuthorForSearch(author).toLowerCase()}|${year}`;
      const cached = loadAbstractCache()[cacheKey];
      if (cached) return { status: "done", ...cached };
    }
    return { status: "idle" };
  });
  return state;
}

const ABSTRACT_STOP = new Set(["that","with","from","this","than","have","been","more","also","when","after","before","which","their","there","these","those","using","used","were","could","should","would","about","both","into","each","they","some","then","them","will","such","only","very","most","much","many","over","under","during","following","within","without","between","among","significantly","significant","patients","results","study","studies","treatment","clinical","associated","compared","showed","found","reported","observed"]);

function highlightInAbstract(abstract, finding) {
  if (!abstract) return abstract;
  const words = [...new Set((finding || "").toLowerCase().match(/\b[a-z]{5,}\b/g)?.filter(w => !ABSTRACT_STOP.has(w)) || [])];
  if (!words.length) return abstract;
  const re = new RegExp(`\\b(${words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|")})`, "gi");
  const out = [];
  let last = 0, m;
  re.lastIndex = 0;
  while ((m = re.exec(abstract))) {
    if (m.index > last) out.push(abstract.slice(last, m.index));
    out.push(<mark key={m.index} style={{ background: "#bfdbfe", borderRadius: "2px", padding: "0 1px" }}>{m[0]}</mark>);
    last = m.index + m[0].length;
  }
  out.push(abstract.slice(last));
  return out;
}

function AbstractPanel({ author, year, finding }) {
  const { status, title, abstract, pmid } = useAbstract(author, year);
  if (status === "idle") return null;
  return (
    <div className="mt-3 rounded-xl border overflow-hidden text-sm">
      {status === "loading" && (
        <div className="px-4 py-3 bg-slate-50 text-slate-400 italic animate-pulse">Fetching abstract from PubMed…</div>
      )}
      {(status === "notfound" || status === "error") && (
        <div className="px-4 py-3 bg-slate-50 text-slate-500 text-[13px] flex items-center gap-2">
          <span className="italic">Abstract not indexed in PubMed.</span>
          <a href={`https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(author + " " + year)}`}
             target="_blank" rel="noopener noreferrer"
             className="text-indigo-600 hover:underline whitespace-nowrap not-italic">Search PubMed ↗</a>
        </div>
      )}
      {status === "done" && (
        <div className="bg-blue-50 border-blue-200">
          <div className="px-4 pt-3 pb-1 flex items-start justify-between gap-3">
            <span className="font-semibold text-slate-800 leading-snug text-[13px]">{title}</span>
            <a href={`https://pubmed.ncbi.nlm.nih.gov/${pmid}`} target="_blank" rel="noopener noreferrer"
               className="shrink-0 text-xs text-indigo-600 hover:underline mt-0.5 whitespace-nowrap">PubMed ↗</a>
          </div>
          <p className="px-4 pb-4 pt-2 text-slate-700 leading-relaxed text-[13px]">
            {abstract ? highlightInAbstract(abstract, finding) : <span className="italic text-slate-400">No abstract available.</span>}
          </p>
        </div>
      )}
    </div>
  );
}

// --- study pane: author ↔ finding matching quiz -----------------------------
const LS_KEY = "endo-guide.study.v1";

function loadStudyState() {
  try { return JSON.parse(localStorage.getItem(LS_KEY) || "{}"); } catch { return {}; }
}
function saveStudyState(s) { localStorage.setItem(LS_KEY, JSON.stringify(s)); }

function StudyPane({ cards, onJump }) {
  const { flagged } = React.useContext(FlagCtx);
  const [flaggedOnly, setFlaggedOnly] = useState(false);
  const validCards = useMemo(() => {
    const base = cards.filter(c => c.author && c.finding && c.finding.length > 20);
    if (!flaggedOnly || flagged.size === 0) return base;
    return base.filter(c => flagged.has(c.author));
  }, [cards, flaggedOnly, flagged]);
  const [state, setState] = useState(() => {
    const s = loadStudyState();
    return {
      boxes: s.boxes || {},        // cardKey -> 0|1|2 (New/Learning/Known)
      history: s.history || [],    // {t, correct}
      streak: s.streak || 0,
      ...s,
    };
  });
  const [reverse, setReverse] = useState(false); // false: show finding, pick author
  const [typeMode, setTypeMode] = useState(false); // type the author name
  const [typed, setTyped] = useState("");           // current text-input value
  const [current, setCurrent] = useState(null);
  const [choices, setChoices] = useState([]);
  const [pick, setPick] = useState(null);           // "correct"|"wrong" in typeMode, card obj in choice mode
  const typeInputRef = useRef(null);
  // Use a ref for boxes so pickNext doesn't change reference on every answer
  const boxesRef = useRef(state.boxes);
  useEffect(() => { boxesRef.current = state.boxes; }, [state.boxes]);

  const cardKey = (c) => `${(c.author||"").toLowerCase()}|${c.year}|${c.finding.slice(0,60)}`;

  const pickNext = useCallback(() => {
    if (!validCards.length) return;
    // Leitner weights: New=3, Learning=4, Known=1
    const boxes = boxesRef.current;
    const weights = validCards.map(c => {
      const b = boxes[cardKey(c)] ?? 0;
      return b === 0 ? 3 : b === 1 ? 4 : 1;
    });
    const total = weights.reduce((a, b) => a + b, 0);
    let r = Math.random() * total;
    let idx = 0;
    for (; idx < weights.length; idx++) { r -= weights[idx]; if (r <= 0) break; }
    const card = validCards[Math.min(idx, validCards.length - 1)];
    // build 4 choices
    const pool = validCards.filter(c => c !== card);
    const sameSection = pool.filter(c => c.section_id === card.section_id);
    const distractors = [];
    const used = new Set([(reverse ? card.finding : card.author).toLowerCase()]);
    const draw = (arr) => {
      while (arr.length && distractors.length < 3) {
        const i = Math.floor(Math.random() * arr.length);
        const pick = arr.splice(i, 1)[0];
        const key = (reverse ? pick.finding : pick.author).toLowerCase();
        if (!used.has(key)) { used.add(key); distractors.push(pick); }
      }
    };
    draw([...sameSection]);
    if (distractors.length < 3) draw([...pool]);
    const all = [card, ...distractors].sort(() => Math.random() - 0.5);
    setCurrent(card);
    setChoices(all);
    setPick(null);
    setTyped("");
    setTimeout(() => typeInputRef.current?.focus(), 50);
  }, [validCards, reverse]); // boxes read via ref — no longer a dep, so answers don't retrigger

  useEffect(() => { pickNext(); }, [pickNext]);

  const answer = (choice) => {
    if (pick) return;
    setPick(choice);
    const correct = choice === current;
    setState(s => {
      const next = { ...s, boxes: { ...s.boxes }, history: [...s.history, { t: Date.now(), correct }] };
      const k = cardKey(current);
      const cur = next.boxes[k] ?? 0;
      next.boxes[k] = correct ? Math.min(2, cur + 1) : 0;
      next.streak = correct ? (s.streak || 0) + 1 : 0;
      saveStudyState(next);
      return next;
    });
  };

  const submitTyped = () => {
    if (pick || !typed.trim() || !current) return;
    const correct = authorMatch(typed, current.author);
    setPick(correct ? "correct" : "wrong");
    setState(s => {
      const next = { ...s, boxes: { ...s.boxes }, history: [...s.history, { t: Date.now(), correct }] };
      const k = cardKey(current);
      const cur = next.boxes[k] ?? 0;
      next.boxes[k] = correct ? Math.min(2, cur + 1) : 0;
      next.streak = correct ? (s.streak || 0) + 1 : 0;
      saveStudyState(next);
      return next;
    });
  };

  if (!validCards.length) {
    return <div className="p-8 text-slate-600">No study cards extracted yet. Add <code>{`{{cite: Author Year — Finding}}`}</code> markers to <code>endo-guide.md</code> and rebuild.</div>;
  }

  const today = new Date().toDateString();
  const todayHistory = (state.history || []).filter(h => new Date(h.t).toDateString() === today);
  const todayAcc = todayHistory.length ? Math.round(100 * todayHistory.filter(h => h.correct).length / todayHistory.length) : 0;
  const totalKnown = Object.values(state.boxes || {}).filter(v => v === 2).length;

  const promptText = reverse ? current?.author : current?.finding;
  const promptLabel = reverse ? "Which finding matches this author?" : "Which author reported this finding?";

  return (
    <div className="flex-1 overflow-y-auto">
      <div className="max-w-2xl mx-auto p-8">
        <div className="flex flex-wrap items-start justify-between gap-3 mb-6 text-sm text-slate-600">
          <div>
            <span className="font-semibold text-slate-900">{validCards.length}</span> cards ·
            <span className="ml-2">Today: {todayHistory.length} · {todayAcc}% acc</span> ·
            <span className="ml-2">Streak: {state.streak || 0}</span> ·
            <span className="ml-2">Known: {totalKnown}</span>
          </div>
          <div className="flex flex-wrap items-center gap-3">
            <label className="flex items-center gap-2 cursor-pointer select-none">
              <input type="checkbox" checked={reverse && !typeMode}
                onChange={e => { setReverse(e.target.checked); if (e.target.checked) setTypeMode(false); }} />
              Reverse mode
            </label>
            <label className="flex items-center gap-2 cursor-pointer select-none font-medium text-indigo-700">
              <input type="checkbox" checked={typeMode}
                onChange={e => { setTypeMode(e.target.checked); if (e.target.checked) setReverse(false); }} />
              Type-it mode
            </label>
            {flagged.size > 0 && (
              <label className="flex items-center gap-2 cursor-pointer select-none font-medium text-rose-700">
                <input type="checkbox" checked={flaggedOnly}
                  onChange={e => setFlaggedOnly(e.target.checked)} />
                Flagged only ({flagged.size})
              </label>
            )}
          </div>
        </div>

        <div className="bg-white border border-slate-200 rounded-xl p-7 shadow-sm border-t-4 border-t-indigo-500">
          <div className="text-xs uppercase tracking-widest text-slate-400 mb-3 font-medium">{promptLabel}</div>
          <div className="text-xl text-slate-900 font-serif mb-6 leading-relaxed">{promptText}</div>
          {typeMode ? (
            /* ---- TYPE-IT MODE ---- */
            <div>
              <div className="flex gap-2 mb-3">
                <input
                  ref={typeInputRef}
                  className="flex-1 px-4 py-2.5 border border-slate-300 rounded-lg text-slate-900 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:border-indigo-300"
                  placeholder="Type the author's name…"
                  value={typed}
                  onChange={e => setTyped(e.target.value)}
                  onKeyDown={e => { if (e.key === "Enter" && !pick && typed.trim()) submitTyped(); }}
                  disabled={!!pick}
                  autoFocus
                />
                {!pick && (
                  <button
                    className="px-4 py-2.5 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:bg-slate-300 transition"
                    onClick={submitTyped}
                    disabled={!typed.trim()}
                  >Submit</button>
                )}
              </div>
              {pick && (
                <div className={`px-4 py-3 rounded-lg text-sm font-medium mb-1 ${pick === "correct" ? "bg-emerald-50 border border-emerald-300 text-emerald-900" : "bg-rose-50 border border-rose-300 text-rose-900"}`}>
                  {pick === "correct"
                    ? `✓ Correct! ${current.author}${current.year ? " (" + current.year + ")" : ""}`
                    : `✗ Answer: ${current.author}${current.year ? " (" + current.year + ")" : ""}`
                  }
                </div>
              )}
            </div>
          ) : (
            /* ---- CHOICE MODE ---- */
            <div className="grid gap-2">
              {choices.map((c, i) => {
                const label = reverse ? c.finding : `${c.author}${c.year ? " (" + c.year + ")" : ""}`;
                let cls = "text-left px-4 py-3 rounded border bg-white hover:bg-slate-50";
                if (pick) {
                  if (c === current) cls = "text-left px-4 py-3 rounded border bg-emerald-50 border-emerald-400 text-emerald-900";
                  else if (c === pick) cls = "text-left px-4 py-3 rounded border bg-rose-50 border-rose-300 text-rose-900";
                  else cls = "text-left px-4 py-3 rounded border bg-slate-50 text-slate-500";
                }
                return (
                  <button key={i} className={cls} onClick={() => answer(c)} disabled={!!pick}>
                    {label}
                  </button>
                );
              })}
            </div>
          )}
          {pick && (
            <div className="mt-5 flex items-center justify-between">
              <div className="text-sm text-slate-600">
                {!typeMode && (
                  <><span className="font-semibold">{current.author}</span>{current.year ? ` (${current.year})` : ""}
                  {reverse && <span className="italic"> — {current.finding}</span>}</>
                )}
                {current.section_title && (
                  <button className={`text-indigo-600 hover:underline ${typeMode ? "" : "ml-3"}`} onClick={() => onJump?.(current.section_id)}>
                    Jump to §{current.section_title}
                  </button>
                )}
              </div>
              <button className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700" onClick={pickNext}>
                Next →
              </button>
            </div>
          )}
        </div>

        {pick && current && (
          <AbstractPanel author={current.author} year={current.year} finding={current.finding} />
        )}
        <div className="mt-4 text-xs text-slate-500">
          Leitner: new cards appear more often until answered correctly twice in a row.
          Progress persists in your browser only.
        </div>
      </div>
    </div>
  );
}

// --- audit pane -------------------------------------------------------------
function AuditPane({ suggestions }) {
  const [decisions, setDecisions] = useState({}); // id -> "approve"|"reject"|"edit"
  const [edits, setEdits] = useState({});          // id -> edited "after" text

  const exportDecisions = () => {
    const out = Object.entries(decisions).map(([id, status]) => ({
      id, status, edited_after: edits[id] ?? null, decided_at: new Date().toISOString(),
    }));
    const blob = new Blob([JSON.stringify(out, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = "decisions.json";
    a.click();
    URL.revokeObjectURL(url);
  };

  if (!suggestions.length) {
    return (
      <div className="flex-1 overflow-y-auto p-8">
        <div className="max-w-2xl mx-auto text-slate-600">
          <h2 className="text-xl font-semibold text-slate-900 mb-2">No pending suggestions</h2>
          <p>The weekly audit writes proposals to <code>suggestions.json</code>. Run the scheduled task or rebuild after it runs.</p>
        </div>
      </div>
    );
  }

  const byStatus = suggestions.reduce((acc, s) => {
    const k = decisions[s.id] || "pending";
    (acc[k] ||= []).push(s);
    return acc;
  }, {});

  return (
    <div className="flex-1 overflow-y-auto">
      <div className="max-w-3xl mx-auto p-8">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-xl font-semibold text-slate-900">Weekly audit proposals</h2>
            <div className="text-sm text-slate-600">
              {suggestions.length} pending · {Object.keys(decisions).length} decided
            </div>
          </div>
          <button
            onClick={exportDecisions}
            disabled={!Object.keys(decisions).length}
            className="px-4 py-2 bg-indigo-600 text-white rounded hover:bg-indigo-700 disabled:bg-slate-300">
            Export decisions.json
          </button>
        </div>
        <div className="space-y-4">
          {suggestions.map(s => {
            const status = decisions[s.id] || "pending";
            const kindColors = { add: "bg-emerald-100 text-emerald-800", update: "bg-amber-100 text-amber-800", remove: "bg-rose-100 text-rose-800", fix: "bg-blue-100 text-blue-800" };
            return (
              <div key={s.id} className={`bg-white border rounded-lg p-5 shadow-sm ${status === "approve" ? "border-emerald-400" : status === "reject" ? "border-rose-300 opacity-60" : ""}`}>
                <div className="flex items-center gap-2 mb-2">
                  <span className={`text-xs font-semibold px-2 py-0.5 rounded ${kindColors[s.kind] || "bg-slate-100"}`}>{(s.kind || "edit").toUpperCase()}</span>
                  <span className="text-sm text-slate-500">§ {s.section_id || "—"}</span>
                </div>
                <p className="text-sm text-slate-700 mb-3">{s.rationale}</p>
                {s.before && (
                  <div className="mb-2">
                    <div className="text-xs uppercase text-slate-500">Before</div>
                    <div className="text-sm bg-rose-50 border border-rose-100 p-2 rounded whitespace-pre-wrap">{s.before}</div>
                  </div>
                )}
                <div className="mb-2">
                  <div className="text-xs uppercase text-slate-500">After</div>
                  <textarea
                    className="w-full text-sm bg-emerald-50 border border-emerald-100 p-2 rounded font-serif"
                    rows={Math.max(2, Math.min(8, (edits[s.id] ?? s.after ?? "").split("\n").length + 1))}
                    value={edits[s.id] ?? s.after ?? ""}
                    onChange={e => setEdits(prev => ({ ...prev, [s.id]: e.target.value }))}
                  />
                </div>
                {s.citations?.length ? (
                  <div className="text-xs text-slate-500 mb-3">
                    Citations: {s.citations.map((c, i) => (
                      <span key={i} className="mr-2">
                        {c.pmid
                          ? <a className="text-indigo-600 hover:underline" href={`https://pubmed.ncbi.nlm.nih.gov/${c.pmid}`} target="_blank" rel="noopener noreferrer">{c.author} {c.year}</a>
                          : <span>{c.author} {c.year}</span>}
                      </span>
                    ))}
                  </div>
                ) : null}
                <div className="flex gap-2">
                  <button className="px-3 py-1 text-sm bg-emerald-600 text-white rounded hover:bg-emerald-700" onClick={() => setDecisions(d => ({ ...d, [s.id]: "approve" }))}>Approve</button>
                  <button className="px-3 py-1 text-sm bg-rose-600 text-white rounded hover:bg-rose-700" onClick={() => setDecisions(d => ({ ...d, [s.id]: "reject" }))}>Reject</button>
                  <button className="px-3 py-1 text-sm bg-slate-200 text-slate-700 rounded hover:bg-slate-300" onClick={() => setDecisions(d => { const n = { ...d }; delete n[s.id]; return n; })}>Reset</button>
                  <div className="ml-auto text-xs text-slate-500 self-center">
                    {status !== "pending" ? status : ""}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// --- author index -----------------------------------------------------------
function AuthorPane({ cards, onJump }) {
  const [filter, setFilter] = useState("");

  const authors = useMemo(() => {
    const map = {};
    for (const c of cards) {
      if (!c.author || !c.finding || c.finding.length < 10) continue;
      const key = c.author.toLowerCase();
      if (!map[key]) map[key] = { author: c.author, entries: [] };
      map[key].entries.push(c);
    }
    return Object.values(map).sort((a, b) => a.author.localeCompare(b.author));
  }, [cards]);

  const filtered = useMemo(() => {
    if (!filter) return authors;
    const q = filter.toLowerCase();
    return authors.filter(a => a.author.toLowerCase().includes(q));
  }, [authors, filter]);

  const validCount = useMemo(() => cards.filter(c => c.author && c.finding?.length >= 10).length, [cards]);

  return (
    <div className="flex-1 overflow-y-auto">
      <div className="max-w-2xl mx-auto p-8">
        <div className="flex items-center justify-between mb-6">
          <div>
            <h2 className="text-xl font-semibold text-slate-900">Author Index</h2>
            <div className="text-sm text-slate-500 mt-0.5">{authors.length} authors · {validCount} findings</div>
          </div>
          <input
            className="px-3 py-1.5 text-sm border border-slate-200 rounded-lg bg-slate-50 w-48 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white"
            placeholder="Filter by name…"
            value={filter}
            onChange={e => setFilter(e.target.value)}
          />
        </div>
        <div className="space-y-3">
          {filtered.map(({ author, entries }) => (
            <div key={author} className="bg-white border border-slate-200 rounded-xl p-5 shadow-sm">
              <div className="flex items-baseline gap-3 mb-3">
                <span className="font-semibold text-amber-700 text-base">{author}</span>
                <span className="text-xs text-slate-400 font-normal">{entries.length} {entries.length === 1 ? "finding" : "findings"}</span>
              </div>
              <ul className="space-y-2.5">
                {entries.map((e, i) => (
                  <li key={i} className="flex gap-3 items-start text-sm">
                    <span className="text-slate-400 shrink-0 tabular-nums mt-0.5 text-xs w-10">{e.year || "—"}</span>
                    <span className="text-slate-700 flex-1 leading-snug">{e.finding}</span>
                    {e.section_id && (
                      <button
                        className="text-indigo-500 hover:text-indigo-700 hover:underline shrink-0 text-xs mt-0.5 whitespace-nowrap"
                        onClick={() => onJump?.(e.section_id)}
                      >§ {e.section_title || e.section_id}</button>
                    )}
                  </li>
                ))}
              </ul>
            </div>
          ))}
          {filtered.length === 0 && filter && (
            <div className="text-slate-500 text-center py-16">No authors matching "{filter}"</div>
          )}
        </div>
        <div className="h-16" />
      </div>
    </div>
  );
}

// --- app --------------------------------------------------------------------
function App() {
  const data = DATA || { sections: [], cards: [], suggestions: [] };
  const [tab, setTab] = useState("reference");
  const [query, setQuery] = useState("");
  const [debounced, setDebounced] = useState("");
  const searchRef = useRef(null);

  // Annotation / edit-mode state
  const [annotateMode, setAnnotateMode] = useState(false);
  const [showPwModal, setShowPwModal] = useState(false);
  const [annData, setAnnData] = useState(loadAnnotations);
  const addMark    = useCallback(m   => setAnnData(d => { const n={...d,marks:[...d.marks,m]};              saveAnnotations(n); return n; }), []);
  const removeMark = useCallback(id  => setAnnData(d => { const n={...d,marks:d.marks.filter(m=>m.id!==id)};saveAnnotations(n); return n; }), []);
  const addNote    = useCallback(note=> setAnnData(d => { const n={...d,notes:[...d.notes,note]};            saveAnnotations(n); return n; }), []);
  const updateNote = useCallback((id,text)=> setAnnData(d => { const n={...d,notes:d.notes.map(x=>x.id===id?{...x,text}:x)};saveAnnotations(n); return n; }), []);
  const removeNote = useCallback(id  => setAnnData(d => { const n={...d,notes:d.notes.filter(x=>x.id!==id)};saveAnnotations(n); return n; }), []);
  const toggleAnnotate = () => {
    if (annotateMode) { setAnnotateMode(false); return; }
    if (sessionStorage.getItem(ANNO_SES_KEY) === "1") { setAnnotateMode(true); return; }
    setShowPwModal(true);
  };

  // Pools for inline quiz mode
  const authorPool = useMemo(() =>
    [...new Set((data.cards || []).filter(c => c.author).map(c => c.author))],
    [data.cards]);

  const pctPool = useMemo(() => {
    const set = new Set();
    const re = new RegExp(PCT_RE.source, "g");
    for (const sec of data.sections || []) {
      const text = sectionText(sec);
      re.lastIndex = 0;
      let m;
      while ((m = re.exec(text))) set.add(m[0]);
    }
    return [...set];
  }, [data.sections]);

  // Long-press flagging — persisted in localStorage
  const [flagged, setFlagged] = useState(() => {
    try { return new Set(JSON.parse(localStorage.getItem("endo-guide.flagged.v1") || "[]")); }
    catch { return new Set(); }
  });
  const toggleFlag = useCallback((text) => {
    setFlagged(prev => {
      const next = new Set(prev);
      if (next.has(text)) next.delete(text); else next.add(text);
      localStorage.setItem("endo-guide.flagged.v1", JSON.stringify([...next]));
      return next;
    });
  }, []);

  useEffect(() => {
    const t = setTimeout(() => setDebounced(query), 150);
    return () => clearTimeout(t);
  }, [query]);

  useEffect(() => {
    const handler = (e) => {
      if (e.key === "/" && document.activeElement?.tagName !== "INPUT" && document.activeElement?.tagName !== "TEXTAREA") {
        e.preventDefault();
        searchRef.current?.focus();
      } else if (e.key === "Escape") {
        setQuery("");
        searchRef.current?.blur();
      }
    };
    window.addEventListener("keydown", handler);
    return () => window.removeEventListener("keydown", handler);
  }, []);

  const jumpToSection = (id) => {
    setTab("reference");
    // let the reference pane mount, then scroll
    setTimeout(() => {
      const el = document.querySelector(`[data-anchor="${id}"]`);
      el?.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 50);
  };

  const totalMatches = useMemo(() => {
    if (!debounced) return 0;
    return data.sections.reduce((n, s) => n + countMatches(sectionText(s), debounced), 0);
  }, [data.sections, debounced]);

  return (
    <AnnotateCtx.Provider value={{ annotateMode, marks: annData.marks, notes: annData.notes, addMark, removeMark, addNote, updateNote, removeNote }}>
    <FlagCtx.Provider value={{ flagged, toggleFlag }}>
    <div className="h-screen flex flex-col">
      <header className="bg-white border-b shadow-sm shrink-0">
        <div className="flex items-center gap-2 md:gap-5 px-3 md:px-5 h-14">
          <div className="text-indigo-700 font-bold tracking-tight text-sm shrink-0">Endo Guide</div>
          <div className="flex items-center gap-1 overflow-x-auto shrink min-w-0">
            <button className={`tab-btn shrink-0 ${tab === "reference" ? "tab-active" : "tab-inactive"}`} onClick={() => setTab("reference")}>Reference</button>
            <button className={`tab-btn shrink-0 ${tab === "study" ? "tab-active" : "tab-inactive"}`} onClick={() => setTab("study")}>
              Study <span className={`text-xs ml-0.5 ${tab === "study" ? "opacity-70" : "text-slate-400"}`}>({data.cards?.length || 0})</span>
            </button>
            <button className={`tab-btn shrink-0 ${tab === "authors" ? "tab-active" : "tab-inactive"}`} onClick={() => setTab("authors")}>Authors</button>
            <button className={`tab-btn shrink-0 ${tab === "audit" ? "tab-active" : "tab-inactive"}`} onClick={() => setTab("audit")}>
              Audit {data.suggestions?.length ? <span className="ml-1 inline-block bg-amber-500 text-white text-xs px-1.5 rounded-full">{data.suggestions.length}</span> : null}
            </button>
            <button
              className={`tab-btn shrink-0 ${annotateMode ? "bg-amber-500 text-white" : "tab-inactive"}`}
              onClick={toggleAnnotate}
              title={annotateMode ? "Click to exit edit mode" : "Enter edit mode"}>
              {annotateMode ? "Editing" : "Edit"}{!annotateMode && (annData.marks.length + annData.notes.length) > 0 && <span className="ml-1 text-xs text-slate-400">({annData.marks.length + annData.notes.length})</span>}
            </button>
          </div>
          <div className="flex-1 hidden md:block" />
          {tab === "reference" && (
            <div className="flex items-center gap-2 shrink-0">
              <input
                ref={searchRef}
                className="px-3 py-1.5 text-sm border border-slate-200 rounded-lg bg-slate-50 w-32 md:w-64 focus:outline-none focus:ring-2 focus:ring-indigo-300 focus:bg-white focus:border-indigo-300 transition"
                placeholder="Search…"
                value={query}
                onChange={e => setQuery(e.target.value)}
              />
              {debounced && <div className="hidden md:block text-xs text-slate-400">{totalMatches} match{totalMatches !== 1 ? "es" : ""}</div>}
              {query && <button onClick={() => setQuery("")} className="text-slate-400 hover:text-slate-700 text-sm leading-none">✕</button>}
            </div>
          )}
        </div>
      </header>
      {tab === "reference" && <ReferencePane sections={data.sections} query={debounced} authorPool={authorPool} pctPool={pctPool} />}
      {tab === "study" && <StudyPane cards={data.cards || []} onJump={jumpToSection} />}
      {tab === "authors" && <AuthorPane cards={data.cards || []} onJump={jumpToSection} />}
      {tab === "audit" && <AuditPane suggestions={data.suggestions || []} />}
    </div>
    {showPwModal && (
      <PasswordModal
        onSuccess={() => { setShowPwModal(false); setAnnotateMode(true); }}
        onCancel={() => setShowPwModal(false)}
      />
    )}
    </FlagCtx.Provider>
    </AnnotateCtx.Provider>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
