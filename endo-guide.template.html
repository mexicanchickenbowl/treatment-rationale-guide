<style>
  /* Page-specific rules for endo-guide. Shared tokens/components live in
     /assets/theme.css (inlined by build.py for the offline artifact). */

  /* Reference pane body */
  .prose-body { font-family: var(--font-sans); font-size: var(--fs-base); line-height: var(--lh-loose); color: var(--color-text); }
  .block-h3 { font-weight: 650; font-size: var(--fs-md); margin-top: var(--space-6); margin-bottom: var(--space-2); color: var(--color-text); border-left: 3px solid var(--color-primary-ring); padding-left: var(--space-3); letter-spacing: -0.01em; }
  .block-h4 { font-weight: var(--fw-semibold); font-size: var(--fs-xs); margin-top: var(--space-4); margin-bottom: var(--space-1); color: var(--color-text-muted); text-transform: uppercase; letter-spacing: 0.04em; }
  .prose-body p { margin: 1rem 0; }
  .prose-body ul { list-style: disc; padding-left: 1.6rem; margin: 0.9rem 0; }
  .prose-body ol { list-style: decimal; padding-left: 1.6rem; margin: 0.9rem 0; }
  .prose-body li { margin: 0.55rem 0; line-height: 1.65; }
  .prose-body table { width: 100%; border-collapse: collapse; font-size: var(--fs-sm); margin: 1.5rem 0; }
  .prose-body th, .prose-body td { border: 1px solid var(--color-border); padding: 0.6rem 0.85rem; text-align: left; vertical-align: top; line-height: 1.55; }
  .prose-body thead th { background: var(--color-primary-weak); color: var(--color-primary-strong); position: sticky; top: 0; font-weight: var(--fw-semibold); letter-spacing: 0.02em; font-size: var(--fs-xs); text-transform: uppercase; }
  .prose-body tbody tr:nth-child(even) { background: var(--color-surface-2); }
  .prose-body tbody tr:hover { background: var(--color-surface-3); }
  .prose-body mark { background: color-mix(in srgb, var(--color-warning) 35%, transparent); color: var(--color-text); padding: 0 2px; border-radius: 2px; }
  .prose-body mark.current { background: var(--color-warning); color: #fff; }
  .cite { color: var(--color-warning-strong); font-weight: var(--fw-medium); cursor: pointer; }
  .pct  { background: color-mix(in srgb, var(--color-warning) 30%, transparent); color: var(--color-warning-strong); font-weight: var(--fw-semibold); padding: 0 3px; border-radius: 3px; cursor: pointer; }
  .cite-flagged { color: var(--color-danger-strong); font-weight: var(--fw-semibold); text-decoration: underline dotted; cursor: pointer; }
  .pct-flagged  { background: var(--color-danger-weak); color: var(--color-danger-strong); font-weight: var(--fw-semibold); padding: 0 3px; border-radius: 3px; text-decoration: underline dotted; cursor: pointer; }
  .quiz-select { display: inline; font-size: inherit; font-family: inherit; background: var(--color-warning-weak); border: 1.5px dashed var(--color-warning); border-radius: 4px; padding: 1px 4px; cursor: pointer; color: var(--color-warning-strong); font-weight: var(--fw-medium); vertical-align: baseline; max-width: 200px; }
  .quiz-select.pct-q { background: var(--color-warning-weak); border-color: var(--color-warning); color: var(--color-warning-strong); }
  .quiz-correct { color: var(--color-success); font-weight: var(--fw-semibold); }
  .quiz-wrong-chosen { color: var(--color-danger); text-decoration: line-through; }
  .sidebar a.active { background: var(--color-primary-weak); color: var(--color-primary); font-weight: var(--fw-semibold); border-left: 2px solid var(--color-primary); padding-left: calc(0.5rem - 2px); }
  .scroll-table { overflow-x: auto; }
  kbd { font-family: var(--font-mono); background: var(--color-surface-2); border: 1px solid var(--color-border); border-bottom-width: 2px; border-radius: 4px; padding: 1px 5px; font-size: var(--fs-xs); }
  .tab-btn { padding: 0.35rem 0.85rem; min-height: 2rem; border-radius: var(--radius-full); font-size: var(--fs-sm); font-weight: var(--fw-medium); transition: background var(--transition-fast), color var(--transition-fast); }
  .tab-active { background: var(--color-primary); color: var(--color-primary-text); }
  .tab-inactive { color: var(--color-text-muted); }
  .tab-inactive:hover { background: var(--color-surface-2); color: var(--color-text); }
  .question-item { list-style: none; margin-left: -1.6rem; font-weight: 650; color: var(--color-primary-strong); font-size: var(--fs-base); margin-top: 1.4rem; margin-bottom: 0.15rem; line-height: 1.5; }
  .answer-p { color: var(--color-text); }

  /* ── annotation / edit mode ─────────────────────────────────────────────── */
  .inline-note { background: var(--color-accent-weak); border-left: 3px solid var(--color-accent); padding: .5rem .85rem; margin: .5rem 0; border-radius: 0 6px 6px 0; font-size: var(--fs-sm); color: var(--color-accent-strong); line-height: 1.6; position: relative; white-space: pre-wrap; word-break: break-word; }
  .inline-note-acts { position: absolute; top: .35rem; right: .4rem; display: flex; gap: .25rem; }
  .inline-note-acts button { font-size: .7rem; padding: .15rem .45rem; min-height: 1.4rem; background: color-mix(in srgb, var(--color-accent) 15%, transparent); border: 1px solid color-mix(in srgb, var(--color-accent) 30%, transparent); border-radius: 4px; cursor: pointer; color: var(--color-accent-strong); }
  .inline-note-acts button:hover { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }
  .add-note-btn { display: block; font-size: var(--fs-xs); color: var(--color-border-strong); margin: .1rem 0 .3rem; padding: .15rem .5rem; border-radius: 4px; border: 1px dashed transparent; cursor: pointer; background: none; transition: all var(--transition-fast); }
  .add-note-btn:hover { color: var(--color-accent); border-color: color-mix(in srgb, var(--color-accent) 40%, transparent); background: var(--color-accent-weak); }
  .note-ed { background: var(--color-accent-weak); border: 1px solid color-mix(in srgb, var(--color-accent) 60%, transparent); border-radius: 6px; padding: .5rem; margin: .4rem 0; }
  .note-ed textarea { width: 100%; border: none; background: transparent; resize: vertical; font-family: inherit; font-size: var(--fs-sm); color: var(--color-accent-strong); outline: none; min-height: 56px; line-height: 1.6; }
  .note-ed-acts { display: flex; align-items: center; gap: .5rem; margin-top: .25rem; }
  .note-ed-acts .ns { font-size: var(--fs-xs); padding: .3rem .75rem; min-height: 1.9rem; background: var(--color-accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: var(--fw-semibold); }
  .note-ed-acts .ns:hover { background: var(--color-warning); }
  .note-ed-acts .nc { font-size: var(--fs-xs); padding: .3rem .7rem; min-height: 1.9rem; background: var(--color-surface-2); color: var(--color-text-muted); border: none; border-radius: 4px; cursor: pointer; }
  .note-ed-acts .nh { font-size: .7rem; color: var(--color-text-subtle); flex: 1; }
  .user-ann { cursor: default; }
  .ann-active .user-ann { cursor: pointer; outline: 1px solid color-mix(in srgb, var(--color-text) 10%, transparent); outline-offset: 1px; }
  /* live-edit: double-click any paragraph/heading in edit mode → inline editor writes back to endo-guide.md */
  .ann-active .editable-block { border-radius: 4px; padding: 1px 3px; margin: 0 -3px; transition: background var(--transition-fast), box-shadow var(--transition-fast); cursor: text; }
  .ann-active .editable-block:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); box-shadow: inset 0 0 0 1px color-mix(in srgb, var(--color-accent) 40%, transparent); }
  .block-ed { background: color-mix(in srgb, var(--color-accent) 8%, var(--color-surface)); border: 1px solid color-mix(in srgb, var(--color-accent) 55%, transparent); border-radius: 6px; padding: .6rem; margin: .8rem 0; }
  .block-ed textarea { width: 100%; border: 1px solid color-mix(in srgb, var(--color-accent) 40%, transparent); border-radius: 4px; padding: .5rem .6rem; background: var(--color-surface); resize: vertical; font-family: inherit; font-size: var(--fs-sm); color: var(--color-text); outline: none; line-height: 1.65; min-height: 80px; }
  .block-ed textarea:focus { border-color: var(--color-accent); box-shadow: 0 0 0 2px color-mix(in srgb, var(--color-accent) 35%, transparent); }
  .block-ed-acts { display: flex; align-items: center; gap: .5rem; margin-top: .45rem; flex-wrap: wrap; }
  .block-ed-acts .bs { font-size: var(--fs-xs); padding: .35rem .85rem; min-height: 2rem; background: var(--color-accent); color: #fff; border: none; border-radius: 4px; cursor: pointer; font-weight: var(--fw-semibold); }
  .block-ed-acts .bs:hover:not(:disabled) { background: var(--color-warning); }
  .block-ed-acts .bs:disabled { background: color-mix(in srgb, var(--color-accent) 60%, var(--color-border)); opacity: .7; cursor: wait; }
  .block-ed-acts .bc { font-size: var(--fs-xs); padding: .35rem .7rem; min-height: 2rem; background: var(--color-surface-2); color: var(--color-text-muted); border: none; border-radius: 4px; cursor: pointer; }
  .block-ed-acts .bc:hover { background: var(--color-border); }
  .block-ed-acts .bh { font-size: .72rem; color: var(--color-text-subtle); flex: 1; min-width: 0; }
  .block-ed-acts .be { font-size: .72rem; color: var(--color-danger); font-weight: var(--fw-medium); background: var(--color-danger-weak); padding: .2rem .45rem; border-radius: 3px; border: 1px solid color-mix(in srgb, var(--color-danger) 30%, transparent); }

  /* Fact-checked corrections */
  .factcheck { background: var(--color-surface-2); border-radius: 3px; padding: 0 3px; border-bottom: 2px solid var(--color-text-subtle); }

  /* SRS rating buttons (Phase 7) */
  .srs-rating { display: flex; gap: var(--space-2); flex-wrap: wrap; margin-top: var(--space-4); }
  .srs-rating-btn { display: inline-flex; flex-direction: column; align-items: center; gap: 2px; padding: 0.55rem 0.9rem; min-width: 4.5rem; min-height: 2.6rem; border: 1px solid var(--color-border); border-radius: var(--radius-sm); background: var(--color-surface); font-size: var(--fs-xs); font-weight: var(--fw-semibold); cursor: pointer; transition: background var(--transition-fast), border-color var(--transition-fast), transform var(--transition-fast); }
  .srs-rating-btn:hover { transform: translateY(-1px); }
  .srs-rating-btn small { font-size: 0.66rem; font-weight: var(--fw-normal); color: var(--color-text-subtle); }
  .srs-rating-btn--again { color: var(--color-danger-strong); border-color: color-mix(in srgb, var(--color-danger) 30%, transparent); }
  .srs-rating-btn--again:hover { background: var(--color-danger-weak); }
  .srs-rating-btn--hard  { color: var(--color-warning-strong); border-color: color-mix(in srgb, var(--color-warning) 30%, transparent); }
  .srs-rating-btn--hard:hover { background: var(--color-warning-weak); }
  .srs-rating-btn--good  { color: var(--color-primary); border-color: var(--color-primary-ring); }
  .srs-rating-btn--good:hover { background: var(--color-primary-weak); }
  .srs-rating-btn--easy  { color: var(--color-success-strong); border-color: color-mix(in srgb, var(--color-success) 30%, transparent); }
  .srs-rating-btn--easy:hover { background: var(--color-success-weak); }
  .srs-hud { display: flex; gap: var(--space-4); flex-wrap: wrap; font-size: var(--fs-xs); color: var(--color-text-muted); }
  .srs-hud strong { color: var(--color-text); font-weight: var(--fw-semibold); }
  .srs-shaky-btn { font-size: var(--fs-xs); padding: 0.3rem 0.7rem; min-height: 1.9rem; background: transparent; border: 1px dashed var(--color-border-strong); border-radius: var(--radius-sm); color: var(--color-text-muted); cursor: pointer; }
  .srs-shaky-btn:hover { border-color: var(--color-danger); color: var(--color-danger); background: var(--color-danger-weak); }
  .srs-shaky-btn.is-shaky { border-style: solid; border-color: var(--color-danger); color: var(--color-danger-strong); background: var(--color-danger-weak); }

  /* Audit pane abstract-health widget (Phase 9) */
  .abs-health { display: flex; flex-direction: column; gap: var(--space-2); padding: var(--space-4) var(--space-5); background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius-md); margin-bottom: var(--space-4); }
  .abs-health__title { font-size: var(--fs-xs); font-weight: var(--fw-bold); text-transform: uppercase; letter-spacing: 0.08em; color: var(--color-text-muted); }
  .abs-health__row { display: flex; gap: var(--space-3); flex-wrap: wrap; font-size: var(--fs-sm); color: var(--color-text); }
  .abs-health__pill { display: inline-flex; align-items: center; gap: 0.35rem; padding: 0.2rem 0.6rem; border-radius: var(--radius-full); font-size: var(--fs-xs); font-weight: var(--fw-semibold); }
  .abs-health__pill--high    { background: var(--color-success-weak); color: var(--color-success-strong); }
  .abs-health__pill--medium  { background: var(--color-warning-weak); color: var(--color-warning-strong); }
  .abs-health__pill--low     { background: var(--color-danger-weak);  color: var(--color-danger-strong); }
  .abs-health__pill--missing { background: var(--color-surface-2);    color: var(--color-text-muted); }

  /* ── Dark-mode overrides for hardcoded Tailwind utility classes ─────────────
     The React panes use Tailwind utilities (bg-white, text-slate-900, etc.) that
     don't respond to [data-theme="dark"] on their own.  These rules remap them to
     the shared CSS-variable palette so dark mode works without touching every JSX
     element.  Specificity [attr]+class beats a bare class, so no !important needed. */
  :root[data-theme="dark"] .bg-white       { background-color: var(--color-surface); }
  :root[data-theme="dark"] .bg-slate-50    { background-color: var(--color-surface-2); }
  :root[data-theme="dark"] .bg-slate-100   { background-color: var(--color-surface-3); }
  :root[data-theme="dark"] .bg-slate-200   { background-color: var(--color-surface-3); }
  :root[data-theme="dark"] .hover\:bg-white:hover      { background-color: var(--color-surface-3); }
  :root[data-theme="dark"] .hover\:bg-slate-50:hover   { background-color: var(--color-surface-3); }
  :root[data-theme="dark"] .hover\:bg-slate-100:hover  { background-color: var(--color-surface-3); }

  :root[data-theme="dark"] .text-slate-900 { color: var(--color-text); }
  :root[data-theme="dark"] .text-slate-800 { color: var(--color-text); }
  :root[data-theme="dark"] .text-slate-700 { color: var(--color-text-muted); }
  :root[data-theme="dark"] .text-slate-600 { color: var(--color-text-muted); }
  :root[data-theme="dark"] .text-slate-500 { color: var(--color-text-subtle); }
  :root[data-theme="dark"] .text-slate-400 { color: var(--color-text-subtle); }

  :root[data-theme="dark"] .border-slate-100 { border-color: var(--color-border); }
  :root[data-theme="dark"] .border-slate-200 { border-color: var(--color-border); }
  :root[data-theme="dark"] .border-slate-300 { border-color: var(--color-border-strong); }

  :root[data-theme="dark"] .border-b       { border-bottom-color: var(--color-border); }
  :root[data-theme="dark"] .border-l       { border-left-color: var(--color-border); }
  :root[data-theme="dark"] .border-r       { border-right-color: var(--color-border); }

  /* Coloured state backgrounds — map light tints to dark equivalents so text
     stays legible (e.g. text-slate-800 = light in dark mode, must sit on dark bg) */
  :root[data-theme="dark"] .bg-indigo-50   { background-color: var(--color-primary-weak); }
  :root[data-theme="dark"] .bg-indigo-100  { background-color: #2d2a6e; }
  :root[data-theme="dark"] .bg-emerald-50  { background-color: var(--color-success-weak); }
  :root[data-theme="dark"] .bg-emerald-100 { background-color: #14281d; }
  :root[data-theme="dark"] .bg-rose-50     { background-color: var(--color-danger-weak); }

  /* Coloured text on those dark backgrounds — keep them readable */
  :root[data-theme="dark"] .text-emerald-800 { color: var(--color-success-strong); }
  :root[data-theme="dark"] .text-emerald-900 { color: var(--color-success-strong); }
  :root[data-theme="dark"] .text-rose-700    { color: var(--color-danger-strong); }
  :root[data-theme="dark"] .text-rose-900    { color: var(--color-danger-strong); }
  :root[data-theme="dark"] .text-indigo-900  { color: var(--color-primary-strong); }
  :root[data-theme="dark"] .text-indigo-400  { color: var(--color-primary); }

  :root[data-theme="dark"] input, :root[data-theme="dark"] select, :root[data-theme="dark"] textarea {
    background-color: var(--color-surface-2);
    color: var(--color-text);
    border-color: var(--color-border-strong);
  }
</style>

<body class="site-shell">
<div data-site-header-slot></div>

<script type="text/babel" data-presets="react">
const DATA = /*__DATA__*/null;

const { useState, useMemo, useEffect, useLayoutEffect, useRef, useCallback } = React;

// --- utilities --------------------------------------------------------------
const CITE_MARKER = /\{\{cite:\s*([^}]+?)\}\}/g;

// Matches: 84%  77.8%  84–97%  70-90%
const PCT_RE = /(\d+(?:\.\d+)?(?:[–\-]\d+(?:\.\d+)?)?)%/g;

// Extended letter chars valid in author names (covers ö, ü, ø, å, é, ñ, etc.)
const CH = `A-Za-z\\u00C0-\\u024F\\-'`;
// Optional lowercase name particle: de, van, von, du, le, la, el, den, der
const P  = `(?:(?:de|van|von|du|le|la|el|den|der)\\s+)?`;
// Core name fragment (uppercase + lowercase 2nd char required to avoid acronyms)
const NM = `${P}[A-Z][a-z][${CH}]*`;

// Pass A — author + year
// "Torabinejad et al (2009)", "Sjögren (1991)", "de Chevigny (2008)", "Low (2011)"
const PROSE_AUTHOR_YEAR_RE = new RegExp(
  `\\b(${NM}(?:(?:\\s+et\\s+al\\.?|\\s+(?:and|&)\\s+${NM}))?)`+
  `\\s*(?:\\((\\d{4})\\)|[,]?\\s*(\\d{4})(?=[;).,\\s]|$))`, "g");

// Pass B — "Name et al." without year
// "de Chevigny et al", "(Jensen et al)", "Sjögren et al found..."
const ET_AL_RE = new RegExp(`\\b${NM}\\s+et\\s+al\\.?`, "g");

// Pass C — two-name pairs without year: "Krasner and Rankow", "Calt and Serper"
const AUTHOR_PAIR_RE = new RegExp(`\\b${NM}\\s+(?:and|&)\\s+${NM}`, "g");

// Pass D — "Name - finding" table cells (lookahead; only name is colored)
// "Low - CBCT…", "de Chevigny - radiolucency…", "Sjögren - Dense fill…"
const AUTHOR_DASH_RE = new RegExp(
  `\\b${NM}(?:\\s+et\\s+al\\.?)?(?=\\s+[—–\\-]\\s)`, "g");

// Pass E — "(Name)" bare parens without year, e.g. "(Webber)"
// Lookbehind + lookahead so only the name inside is colored
const BARE_PAREN_RE = new RegExp(`(?<=\\()${NM}(?:\\s+et\\s+al\\.?)?(?=\\))`, "g");

// Pass F — "According to Name" / "per Name" attribution phrases
const ACCORDING_TO_RE = new RegExp(
  `(?<=\\b[Aa]ccording\\s+to\\s|\\b[Pp]er\\s|\\b[Bb]y\\s)${NM}`, "g");

// Pass G — "Name found/showed/demonstrated/..." reporting verbs
const REPORTING_VERB_RE = new RegExp(
  `\\b${NM}(?=\\s+(?:found|showed|demonstrated|reported|noted|observed|concluded|` +
  `suggested|determined|identified|confirmed|stated|described|revealed|showed))`, "g");

// Applies a sequence of regex passes to remaining text nodes
function applyPasses(text, passes, type = "cite") {
  let nodes = [{ t: "text", v: text }];
  for (const re of passes) {
    const next = [];
    for (const n of nodes) {
      if (n.t !== "text") { next.push(n); continue; }
      for (const n2 of splitByRegex(n.v, re, type)) next.push(n2);
    }
    nodes = next;
  }
  return nodes;
}

const AUTHOR_PASSES = [
  PROSE_AUTHOR_YEAR_RE, ET_AL_RE, AUTHOR_PAIR_RE,
  AUTHOR_DASH_RE, BARE_PAREN_RE, ACCORDING_TO_RE, REPORTING_VERB_RE,
];

// --- contexts ---------------------------------------------------------------
const QuizCtx     = React.createContext({ quizMode: false, authorPool: [], pctPool: [], onAnswer: () => {} });
const FlagCtx     = React.createContext({ flagged: new Set(), toggleFlag: () => {} });
const AbstractCtx = React.createContext({ openAbstract: () => {} });

// --- environment detection / Cloudflare Access auth ------------------------
// On the deployed site, Cloudflare Access sits in front of /api/* and sets
// an HttpOnly session cookie after login. The client doesn't touch a token —
// it just checks /cdn-cgi/access/get-identity to see who (if anyone) is
// signed in, and triggers /cdn-cgi/access/login when it needs to sign the
// user in. On localhost the old serve.py password flow is used.
const CLOUD_MODE = (() => {
  if (typeof window === "undefined") return false;
  const host = window.location.hostname;
  return host !== "localhost" && host !== "127.0.0.1" && host !== "";
})();

async function checkCloudIdentity() {
  if (!CLOUD_MODE) return "";
  try {
    const r = await fetch("/cdn-cgi/access/get-identity", {
      credentials: "same-origin",
      cache: "no-store",
    });
    if (!r.ok) return "";
    const data = await r.json();
    return data?.email || "";
  } catch { return ""; }
}

function goToCloudLogin() {
  if (!CLOUD_MODE) return;
  const ret = encodeURIComponent(window.location.href);
  window.location.href = `/cdn-cgi/access/login?redirect_uri=${ret}`;
}

function goToCloudLogout() {
  if (!CLOUD_MODE) return;
  window.location.href = "/cdn-cgi/access/logout";
}

// --- annotation system -------------------------------------------------------
const ANNO_KEY     = "endo-guide.annotations.v1";
const ANNO_PWD_KEY = "endo-guide.anno-pwd";
const ANNO_SES_KEY = "endo-guide.anno-sess";
const ANNO_PW_PLAIN = "endo-guide.anno-pw-plain"; // session-only plaintext, required for server writes
const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 6);

function loadAnnotations() {
  try { const d = JSON.parse(localStorage.getItem(ANNO_KEY) || "{}"); return { marks: d.marks || [], notes: d.notes || [] }; }
  catch { return { marks: [], notes: [] }; }
}
function saveAnnotations(d) { try { localStorage.setItem(ANNO_KEY, JSON.stringify(d)); } catch {} }

async function hashPw(pw) {
  const buf = await crypto.subtle.digest("SHA-256", new TextEncoder().encode(pw));
  return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2, "0")).join("");
}

const AnnotateCtx = React.createContext({
  annotateMode: false, marks: [], notes: [],
  addMark: ()=>{}, removeMark: ()=>{},
  addNote: ()=>{}, updateNote: ()=>{}, removeNote: ()=>{},
  saveBlock: async ()=>({ ok:false, error:"no_ctx" }),
});

// Find a text range inside rootEl matching a stored mark's context + selectedText
function findMarkRange(rootEl, mark) {
  const nodes = []; let text = "";
  const wk = document.createTreeWalker(rootEl, NodeFilter.SHOW_TEXT, {
    acceptNode: n => {
      const tag = n.parentElement?.tagName?.toLowerCase();
      return (tag === "script" || tag === "style" || tag === "option") ? NodeFilter.FILTER_SKIP : NodeFilter.FILTER_ACCEPT;
    }
  });
  let n;
  while ((n = wk.nextNode())) { nodes.push({ node: n, start: text.length }); text += n.textContent; }
  const needle = mark.contextBefore + mark.selectedText;
  const pos = text.indexOf(needle);
  const sp = pos >= 0 ? pos + mark.contextBefore.length : text.indexOf(mark.selectedText);
  if (sp < 0) return null;
  const ep = sp + mark.selectedText.length;
  let sN=null, sO=0, eN=null, eO=0;
  for (const { node, start } of nodes) {
    const end = start + node.textContent.length;
    if (!sN && sp >= start && sp < end) { sN=node; sO=sp-start; }
    if (!eN && ep > start && ep <= end) { eN=node; eO=ep-start; }
    if (sN && eN) break;
  }
  if (!sN || !eN) return null;
  try { const r = document.createRange(); r.setStart(sN,sO); r.setEnd(eN,eO); return r; } catch { return null; }
}

// Re-apply all text marks to the DOM (runs after every React render via useLayoutEffect)
function applyMarks(containerEl, marks) {
  if (!containerEl) return;
  // Unwrap existing mark spans
  for (const s of Array.from(containerEl.querySelectorAll(".user-ann"))) {
    const p = s.parentNode;
    while (s.firstChild) p.insertBefore(s.firstChild, s);
    p.removeChild(s);
    try { p.normalize(); } catch {}
  }
  // Re-apply each mark
  for (const mark of marks) {
    const sec = containerEl.querySelector(`[data-anchor="${mark.sectionId}"]`);
    if (!sec) continue;
    const range = findMarkRange(sec, mark);
    if (!range) continue;
    const sp = document.createElement("span");
    sp.className = "user-ann"; sp.dataset.annId = mark.id; sp.dataset.annType = mark.type;
    sp.style.cssText = mark.type === "highlight"
      ? `background:${mark.color};border-radius:2px;padding:0 1px`
      : `text-decoration:underline;text-decoration-color:${mark.color||"#4338ca"};text-decoration-thickness:2px`;
    try { range.surroundContents(sp); }
    catch { try { const frag = range.extractContents(); sp.appendChild(frag); range.insertNode(sp); } catch {} }
  }
}

// Long-press hook (works on mouse and touch)
function useLongPress(onLong, ms = 500) {
  const timer = useRef(null);
  const cancel = () => clearTimeout(timer.current);
  return {
    onMouseDown:  () => { timer.current = setTimeout(onLong, ms); },
    onMouseUp:    cancel,
    onMouseLeave: cancel,
    onTouchStart: (e) => { e.preventDefault(); timer.current = setTimeout(onLong, ms); },
    onTouchEnd:   cancel,
  };
}

// Colored span: quick click opens abstract (cite only), long-press flags
function FlaggableSpan({ type, text, query, onClickCite }) {
  const { flagged, toggleFlag } = React.useContext(FlagCtx);
  const isFlagged  = flagged.has(text);
  const longFired  = useRef(false);
  const pressTimer = useRef(null);

  function startPress() {
    longFired.current = false;
    pressTimer.current = setTimeout(() => { longFired.current = true; toggleFlag(text); }, 500);
  }
  function endPress() { clearTimeout(pressTimer.current); }

  const cls = isFlagged ? (type === "cite" ? "cite-flagged" : "pct-flagged") : type;
  const title = type === "cite"
    ? (isFlagged ? "Flagged — long-press to unflag" : "Click for abstract · Hold to flag")
    : (isFlagged ? "Flagged — long-press to unflag" : "Long-press to flag as weak");

  return (
    <span
      className={cls}
      title={title}
      onMouseDown={startPress}
      onMouseUp={endPress}
      onMouseLeave={endPress}
      onTouchStart={(e) => { e.preventDefault(); startPress(); }}
      onTouchEnd={endPress}
      onClick={() => { if (!longFired.current && type === "cite" && onClickCite) onClickCite(); }}
    >
      {highlight(text, query)}
    </span>
  );
}

// Parse "Author et al. (2009)" → {author, year} for SRS key generation.
function parseCiteText(s) {
  const m = /^(.*?)(?:\s*\((\d{4})\))?$/.exec(s || "");
  return m ? { author: (m[1] || "").trim(), year: m[2] || "" } : { author: s || "", year: "" };
}

// Inline quiz dropdown
function QuizSpan({ type, correct, pool }) {
  const { onAnswer } = React.useContext(QuizCtx);
  const [status, setStatus] = useState("idle");
  const [chosen, setChosen] = useState("");
  const options = useMemo(() => {
    const others = pool.filter(p => p !== correct).sort(() => Math.random() - 0.5).slice(0, 3);
    return [correct, ...others].sort(() => Math.random() - 0.5);
  }, []); // eslint-disable-line react-hooks/exhaustive-deps

  // Feed the shared SRS deck when a cite quiz is answered. PCT quizzes are
  // excluded because they aren't keyed to a specific card.
  const feedSrs = (ok) => {
    if (!window.SRS || type !== "cite") return;
    const { author, year } = parseCiteText(correct);
    if (!author) return;
    const key = window.SRS.cardKey(author, year, "", "fwd");
    const deck = window.SRS.loadDeck();
    window.SRS.rate(deck, key, ok ? "good" : "again");
  };

  if (status === "correct") return <span className={`${type} quiz-correct`}>{correct}</span>;
  if (status === "wrong") return (
    <span>
      <span className="quiz-wrong-chosen">{chosen}</span>
      {" "}<span className={type}>{correct}</span>
    </span>
  );
  return (
    <select className={`quiz-select${type === "pct" ? " pct-q" : ""}`} value=""
      onChange={e => {
        const v = e.target.value; if (!v) return;
        const ok = v === correct;
        setChosen(v); setStatus(ok ? "correct" : "wrong");
        onAnswer(ok);
        feedSrs(ok);
      }}>
      <option value="">···</option>
      {options.map(o => <option key={o} value={o}>{o}</option>)}
    </select>
  );
}

// Decides quiz vs flaggable based on context
function CiteNode({ text, query }) {
  const { quizMode, authorPool } = React.useContext(QuizCtx);
  const { openAbstract } = React.useContext(AbstractCtx);
  if (quizMode) return <QuizSpan type="cite" correct={text} pool={authorPool} />;
  return <FlaggableSpan type="cite" text={text} query={query} onClickCite={() => openAbstract(text)} />;
}
function PctNode({ text, query }) {
  const { quizMode, pctPool } = React.useContext(QuizCtx);
  if (quizMode) return <QuizSpan type="pct" correct={text} pool={pctPool} />;
  return <FlaggableSpan type="pct" text={text} query={query} />;
}

// --- Abstract popup modal ---------------------------------------------------
function AbstractModal({ info, onClose }) {
  const { citeText, author, year, abstract, card } = info;

  useEffect(() => {
    const h = e => { if (e.key === "Escape") onClose(); };
    window.addEventListener("keydown", h);
    return () => window.removeEventListener("keydown", h);
  }, [onClose]);

  function nums(text) {
    if (!text) return null;
    const re = /(\d+(?:[.,]\d+)?(?:[–\-]\d+(?:[.,]\d+)?)?%|\d+(?:[.,]\d+)?-fold|\d+(?:[.,]\d+)?[×x](?=[\s,)])|p\s*[<>=≤≥]\s*0\.\d+|\bRR\s*=?\s*\d+(?:\.\d+)?|\bOR\s*=?\s*\d+(?:\.\d+)?|\d+(?:[.,]\d+)?)/g;
    const parts = [];
    let last = 0, m;
    re.lastIndex = 0;
    while ((m = re.exec(text))) {
      if (m.index > last) parts.push(text.slice(last, m.index));
      parts.push(<mark key={parts.length} className="abstract-num">{m[0]}</mark>);
      last = m.index + m[0].length;
    }
    if (last < text.length) parts.push(text.slice(last));
    return parts.length ? parts : text;
  }

  function renderBody(text) {
    if (!text) return null;
    const labelRe = /\b(BACKGROUND|OBJECTIVE[S]?|AIM[S]?|PURPOSE|INTRODUCTION|METHODS?|MATERIALS\s+AND\s+METHODS?|RESULTS?|DISCUSSION|CONCLUSION[S]?|CLINICAL\s+(?:RELEVANCE|SIGNIFICANCE|IMPLICATIONS?))\s*:/gi;
    const matches = [];
    let lm;
    labelRe.lastIndex = 0;
    while ((lm = labelRe.exec(text))) {
      matches.push({ label: lm[1].replace(/\s+/g, " ").toUpperCase(), start: lm.index, bodyStart: lm.index + lm[0].length });
    }
    if (matches.length >= 2) {
      const sections = matches.map((m, i) => ({
        label: m.label,
        body: text.slice(m.bodyStart, matches[i + 1]?.start ?? text.length).trim(),
      }));
      return (
        <div>
          {sections.map((s, i) => {
            const isConclusion = s.label.startsWith("CONCL");
            const isMethods    = /^(METHODS?|MATERIALS)/.test(s.label);
            return (
              <div key={i} className={`mt-2.5 ${isConclusion ? "abstract-conclusion" : ""}`}>
                <span className={`text-[10px] font-bold uppercase tracking-wider mr-1 ${isConclusion ? "text-green-700" : "text-slate-400"}`}>{s.label}:</span>
                <span className={`text-[13px] leading-relaxed ${isConclusion ? "text-green-900" : isMethods ? "text-slate-500" : "text-slate-700"}`}>{nums(s.body)}</span>
              </div>
            );
          })}
        </div>
      );
    }
    const concRe = /\bCONCLUSION[S]?\b/i;
    const concMatch = concRe.exec(text);
    if (concMatch && concMatch.index > text.length * 0.55) {
      const before = text.slice(0, concMatch.index).trim();
      const after  = text.slice(concMatch.index).replace(/^CONCLUSION[S]?[:\s.]*/i, "").trim();
      return (
        <React.Fragment>
          <p className="text-[13px] leading-relaxed text-slate-700 mb-2">{nums(before)}</p>
          <div className="abstract-conclusion">
            <div className="text-[10px] font-bold uppercase tracking-wider text-green-700 mb-1">Conclusion</div>
            <p className="text-[13px] leading-relaxed text-green-900">{nums(after)}</p>
          </div>
        </React.Fragment>
      );
    }
    return <p className="text-[13px] leading-relaxed text-slate-700">{nums(text)}</p>;
  }

  const pmid       = abstract?.pmid;
  const hasContent = abstract?.status === "ok" && abstract?.abstract;
  const notFound   = abstract?.status === "not_found";
  const confidence = abstract?.confidence || null;
  const needsReview = !!abstract?.needs_review;

  const [reportStatus, setReportStatus] = useState("idle"); // idle|sending|sent|error
  const reportBadAbstract = async () => {
    if (reportStatus === "sending" || reportStatus === "sent") return;
    setReportStatus("sending");
    try {
      const res = await fetch("/api/report-bad-abstract", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          author: author || "",
          year: year || "",
          pmid: pmid || null,
          title: abstract?.title || "",
          finding: card?.finding || "",
          section_id: card?.section_id || "",
        }),
      });
      setReportStatus(res.ok ? "sent" : "error");
    } catch (e) {
      setReportStatus("error");
    }
  };

  return (
    <div className="abstract-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="abstract-panel">
        <div className="abstract-header">
          <div className="flex items-start justify-between gap-3">
            <div className="flex-1 min-w-0">
              <h2 className="font-semibold text-slate-800 text-[15px] leading-snug">
                {abstract?.title || citeText}
              </h2>
              <div className="flex flex-wrap items-center gap-x-3 gap-y-0.5 mt-1.5">
                {abstract?.journal && <span className="text-xs text-slate-500 italic truncate max-w-xs">{abstract.journal}</span>}
                {(abstract?.pub_year || year) && <span className="text-xs text-slate-400 shrink-0">{abstract?.pub_year || year}</span>}
                {pmid
                  ? <a href={`https://pubmed.ncbi.nlm.nih.gov/${pmid}/`} target="_blank" rel="noopener noreferrer"
                       className="text-xs font-semibold text-indigo-600 hover:text-indigo-800 hover:underline shrink-0">PubMed ↗</a>
                  : <span className="text-xs text-slate-300 shrink-0">No PubMed record</span>}
              </div>
            </div>
            <button onClick={onClose} aria-label="Close"
              className="shrink-0 text-slate-400 hover:text-slate-700 text-2xl leading-none -mt-0.5">×</button>
          </div>
        </div>
        <div className="abstract-body">
          {/* Confidence banner — only shown when the match score is medium/low */}
          {confidence && confidence !== "high" && !notFound && (
            <div className={`abstract-confidence abstract-confidence--${confidence}`}>
              <span>
                {confidence === "low"
                  ? "⚠ Low-confidence match — this abstract may be the wrong paper."
                  : "⚠ Medium confidence — verify before citing."}
                {typeof abstract?.score === "number" && (
                  <span style={{ marginLeft: 6, opacity: 0.75 }}>
                    (score {abstract.score.toFixed(2)})
                  </span>
                )}
              </span>
              <button
                type="button"
                className="abstract-report-btn"
                onClick={reportBadAbstract}
                disabled={reportStatus === "sending" || reportStatus === "sent"}
                style={{ marginLeft: "auto" }}
              >
                {reportStatus === "sent"    ? "Reported ✓" :
                 reportStatus === "sending" ? "Reporting…" :
                 reportStatus === "error"   ? "Retry report" :
                                              "Report wrong abstract"}
              </button>
            </div>
          )}
          {card?.finding && (
            <div className="abstract-finding">
              <div className="text-[10px] font-bold uppercase tracking-widest text-amber-700 mb-1.5 flex items-center gap-2">
                <span>Key Finding</span>
                {card.section_title && <span className="font-normal normal-case text-amber-500 text-[11px]">· {card.section_title}</span>}
              </div>
              <p className="text-[13px] text-amber-900 leading-relaxed">{nums(card.finding)}</p>
            </div>
          )}
          {hasContent
            ? renderBody(abstract.abstract)
            : <p className="text-[13px] text-slate-400 italic mt-1">
                {notFound ? "No PubMed abstract found for this citation." : "Abstract not available."}
              </p>}
        </div>
      </div>
    </div>
  );
}

function splitByRegex(text, re, type) {
  // Returns [{t:"text"|type, v:string}]
  const nodes = [];
  let last = 0;
  let m;
  const r = new RegExp(re.source, re.flags.includes("g") ? re.flags : re.flags + "g");
  r.lastIndex = 0;
  while ((m = r.exec(text))) {
    if (m.index > last) nodes.push({ t: "text", v: text.slice(last, m.index) });
    nodes.push({ t: type, v: m[0] });
    last = m.index + m[0].length;
  }
  if (last < text.length) nodes.push({ t: "text", v: text.slice(last) });
  return nodes;
}

function renderTextWithCites(text, query) {
  // Pass 0: fact-check highlights ==corrected text==
  if (text.includes("==")) {
    const fcRe = /==([\s\S]+?)==/g;
    const segs = []; let fcLast = 0, fcM;
    fcRe.lastIndex = 0;
    while ((fcM = fcRe.exec(text))) {
      if (fcM.index > fcLast) segs.push({ fc: false, v: text.slice(fcLast, fcM.index) });
      segs.push({ fc: true, v: fcM[1] });
      fcLast = fcM.index + fcM[0].length;
    }
    if (fcLast < text.length) segs.push({ fc: false, v: text.slice(fcLast) });
    if (segs.some(s => s.fc)) {
      return segs.map((s, i) => s.fc
        ? <span key={i} className="factcheck">{renderTextWithCites(s.v, query)}</span>
        : <React.Fragment key={i}>{renderTextWithCites(s.v, query)}</React.Fragment>
      );
    }
  }

  // Pass 1: split on {{cite:}} markers
  const pass1 = [];
  let lastIndex = 0;
  let m;
  const re = new RegExp(CITE_MARKER.source, "g");
  while ((m = re.exec(text))) {
    if (m.index > lastIndex) pass1.push({ t: "text", v: text.slice(lastIndex, m.index) });
    const payload = m[1];
    const head = payload.split(/\s+[—–-]{1,2}\s+/)[0];
    pass1.push({ t: "cite", v: head });
    lastIndex = m.index + m[0].length;
  }
  if (lastIndex < text.length) pass1.push({ t: "text", v: text.slice(lastIndex) });

  // Passes 2+: pct → author passes (A–G)
  const result = [];
  for (const node of pass1) {
    if (node.t !== "text") { result.push(node); continue; }
    for (const n2 of splitByRegex(node.v, PCT_RE, "pct")) {
      if (n2.t !== "text") { result.push(n2); continue; }
      for (const n3 of applyPasses(n2.v, AUTHOR_PASSES)) result.push(n3);
    }
  }

  return result.map((n, i) => {
    if (n.t === "cite") return <CiteNode key={i} text={n.v} query={query} />;
    if (n.t === "pct")  return <PctNode  key={i} text={n.v} query={query} />;
    return <React.Fragment key={i}>{highlight(n.v, query)}</React.Fragment>;
  });
}


function highlight(text, query) {
  if (!query) return text;
  const q = query.toLowerCase();
  const lower = text.toLowerCase();
  const out = [];
  let i = 0;
  while (i < text.length) {
    const idx = lower.indexOf(q, i);
    if (idx < 0) { out.push(text.slice(i)); break; }
    if (idx > i) out.push(text.slice(i, idx));
    out.push(<mark key={out.length}>{text.slice(idx, idx + q.length)}</mark>);
    i = idx + q.length;
  }
  return out;
}

function countMatches(text, query) {
  if (!query || !text) return 0;
  const q = query.toLowerCase();
  const t = text.toLowerCase();
  let n = 0, i = 0;
  while ((i = t.indexOf(q, i)) >= 0) { n++; i += q.length; }
  return n;
}

function blockText(b) {
  if (!b) return "";
  if (b.type === "p" || b.type?.startsWith("h")) return b.text || "";
  if (b.type === "ul" || b.type === "ol") return (b.items || []).join("\n");
  if (b.type === "table") return [(b.headers || []).join(" | "), ...(b.rows || []).map(r => r.join(" | "))].join("\n");
  return "";
}

function sectionText(sec) {
  const own = (sec.blocks || []).map(blockText).join("\n");
  const sub = (sec.subsections || []).map(s => s.title + "\n" + (s.blocks || []).map(blockText).join("\n")).join("\n");
  return sec.title + "\n" + own + "\n" + sub;
}

// --- block renderers --------------------------------------------------------
function isQuestionBlock(b) {
  return b?.type === "ul" && b.items?.some(item => item.trim().endsWith("?"));
}

function Block({ block, query, isAnswer }) {
  const t = block.type;
  if (t === "p") return <p className={isAnswer ? "answer-p" : ""}>{renderTextWithCites(block.text, query)}</p>;
  if (t === "h3") return <h3 className="block-h3">{renderTextWithCites(block.text, query)}</h3>;
  if (t === "h4") return <h4 className="block-h4">{renderTextWithCites(block.text, query)}</h4>;
  if (t === "ul") return <ul>{block.items.map((x, i) => <li key={i} className={x.trim().endsWith("?") ? "question-item" : ""}>{renderTextWithCites(x, query)}</li>)}</ul>;
  if (t === "ol") return <ol>{block.items.map((x, i) => <li key={i}>{renderTextWithCites(x, query)}</li>)}</ol>;
  if (t === "table") return (
    <div className="scroll-table">
      <table>
        <thead><tr>{block.headers.map((h, i) => <th key={i}>{renderTextWithCites(h, query)}</th>)}</tr></thead>
        <tbody>{block.rows.map((r, i) => <tr key={i}>{r.map((c, j) => <td key={j}>{renderTextWithCites(c, query)}</td>)}</tr>)}</tbody>
      </table>
    </div>
  );
  return null;
}

function PasswordModal({ onSuccess, onCancel }) {
  const [status, setStatus] = useState("checking"); // "checking"|"has"|"none"|"offline"
  const [pw, setPw] = useState(""); const [pw2, setPw2] = useState("");
  const [err, setErr] = useState(""); const [busy, setBusy] = useState(false);

  useEffect(() => {
    fetch("/api/auth/status", { cache: "no-store" })
      .then(r => r.ok ? r.json() : Promise.reject())
      .then(d => setStatus(d.has_password ? "has" : "none"))
      .catch(() => setStatus("offline"));
  }, []);

  const hasLocalPw = !!localStorage.getItem(ANNO_PWD_KEY);
  // "New" means we need to create a password: server has none, or we're offline with no local hash.
  const isNew = status === "none" || (status === "offline" && !hasLocalPw);

  const submit = async () => {
    if (busy || !pw.trim()) return;
    setBusy(true); setErr("");
    try {
      if (isNew) {
        if (pw !== pw2) { setErr("Passwords don't match"); return; }
        if (status === "none") {
          const r = await fetch("/api/auth/set", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ password: pw }),
          }).catch(() => null);
          const d = r ? await r.json().catch(() => ({})) : {};
          if (!r || !r.ok || !d.ok) { setErr(`Server: ${d.error || "unreachable"}`); return; }
        }
        localStorage.setItem(ANNO_PWD_KEY, await hashPw(pw));
        sessionStorage.setItem(ANNO_SES_KEY, "1");
        sessionStorage.setItem(ANNO_PW_PLAIN, pw);
        onSuccess();
      } else {
        let ok = false;
        if (status === "has") {
          try {
            const r = await fetch("/api/auth/verify", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ password: pw }),
            });
            const d = await r.json().catch(() => ({}));
            ok = !!d.ok;
          } catch { ok = false; }
        } else {
          ok = (await hashPw(pw)) === localStorage.getItem(ANNO_PWD_KEY);
        }
        if (ok) {
          sessionStorage.setItem(ANNO_SES_KEY, "1");
          sessionStorage.setItem(ANNO_PW_PLAIN, pw);
          if (!hasLocalPw) localStorage.setItem(ANNO_PWD_KEY, await hashPw(pw));
          onSuccess();
        } else { setErr("Incorrect password"); setPw(""); }
      }
    } finally { setBusy(false); }
  };

  const headline = status === "checking" ? "Checking…" : (isNew ? "Set edit-mode password" : "Unlock edit mode");
  const sub = status === "offline"
    ? "Server unreachable — edits won't write to source. Highlights & notes still work."
    : (isNew ? "Choose a password. Needed for highlights, notes, and live source edits." : null);

  return (
    <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center" onClick={onCancel}>
      <div className="bg-white rounded-xl p-6 shadow-2xl w-80" onClick={e => e.stopPropagation()}>
        <h2 className="text-base font-semibold text-slate-900 mb-1">{headline}</h2>
        {sub && <p className="text-sm text-slate-500 mb-1">{sub}</p>}
        <input autoFocus type="password"
          className="w-full px-3 py-2 border border-slate-200 rounded-lg mt-3 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
          placeholder="Password" value={pw}
          onChange={e => { setPw(e.target.value); setErr(""); }}
          onKeyDown={e => e.key === "Enter" && (!isNew || pw2) && submit()} />
        {isNew && (
          <input type="password"
            className="w-full px-3 py-2 border border-slate-200 rounded-lg mt-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-300"
            placeholder="Confirm password" value={pw2}
            onChange={e => { setPw2(e.target.value); setErr(""); }}
            onKeyDown={e => e.key === "Enter" && submit()} />
        )}
        {err && <p className="text-rose-600 text-sm mt-2">{err}</p>}
        <div className="flex gap-2 mt-4">
          <button className="flex-1 px-4 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 disabled:bg-indigo-300 text-sm font-medium" onClick={submit} disabled={busy || status === "checking"}>
            {busy ? "…" : (isNew ? "Set password" : "Unlock")}
          </button>
          <button className="px-4 py-2 bg-slate-100 text-slate-600 rounded-lg hover:bg-slate-200 text-sm" onClick={onCancel}>Cancel</button>
        </div>
      </div>
    </div>
  );
}

// Floating toolbar: appears on text selection (to add mark) or click on existing mark (to remove)
function AnnotationToolbar({ mainRef }) {
  const { annotateMode, addMark, removeMark } = React.useContext(AnnotateCtx);
  const [pos, setPos] = useState(null);          // {x, y, annId|null}
  const [pendingRange, setPendingRange] = useState(null);
  const [pendingSec, setPendingSec] = useState(null);
  const tbRef = useRef(null);

  useEffect(() => {
    if (!annotateMode) { setPos(null); return; }
    const onUp = e => {
      if (tbRef.current?.contains(e.target)) return;
      // Click on existing mark → show remove option
      const annSp = e.target.closest?.(".user-ann");
      if (annSp) {
        const rect = annSp.getBoundingClientRect();
        setPos({ x: rect.left + rect.width / 2, y: rect.top, annId: annSp.dataset.annId });
        setPendingRange(null); setPendingSec(null); return;
      }
      // Text selection → show mark options
      const sel = window.getSelection();
      if (!sel || sel.isCollapsed || !sel.toString().trim()) { setPos(null); setPendingRange(null); return; }
      const range = sel.getRangeAt(0);
      let el = range.commonAncestorContainer;
      if (el.nodeType === Node.TEXT_NODE) el = el.parentElement;
      const sec = el.closest?.("[data-anchor]");
      if (!sec) { setPos(null); return; }
      const rect = range.getBoundingClientRect();
      setPos({ x: rect.left + rect.width / 2, y: rect.top, annId: null });
      setPendingRange(range.cloneRange()); setPendingSec(sec.getAttribute("data-anchor"));
    };
    document.addEventListener("mouseup", onUp);
    return () => document.removeEventListener("mouseup", onUp);
  }, [annotateMode]);

  const applyMark = (type, color) => {
    const secEl = mainRef.current?.querySelector(`[data-anchor="${pendingSec}"]`);
    if (!secEl || !pendingRange) return;
    const selectedText = pendingRange.toString();
    if (!selectedText.trim()) return;
    let contextBefore = "", contextAfter = "";
    try {
      const br = document.createRange(); br.setStart(secEl, 0); br.setEnd(pendingRange.startContainer, pendingRange.startOffset);
      contextBefore = br.toString().slice(-20);
      const ar = document.createRange(); ar.setStart(pendingRange.endContainer, pendingRange.endOffset); ar.setEnd(secEl, secEl.childNodes.length);
      contextAfter = ar.toString().slice(0, 20);
    } catch {}
    addMark({ id: uid(), sectionId: pendingSec, selectedText, contextBefore, contextAfter, type, color });
    window.getSelection()?.removeAllRanges();
    setPos(null); setPendingRange(null);
  };

  if (!pos || !annotateMode) return null;

  const HL = [["#fde68a","Yellow"],["#bfdbfe","Blue"],["#bbf7d0","Green"],["#fecaca","Pink"]];
  return (
    <div ref={tbRef}
      style={{ position:"fixed", left:pos.x, top:pos.y - 4, transform:"translate(-50%,-100%)", zIndex:9999 }}
      className="flex items-center gap-1 bg-slate-800 rounded-lg px-2 py-1.5 shadow-xl select-none"
      onMouseDown={e => e.preventDefault()}>
      {pos.annId ? (
        <>
          <span className="text-slate-300 text-xs px-1">Remove mark?</span>
          <button className="text-xs px-2 py-0.5 bg-rose-500 text-white rounded hover:bg-rose-600"
            onClick={() => { removeMark(pos.annId); setPos(null); }}>Remove</button>
          <button className="text-slate-400 hover:text-white text-xs px-1 ml-1" onClick={() => setPos(null)}>✕</button>
        </>
      ) : (
        <>
          {HL.map(([bg, label]) => (
            <button key={bg} title={`Highlight ${label}`} style={{ background: bg }}
              className="w-5 h-5 rounded-sm border border-white/20 hover:scale-110 transition-transform"
              onClick={() => applyMark("highlight", bg)} />
          ))}
          <div className="w-px h-4 bg-white/20 mx-0.5" />
          <button title="Underline" className="text-white text-xs px-1.5 py-0.5 rounded hover:bg-white/20"
            onClick={() => applyMark("underline", "#818cf8")}>
            <span style={{ textDecoration:"underline", textDecorationColor:"#a5b4fc" }}>U</span>
          </button>
          <div className="w-px h-4 bg-white/20 mx-0.5" />
          <button className="text-slate-400 hover:text-white text-xs px-1"
            onClick={() => { setPos(null); window.getSelection()?.removeAllRanges(); }}>✕</button>
        </>
      )}
    </div>
  );
}

// Inline note display (saved state)
function NoteBlock({ note, annotateMode, onUpdate, onDelete }) {
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(note.text);
  if (editing) {
    return (
      <div className="note-ed">
        <textarea value={text} autoFocus rows={Math.max(2, text.split("\n").length + 1)}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => {
            if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { onUpdate(note.id, text); setEditing(false); }
            else if (e.key === "Escape") { setText(note.text); setEditing(false); }
          }} />
        <div className="note-ed-acts">
          <button className="ns" onClick={() => { onUpdate(note.id, text); setEditing(false); }}>Save</button>
          <span className="nh">⌘Enter · Esc to cancel</span>
          <button className="nc" onClick={() => { setText(note.text); setEditing(false); }}>Cancel</button>
        </div>
      </div>
    );
  }
  return (
    <div className="inline-note" style={annotateMode ? { paddingRight:"5.5rem" } : {}}>
      {note.text}
      {annotateMode && (
        <div className="inline-note-acts">
          <button onClick={() => setEditing(true)}>Edit</button>
          <button onClick={() => onDelete(note.id)}>×</button>
        </div>
      )}
    </div>
  );
}

// "+ note" button that expands to an inline text editor
function AddNoteInline({ sectionId, subsectionId, afterBlockIndex }) {
  const { addNote } = React.useContext(AnnotateCtx);
  const [active, setActive] = useState(false);
  const [text, setText] = useState("");
  const save = () => {
    if (text.trim()) addNote({ id: uid(), sectionId, subsectionId: subsectionId || null, afterBlockIndex, text: text.trim() });
    setActive(false); setText("");
  };
  if (!active) return (
    <button className="add-note-btn" onClick={() => setActive(true)} title="Add a note here">+ note</button>
  );
  return (
    <div className="note-ed">
      <textarea autoFocus value={text} rows={3} placeholder="Add your note…"
        onChange={e => setText(e.target.value)}
        onKeyDown={e => {
          if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) save();
          else if (e.key === "Escape") { setActive(false); setText(""); }
        }} />
      <div className="note-ed-acts">
        <button className="ns" onClick={save}>Save</button>
        <span className="nh">⌘Enter to save · Esc to cancel</span>
        <button className="nc" onClick={() => { setActive(false); setText(""); }}>Cancel</button>
      </div>
    </div>
  );
}

// Inline source-editor for a paragraph / h3 / h4. Double-click the block to open;
// Save posts to /api/save-block, which rewrites endo-guide.md and reruns build.py.
function EditableBlockWrap({ block, sectionId, subsectionId, blockIndex, query, isAnswer }) {
  const { annotateMode, saveBlock } = React.useContext(AnnotateCtx);
  const [editing, setEditing] = useState(false);
  const [text, setText] = useState(block.text || "");
  const [saving, setSaving] = useState(false);
  const [err, setErr] = useState("");

  const canEdit = annotateMode && !!block.raw && (block.type === "p" || block.type === "h3" || block.type === "h4");

  useEffect(() => { if (!editing) setText(block.text || ""); }, [block.text, editing]);

  const startEdit = (e) => {
    // Don't steal dbl-clicks on existing annotation marks — those have their own remove flow
    if (e.target.closest?.(".user-ann")) return;
    // Browsers auto-select a word on dblclick; clear it so the selection toolbar doesn't linger
    window.getSelection?.().removeAllRanges();
    setText(block.text || "");
    setErr("");
    setEditing(true);
  };

  const commit = async () => {
    const trimmed = text.replace(/\s+/g, " ").trim();
    if (!trimmed) { setErr("cannot be empty"); return; }
    if (trimmed === (block.text || "").trim()) { setEditing(false); return; }
    setSaving(true); setErr("");
    const res = await saveBlock({
      sectionId, subsectionId: subsectionId || null, blockIndex,
      type: block.type, oldRaw: block.raw, newText: trimmed,
    });
    setSaving(false);
    if (res.ok) setEditing(false);
    else setErr(res.error || "save failed");
  };

  const cancel = () => { setEditing(false); setErr(""); setText(block.text || ""); };

  if (editing) {
    return (
      <div className="block-ed">
        <textarea
          value={text}
          autoFocus
          rows={Math.max(3, Math.min(14, Math.ceil((text.length || 1) / 70) + 1))}
          onChange={e => setText(e.target.value)}
          onKeyDown={e => {
            if (e.key === "Enter" && (e.metaKey || e.ctrlKey)) { e.preventDefault(); commit(); }
            else if (e.key === "Escape") { e.preventDefault(); cancel(); }
          }}
          disabled={saving}
        />
        <div className="block-ed-acts">
          <button className="bs" onClick={commit} disabled={saving}>{saving ? "Saving…" : "Save"}</button>
          <button className="bc" onClick={cancel} disabled={saving}>Cancel</button>
          <span className="bh">⌘Enter · Esc · writes to endo-guide.md</span>
          {err && <span className="be">{err}</span>}
        </div>
      </div>
    );
  }

  const rendered = <Block block={block} query={query} isAnswer={isAnswer} />;
  if (!canEdit) return rendered;
  return (
    <div className="editable-block" onDoubleClick={startEdit} title="Double-click to edit — saves to endo-guide.md">
      {rendered}
    </div>
  );
}

// Renders blocks interleaved with saved notes + add-note buttons (in edit mode)
function BlocksWithNotes({ blocks, sectionId, subsectionId, query }) {
  const { annotateMode, notes, updateNote, removeNote } = React.useContext(AnnotateCtx);
  return blocks.map((b, i) => {
    const isAns = b.type === "p" && isQuestionBlock(blocks[i - 1]);
    const blockNotes = notes.filter(n =>
      n.sectionId === sectionId &&
      (n.subsectionId || null) === (subsectionId || null) &&
      n.afterBlockIndex === i
    );
    return (
      <React.Fragment key={i}>
        <EditableBlockWrap block={b} sectionId={sectionId} subsectionId={subsectionId || null}
          blockIndex={i} query={query} isAnswer={isAns} />
        {blockNotes.map(note => (
          <NoteBlock key={note.id} note={note} annotateMode={annotateMode}
            onUpdate={updateNote} onDelete={removeNote} />
        ))}
        {annotateMode && <AddNoteInline sectionId={sectionId} subsectionId={subsectionId} afterBlockIndex={i} />}
      </React.Fragment>
    );
  });
}

// --- reference pane ---------------------------------------------------------
function ReferencePane({ sections, query, authorPool, pctPool }) {
  const [activeId, setActiveId] = useState(sections[0]?.id);
  const [quizMode, setQuizMode] = useState(false);
  const [score, setScore] = useState({ c: 0, t: 0 });
  const [sidebarOpen, setSidebarOpen] = useState(() => typeof window !== "undefined" && window.innerWidth >= 768);
  const mainRef = useRef(null);
  const onAnswer = useCallback((ok) => setScore(s => ({ c: s.c + (ok ? 1 : 0), t: s.t + 1 })), []);
  const toggleQuiz = () => { setQuizMode(m => !m); setScore({ c: 0, t: 0 }); };

  const { annotateMode, marks } = React.useContext(AnnotateCtx);
  // Re-apply text marks after every render (before browser paint)
  useLayoutEffect(() => { applyMarks(mainRef.current, marks); });

  // IntersectionObserver for active section
  useEffect(() => {
    const root = mainRef.current;
    if (!root) return;
    const els = root.querySelectorAll("[data-anchor]");
    const obs = new IntersectionObserver((entries) => {
      const vis = entries.filter(e => e.isIntersecting).sort((a, b) => a.boundingClientRect.top - b.boundingClientRect.top);
      if (vis.length) setActiveId(vis[0].target.getAttribute("data-anchor"));
    }, { root, rootMargin: "-20% 0px -70% 0px", threshold: 0 });
    els.forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, [sections]);

  // filter sidebar: show only sections with matches when searching
  const matchCounts = useMemo(() => {
    if (!query) return null;
    const map = {};
    for (const sec of sections) {
      const text = sectionText(sec);
      map[sec.id] = countMatches(text, query);
    }
    return map;
  }, [sections, query]);

  const filteredSections = useMemo(() => {
    if (!query) return sections;
    return sections.filter(s => (matchCounts?.[s.id] || 0) > 0);
  }, [sections, query, matchCounts]);

  const jumpTo = (id) => {
    const el = mainRef.current?.querySelector(`[data-anchor="${id}"]`);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    // On mobile, auto-close the drawer after navigating so the user sees the
    // content they jumped to (the sidebar normally covers ~75 % of the screen).
    if (typeof window !== "undefined" && window.matchMedia &&
        window.matchMedia("(max-width: 767px)").matches) {
      setSidebarOpen(false);
    }
  };

  // Shared site header (site-nav.js) dispatches this event when the user
  // taps the hamburger button. Toggle our drawer in response.
  useEffect(() => {
    const toggle = () => setSidebarOpen(s => !s);
    document.addEventListener("site-nav:toggle-sidebar", toggle);
    return () => document.removeEventListener("site-nav:toggle-sidebar", toggle);
  }, []);

  return (
    <QuizCtx.Provider value={{ quizMode, authorPool, pctPool, onAnswer }}>
    <div className="flex flex-1 min-h-0 relative">
      {sidebarOpen && (
        <div className="fixed inset-0 bg-black/30 z-40 md:hidden" onClick={() => setSidebarOpen(false)} />
      )}
      <aside className={`sidebar border-r bg-slate-50 overflow-y-auto shrink-0 fixed inset-y-0 left-0 z-50 w-72 transition-transform duration-200 md:relative md:translate-x-0 md:z-auto md:w-64 ${sidebarOpen ? "translate-x-0" : "-translate-x-full"}`}>
        <div className="px-3 pt-3 pb-2 border-b border-slate-100 flex items-center justify-between">
          <button
            onClick={toggleQuiz}
            className={`text-xs font-semibold px-2.5 py-1 rounded-full transition ${quizMode ? "bg-indigo-600 text-white" : "bg-slate-200 text-slate-600 hover:bg-slate-300"}`}>
            {quizMode ? "📝 Quiz on" : "Quiz mode"}
          </button>
          {quizMode && score.t > 0 && (
            <span className="text-xs text-slate-500 tabular-nums">{score.c}/{score.t} ✓</span>
          )}
          <button className="md:hidden ml-auto text-slate-400 hover:text-slate-700 px-2 py-1 text-lg leading-none" onClick={() => setSidebarOpen(false)}>✕</button>
        </div>
        <nav className="p-3">
          {filteredSections.length === 0 && query && (
            <div className="text-slate-500 p-3 text-sm">No matches.</div>
          )}
          {filteredSections.map(sec => (
            <div key={sec.id} className="mb-1">
              <a href={`#${sec.id}`} onClick={e => { e.preventDefault(); jumpTo(sec.id); }}
                 className={`flex items-baseline gap-1.5 rounded-md px-2 py-1.5 text-sm font-medium hover:bg-white hover:shadow-sm transition ${activeId === sec.id ? "active" : "text-slate-700"}`}>
                <span className={`text-xs tabular-nums shrink-0 w-5 text-right ${activeId === sec.id ? "text-indigo-400" : "text-slate-400"}`}>{sec.number}</span>
                <span className="truncate leading-snug">{sec.title}</span>
                {query && matchCounts?.[sec.id] ? <span className="ml-auto shrink-0 text-xs text-amber-600 font-normal">·{matchCounts[sec.id]}</span> : null}
              </a>
              {sec.subsections?.length ? (
                <ul className="ml-4 mt-0.5 pl-2 border-l border-slate-200">
                  {sec.subsections.map(sub => (
                    <li key={sub.id}>
                      <a href={`#${sub.id}`} onClick={e => { e.preventDefault(); jumpTo(sub.id); }}
                         className={`flex items-baseline gap-1.5 rounded-md px-2 py-1 text-xs hover:bg-white hover:shadow-sm transition ${activeId === sub.id ? "active" : "text-slate-500"}`}>
                        <span className={`tabular-nums shrink-0 ${activeId === sub.id ? "text-indigo-400" : "text-slate-400"}`}>{sub.number}</span>
                        <span className="truncate leading-snug">{sub.title}</span>
                      </a>
                    </li>
                  ))}
                </ul>
              ) : null}
            </div>
          ))}
        </nav>
      </aside>
      <main ref={mainRef} className={`flex-1 overflow-y-auto bg-white${annotateMode ? " ann-active" : ""}`}>
        <div key={quizMode ? "quiz" : "read"} className="max-w-2xl mx-auto px-4 py-6 md:px-10 md:py-12 prose-body">
          {sections.map((sec, si) => (
            <section key={sec.id} data-anchor={sec.id} id={sec.id} className={`mb-20 ${si > 0 ? "pt-12 border-t-2 border-slate-100" : ""}`}>
              <h2 className="flex items-center gap-3 text-xl font-bold text-slate-900 mb-6 not-prose tracking-tight">
                {sec.number && <span className="text-xs font-bold text-indigo-600 bg-indigo-50 border border-indigo-100 px-2 py-0.5 rounded tabular-nums shrink-0">{sec.number}</span>}
                <span>{highlight(sec.title, query)}</span>
              </h2>
              <BlocksWithNotes blocks={sec.blocks || []} sectionId={sec.id} subsectionId={null} query={query} />
              {(sec.subsections || []).map(sub => (
                <section key={sub.id} data-anchor={sub.id} id={sub.id} className="mt-10 pt-6 border-t border-slate-100">
                  <h3 className="flex items-baseline gap-2 mb-4 not-prose">
                    {sub.number && <span className="text-xs text-indigo-400 tabular-nums font-semibold shrink-0 w-8">{sub.number}</span>}
                    <span className="text-[15px] font-semibold text-slate-800 tracking-tight leading-snug">{highlight(sub.title, query)}</span>
                  </h3>
                  <BlocksWithNotes blocks={sub.blocks || []} sectionId={sec.id} subsectionId={sub.id} query={query} />
                </section>
              ))}
            </section>
          ))}
          <div className="h-32" />
        </div>
        <AnnotationToolbar mainRef={mainRef} />
      </main>
    </div>
    </QuizCtx.Provider>
  );
}

// --- study pane helpers -----------------------------------------------------
function levenshtein(a, b) {
  const dp = Array.from({ length: b.length + 1 }, (_, i) => i);
  for (let i = 1; i <= a.length; i++) {
    let prev = i;
    for (let j = 1; j <= b.length; j++) {
      const val = a[i-1] === b[j-1] ? dp[j-1] : Math.min(dp[j-1], dp[j], prev) + 1;
      dp[j-1] = prev; prev = val;
    }
    dp[b.length] = prev;
  }
  return dp[b.length];
}
function authorMatch(typed, correct) {
  const norm = s => s.toLowerCase().replace(/[^a-z]/g, " ").trim().replace(/\s+/g, " ");
  const t = norm(typed), c = norm(correct);
  if (!t) return false;
  if (c.includes(t) || t.includes(c)) return true;         // substring match
  const first = c.split(" ")[0];                           // first surname only
  if (t === first) return true;
  return levenshtein(t, first) <= 2;                       // typo tolerance ≤2
}

// --- abstract panel (PubMed) ------------------------------------------------
function normalizeAuthorForSearch(author) {
  return author
    .replace(/\s+et\s+al\.?/gi, "")
    .replace(/\s+(and|&)\s+.*/i, "")
    .trim();
}

const ABSTRACT_CACHE_KEY = "endo-guide.abstracts.v1";
function loadAbstractCache() { try { return JSON.parse(localStorage.getItem(ABSTRACT_CACHE_KEY) || "{}"); } catch { return {}; } }
function saveAbstractCache(c) { try { localStorage.setItem(ABSTRACT_CACHE_KEY, JSON.stringify(c)); } catch {} }

function useAbstract(author, year) {
  const [state, setState] = useState(() => {
    // 1. Check pre-built abstracts embedded at build time
    const key = `${author}|${year}`;
    const prebuilt = DATA?.abstracts?.[key];
    if (prebuilt?.status === "ok" && prebuilt.abstract) {
      return { status: "done", pmid: prebuilt.pmid, title: prebuilt.title, abstract: prebuilt.abstract };
    }
    if (prebuilt?.status === "not_found") {
      return { status: "notfound" };
    }
    // 2. Fall back to localStorage cache from previous runtime fetches
    if (author && year) {
      const cacheKey = `${normalizeAuthorForSearch(author).toLowerCase()}|${year}`;
      const cached = loadAbstractCache()[cacheKey];
      if (cached) return { status: "done", ...cached };
    }
    return { status: "idle" };
  });
  return state;
}

const ABSTRACT_STOP = new Set(["that","with","from","this","than","have","been","more","also","when","after","before","which","their","there","these","those","using","used","were","could","should","would","about","both","into","each","they","some","then","them","will","such","only","very","most","much","many","over","under","during","following","within","without","between","among","significantly","significant","patients","results","study","studies","treatment","clinical","associated","compared","showed","found","reported","observed"]);

function highlightInAbstract(abstract, finding) {
  if (!abstract) return abstract;
  const words = [...new Set((finding || "").toLowerCase().match(/\b[a-z]{5,}\b/g)?.filter(w => !ABSTRACT_STOP.has(w)) || [])];
  if (!words.length) return abstract;
  const re = new RegExp(`\\b(${words.map(w => w.replace(/[.*+?^${}()|[\]\\]/g, "\\$&")).join("|")})`, "gi");
  const out = [];
  let last = 0, m;
  re.lastIndex = 0;
  while ((m = re.exec(abstract))) {
    if (m.index > last) out.push(abstract.slice(last, m.index));
    out.push(<mark key={m.index} style={{ background: "#bfdbfe", borderRadius: "2px", padding: "0 1px" }}>{m[0]}</mark>);
    last = m.index + m[0].length;
  }
  out.push(abstract.slice(last));
  return out;
}

function AbstractPanel({ author, year, finding }) {
  const { status, title, abstract, pmid } = useAbstract(author, year);
  if (status === "idle") return null;
  return (
    <div className="mt-3 rounded-xl border overflow-hidden text-sm">
      {status === "loading" && (
        <div className="px-4 py-3 bg-slate-50 text-slate-400 italic animate-pulse">Fetching abstract from PubMed…</div>
      )}
      {(status === "notfound" || status === "error") && (
        <div className="px-4 py-3 bg-slate-50 text-slate-500 text-[13px] flex items-center gap-2">
          <span className="italic">Abstract not indexed in PubMed.</span>
          <a href={`https://pubmed.ncbi.nlm.nih.gov/?term=${encodeURIComponent(author + " " + year)}`}
             target="_blank" rel="noopener noreferrer"
             className="text-indigo-600 hover:underline whitespace-nowrap not-italic">Search PubMed ↗</a>
        </div>
      )}
      {status === "done" && (
        <div className="bg-blue-50 border-blue-200">
          <div className="px-4 pt-3 pb-1 flex items-start justify-between gap-3">
            <span className="font-semibold text-slate-800 leading-snug text-[13px]">{title}</span>
            <a href={`https://pubmed.ncbi.nlm.nih.gov/${pmid}`} target="_blank" rel="noopener noreferrer"
               className="shrink-0 text-xs text-indigo-600 hover:underline mt-0.5 whitespace-nowrap">PubMed ↗</a>
          </div>
          <p className="px-4 pb-4 pt-2 text-slate-700 leading-relaxed text-[13px]">
            {abstract ? highlightInAbstract(abstract, finding) : <span className="italic text-slate-400">No abstract available.</span>}
          </p>
        </div>
      )}
    </div>
  );
}
